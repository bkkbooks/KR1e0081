body:
  text: 春秋輯傳卷四明王樵輯閔公元年春王正月左傳不書即位亂故也國亂不得成禮公羊傳公何以不言即位繼弒君不言即位復發傳者嫌繼未踰年君義異故也孰繼據子般弒不見繼子般也孰弒子般慶父也殺公子牙今將爾季子不免慶父弒君何以不誅將而不免遏惡也既而不可及因獄有所歸不探其情而誅焉親親之道也獄有所歸謂罪歸鄧扈樂也此與左傳所載事異今從左傳榖梁傳繼弒君不言即位正也親之非父也兄也尊之非君也未踰年也繼之如君父也者受國焉爾趙氏曰公羊云慶父不誅因獄有所歸不探其情非也臣弒其君凡在官者殺無赦季子初至威令未著力不能爾非不討也齊人救邢左傳狄人伐邢在往年冬管敬仲言于齊侯曰戎狄豺狼不可厭也諸侯親昵女一反不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書詩小雅美文王為西伯勞來諸侯之詩簡書同惡相恤之謂也請救邢以從簡書齊人救邢榖梁傳善救邢也朱子曰齊桓公較正當只得一畨出伐謂召陵之師管仲亦不見出有事時只是遣人出整頓春秋每稱齊人夏六月辛酉葬我君莊公左傳亂故是以緩汪氏曰魯君之葬皆不過五月之期惟桓公見戕丁齊九月而後葬昭公客死于外八月而後葬莊公之薨至是十有一月而始克葬蓋以國亂子弒嗣君幼弱危不得葬也秋八月公及齊侯盟于落姑落公穀作洛左傳請復季友也齊侯許之使召諸陳公次于郎以待之穀梁傳盟納季友也杜氏曰落姑齊地季子來歸左傳嘉之也穀梁傳其曰季子貴之也其曰來歸喜之也陸氏曰季子之出不書者慶父之難季子力不能正違而去之權也君立見召而來義也故聖人善其歸不譏其去以明變而得中進退不違道也問季友之為人朱子曰此人亦多可疑諸家多言季友來歸為聖人美之之辭據某看此一句正是聖人著季氏所以専國為禍之基又成風聞季氏之繇乃事之左氏記此數句亦有説話成風沒巴鼻事他則甚按是時慶父最強莊公屬疾慶父遂有代立之勢叔牙則顯謂莊公曰魯一生一及君己知之矣以慶父之強而叔牙附之莊公拱手聽命于其手而已俄而叔牙弒械己成或欲寄惡名於慶父而自取之也季友得先事誅之而慶父不敢阻乃立子般慶父弒子般而季友奔陳然慶父不能遂有魯國者國人未之與也故如齊自托不擇立莊公諸子之長者而立閔公一利其幼二亦以其齊之甥也哀薑通乎慶父成風私事季友其事一也哀薑無子而欲立慶父其名不順又弒閔公國人所不容故季友乘其後而定立僖之䇿所謂後出者勝也自是季氏得魯政而常為三桓先矣朱子謂春秋書季子來歸著季氏得政祿去公室之漸可謂深得聖人之微旨矣冬齊仲孫來左傳齊仲孫湫湫子小反仲孫名來省難書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未已時慶父亦還魯公曰若之何而去之對曰難不己將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固有禮則國重有禮則基固若是者不可動也故曰因重固間攜二覆昏亂霸王之器也愚按書來譏也仲孫之來覘魯也莊公薨子班弒閔公幼落姑之盟嘗請于齊借能復季子而已而慶父夫人之志未可知也桓公不能正􅍀然使人以覘魯曰是可取乎夫職為方伯義在以救災恤難討逆定亂率諸侯而將因人之難以為利書來不書事所以病桓也然則仲孫不名其無貶乎或言湫知魯秉周禮未可動勸桓公務寧魯難而親之是以春秋嘉之而書字其然乎曰非也仲孫者孫氏以為天子之命大夫也書仲孫與文十五年宋華孫同昭四年傳云齊有仲孫之難而獲桓公蓋仲孫乃無知之後也與臣弒其君凡在官者殺無赦而况受命専政之方伯近在鄰國者乎不去慶父魯難未已時事之情仲孫知之悉矣當勸桓公速出師以誅之則一舉而魯國定矣救邢封衛之功當不能復偉於是舉矣計不出此而乃曰難不己將自斃君其待之使慶父稔惡閔公再弒則斯言為之也故直書曰齊仲孫來交譏之也崔銑曰齊桓之伯佚宋萬慶父之誅若討二賊則不待諭而人紀明良心奮功近于伐楚矣夫知攘夷而忽于正中國知存亡而忽于存人心失本末矣附録左傳晉侯作二軍公將上軍太子申生將下軍趙夙趙衰兄御戎畢萬魏犨祖父為右以滅耿滅霍滅魏平陽皮氏縣東南有耿鄉宋安縣東北有霍太山三國皆姬姓還為太子城曲沃賜趙夙耿賜畢萬魏以為大夫士蒍曰太子不得立矣分之都城而位以卿位以卿謂將下軍不如逃之無使罪至為吳太伯不亦可乎猶有令名有讓位之名與其及也勝於留而及禍且諺曰心苟無暇何恤乎無家天若祚太子其無晉乎二年春王正月齊人遷陽杜氏曰陽國名齊人逼徙之夏五月乙酉吉禘于莊公胡傳程氏曰天子曰禘諸侯曰祫其禮皆合祭也禘者禘其所自出之帝為東向之尊其餘皆合食于前此之謂禘諸侯無所出之帝則止於太祖之廟合祧廟之主以食此之謂祫天子禘諸侯祫大夫享庶人薦上下之殺也魯諸侯何以有禘成王追念周公有大勳勞于天下賜魯公以天子禮樂使用諸太廟以祀周公魯于是乎有禘祭春秋之中所以言禘不言祫也然則可乎孔子曰魯之郊禘非禮也周公其衰矣禘言吉者喪未三年行之太早也何氏曰莊公薨至是適二十二月當杜氏曰三年喪畢致新死者之主于廟廟之逺主遷入祧因是大祭以審昭穆謂之禘莊公喪制未闋而吉祭又不于太廟故詳書以示譏于莊公者方祀于寢非宫廟也一舉而三失禮焉春秋之所謹也四時之祭有禘之名蓋禮文交錯之失趙氏曰禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尊始祖所出之帝而追祀之以其祖配之者謂于始祖廟祭之而便以始祖配祭也此祭不兼羣廟之主為其踈逺不敢瀆也其年數或每年或數年未可知也然則春秋書魯之禘何也曰成王追寵周公故也魯之用禘蓋於周公廟而上及文王文王即周公之所出也故此祭惟得於周公廟為之閔公時遂僭於莊公廟行之以其不追配故直言莊公而不言莊宫明用其禮物耳不追配文王也若言吉禘于莊宫即似于莊廟祭及文王今既不爾故指言莊公以明之也李廉曰春秋書禘二此年及僖八年禘于太廟皆失禮之中又失禮而書也吉禘之説三傳皆知喪禘之失禮而不知魯本不當禘程氏胡氏能發明魯禘之非禮而不知禘本無合食唯趙子得之魏子才曰大祫乃羣昭羣穆已毁未毁之廟皆升合食於太祖禮盛而繁禘則上尊太祖之自出故配不及羣廟禮大而簡特緣太祖起此義若又旁及羣廟則瀆矣趙氏曰問者曰左傳云蒸嘗禘于廟何也答曰此為見春秋經前後祭祀惟有此三種以為祭名盡于此但據經文不識經意所以云爾又見經中禘於莊公以為諸廟合行之故妄云禘于武宫僖宫襄宫皆妄引禘文而説祭耳問者曰若禘非時祭之名則禮記諸篇所説其故何也郊特牲曰春禘而秋嘗祭統曰春礿夏禘王制曰礿則不禘禘則不嘗嘗則不蒸蒸則不礿鄭玄云虞夏諸侯嵗朝廢一時祭也略舉一二曰禮記諸篇或孔門之後末流弟子所撰或是漢初諸儒私撰之以求購金皆約春秋為之見春秋禘于莊公遂以為時祭之言見春秋惟兩度書禘一春一夏閔二年五月吉禘于莊公今之三月僖八年七月禘于太廟今之五月也所以或謂之春祭或謂之夏祭各自著書不相符會理可見也按此胡氏所謂四時之祭有禘之名乃禮文交錯之失者也秋八月辛丑公薨左傳初公傅奪卜齮魯大夫田公不禁秋八月辛丑共仲使卜齮賊公于武闈宮中小門謂之闈公羊傳公薨何以不地隱之也何隱爾弒也孰殺之慶父也殺公子牙今將爾季子不免慶父弒二君何以不誅將而不免遏惡也既而不可及緩追逸賊親親之道也今按衛州吁弒君而石碏大義滅親文薑與弒桓公而國人絶不為親禮也孰為慶父弒二君而猶可以親親待之乎緩追逸賊親親之道也以論鄭莊公之於叔段可也季子之於慶父乃怠緩縱賊大亂之道也榖梁傳不地故也其不書葬不以討母葬子也謂凡君弒賊討則書葬哀薑實被討而不書葬者不以討母葬子啖氏曰凡公葬皆書惟隱公閔公不書者言賊不討如不葬然也公羊云君弒賊不討不書葬以為無臣子也榖梁傳君弒賊不討不書葬以罪下也此説皆是也今按閔公再弒哀薑雖見討于齊魯之臣子竟何以自伸于大義哉公羊所謂無臣子榖梁所謂以罪下者觀是亦深切著明矣既云絶不為親又云不以討母葬子曲説也啖子謂三傳所記本皆有所受為經生未學轉以濫説附益其中非純是本説豈非此類之謂乎觀慶父諡共而公孫傲為卿則慶父之誅亦不以賊討矣夫哀薑誅于齊則請其喪以歸而葬以小君之禮慶父縊于汶水之上則不以賊討而為之立後且知必又納其喪矣魯人自如此其如彼何哉聖人不書閔公之葬以見其賊之實未討于慶父書奔而不志其死以見魯之不能以賊討使魯能討則當書刺慶父以正討賊之法矣喪歸削而不書不與穆伯同以見弒逆之賊生不可立于天地之間死不可容于宗國之壤其絶之也甚矣九月夫人薑氏孫于邾按文薑淫乎齊侯與弒桓公復孫于齊不去其薑氏不足以見其罪哀薑通乎慶父與弒閔公乃孫于邾雖不去其薑氏而絶之之義己著矣胡氏乃謂不去姓氏降文薑也范氏謂文薑有殺夫之罪重哀薑有殺子之罪輕此輕重之差其説皆非也哀薑之不奔齊畏齊桓也君子誦其文則曰邾非薑之宗國也此薑氏也胡邾之適乎公子慶父出奔莒左傳成季以僖公適邾僖公閔公庶兄成風之子共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密魯地琅邪費縣北有密如亭使公子魚奚斯也請不許哭而往共仲曰奚斯之聲也乃縊閔公哀薑之娣叔薑之子也故齊人立之共仲通于哀薑哀薑欲立之閔公之死也哀薑與知之故孫于邾齊人取而殺之于夷魯地以其尸歸僖公請而葬之愚按書慶父出奔譏失賊也或言慶父巨姦魯大夫而三十年執其兵柄其植根深矣其耳目廣矣勢未易除而乃可以緩不討賊責魯人乎是殆不然慶父之強孰與衛之州吁州吁未能和其民石厚問定君於石碏石碏曰王覲為可莫若朝陳使請厚從州吁如陳石碏使告于陳而執之卒殺州吁君子曰石碏純臣也大義滅親使季友有石碏之志純以至公大義為心不分於市恩逺怨樹私家以立黨之念內因國人之忿外結伯主之盟明君父之讐以誅篡弒之賊宜若拉朽之易也而季友不然乃以賂求于莒不許其入而已討賊之義黯暗委靡如此欲逃失賊之責豈可得乎不惟是而已又立孟氏與叔牙同使魯人謂弒君者不失為有後故異時東門遂復踵其為亂臣賊子接迹而莫之創則誰為之哉胡康侯舍見在之黨姦者不誅而追咎于莊公之忘親釋怨使臣子則而象之以為常事則可謂迂矣冬齊高子來盟公羊傳高子者何齊大夫也何以不稱使我無君也然則何以不名喜之也何喜爾正我也其正我奈何莊公死子般弒閔公弒比三君死曠年無君設以齊取魯曽不興師徒以言而已矣桓公使高子將南陽之甲立僖公而城魯或曰自鹿門至于爭門者是也或曰自爭門至于吏門者是也魯人至今以為美談曰猶望高子也久濶思相見者引此為喻美談至今不絶也愚按齊桓因仲孫省難歸從其言専意於寧魯之難故繼使高子來圖之立僖公而城魯如公羊所載蓋有所傳矣或者泥魯可取乎及榖梁不以齊侯使高子之説乃曲為之説美不歸於齊侯而歸於高子謂高子之來也桓公之命必曰魯可取則兼其國以廣地魯可存則平其亂以善鄰非有扶危繼絶一定不可易之計也高子至則平魯難定僖公魯人賴焉故特稱高子以著其善不曰齊侯使之者權在高子也斯論亦近於舞文矣十有二月狄入衛左傳狄人伐衛懿公及狄人戰于熒澤衛師敗績遂滅衛初惠公之即位也少齊人使昭伯惠公庶兄公子頑也蒸於宣薑不可昭伯不可強之生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河迎衛敗衆宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人共及滕衛别邑立戴公以廬于曹廬舍也曹衛下邑戴公名申其年卒而立文公許穆夫人賦載馳詩載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹胡傳衛康叔之後蓋北州大國狄何以能入乎臣昔嘗謂河南劉奕曰史氏記繁而志寡如班固書載諸王淫亂等事盡削之可也奕曰必若此言仲尼刪詩如牆有茨鶉之奔奔桑中諸篇何以録于國風而不削乎臣不能答後以問延平楊時時曰此載衛為狄所滅之因也故在定之方中之前因以是説考於歷代凡淫亂者未有不致于殺身敗家而亡其國者也然後知古詩垂戒之大而近世有獻議乞於經筵不以國風進讀者殊失聖經之旨矣鄭棄其師左傳鄭人惡高克使帥師次于河上高克鄭大夫久而弗召師潰而歸高克奔陳鄭人為之賦清人胡傳人君擅一國之名寵生殺豫奪惟我所制使高克不臣之罪己著按而誅之可也情狀未明黜而退之可也愛惜其才以禮馭之亦可也烏可假以兵權委諸竟上坐視其離散而莫之恤乎春秋書曰鄭棄其師其責之深矣高克奔陳不書不足書也附録左傳晉侯使太子申生伐東山臯落氏赤狄别種也臯落其氏族里克晉大夫諫曰太子奉冢大也祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師専行謀帥師者必専謀其軍事誓軍旅宣號令也君與國政正卿之所圖也非太子之事也師在制命而己命將軍所制稟命則不威專命則不孝故君之嗣適不可以帥師且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見太子太子曰吾其廢乎對曰告之以臨民謂居曲沃教之以軍旅謂將下軍不共是懼何故廢乎且子懼不孝無懼弗得立修已而不責人則免於難此下有太子帥師公衣之偏衣佩之金玦一段今刪今按此舉也狐突梁餘子養先丹木皆勸申生逃難羊舌大夫勸其死之要之里克之論正太子將戰狐突諫曰不可昔辛伯諗音審告也周桓公曰內寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣指驪姬等立可必乎孝而安民子其國之奉身為孝不戰為安民與其危身以速罪也有功益見害也去則孝而安民留則危身召罪與其危身而召罪也豈若孝而安民乎勸使逃也成風聞成季之繇繇直救反卜兆之占辭也乃事之成季之將生也桓公使卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所而屬僖公焉故成季立之僖之元年齊桓公遷邢于夷儀二年封衛于楚丘邢遷如歸衛國忘亡衛文公大布粗布之衣大帛厚繒之冠蓋用諸侯諒閽之服務材訓農通商惠工敬教勸學授方任能方百事之宜也元年革車三十乘季年乃三百乘春秋輯傳卷四

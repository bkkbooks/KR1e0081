body:
  text: 春秋輯傳卷三明王樵輯莊公元年春王正月榖梁傳繼弒君不言即位正也啖氏曰榖梁是也左氏不逹曲為說曰莊公不言即位文姜出故也母以得罪去國猶曰不忍父為他國所殺其情若何不舉其大而舉其細非通論也且三月文姜方孫何妨正月即位乎按同雖嫡長未誓於天子猶不得稱世子况不請命可以為諸侯乎父以弒逆得位又不以道終於他國無所受之可知先儒謂不書即位不正其始也然朱子則以不書即位者非聖人絀其即位自是魯君元不行即位之禮其書即位者是魯君行即位之禮也如此則莊公不行即位之禮公榖以為繼故而有所不忍焉得之矣然以此示訓可也其實莊公主王姬閔公盟落姑僖公㑹柳三公不書即位皆以㷀然在疚之人而與於嘉事未見其創巨痛深之意其不行即位之禮者或自緣國亂倥偬而廢耳三月夫人孫于齊左傳不稱姜氏絶不為親禮也公羊傳內諱奔謂之孫夫人何以不稱姜氏與弒公也杜氏曰魯人責之故出奔胡傳夫人文姜也桓公之弒姜氏與焉為魯臣子者義不共戴天矣嗣君夫人所出也徇私情則害天下之大義舉王法則傷母子之至恩此國論之難斷者也經書夫人孫于齊而恩義之輕重審矣梁人有繼母殺其父者而其子殺之有司欲當以大逆孔季彥曰文姜與弒魯桓春秋去其姜氏傳謂絶不為親禮也夫絶不為親即凡人耳方諸古義宜以非司寇而擅殺當之不得以逆論也人以為允故通於春秋然後能權天下之事矣孫者順讓之辭使若不為人子所逐以全恩也汪氏曰文姜與弒桓公哀姜與弒二君皆罪大惡極不可復居魯國故皆書孫雖不曰奔使若自知愧恥而去然亦可見其無所容則其絶之也至矣哀姜去而不返齊人討而殺之得討賊之義矣文姜復歸于魯而或㑹或享如齊如莒一書再書而又再書春秋非與其歸魯也所以深惡魯之臣子無憤疾之心而不能仗大義以誅之也先儒謂唐武后廢中宗而移其宗廟張柬之等當廢為庶人而賜之死引春秋絶文姜之義以為斷可謂得聖人之意矣春秋于文姜不曰姜氏而曰夫人綱目于武后不曰太后而稱武氏蓋稱姜氏則疑于妾媵而其罪不彰稱太后則猶為天下之母而非庶人矣况聖人筆削父母國之史而朱子筆削前代之史師其義而不襲其文豈非得傳心之要乎啖氏曰公羊云夫人固在齊矣其言孫于齊念母也豈有先在齊而今書孫乎蓋見無夫人至文故云耳不知夫人隨喪而歸矣榖梁亦言夫人先在齊至練祭時感母不預故録之亦非也夏單伯逆王姬單音善後同逆左作送公羊傳單伯者吾大夫之命乎天子者也陸氏曰諸國大夫王賜之圻內邑為號令歸國如單伯祭仲是也逆之者何使我主之也天子嫁女乎諸侯必使諸侯同姓者主之諸侯嫁女乎大夫必使大夫同姓者主之榖梁傳命大夫故不名其不言如何也其義不可受於京師也其義不可受於京師何也曰躬君弒於齊使之主婚姻與齊為禮其義固不可受也范氏曰單姓也伯字也孫氏曰天子命莊公主讐婚而公不辭故交譏之單伯左氏以為王卿士逆作送下王姬歸杜云不書逆公不與接秋築王姬之館于外主王姬者必為之改築於路寢則不可小寢則嫌穀梁曰於廟則已尊於寢則已卑趙氏曰廟者非所當居何論尊乎王姬不可居公寢何論卑乎公羊是也羣公子之舍則以卑矣其道必為之改築者也改築禮也其書譏也仇讐之人非所以接婚姻也衰麻非所以接辨冕也魯忘仇讐安與之接婚姻而不辭春秋以為是無人心而天理滅矣一書再書不曰築王姬之館而曰築王姬之館于外所以深著之也其築之於外何也懼齊也楚公子圍聘于鄭且娶于公孫段氏將入館鄭人惡之使行人子羽辭焉乃館于外將以衆逆子羽曰小國恃大國之安靖已而無乃包藏禍心以圖之不然敝邑館人之屬也其敢愛豐氏之祧齊强魯弱桓公如齊不返魯不能讐而猶虞其包藏禍心如楚以衆逆之事故築于外耳胡氏謂魯人知仇讐接婚姻之不可故異其禮而築于外曾不若辭而弗主之為正斯意則善矣然考其實則自主王姬之後今年㑹伐衛明年同狩又明年復㑹伐衛讐齊之意無幾微見於舉動烏在知接嘉禮之不安而築之外乎冬十月乙亥陳侯林卒王使榮叔來錫桓公命此書錫命之始禮諸侯嗣位三年喪卑以士服見天子天子錫之黼冕圭璧然後歸以臨其民謂之受命桓篡弒未嘗入朝受命今以王命寵篡弒又死而追錫之不正甚矣或書天王或書王范寧以為非義所存是矣榖梁傳禮有受命無來錫命錫命非正也生服之死行之禮也生不服死追錫之不正甚矣王姬歸于齊趙氏曰凡外女歸者皆以非常乃書合禮則不書兩書王姬歸此年及十一年皆非常譏與讐為婚主也書外女未有詳於此者書逆書築館書歸書卒皆以病莊公也齊師遷紀郱鄑郚郱蒲丁反鄑子斯反郚音吾此書遷之始啖氏曰齊欲滅紀故遷其三邑公羊云遷者何取之也曷為不言取為襄公諱也按取人邑非善事若為之諱是掩惡也榖梁云紀國也郱鄑郚國也或曰遷紀于郱鄑郚按下有紀侯大去其國明此時未遷故知郱鄑郚是紀之三邑爾趙氏曰凡非所遷而遷之其惡著矣能以國遷曰某遷邢遷于夷儀之類言存為列國徙而臣之曰遷某移入封內以為附庸也宋人遷宿之類今按趙氏曰徙而臣之曰遷某如宋人遷宿之類然則遷邑義亦同此杜預謂徙其三邑之民而取其地自古遷滅人國邑未有棄其人但取空地者盟向之民不肯從鄭主遷其人于郟此王自遷也若齊取紀邑肯如是乎杜氏曰郱在東莞臨朐縣南鄑在朱虛縣東而北海都昌縣西有訾城春王二月葬陳莊公夏公子慶父帥師伐於餘丘杜氏曰於餘丘國名也莊公時年十五則慶父莊公庶兄王氏曰於餘丘小國蓋其後屬邾胡傳按二傳公穀於餘丘邾邑也於發語詞猶曰於越國而曰伐此邑爾其曰伐何也志慶父之得兵權也愚按是時莊公幼在喪慶父専兵假詞侵小直書而罪惡見矣秋七月齊王姬卒榖梁傳主之者卒之也范氏曰主其嫁則有兄弟之恩死則服之服之故書卒禮記曰齊告王姬之喪魯莊公為之大功孔氏曰他國夫人之卒例皆不書唯魯女為諸侯之妻書其卒耳王姬非是內女亦書其卒為比之內女故也檀弓曰齊告王姬云云或曰由魯嫁故為之服姊妹之服是其比內女也汪氏曰周禮為王后齊衰解之者曰諸侯為之不杖期固未聞主婚王女而為之服也春秋二百四十二年王后崩不見于經則當時諸侯于王后之喪禮略矣而顧為王姬服其重在齊而不在周也或者以為尊王命過矣按後此齊桓王姬亦魯主之而其卒不書蓋莊公之舉為齊而非為周至桓而勢自廢可見主婚修服之非禮矣冬十有二月夫人姜氏㑹齊侯于禚禚諸若反公作郜左傳書姦也詩序猗嗟刺魯莊公也莊公不能以禮防間其母失子之道趙氏曰姜氏齊侯之惡著矣亦以病公也曰子可以制母乎夫死從子通乎其下况於國君君者人神之主風教之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至爾杜氏曰夫人行不以禮故還皆不書禚齊地乙酉宋公馮卒馮皮氷反高氏曰觀宋莊忮求敗類穆公之不以國與子有以知之矣三年春王正月溺㑹齊師伐衛公羊傳溺者何吾大夫之未命者也趙氏曰左氏穀梁皆以不稱氏為貶按例不命之卿不書氏不可别為義榖梁傳惡其㑹仇讐而伐同姓高氏曰衛朔奔齊齊欲納之然天王已絶朔而立公子黔牟為衛侯魯輒興師㑹仇讐之人抗天子之命納不義之君其罪大矣夏四月葬宋莊公五月葬桓王按左氏曰緩也蓋王崩至是七年矣觀子儀黑肩之亂則王室或多故矣故七年而葬魯往㑹之而書夫以天下葬一人何故之能淹至于七年之久見周臣子之慢也㑹葬不書其人見魯之慢也莊王以後無有以緩葬書而有速葬者王室益弱禮滋略矣榖梁言天子志崩不志葬曰必其時也事孰有大於葬天子者而可以不志乎劉敞言公親㑹之不書葬常事也曰不親㑹之則書葬非常也死生終葬之際人道之大變豈以是為常事而不書也公榖皆以為改葬誠改葬則聖人明書之矣世之末也何事不有豈能必桓王前已葬哉况是時諸侯無王同軌畢至之禮尚不能行于初喪七月之期况改葬乎葬未嘗㑹而改葬㑹乎秋紀季以酅入于齊酅户圭反左傳紀于是乎始判公羊傳請後五廟以存姑姊妹杜氏曰季紀侯弟􅈶紀邑在齊國東安平縣齊欲滅紀故季以邑入齊為附庸先祀不廢社稷有奉故書貴之趙氏曰此乃紀侯之命冬公次于滑滑公榖作郎左傳公次于滑將㑹鄭伯謀紀故也鄭伯辭以難乃旦反櫟厲公在故凡師一宿為舍再宿為信過信為次為經書次例也舍宿不書輕也言凡師通君臣杜氏曰滑鄭地在陳留襄邑縣西北榖梁傳次止也有畏也欲救紀而不能也胡傳春秋紀兵伐而書次以次為善救而書次以次為譏次于滑譏之也魯紀有婚姻之好于齊不共戴天苟能救紀抑齊兩善并矣見義不為而有畏也春秋之所惡也紀在魯東北滑在魯西南果欲救紀道不出于滑况莊公方幼唯齊是從豈暇謀紀左氏將㑹鄭伯之說殆意之耳是年正月溺㑹齊師伐衛謀納朔蓋仍以此事出耳四年春王二月夫人姜氏享齊侯于祝丘享公穀作饗榖梁傳饗甚矣杜氏曰祝丘魯地三月紀伯姬卒榖梁傳外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也范氏曰禮諸侯絶旁期姑姊妹女子子嫁於國君者尊與己同則變不服之例為之服大功孫氏曰伯姬𨼆二年紀裂繻所逆者內女嫁國君則服大功常事也此卒者為下紀侯去國齊葬伯姬起夏齊侯陳侯鄭伯遇于垂蘇子由謂鄭伯子儀也胡康侯謂鄭伯實厲公非子儀也按前年次于滑鄭伯辭以難杜預為厲公在櫟故則蘇說是矣春秋有一國而二君鄭突儀衛衎剽是也須在國者得主事紀侯大去其國大者紀侯之名齊滅不書而以紀去為文宗祀尚存也以大去為義皆鑿說也公羊復讐之說無稽害教致漢武窮兵胸奴援以為說公羊之得罪于聖經也大矣榖梁云大去者不遺一人之詞民之從之者四年而後畢也果若其言太王之遷岐未之過也紀區區者之有是也有是紀不亡矣程子云責在紀也非齊之罪也齊師未加而己去夫滅國者無罪而不爭而先去者有責則太王之去邠亦非矣蓋程子執死社稷之義然以􅈶入齊委曲存祀然後委而去之春秋詳書蓋亦原其情矣未見責其不死也胡氏謂聖人與其不爭而去而不與其去而不存是以太王望人人乎六月乙丑齊侯葬紀伯姬胡傳葬紀伯姬不稱齊人而目其君者見齊襄迫逐紀侯使之去國雖其夫人在殯而不及葬然後襄公之罪著矣或曰葬之禮也而以為著其罪何也戕魯君滅其婚姻之國而葬其女是猶加刃于人以手撫之也而可以為禮乎斥言齊侯惡其詐也存季似義葬伯姬似仁惡似而非者此也秋七月冬公及齊人狩于禚禚公穀作郜公羊傳公曷為與微者狩齊侯也讐者無時焉可通與讐狩甚矣按鄰國市援立之恩强公子伺圖嫡之釁當時之習為而不怪者也季友之祥慶父之材皆非人下同無齊援將不得立故康節經世書云齊殺桓公立其子同得其事之實矣如是而望其能讐齊得乎人蓋微者若是齊侯無緣不書也此即猗嗟之詩所為刺者莊公射則貫舞則選見夸於齊人而不能以禮防間其母人以為齊侯之子焉不惟不之讐出國與齊人狩直書而義自見也五年春王正月夏夫人姜氏如齊師秋郳黎來來朝郳公作倪黎左作犂左傳名未王命也杜氏曰附庸國也東海昌慮縣東北有郳城黎來名未受爵命為諸侯傳發附庸稱名例也其後數從齊桓以尊周室王命以為小邾子今能修朝禮故特書曰朝冬公㑹齊人宋人陳人蔡人伐衛左傳納惠公也桓十六年朔出奔齊書名已以王命絶之矣今魯與四國又黨有罪以納之榖梁謂是齊侯宋公也其曰人何也人諸侯所以人公也啖子謂若貶之而反書曰人則後人安知其齊侯宋公乎乃隱其惡而非貶矣此四國人與上狩禚齊人啖趙皆謂非其君也六年春王正月正月公榖作三月王人子突救衛書救始此榖梁傳善救衛也按王人微者而稱字尊王命也尊王命所以甚諸侯之惡也終春秋王旅之出而合司馬九伐之法者惟此耳救雖無功大義己正何休乃謂王遣貴子突卒不能救為天下笑故為王諱誤矣夏六月衛侯朔入于衛左傳夏衛侯入放公子黔牟于周放寧跪衛大夫于秦殺左公子泄右公子職乃即位胡傳入有二義一難詞一逆詞也朔藉諸侯之力連五國之師距王官之微者以復歸于衛其勢宜無難矣而書入者逆王命也秋公至自伐衛書至猶公至自唐之意螟冬齊人來歸衛俘俘公榖作寶俘軍所獲也公榖作寶所獲重器也朔之奔也齊侯容之其入也連諸侯納之故以寶賂齊而齊以分於三國焉故主齊言之左傳謂文姜請之也數出淫齊侯愧于其子若曰由姜之請多得衛寶以悅莊也以愚莊也七年春夫人姜氏㑹齊侯于防左傳齊志也杜氏曰防魯地文姜數㑹齊侯至齊地則姦發夫人至魯地則齊侯之志故傳略舉二端以言之夏四月辛卯夜恆星不見夜中星隕如雨辛卯夜穀夜作昔見音現隕于閔反公作霣凡隕字後同左傳恆星不見夜明也星隕如雨與雨偕也榖梁傳恆星者經星也日入至於星出謂之昔不見者可以見也公羊傳如雨者非雨也非雨則曷為謂之如雨不修春秋曰雨星不及地尺而復君子修之曰星隕如雨杜氏曰恆常也謂常見之星辛卯四月五日月光尚微蓋時無雲日光不以昏沒如而也夜半乃有雲星落而且雨其數多皆記異也啖氏曰星隕如雨為奔流者衆如雨之多自漢以來史籍頻有詩曰有女如雲李陵曰謀臣如雨皆言多爾左氏不達此理故說之鑿按星隕如雨語本易曉止緣左氏讀如為而故有與雨偕之說其誤可不必辨惟恆星不見終屬難明左氏以為夜明杜氏以為日光不以昏沒何得春秋以來歷代更不見有此異耶秋大水無麥苗杜氏曰周之秋今五月平地出水漂熟麥及五稼之苗劉氏曰左氏云不害嘉榖也無麥苗矣猶謂不害嘉榖妄也公羊傳曷為先言麥而後言苗一災不書待無麥然後書無苗何氏曰苗者何也生曰苗秀曰禾據是時苗微麥彊俱遇水災苗當先亡按榖梁云麥苗同時也謂麥與五稼之苗同為大水所漂而無收故書曰無麥苗據今之五月乃麥成之時而禾則始苗耳麥先苗後安得言待無麥然後書無苗哉冬夫人姜氏㑹齊侯于榖杜氏曰榖齊地濟北榖城縣今山東兖州府東阿縣治穀梁傳婦人不㑹㑹非正也葉氏曰夫人與齊侯八年而五相求自始孫于齊見一貶其後不復貶惡惡不再貶也汪氏曰齊詩南山載驅刺襄公而皆曰魯道有蕩不一言之聖人於春秋一則曰夫人姜氏㑹齊侯再則曰夫人姜氏㑹齊侯而於國惡無少諱焉其垂戒豈不逺哉張氏曰二年于禚書冬十有二月四年于祝丘書春王二月此猶書月也五年夏如齊師則書時矣七年于防書春于穀書冬則時而數矣八年春王正月師次于郎以俟陳人蔡人穀梁傳次止也俟待也公羊傳次不言俟此其言俟何託不得已也胡傳用大衆曰師次止也伐而次者有整兵慎戰之意其次善之也遂伐楚次于陘是也救而次者有緩師畏敵之意其次譏之也次于匡于聶北于雍榆是也俟而次者有無名妄動之意次于郎以俟陳人蔡人是也何俟乎陳蔡或曰陳蔡將過我俟而邀之也或曰魯將與陳蔡有事於鄰國而陳蔡不至故次于郎以待之也若是皆非義矣其曰次曰以俟者深貶之也杜氏預曰期共伐郕陳蔡不至故駐師于郎以待之甲午治兵左傳治兵于廟禮也公羊傳祠兵者何出曰祠兵入曰振旅其禮一也皆習戰也何言乎祠兵為久也曷為為久吾將以甲午之日然後祠兵于是榖梁傳出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣兵事以嚴終故曰善陳者不戰此之謂也善為國者不師善師者不陳善陳者不戰善戰者不死善死者不亡胡傳此治兵于郎也非善之也譏黷武也夏師及齊師圍郕郕降于齊師左傳仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德德乃降姑務修德以待時乎范氏曰郕同姓之國而與齊伐之是用師之過也湛氏曰莊公舍復仇之義而反同以伐郕宜郕人之不服也秋師還左傳君子是以善魯莊公榖梁傳還者事未畢也遁也崔氏曰厯三時而師還所以始終其事而見其惡冬十有一月齊無知弒其君諸兒左傳齊侯使連稱管至父皆齊大夫戍守也葵丘齊地臨淄縣有地名葵丘瓜時而往曰及瓜而代期音基戍公問命也不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適適太子襄公絀之二人連稱管至父因之以作亂連稱有從妹在公宫無寵使間公曰捷吾以女為夫人宣無知之言冬十二月齊侯游于姑棼遂田于貝丘姑棼貝丘皆齊地見大豕從者曰公子彭生也此與漢吕后見趙王如意為樂事同公怒曰彭生敢見射之豕人立而啼公懼隊直類反于車傷足喪屨反誅屨于徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入詐欲助賊伏公而出鬬死于門中石之紛如齊小臣死于階下亦鬬死遂入殺孟陽于牀孟陽亦小臣代公居牀怨今按三人可謂賢矣徒人費不懷誅屨之以死扞君尤賢也齊襄雖無道然為子死孝為臣死忠此出于天性民彛不容自已故以小臣徒人而著其節彼居崇據厚號卿大夫者平日從君于昏臨難又偷生苟免視此何如哉胡氏謂費等不以死節書乃皆便嬖私昵之臣逢君之惡田獵畢弋使百姓苦之者也夫不書自以微故爾胡自見三人逢君之惡乎曰非君也不類見公之足于户下遂弒之而立無知襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒鮑叔牙小白傅亂作管夷吾召忽皆子糾傅奉公子糾來奔來不書皆非卿也趙氏曰榖梁云大夫弒其君以國氏者嫌也弒而代之也按例不命之卿例不書氏既不書氏自然以名連國又曰莒近齊之小國而齊襄强而無道大夫如何輒敢將公子奔之而獲安乎榖梁以襄被弒二公子乃出奔此說為正九年春齊人弒無知左傳初公孫無知虐于雍廪齊大夫九年春雍廪殺無知公及齊大夫盟于蔇蔇其器反公穀作暨左傳齊無君也杜氏曰齊亂無君故大夫得敵于公蓋欲迎子糾也來者非一人故不稱名蔇魯地琅邪繒縣北有蔇亭趙氏曰納讐人之子屈禮而盟大夫故書公及大夫盟夏公伐齊納糾左作納子糾齊小白入于齊左傳公伐齊納子糾桓公自莒先入程子曰桓公子糾襄公之二子也桓兄而子糾弟襄公死則桓公當立春秋書桓公則曰齊小白言當有齊國也于子糾則止曰糾不言齊以不當有齊也不言子非君之嗣子也公榖并注四家皆書納糾左傳獨言子糾誤也然書齊人取子糾殺之者齊大夫嘗與魯盟于蔇既納糾以為君又殺之故書子是二罪也胡傳納者不受而强致之稱入者難詞襄公見殺糾與小白皆以庶子出奔而糾弟也又未嘗為世子按史稱周公誅管蔡以安周齊桓殺其弟以反國是糾幼而小白長其有齊宜矣宜則何以不稱公子內無所承上不禀命故以王法絶之也今按不稱公子說又見昭元年莒去疾下朱子曰程子以薄昭之言證桓公之為兄而荀卿嘗謂桓公殺兄以爭國其言固出于薄昭之前未可以此證其必然但以公榖春秋所書之文為據參以夫子答子路子貢之言斷之蓋聖人之于人功罪不相掩今但稱管仲之功而不言其罪則可見不死子糾之難無害于義而桓公子糾之長少亦從以明矣秋七月丁酉葬齊襄公八月庚申及齊師戰于乾時我師敗績乾音干左傳師及齊師戰于乾時我師敗績公喪戎路兵車傳乘乘他車而歸秦子梁子二子公御及戎右也以公旗辟音璧于下道以誤齊師是以皆止杜氏曰小白既定而公猶不退師歷時而戰戰遂大敗不稱公戰公敗諱之乾時齊地時水在樂安界岐流旱則竭涸故曰乾時趙氏曰內敗不書此書者納讐喪師以惡內也按莊公以千乘之國周公之𦙍不能及讎人之在一帥義旅問禮成不返之由以泄不共戴天之憤今讐幸惡盈貫其身殱賊手乃又以德報怨欲為之圖其後嗣毒衆勞民為讐人納其所不當立之子以致喪師身幾不免春秋諱之不足故明書以示譏也吳與楚戰吳子之所乘舟餘皇為楚所得其臣恥而欲死之今魯與齊戰一敗僅以身免今年之戰喪戎路僖公升陘之戰邾獲公胄縣諸魚門不聞魯人有恥而欲死之者甚矣魯之無人也胡氏謂內不言敗此其言敗者為與讎戰雖敗亦榮也夫敵怨不及其身而謂與讎戰無名喪師而謂敗亦榮其義迂矣又言按左氏公親在行不言公敗不為復讎舉事也使是時莊公不為納糾而以復讎舉事將問罪于何人乎九月齊人取子糾殺之左傳鮑叔帥師來言曰子糾親也請君討之鮑叔乘勝而進軍志在生得管仲故託不忍之辭管召讎也請受而甘心焉管仲射桓公故曰讐甘心言欲快意戮殺之乃殺子糾于生竇魯地召忽死之管仲請囚鮑叔受之及堂阜齊地而稅土活反之歸而以告曰管夷吾治于高徯齊卿高敬仲也言管仲治才過之使相可也公從之胡傳取者不義之辭前書納糾不稱子者明不當立也此書殺糾復稱子者明不當殺也或奪或豫於義各安春秋精意也糾雖爭立越在他國置而勿問可也必請于魯殺之然後快于心其不仁亦甚矣趙氏曰左氏謂魯殺子糾按論語云桓公殺公子糾則知齊自殺之非魯也冬浚洙洙音殊杜氏曰洙水在魯城北下合泗浚深之為齊備胡傳見勞民于守國之末務而不知本也十年春王正月公敗齊師于長勺勺上酌反左傳齊師伐我公將鼓之曹劌古衛反魯人曰未可齊師三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之杜氏曰長勺魯地胡傳齊師伐魯不書責魯也詐戰曰敗敗之者為主按此齊報九年納糾之役也乾時之戰我師敗績齊人取子糾殺之魯為齊弱而又負曲齊以直責而又乘勝是以師至于長勺深入魯地魯不能有辨諭之辭以服敵心又無制敵之長算以正取勝乃以詭道掩獲雖勝不貴矣故書公敗齊師于長勺而貶自見曹劌事恐非實二月公侵宋公羊傳曷為或言侵或言伐粗者曰侵精者曰伐戰不言伐圍不言戰入不言國滅不言入書其重者也汪氏曰趙氏駁三傳侵伐之說而謂稱罪致討曰伐無名行師曰侵然齊桓侵蔡劉文公侵楚豈可謂無名行師乎文定改之曰潛師掠境曰侵其義當矣詳見隱二年三月宋人遷宿此遷國之始穀梁傳遷亡詞也其不地宿不復見也遷者猶未失其國家以往者也杜氏曰宋强遷之而取其地故文異于邢遷夏六月齊師宋師次于郎公敗宋師于乘丘乘繩正反左傳齊師宋師次于郎公子偃魯大夫曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出雩門魯南城門蒙臯比虎皮而先犯之公從之大敗宋師于乘丘齊師乃還杜氏曰乘丘魯地陳氏曰書齊師宋師次于郎以志齊伯之難書楚子蔡侯次于厥貉以志楚伯之難於此可以知人心矣不苟於從齊是人心猶有周也不苟於從楚是人心猶有晉也有王者作天下往歸之矣秋九月荆敗蔡師于莘以蔡侯獻舞歸莘所巾反舞穀作武左傳蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使謂楚文王曰伐我吾求救于蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸榖梁傳荆者楚也何為謂之荆狄之也何為狄之聖人立必後至天子弱必先叛故曰荆狄之也蔡侯何以名獲也啖氏曰晉侯之獲何以不名乎故知其以失地故名耳按息媯事恐未實此年荆敗蔡師與十四年荆入蔡自是以夷夏消長之大勢而書蔡最近楚楚圖北方蔡必首受禍是時齊桓方圖伯未集而荆人之勢己如此矣左氏瑣瑣記一息媯之事假令其有亦豈足書哉杜氏曰荆楚本號後改楚莘蔡地冬十月齊師滅談談子奔莒此滅國之始左傳齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至冬齊師滅談談子奔莒啖氏曰凡滅國直書滅者罪來滅者也凡書滅又書其君奔者談子奔莒弦子奔黃之類則兩罪之且責其不死社稷也諸侯失地則名國滅而奔者何以不名既書其滅罪己昭矣緣隨敵人歸者書名以重其罪故奔者不名以示等差也凡書滅又書以歸及書名者罪重於奔者也既責其不死位又責其無興復之志也楚滅頓以頓子牂歸滅胡以胡子豹歸之類奔所以不名者位或未絶也以歸者則位必絶矣今按滅國之義啖氏詳盡桓文皆有反國而討不見禮之事蓋其既霸之後人為之傳㑹入而諸侯皆賀亦未應有此齊桓圖伯之初滅談滅遂降鄣遷陽專以威力虐小侮弱其後雖能存三亡國而功不足以掩罪矣春秋書荆敗蔡師于莘以蔡侯獻舞歸齊師滅談談子奔莒荆子所為齊亦為之不待貶絶而惡自見矣陳氏曰書滅始于此然則滅國自齊桓乎前乎此矣曷為以首亂罪齊春秋滅國三十六五伯為之也按五伯為之謂其自為則無以禁人自是接迹無忌耳杜氏曰談國在濟南平陵縣西南十有一年春王正月夏五月戊寅公敗宋師于鄑鄑子斯反左傳夏宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得雋曰克覆而敗之曰取某師京師敗曰王師敗績于某啖氏曰凡魯勝則曰敗某師榖梁云內不言戰舉其大者舉敗彼足知戰此說是也又曰左氏云未陳而薄之曰敗某師此說為外戰例則可通如內戰若是未陳則曰敗某師據魯敗外師凡八皆言敗某師豈是盡未陳乎杜氏曰鄑魯地秋宋大水左傳秋宋大水公使弔焉曰天作淫雨害于粢盛若之何不弔不為天所愍弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮言懼罪己名禮稱孤其庶乎李廉曰外災告則書弔則書左氏注是杜曰公使弔之故書公榖非公羊曰記災也外災不書此何以書及我也穀梁曰外災何以書王者之後也冬王姬歸于齊左傳冬齊侯來逆共姬杜氏曰魯主昏不書齊侯逆不見公按親迎常事得禮不書則不書齊侯逆實非以不見公矣前築王姬之館于外不見齊侯為在喪也今使實齊侯來迎無容不見陸氏曰公榖皆云志其過我也按書其歸為魯主婚耳榖梁他處即云為之中者歸之與此自相反矣胡傳按周制王姬嫁于諸侯車服不繫其夫下王后一等禮亦隆矣春秋書王姬下嫁曷為與列國之女同辭而不異乎曰陽唱而隂和夫先而婦從天理也雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉謂列侯尚公主使男事女夫屈于婦逆隂陽之位故王陽條奏世務以此為失而長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦使人倫悖于上風俗壞于下其流至于此然後知春秋書王姬侯女同詞而不異垂訓之義大矣十有二年春王三月紀叔姬歸于酅胡傳莊公四年紀侯去國至是紀侯方卒故叔姬歸于酅歸者順詞酅者宗廟所在歸奉其祀也魯為宗國婦人有來歸之義不歸于魯者所謂全節守義不以亡故虧婦道也夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧捷公作接冬十月宋萬出奔陳左傳乘丘之役公以金僕姑矢名射南宫長萬宋大夫公右歂市専反孫生搏之不書獲萬時未為卿宋人請之宋公靳之戲而相愧曰靳魯聼其得還曰始吾敬子今子魯囚也吾弗敬子矣病之十二年秋萬弒閔公于蒙澤宋地梁國有蒙縣遇仇牧于門批而殺之遇太宰督于東宫之西又殺之殺督不書宋不以告立子游宋公子羣公子奔蕭宋邑今沛國蕭縣公子御說奔亳宋邑蒙縣西北有亳城南宫牛萬之子猛獲其黨帥師圍亳冬十月蕭叔大心蕭大夫名及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公御說猛獲奔衛南宫萬奔陳宋人請猛獲于衛衛人欲勿與石祁子衛大夫曰不可天下之惡一也惡于宋而保于我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宫萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之按賊己討矣不書何也春秋書逆賊出奔一以責國人之失賊一以責鄰國之不當受也陳人始不以為賊而納之後又因以為利而始殺之故書萬出奔陳而不書陳人殺萬以見其不得為正討也十有三年春齊侯宋人陳人蔡人邾人㑹于北杏齊侯穀作齊人夏六月齊人滅遂秋七月冬公㑹齊侯盟于柯左傳㑹于北杏以平宋亂遂人不至齊人滅遂而戍之盟于柯始及齊平也胡傳春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚莊秦穆跡此而為之者也桓非受命之伯諸侯自相戴以為盟主故四國稱人以誅始亂正王法也齊侯稱爵其與之乎上無天子下無方伯有能㑹諸侯安中國則雖與之可也按此與晉文公初伯書曰晉侯齊師宋師秦師文意正同齊晉之稱爵皆始伯之辭非與之也桓之始事左氏不詳而詳具國語管子如作內政而寄軍令皆權謀也自是無特相㑹者矣仁山金氏曰按左氏於莊公之篇多缺無傳雖有不詳獨晉楚之事雖未見于經而傳獨詳焉然終春秋之傳晉楚事獨詳于諸國蓋其時晉之乘楚之檮杌與魯春秋並行故晉楚之事左氏得以參考備書之齊桓始霸左氏于其事獨略豈齊之史策有未備耶如北杏之㑹左氏以為平宋邵氏以為伐魯經世書曰齊㑹宋陳蔡邾之師伐魯三敗之取遂又㑹魯于柯遂復其侵地遂之滅左氏以為北杏之不至史記以為魯之獻邑世家曰齊桓公伐魯魯莊公請獻遂邑以平桓公許與魯柯而盟邵氏以為取魯之邑見上柯之盟史記公羊以為曹沫之劫也皆載曹沫劫盟反侵地事以愚論之遂在濟北必魯之附庸也齊未得魯必有來伐之師伐遂而卒滅之邑不言伐故知附庸也以威魯也是以魯忍而與齊平為柯之盟此其事實也故當從邵氏之說按外傳載桓公之言曰吾欲南伐何主管子對曰以魯為主反其侵地堂潛然則反諸侯之侵地乃桓公之素志定霸之本謀蓋欲以是結與國之心耳知此則知無曹沫劫盟之事矣王伯厚謂曹沫即曹劌觀其問戰諫觀社藹然儒者之言公羊乃有盟柯之事太史公遂以沫列刺客之首此乃戰國之風春秋初所未有也盟柯之事蓋游士之虛語而燕丹又欲襲而用之其遣荆軻是以齊桓待秦政又愚之甚者也杜氏曰北杏齊地遂國在濟北蛇音移丘縣東北柯今濟北東阿齊之阿邑猶祝柯今為祝阿趙氏曰按桓公未嘗侵魯地及盟後未嘗歸魯田且莊公與齊大讎襄公之時猶歡好不絶不應至桓公却生讎怨公羊之說非也附録左傳宋人背北杏之㑹十有四年春齊人陳人曹人伐宋左傳諸侯伐宋齊請師于周單伯㑹之取成于宋而還程子曰春秋之法將尊師衆曰某帥師將卑師衆曰某師將卑師少曰某人將尊師少曰某伐某齊自管仲為政莊十一年而後未嘗興大衆也其賦于諸侯亦寡矣終管仲之身四十年息養天下厚矣惟救邢稱師譏其次也至于秦晉使之不競而已不强致也是以其功卑而易成夏單伯㑹伐宋伐宋之役齊止用陳曹不煩逺兵然魯方從霸故齊雖不徴而魯自往㑹非既約而後期也公榖以為後㑹非㑹王臣之例成十六年秋書公㑹尹子十七年夏書公㑹尹子單子冬書公㑹單子定四年三月書公㑹劉子皆特見其為王臣今書單伯㑹伐宋而已則單伯為魯大夫明矣附録左傳鄭厲公自櫟侵鄭獲傅瑕鄭大夫與之盟傅瑕殺鄭子而納厲公鄭子莊四年稱伯㑹諸侯今見殺不稱君無諡者微弱臣子不以君禮成喪告諸侯厲公入遂殺傅瑕使謂原繁曰寡人出伯父無裏言納我之言寡人憾焉對曰臣無二心天之制也子儀在位而謀召君庸非二乎莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死秋七月荆入蔡左傳蔡哀侯為莘故繩譽也息媯以語楚子楚子滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋七月楚入蔡李廉曰蔡為周室宗盟之長近于楚而常受楚禍中國之力有不及焉故自北杏之後齊之盟㑹蔡不復與矣蔡之始録于經則㑹鄧以懼楚終録於經則遷州來以避楚楚之始見于經曰敗蔡終録於經曰圍蔡齊晉之伯其極盛則侵蔡以伐楚其極衰則㑹召陵以救蔡而不能終于柏舉之戰吳操中國之權又以蔡故焉原一蔡之始終而中國消長之形荆楚强弱之變皆可見矣經世書曰自是江漢之國皆服于楚冬單伯㑹齊侯宋公衛侯鄭伯于鄄單音善鄄音絹左傳宋服也杜氏曰鄄衛地東郡鄄城十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄左傳齊始霸也夏夫人姜氏如齊文姜不如齊八年矣至此復如齊桓公欲求魯好以定伯業而不之拒也自是不復如齊而再如莒蓋齊惡而絶之秋宋人齊人邾人伐郳郳五兮反公作兒郳即小邾齊為宋伐故宋序齊上鄭人侵宋左傳諸侯為宋伐郳鄭人間之而侵宋杜氏曰郳附庸屬宋而叛故為之伐宋主兵故序齊上按鄭不誠服齊背二鄄之㑹而侵宋桓公若能聲突篡奪之罪而廢之擇立莊公之子原繁曰莊公之子猶有八人豈不為伯業之光哉不此之顧二鄄之㑹既列諸同好及其反覆三國伐之又以宋故為詞其義淺矣冬十月十有六年春王正月夏宋人齊人衛人伐鄭左傳宋故也杜氏曰宋主兵也秋荆伐鄭南北爭鄭于是始左傳鄭伯自櫟入緩告于楚秋楚伐鄭及櫟按齊方圖伯楚亦浸强北侵不已陳蔡鄭許適當其衝而鄭尤要領之國中國得鄭則可以拒楚楚得鄭則可以窺中國故鄭者伯與楚之所必爭也自是鄭被兵于中國者三十有九于楚者二十春秋備書以見夷夏之盛衰焉冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男􅉸伯滕子同盟于幽公作公㑹許男下公穀有曹伯左傳冬同盟于幽鄭成也公羊傳同盟者何同欲也程子曰上無明王下無方伯列國交爭桓公始伯天下與之故書同盟志同欲也按杜氏云書㑹魯㑹之不書其人微者也此說非也諸侯皆序非微者明矣他時猶不敢以微者㑹公侯况斯舉乎又按趙氏曰不言公諱與讎同盟也此說無理敵惠敵怨不在後嗣况人方以尊天王安中國為名以合諸侯而吾欲拒之是逃義也非能讎也胡文定云不書公諱也惡失信也據十七年受鄭詹此只緣經文脫公字而轉生說耳公羊本有公字從公羊為是杜氏曰陳國小每盟㑹皆在衛下齊桓始伯楚亦始强陳侯介于二大國之間而為三恪之客故齊桓因而進之遂班在衛上終於春秋滑國都費河南緱氏縣幽宋地邾子克卒榖梁傳其曰子進之也范氏曰附齊而尊王室王命進其爵杜氏曰克儀父名稱子者蓋齊桓請王命以為諸侯趙氏以儀父與克為二人見隱六年附録左傳王使虢公命曲沃伯以一軍為晉侯按此左氏之特筆也而不見于春秋是時晉未與諸侯之㑹盟魯史所無則春秋不得而書也然夫子删詩于唐風無衣見之王命大夫為諸侯自此始十有七年春齊人執鄭詹詹公作瞻下同左傳鄭不朝也胡傳書齊人執惡齊也鄭既侵宋又不朝齊詹為執政見執宜矣惡齊何也以責人之心責己則盡道以愛己之心愛人則盡仁此春秋之意也趙氏曰左氏云鄭不朝也若以國事見執據例當稱行人李廉曰鄭詹左氏說是公榖皆以詹為佞人此無據之言夏齊人殱于遂殱子廉反公作瀐左傳遂因氏頜烏納反又苦答反氏工婁氏須遂氏四族遂之强宗饗齊戍醉而殺之齊人殱焉秋鄭詹自齊逃來杜氏曰詹不能仗節守死以解國患而遁逃苟免書逃以賤之冬多麋亡悲反杜氏曰麋多則害五稼故以災書十有八年春王三月日有食之榖梁傳不言日不言朔夜食也何以知其夜食曰王者朝日范氏曰天子𤣥冕而朝日于東門之外故始出而有虧傷之處是以知其夜食也家氏曰夜食者必在丑寅之間故晨興而猶見夏公追戎于濟西杜氏曰戎來侵魯魯人不知去乃追之秋有􅈮􅈮又作蜮音或榖梁傳一有一亡曰有􅈮射人者也一有一亡言不常也故書曰有含沙射人此物生揚粵乃魯之所無而今有之故曰有上十七年麋魯之常獸是嵗偏多若螟螽之類則在所生之又微細之物不可以數言故不言有不言多沙隨春秋例目云有蜮或考𨽻古春秋作有蜮爾雅食葉蜮音特冬十月書以備四時之終十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶必以姪娣從之者欲使一人有子二人喜也所以防嫉妬令重繼嗣也媵不書此何以書為其有遂事書大夫無遂事此其言遂何聘禮大夫受命不受辭出竟有可以安社稷利國家者則専之可也杜氏曰公子結魯大夫公羊榖梁皆以為魯女媵陳侯之婦其稱陳人之婦未入國略言也大夫出竟有可以安社稷利國家者則専之可也結在鄄聞齊宋有㑹權事之宜去其本職遂與二君為盟故備書之程子曰鄄之巨室嫁女于陳人結以其庶女媵之因與齊宋盟罪其為媵而往盟為遂事夫人姜氏如莒冬齊人宋人陳人伐我西鄙襄陵許氏曰公之事齊後于諸侯又受鄭詹未討齊宋在鄄將以陳人伐我而結知之故權國重而與之盟示先下之以禮齊宋以公子之盟未足以結成也故卒來伐而取服焉愚按此說近諸家多謂齊宋怒結因媵事遂盟伯主而來伐若止怒結之不恭不受其盟足矣伐我者必其素謀耳二十年春王二月夫人姜氏如莒附録左傳初王姚莊王之妾嬖于莊王生子頽有寵蒍國周大夫為之師及惠王莊王孫即位取蒍國之圃以為囿邊伯周大夫之宫近於王宫王取之王奪子禽祝跪與詹父田三子周大夫而收膳夫之秩膳夫石速也秩祿也故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏蘇氏周大夫桓王奪其十二邑以與鄭十九年秋五大夫奉子頽以伐王石速士也故不在五大夫之數不克出奔溫蘇氏邑蘇子奉子頽以奔衛衛師燕師伐周燕南燕冬立子頽二十年春鄭伯和王室不克執燕仲父燕仲父南燕伯為伐周故夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于塢塢王所取鄭邑遂入成周取其寶器而還冬鄭伯見虢叔曰子頽奸王之位盍納王乎虢公曰寡人之願也為明年胥命起夏齊大災杜氏曰來告以大故書天火曰災啖氏曰公羊云大災何大瘠也按災天火也大之者其災大也若以大災為大瘠新宫災亦是新宫瘠乎秋七月冬齊人伐戎戎穀作我張洽曰戎在徐州之域最近齊魯故先治之家氏曰周有子頽之亂齊桓為伯主若罔聞知鄭伯虢公胥命于弭以兵討亂殺子頽王入於王城齊亦不能預也齊桓之失于為義也多矣二十有一年春王正月夏五月辛酉鄭伯突卒左傳二十一年春胥命于弭鄭國以納王相命弭鄭地夏同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫五月鄭厲公卒秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公金氏曰突與忽爭國忽正而突不正然突得稱鄭伯卒葬皆書于春秋蓋終有王室之功也功罪自不相掩春秋其為諸侯之無王假鄭以示訓乎二十有二年春王正月肆大眚眚所景反公作省杜氏曰赦有罪也啖氏曰肆者放也眚者過也如今之赦爾公羊云忌省有何義乎何休謂子卯日為省日時魯有夫人喪忌省日不哭省日本以忌吉事不以忌凶事按赦古有之原小過耳大眚亦肆則有罪皆赦矣書譏惠奸也癸丑葬我小君文姜按周人以諱事神名終將諱之故易之以諡末世滋濫諡不應實爰及婦人婦人無外行於禮當繫夫之諡取其夫諡冠于姓之上詩稱莊姜宣姜共姜春秋宋共姬即其義也婦人法無諡也生以夫國冠之韓姞秦姬是也死以夫諡冠之莊姜定姒是也定姒哀公妾母繫夫諡者也若襄公妾母定姒則别諡也末世别為作諡如景王未崩妻稱穆后皆非禮也魯文姜弒逆淫亂之人得罪宗廟國人之所不容今不誅而死縱以子母之故不忍棄絶葬之足矣又别為之諡曰文而不復繫於桓公可乎自是魯國從而效尤哀姜成風聲姜敬嬴齊姜穆姜齊歸皆别立諡不復繫於夫且妾母當之不正益甚矣陳人殺其公子御寇御音遇公穀作禦左傳春陳人殺其太子御寇陳公子完奔齊齊侯使敬仲即公子完為卿辭使為工正按據左氏御寇太子也而經書公子杜云陳人惡殺太子之名故以國討公子告非也苟殺太子而赴以公子聖人安得不改而正之邪胡傳公子之重視大夫殺而或稱君或稱國或稱人何也稱君者獨出于其君之意而大夫國人有不與焉如晉侯殺其世子申生之類是也稱國者出於君大夫而不請於天子如鄭殺其大夫申侯之類是也稱人者有二義其一國亂無政衆人擅殺而不出于其君則稱人如陳人殺其公子御寇之類是也其一弒君之賊人人所得討背叛之臣國人所同惡則稱人如衛人殺州吁鄭人殺良霄之類是也考於傳之所載以觀經之所斷則罪之輕重見矣夏五月按春秋未有以五月首時者蓋下有脫事不然則四訛為五也秋七月丙申及齊高傒盟于防傒音奚公羊傳齊高傒者何貴大夫也曷為就吾微者而盟公也公則曷為不言公諱與大夫盟也趙氏曰盟不自內皆指公也明書高傒見其伉敵之罪也冬公如齊納幣公羊傳納幣不書此何以書譏何譏爾親納幣非禮也榖梁傳納幣大夫之事也何氏曰納幣即納徴納徴禮曰主人受幣士受儷皮是也禮言納徴春秋言納幣者春秋質也凡婚禮皆用鴈取其知時候唯納徴用𤣥纁束帛儷皮𤣥纁取其順天地也儷皮鹿皮重古也儷兩也范氏曰公母喪未再朞而圖婚傳無譏文但譏親納幣者喪婚不待貶絶而罪惡見趙氏曰婚禮有六春秋獨書其二逆女即親迎也納幣即納徵也以納幣方契成逆女為事終舉重之義也程子曰齊疑婚議故公自行納幣後一年逆齊難之也二十有三年春公至自齊公羊傳桓之盟不日其㑹不致信之也此何以致危之也何危爾公一陳他也趙氏曰凡公行及告廟則書公羊云桓㑹不致有何義乎祭叔來聘榖梁傳其不言使何也天子之內臣也不正其外交故不與使也陸氏曰不言使者原其來意非天子之命爾非謂責其外交則去使字也胡傳祭仲來朝而不言朝祭叔來聘而不言使尹氏王子虎劉卷來訃而不書其爵秩皆所以正人臣私交之非也祭采地叔字啖氏曰私行假言聘故不言王使以譏之按聘非自行之禮今曰祭叔來聘則知私行假言王聘矣夏公如齊觀社左傳非禮也曹劌諫曰不可君舉必書書而不法後嗣何觀按社者諸侯祭其土示之常事未聞鄰國之君往觀之者如齊觀社此何禮哉按襄二十四年齊社搜軍實使客觀之蓋齊俗每因祭社則搜軍實因以聚人而為觀游也如後世里社賽祭陳百戲之意故外傳載曹劌之言曰齊棄太公之法而觀民於社君為是舉而往觀之非故業也天子祀上帝諸侯為之受命焉諸侯祀先公卿大夫佐之受事焉不聞諸侯之相㑹祀也君舉必書書而不法後嗣何觀內外傳之言有足相發者程子曰婚議尚疑故公以觀社為名再往請附録左傳晉桓莊之族逼桓叔莊伯之子孫獻公患之士蒍晉大夫曰去富子富子二族之富强者則羣公子可謀也己公曰爾試其事士蒍與羣公子謀譖富子而去之以罪狀誣之同族惡其富强故士蒍得因而間之用其所親為譖則似信離其骨肉則黨弱公至自齊荆人來聘楚交中國始此胡傳荆自莊公十年始見于經十四年入蔡十六年伐鄭皆以州舉者惡其猾夏不恭故狄之也至是來聘遂稱人者嘉其慕義自通故進之也杜氏曰不書荆子使某來聘君臣同詞者蓋楚之始通未成其禮啖氏曰若言荆來聘則似舉州皆來故加人字以成文耳無他義也按僖十八年邢人狄人伐衛狄稱人亦豈進之而書人邪蠻荆之情每假禮以行其詐故今年聘魯二十八年伐鄭矣蠻荆之日近中國之憂也果有慕義之心固當不拒若其懷詐窺覘豈可不備書荆人來聘謹之也繼書楚子使椒楚子使薳罷彼浸浸乎中國之物章矣則亦實録之矣非漸進之也使彼漸染于中國之禮義聖人從而漸進之可也其文則華夏矣其俗則故也春秋所謹而憂也烏在其進之以漸邪荆楚本號後改曰楚非州名公及齊侯遇于榖蕭叔朝公杜氏曰蕭附庸國叔名就榖朝公故不言來凡在外朝則禮不得具嘉禮不野合劉氏曰為禮非其時猶非其禮也為禮非其處猶非其禮也為禮非其義猶非其禮也九月郊五月蒸此之謂非其時蕭叔朝此之謂非其處祭叔來聘齊侯來獻捷此之謂非其義雖有肅敬之心繁飾之容而君子不受也故禮非其禮而猶不受必歸之正而止又况乎未始有正者乎秋丹桓宫楹榖梁傳禮天子諸侯黝堊黑色大夫倉士黈他苟反黃色也又張斗反丹楹非禮也楹柱也何氏曰為將娶齊女欲以夸大示之冬十有一月曹伯射姑卒射音亦十有二月甲寅公㑹齊侯盟于扈音戶杜氏曰扈鄭地在滎陽卷音權縣西北孫氏曰扈齊地胡傳莊公生於桓公之六年至是生三十有六年矣以世嫡之正諸侯之貴尚無內主同任社稷之事蓋制於文姜使必娶於母家此於傳無明文孫明復陳君舉有此說或又舉漢吕后使惠帝娶魯元公主女為證而齊女待年未及故莊公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也二十有四年春王三月刻桓宫桷左傳春刻其桷皆非禮也并非丹楹故言皆御孫魯大夫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎榖梁傳禮天子之桷音角榱也方曰桷圖曰椽斫之礱之加密石焉以細石磨之諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也刻桓宫桷丹桓宫楹斥言桓宫以惡莊也范氏曰以桓見殺于齊而飾其宗廟以榮讎國之女惡莊不子葬曹莊公夏公如齊逆女榖梁傳親迎恆事也不志此其志何也不正其親迎于齊也秋公至自齊榖梁傳迎者行見諸舍見諸諸之也言瞻望夫人乘車先至非正也八月丁丑夫人姜氏入公羊傳其言入何難也其言日何難也其難奈何夫人不僂不可使入與公有所約然後入僂疾也夫人稽留不肯疾順公不可使即入約約逺媵妾也杜氏曰公羊傳以為姜氏要公不與公俱至蓋以孟任故丁丑入而明日乃朝廟榖梁傳入者內弗受也日入惡入者也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人子弟以薦進也舍置也於前其義不可受也按榖梁宗廟弗受之義甚精戊寅大夫宗婦覿用幣左傳公使宗婦覿用幣非禮也杜氏曰宗婦同姓大夫之婦禮小君至大夫執贄以見明臣子之道莊公欲奢夸夫人故使大夫宗婦同贄俱見傳不言大夫唯舉非常御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛小栗栗棗修脯以告䖍敬也也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎公羊傳宗婦如何大夫之妻也用者何用者不宜用也見用幣非禮也然則曷用棗栗云乎腶修云乎榖梁傳覿見也禮大夫不見夫人劉氏曰不見謂其常耳夫人始至而大夫見于廟禮也何得非乎不言及不正其行婦道故列數之也男子之贄羔鴈雉腒腒其居反鳥臘曰腒婦人之贄棗栗腵修腵丁亂反脯也腵而加薑桂曰修用幣非禮也用者不宜用者也大夫國體也謂為君股肱而行婦道惡之故謹而日之也附録左傳晉士蒍又與羣公子謀使殺游氏之二子亦桓莊之族士蒍告晉侯曰可矣不過二年君必無患大水冬戎侵曹曹羈出奔陳赤歸于曹胡傳杜預謂羈蓋曹世子也曹伯己葬猶不稱爵者以微弱不能君故為戎所逐耳赤者曹之庶公子歸易詞也陳氏曰君在喪稱子其曰曹羈不能為子也侵淺事也以千乘之國不能守不可以言子矣然奔君未有言故者言故猶愈於自奔也按戎而専制諸夏廢置人君亦以病齊桓也陸氏曰曹羈者義同鄭忽公羊云是曹大夫非也郭公闕文二十有五年春陳侯使女叔來聘女音汝之此諸侯交聘始左傳始結陳好也榖梁傳其不名何也天子之命大夫也杜氏曰女氏叔字季友相魯原仲相陳二人有舊故女叔來聘季友冬亦報聘夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社胡傳按禮諸侯旅見天子入門不得終禮者四而日食與焉古者固以是為大變人君所當恐懼修省以答天意而不敢忽也然則鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣伯姬歸于杞榖梁傳其不言逆何也逆之道微無足道言爾胡傳不言逆逆者非卿書歸者以别於大夫之自逆者也自逆者若莒慶齊高固是也秋大水鼓用牲于社于門左傳秋大水鼓用牲于社于門亦非常也失常禮凡天災有幣無牲非日月之眚不鼓杜氏曰門國門附録左傳晉士蒍使羣公子盡殺游氏之族乃城聚晉邑而處之冬晉侯圍聚盡殺羣公子二十有六年春公伐戎公無春字附録左傳春晉士蒍為大司空夏士蒍城絳以深其宫夏公至自伐戎張氏曰莊公治國家之政多闕而勞師于戎雖能復怨何益于內治乎踰時書至危之也曹殺其大夫此専殺大夫之始胡傳稱國以殺者國君大夫與謀其事不請于天子而擅殺之也義繫于殺則止書其官曹殺其大夫宋人殺其大夫是也義繫于人則兼書其名氏楚殺其大夫得臣陳殺其大夫泄冶之類是也羈出赤歸之際必有不附于赤者故殺之耳秋公㑹宋人齊人伐徐杜氏曰徐國在下邳􅥧縣張氏曰嬴姓國近齊魯胡傳不致者役不淹時而齊人同㑹則無危殆之憂矣冬十有二月癸亥朔日有食之二十有七年春公㑹把伯姬于洮左傳非事也天子非展義不巡狩天子巡狩所以宣布德義諸侯非民事不舉卿非君命不越竟杜氏曰洮魯地胡傳伯姬莊公之女非事而特㑹愛其女之過而不能節之以禮戴氏曰夫人㑹諸侯古無是事也文姜數㑹齊侯不以為異把伯姬踵而行之夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽左傳陳鄭服也榖梁傳同者有同也同尊周也於是而後授之諸侯也天子討而不伐諸侯伐而不討五伯者摟諸侯以伐諸侯者也則謂授之諸侯者非也諸侯豈桓公所得有哉其授之諸侯何也齊侯得衆也桓㑹不致安之也桓盟不日信之也信其信仁其仁衣裳之㑹十有一未嘗有㰱血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也李廉曰衣裳兵車本只穀梁一家之說陸氏深所不取啖氏曰凡同盟者謂其盟辭同也若言大而侵小爾無我詐齊人出師魯以兵革從如此之類彼此之辭非同盟也若言同奬王室之類載書之內衆國共其信誓無彼此之異乃同盟也趙氏曰公羊云同盟者同欲也豫謂小國被制而至豈皆同欲榖梁云同尊周也同外楚也且盟㑹之辭固當云同救災恤患及勸善正惡等辭豈止尊周外楚一辭而已故知啖氏說同盟之理當矣秋公子友如陳葬原仲左傳非禮也原仲季友之舊也啖氏曰陳原仲之葬書者見季友私事出竟也按直書公子友如陳葬原仲不待貶而義自見者也胡氏謂通季子之私行而無貶者乃春秋端本之意謂王臣私交乃始亂而末流至于大夫交政於中國恐非經本㫖劉氏曰公羊云何通乎季子之私行避內難也非也是時內難未作何避之有若季子見幾逺舉是忘宗國之亂也况去莊公沒尚數年而遂云避內難乎冬把伯姬來左傳歸寧也問父母寧否凡諸侯之女歸寧曰來出曰來歸歸不反之詞夫人歸寧曰如某出曰歸于某胡傳禮父母在嵗一歸寧若歸而合禮則常事不書其曰杞伯姬來者不當來也春㑹于洮冬又來魯故知其不當來也來而必書春秋於男女往來之際嚴矣按夫人歸寧說見總例左氏說未是莒慶來逆叔姬胡傅莒慶莒大夫也叔姬莊公女也何以稱字大夫自逆則稱字為其君逆則稱女尊卑之别也何以書諸侯嫁女於大夫而公自主之非禮也杞伯來朝把姒姓夏禹之裔或稱伯或稱子義見滕子諸家謂王者之後本稱公因貶絀而稱伯稱子此恐未然又見僖公二十三年李廉曰切嘗考之周封三恪微子以三仁之賢得統承先王修其禮物故其命之曰庸建爾于上公尹兹東夏杞雖王者之後然東樓公本無大功德豈遽錫以公侯之上爵乎附録左傳王使召伯廖力雕反王卿士賜齊侯命賜命為侯伯且請伐衛以其立子頽也在十九年公㑹齊侯于城濮杜氏曰城濮衛地將討衛也汪氏曰魯兵不與伐衛者亦猶魯濟謀伐戎而魯不與伐戎也二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績左傳齊侯伐衛戰敗衛師數之以王命取賂而還胡傳春秋紀兵及者為主齊人伐衛則其以衛及之何也齊人奉王命討衛立子頽之罪衛不徴詞請罪而上逆王命下拒方伯之師直與交戰則是衛人為志乎此戰故以衛主之也戰不言伐伐不言日而書日者戰之日也見齊人奉辭伐罪方以是日至而衛人不謀其故直以是日與之戰所以深疾之也齊稱人將卑師少也按衛立子頽其罪固不容誅然己越十年而衛君己易世矣當其時桓公方圖伯事不能聲罪致討及鄭伯納王王來錫命使討而後行雖曰己晚然奉王命以從事必使衛服其罪請歸司寇斯得為伯討矣乃姑取應文數以王命取賂而還是何異于春秋之季趙盾諸人之為乎考之去年同盟於幽衛己不至桓公無亦本有怒衛之心因假王命以伐之夫非誠以從王非正乎伯討則衛之不服敢抗伯主而與之戰其罪亦當有分其亦不待貶絶而惡自見矣附録左傳晉獻公娶於賈姬姓國無子蒸於齊姜武公妾生秦穆夫人及太子申生又娶二女于戎大戎狐姬生重耳大戎唐叔子孫别在戎狄者晉語云狐氏出自唐叔狐伯行之子實生重耳小戎子生夷吾小戎允姓之戎子女也晉伐驪戎驪戎男女以驪姬驪戎在京兆新豐縣其君姬姓其爵男也納女于人曰女歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五姓梁名五在閨闥之外者東關嬖五别在關塞者亦名五皆大夫為獻公所嬖幸視聽外事使言于公曰曲沃君之宗也曲沃桓叔所封先君宗廟所在蒲今平陽蒲子縣與二屈今平陽北屈縣君之疆也不可以無主宗邑無主則民不威疆埸無主則啓戎心若使大子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌章也君伐功也晉侯說之夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙邊邑唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦二耜相耦廣一尺共起一伐言二人俱共墾傷晉室若此夏四月丁未邾子瑣卒瑣素果反瑣在位十二年子籧篨嗣是為文公秋荆伐鄭公㑹齊人宋人救鄭榖梁傳荆者楚也其曰荆州舉之也州舉之者狄之也程子曰齊桓伯主魯望國宋王者之後此救鄭制楚之始蓋天下大勢所在胡傳書救鄭善之也齊宋稱人將卑師少桓公主兵攘夷狄安中國之事見矣朱子曰齊桓晉文所以有功於王室者當時楚最强大時復加兵於鄭鄭則在王畿之內楚在春秋時他國皆不及其强向非桓文有以遏之則周室為其所并矣按左傳所載楚令尹子元欲蠱文夫人之事不可信夷夏大故經文自有本末左氏多采雜說以附其間殊汨亂經意冬築郿忘悲反公穀作微杜氏曰郿魯下邑郿公榖作微王氏曰帝乙子封於微東平夀張縣西北有微子鄉按左氏云邑曰築都曰城非也邑都相較無幾而城築殊名可乎凡土功大曰城小曰築完舊曰城新創曰築築郿所以志者不視嵗之豐凶而輕用民力冬雖用民力之時而下書大無麥禾則時屈可知矣大無麥禾杜氏曰書于冬者五穀畢入計食不足而後書也孔氏曰麥熟在夏禾成在秋而書於冬者計食不足而後總書之此年不言水旱而得無麥禾者服䖍曰隂陽不和土氣不養故禾麥不成也啖氏曰公羊云曷為先言築微而後言無麥禾諱以凶年造邑也按築微冬之初也無麥禾嵗終諸榖皆入無此二榖乃書依先後記事耳何關諱乎董仲舒曰春秋於它榖不書至無麥禾則書之以此見聖人於五榖最重麥與禾也臧孫辰告糴于齊公羊傳何以不稱使以為臧孫辰之私行也君子之為國也必有三年之委一年不熟告糴譏也榖梁傳國無九年之畜曰不足無六年之畜曰急無三年之畜曰國非其國也古者稅什一豐年補敗敗謂凶年不外求而上下皆足也雖纍凶年民弗病也一年不艾麇信云艾穫也而百姓飢君子非之按外傳魯饑臧文仲言于公曰國病矣請糴于齊公曰誰使對曰國有饑饉卿出告糴古之制也辰也備卿請如齊公使往則臧孫實以公命行謂諱之以為臧孫之私行者非也其書之意則公榖之所言者是矣左氏云禮也則不知春秋非以為得禮而書也榖梁云諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言內之無外交也不知此若不告彼何由知乎二十有九年春新延廄左傳書不時也凡馬日中而出日中而入日中春秋分也治廄當以秋分因馬向入而修之今以春作故曰不時啖氏曰馬雖出入有時廄何妨農隙修之公羊傳新延廄者何修舊也繕故曰新有所增益曰作始造曰築修舊不書此何以書譏何譏爾凶年不修榖梁傳延廄者何法廄也其言新有故也言改故而新之有故則何為書也古之君人者必時視民之所勤民勤于力則功築罕民勤于財則貢賦少民勤于食則百事廢矣冬築微春新延廄以其用民力為己悉矣夏鄭人侵許凡侵例見隱二年張氏曰許鄭世讎也然許自盟幽之後不與齊桓之㑹鄭人侵之或齊之命與自後許始從中國秋有蜚蜚扶味反左傳為災也凡物不為災不書公羊傳何以書記異也劉歆曰負蠜性不食榖食穀為災介蟲之孽劉向曰蜚色青非中國所有南越盛暑男女同川澤淫風所生為蟲臭惡是時莊公取齊淫女為夫人既入淫于兩叔故蜚至天戒以為將生臭惡聞於四方也新安羅氏曰負蠜今謂之蜚盤蟲好以清旦集稻上食稻花田家率以蚤作掇去之日出則散去既食稻花又其氣臭惡能熯稻使不蕃春秋書之當由此耳啖氏曰左氏云凡物不為災不書春秋記異多矣何必為災乃書爾雅蜚蠦蜰郭璞注蜰即負盤臭蟲劉歆以為負蠜誤矣江休復雜志唐彥猷有舊本山海經說蜚處淵則涸行木則枯疑春秋所書即此物若是負礬不當云有謂之多可也冬十有二月紀叔姬卒杜氏曰紀國雖滅叔姬執節守義故繫之紀賢而録之城諸及防左傳書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢杜氏曰諸防皆皆邑傳例曰書時也諸非備難而興作傳皆重云時以釋之他皆放此諸今城陽縣釋例曰都邑者人之聚也國家之藩衛百姓之保障不固則敗不修則壞故雖不臨寇必于農隙備其守禦無妨民務傳曰龍見而畢務戒事也謂夏之九月周之十一月龍星角亢晨見東方於是納其禾稼三務始畢而戒民于土功事也火見而致用大火星次角亢而晨見於是致其用也致築作之物水昏正而栽謂夏之十月定星昏而中于是樹板幹而興作焉五行北方水為北方之宿為水星言水昏正者夜之初昏水星有正中者耳非北方宿皆中也日至而畢謂日既南至微陽始動故土功息榖梁傳可城也以大及小也啖氏曰此但以先後次第何必大小乎范氏曰傳列凡城之志皆譏此之可城者得土功之節則譏之淺失土功之時則責之深不謂作城無譏也春秋重民力亟興土功不繫乎時與不時皆貶也築郿告糴新延廄城諸及防不已亟乎三十年春王正月夏師次于成左無師字張氏曰當從公穀書師榖梁傳次止也有畏也欲救鄣而不能也不言公恥不能救鄣也趙氏曰據齊霸己成魯為之弱何敢議救蓋欲㑹齊圍鄣至成待命聞鄣己降故不行耳然疑事勿質闕之可也成魯地附録左傳楚公子元歸自伐鄭而處王宫秋申公鬬班殺子元申楚縣楚僭號縣尹皆稱公鬭榖奴走反於音烏莵音徒為令尹自毁其家以紓楚國之難秋七月齊人降鄣降户江反鄣音章杜氏曰鄣紀附庸國東平無鹽縣東北有鄣城小國孤危不能自固蓋齊遙以兵威脅使降附公羊曰鄣者何紀之遺邑也啖氏曰紀之全國猶不敢敵齊豈有一邑之民而能二十餘年獨拒齊乎故鄣自是小國耳八月癸亥葬紀叔姬杜氏曰以賢録也無臣子故不諡九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟子禮反左傳冬遇于魯濟謀山戎也以其病燕故也杜氏曰濟水歷齊魯界在齊界為齊濟在魯界為魯濟蓋魯地汪氏曰齊侯入魯境則齊侯之意也齊人伐山戎陸氏曰公榖皆云此齊侯也貶而稱人按例無有諸侯自伐改為人者趙子曰二傳不知謬文之義妄穿鑿耳啖子曰蓋齊侯謬文耳說見明年榖梁傳桓內無因國外無從諸侯越千里之險北伐山戎善之也何善乎爾燕周之分子也貢職不至山戎為之伐矣按言由山戎病燕使不能通職貢于周故伐之桓公此舉多以勤逺略為譏然此時桓事新集楚勢方張豈興得己之師據史記山戎伐燕燕告急于齊則不得不救然春秋不以救書而下書獻戎捷則齊侯之志實在逺略宰孔己知之矣杜氏曰燕國今薊縣三十有一年春築臺于郎杜氏曰刺奢且非土功之時徐氏曰郎泉臺也未成為郎臺既成為泉臺何氏曰禮天子有靈臺以候天地諸侯有時臺以候四時動而無益于民者雖樂不為也孫氏曰莊比年興作又一嵗而三築臺妨農害民甚矣夏四月薛伯卒築臺于薜公羊傳譏逺也杜氏曰薛魯地何氏曰禮諸侯之觀不過郊六月齊侯來獻戎捷左傳非禮也凡諸侯有四夷之功則獻于王王以警於夷中國則否諸侯不相遺俘雖夷狄俘猶不以相遺趙氏曰據齊未霸之時尚不曾朝魯今既為霸主豈肯自獻戎捷乎必無此理但文誤爾二傳皆言齊侯親伐山戎又僖九年葵丘之㑹宰孔曰齊侯不務德而勤逺略故北伐山戎南伐楚西為此㑹皆論齊侯親行之事則知去年伐山戎當書齊侯今獻戎捷當書齊人交互致誤爾榖梁云軍得曰捷戎菽也齊桓分戎菽與諸侯不近人情又捷者軍得而安知是菽乎公羊傳齊大國也曷為親來獻戎捷威我也旗獲而過我也旗獲建旗縣所獲今按齊魯方睦何威我之有旗獲過我又妄說也秋築臺于秦范氏曰秦魯地杜氏曰東平范縣西北有秦亭冬不雨程子曰一嵗三築臺明年城小榖故冬書不雨閔之也三十有二年春城小榖范氏曰小榖魯邑泰山孫氏曰曲阜西北有小榖城五峯胡氏曰孫魯人也考此詳矣惟左傳曰為管仲也杜氏謂公感齊桓之德故為管仲城私邑小榖者濟北榖城縣也中有管仲井不繫之齊者大都以名通則不繫國也按昭十一年楚申無宇言齊桓公城榖而置管仲焉杜預蓋附此而為說然經文自云城小榖未嘗云城榖何以知小榖之為榖城邪齊自有榖如文十七年公及齊侯盟榖宣十四年歸父㑹榖皆濟北之榖也此城小榖自是魯之小榖耳何與于齊邪孫氏曰去年三築臺冬不雨今春又城小榖荐饑而輕用民力此其所以書也夏宋公齊侯遇于梁丘左傳齊侯為楚伐鄭之故請㑹于諸侯宋公請先見于齊侯夏遇于梁丘趙氏曰按荆伐鄭經今五年豈有許時方報之乎杜氏曰齊善宋之請見故進其班趙氏曰假令鄭先見亦得在上乎杜氏曰梁丘在高平昌邑縣西南今按穀梁謂梁丘在曹邾之間去齊百里恐未是又曰非不能從諸侯而往也辭所遇遇所不遇大齊桓也並無稽之說汪氏曰盟㑹之序主㑹者居上若遇則以簡禮相見比于不期而遇者莫適為主故以爵之尊卑為序爵同則以國之大小為序耳秋七月癸巳公子牙卒左傳初公築臺臨黨氏魯大夫見孟任黨氏女從之言欲與通也閟不從公而以夫人言許之許以為夫人而曰以夫人言許之者後不果如盟姑為是言割臂盟公生子般音班焉雩祭天也講肄也于梁氏魯大夫女公子子般妹觀之圉人犖力角反掌養馬者自牆外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門稷門魯城門投蓋于稷門未詳公疾問後于叔牙對曰慶父材慶父牙同母兄問於季友傳曰季友文姜之愛子與公同生對曰臣以死奉般公曰鄉者牙曰慶父材成季季友使以君命命僖叔待于針巫氏魯大夫使針季鴆之曰飲此則有後于魯國不然死且無後飲之歸及逵泉而卒立叔孫氏逵泉魯地不以罪誅故得立後世其祿公羊傳何以不稱弟殺也殺則曷為不言刺為季子諱殺也曷為為季子諱殺季子之遏惡也不以為國獄緣季子之心而為之諱季子之遏惡奈何莊公病將死以病召季子季子至而授之國政曰寡人即不起此病吾將焉致乎魯國季子曰般也存君何憂焉公曰庸得若是乎牙謂我曰魯一生一及君己知之矣父死子繼曰生兄死弟繼曰及言隱公生桓公及今君生慶父亦當及是魯之常也慶父也存莊公辭之此承班也存語而應之季子曰夫何敢是將為亂乎夫何敢俄而牙弒械成時牙實自欲弒君兵械巳成季子和藥而飲之曰公子從吾言而飲此則必可以無為天下戮笑必有後乎魯國時世大夫誅不暴揚子當繼體如故不從吾言而不飲此則必為天下戮笑必無後乎魯國於是從其言而飲之飲之無傫氏或是大夫家或是地名至乎王堤地名而死公子牙今將爾將欲弒君事未行也辭曷為與親弒者同君親無將將而誅焉然則善之與曰然殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得避兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使託若以疾終然親親之道也陸氏曰公羊云何以不稱弟殺也按書公子常例也叔肹書弟自特書耳不得引以為義按叔牙之事公羊得之若如左氏則只以慶父材一語而遂殺之亦無此理牙以卒書者雖鴆之以立叔孫氏喪以大夫之禮也周禮小司寇同族有罪不即市文王世子曰刑于隱者不與國人慮兄弟也魯之處牙自是遵用此故事耳諸家皆有褒美成季之說恐經無此意八月癸亥公薨于路寢左傳子般即位次于黨氏公羊傳路寢者何正寢也榖梁傳路寢正寢也寢疾居正寢正也男子不絶于婦人之手以齊終也啖氏曰凡公薨必書其所小寢路寢髙寢之類詳內事重凶變也趙氏曰公必薨于正寢以就公卿也大位奸之窺也危病邪之伺也若蔽于隱是使小人女子得行其志也莊公正終而嗣禍分位不明而閨闈不修也故宗嗣素定之兵權散主之閨闈嚴飭之小人女子不尸重任賢良受託鼎足交輔則篡弒之禍曷由而至哉冬十月己未子般卒巳未公榖作乙未般音班左傳冬十月己未共仲慶父使圉人犖賊子般于黨氏成季奔陳出奔不書國亂史失之立閔公莊公庶子時年八嵗又曰閔公哀姜之娣叔姜之子也故齊人立之公羊傳子卒云子卒此其稱子般卒何据子赤不言子赤卒君存稱世子明當世父位為君君薨稱子某明繼父也名者以尸柩尚存君前臣名也既葬稱子不名者無所屈也踰年稱公子般卒何以不書葬未踰年之君也有子則廟立廟廟則書葬無子不廟不廟則不書葬啖氏曰凡踰年君卒皆稱曰卒言嗣先君未成君也故不書薨而曰卒先君未葬則名之父前子名義也既葬則不名子赤是也何氏曰稱卒不地降成趙氏曰子般子赤以被殺故不書地義與隱同子野非被殺而亦不書地闕文也公子慶父如齊杜氏曰慶父既殺子般季友出奔國人不與故懼而適齊欲以求援時無君假赴告之禮而行啖氏曰榖梁云此奔也其曰如諱之也若實奔而曰如乃是掩其惡豈然乎按慶父竊國之謀久矣叔牙弒械己成使非季子應時誅之則莊公且不得以道終而子般之賊不待今年矣既弒子般猶不能遂有之見魯俗秉禮人心未盡從也故因閔公之立告于霸主以為自托之計齊桓大則方伯親則比鄰甥舅之國也豈不知慶父之為賊而容其來使縱其復歸以貽魯國纍世之禍謂之何哉春秋書之一以見其得兵權出入自如而莫之制亦以見時無明王賢伯故使亂賊縱橫而其端未已也桓文之事聖門所以不道也有以哉狄伐邢此狄入伐之始杜氏曰邢姬姓周公之𦙍國在廣平襄國縣春秋輯傳卷三

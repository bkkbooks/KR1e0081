body:
  text: 春秋輯傳卷十三明王樵輯哀公元年春王正月公即位楚子陳侯隨侯許男圍蔡左傳春楚子圍蔡報柏舉也里而栽築牆立版謂之栽栽者竪木以約版也楚慮外人救蔡則己表裏受敵故築壘周匝去蔡城一里以圍之內置兵以攻蔡外慿壘以禦救者廣丈高倍壘厚一丈高二丈夫屯晝夜九日丁夫屯聚築壘晝夜九日而成如子西之素子西本計為壘用九日成蔡人男女以辨男女各别係纍而出降使疆于江汝之間而還蔡於是乎請遷于吳杜氏曰隨世服于楚不通中國吳之入楚昭王奔隨隨侯免之卒復楚國楚人德之使列于諸侯故得見經定六年鄭滅許此復見者蓋楚封之今按蔡人男女以辨則是降也使疆于江汝之間則遷其國也而獨書圍蔡何也滅不言入陳嘗縣之矣而不書曰滅入不言圍鄭入自皇門至于逵路矣而但書曰圍凡以存中國不使楚人盡其虐而滿其辭也聖人之微意也胡康侯謂蔡嘗以吳師入郢昭王奔隨壞宗廟徙陳器撻平王之墓楚至是而報之而春秋書之略者見蔡宜得報而楚子復讐之事可恕也噫此亦大失春秋之㫖矣入郢者吳也壞宗廟徙陳器撻其父之墓處其宫而欲妻其母者又吳也不能報吳而釋憾于蔡楚既可笑矣乃春秋亦從而成之謂蔡宜得報而楚之復讐為可恕不亦悖乎且誘殺蔡侯般而滅其國用隱太子于岡山以一裘之故拘昭侯於南郢數年而後歸蔡之讐楚豈下于入郢使若所為者蔡人親為之始可謂楚宜得報而蔡之復讐為可恕今事出于吳而蔡無與蔡不能報而天假手于吳出乎爾者反乎爾正可以為强而無道之戒乃以復讐恕之孰謂春秋有是法哉康侯之言為高宗不復金讎而發也然宋則蔡也金則楚也欲勸其君以復讐而反恕敵人之遷虐于中國義則疏矣附左傳吳王夫差敗越于夫椒吳郡吳縣西南太湖中椒山報檇李也遂入越越子以甲楯五千保于㑹稽上㑹稽山也在㑹稽山隂縣南使大夫種因吳太宰嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆寒促子封于過殺斟灌以伐斟鄩二斟夏同姓諸侯滅夏后相相啓孫失國依于二斟復為澆所滅后緡相妻方娠逃出自竇歸于有仍后緡有仍氏女也生少康焉為仍牧正惎毒也澆能戒備也之澆使椒澆臣求之逃奔有虞舜後為之庖正虞思有虞君於是妻之以二姚姚虞姓邑諸綸虞邑有田一成方十里有衆一旅五百人能布其德而兆始也其謀以收夏衆撫其官職襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康使女艾少康臣諜候也澆使季杼少康子后杼也誘豷澆弟遂滅過澆國戈豷國復禹之績祀夏配天不失舊物今吳不如過而越大于少康或將豐之不亦難乎言與越成是使越豐大句踐能親而務施施不失人親不棄勞與我同壤而世為仇讐於是乎克而弗取將又存之違天而長冦讐後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長冦讎以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎三月越及吳平吳入越不書吳不告慶越不告敗也鼷鼠食郊牛改卜牛夏四月辛巳郊郊牛下穀有角字穀梁傳此該郊之變而道之也該備也春秋書郊終于此故于此備說郊之變變謂郊非其時或牲被災害于變之中又有言焉鼷鼠食郊牛角改卜牛志不敬也郊牛日展觓音求角而知傷展道盡矣展道雖盡所以備災之道不盡譏哀公不敬故致大變郊自正月至于三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用者也在成十七年郊三卜禮也四卜非禮也僖三十一年襄十一年五卜强也成十年卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩宣三年郊牛之口傷是也全曰牲傷曰牛未牲曰牛有變而不郊故免卜牛也已牛矣其尚卜免之何也嘗置之上帝矣在滌宫名為帝牲故卜而後免之不敢專也卜之不吉則如之何不免安置之繫而待六月上甲始庀匹爾反牲具新牲然後左右之隨所用也又曰六月上甲始庀牲十月上甲始繫牲十一月十二月雖有變不道也以不妨郊故待正月然後言牲之變重其妨郊也郊享道也貴其時大其禮其養牲雖小不備可也郊自正月至于三月郊之時也有變乃志常事不書我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣啖氏曰天子以冬至祭上帝又以夏之孟春祈穀于上帝禮行于郊故謂之郊魯以周公之故特得以孟春祈穀于上帝亦謂之郊郊皆用辛日故以二月卜三月上辛不吉則卜中辛又不吉則卜下辛所謂吉事先近日也穀梁曰云云非也若以冬至則不當卜若以夏之孟春則不當起周正而卜也高氏曰魯不當郊故天示變以警之而改卜牛是違天也雖改卜牛猶非郊時況公斬然在衰絰之中輒行天子之禮以見上帝可乎汪氏曰定公之薨未及小祥而僭行天子之郊禮釋凶服而從吉則為不孝于親矧郊之祭也喪者不敢哭凶服不敢入國門今在喪而蕆事則為不敬于天一舉而犯二不韙焉春秋書郊之失禮未有甚於此者也附左傳夏四月齊侯衛侯救邯鄲圍五鹿吳之入楚也使召陳懷公懷公朝國人而問焉逢滑曰楚未可棄吳未可從陳侯從之及夫差克越乃修先君之怨秋八月吳侵陳秋齊侯衛侯伐晉左傳齊侯衛侯㑹于乾侯救范氏也伐晉取棘蒲吳師在陳楚大夫皆懼曰闔廬唯能用其民以敗我于柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤丹也鏤刻也宫室不觀觀臺榭舟車不飾衣服財用擇不取費選取堅厚不尚細靡在國天有菑癘親巡其孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠知身死不見曠棄吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我冬仲孫何忌帥師伐邾附左傳冬十一月晉趙鞅伐朝歌討范中行氏二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹漷火虢反又音郭沂魚依反句古侯反繹音亦書盟止此左傳春伐邾將伐絞邾邑邾人愛其土故賂以漷沂之田而受盟杜氏曰邾人以賂取之易也句繹邾地取邑盟以要之孔氏曰既取其田慮後悔競故共盟以要之伐則三卿盟唯二卿者服䖍云季孫尊卿敵服先歸使二子與之盟穀梁傳取漷東田郭東未盡也及沂西田沂西未盡也漷沂皆水名以其言東西則知其未盡也三人伐而二人盟何也各盟其得也胡傳三人伐則曷為二人盟盟者各盟其所得也莫强乎季孫何獨無得季氏四分公室有其二昭公伐意如叔孫氏救意如而昭公孫陽虎囚桓子孟孫氏救桓子而陽虎奔今得邾田蓋季氏以歸二家而不取也夏四月丙子衛侯元卒左傳初衛侯遊于郊子南靈公子郢僕公曰余無子將立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖卿大夫士在下君命祗辱言立適當以禮與內外同之今君私命事必不從適為辱夏衛靈公卒夫人曰命公子郢為太子君命也對曰郢異于他子言用意不同且君沒于吾手若有之郢必聞之且亡人之子輒在乃立輒按甚矣衛靈公之惛也彼不恥召宋朝固不難逐蒯聵也蒯聵之奔於今四年惟罪狀未明故太子之位猶未絶而所欲立者猶未定也死而乃以遺命立郢宜郢之不肯居而後日蒯聵與輒之爭有所藉口也非靈公之罪而何哉滕子來朝晉趙鞅帥師納衛世子蒯聵于戚左傳六月乙酉晉趙鞅納衛太子于戚宵迷陽虎曰右河而南必至焉是時河北流過元城界戚在河外晉軍已渡河故欲出河右而南使太子絻絻始發喪之服八人衰絰僞自衛逆者欲為衛人逆故衰絰成服告于門哭而入遂居之公羊傳戚者何衛之邑也曷為不言入于衛父有子子不得有父也何氏曰明父得有子而廢之子不得有父之所有故奪其國文耳孫氏曰言于戚者見為輒所拒而不得入于衛穀梁傳納者內弗受也帥師而後納者有伐也何用弗受也以輒不受也以輒不受父之命受之王父也信父而辭王父則是不尊王父也其弗受以尊王父也江熙曰若靈公廢蒯聵立輒則蒯聵不得復稱世子稱蒯聵為世子則靈公不命輒審矣從王父之言傳似失之朱子曰靈公逐其世子蒯聵公薨而國人立蒯聵之子輒輒實未嘗受靈公之命穀梁王父命之說非是於是晉納蒯聵而輒拒之衛人以蒯聵得罪於父而輒嫡孫當立胡氏曰蒯聵欲殺母得罪于父而輒又據國以拒父皆無父之人也其不可有國也明矣按鄭世子忽復歸于鄭明復正也齊小白入于齊明當有齊也今書晉趙鞅帥師納衛世子蒯聵于戚與公伐齊納糾晉人納捷菑于邾義同皆義弗受而强致之納之者與見納者皆惡也義弗受以蒯聵欲殺母得罪于父也大臣與國人請于天王方伯斷以大義擇其所立則可輒與國人據國拒父則胥於亂矣故書帥師書納于戚見其見敵于衛亦以著輒與國人之罪也秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鐵公作栗又作秩左傳秋八月齊人輸范氏粟鄭子姚罕達子般駟𢎞送之士吉射逆之趙鞅禦之遇于戚簡子誓曰范氏中行氏反易天明不事君也斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬恥在此行也甲戌將戰郵無恤王良也御簡子衛太子為右登鐵丘名上簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死于牖下羣子勉之死不在冦言有命鄭人擊簡子中肩太子救之以戈鄭師北太子復伐之鄭師大敗獲齊粟千車杜氏曰鐵衛地在戚城南按皆言帥師其衆敵也戰而書及以主及客也鄭黨叛人趙鞅以亂禦亂故春秋以趙鞅主乎是戰也冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟左傳吳泄庸如蔡納聘而稍納師師畢入衆知之杜氏曰元年蔡請遷于吳中悔故因聘襲之蔡侯告大夫殺公子駟以說哭而遷墓冬蔡遷于州來初武王封叔度于汝南上蔡蔡叔以叛誅成王復以封其子及平侯卒徙于新蔡至昭侯乃徙九江下蔡即州來是也公子駟書大夫而稱國罪纍上也放公孫獵書大夫而稱人言國亂無政而衆尸之也駟與獵其以請遷于吳為非者乎三年春齊國夏衛石曼姑帥師圍戚公羊傳齊國夏曷為與衛石曼姑帥師圍戚伯討也此其為伯討奈何曼姑受命乎靈公而立輒以曼姑之義為固可以拒之也輒者曷為者也蒯聵之子也然則曷為不立蒯聵而立輒蒯聵為無道靈公逐蒯聵而立輒然則輒之義可以立乎曰可其可奈何不以父命辭王父命以王父命辭父命是父之行乎子也不以家事辭王事以王事辭家事是上之行乎下也穀梁傳此衛事也其先國夏何也子不圍父也不繫戚于衛者子不有父也胡傳主兵者衛也何以序齊為首罪齊人與衛之為惡也輒雖由嫡孫得立然非有靈公之命安得云受之王父哉然則為輒者奈何宜辭于國曰若以父為有罪將從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉而使我立乎其位如此則言順而事成矣朱子答范伯崇書曰蒯聵父子之事其進退可否只看輒之心如何耳若有避父之心則衛之臣子以君臣之義當拒蒯聵而輔之來諭又云輒避位而聽于天子則恐有假手大夫以拒父而隂幸天子與己之心此似是于輒之處心緊要處看得未甚灑落所以如此故愚竊謂輒之心但當只見父子之親為大而不可一日立乎其位自始至終只是一箇逃而去之便無一事高氏曰齊與晉為仇若蒯聵入則衛從晉矣此齊所以助輒也李氏曰衛石曼姑圍戚與宋華元圍宋彭城事同彼宋事以晉首兵此衛事以齊首兵者不以子圍父也彭城書宋者正其為宋也戚不書衛者不以子制父也謝氏得之劉氏曰杜氏言曼姑為子圍父知其不義故推齊為兵首非也春秋豈苟從告而為不義者飾非乎襄陵許氏曰晉以君臣稱兵而齊為臣伐君衛以父子爭國而齊助子圍父君子是以知齊之將亂也夏四月甲午地震五月辛卯桓宫僖宫災左傳夏五月辛卯司鐸宫名火火踰公宫桓僖災孔子在陳聞火曰其桓僖乎杜氏曰言桓僖親盡而廟不毁宜為天所災公羊傳此皆毁廟也其言災何復立也何以不言及據雉門及兩觀敵也親過高祖親疏適等穀梁傳言及則祖有尊卑由我言之則一也逺祖恩無差降如一故不言及胡傳桓僖親盡其宫何以存季氏者出于桓立于僖世專魯政其諸以是而不毁與汪氏曰家語記孔子對陳侯之言曰禮祖有功而宗有德故不毁其廟今桓僖親盡又無功德季氏存之故天災及之然晉悼公初立朝于武宫頃公時獻俘于文宫則親盡不毁之廟無國無之故春秋特書桓僖災以示戒與季孫斯叔孫州仇帥師城啓陽啓公作開陸氏曰開者為漢景帝諱也杜氏曰魯黨范氏故懼晉比年四城啓陽今琅邪開陽縣汪氏曰益都路沂州臨沂縣有故開陽城高氏曰地在今沂州地近邾元年伐邾取邾田此備邾也非備晉也宋樂髠帥師伐曹薛氏曰討樂大心之亂也高氏曰曹本屬宋既而叛之附左傳劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討六月癸卯周人殺萇𢎞秋七月丙子季孫斯卒左傳秋季孫有疾命正常桓子之寵臣曰無死南孺子桓子之妻之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告于君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉魯大夫視之則或殺之矣乃討之召正常正常不反蔡人放其大夫公孫獵于吳冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾附左傳冬十月晉趙鞅圍朝歌師于其南荀寅伐其郛伐其北郭圍使其徒自北門入己犯師而出使在外救己之徒擊趙氏圍之北門因外內攻得出癸丑奔邯鄲十一月趙鞅殺士臯夷范氏之族惡范氏也言遷怒四年春王二月公作三月庚戌盜殺蔡侯申殺陸申志反公穀作弒左傳蔡昭侯將如吳諸大夫恐其又遷也承承音懲蓋楚言公孫翩逐而射之入于家人而卒公羊傳弒君賤者窮諸人此其稱盜以弒何賤乎賤者也賤於稱人者賤乎賤者孰謂謂罪人也穀梁傳稱盜以弒君不以上下道道也以上下道道者若衛州吁弒其君完之類內其君而外弒者不以弒道道也襄七年鄭伯將㑹中國其臣欲從楚不勝其臣弒而死不使夷狄之民加乎中國之君故曰鄭伯髠頑如㑹未見諸侯丙戌卒于鄵是不以弒道道也春秋有三盜微殺大夫謂之盜非所取而取之謂之盜如盜殺陳夏區夫盜竊寶玉大弓辟中國之正道以襲利謂之盜所謂夷狄之民杜氏曰賤者故稱盜不言弒其君賤盜也按蔡昭侯以吳入楚為楚所報請遷于吳而又中悔為吳所脅乃殺大夫以說而卒遷于州來又放其大夫于吳諸大夫蓋已怨之至是又將如吳吳方逞其志諸大夫恐其復生事也潛使盜逐于塗而殺之經直書盜蓋以殺者則盜以主殺者則諸大夫不可得其主名也以事則在塗遇于倉猝入于家人而卒而不可詳詰也左氏何自而知其為公孫翩哉蓋難信矣穀梁所謂不以上下道道者如閽不得君其君之比則可也稱盜者直言其人盜賊耳非不以上下道道而然也稱盜殺者以千乘之君為盜所殺欲以見義故不言弒亦非內其君而外弒者不以弒道道也張洽謂弒者積漸之名蔡昭不道上得罪于大國下無道於其民忠謀不用無罪見殺故翩之事成于一旦春秋以盜殺書之所以見其幾于獨夫也此說尤穿鑿昭侯蓋亦足哀耳何詆之深乎盜賊之名一也穀梁有三盜之說亦非也公羊以賤乎賤者為罪人亦無據按通鑑綱目書李輔國殺皇后張氏同此義陸氏曰蔡侯申今本皆如此按宣十七年蔡侯申卒是文侯也今昭侯是其元孫不容與高祖同名未詳何者誤也蔡公孫辰出奔吳左傳文之鍇蔡大夫討翩殺之故逐公係辰而殺公係姓公孫旴即霍也葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍經無討賊之辭左傳與經不合晉人執戎蠻子赤歸于楚蠻公作曼音蠻左傳夏楚人既克夷虎夷虎蠻夷叛楚者乃謀北方左司馬昄普版反申公壽餘葉公諸梁三子楚大夫致蔡于負函音咸以此蔡之故地人民楚因為邑致之者㑹其衆也致方城之外于繒才陵反關負函繒關皆楚地曰吳將泝音素逆流而上也江入郢將奔命焉為一昔之期襲梁及霍梁霍蠻子之二邑三子㑹衆以備吳為名而隂襲梁霍夜結期明日便發使不及知也單浮餘楚大夫圍蠻氏蠻氏潰蠻子赤奔晉隂地隂地者河南山北自上雒以東至陸渾東西橫長其間非一邑司馬起豐析與狄戎以臨上雒楚司馬昄也析縣屬南鄉郡析南有豐鄉皆楚邑發此二邑人及戎狄以臨上雒左師軍于菟音徒和山在上雒東右師軍于倉野在上雒縣使謂隂地之命大夫士蔑曰特命大夫使總監隂地者晉楚有盟好惡同之若將不廢寡君之願也不然將通于少習以聽命少習商縣武關也將大開武關道以伐晉士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎九州戎在晉隂地陸渾者將裂田以與蠻子而城之以詐蠻子且將為之卜卜城蠻子聽卜遂執之與其五大夫以畀楚師于三户今丹水縣北三户亭司馬致邑立宗焉以誘其遺民而盡俘以歸公羊傳赤者何戎曼子之名也其言歸于楚何據執曹伯畀宋人不言歸于宋子北宫子曰辟伯晉而京師楚也嫌與伯執歸京師同文故辟其文而名之使若晉非伯執而赤微者胡傳晉人云者罪之也蠻子赤何以名夷狄也無罪見執亦書名外之也文公執曹伯則曰畀宋人今此曷云歸于楚歸于楚者猶曰京師楚也晉主夏盟為日久矣不競至此春秋所惡胡傳用公羊語而意不同胡傳優城西郛杜氏曰備晉也六月辛丑亳社災亳步各反公作蒲公羊傳蒲社者何亡國之社也何氏曰公羊以為蒲者古國之名天子滅之以封伯禽取其社以戒諸侯使事上社者封也封土為社其言災何據封土非火所能燒亡國之社蓋掩之掩其上而柴其下故火得燒之掩其上不受天氣也柴其下不達地氣也蒲社災何以書記災也穀梁傳亳社者亳之社也亳亡國也范氏曰殷都于亳武王克紂而班列其社于諸侯以為亡國之戒亡國之社以為廟屏立亳之社于廟之外以為屏蔽左氏云間于兩社戒也人君瞻之而知戒其屋亡國之社不得達上也必為之作屋不使上通天也緣有屋故言災程子曰書曰湯既勝夏欲遷其社不可作夏社國既亡則社自當遷湯存之以為後戒故但屋之自王都以至國都皆有之記曰喪國之社屋之不受天陽也又曰亳社北牖使隂明也魯有亳社災屋之故有災此制計之必始于湯也秋八月甲寅滕子結卒冬十有二月葬蔡昭公葬滕頃公附左傳秋七月齊陳乞僖子弦施弦多衛寧跪救范氏庚午圍五鹿晉邑九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨晉邑十二月弦施逆之遂墮臨國夏伐晉取邢任欒鄗逆畤隂人盂壺口八邑晉地㑹鮮虞納荀寅于柏人今趙國柏人縣五年春城毗頻夷反公作比又作芘杜氏曰備晉也夏齊侯伐宋晉趙鞅帥師伐衛左傳春晉圍柏人荀寅士吉射奔齊夏趙鞅伐衛范氏之故也遂圍中牟秋九月癸酉齊侯杵臼卒杵公作處左傳齊燕姬景公夫人生子不成未冠而死諸子庶公子鬻姒景公妾之子荼嬖諸大夫恐其為太子也言于公曰君之齒長矣未有太子若之何公曰二三子閒于憂虞則有疾疢亦姑謀樂何憂于無君言羣臣若閒暇于國家憂虞之事則恐有疾疢不得為樂今既無憂虞又無疾疢亦且謀樂何憂乎無君公疾使國惠子國夏高昭子高張立荼置羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者冬叔還如齊還音旋後同閏月葬齊景公公羊傳閏不書此何以書喪以閏數也喪曷為以閏數喪數略也穀梁傳不正其閏也何氏曰喪服大功以下以閏數恩殺故并閏數劉氏曰喪以年斷者不以閏數以月斷者則以閏數按成六年穀梁傳云閏月者附月之餘日也天子不以告朔而喪事不數也穀梁之意以為大功以下及葬皆不數閏與公羊不同公羊謂九月五月三月之喪既以月斷則得數閏是以葬亦數閏以天子七月諸侯五月大夫三月士踰月葬亦數月故也如穀梁之說是此葬齊景公自九月併理閏月為五月而葬夫喪事不數之義春秋譏之故曰不正其閏也六年春城邾瑕公作葭杜氏曰備晉也任城亢父縣北有邾婁城高氏曰瑕邾邑魯以不義强城之聖人因其城而繫之邾不與魯之擅并人土也汪氏曰邾瑕如魯濟之類魯有負瑕故稱邾以别之魯取不書恐如把成之不見于經耳晉趙鞅帥師伐鮮虞左傳春晉伐鮮虞治范氏之亂也四年鮮虞納荀寅于柏人吳伐陳左傳復修舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師于城父夏齊國夏及高張來奔左傳齊陳乞僞事高國者每朝必驂乘焉所從必言諸大夫所適必言諸大夫之罪過欲以交鬬之曰彼皆偃蹇將棄子之命皆曰高國得君必逼我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乘如公戰于莊敗高國敗也莊六軌之道國人追之國夏奔莒遂及高張晏圉嬰之子弦施來奔圉施不書非卿按世子國之本也大臣國之幹也齊景公廢長立少輕其國本屬諸高國既愚且懦故陳乞逐之如振槁葉而弒君立君皆在其手莫或敢難使景公早定樹子擇任忠賢則君君臣臣父父子子雖百陳氏豈能盜其國哉春秋書齊國夏高張來奔于前陳乞弒其君荼于後其以為輕其國本託國非人之戒者至明切矣叔還㑹吳于柤柤莊加反秋七月庚寅楚子軫卒左傳秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死此以卜戰而言前已敗于柏舉今卜戰不吉謂當敗是再敗棄盟逃讎亦不如死此以卜退而言死一也其死讐乎死于戰也命公子申子西為王不可則命公子結子期亦不可則命公子啓子閭王三子皆昭兄五辭而後許將戰王有疾庚寅昭王攻大冥陳地吳師所在卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也始而許立以從君終立君之子以不忘君故曰二順不可失與子西子期謀潛師閉塗不通外使逆越女之子章惠王立之而後還是歲也有雲如衆赤鳥夾日以飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移于令尹司馬禜音詠禳祭王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭齊陽生入于齊齊陳乞弒其君荼音徒又丈加反之如反公作舍左傳陳僖子使召公子陽生陽生駕而見南郭且于且于齊公子鉏在魯南郭曰嘗獻馬于季孫不入于上乘故又獻此請與子乘之畏在家人聞其言故欲二人共載以試馬為辭出萊門而告之故魯郭門也闞止知之陽生家臣子我先待諸外公子曰事未可知反與壬陽生子簡公也處戒之使無泄言遂行逮夜至於齊故以昏至不欲令人知也國人知之僖子使子士之母養之隱于僖子家內子士母僖子妾與饋者皆入冬十月丁卯立之將盟鮑子醉而往其臣差車主車之官鮑㸃曰此誰之命也陳子曰受命于鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也景公嘗銜繩為牛使荼牽之頓地而折其齒悼公陽生稽首曰吾子奉義而行者也若我可不必亡一大夫言己可為君必不怨鮑子若我不可不必亡一公子公子自謂也恐鮑子圖已義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬景公妾以安孺子安號也如賴齊邑去鬻姒荼之母殺王甲拘江說囚王豹于句竇之丘三子景公嬖臣荼之黨也公使朱毛齊大夫告于陳子曰微子則不及此然君異于器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困內有飢荒困又有憂外有兵革少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之悔失言毛曰君大訪于陳子而圖其小可也大謂國政小謂殺荼使毛遷孺子于駘齊邑不至殺諸野幕之下野次幕下葬諸殳冒淳地名杜氏曰弒荼者朱毛與陽生也而書陳乞所以明乞立陽生而荼見弒則禍由乞始也楚比劫立陳乞流涕即不對而泣以答君異於器不可以二之言子家憚老皆疑于免罪故春秋明而書之以為弒主公羊傳弒而立者不以當國之辭言之此其以當國之辭言之何據齊公子商人弒其君舍而立氏公子為諼也此其為諼奈何景公謂陳乞曰吾欲立舍何如陳乞曰所樂乎為君者欲立之則立之不欲立則不立君如欲立之則臣請立之陽生謂陳乞曰吾聞子蓋將不欲立我也陳乞曰夫千乘之主將廢正而立不正必殺正者吾不立子者所以生子者也走矣與之玉節而走之節信也析玉與陽生留其半為後當迎之防稱矯也奔不書未命景公死而舍立陳乞使人迎陽生于諸于諸置也其家除景公之喪期而小祥服期者除諸大夫皆在朝陳乞曰常之母有魚菽之祭常陳乞子難言其妻故云常之母齊俗婦人首祭祀言魚豆示薄陋願諸大夫之化我也齊人語簡禮相過謂之化言欲以薄陋餘福共宴飲諸大夫皆曰諾于是皆之陳乞之家坐陳乞曰吾有所為甲鎧請以示焉諸大夫皆曰諾于是使力士舉巨囊而至于中霤諸大夫見之皆色然而駭開之則闖然出頭貌公子陽生也陳乞曰此君也已諸大夫不得已皆逡巡北面再拜稽首而君之耳自是往弒舍李廉曰公羊當國之說非是至其載陳乞本末獨詳于左氏有以知春秋罪陳乞之大意穀梁傳陽生入而弒其君以陳乞主之何也不以陽生君荼也其不以陽生君荼何也陽生正荼不正不正則其曰君何也荼雖不正已受命矣入者內弗受也荼不正何用弗受以其受命可以言弗受也先君已命立之于義可以拒之按以長少言則陽生正荼不正以受命言則荼受命陽生不受命直諸天王則國陽生之國也不直諸天王而自為篡奪則是不有其先君之命也不有其先君之命是自絶于先君豈復得為先君之子而稱公子也故齊小白以國無君而于次居長當立則不氏公子而氏國明當有國也陽生之入也荼雖不正已受命矣安得以為于次居長而當立乎是不得以小白比矣不稱公子誅不子也突歸于鄭不繫之鄭陽生入于齊猶繫之齊者以突視忽忽正也受命也突不正不受命而事之也以陽生視荼陽生正也荼受命不正也陽生以正而爭之也春秋别嫌明微固不得而同之矣突之曰歸易辭也非順辭也陽生之曰入逆辭也非難辭也陳乞生之何難焉其不同乎小白之入者國有君而求為君不受其先君之命則君子以為亦不受于國人也衛侯入于夷儀衛寧喜弒其君剽則喜為衛侯弒也齊陽生入于齊齊陳乞弒其君荼則乞為陽生弒也衛侯衎齊陽生皆與聞乎弒而立者也歸獄于立者則弒者之罪不彰書立者之入而繼之以弒則與聞乎故之罪亦著矣按左氏陽生謂君異于器不可以二則欲除荼者陽生之意陳乞不對而泣謂少君不可以訪是以求長君不然孺子何罪則殺荼似非陳乞之意于是朱毛曰君大訪于陳子而圖其小者可也遷孺子于駘者朱毛受陽生之命不至而殺諸野幕之下者朱毛也而春秋必以歸陳乞何哉噫左氏所載者據其為諼之形也公羊得其情矣其始面諛景公欲其事之成而圖之也既而謂陽生曰千乘之主將廢正而立不正必殺正者吾不立子者所以生子也走矣與之玉節而走之及景公死陳乞使人迎陽生而立之而弒荼由是觀之其謀久矣里克中立所以成亂而非始謀觀從召比雖能始禍而非當國陳乞兼之況身弒荼而其子田常再弒簡公終盜齊國豈其常弒比乎冬仲孫何忌帥師伐邾宋向巢帥師伐曹向舒亮反七年春宋皇瑗帥師侵鄭瑗于眷反後同左傳春宋師侵鄭鄭叛晉故也李廉曰宋之叛晉久矣豈復為晉討鄭乎左氏非晉魏曼多帥師侵衛曼音萬左傳晉師侵衛衛不服也按衛父不父子不子晉不能正名致討而以范中行之故修怨書侵陋之也夏公㑹吳于鄫鄫穀作繒左傳夏公㑹吳于鄫吳來徵百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十昭二十一年晉士鞅來聘叔孫昭子為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國位下國小而使鞅從其牢禮是卑敝邑也魯人恐加四牢焉為十一牢初為鮑國七牢吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二上物天子之牢以為天之大數也天有十二次故制禮象之今棄周禮而曰必百牢亦唯執事吳人弗聽乃與之太宰嚭召季康子康子使子貢辭太宰嚭曰國君道長言長大于道路而大夫不出門此何禮也對曰豈以為禮畏大國也畏大國不敢虛國盡行大國不以禮命于諸侯苟不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委禮衣以治周禮仲雍嗣之斷髮文身辟蛟龍之害裸以為飾裸其身體以文身為飾豈禮也哉有由然也按此非子貢之言國君道長而大夫不出門季氏之驕也懼大國之不測則其君已親行大夫豈重于君而云敢棄其國乎居守社稷豈無他卿乎又斥吳之先君斷髮文身裸以為飾之事亦非所當言傳者附㑹之耳杜氏曰鄫琅邪鄫縣秋公伐邾八月己酉入邾以邾子益來左傳季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保于城城保于德失二德者危將焉保孟孫曰二三子以為何如惡賢而逆之賢指景伯也惡猶安也安于所賢而可逆其言乎言不可也對曰禹合諸侯于塗山執玉帛者萬國諸大夫對也諸侯執玉附庸執帛塗山在壽春東北今其存者無數十焉唯大不字小小不事大也知必危何故不言知伐邾必危自當言今不言者不危故也附季孫破孟孫之怪已魯德如邾而以衆加之可乎此孟孫之言也上有闕文矣不樂而出季孟意異諸大夫佞直不同故罷饗秋伐邾及范門邾郭門也猶聞鐘聲大夫諫不聽茅成子請告于吳成子邾大夫茅夷鴻不許曰魯擊柝聞于邾吳二千里不三月不至何及于我且國內豈不足成子以茅叛高平西南有茅鄉亭師遂入邾處其公宫衆師晝掠邾衆保于繹繹邾山也在鄒縣北師宵掠以邾子益來獻于亳社囚諸負瑕魯邑高平南平陽縣西北有瑕丘城負瑕故有繹前者魯得邾之繹民使在負瑕故使相就以辱之邾茅夷鴻以束帛乘韋自請救于吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟匹亦反陋也君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟于鄫衍即鄫也鄫盟不書吳行夷禮秋而背之成求而不違言魯成其所求無違逆也四方諸侯其何以事君且魯賦八百乘君之二也邾賦六百乘君之私也以私奉二唯君圖之吳子從之按伐邾者三家也公雖在行而無與于其事獲則三家享其利討則公受其惡春秋以諱不在公是以直書而不諱也舊說諱為隱其惡若隱其惡何名為直筆乎蓋諱避之也避其名而遜其辭以示尊敬也今言他人之遇屯否罪戾死喪恥辱則正言之至于所尊所敬則婉順言之此人之情春秋之義也魯自作三軍分公室而季孫宿帥師救台遂入鄆權不在公也搜于紅不書公兵不在公也襄公還自楚聞季氏取卞至于欲適諸侯地不在公也故納叛人叛邑凡內惡悉書而不諱矣以諱不在公也至于入邾則先言公伐邾下但言入邾猶為遜其辭耳遜其辭而不隱其實聖人待父母國之道也胡氏謂書以邾子來而不諱者欲見後書歸邾子之為能去其惡而與之也其義迂矣公羊云入不言伐其言伐內辭也若使他人然使若魯伐而去他人入之夫初秋伐之八月入之理當並書何取于內辭乎遜其辭而不隱其實故但言入邾使若他人豈所謂不隱乎入邾使若他人以邾子益來又可云他人乎又曰益何以名絶曷為絶之獲也夫以歸例書名益位未絶春秋豈絶之乎又云曷為不言其獲內大惡諱也夫立教之體事無巨細皆論其可否豈計其大小乎此自入而以歸何得以獲解乎穀梁云其言來者有外魯之辭焉夫外曰以歸內曰以來丙外之别耳春秋豈以一眚遂外其父母之邦哉宋人圍曹冬鄭駟𢎞帥師救曹左傳宋人圍曹鄭桓子思曰桓諡宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸曹始祖請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政夢者之子乃行彊言霸說于曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑于其郊曰黍丘揖丘大城鍾邘八年春王正月宋公入曹以曹伯陽歸左傳春宋公伐曹將還褚師子肥宋大夫殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之吳伐我左傳吳為邾故將伐魯問于叔孫輒定十二年叔孫輒與公山不狃帥費人以襲魯兵敗奔齊自齊奔吳叔孫輒對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違奔亡也不適讐國未臣而有伐之奔命焉死之可也未臣所適之國若有伐本國者則可還奔命死其難所託也則隱曽所因託則為之隱惡且夫人之行也不以所惡廢鄉不以其私怨惡廢棄其鄉黨之好今子以小惡而欲覆宗國不亦難乎輒魯公族故謂之宗國若使子率軍前引導子必辭王將使我子張輒也病之王問於子泄不狃對曰魯雖無與立緩時若渙散必有與斃急則人人懼而同死戰諸侯將救之未可以得志焉晉與齊楚輔之是四讐也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月吳伐我子泄率故道險從武城故由險道欲使魯成備懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉吳師克東陽而進舍于五梧明日舍于蠶室三邑魯地明日舍于庚宗遂次于泗上微虎魯大夫欲宵攻王舍吳子聞之一夕三遷吳人行成將盟景伯曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久將歸矣請少待之弗從吳人盟而還不言四鄙而直言伐我兵加于國都也趙氏曰若實為城下盟則魯懼至甚何得不便歸邾子而待齊重請師共伐乃歸之乎自矛盾矣經不書盟信經可也夏齊人取歡及闡闡尺善反公作僤後同左傳齊悼公之來也季康子以其妹妻之即位而逆之季魴侯康子叔父通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧伐我取歡及闡公羊傳外取邑不書此何以書所以賂齊也曷為賂齊為以邾婁子益來也邾子齊出也杜氏曰不書伐兵未加而魯與之邑闡在東平劉縣北歸邾子益于邾左傳齊侯使如吳請師將以伐我乃歸邾子邾子又無道吳子使太宰子餘嚭也討之囚諸樓臺栫在薦反擁也之以棘使諸大夫奉太子革以為政秋七月附左傳秋及齊平九月臧賓如如齊涖盟賓如臧㑹子齊閭丘明嬰之子來涖盟且逆季姬以歸嬖冬十有二月癸亥杞伯過卒過音戈齊人歸歡及闡左傳季姬嬖故也九年春附左傳齊侯使公孟綽辭師于吳吳子曰昔歲寡人聞命今又革之不知所從將進受命于君王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘雍於勇反又於用反左傳鄭武子賸以證反賸罕逹也之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚武子賸救之大敗二月甲戌宋取鄭師于雍丘使有能者無死以郟張與鄭羅歸按書取覆而敗之也雍丘縣屬陳留左氏言使有能者無死以郟張與鄭羅歸則殺人多矣春秋之末特書取師者二夏楚人伐陳左傳陳即吳故也秋宋公伐鄭附左傳吳城邗音寒溝通江淮于邗江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵邗江是冬十月附左傳吳子使來警師伐齊十年春王二月邾子益來奔左傳春邾隱公來奔齊甥也故遂奔齊公㑹吳伐齊三月戊戌齊侯陽生卒左傳公㑹吳子伐齊師于鄎齊人弒悼公赴于師徐承吳大夫帥舟師將自海入齊齊人敗之吳師乃還按經書齊侯陽生卒而傳以為弒此殊可疑夫吳伐我以邾故也齊取二邑左氏以為為季姬之故公羊則以為為以邾子益來而賂齊將從左氏則下文又云齊使如吳請師將以伐我乃歸邾子則又似不以季姬之故也既及齊平而魯歸季姬齊歸二邑齊使辭師于吳吳乃使來警師以伐齊雖吳人之無常然事理不應如是也蓋邾子無道吳嘗討之使諸大夫奉太子以為政而邾隱公叛命奔齊將恃齊以為求納是所以見怒于吳也吳㑹魯伐齊乃討納邾之故而傳以為止師之故前後自相戾矣齊大國也止師小嫌也齊人何至遽弒其君以說乎以吳伐我且曰魯雖無與立必有與斃諸侯將救之未可以得志而況齊乎故悼公之弒傳未可信信經可也夏宋人伐鄭晉趙鞅帥師侵齊五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛杜氏曰書歸齊納之薛伯夷卒夷公作寅秋葬薛惠公附左傳吳子使來復警師杜氏曰伐齊未得志故冬楚公子結帥師伐陳吳救陳左傳冬楚子期伐陳陳即吳故吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還杜氏曰季子吳王壽夢少子也壽夢以襄十二年卒至今七十七歲壽夢卒李子已能讓國年當十五六至今蓋九十餘十有一年春齊國書帥師伐我左傳春齊為鄎故前年公㑹吳子伐齊南鄙師于鄎鄎齊地國書高無㔻帥師伐我及清齊地濟北盧縣東有清亭季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能自度不能使二子禦諸竟求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆于齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣孟孺子泄懿子之子武伯彘帥右師顔羽御邴泄為右冉求帥左師管周父御樊遲為右季氏之甲七千冉有以武城人三百為己徒卒師及齊師戰于郊右師奔孟之側後入以為殿抽矢策其馬曰馬不進也師獲甲首八十冉求所得齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許冉有用矛于齊師故能入其軍汪氏曰高郵孫氏謂春秋之始內魯而外諸夏故魯為他國所侵伐必曰某鄙哀公之經再書伐我同魯于諸侯竊以為春秋詳內而略外故外之侵伐止書國而魯書四鄙非尊魯而卑諸侯也此書侵我不言地比于兵加國都之例所以貶之也按師及齊師戰于郊右師奔齊人從之至于涉泗則兵實加國都矣故直言伐我無他說也然公斂處父謂墮成齊人必至于北門是前此無兵及近郊者吳師克東陽而進次于泗上子服景伯曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也請少待之弗從負載造于萊門吳人盟而還齊師在清冉有請一子守二子從公禦諸竟不可居封疆之間不可一子帥師背城而戰孟氏始黽勉以右師從從而又後戰而先奔微冉有在左師則魯事敗矣是時政在季氏生事啓釁故二家不肯同力前之吳師後之齊師召之而來傅國都而止故春秋兩書伐我所以見魯之益衰其亦傷之而已世家季桓子卒遺言謂康子必召孔子其臣止之康子乃召冉求是年冉求與齊戰有功康子曰子之于軍旅學之乎性之乎冉有曰學之于孔子康子乃召孔子而孔子歸魯年六十八矣然魯終不能用孔子孔子亦不求仕乃叙書傳禮記删詩正樂序易弟子蓋三千焉吳伐我有若與于戎行齊伐我冉求帥左師樊遲為右與齊戰有功是役也昭公之子公孫務人與其嬖僮汪錡乘皆死孔子曰能執干戈以衛社稷可無殤也務人即公為與謀逐季氏者夏陳轅頗出奔鄭轅公作袁頗破多反左傳初轅頗為司徒賦封田以嫁公女封內之田悉賦稅之有餘以為己大器鐘鼎之屬國人逐之故出五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書左傳為郊戰故公㑹吳子伐齊五月克博壬申至于嬴博嬴齊二邑皆屬泰山中軍從王吳中軍胥門巢將上軍王子姑曹將下軍展如將右軍三將吳大夫齊國書將中軍高無㔻將上軍宗樓將下軍甲戌戰于艾陵展如敗高子齊上軍敗國子敗胥門巢吳上軍亦敗王卒助之大敗齊師獲國書革車八百乘甲首三千以獻于公公使太史固歸國子之元杜氏曰公與伐而不與戰艾陵齊地附左傳吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫豢養也若人養犧牲非愛之將殺之諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也弗聽使于齊屬其子于鮑氏為王孫氏反役艾陵之役王聞之使賜之屬鏤劍名以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也國語貟將死曰懸吾目于東門以見越之入吳也王取申胥之尸盛以鴟夷而投之于江哀十六年越滅吳秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋左傳衛大叔疾即齊出奔宋初疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣置于犂衛邑而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州衛邑外州人奪之軒以獻恥是二者故出衛人立遺使室孔姞遺疾之弟孔姞孔文子之女疾之妻附左傳季孫欲以田賦杜氏曰丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦所孔氏曰計一丘民之家資出一馬三牛又計田之收更出一馬三牛使冉有訪諸仲尼仲尼曰丘不識也三發三發問卒曰子為國老待子而行若之何子之不言也仲尼不對而私于冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣丘十六井出戎馬一匹牛三頭是賦之常法若不度于禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽十有二年春用田賦左傳春王正月用田賦公羊傳何以書譏始用田賦也何氏曰田謂一井之田不言井者城郭里巷亦有井嫌悉賦之禮稅民公田不過十一軍賦十井不過一乘哀公外慕强吳空盡國儲故復用田賦陳氏曰田賦者家一人也諸侯之益兵自齊始晉次之春秋之季魯亦行之矣是故作丘甲用田賦不書初胡傳魯自宣公初稅畝至是二猶不足故又以田賦也田以出粟為主而足食賦以出軍為主而足兵用田賦軍旅之征非矣用者不宜用也汪氏曰丘甲之法已增三之一今别田及家財各為一賦則是比先王之制加倍不啻矣亦未可信要之計田而斂取民財以充軍賦之用而其數之多寡則不可考耳孔子云丘亦足矣蓋以計丘而出兵車乃賦之常法安可計田又斂其財哉李廉曰田賦之說杜氏以為丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦則是一丘出馬二匹牛六頭也范氏注穀梁同之然杜氏于作丘甲條內已曰今魯使丘出甸賦是一丘十六井已出馬四匹牛十二頭矣安得復以為出馬一匹牛三頭乎此其前後自相戾也況家財有無難均何得别之大率古者田出租里出賦蓋收區域之征以備馬牛車乘觀左傳所載多臨事始授甲出車則馬牛車乘蓋以賦里之入素具以共軍用可知司馬法所謂甸出一乘者出一乘之人耳胡氏說近之陳氏非是今按賦之本義專為出車計丘而出兵車賦之常法今計田而出故曰田賦漢計口而出則曰口賦蓋春秋諸侯盟㑹禮繁兵戈事廣不能復守先王之籍故魯用不足則初稅畝益兵則作丘甲至哀公逺事强吳事充繇役煩政重賦稅多二猶不足復用田賦蓋託以軍用加斂于田計田而出貨財也其數之多寡則不可考大約稅畝多乎什一田賦又多乎稅畝矣稅畝私田始有征也田賦私田又加征也夏五月甲辰孟子卒左傳夏五月昭夫人孟子卒昭公娶于吳故不書姓死不赴故不稱夫人不稱夫人故不言薨不反哭故不言葬小君反哭者夫人禮也以同姓故不成其夫人之喪孔子與弔始老故與弔季氏不絻喪冠放絰而拜孔子以小君禮往弔季氏不服喪故去絰公羊傳孟子者何昭公之夫人也其稱孟子何諱娶同姓蓋吳女也穀梁同范氏曰葬當書姓諱故亦不書葬公㑹吳于槖臯槖章夜反一音託左傳公㑹吳于槖臯吳子使太宰嚭請尋盟公不欲使子貢對曰盟所以周固也信也故心以制之制其義玉帛以奉之贄于神言以結之結其信明神以要之要以禍福寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也尋溫也諸言辱盟者皆以前盟已寒更溫之使熱乃不尋盟杜氏曰槖皋在淮南逡遒縣東南張氏曰槖皋吳地逡遒故城在廬州慎縣東南秋公㑹衛侯宋皇瑗于鄖音云公作運左傳吳徵㑹于衛初衛人殺吳行人且子餘反姚而懼謀于行人子羽衛大夫子羽曰吳方無道無乃辱吾君不如止也子木衛大夫曰國無道必棄疾于人吳雖無道猶足以患衛往也長木之斃無不摽擊也也國狗之瘈吉世反狂也無不噬也而況大國乎秋衛侯㑹吳于鄖公及衛侯宋皇瑗盟而卒辭吳盟按左氏載衛㑹吳之事與經不合又言公及衛宋盟而卒辭吳盟吳人藩衛侯之舍因子貢之言而解皆不可信杜氏曰鄖發陽也廣陵海陵縣東南有發繇亭宋向巢帥師伐鄭左傳宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈鍚凡六邑子産與宋人為成曰勿有是俱棄之及宋平元之族自蕭奔鄭在定十五年鄭人為之城嵒戈鍚以處平元之族九月宋向巢伐鄭取鍚殺元公之孫遂圍嵒十二月鄭罕達救嵒丙申圍宋師按自皇瑗取鄭師之後宋再伐鄭釋憾亦已足矣向巢又伐焉取鍚圍嵒殺元公之孫全師復沒亦蹈鄭人之覆轍佳兵不祥其事好還豈不信哉冬十有二月螽左傳冬十有二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也杜氏曰火心星也火伏在今十月猶西流言未盡沒知是九月厯官失一閏按明年九月螽又十二月螽蟲災亟作而不時直以政失耳非關閏也十二月螽氣燠也宣十五年冬蝝生與此同十有三年春鄭罕達帥師取宋師于嵒左傳春宋向魋救其師鄭子賸使徇曰得桓魋者有賞魋逃歸遂取宋師于嵒以六邑為虛夏許男成卒成公作戌公㑹晉侯及吳子于黃池公羊傳吳何以稱子吳主㑹也吳主㑹則曷為先言晉侯不與夷狄之主中國也其言及吳子何㑹兩伯之辭也杜氏曰陳留封丘縣南有黃亭近濟水按內外傳吳王夫差既勝齊殺申胥乃起師北征闕為深溝於商魯之間闕穿也商宋也北屬之沂西屬之濟以㑹晉于黃池吳晉爭先吳人曰于周室我為長晉人曰于姬姓我為伯未成邊遽至以越亂告吳王懼乃合大夫而謀曰無㑹而歸與㑹而先晉孰利王孫雄吳大夫曰二者莫利必㑹而先之今夕必挑戰彼將不戰而先我吳王從之吳公先歃晉侯亞之稱吳公者董褐謂吳王曰君奄王東海以淫名聞于天下君若無卑天子而去其不祥孤敢不順從君命吳王許諾去王號故稱公按楚人衷甲以脅趙武而楚先歃吳人挑戰以脅趙鞅而吳先歃其事一也以齊桓之盛未有能責楚僭王之罪豈以晉之衰弱而能使吳黜其淫名乎借曰吳有越憂急于成長而歸然勢未應肯遽自貶也蓋吳楚稱王于國中而於盟㑹則亦唯以伯主自居耳楚圍用召陵之禮可見也經意公羊得之言及吳子固㑹兩伯之辭亦殊吳于晉也楚公子申帥師伐陳於越入吳按內外傳吳既㑹晉於黃池於是越王句踐乃命范蠡舌庸帥師沿海泝淮以絶吳道越王率中軍泝江以襲吳入其郛焚其姑蘇吳人告敗于王王惡其聞也自剄七人于幕下胡傳吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣吳侵列國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之春秋初書於越入吳在柏舉之後再書於越入吳在黃池之後皆因事屬詞垂戒後世不待貶絶而見也秋公至自㑹晉魏曼多帥師侵衛魏下公無曼字葬許元公九月螽冬十有一月有星孛于東方孛音佩又音勃公羊傳孛者何彗星也其言于東方何見于旦也何以書記異也杜氏曰平旦衆星皆沒而孛乃見故不言所在之次何氏曰周十一月夏九月日在房心房心天子明堂布政之庭于此旦見與日爭明者諸侯代主典法滅絶之象王伯厚曰星孛東方在於越入吳之後彗見西方在衛鞅入秦之前天之示人著矣盜殺陳夏區夫區烏侯反公作彄苦侯反十有二月螽附左傳冬吳及越平史記曰國亡太子內空王居外久士皆罷敝于是乃使厚幣以與越平王伯厚曰列國之變極于吳越通吳以疲楚者晉也通越以撓吳者楚也春秋以是終焉十有四年春西狩獲麟左傳春西狩于大野在高平巨野縣東北大澤是也叔孫氏之車子微者鉏商車子名獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之杜氏曰麟者仁獸聖王之嘉瑞也時無明王出而遇獲仲尼傷周道之不興感嘉瑞之無應故因魯春秋而修中興之教絶筆于獲麟之一句所感而作固所以為終也冬獵曰狩蓋虞人修常職故不書狩者大野在魯西故言西狩程子曰始隱周之衰也終麟感之始也世衰道不行有述作之意舊矣但因麟而發耳麟不出春秋亦必作也春秋之作不過因魯國之史而天地四時之無窮所以察其遷變而紀其差忒者無一略也中外疆索之廣莫所以録其交際而别其典禮者無一遺也故曰言天下之至動而不可亂也言天下之至賾而不可惡也以區區一魯國之史而兼紀周齊晉宋諸國之事其尊卑小大統屬之序秩然無毫髮之不順盡書治亂失得陵僭亂賊之變森然一循乎條理而無一之非法故曰非聖人誰能修之或問春秋何為始于隱公而終于獲麟歐陽公曰吾不知也問者曰此學者之所盡心焉不知何也曰春秋起止吾所知也子所問者始終之義吾不知也吾無所用心乎此者也昔子仕于魯不用去之諸侯又不用困而歸且老始著書得詩自關雎至于魯頌得書自堯典至于費誓得魯史記自隱公至于獲麟遂删修之其前逺矣聖人著書足以法世而已不窮逺之難明也故據其所得而修之孔子非史官也不常職乎史故盡其所得修之而止耳魯之史記則未嘗止也今左氏經可以見矣曰然則始終無義乎曰義在春秋不在起止春秋謹一言而信萬世者也豫厭衆說之亂春秋者也春秋輯傳卷十三

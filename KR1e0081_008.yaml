body:
  text: 春秋輯傳卷六明王樵輯文公元年春王正月公即位穀梁傳繼正即位正也胡傳即位者告廟臨羣臣也國君嗣世定於初喪必逾年然後改元書即位者縁始終之義一年不二君縁臣民之心不可曠年無君按書載舜禹受終傳位之事在舜則曰月正元日格于文祖在禹則曰正月朔旦受命于神宗率百官若帝之初夫格于文祖神宗則告廟也率百官若帝之初則臨羣臣也自古通喪三年其以凶服則不可入宗廟其以吉服則斬焉在衰絰之中不可既成而又易之也如之何而可子張問於孔子曰髙宗諒隂三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽于冢宰三年則告廟臨羣臣固有攝行之禮矣按商書稱太甲元年伊尹祠于先王則攝而告廟之證也百官總已以聽冢宰則攝而臨羣臣之證也其曰祗見厥祖者言伊尹以奉嗣王之事祗見太甲之祖也至三祀十有二月伊尹以冕服事嗣王則免䘮從吉之證也然顧命康王之誥記成王之崩其君臣皆冕服何也當是時成王方崩就殯猶未成服故用麻冕黼裳入受顧命已受命誥諸侯而後釋冕反䘮服者于是成服而宅憂也或以為康王釋服離次而即吉則誤矣二月癸亥日有食之公日上有朔字天王使叔服來㑹葬公羊傳其言來㑹葬何㑹葬禮也杜氏曰叔氏服字諸侯䘮天子使大夫㑹葬禮也胡傳凡崩薨卒葬人道始終之大變也不以得禮為常事而不書其或失禮而害於王法之甚者聖人則有削而不存以示義者矣失禮如成公親葬晋景公害于王法如見弑賊不討呉楚僣王之類或曰弔賻可也㑹葬非禮也附左傳于是閏三月非禮也于厯法閏當在僖公末年先王之正時也履端于始舉正于中歸餘于終歩厯之始以為術之端首期之日三百六十有六日日月之行又有遲速而必分為十二月舉中氣以正月有餘日則歸之於終積而為閏故言歸餘于終履端于始序則不愆四時無愆過舉正于中民則不惑斗建不失其次寒暑不失其常故無惑歸餘于終事則不悖四時得所則事不悖亂夏四月丁巳葬我君僖公左傳葬僖公緩前年十一月薨并閏七月乃葬天王使毛伯來錫公命穀梁傳禮有受命無來錫命錫命非正也杜氏曰毛國伯爵諸侯為王卿士者胡傳諸侯終䘮入見則有錫嵗時來朝則有錫能敵王所愾則有錫黼冕圭璧因其終䘮入見而錫之者也禮所謂䘮畢以士服見天子已見賜之黼冕圭璧然後歸是已車馬衮黼因其嵗時來朝而錫之者也詩所謂君子來朝何錫予之雖無予之路車乘馬又何予之𤣥衮及黼是已彤弓玈矢因其敵愾獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝享之是已今文公繼世䘮制未畢非初見繼朝與獻功也何為來錫命乎故穀梁子曰禮有受命無來錫命來錫命非正也晋侯伐衛左傳晋文公之季年諸侯朝晋衛成公不朝使孔達衛大夫侵鄭伐緜訾及匡匡在頴川新汲縣東北晋襄公既祥使告於諸侯而伐衛及南陽今河内地先且居曰效尤禍也尤衛不朝故伐今不朝王亦衛也請君朝王臣從師晋侯朝王於温先且居胥臣伐衛五月辛酉朔晋師圍戚六月戊戌取之獲孫昭子衛大夫食戚邑杜氏曰晋襄公先告諸侯而伐衛雖大夫親伐而稱晋侯從告辭也叔孫得臣如京師左傳叔孫得臣如周拜得臣叔牙之孫謝錫命衛人伐晋左傳衛人使告於陳陳共公曰更伐之我辭之見伐求和不競太甚故使報伐示已力足以距晋衛孔達帥師伐晋秋公孫敖㑹晋侯于戚此大夫専㑹諸侯之始左傳秋晋侯疆戚田故公孫敖㑹之晋取衛田正其疆界杜氏曰戚衛地在頓丘衛縣西禮卿不㑹公侯冬十月丁未楚世子商臣弑其君頵頵俱倫反公穀作髠左傳初楚子将以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聽既又欲立王子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芊而勿敬也江芊成王妹嫁于江王芊亡氏反史記以為成妾從之江芊怒曰呼役夫呼發聲也役失賤者稱宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎問能事職不曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死蹯音煩熊掌難熟冀乆將有外救弗聽丁未王縊諡之曰靈不瞑曰成乃瞑言其忍甚未斂而加惡諡穆王立以其為太子之室與潘崇使為大師且掌環列之尹宫衛之官胡傳書世子弑君者為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷簒殺誅死之罪聖人書此者使天下後世察於人倫知所以為君臣父子之道而免於首惡之名誅死之罪也傳者案也經者斷也考於傳之所載可以見其所由致之漸矣嫡妾必正而楚子多愛立子必長而楚國之舉常在少者養世子不可不慎而以潘崇為之師侍膳問安世子之事而多置宫甲降而不憾憾而能眕者鮮矣乃欲黜兄而立弟謀及婦人使江芊知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僭王馮陵中國戰勝諸侯毒被天下禍𤼵蕭墻不善之積豈可揜哉君不君則臣不臣父不父則子不子春秋書世子弑其君者推本所由而著萬世之大戒也然則商臣無貶矣曰弑父與君之賊其惡猶待於貶而後著乎公孫敖如齊通嗣君也廢䘮而聘非禮也左氏謂穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援此語尤陋好事隣國以衛社稷忠信卑讓之道也左氏於此等不察其不能謹天下之通䘮又不考其尊周交隣之䟽數而槩以為禮杜預又從而實之云諸侯諒闇國事皆用吉禮何違經誣禮之甚也附左傳殽之役晋人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類孤實貪以禍夫子夫子何罪復使為政二年春王二月甲子晋侯及秦師戰于彭衙秦師敗績左傳春秦孟明視帥師伐晋以報殽之役二月晋侯禦之先且居將中軍趙衰佐之代郤溱王官無地御戎代梁𢎞狐鞫居為右鞫居續簡伯甲子及秦師戰於彭衙秦師敗績晋人謂秦拜賜之師秦伯猶用孟明趙成子趙衰言於諸大夫曰秦師又至將必辟之初狼瞫為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所子姑待之及彭衙既陳以其属馳秦師死焉晋師從之大敗秦師按狼瞫前日為右死敵可也既不為右固可以止今乃無職而侵在職者之憂輕進而死於敵則是心不止於事而思出其位矣程子曰秦越國襲人雖忿為晋所敗而無以為辭故來不稱伐晋不諭秦而與戰故書晋及秦縁忿以再取敗故書敗績孟明名氏不見非命卿也杜氏曰彭衙秦地馮翊郃陽縣西北有彭衙城丁丑作僖公主左傳凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟丁丑作僖公主書不時也公羊傳作僖公主者為僖公作主也主者曷用虞主用桑練主用栗禮平旦而葬日中反而祭曰虞其主用桑期而小祥練祭埋虞主於兩階之間易用栗主用栗者藏主也藏於廟室中堂所當奉事也作僖公主何以書譏不時也記云十三月而練僖公薨至是十有五月穀梁傳立主䘮主於虞吉主於練作僖公主譏其後也作主壊廟有時日於練焉壊廟壊廟之道易檐以占反可也改塗可也高氏曰周人卒哭而祔祔而易主是謂虞主既期而練練而易主是謂練主僖公薨十有五月過虞練之時而方作主猶未祔廟也猶未祔廟者欲躋之故也張氏曰事亡如事存故作主以象神而祭之禮既葬作主於墓不終日而虞祭不忍一日忘親也僖公元年四月葬今始作主慢而違禮甚矣杜氏曰主者殷人以柏周人以栗三年䘮終遷入於廟按䘮禮葬日而虞虞後明日為卒哭之祭卒哭之明日作祔祭以新死者之神祔於祖父於此祔祭而作木主以依神其主在寝特用䘮禮祭祀於在寝之主其四時常祭礿祠烝嘗及三年䘮畢之禘祭並行之於廟凡國君薨之正禮當如是也今僖公葬後十月始作木主是作主太緩故為非禮也朱子曰先王制禮本縁人情吉凶之際其變有漸故始死全用事生之禮既卒哭祔廟然後神之然猶未忍盡變故主復於寝而以事生之禮事之至三年而遷於廟然後全以神事之也又曰穀梁謂練而壊廟乃在三年之内似恐太速左氏謂祔而作主則與禮經虞主用桑者不合謂烝嘗禘於廟則與王制䘮三年不祭者不合三月乙巳及晋處父盟因朝而盟始此左傳晋人以公不朝來討公如晋夏四月己巳經書三月乙巳恐傳誤晋人使陽處父盟公以恥之書曰及晋處父盟以厭損也之也適晋不書諱之也公羊傳此晋陽處父也何以不氏諱與大夫盟也穀梁傳不言公處父伉也為公諱也不言公之如晋恥也出不書反不致也按文當是脱一陽字陸氏曰義同高徯凡大夫與公盟若非彼強逼我而盟例但書人言非大夫之罪也今晋逼公令與大夫盟故特書其名以見其罪杜氏曰不地者盟晋都趙氏曰此乃深責晋之無禮非為公諱也夏六月公孫敖㑹宋公陳侯鄭伯晋士穀盟于垂隴穀户木反穀作糓垂隴公穀作垂歛左傳公未至六月穆伯㑹諸侯及晋司空士縠士為子盟於垂隴晋討衛故也討元年衛伐晋書士縠堪其事也晋司空非卿也以士穀能堪卿事故書陳侯為衛請成於晋執孔達以説杜氏曰垂隴鄭地滎陽縣東有隴城陳始與衛謀謂可以強得免令晋不聽故更執孔達以茍免也陳氏曰大夫而敵諸侯於是始然士縠主盟曷為序諸侯之下春秋不以大夫主盟也翟泉貶此何以不貶貶不於其甚則於其事端餘實録而已自十有二月不雨至于秋七月公羊傳何以書記異也以不言旱大旱以災故此亦旱也曷為以異書大旱之日短而云災故以災書此不雨之日長而無災故以異書也穀梁傳歴時而言不雨不憂雨也杜氏曰周七月今五月也不雨足為災不書旱五穀猶有収胡傳書不雨至於秋七月即八月嘗雨矣不書者見文公無意於民不以民事繫憂樂也按凡書旱著災也書不雨有二有以閔雨而書者僖二年冬十月不雨三年夏四月不雨六月雨是也有以慢而書者此年十年十三年三書自某月不雨至於某月是也公羊云記異不雨何異乎八月丁卯大事于太廟躋僖公左傳逆祀也禮無不順子雖齊聖不先父食公羊傳大事者何大祫也大祫者合祭也毁廟之主陳於太祖未毁廟之主皆升合食於太祖五年而再殷祭殷盛也三年祫五年禘躋僖公譏逆祀也其逆祀奈何先禰而後祖也何氏曰僖公以臣繼閔猶子繼父故閔公於文公亦猶祖也穀梁傳大事者祫祭躋升也先親而後祖也逆祀也逆祀則是無昭穆也無昭穆則是無祖也君子不以親親害尊尊范氏曰僖公雖長嘗臣閔矣臣不先君猶子不先父故以昭穆父祖而喻按䘮未終而吉祭又逆祀一書而再譏也高氏曰父子相繼禮之常也至於傳之兄弟則亦不得已焉耳既授以國則所傳雖非子亦猶子道也傳之者雖非其父亦猶父道也漢之惠文亦兄弟相繼而當時議者推文帝上繼高祖而惠帝親受高祖天下者反不得與昭穆之正至於光武當繼平帝又自以世次當為元帝後皆背經違禮而不足示法者也凡人君以兄弟為後者必非有子者也引而為嗣臣子一體矣而當嗣者反以兄弟之故不繼所受國者而繼先君則是所受國者竟莫之嗣生則以臣子事之死則以兄弟治之人民土地則歸之已父子之禮則恥而不為皆不可之大者也按躋僖公以僖兄而閔弟也而僖嘗臣閔矣君子不以親親害尊尊兄弟之不先於君臣禮也故以為逆祀謂臣不可以先君也公羊穀梁以臣不先君猶子不先父故以昭穆父祖為喻非實以閔僖即當以傳位為父子也春秋之義止於如此至於宗廟世及昭穆之序又當别論孔子曰禮父子異昭穆兄弟昭穆同故僖閔不得為父子同為穆耳今升僖先閔此二公位次之逆非昭穆亂也魯語云將躋僖公宗有司曰非昭穆也弗忌曰我為宗伯明者為昭其次為穆何常之有如彼所言位次之逆如昭穆之亂假昭穆以言之非謂異昭穆也若兄弟相代即異昭穆設令兄弟四人皆立為君則祖父之廟即已從毁知其理必不然也如齊之孝昭懿惠兄弟四人相繼衛之懿戴文兄弟三人相繼茍各為一世而異昭穆則齊頃不得祭其祖衛成不得祭曽祖矣李亷曰古者戎祀皆國之大事季氏将有事於顓臾此以兵事為有事也天子有事於文武此以祭祀為有事也故春秋書大祫為大事書禴祠烝嘗為有事此年大事祫也宣八年有事禴也昭十五年有事烝也此皆於祭無譏故不書祭名其郊禘大雩皆書祭名者祭之僣也烝嘗有書祭名者祭之失也此年大事之為祫公穀皆同杜氏以為禘者非也冬晋人宋人陳人鄭人伐秦左傳晋先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役程子曰秦以忿取敗晋可以已矣而復伐秦報復無已殘民結怨故貶自入春秋以來至此除大夫帥師外外兵非君將者皆稱人左氏云卿不書為穆公故尊秦也杜氏云四人皆卿秦穆悔過終用孟明故貶四國大夫尊以秦伯按尊秦伯非經㫖公子遂如齊納幣公羊傳納幣不書此何以書譏䘮娶也娶在三年之外則何譏乎䘮娶據逆在四年三年之内不圖婚三年之恩疾矣非虚加之也以人心為皆有之娶者大吉也其為吉者主於已以為有人心焉者宜於此焉變矣胡傳婚姻常事不書其書納幣者譏在䘮而圖婚也僖以十二月薨至此未滿二十五月婚禮先納采問名納吉乃納幣四者皆行於禫前夫娶在三年之外矣則何譏乎春秋論事莫重乎志志敬而節具與之知禮志和而音雅與之知樂志哀而居約與之知䘮非虚加之也重志之謂也此皆使人私欲不行閑邪復禮之意三年春王正月叔孫得臣㑹晋人宋人陳人衛人鄭人伐沈沈潰大夫㑹諸國大夫伐國始此左傳荘叔㑹諸侯之師伐沈以其服於楚也沈潰凡民迯其上曰潰在上國君輕走曰迯杜氏曰沈國名張氏曰姫姓汝南平輿縣北有沈亭按楚商臣負覆載不容之罪於今二年使晋襄仗義而前師壮辭直天下諸侯孰不鼓勇而從誅其人汙瀦其宫使楚更立君而聽命於中國則晋之伯業有光於前人矣乃舎其大而事其細結怨於秦討不朝於魯報侮於衛中夏未定又為此舉夫沈越在南服未嘗接文告之辭通㑹盟之禮素知中國之約束也一旦以服楚為罪而伐之潰散其民播越其君沈亦何辜乎避豺虎而獵狐兎雖潰百沈何益於事多見襄公之不知類也夏五月王子虎卒左傳夏四月乙亥杜氏曰經書五月又不書日從赴王叔文公卒來赴弔如同盟王子虎與僖公同盟於翟泉王臣無外交以其嘗與魯同盟故來赴然非禮也趙氏曰左氏云弔如同盟禮也按天子大夫無與諸侯盟之禮而曰禮也豈春秋之意乎啖氏曰穀梁云叔服也叔服若是王子則來㑹葬之時在元年何不書王子乎汪氏曰左氏於王子虎稱王叔文公於叔服稱内史叔服則非一人明矣後十四年星孛之變又載叔服之言則與王子虎分明兩人矣秦人伐晋左傳秦伯伐晋濟河焚舟示必死也取王官及郊皆晋地晋人不出遂自茅津濟在河東大陽縣西封殽尸而還程子曰搆怨連禍殘民以逞晋人畏之而不敢出秦人極其忿而後悔過聖人取其終能悔耳史記秦紀曰穆公自茅津渡河封殽中尸為發䘮哭之三日乃誓於軍以申不用蹇叔百里奚之謀令後世以記余過仁山金氏曰按秦誓秦穆公晩年悔過之書也左氏記秦晋之故甚詳而不記作誓之事書序誤以為敗殽還歸之作惟史記繫於取王官封殽尸之後盖穆公自是不復東征矣見伐不報秋楚人圍江雨螽于宋左傳隊而死也來告故書穀梁傳災甚也茅茨盡矣按螽非上隊之物來多如隊故書雨見災甚耳既為災則非隊而死也左氏因雨字而生説耳徐邈云禾稼既盡又食屋之茅茨騐嘗有之冬公如晋十有二月己巳公及晋侯盟此書公如晋之始左傳晋人懼其無禮於公也請改盟公如晋及晋侯盟按向者晋侯使陽處父盟公已而自知其非禮復請改盟然召而盟之晋之不能以禮謝過魯之不能以禮進退皆見之矣晋陽處父帥師伐楚以救江公穀無以字左傳晋以江故告於周王叔桓公晋陽處父伐楚以救江門於方城遇息公子朱而還桓公周卿士王叔文公之子不書者示威名不親伐也子朱楚大夫伐江之帥也江兵解故晋還愚按春秋無義戰以皆為利為怨而擅興也伐楚以救江而又知請於周可謂義舉矣然以其名則是以其實則非為其實者以王法正諸夏以諸夏攘夷狄荆楚雖大以當中國之全力所謂以一服八無異於鄒之敵楚也齊桓公建一匡之烈為五伯首未嘗有資於秦晋之力况晋國天下莫強焉奉王命帥齊魯宋衛陳鄭之師討楚弑君僣王猾夏之罪復楚所滅之諸國宜皆若有餘者而况區區救一江而不贍乎襄公藉文公之餘挾大國之力有虚志驕氣而無其術失所先後不能自養以圖其實屢戰勝秦不勝滿溢又欲勤遠略以為名耳本畏楚兵之強不敢徑趨江之城下乃揚聲伐楚救江偏師渉其境而不敢入門於方城遇息公子朱而還無異於秦兵出關而五國之師皆遁走也既不能救江又不能伐楚亦可笑矣杜預謂子朱者伐江之帥也聞晋師起而解江圍夫四年楚滅江江圍何嘗解也楚勢方張豈為晋師一闖其境而即解去乎蓋陽處父之徒藉口以退師猶夾泜誑子上之故智耳㐮公實無制楚憂諸夏之誠心故僅遣偏師以塞責胡氏乃議其宜合諸侯以秦甲出武關以齊兵略陳蔡而南是時秦方為怨耦豈所能合然使㐮公有真志而務其實則亦無頼於秦也公羊云為諼也謂救江而反伐楚張虚聲示虚惠耳無救之之實也四年春公至自晋附左傳晋人歸孔達於衛夏衛侯如晋拜曹伯如晋㑹正㑹受貢賦之政夏逆婦姜于齊左傳卿不行非禮也君子是以知出姜之不允於魯也允信也始來不見尊貴故終不為國人所敬信也文公薨而見出故曰出姜穀梁傳其曰婦姜為其禮成乎齊也其逆者誰也親逆而稱婦或者公與何其速婦之也曰婦有姑之辭也趙氏曰此義自施於書至其不言氏何也貶之也啖氏曰凡夫人加氏字便於言耳今既曰婦姜故不須言氏無他義也何為貶之也夫人與有貶也按不書逆者左氏蓋以為㣲者云卿不行非禮也又云貴聘而賤逆之君而卑之穀梁以為公自行而貶其成禮於齊左氏義淺穀梁義迂據荘公如齊逆女皆書穀梁曰親逆恒事不志此其志何不正其親迎於齊也文公在䘮而圖婚與䘮娶同使其實有成禮於齊之事則春秋尤當明書公逆以見其重失禮之罪矣以不書則恐無其事而左氏似得之也公羊謂娶乎大夫故畧之亦非程子曰凡事分明可見者聖人更不㣲文以見義只直書而已如桓三年及宣元年逆女皆分明在䘮服中成昏故只書逆女文公則但在䘮服納幣至逆女却在四年聖人欲顯其居䘮納幣之罪故變文書婦姜便成之為婦也張氏曰聖人嚴吉凶之辨蓋人之所以異於禽獸者正以有父子之親而三年之䘮哀戚之至國君為風教之首而納幣於䘮中春秋變逆女為逆婦姜不成其夫人之禮以見人倫之本已失何以正是國人為後嗣之基乎唐陳氏曰吉凶之禮茍公不自行大夫不涖事則第書其事不書其人文公使卿納幣而使㣲者逆之是公以禮聘之而不以禮逆之宜其不終也汪氏曰春秋一經書逆夫人惟此年最略不書逆者名氏不稱夫人不言氏不書至豈非責文公自紊通䘮之禮而然與宣公之娶尤亟而書法加詳事同已貶則從同同也狄侵齊秋楚人㓕江左傳楚人㓕江秦伯為之降服素服出次辟正寝不舉去盛饌過數鄰國之禮有數今秦伯過之大夫諌公曰同盟㓕秦江同盟不告故不書澤按江黄近楚知楚之無厭也有欵中國之心自貫之盟從霸甚堅觀江嘗與秦盟則其為慮深矣其後亡也蓋其自守猶有道與以逺國知自拔於蠻服而竟不免於虎口乃中國負之多矣其亦可傷也哉雖不能救敢不矜乎吾自懼也按使秦伯推此心以救江豈不賢於人遠甚哉晋有救江之舉而不誠秦有矜江之心而不救故楚有以窺中國之無人也是時諸侯秦穆公最賢有為善之資無賢臣師友之助故功烈止此豈不可惜哉三年之秋楚人圍江今閲一期矣其國竟㓕而晋褎如充耳為之出次降服不舉而深自責者乃在秦伯晉亦可恥也夫世事亦可歎也夫公羊云入不言圍書其重者江黄二國從中國而致㓕黄書伐江書圍皆著中國之不能救也㓕者亡國之善辭上下之同力江黄之君不書奔不書以歸則能固守待援而死於其位又可知矣晉侯伐秦左傳圍邧新城秦邑以報王官之役在前年程子曰秦至此能悔過矣故不復報晉聖人取其能遷善也朱子曰胡氏謂書晉侯為以常情待晉襄書秦人為以王事責秦穆恐未必如此程子所謂㣲辭隠義未易言也按春秋有只據經文不待觀傳而其本末自可見者如楚人圍江晉陽處父帥師伐楚以救江狄侵齊楚人㓕江晉侯伐秦晉坐視蠻服之横而不校江之遂㓕而不恥乃興師親將而以伐秦此其義至分明者也如晉侯重耳卒晉人及姜戎敗秦於殽葬晉文公晉侯及秦師戰於彭衙秦師敗績晉人宋人陳人鄭人伐秦秦人伐晉晉人伐秦凡此六七條首尾若干年秦晉交兵報復曲直先後亦自瞭然可見蓋秦納文公城濮之戰攘楚又同力焉秦之徳於晉也大矣私與鄭盟秦伯之小過晉文公既隠諱之而不欲言矣迨秦潜師以襲鄭機洩不果而還晉乃邀而敗之於殽此秦人莫大之恨也蓋秦晉之人皆彊毅果敢不可屈辱讐恥所在以死必報韓原之敗晉人之辱也甚矣特以惠懐無親相繼不終文公為秦所納以仇為徳晉人無所紓其憤耳迨釁生於鄭晉人之氣遂不可遏殽師之邀匹馬隻輪無反者所以快韓原乆藴不紓之憤懣而報之於此也晋人之報復也過當而意猶未巳秦自取王官封殽尸之後見伐不復報此秦晉曲直之辨也秦之負晉也小晉之負秦也大秦悔過而晉不悔過使有明王聼之必不易斯言矣春秋不以常情恕晉亦未始以王道責秦誅怙終許改過固聖人待衰世之意也其文則史人與侯亦不必字字有義秦自殽之敗怨晉而即楚故穀梁曰秦之為狄自殽之戰始陳君舉曰楚之伯秦之力也自㓕庸以後秦為楚役衛侯使甯俞來聘左傳衛甯武子來聘公與之宴為賦湛露及彤弓詩小雅不辭又不答賦使行人私焉對曰臣以為肄習業及之也昔諸侯朝正於王朝而受政教王宴樂之於是乎賦湛露則天子當陽諸侯用命也湛露曰湛湛露斯匪陽不晞言露見日而乾猶諸侯稟王命而行諸侯敵當王所愾恨怒而獻其功王於是賜之彤弓一彤矢百玈弓矢千以覺明也報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾衛前此嘗多事矣至是事大睦鄰以安社稷皆甯俞之謀也冬十有一月壬寅夫人風氏薨程子曰自成風以後妾母稱夫人嫡妾亂矣仲子始僣尚未敢同嫡也胡傳夫人嫡體之稱也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父夫禮庶子為君為其母無服䘮服傳及服問不敢貳尊者也春秋於成風記其卒葬各以實書不為異辭者謹禮之所由變也五年春王正月王使榮叔歸含且賵含户暗反范氏曰榮叔天子之上大夫也榮采地叔字汪氏曰禮天子諸侯於妾無服而周官職䘮掌諸侯之䘮及卿大夫士凡有爵者之䘮亦不及邦國夫人之䘮也今王臣含賵則是魯以成風之䘮赴於京師矣夫人之䘮猶不當赴於王况妾母乎王之賜以含賵其失已大而魯之往赴其罪亦不可揜矣春秋王禮之施於魯者惟桓文二公為數且盛而紊瀆三綱有如此者亦可悲夫趙氏曰公穀皆云兼之非禮也據禮含賵襚止一人兼行耳若每事須一人則罄王朝之臣不足以充䘮禮之使也三月辛亥葬我小君成風胡傳仲子雖聘非惠公之嫡也春秋之初尚以為疑故别為立宫而羽數特異此雖非禮之正然不祔於姑猶有辨焉至是成風書葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也王使召伯來㑹葬召穀作毛義與歸賵同杜氏曰召伯天子卿也召采地伯爵也夏公孫敖如晉秦人入鄀音若左傳初鄀叛楚即秦又貳於楚夏秦人入鄀杜氏曰鄀本在商宻秦楚界上小國遷於南郡鄀縣高氏曰鄀蓋㣲國秦以其叛而入之其後遂為楚所并楚昭王復國之後畏呉之強去郢而都鄀秋楚人㓕六左傳六人叛楚即東夷秋楚成大心仲歸子家帥師㓕六冬楚子燮㓕蓼燮息列反蓼音了字或作鄝音同蓼國今安豐蓼縣臧文仲聞六與蓼㓕曰臯陶庭堅不祀忽諸二國皆臯陶後徳之不建其君不自修民之無援其民無辜無鄰國之救援哀哉杜氏曰六國今廬江六縣冬十月甲申許男業卒附左傳晉陽處父聘於衛反過甯晉邑汲郡修武縣也甯嬴逆旅大夫從之及温而還其妻問之嬴曰以剛商書曰沈漸似廉反猶滯溺剛克高明猶亢爽柔克夫子壹之其不没乎天為剛徳猶不干時寒暑相順况在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之晉趙成子趙衰新上軍帥中軍佐欒貞子欒枝下軍帥霍伯先且居中軍帥臼季胥臣下軍佐皆卒為六年蒐於夷起六年春葬許僖公左傳晉蒐於夷舍二軍僖三十一年晉蒐清原作五軍今舍二軍復三軍之制夷晉地前年四卿卒故蒐以謀軍帥使狐射姑狐偃子將中軍代先且居趙盾佐之代趙衰也盾趙衰子陽處父至自温往年聘往過温今始至改蒐於董河東汾隂縣有董亭易中軍易以趙盾為帥射姑佐之陽子成季之屬也處父嘗為趙盾属大夫故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為政宣趙盾諡夏季孫行父如陳附左傳臧文仲以陳衞之睦也欲求好於陳夏季文子聘於陳且娶焉趙氏曰若實如此則非禮經文當書之經既不書此説謬也杜氏曰臣非君命不越竟故因聘而自為娶按左氏曰臧孫以陳衞之睦也欲求好於陳此因行父之私行而當時為之飾詞陳衞非魯之所畏陳又未先聘於魯魯何故遽遠求好乎季友嘗再如陳行父蓋結先世之私好耳附左傳秦伯任好穆公名卒以子車秦大夫氏氏之三子奄息仲行户郎反鍼其㢘反虎為殉以俊反皆秦之良也國人哀之為之賦黄鳥君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎今縱無法以遺後嗣而又収其良以死難以在上矣君子是以知秦之不復東征也秋季孫行父如晉左傳秋季文子將聘於晉使求遭喪之禮以行聞晉侯疾故其人曰将焉用之文子曰備豫不虞古之善教也求而無之實難過求何害敖與行父競交於晉三家之張自文公始八月乙亥晉侯驩卒驩喚官反公作讙左傳晉㐮公卒靈公少晉人以難故欲立長君趙孟盾曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四徳者難必抒矣賈季狐射姑曰不如立公子樂辰嬴懐嬴也嬖於二君懐公文公立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而遠無援将何安焉杜祁杜伯之後祁姓以君故譲偪姞而上之偪姞姞姓之女生㐮公為世子故杜祁譲使在已上以狄故譲季隗文公託狄時妻而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士伯士㑹隨季如秦逆公子雍賈季亦使召公子樂於陳趙孟使殺諸郫晉地冬十月公子遂如晉杜氏曰卿共葬事文㐮之制前此雖齊桓之伯止㣲者㑹葬凡諸侯葬魯往㑹則書之其有書葬不書往者往非卿也葬晉襄公左傳襄仲如晉葬晉襄公晉殺其大夫陽處父晉狐射姑出奔狄射音亦一音夜穀作夜左傳賈季怨陽子之易其班也本中軍帥易以為佐而知其無援於晉也少族多怨九月賈季使續鞫居狐氏之族殺陽處父書曰晉殺其大夫侵官也十一月丙寅晉殺續簡伯鞫居賈季奔狄宣子使臾駢蒲賢反送其帑妻子夷之蒐賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也敵猶當也當猶報也敵惠及其身欲速報之也敵怨止其身不遷怒也夫子指宣子禮於賈季謂送其帑我以其寵臾駢為宣子所任報私怨無乃不可乎介人之寵非勇也損怨益仇非智也殺季家欲以除怨也而生宣子之忿是益仇以私害公非忠也盡具其帑與其器用財賄親帥扞之送致諸竟公羊傳晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也其漏言奈何君将使射姑將謂作中軍大夫狐穀梁曰晉将與狄戰使射姑為将軍趙盾佐之陽處父諌曰射姑民衆不説不可使将於是廢将穀梁曰陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢射姑仁其不可乎㐮公曰諾陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不説不可使将穀梁曰謂夜姑曰吾始使盾佐女今女佐盾矣射姑曰敬諾射姑怒出刺陽處父於朝而走穀梁曰㐮公死處父主竟上事射姑使人殺之穀梁傳稱國以殺罪累上也㐮公已葬其以累上之辭言之何也君漏言也餘巳見上胡傳凡書殺者在上則稱君晉侯殺其世子申生之類在下則稱氏陳侯之弟招殺陳世子偃師楚公子棄殺疾公子比之類在衆則稱人陳人殺其公子禦冦晉人殺其大夫先都之類在㣲則稱盗盗殺鄭公子騑公子發公孫輒盗殺陳夏區夫之類君與臣同殺則稱國鄭殺其大夫申侯楚殺其大夫得臣之類今殺處父者射姑耳君獨以漏言故亦預殺焉所以為後世戒也或以處父為侵官非與曰人君用人失當則其國必危凡立於朝者舉當諫况身為晉國之太傅耶若以為侵官将相大臣非其人百官有司失其職在位者當拱黙自全隂聽人主之所為至於顛危而不救則將焉用彼相乎率天下臣子為持禄容身不忠之行以誤朝迷國者必此侵官之説矣據左氏則易中軍者陽子還自衛而擅為之恐無此理據二傳乃處父宻言於襄公公不能謹而漏言以致狐射姑敢動於惡故兩下相殺而書以國殺今按凡云稱國以殺罪累上也謂見殺者本有罪而君與執政者殺之不以其罪如晉里克楚得臣之役是也陽處父言狐射姑之不可使為将此為國忠計非有罪也㐮公漏言而狐射姑殺陽處父於朝狐射姑之罪不容誅矣今書陽處父以國殺反使處父蒙罪累之名書狐射姑之出奔反不正其賤殺之罪而可乎或者處父有它罪而射姑之奔亦别有故邪是不可知矣或言處父黨於趙氏烏得無罪處父上趙盾意雖私而言則公未可逆詐而遂以為罪也閏月不告月猶朝于廟告音牿左傳閏月不告朔非禮也經稱告月傳稱告朔明告月必以朔閏以正時置閏便四時不差時以作事事以厚生事不失時則民食足民用給生民之道於是乎在矣不告閏朔棄時政也何以為民趙氏曰天子常以今年冬班明年正朔於諸侯諸侯受之每月奉月朔甲子以告於廟所謂稟正朔也故曰王正月言王之所以班也因以特牲薦謂之告月亦曰告朔故論語云子貢欲去告朔之餼羊也文公以閏非正不行告朔之禮而以其朔日但身至廟拜謁而巳故曰猶朝於廟告於廟則謂之告朔因以聽此月之政則謂之視朔啖氏曰公穀言不告月為是非也按經文言不告月明當告也劉氏曰公羊以為不告朔禮也猶朝於廟非禮也穀梁曰閏月者附月之餘日也天子不以告朔而喪事不數也皆非也閏雖無常而政有常可得勿告乎汪氏曰考之經傳凡言閏月多在嵗終盖是時厯法差謬每置閏於嵗終故左傳以閏三月為非禮則無中氣者不謂之閏而名曰閏者非閏月矣秦之後九月實昉於此宜當時之卿大夫以天無是月而導其君以廢告朔之禮也按猶三望猶者可巳之辭也望郊之細也不郊矣以為無望可也猶朝於廟欲已而不盡巳之辭也朝廟為告月也朝廟視朔皆不可巳也猶朝於廟而朔可不告乎此經文之意也公穀㮣曰猶者可以巳非也七年春公伐邾左傳間晉難也三月甲戌取須句句公作胊左傳寘文公子焉邾文公子叛在魯使為須句大夫非禮也杜氏曰須句魯之封内屬國也僖公反其君之後邾復㓕之書取易也邾文公子叛在魯故公使為守須句大夫絶太皥之祀以與鄰國叛臣故曰非禮僖公雖無崇明祀保小寡之實心然以母家之故猶依違其迹文公乘伯國之衰貪土地而舍逋逃其罪益甚矣遂城郚郚音吾杜氏曰因伐邾師以城郚郚魯邑卞縣南有郚城備邾難夏宋公王臣卒穀作壬臣其弟禦殺世子而自立國人殺禦而立公之少子杵臼是為昭公宋人殺其大夫左傳夏宋成公卒於是公子成為右師荘公子公孫友為左師目夷子樂豫為司馬戴公𤣥孫鱗矔古亂反為司徒桓公孫公子蕩為司城桓公子也以武公名廢司空為司城華御事為司寇華元父也傳言六卿皆公族昭公不親其親所以致亂昭公将去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇隂矣葛藟猶能庇其本根故君子以為此詩人取以喻九族兄弟况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以徳皆股肱也誰敢攜貳若之何去之不聽穆㐮之族昭公所欲去者率國人以攻公殺公孫固公孫鄭於公宫六卿和公室樂豫舍司馬以譲公子卬昭公弟昭公即位而葬葬宋成公書曰宋人殺其大夫不稱名衆也且言非其罪也趙氏曰若以殺大夫衆而不書名則晉殺三郤鄭盜殺大夫何乃悉書乎左氏妄也胡傳書宋人者國亂無政非君命而衆人擅殺之也杜氏曰二子在公宫為亂兵所殺大夫不名義繋於殺大夫而其名不足紀也戊子晉人及秦人戰于令狐晉先蔑奔秦令力呈反蔑公作昧奔上有以師字左傳秦康公送公子雍於晉曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴日抱太子以啼於朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君将焉寘此穆嬴㐮公夫人靈公母也出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪畏國人以大義來偪巳乃背先蔑而立靈公以禦秦師箕鄭居守趙盾将中軍先克佐之克先且居子代狐射姑荀林父佐上軍箕鄭将上軍居守故佐獨行先蔑将下軍先都佐之步招御戎戎津為右及堇隂晉邑宣子曰我若受秦秦則賓也不受寇也既不受矣而復緩師秦将生心先人有奪人之心軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起蓐音辱早食於寢蓐也戊子敗秦師於令狐至於刳首巳丑先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然将及攝卿以往可也何必子同官為寮吾嘗同寮敢不盡心乎弗聽及亡荀伯林父盡送其帑及其器用財賄於秦曰為同寮故也士㑹在秦三年不見士伯失蔑其人曰能亡人於國不能見於此焉用之士季曰吾與之同罪俱有逆公子雍之罪非義之也将何見焉及歸遂不見張氏曰河中府猗氏縣有令狐城高氏曰先蔑以自令狐復如秦故不言出也左氏前年稱使先蔑士㑹如秦逆公子雍今年拒秦師又稱先蔑將下軍則知往逆后嘗還矣按晉國自奚齊之亂晉大夫習於廢置君以収權寵故㐮公卒於是期年謀立君尚未定也有是理乎所謂以難故欲立長君果國人之同心乎抑二三執政之私也以穆嬴直言而宣子與諸大夫皆患之觀之則為執政之私也明矣夫㐮公有適嗣舍之不立而外求君其義甚不直趙盾強臣也欲弑君則弑君何難於孤児寡婦寧變前計禦秦師者義實不爾克也奕者舉棋不定不勝其耦况置君乎或者猶謂趙盾能曰使能國之利也夫不明理不勝私而惟能之自用其有不為邪者鮮矣春秋以晉為志乎是戰也故書及其罪盾也深矣乃若秦晉五年四戰穆公晚而悔過康公亦可以知創矣我送舅氏曰至渭陽何不能充是心乎身死未㡬扶庶孽而欲奪其子則亦不待貶絶而可併見矣啖氏曰傳云敗秦師非也按經書戰明二師相抗敵矣傳云潛師夜起與經乖矣又上言背先蔑立靈公明蔑在秦也次言先蔑将下軍則是在晉也何其自相背經言先蔑奔秦不言出明在外矣言背可也言将下軍非也蓋先蔑時為下軍将而身在秦故致誤也按啖子之辯是矣但先蔑若在秦未嘗歸則經安得書奔秦則先蔑是逆雍之後還至令狐乃復奔秦也惟先蔑将下軍一句明是傳誤也狄侵我西鄙左傳狄侵我西鄙公使告於晉趙宣子使因賈季問鄷舒狄相且譲之鄷舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也秋八月公㑹諸侯晉大夫盟于扈左傳齊侯宋公衞侯鄭伯許男曹伯㑹晉趙盾盟於扈晉侯立故也公後至故不書所㑹謂不具列公侯及卿大夫爵氏凡㑹諸侯不書所㑹後也杜氏曰扈鄭地滎陽卷縣西北有扈亭劉氏曰左氏云公後至不書所㑹非也按經公與盟矣何謂後㑹乎杜云公後㑹而及其盟此飾非之言㑹盟同地㑹所以為盟也今及其盟不得云後㑹盟重㑹輕不當誚責其輕又巳稱公㑹諸侯矣豈不及其㑹者乎按經凡書諸侯者皆前目後凡惟此獨前無諸侯之目若無左氏則不知其為齊宋衛陳鄭許曹七國之君諸家皆祖左氏公後至之説然夫子明書公㑹安得自以為公後至耶劉氏辯之當矣惟許氏謂大夫而主諸侯之盟自扈之盟始君子惡之崔氏謂是時晉侯新立諸侯相與㑹於晉地而聽事事焉晉侯不能降禮乃使大夫抗禮以盟諸侯此諸侯之恥而晉之罪也故不序諸侯不名晉大夫以畧之此二説似亦可通但是時靈公幼冲趙盾專國謂晉侯不能降禮乃使大夫盟諸侯則誤也直責趙盾之無禮則可耳冬徐伐莒公孫敖如莒涖盟公穀作莅左傳穆伯娶於莒曰戴巳生文伯其娣聲巳生惠叔穆伯公孫敖也文伯穀也惠叔難也戴巳卒又聘於莒莒人以聲巳辭則為襄仲聘焉㐮仲公孫敖從父昆弟冬徐伐莒莒人來請盟穆伯如莒涖盟且為仲逆及鄢陵莒邑登城見之美自為娶之仲請攻之公将許之叔仲惠伯叔牙孫諌曰臣聞之兵作於内為亂於外為寇寇猶及人亂自及也今臣作亂而君不禁以啟寇讐若之何公止之惠伯成之平二子使仲舍之舍不娶公孫敖反之還莒女復為兄弟如初從之八年春王正月夏四月附左傳秦人伐晉取武城以報令狐之役秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍盾徒本反雍於用反左傳晉人以扈之盟來討冬襄仲㑹晉趙盾於衡雍報扈之盟也按天王崩諸侯不奔喪而兩國之大夫自相㑹盟於王畿之内惡莫大焉又大夫之專盟自是始也前此盟翟泉猶有僖公在㑹也繼此而有袁婁之盟雞澤溴梁諸侯皆在而大夫自盟矣於宋於虢則晉楚之大夫狎主齊盟而諸侯不復在矣張氏曰後漢河南卷縣有恒顒城古衡雍也高氏曰衡雍晉文公㑹諸侯朝王之處按左氏以前年扈之盟為公後至故以今盟為晋人以扈之盟來討故公子遂再往㑹晉盟也後至之説前已辨矣則今盟非為討扈之盟而報也後至不當時見責乃踰一年而後討乎乙酉公子遂㑹雒戎盟于暴雒洛同雒戎公作伊雒戎左傳遂㑹伊雒之戎杜氏曰諸戎雜居伊水雒水之間暴鄭地何氏曰四日不能再出不卒名者卒竟也竟但舉名非一事再見也按宣元年公子遂如齊三月遂以夫人婦姜至自齊傳云遂何以不稱公子一事而再見者卒名也一事而再見謂如齊為逆夫人也故於其至也卒名而巳此盟晉盟戎非一事再見故兩稱公子遂以見晉戎同使又各舉其地以謹華夷之辨也胡氏謂再稱公子各日其㑹正其名與地以深别之是也自壬午至乙酉四日之間不能再出知再書公子遂者謹戎之盟也左氏云珍之也大夫無遂事權臣專行而莫之忌雒邑王都所在戎醜居之無制甚矣不能攘却又盟好是修乃以專命竟外為得事之宜而珍之可乎自秦晉遷陸渾之戎於伊川不惟亂華而其逼周亦甚自是伊雒之戎世為周患他日王謂晉人曰先王居檮杌於四裔以禦魑魅故允姓之姦居於瓜州伯父惠公歸自秦而誘以來使逼我郊甸戎有中國誰之咎也由此觀之則秦晉之罪不可勝誅矣魯以千乗之國戎在千里之外保境却敵無他䇿而以望塵納好為得宜不亦悖哉公孫敖如京師不至而復公無二字丙戌奔莒左傳穆伯如周弔喪不至以幣奔莒從巳氏焉孫氏曰公子遂如齊至黄乃復以疾而還義猶不可况敖如京師不至而反乎朱子曰只不至而復便是大不恭魯亦不再使人往皆罪也文定只貶他從已氏之過經文元不及此事汪氏曰敖以乙酉如京師而以丙戌奔則受命而不行可知矣天王之喪赴告及魯已三越月仲遂盟戎近在王畿之側若罔聞知徐遣敖方共弔事具文而往不至而復逃使而奔敖則不容誅矣魯侯亦思先君成風之喪王使再臨含賵㑹葬致禮於吾者如是之盡乎謂當亟遣大夫繼之而親送葬可也遷延不行而毛伯求金得臣㑹葬不待貶絶而其罪見矣螽宋人殺其大夫司馬宋司城來奔左傳宋㐮夫人㐮王之姊也昭公適祖母昭公不禮焉夫人因戴氏之族華樂皇以殺㐮公之孫孔叔公孫鐘離及大司馬公子印皆昭公之黨也司馬握節符信以死示不廢命故書以官司城蕩意諸來奔意諸公子蕩之孫效節於府人而出公以其官逆之皆復之請宋而復之司城官属悉來奔故言皆復亦書以官皆貴之也按宋昭公下忌其公族上不能其祖母以致再亂為亂者戴氏之族而書宋人非一人也見昭公無政而臣庶得以擅殺大夫也大夫者孔叔公孫鐘離也而不名義繫於殺大夫而其名不足紀也司馬者公子印司城者蕩意諸也又特以官舉者昭公踈忌其族而欲寵其私昵故樂豫舍司馬以譲公子印夫司馬掌兵之官必選衆舉賢使素有威望為國人所畏服者居其任故華督欲為難而憚孔父子魚在而㐮公㡬伯樂豫之言曰公族公室之枝葉也若去之則本根無所庇廕矣又曰親之以徳皆股肱也誰敢攜貳使昭公用樂豫之言而不替其任則豈但無亂而已言既不用公又未有悛志樂豫知亂未已也故舍司馬以譲公子卬卬之為司馬昭公之欲也主兵而為人所殺若易易然夫已殺三子而奔意諸其奚難於君乎故書宋人殺大夫二子又以官舉以示君失其道官非其官其效至於一國作亂之明戒也左傳司馬握節以死司城效節於府人而出傅㑹之枝辭公羊宋三世無大夫三世内娶之説無理之甚可置於不足辨彼乃言之至再何也附左傳夷之蒐晉侯将登箕鄭父先都登之於上軍而使士縠梁益耳将中軍士縠本司空先克曰狐趙之勲不可廢也從之先克奪蒯得田於堇隂先克中軍佐盖以軍事奪其田七年禦秦師於堇隂故箕鄭父先都士縠梁益耳蒯得作亂九年春毛伯來求金左傳九年春王正月己酉使賊殺先克乙丑晉人殺先都梁益耳殺先克不赴故不書殺先都經書二月從告左傳毛伯衛來求金非禮也不書王命未葬也公羊傳毛伯者何天子之大夫也何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封内三年稱子也踰年稱公矣則曷為於其封内三年稱子縁臣民之心不可一日無君縁始終之義一年不二君不可曠年無君縁孝子之心則三年不忍當也毛伯來求金何以書譏何譏爾王者無求求金非禮也穀梁傳求車猶可求金甚矣程子曰家父致命以徴車故書使來求毛伯風魯以求金故不云王使夫人姜氏如齊趙氏曰凡夫人行皆書比於公也趙氏曰諸侯之女既嫁父母存則歸寧不然則否今則不爾故書曰如如者朝聘之名非婦人之事若合禮者之歸寧則當云寧於某左氏例云夫人歸寧曰如某此説非也據經文所書者皆以非禮故也按此出姜也齊昭公之女或言其有所不安而歸寧以愬於父母趙氏以父母在歸寧即合禮不書此書者以非常故也要之書如書至有故存焉為十八年歸齊張本則曉然者二月叔孫得臣如京師辛丑葬㐮王左傳荘叔如周葬襄王公羊傳王者不書葬此何以書不及時書過時書我有往者則書穀梁傳天子志崩不志葬舉天下而葬一人其道不疑也志葬危不得葬也不得備禮葬晉人殺其大夫先都三月夫人姜氏至自齊胡傳夫人與君敵體同主宗廟之事出必告行反必告至則書於䇿然它有行者或曰享或曰㑹或曰如未有致之者則其行非禮以不致見其罪也出姜如齊以寧父母於禮得行矣其致者出姜至是蓋不安於魯故至而特書家氏曰因歸寧而見義非為歸寧而得書也文公無正家之法強臣僣妾比而為姦庶子奪嫡有萌而不悟春秋特書以正之晉人殺其大夫士縠及箕鄭父左傳三月甲戌晉人殺箕鄭父士縠蒯得杜氏曰梁益耳蒯得不書皆非卿胡傳稱人以殺者國亂無政衆人擅殺之稱也何以知其非討賊之辭書殺其大夫則知之矣三大夫皆強家也求專晉不得挾私怨以作亂而使賊殺其中軍佐則固有罪矣曷為不去其官當是時晉靈初立主幼不君政在趙盾而中軍佐者趙盾之黨也若獄有所歸則此三人者獨無可議從末减乎而皆殺之是大夫專生殺而政不自人主出也故不稱國討不去其官而箕鄭父書及示後世司賞罰者必本忠恕無有黨偏之意其義精矣按左氏言夷之蒐本使狐射姑将中軍趙盾佐之以陽處父之言而易其班故狐射姑殺陽處父又稱是蒐也将登箕鄭父先都使士穀梁益耳将中軍以先克之言而止故箕鄭父作亂使賊殺先克此一事也而兩言之蓋㐮公先欲用狐射姑将中軍趙盾佐之又欲用士穀梁益耳而先克曰狐趙之勲不可廢也㐮公因是而止而陽處父又薦趙盾之能曰不如使仁者佐賢者趙盾賢射姑仁於是㐮公又易其班使射姑佐盾是時諸大夫皆有不平之心矣狐射姑首起而殺處父射姑出奔而先克代之諸大夫滋不平矣故先都等以失職怨望而作亂左傳首箕鄭父而經重士縠蓋士縠有元帥之望㐮公所先擬而趙盾所尤忌箕鄭父先都等則倡謀擁和者耳前後陽處父先克之見殺狐射姑之奔士縠箕鄭父先都梁益耳之死皆以盾之越次而為中軍帥故也彼亂者固有罪矣盾為政不平以其私而皆殺之其可免於誅乎故春秋殺稱人而死者不去其官殺稱人以見非君意不得以累上之辭書之死者不去其官以見非國討其權衡精矣楚人伐鄭公子遂㑹晉人宋人衞人許人救鄭左傳范山言於楚子曰晉君少不在諸侯北方可圖也范山楚大夫楚子師於狼淵以伐鄭陳師狼淵為伐鄭援也潁川潁隂縣西有狼陂囚公子堅公子尨及樂耳三子鄭大夫鄭及楚平公子遂㑹晉趙盾宋華耦衛孔達許大夫救鄭不及楚師卿不書緩也以懲不恪華耦華父督曽孫按楚自城濮之役不得志於中國兵不加於鄭者十五年矣其君臣之心曷嘗一日忘哉故靈公立趙盾為政范山言於楚子曰晉君少不在諸侯北方可圖也夫以晉君臣之志不在諸侯其迹未有形於外也猶主夏盟諸侯未叛范山奚自而窺知之哉盖於其他行事而得之也以經之所書而觀之公㑹諸侯晉大夫盟於扈晉侯立故也趙盾強諸侯為此盟也自是之外則二三大夫争於寵利報怨市權自相專殺而巳千載之下猶足以知之而况當時乎楚商臣弑君之賊身負討而不忌見可侮而動師於狼淵以伐鄭嘗中國也宋殺申無畏也楚荘投袂而起履及於窒皇劍及於寝門之外車及於蒲胥之市彼蠻荆猶如此而趙盾以全盛未少挫衂之晉合四國之師名曰救鄭乃遷延猶豫不及楚師而還楚得氣去明年而有厥貉之次矣晉遂不競而楚荘伯也趙盾為之也故晉趙盾宋華耦衞孔達皆國卿畧而書人賤之也公子遂不在貶者諸魯事自非指為其國褒貶則皆從國史然賤諸卿則遂可知矣夏狄侵齊附左傳夏楚侵陳克壺丘陳邑以其服於晉也秋楚公子朱息公自東夷伐陳陳人敗之獲公子茷扶廢反陳懼乃及楚平秋八月曹伯㐮卒九月癸酉地震公羊傳地震者何動地也何以書記異也穀梁傳震動也地不震者也震故謹而日之也杜氏曰地道安静以動為異按周伯陽甫曰天地之氣不過其序若過其序民亂之也陽伏而不能出隂迫而不能升應劭曰隂迫陽使不能升也於是有地震劉向説此年地震曰臣下強盛者将動為害後宋魯晉莒鄭陳齊皆殺君京房曰臣事雖正專必震大要地道以静為體以順為正安而承天者也逆其常理而不得節焉則震而不安其所承矣諸侯變而不承天子大夫變而不承諸侯外域變而不承中國之象也是時諸侯無王天下無伯弑君簒國者比肩接迹至連宋魯晉莒鄭陳齊七國皆弑而楚子討徴舒之亂遂以夷狄而正諸夏矣夷猾夏猶可言也夷正諸夏不可言也入春秋百餘年書地震始此世遠史文畧也自此至哀公五書冬楚子使椒來聘椒穀作萩見楚君臣始並經左傳楚子越椒來聘子越椒令尹子文從子陸氏曰公羊云椒者何楚大夫也楚無大夫此何以書始有大夫也始有大夫則何以不氏許夷狄者不壹而足也不驟繩以中國之禮貴之也按例凡未命之卿來魯皆書名無他義又文公以前不書楚大夫者好命未通耳有何許之乎趙氏曰穀梁云楚無大夫其曰椒何也以其來我褒之也聖人設教豈以來我則褒之蓋不知内外異辭之理故妄説也按楚始以號舉狄之也既而書人至是其君書爵其臣書名而稱使非漸進之也見其浸強耳范山曰晉不在諸侯北方可圖也加兵於鄭通使於魯何為者哉假曰進之則楚子執宋公以伐宋亦從而楚子之矣豈進其虐中國耶楚椒秦術秦楚未有族也秦人來歸僖公成風之襚音遂僖公成風妾母繫子之辭也左氏以雖不當事無忘舊好為禮公羊氏以兼之為非禮據王使榮叔歸含且賵趙子曰譏天王厚禮妾母也此歸禭穀梁曰秦人弗夫人也即外之弗夫人而見正焉弗夫人言不稱為夫人也僖公夫人其妾母而稱諸異邦不能使人無異辭春秋因秦人之辭而實書之以見正其義嚴矣秦逺國因有翟泉之盟追贈僖公并及成風事理自是如此何得以兼之為非哉亦非以子而先母也婦人夫死從子况妾母之於國君自當繫子為稱若曰不可以子先母則須曰成風僖公豈可乎葬曹共公十年春王三月辛卯臧孫辰卒哀伯之孫文仲也其子許嗣為大夫是為宣叔夏秦伐晉左傳春晉人伐秦取少梁馮翊夏陽縣夏秦伯伐晉取北徴徵如字三蒼云縣屬馮翊音懲又一音張里反按秦下當有闕文或云晉舍適嗣而外求君既而悔之正矣秦不顧是非惟以報復為事故狄之恐非楚殺其大夫宜申左傳初范巫矞似矞似范邑之巫謂成王與子玉子西曰三君皆将強死城濮之役王思之故使止子玉曰母死不及止子西子西縊而縣絶在僖二十八年王使適至遂止之使為商公楚邑今上雒商縣沿漢泝江将入郢王在渚宫水中小洲曰渚下見之懼而辭曰臣免於死又有讒言謂臣将逃臣歸死於司敗也陳楚名司冦為司敗王使為工尹又與子家謀弑穆王穆王聞之五月殺鬭宜申及仲歸仲歸子家不書非卿宜申謀弑穆王而楚殺之討罪也稱國以殺而不去其官何也曰穆王者即世子商臣也而春秋之義㣲矣自正月不雨至于秋七月穀梁傳歴時而言不雨文不閔雨也不閔雨者無志乎民也及蘇子盟于女栗左傳頃王立故也杜氏曰女栗地名闕蘇子周卿士僖十年狄㓕温蘇子奔衞今復見蓋王復之趙氏曰公及之也不書公諱獨與天子大夫盟王氏曰襄王喪葬公未嘗往頃王既立公又不朝乃及王臣私相要言臣子之義安在哉陸氏曰畿内諸侯皆曰子殷制已然箕子㣲子是也周因之王臣稱子皆畿内諸侯也蘇子劉子單子尹子是也冬狄侵宋楚子蔡侯次于厥貉厥公作屈音同貉音麥左傳陳侯鄭伯㑹楚子於息冬遂及蔡侯次於厥貉将以伐宋宋華御事華元父曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋大藪也在梁國睢陽東北宋公為右盂鄭伯為左盂盂田獵陳名期思公復遂為右司馬復遂期思邑公今弋陽期思縣子朱及文之無畏為左司馬将獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧燧取火者宋公違命無畏抶其僕以徇或謂子舟無畏字曰國君不可戮也子舟曰當官而行何彊之有敢愛死以亂官乎厥貉之㑹麇子逃歸麇九倫反杜氏曰厥貉地名闕将伐宋而未行故書次陳鄭及宋麇子不書者宋鄭執卑苟免為楚僕任受役於司馬麇子恥之遂逃而歸三君失位降爵故不列於諸侯宋鄭猶然則陳侯必同也按楚猾中國蔡未嘗不從桓文之伯而終不能得蔡桓一侵蔡而蔡終不與桓之㑹晉文僅能致蔡於踐土與温翟泉而尋復即楚蔡之與楚堅矣厥貉之㑹書楚子蔡侯而陳鄭宋麇不書杜預謂麇子恥為僕役而逃歸三君失位降爵故不列於諸侯是也盖前年楚伐鄭鄭與楚平陳敗楚偏師而懼不待其討而又輸平於是合三服國挾其威而徐以臨宋宋人曰楚欲弱我也我實不能民何罪盍先為之弱乎乃逆楚子勞且聽命此其異於降者特不肉袒牽牲靣縛御璧耳使為左盂右盂以辱之司馬令之又以違命刑之自入春秋以來有甚於斯者乎故三國以失位從其實而不書而書楚子蔡侯其義㣲而實顯矣胡氏謂三國之從有不得巳者蔡無四境之患而志在從狄故專罪之夫蔡之為楚也乆矣豈至今日而始責之乎十有一年春楚子伐麇俱倫反公作圈楚始書君将左傳楚子伐麇成大心子玉之子大孫伯也敗麇師於防渚麇地潘崇復伐麇至於錫穴麇地杜氏曰麇水國近楚鄭氏曰在均州鄖鄉縣夏叔仲彭生㑹晉郤缺于承筐公穀無仲字郤去逆反筐公穀作匡此大夫特相㑹之始左傳夏叔仲恵伯㑹晉郤缺於承筐謀諸侯之從楚者杜氏曰承筐宋地在陳留㐮邑縣西胡傳禮之始失也諸侯非王事而自相㑹也無以正之不自天子出矣然後諸侯與大夫㑹又無以正之然後大大與大夫㑹禮亦不自諸侯出矣田氏簒齊六卿分晉三家專魯理固然也不能辨於早雖欲正之其将能乎此傳原在宣十五年無婁之㑹下内大夫特㑹外大夫五郤缺承筐高固無婁荀首於穀士匄於柯荀躒適歴秋曹伯來朝左傳秋曹文公來朝即位而來見也公子遂如宋左傳㐮仲聘於宋且言司城蕩意諸而復之因賀楚師之不害也狄侵齊冬十月甲午叔孫得臣敗狄于鹹音咸三傳長狄之説無闗經義十有二年春王正月郕伯來奔郕公作盛左氏謂郕太子朱儒自安於夫鍾郕邑國人弗徇順也郕伯卒郕人立君太子以夫鍾與郕邽音圭二邑名來奔公以諸侯逆之故書曰郕伯來奔不書地尊諸侯也趙氏曰按諸侯嗣位未踰年猶稱子豈有君父病而不視死而不喪身未即位以邑出奔而稱郕伯且鄭忽曹羈莒展皆巳即位及其出奔猶但稱名况未嗣位乎且春秋正王綱之大節乃云為魯以諸侯逆之故書曰郕伯是乃春秋之紊王綱也一何厚誣哉失地之君例書名若以兄弟之國不名公羊曰失地之君也何以不名兄弟辭也曹伯陽衞侯衎何以名乎孫氏曰荘八年郕降於齊師入齊為附庸此又來奔為齊所偪耳把伯來朝二月庚子子叔姫卒叔上左無子字趙氏曰時君之女故曰子以别於先君之女也季氏曰公穀以為姊妹者非啖氏曰左氏云把桓公來朝始朝公也且請絶叔姫而無絶婚立其娣以為夫人也公許之二月叔姫卒不言把絶也書叔姫言非女也此傳大誤當在成八年誤置此爾義見成九年把伯來逆叔姫之喪注穀梁傳此未適人何以卒許嫁矣婦人許嫁字而筓之死則以成人之喪治之夏楚人圍巢左傳楚令尹大孫伯卒成嘉為令尹若敖曽孫子孔羣舒叛楚羣舒偃姓舒庸舒鳩之属今廬江南有舒城舒城西南有龍舒夏子孔執舒子平平舒君名及宗子遂圍巢宗巢二國羣舒之属杜氏曰巢呉楚間小國廬江六縣東有居巢城秋滕子來朝秦伯使術來聘術公作遂左傳秦伯使西乞術來聘且言将伐晉㐮仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器圭璋也寡君敢辭玉對曰不腆敝器不足辭也主人三辭賓客曰寡君願徼福於周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節節信也出聘必告廟故稱先君之器要結好命所以藉寡君之命結二國之好是以敢致之㐮仲曰不有君子其能國乎國無陋矣厚賄之按中國有伯楚常為敵而秦不同盟今而使命交聘於魯豈嘉其有禮而書之哉志事之漸也此衰彼進謹之也秦言将伐晉魯主晉故為之禮外大夫來魯未命者例書名公羊云秦無大夫此何以書賢繆公也非也冬十有二月戊午晉人秦人戰于河曲左傳秦為令狐之役故冬秦伯伐晉取覊馬晉邑晉人禦之趙盾将中軍荀林父佐之林父代先克郤缺将上軍代箕鄭㬰駢佐之代林父欒盾将下軍枝之子代先蔑胥甲佐之臣之子代先都范無恤御戎代步昭以從秦師於河曲臾駢曰秦不能乆請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰七年奔秦若何而戰對曰趙氏新出其屬曰臾駢必實為此謀将以老我師也㬰駢趙盾屬大夫新出佐上軍趙有側室支子曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可肆暫往而退也秦伯以璧祈戰於河十二月戊午秦軍揜晉上軍趙穿追之不及上軍不動趙穿獨追之反怒曰裹粮坐甲固敵是求敵至不擊将何俟焉軍吏曰将有待也穿曰我不知謀将獨出乃以其屬出宣子曰秦獲穿也獲一卿矣僖三十二年晉侯以一命命郤缺為卿不在軍帥之數然則晉自有散位從卿者秦以勝歸我何以報乃皆出戰交綏古名退兵為綏秦晉志未能堅戰短兵未至争而両退故曰交綏秦行人夜戒晉師曰兩君之士皆未憖也憖缺也明日請相見也臾駢曰使者目動而言肆聲放失常節懼我也将遁矣薄迫也諸河必敗之胥甲趙穿當軍門呼曰死傷未収而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕趙氏曰凡戰不言及交為主也如秦初伐晉而退晉復追之至河曲傳云從秦師於河曲交戰之類是也穀梁云秦晉之戰巳亟故畧之蓋不曉交為主之意遂妄為此説自殽至此凡六交兵秦晉亟戰而楚伯矣晉主夏盟而君幼國偷軍謀不一其始見於河曲之戰其甚見於邲之敗蓋一轍也季孫行父帥師城諸及鄆鄆公作運後同杜氏曰鄆莒魯所争者城陽姑幕縣南有員亭員即鄆也以其遠偪外國故帥師城之孫氏曰帥師曰城畏莒故也李氏曰成九年楚公子嬰齊伐莒入鄆㐮十二年季孫宿救台遂入鄆至昭元年取鄆其秋叔弓疆鄆田即此至昭二十五年齊侯取鄆以居公二十九年鄆潰此一鄆之始終也其成四年城鄆乃西鄆也十有三年春王正月附左傳晉侯使詹嘉處瑕以守桃林之塞詹嘉晉大夫賜其瑕邑命帥衆守桃林以備秦桃林在𢎞農華隂東潼闗夏五月壬午陳侯朔卒附左傳晉人患秦之用士㑹也夏六卿相見於諸浮将欲密謀慮其漏泄故出就外野諸浮盖近郊地趙宣子曰随㑹在秦賈季在狄難日至矣若之何中行桓子曰荀林父也僖二十八年始将中行故以為氏請復賈季能外事本是狄人習竟外之事謂知狄之情且由舊勲狐突之孫狐偃之子郤成子曰賈季亂性行不順且罪大殺陽處父不如随㑹能才能愈於賈季賤而有恥柔而不犯又言性行淳良其知足使也且無罪乃使魏夀餘畢萬之後偽以魏叛者以誘士㑹執其帑於晉使夜逸請自歸於秦秦伯許之履士㑹之足於朝秦伯師於河西将取魏魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先使士㑹士㑹辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也辭行示無去志秦伯曰若背其言所不歸爾帑者有如河乃行繞朝秦大夫贈之以䇿服䖍云䇿書杜預云馬曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏士㑹堯後劉累之裔别族復累之姓邾子􅕋蒢卒􅕋其居反蒢文居反左傳邾文公卜遷於繹邾邑魯國鄒縣北有繹山史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷於繹五月邾文公卒君子曰知命自正月不雨至于秋七月世室屋壊世左穀作大音泰左傳秋七月大室之屋壊書不共也公羊傳世室者何魯公之廟也周公稱太廟魯公稱世室羣公稱宫曷為謂之世室世世不毁也周公何以稱太廟於魯封魯公以為周公也周公拜乎前魯公拜乎後始受封時拜於文王廟也曰生以養周公生以魯國供養周公死以為周公主魯公為周公祭祀主也言曰者成王始授其茅土之詞然則周公之魯乎曰不之魯也封魯公以為周公主然則周公曷為不之魯欲天下之一乎周也世室屋壊何以書譏何譏爾乆不修也穀梁傳太室屋壊譏不修也禮宗廟之事君親割夫人親舂敬之至也為社稷之主而先君之廟壊極稱之不復依違其文志不敬也何氏曰不月者蒙上月冬如晉衛侯㑹公于沓徒答反公㑹下公無字狄侵衛十有二月己丑公及晉侯盟公還自晉還上公穀無公字鄭伯㑹公于棐芳尾反穀作斐左傳冬公如晉朝且尋盟衞侯㑹公於沓請平於晉公還鄭伯㑹公於棐亦請平於晉公皆成之杜氏曰沓地闕棐鄭地高氏曰凡言公及諸侯㑹者皆公往與之㑹也沓之㑹公巳出魯而衞侯因公之将如晉而來㑹棐之㑹鄭伯因公還未至於魯而就㑹之故皆曰㑹公愚按此因承筐之㑹郤缺來謀諸侯之從楚者故公親如晉而二國因之以求成也下泉小國困於大國之陵暴而思周之詩也曰芃芃黍苗隂雨膏之四國有王郇伯勞之傷今之不然也觀衞鄭二國之情亦可見矣觀衞鄭二國之汲汲於晉則陳蔡諸國之不得巳於楚又可見矣惟無明王賢伯以収之耳晉之不在諸侯也乆矣救鄭而不及宋伐而不救使三國折而從楚誰之咎也乃始以謀貳為辭求諸人者厚而在我無可恃之實徒勤諸侯盟亦何益矣故特書公如晉衞侯鄭伯㑹公以明諸侯之情志晉政之偷也十有四年春王正月公至自晉附左傳春頃王崩周公閲與王孫蘇争政故不赴凡崩薨不赴則不書禍福不告亦不書懲不敬也邾人伐我南鄙叔彭生帥師伐邾家氏曰魯以七年伐邾取須句邾人不能報至是興南鄙之師左氏乃謂邾人討魯之不敬謂邾文公之卒也魯使弔焉不敬故來討彼小國安敢責禮於大國亦修怨耳春秋聨書所以交責之也夏五月乙亥齊侯潘卒左傳子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國商人桓公子而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位附左傳邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉六月公㑹宋公陳侯衞侯鄭伯許男曹伯晉趙盾癸酉同盟于新城左傳從於楚者服且謀邾也謀納捷菑穀梁傳同者有同也同外楚也杜氏曰新城宋地在梁國穀熟縣西蜀杜氏曰趙盾專政主諸侯㑹盟書日以謹其惡也按向也扈之盟不序諸侯此其復序何諸夏之志也曰同盟衆辭也且不與晉以主是盟也附左傳秋七月乙卯夜齊商人弑舍而讓元元商人兄惠公也書九月從告元曰爾求之乆矣我能事爾爾不可使多蓄憾不為君則恨多将免我乎爾為之秋七月有星孛入于北斗孛音佩左傳有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆将死亂公羊傳孛者何彗星也其言入於北斗何北斗有中也何以書記異也穀梁傳孛之為言猶弗也其曰入北斗斗有環域也杜氏曰既見而移入北斗孫氏曰偏指曰彗光芒四出曰孛孔氏曰彗星長有尾入于北斗杓口公至自㑹晉人納捷菑于邾弗克納捷公作接菑側其反左傳晉趙盾以諸侯之師八百乗六萬人納捷菑於邾邾人曰齊出貜且長宣子曰辭順而弗從不祥乃還公羊傳納者何入辭也其言弗克納何大其弗克納也趙氏曰此乃譏其不量事而勞師爾聞義能止差足補過何足大之哉何大乎其弗克納晉郤缺帥師革車八百乗以納接菑於邾婁力沛若有餘而納之邾婁人言曰接菑晉出也貜且齊出也出外孫也子以其指指手指則接菑也四貜且也六言俱不得天之正性正今按指手指接菑也四貜且也六言俱不得天之性此何氏本注也文意自明疏乃妄説指麾邾婁又以四六為子之譬殊可笑也貜且盖枝指也庶子以大國壓之則未知齊晉孰有之也貴則皆貴矣雖然貜且也長按此一叚辭氣從容而理自難奪可為辭命之法程子所謂理勝則事明氣忿則招拂豈不信哉不煩干戈強敵自屈而退辭亦貴哉郤缺曰非吾力不能納也義實不爾克也引師而去之此晉郤缺也其稱人何貶曷為貶不與大夫專廢置君也趙氏曰按例宣公以後侵伐多書卿名文公以前皆稱人不應此獨以人為貶也縱令諸侯豈得專廢置君何但大夫此直譏之耳非實與而文不與也又曰若實用諸侯師經不合不書故知左氏妄也按納捷菑者左氏以為趙盾公羊以為郤缺穀梁以為郤克左氏是楚方圖中國而晉區區納一亡公子於邾又以少奪長見辭於邾穀梁曰長轂五百乘緜地千里過宋鄭滕薛敻入千乘之國欲變人之主至城下然後知何知之晚也按捷菑之不當納晉人非至城下而後知也直欲以大國之勢強納之耳無名興師氣先不壮又聞邾人之言直故陽為為義而却其實慮納之而終不能定齊人來争後必多事故不得不已耳大凡趙盾之舉措每如是也邾小國而云夐入千乗之國則知革車八百乘亦此類耳附左傳周公将與王孫蘓訟於晉王叛王孫蘇王匡王叛不與而使尹氏周卿士與聃啟周大夫訟周公於晉趙宣子平王室而復之楚荘王立子孔潘崇将襲羣舒使公子燮與子儀守而伐舒蓼二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出将如商密廬戢黎及叔麇誘之廬今㐮陽中廬縣戢黎廬大夫叔麇其佐遂殺鬭克子儀及公子燮初鬭克囚於秦在僖二十五年秦伯有殽之敗而使歸求成成而不得志無賞報也公子燮求令尹而不得故二子作亂九月甲申公孫敖卒于齊左傳穆伯之從已氏也魯人立文伯穆伯之子穀也穆伯生二子於莒而求復文伯以為請㐮仲使無朝不得與政事聽命復而不出終寢於家故出入不書二年而盡室以復適莒文伯疾而請曰穀之子弱孟獻子年尚少請立難也穀弟許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之将來九月卒於齊告喪請葬請以卿禮葬弗許陸氏曰奔大夫不書卒非我臣也既許其歸即我臣也故書之且明君臣之義死生一也高氏曰敖廢命奔莒此誠敖之罪也已而奔齊主齊而請復公於是乎許之則其卒也是亦大夫而已所以特書其卒以著典刑之壊且為齊人歸喪起也齊公子商人弑其君舎左傳齊人定懿公使來告難齊人不服故三月而後定故書以九月齊公子元不順懿公之為政也終不曰公曰夫巳氏猶言某甲穀梁傳舍未踰年其曰君何也成舎之為君所以重商人之弑也胡傳州吁弑君以國氏商人稱公子何也以國氏者累及乎上謂荘公養成其惡稱公子者誅止其身陸氏曰春秋之作本以懲惡若未踰年之君被弑而不曰君則逆亂之臣皆以未踰年而肆其凶惡故原情立義而以弑君書晉奚齊本不正故異於此張氏曰嫌未踰年與成君異故誅商人為萬世戒高郵孫氏曰人子之心則未逾年而稱子國人弑君則未逾年而稱君此春秋所以辨君臣之分而防簒弑之禍宋子哀來奔左傳宋高哀為蕭封人宋附庸以為卿蕭本宋邑荘十二年蕭叔大心者宋蕭邑之大夫也平宋亂立桓公宋人賞其勞以蕭邑封叔為附庸荘二十三年蕭叔朝公是也高哀仕於蕭還升為宋卿不義宋公而出遂來奔書曰宋子哀來奔貴之也冬單伯如齊齊人執單伯齊人執子叔姬左傳㐮仲使告於王請以王寵求昭姬於齊曰殺其子焉用其母請受而罪之冬單伯如齊請子叔姬齊人執之又執子叔姬公羊傳執者曷為或稱行人或不稱行人稱行人而執者以其事執也不稱行人而執者以已執也今按稱行人而執者如楚人執鄭行人良霄鄭人使告服於晉故也晉人執衛行人石買責其伐曹也此並為使事而見執故稱行人公羊所謂以其事執也不稱行人而執者如宋人執鄭祭仲脅令立厲公也齊人執陳轅濤塗以誤軍道也晉人執季孫行父舎之於苕丘僑如譛之也有罪無罪並各以事不可槩之於行人之例故並不稱行人公羊所謂以巳執也公羊此傳止可通於此二例若單伯子叔姬之事則其事異而經之書之也亦異不可以前説㮣也縁上既云單伯如齊則下不得復云行人左氏自以單伯為周大夫則又不得云我行人矣况下有叔姬則又不可云齊人執我行人單伯及子叔姬矣兩書齊人正不欲以姬繋於單伯也不言及者不可及也别而言之若二事焉所以重齊人之罪也明年書單伯至自齊又書齊人來歸子叔姬則知淫乎叔姬者其言誣矣齊人誣而執之又無辭可竟而歸之公羊穀梁乃從而實之何其乖謬也商人弑其君執其君之母我以好請又執我使臣則其不書商人而以為齊人執之何也商人驟施於國而多聚士是以克弑盖從之者多矣商人弑舎而譲元元曰爾求之乆矣爾為之曲沃桓叔将以傾晉而民為之隱曰我聞有命不敢以告人蓋欲其成矣亂臣賊子欲行其志必先施小恵以収衆情然後民翕然歸之前之商人後之田氏其轍一也使有人焉正色而立於朝誰敢致難其君乎親弑其君而莫討執乎君母而莫救則齊人同乎惡矣舉齊人則商人之罪在其中舉商人則黨乎亂賊者揜其姦矣單伯明年書至自齊則是魯大夫左氏以為周大夫非也豈有周大夫於魯書至哉荘元年巳有單伯至今巳八十餘年未必一人或其子若孫歟晉欒書欒黶父子同稱欒伯士渥濁士彌牟祖孫同稱士伯趙氏曰内女見執依内大夫例書之左氏言是齊君舍之母春秋例無他國自囚國内之人書執者舎母自是齊家人故知左氏誤此乃魯女嫁齊齊以非禮不肯受而執之耳按叔姬稱子則公女也非舍母昭姬也齊昭公以僖二十八年即位我女歸齊當在僖公末年及文公立而逆婦姜於齊乃昭公女則昭姬非其女明甚而子叔姬又非昭姬也趙説良是十有五年春季孫行父如晉左氏謂為單伯子叔姬故商人之惡謀於晉而討之可也三月宋司馬華孫來盟華户化反來盟彼欲之也稱華孫者自督弑殤公諸侯以賂故立華氏使秉宋政猶季孫叔孫仲孫臧孫之類義不繋於名故曰華孫而不名也不稱使者凡來聘來盟有不稱使者言聘言盟則知君使矣從簡之辭也有稱使者以别乎不當稱使者也不當稱使者如祭伯來非王命也武氏子來求賻王未葬故不言使也祭叔來聘私行假言聘也齊仲孫來非致成命也齊高子來盟義同仲孫也楚屈完來盟於師權在屈完也此華孫來盟趙氏以為義同齊仲孫楚屈完胡氏以為專行是時昭公無道㐮夫人公子鮑之徒内變将作華耦職為司馬使有謀國之心必不泯泯焉坐視亂起而莫之能正矣春秋書其官而來不言使所以深罪之也夏曹伯來朝趙氏曰左氏云諸侯五年再相朝古之制也按周禮諸侯猶各以服數朝於天子若諸侯五年再相朝即須四面而往無停時也左氏妄也齊人歸公孫敖之喪左傳齊人或為孟氏謀孟氏公孫敖家慶父為長庶故或稱孟氏曰魯爾親也飾棺寘諸堂阜堂阜齊魯境上飾棺不殯示無所歸魯必取之卞人魯卞邑大夫以告惠叔猶毁以為請自敖卒則惠叔請之至今以未得命哀毁如初喪立於朝以待命許之取而殯之殯於孟氏之寝齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也葬視共仲聲巳不視帷堂而哭㐮仲欲勿哭惠伯曰喪親之終也惠伯叔彭生雖不能始善終可也史佚有言曰兄弟致美各盡其美救乏賀善弔災祭敬喪哀情雖不同母絶其愛親之道也子無失道何怨於人㐮仲説帥兄弟以哭之他年其二子來敖在莒所生孟獻子愛之聞於國獻子穀之子仲孫蔑或譛之曰将殺子獻子以告季文子二子曰夫子以愛我聞我以将殺子聞不亦遠於禮乎遠禮不如死一人門於句古侯反鼆莫幸反一人門於戾丘皆死句鼆戾丘魯邑有冦攻門二子禦之而死按慶父與敖父子之醜行同其死於莒同慶父削其喪歸以絶之左氏曰葬視共仲則知慶父歸葬矣葬禮葬也今書齊人歸公孫敖之喪者非以末减於弑二君之賊而許其歸也見魯之失耳敖之死也告喪請葬魯嘗弗許矣正也齊人或為孟氏謀曰飾棺寘諸堂阜魯必取之從之而惠叔猶毁以請之魯之君大夫不得巳於其子之哀誠而容之則許難也収之可也葬視共仲則非也齊人以死於道路辱之魯果取之而禮葬之矣敖之罪輕於共仲而以葬視共仲為非何也以前為逆賊立後納其喪既失之矣而又復失之於其濟惡不才之敖也典刑安在哉人無忠孝國無典刑雖有罪而獲赦反加寵焉此三桓漸強之由亂臣賊子所以接迹於當世而莫之戒也或曰敖有子而賢故魯人從其請國史書其事仲尼因而不革以敖著教也周公命蔡仲不曰爾尚蓋前人之愆乎曰聞周公廢蔡叔而庸蔡仲矣不聞以蔡仲而褒蔡叔也子之蓋父之愆亦懋於徳而已未聞以非禮足以揜父之惡也華耦來盟公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君耦知以罪人子孫不敢辱魯君之禮而惠叔以非分之請干國之典常求以寵其父而揜其惡不知適所以彰之耳曽是以為孝乎公羊云何以不言來内辭也脅我而歸之筍将而來也筍者竹箯一名編輿将送也劉氏曰敖死殆十月豈可置之編輿以行哉公羊之説非也六月辛丑朔日有食之鼓用牲于社左傳非禮也杜氏曰得常鼔之月而於社用牲為非禮孔氏曰此與荘二十五年經文正同彼傳云非常此傳云非禮者彼失常鼓之月言鼓之為非常此得常鼓之月而用牲為非禮日有食之天子不舉去盛饌伐鼓於社責羣隂諸侯用幣於社社尊於諸侯故請救而不敢責之伐鼓於朝退自責以昭事神訓民事君天子不舉諸侯用幣謂以事神尊卑異制所以訓民示有等威等級威儀古之道也單伯至自齊左傳謂齊人許單伯請而赦之使來致命張氏曰若如左氏之説以單伯為周大夫則是齊執王使而春秋所書並不見此意直同之魯之臣子是可疑也晉郤缺帥師伐蔡戊申入蔡左傳新城之盟蔡人不與晉郤缺以上軍下單伐蔡兼帥二軍曰君弱不可以怠戊申入蔡以城下之盟而還凡勝國曰滅之絶其社稷有其土地獲大城焉曰入之得大都而不有左按入蔡是入其國都氏得大城之義似疎趙氏曰入而言伐言伐之不服而後入也所以兼惡蔡高氏曰蔡侯既與楚故不與新城之盟晉伐之斯有名矣凡伐不言入伐之不服然後入焉見晉不修徳而暴小國以争諸侯欲使區區之蔡捍楚之強而不貳則亦難矣故言伐言入甚之也按君弱不可以怠修徳以來蔡蓄威以制楚可也不能制楚而事蔡以為名則徳不足以綏懐威不足以定服交失之矣楚固當謀然弑君之商人目睫之近若罔聞知又安能圖逺乎秋齊人侵我西鄙冬十有一月諸侯盟于扈左傳冬十一月晉侯宋公衛侯蔡侯鄭伯許男曹伯盟於扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不㑹書曰諸侯盟於扈無能為故也按非一役再有事而不序諸侯散辭也晉盟主也不目晉侯不成乎伯之辭也大者天地其次君臣道莫先焉齊弑其君環視而莫能討是曰縱賊興諸侯而以賂還是曰與賊晉與賊而諸侯縱賊故同其文者同其罪也夫諸侯不專征者也田恒弑其君而孔子請討邾定公時有弑父者公瞿然失席曰是寡人之罪也蓋君踰月而後舉爵孰謂環八國之師君臣靦然有面目相視乃瞀然而來瞢然而罷乎魯受子叔姬之辱復見肆侮侵我西鄙設有丈夫之心者内雪讐恥外伸大義身先諸國可也而顧以齊難不㑹尤可恠也是時主納齊賂者趙盾也右賊之心今将之兆顯於此矣趙氏曰左氏云凡諸侯㑹公不與即不書按諸侯㑹公不與而列㑹者非一左氏誤矣十有二月齊人來歸子叔姬左傳王故也按子叔姬之歸晉故也行父如晉晉詰齊而齊歸之單伯亦然齊侯侵我西鄙遂伐曹入其郛音孚左傳齊侯侵我西鄙謂諸侯不能也此語最要以於扈之事觀之諸侯實不能矣遂伐曹入其郛討其來朝也按以八國之師造齊之城下取賂而還宜商人謂諸侯之不能也有輕諸侯之心故再侵我西鄙遂伐曹入其郛盖魯嘗再訴於晉故再侵以報之十五年季孫行父如晉訴子叔姬之事也秋齊人侵我西鄙怒我之訴也是秋季孫行父復如晉訴齊之侵也盟扈将以討齊而不果齊人歸子叔姫又侵我西鄙怒我之再訴致興於扈之役也扈之役曹伯與焉國小而近故乗侵魯之勢以伐曹名曰討其朝魯實以懲其從晉也公羊云入郛不書此何以書動我也動我猶可乃動晉耳寧有伯主討於前師甫退而復肆出侵伐於後者乎此猶官吏治人之罪雖不出於公然猶面服一受贓即反侮之矣十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟左傳春王正月及齊平魯受弱公有疾使季文子㑹齊侯於陽穀請盟齊侯不肯曰請俟君間間疾瘳書病魯也按程子曰被侵伐者兵加於巳則引咎自責或辨喻之以禮又不得免焉則固其封疆上告之天王下訴之方伯必有所直矣齊兩侵魯魯固訴之晉矣晉興諸侯将討之受賂不克而還魯不得巳受弱而與齊平以公疾故使季文子㑹齊侯於陽穀齊将有所要也故託以公不在而辭之曰請俟君間如是則齊惡矣而以病魯何也示立巳自強之道也扈之役魯先不㑹魯之偷巳甚何以責晉乎諸侯無成猶有周公之魯在也齊有侵伐之師我有備禦之固亦何歉焉而遽受弱以求平乎故曰病魯也乃若齊之惡則不足責矣然既曰㑹齊侯則是齊許之㑹而下曰齊侯弗及盟弗者遷詞惡齊侯也此不及盟六月㐮仲納賂及齊侯盟不復責公之不至矣比事而觀春秋深惡齊之意不亦可見乎夏五月公四不視朔左傳疾也公羊傳公曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也穀梁傳天子告朔於諸侯諸侯受乎禰廟禮也公四不視朔公不臣也以為公厭政以甚矣范氏曰公自二月不視朔至於五月是後視朔之禮遂廢趙氏曰若誠有疾則夫子不當譏之據文公於諸侯盟㑹三度不及又不視朔世室屋壞作僖公主緩皆是以此推之知公性寛賖而怠於國務非疾也六月戊辰公子遂及齊侯盟于郪丘郪音西公作犀穀作師公羊疏作菑左傳公使㐮仲納賂於齊侯故盟於郪丘杜氏曰郪丘齊地秋八月辛未夫人姜氏薨僖公夫人文公母也毁泉臺泉臺公羊以為即郎臺也未成為郎臺既成為泉臺郎之有臺也不縁占候而以逰觀築者非則毁者得矣而何以書乎惡勞民也築之勞毁之勞既築又毁可謂勞矣孟獻子曰毁之重勞是也公羊曰先祖為之巳毁之不如勿居而巳矣此未盡也先祖所為如奪民田以為苑囿壊民居以廣宫室則毁之是也何得勿居而巳乎若泉臺則可巳耳左氏謂有蛇自泉宫出入於國臺在宫内臺依左氏則國自有泉非郎臺也如先君之數秋八月辛未聲姜薨毁泉臺此豈左氏因毁臺之文次姜薨之下而附㑹與抑當時因夫人薨謂臺不利於國而毁之也其亦皆不足憑矣穀梁云喪不貳事貳事緩喪也毁臺公應不自行安得為貳事但毁一臺何能令喪緩乎傳蓋以聲姜九月而葬之故此目公之慢耳作僖公主緩豈因毁臺乎楚人秦人巴人滅庸左傳楚大饑戎伐其西南又伐其東南庸人帥羣蠻以叛楚庸今上庸縣属楚之小國麇人率百濮夷也聚於選楚地将伐楚此叚太辭費於是申息之北門不啟備中國楚人謀徙於阪高楚險地蒍賈曰不可我能往冦亦能往遷都避冦之利害决於此二言不如伐庸夫麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居将各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬楚邑以往往伐庸振發也廩倉也同食上下無異饌也次於句古侯反澨市世反地楚西界使廬戢黎侵庸戢黎廬大夫分兵與之及庸方城方城庸地上庸縣東有方城亭庸人逐之囚子揚窻戢黎官属三宿而逸曰庸師衆羣蠻聚焉不如復大師還復句澨師言以上子揚窻之也且起王卒合而後進師叔楚大夫潘尫也曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒楚武王父所以服陘隰地名也又與之遇七遇皆北唯禆鯈魚庸之三邑人實逐之輕楚故但使三邑人逐之魚魚復縣今巴東永安縣庸人曰楚不足與戰矣遂不設備楚子乗驛傳車㑹師於臨品地名分為二隊部也両道攻之子越鬬椒也自石溪子貝浦盖反自仞以伐庸石溪仞入庸道秦人巴人從楚師羣蠻從楚子盟遂滅庸按楚恃其強御屬國屬夷素無道故一旦饑困則羣起而攻之蠻夷之雄因多難之來乃能用謀臣之言轉敗為福離百濮走羣蠻叱咤如志庸者先王之建國而滅之雖庸不自靖以挑之而楚之張益甚矣且使秦人為之用尤前所未有者城濮之役秦有功於攘楚今也秦與楚滅庸此春秋所以志也秦為晉隔不通東諸侯楚北向而窺中國則晉當其胸齊格其脇秦嘗窺鄭即為晉所挫人咎㐮公啟怨不知亦事機也秦東窺不遂又南通楚鬱其鋭以厚其力故至於戰國而秦不可制晉分為三又適所以資秦也秦攻韓魏猶春秋楚之於鄭也晉楚争鄭而六國不知争韓魏故秦遂并天下楚乍起即張未嘗鬱其鋭至七國時楚為秦弱七國之秦乃春秋之楚也冬十有一月宋人弑其君杵臼公作處臼左傳宋公子鮑昭公庶弟文公禮於國人宋饑竭其粟而貸之㐮夫人欲通之鮑適祖母而不可夫人助之施昭公無道國人奉公子鮑以因夫人於是華元督曽孫代公子成為右師公孫友為左師華耦為司馬代公子卬鱗矔為司徒蕩意諸為司城公子朝為司冦代華御事初司城蕩卒公孫夀辭司城夀蕩之子請使意諸夀之子為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之貳也姑紓死焉雖亡子猶不亡族既夫人将使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至於君祖母以及國人君祖母諸侯祖母之稱哀十六年傳蒯瞶告于周云蒯瞶得罪於君父君母謂母為君母則祖母為君祖母矣諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右使行夫人使謂司城去公對曰臣之而逃其難若後君何冬十一月甲寅宋昭公将田孟諸未至夫人王姬㐮夫人周㐮王姊故稱王姬使帥甸郊甸之帥攻而殺之蕩意諸死之不書不告書曰宋人弑其君杵臼君無道也文公即位使母弟須為司城代意諸華耦卒而使蕩虺意諸弟為司馬公羊傳弑君者曷為或稱名氏或不稱名氏大夫弑君稱名氏賤者窮諸人大夫相殺稱人賤者窮諸盗趙氏曰左氏説被殺之由云夫人使公田孟諸而殺之公知之盡以寳行按傳例自云君無道也凡無道之人例皆強暴為人所畏祖母有何威權而能坐殺之乎若潜謀搆禍猶或可疑今乃云公知之載寳以行盡賜左右而端然待死推之人情未之有也按左氏所載誠可疑使其情如是則春秋不當蔽其罪於衆人而使簒賊之主名不彰以許世子止與趙盾之事觀之天下之事莫大於弑君聖人安肯疑其文以啟後世之惑乎亦直書而巳矣許世子之事歐陽公之説是也惟趙盾則以左氏之記事考經文之所書其當書趙盾無可疑者宋昭公無道國人殺之義不繫於主名則書曰宋人弑其君杵臼而巳然則君無道而衆弑之可乎曰天下之所棄若桀紂然桀之虐民欲與之偕亡成湯放之猶有慙徳以紂罪浮於桀億兆離心而文王事之猶不敢違君非桀紂臣非湯武則其義無将将而必誅而况巳成乎春秋正其弑君則立教之意可知書曰萬姓仇予予将疇依正其弑名而猶書宋人見失衆也以此為訓君不敢以一人肆於民上為下者知父雖不慈子不可以不孝君雖不仁臣不可以不義聖人一言而萬世之為君臣父子者定矣蕩意諸據左傳則當以死節書經不書則傳未足據胡氏謂意諸知昭公之将見殺而不能正故削恐非也十有七年春晉人衛人陳人鄭人伐宋左傳晉荀林父衞孔達陳公孫寧自閔僖以來終於春秋陳侯常在衛侯上今大夫㑹在衛下傳不言陳公孫寧後至則寧位非上卿故也鄭石楚伐宋討曰何故弑君猶立文公而還猶字有意卿不書失其所也卿不書謂稱人程子曰行天討而成其亂失天職也故不卿之宣元年傳謂是舉亦受賂而還啖氏謂書人者不命之卿也夏四月癸亥葬我小君聲姜公作聖左傳有齊難是以緩既葬乃有齊師傳誤也高氏曰九月乃葬慢也不稱僖姜而别為之諡非禮也齊侯伐我西鄙六月癸未公及齊侯盟於穀左傳齊侯伐我北鄙㐮仲請盟六月盟於榖按商人之無道亦極矣魯之不自振亦甚矣皆将死之兆也明年商人戒師期使無申池之禍則兵又至魯矣杜氏曰西當為北蓋經誤孔氏曰知非傳誤者魯求與平即盟於榖榖是濟北穀城縣在魯北知為北鄙是也諸侯㑹於扈左傳晉侯蒐於黄父一名黒壤晉地遂復合諸侯於扈平宋也傳不列諸國而言復合則如上十五年㑹扈之諸侯可知也公不與㑹齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子執訊通訊問之官曰寡君即位三年召蔡侯而與之事君九月蔡侯入於敝邑以行行朝晉也敝邑以侯宣多之難寡君是以不得與蔡侯偕宣多既立穆公恃寵專權十一月克減侯宣多而随蔡侯以朝於執事减損也難未盡而行言汲汲於朝晉十二年六月歸生子家名佐寡君之嫡夷夷太子名以請陳侯於楚而朝諸君十四年七月寡君又朝以藏敕展反陳事藏敕也敕成前好十五年五月陳侯自蔽邑往朝於君往年正月燭之武往朝夷也八月寡君又往朝以陳蔡之宻邇於楚而不敢貳焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝於㐮而再見於君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘㡬又曰鹿死不擇音音所庇䕃之處古字聲同皆相假借小國之事大國徳則其人也不徳則其鹿也鋌疾走貌而走險急何能擇言急則欲䕃庇於楚如鹿之赴險命之罔極言晉命無極亦知亡矣将悉敝賦以待於鯈直留反晉鄭之竟言欲以兵拒晉唯執事命之文公二年六月壬申朝於齊四年二月為齊侵蔡亦獲成於楚居大國之間而從於彊令豈其罪也大國若弗圖無所逃命晉鞏朔行成於鄭趙穿公壻池為質焉杜氏曰昭公雖以無道見弑而文公猶宜以弑君受討故林父伐宋以失所稱人晉侯平宋以無功不序明君雖不君臣不可以不臣所以督大教秋公至自榖附左傳周甘歜昌欲反周大夫敗戎於邥於審反垂邥垂周地河南新城縣北有垂亭乘其飲酒也冬十月鄭太子夷靈公石楚鄭大夫為質於晉冬公子遂如齊左傳㐮仲如齊拜榖之盟復曰臣聞齊人将食魯之麥以臣觀之将不能齊君之語偷臧文仲有言曰民主偷必死十有八年春王二月丁丑公薨于臺下左傳春齊侯戒師期而有疾醫曰不及秋将死公聞之卜曰尚無及期惠伯令龜以卜事告龜卜楚丘占之曰齊侯不及期非疾也君亦不聞言君先齊侯終不及聞齊侯之死令龜有咎令龜者惠伯亦有凶咎三者俱見於卜兆二月丁丑公薨榖梁傳臺下非正也秦伯罃卒罃乙耕反夏五月戊戌齊人弑其君商人左傳齊懿公之為公子也與邴音丙歜昌欲反之父争田弗勝及即位乃掘而刖之而使歜僕御也納閻職之妻而使職驂乘陪乘夏五月公㳺於申池齊南城西門名申門齊城無池唯此門左右有池疑此即是二人浴於池歜以扑箠也抶撃也職欲以相感激職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弑懿公納諸竹中歸舎爵而行飲酒訖乃去言齊人惡懿公二人無所畏齊人立公子元桓公子惠公楊隋之史曰太子廣弑帝於其終也書宇文化及弑其君廣與商人之事同據左氏弑者邴歜閻職合書盗而稱國人以弑者與宋杵臼之例同六月癸酉葬我君文公秋公子遂叔孫得臣如齊左傳六月葬文公秋㐮仲荘叔如齊惠公立故㐮仲賀惠公立且拜葬也荘叔謝齊來㑹葬文公二妃敬嬴生宣公敬嬴嬖而私事㐮仲宣公長而屬㐮仲㐮仲欲立之叔仲惠伯不可仲見於齊侯而請之齊侯新立而欲親魯許之按使舉上客而不稱介禮大夫為卿介遂與得臣俱卿不當相介春秋列數而不殊者欲以起問者見事情也按左氏㐮仲欲立宣公見於齊侯而請之齊侯許之仲殺惡及視而立宣公書曰子卒諱之也諱之何以傳信乎曰遂及得臣如齊而子卒子卒而夫人姜氏歸於齊姜氏歸於齊而季孫行父如齊其義隠而彰矣遂得臣行父三人定謀而齊與聞乎故欲以定魯為功而外為三人之主以其前後如齊而知之故春秋亦於其前後如齊而詳録之也杜氏云書二卿以兩事行非相為介盖㐮仲專為謀立宣公託以一卿賀立君一卿拜葬而巳以大事隂謀欲靣見齊侯而决盖身在使外而託以使行耳冬十月子卒左傳冬十月仲殺惡及視而立宣公惡太子視其母弟視不書以賤故書曰子卒諱之也仲以君命召惠伯詐以子惡命其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏公羊傳子卒者孰謂謂子赤也何以不日據子般卒日隠之也何隠爾弑也弑則何以不日據子般卒日不忍言也所聞之世臣子恩痛王父深厚故不忍言其日與子般異榖梁傳子卒不日故也故殺也按子般子赤皆未踰年之君皆書曰卒言嗣先君未成君也先君未葬則名之子般是也既葬則不名子赤是也子般子赤皆以不地見其弑與隠公閔公同君薨不地故也無成君未成君之異也公榖起不日之義胡氏因謂既葬而不名不名而遇弑者不日以見其弑踰年而稱君稱君而遇弑者不地以見其弑此恐不必然夫稱子與名不名所以施於君見人子嗣親之禮也君薨不地以見其弑雖未成君亦同所以施於臣見大惡一也若謂成君弑不地子赤未踰年故不日以别之則子般何以日乎叔仲惠伯叔牙之孫叔彭生也㐮仲之邪謀行父得臣皆帖耳順命獨惠伯嘗争之可謂無愧於大臣之義矣不克則死之大節皎然無可議者獨經不書為可疑或謂不發㐮仲之謀令君及禍故不書者謬也是時君薨子幼逆臣當國叔仲言一出口即殺之奚自而發其謀乎荘十二年胡傳謂惠伯死非君命故不得以死節書此亦責之過矣仲以君命召之公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可也非君命何聽焉叔仲弗聽而入弗聽非叔仲之愚也非君命而不入猶不免也若君命而弗聽則吾拒命矣君見弑而死之正也安得以為死於亂賊之詐命而苛議之乎董卓召皇甫嵩嵩在外故可以不入乃往見執而亡漢叔仲非是此也或謂㐮仲以詐殺惠伯而埋之盖隠其迹魯史畏仲之威不敢書曰公子遂殺叔仲彭生夫子作春秋時宣公乃時君之祖考故亦仍舊史為國諱惡而不敢増也此尤以小人之腹而妄度聖人者若然則公孫於陽州何以不避三桓之怨而直書乎成十五年公羊傳文公死子幼公子遂謂仲叔惠伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何幼君之有公子遂知其不可與謀退而殺叔仲惠伯弑子赤而立宣公按左氏但言㐮仲欲立宣公叔仲不可而不詳其不可之説幸公羊載之於此姦臣以君幼為名而謀廢立叔仲一言足以折之令口塞姦臣不但忌其言叔仲正色而立於朝必不肯與奸臣同惡也故姦臣殺之夫人姜氏歸于齊左傳夫人姜氏歸於齊大歸也将行哭而過市曰天乎仲為不道殺嫡立庶市人皆哭魯人謂之哀姜榖梁傳惡宣公也有不待貶絶而罪惡見者有待貶絶而惡從之者姪娣者不孤子之意也一人有子三人緩帶有子則喜樂之情均一曰就賢也若並有子則就其賢謂年同也傳意謂宣公媵妾之子猶當尊養夫人今以非所生而致令大歸違就賢之意孤緩帶之心趙氏曰言歸不反之辭也左氏云夫人出曰歸於某據文公夫人歸於齊乃是㐮仲殺子赤後自歸耳不可以此為例若夫人實有罪見出必當云出歸於某以示貶不應但云歸耳問弑君而立古有之乎有矣天下之大變也弑其君出其母者古有之乎曰無也齊商人也魯接也又天下之大變也穀梁之義施之此則迂矣當於來媵之下耳諸侯娶一國則二國往媵之以姪娣從廣嗣續也一人有子三人緩帶喜樂之情均姪娣之所以為親而妬媢之釁不生焉凡諸侯嫁女同姓媵之異姓則否同姓則皆有兄弟之親正夫人之於衆妾義亦猶一人也子無問於所生故母無無子之戚故曰不孤子之意也榖梁謂宣公以出姜非其所生致令歸齊然宣公與聞殺惡及視欲代其位故翦正嫡何論其不能事嫡母乎借使宣公能容出姜而事之則可以免於惡乎季孫行父如齊義見前莒弑其君庶其左傳莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國紀號也莒夷無諡故有别號僕因國人以弑紀公以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司冦出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也目前之㐮仲何不見也先君周公制周禮曰則以觀徳則法也合法則為吉徳徳以處事處猶制也事以度功度量也功以食音嗣養也民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器國用也為姦主藏之名以掩賊為名暗指納莒僕頼姦之用指納僕之寳玉為大凶徳有常無赦行父還周旋觀莒僕莫可則也孝敬忠信為吉徳盜賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盜賊也其器則姦兆也兆域也保而利之則主藏也以訓則昬民無則焉不度於善而皆在於凶徳是以去之按行父之言皆譏切宣公而把握之借莒僕以發之耳所謂有禮於君無禮於君與則其孝敬則弑君父則其忠信則竊寳玉此皆宣公襄仲所諱聞而直觸之而不忌且公欲與之邑曰今日必授行父則使司冦出諸竟曰今日必達畧無委曲何也㐮仲得行父之同以成事宣公頼二人之力以定位且為之兩如齊請昬以自固納賂以請㑹者又行父也行父之於宣公㐮仲其交深矣納莒僕乃宣公之意四鄰正欲生釁况又有此此必㐮仲諸大臣所共不願故行父敢激直如此正權臣操縱之術也㐮仲雖專政然其人必粗暴而無深謀行父以術持之及其死也以殺適立庶追討東門氏而逐之行父之奸可見矣按如左氏之言則是莒僕以太子弑其父也春秋何以書國弑乎且僕既與國人殺君則當自立矣又何以奔魯乎㐮三十一年莒人弑其君宻州左氏亦謂莒公生棄疾及展輿展輿既立又廢之莒公虐國人患之展輿因國人以攻莒子弑之乃立事正與此同趙伯循謂其文當曰展輿因國人之攻莒子弑之乃立而後來傳冩誤為以字爾趙氏之説是也然當辨於此條不當闕於此而論於後也公羊傳稱國以弑何稱國以弑者衆弑君之辭附左傳宋武氏之族道昭公子将奉司城須以作亂十二月宋公殺母弟須及昭公子使戴華樂荘公孫師桓向魚鱗蕩之族攻武氏於司馬子伯華耦之館遂出武穆之族使公孫師為司城公子朝卒使樂吕為司冦以靖國人公孫師荘公之孫樂吕戴公之曽孫春秋輯傳卷六

body:
  text: 春秋輯傳卷七明王樵輯宣公元年春王正月公即位公羊傳繼弒君不言即位此言即位何其意也榖梁傳繼故而言即位與聞乎故也公子遂如齊逆女胡傳喪未朞年遣卿逆女何亟乎太子赤齊出也仲遂殺赤而立宣公懼於見討故結昏于齊不待貶絶而罪惡見者也按自此至行父如齊公㑹齊侯於平州公子遂如齊齊人取濟西田六條只為一事皆因篡弒懼於見討之故也三月遂以夫人婦姜至自齊公羊傳遂何以不稱公子一事而再見者卒名也卒竟也竟但舉名者省文夫人何以不稱姜氏貶曷為貶譏喪娶也喪娶者公也則曷為貶夫人內無貶於公之道也內無貶於公之道則曷為貶夫人夫人與公一體也其稱婦何有姑之辭榖梁傳其不氏喪未畢故略之也其曰婦緣姑言之之辭也程子曰脫氏字趙氏曰書以言不當以也左氏曰尊夫人也釋不稱公子啖氏曰左氏不知有一事再見者卒名之義故妄為此說劉氏曰左氏云稱族尊君命舍族尊夫人非也一事而再見卒名耳必若云然公子結遂及齊宋盟非受命亦稱族歸父豹意如其往也氏其至也不氏無有夫人居間也何以舍族耶按此與文四年皆稱婦姜皆有姑之辭氏字本配姓為辭陸氏曰古者一字不成文辭皆以氏字配之姜氏子氏以氏配姓也季氏臧氏以氏配族也哭于賜氏以氏配名也仲氏吹箎及不念伯氏之言以氏配氏也既稱婦姜則氏字可省非特去氏以示貶也公羊之說皆穿鑿也丈夫制義婦人不專行安有舍公而貶夫人乎既曰內無貶于公之道不知貶夫人適所以彰公之惡矣此與文四年皆喪娶也皆不待貶絶而罪惡見者也而以文較宣則宣之惡尤甚文公納幣在喪內娶在三年之外宣公篡立懼於見討是以喪未一年汲汲於結齊援敢於越典禮忍於薄天親春秋誅絶之意在于言外傳者不知大義必曰不言氏者貶夫人也去一字以貶夫人何損於宣公之惡乎婦者有姑之辭此說是矣而榖梁于文四年曰何其速婦之也曰公也其不言公何也非其成禮於齊也蓋以經不言逆者姓名疑為公自行故以為成禮于齊而稱婦姜此不可云成禮于齊則曰以喪娶不可貶公而貶夫人前後不一不過緣文生義初無定論其不足信明矣胡氏亦有責夫人之說襲陋也惟於稱婦曰責敬嬴也敬嬴私事襄仲殺適出正遂援成風故事當國用事斬焉在衰服之中請昏納婦皆其志也故因夫人至特稱婦姜以顯之概指為有姑之詞而不察其㫖則精義隱矣胡氏求加于三傳而出新意其說亦善夏季孫行父如齊左傳季文子如齊納賂以請㑹胡傳經書行父如齊而不言其故謂納賂以請㑹者傳也經有不待傳而著者比事以觀斯得矣下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請蓋以賂也雖微傳其事著矣晉放其大夫胥甲父于衛左傳晉人討不用命者放胥甲父于衛而立胥克甲之子先辛奔齊辛甲之屬大夫公羊傳放之者何猶曰無去是云爾然則何言爾近正也胡氏曰比于専殺者其罪薄乎云爾以為近正非矣大夫當官既不請于天子而自命以為有罪又不告于司冦而擅刑猶不逺于正乎此其為近正奈何古者大夫巳去三年待放啖氏曰三年待放之義乃三諫不從以禮而去今放名雖同而實殊傳蓋不見事迹而云耳君放之非也三年待放正也古者臣有大喪則君三年不呼其門重奪孝子之恩也已練可以辨冕服金革之事君使之非也臣行之禮也閔子要絰而服事禮巳練男子除乎首婦人除乎帶既而曰若此乎古之道不即人心既事畢言古者不敢斥君即近也退而致仕孔子蓋善之也穀梁傳放猶屏也稱國以放放無罪也啖氏曰放者宥之以逺依殺例言之則稱國者罪纍上也此年及昭八年楚師滅陳執陳公子招放之于越稱人者宜放也哀二年蔡人放其大夫公孫獵于吳胡傳秦晉戰於河曲撓臾駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也按河曲之役趙穿違命今八年矣當時趙盾既不能以軍法治穿慮失穿而與之同出必諱其事豈至今始以為非而自表其為帥不能戢下之過師之進止在元帥不肯薄諸河亦趙盾自欲止耳雖無軍門之呼吾知臾駢之謀必不用矣此蓋以河曲無功歸罪于胥甲父因以自解而欺靈公耳公㑹齊侯于平州左傳㑹于平州以定公位杜氏曰平州齊地在泰山牟縣西胡傳篡弒之賊無所容於天地之間以列於㑹而不復討是等倫紀于辨髦棄人類為禽獸此仲尼所為懼春秋所以作也㑹者外為志魯宣欲求寵以定位宜稱公及齊侯我所欲曰及而曰㑹者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤也公子遂如齊左傳東門襄仲如齊拜成杜氏曰謝得㑹也六月齊人取濟西田左傳取濟西田為立公故以賂齊也公羊傳外取邑不書此何以書所以賂齊也曷為賂齊為弒子赤之賂也按史克曰其人則盜賊也其器則姦兆也保而利之則主藏也齊惠公之謂也疆邑社稷之本割之鄰國以為弒君之賂於盜賊乎何誅齊商人之弒立也惠公惡之終不曰公曰夫巳氏羞惡之心亦可明矣及商人見弒而已代之為君也謂當推此心以自强於為善矣夫惡與視吾出也出姜先君之愛子也赤之死猶舍之死也接之立猶商人之立也出姜之歸猶昭姬之歸也出姜過市呼天之言雖魯之市人猶為之哭而惠公曾無惻隱之動於商人則惡之於魯之效啇人者則不之惡何初心之反耶不過入於襄仲之姦貪於濟西之賂遂至忍心犯義安於為盜賊之主藏而助其成也故胡氏以為春秋討賊尤嚴于其黨舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少彌矣濟西田僖三十一年以晉令而取之曹者秋邾子來朝邾舊雖附庸於魯自升為子常屬於齊每視齊為向背今魯與齊好所以來朝義與桓公二年滕子來朝同文無貶者從同同此傳家之說大率周末列國邦交惟知有小事大弱事强而已無合於中聘世朝之禮者且或不知逆順之所在致禮于篡國之人桓宣之初之滕邾是也楚子鄭人侵陳遂侵宋左傳宋人之弒昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又㑹諸侯于扈將為魯討齊皆取賂而還文十五年十七年二扈之盟皆受賂鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉秋楚子侵陳遂侵宋按晉人二扈之盟皆取賂而還鄭穆公曰晉不足與也此左氏之特筆足以振發經意春秋之初郜鼎祊田賂以公行同惡相求如市賈焉譬之盜賊知賄而已寧知禮義之所不可法禁之所不許耶此所謂亂法法在也有齊桓晉文者起而此類皆革面矣桓公之亡諸侯力有不贍安為楚弱猶可說也文襄之後晉德雖衰以大國之力再世盟主之威諸侯未敢以為不足與也郤缺一出于承筐而衛侯鄭伯奔走求平以義服之於霸業有易於文公無不及焉夫何有趙盾者敗之齊宋弒君合諸侯以討之是義舉也是霸令也皆以賂而還此猶士師將治人之罪而求請潜入鉤考不竟兩解俱散此所謂侮法法亡其慝害深于盜賊有王者起則不待教而誅之者也楚人曰北方可圖也鄭伯曰晉不足與也其應如響豈可誣哉然而為鄭伯者則不善于擇所從矣夫諸侯有能師文王者小國七年足以自强吾國豈綴旒豈必與人而後足以立耶修德之至同德者皆將與之何患乎無與知晉之不足與棄諸夏而與楚從之侵陳遂侵宋無名而肆暴不義不亦甚乎且陳恥楚之不禮而受盟于晉是悟而從正我輕晉之不足與而受盟于楚是迷而從夷以迷攻悟可乎宋鮑竊國吾不能與諸夏之可與者聲其罪而討之而與楚為侵暴無名之師前有賊而不知滋為中國患害而已非能為義舉也故書楚子鄭人侵陳遂侵宋以罪之也陳氏曰後十五年而宋楚平又十五年而晉趙武楚屈建同盟于宋諸夏分為晉楚之從於是始故謹而書之也晉趙盾帥師救陳左傳晉趙盾帥師救陳宋榖梁傳善救陳也胡傳傳稱師救陳宋經不書宋此非闕文乃聖人削之也前方以不能討宋上卿貶而稱人諸侯㑹而不序今若書救宋則典刑紊矣按諸家泥以書救為善辭甚至狄救齊亦以為善狄過矣楚侵陳宋趙盾自不得不救春秋據事而書亦何必一一為美惡乎使楚討宋之弒君則義不可救楚若猾夏而已宋君雖有罪民則何辜攘夷以救民可也何遂紊典刑乎據經則實未嘗救宋也左氏意之耳上書楚子侵陳遂侵宋則楚師已在宋矣盾始帥師救陳明不與楚師相及也盾師至陳楚已掠竟而過趙盾不過揚兵而還耳蓋自陳而即次于棐林㑹四國以伐鄭矣盾必不又尾楚師而至於宋也遙以為名而左氏誤信之經安得而書之宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭公作斐林左傳楚蒍賈救鄭遇于北林滎陽中牟縣西南有林亭在鄭北囚晉解揚晉大夫晉人乃還杜氏曰棐林鄭地滎陽宛陵縣東南有林鄉公羊傳此晉趙盾之師也曷為不言趙盾之師君不㑹大夫之辭也按上書晉趙盾帥師救陳此書四國之君㑹晉師則為趙盾之師明矣無他說也不曰㑹趙盾者公羊以為君不㑹大夫似為近之然春秋諸侯㑹大夫者非一亦不必於此獨生義也榖梁云列數諸侯而㑹晉趙盾大趙盾之事也夫大夫用諸侯于盾始曷為大之耶又云于棐林地而後伐疑辭也救患宜速而㑹于棐林然後伐鄭狀似伐鄭有疑須㑹乃定此其地何則著其美也美盾救患故詳録其㑹地此並過于生義不足從也胡氏用公羊君不㑹大夫之意至以地為美亦用穀梁之說冬晉趙穿帥師侵崇崇公作栁役侵書趙穿以後凡書大夫左傳晉欲求成於秦趙穿曰我侵崇秦急崇必救之崇秦之與國吾以求成焉冬趙穿侵崇秦弗與成公羊傳栁者何天子之邑也曷為不繫乎周不與伐天子也啖氏曰崇小國也公羊誤為栁故妄說也任公輔曰地譜商有崇國在京兆鄠縣甘亭按是時晉已不競于楚故傳者生欲求成于秦之說夫秦强國而與晉又深仇也以好結之猶未易成乃伐崇以怒之而曰以求成不亦逺於為謀乎趙穿雖狂趙盾雖惛或不為也胡氏謂趙穿已有逆心欲得兵權托于伐國以用其衆夫趙盾以驟諫激靈公之怒公潜使人賊之不克又伏甲將襲殺之于庭陛之間盾倉皇脫免趙穿遂有桃園之逆起于一時非素謀也趙盾自以無罪而不直在君故未出山而復所謂不知春秋之義而陷篡弒之罪蒙首惡之名者也非有齊商人宋公子鮑隂取國之心豈得靈公未有殺盾之意而盾穿先有逆心乎然桃園之事因穿握兵也盾寄腹心于穿又假之權故曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣晉人宋人伐鄭左傳晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競于楚榖梁傳伐鄭所以救宋也按是時楚師去宋久矣故伐鄭而宋與焉使楚尚在宋宋何暇伐鄭乎自古未有國方受兵乃伐他國以自救之理穀梁亦可笑矣棐林之伐無功不思修其未至而又興不戢之師挾有瑕之宋欲以伐人不亦難乎書人書伐交罪之也二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元戰皆書大夫帥師自此始孔氏曰此華元歸生及哀二年趙鞅罕達客主各言帥師者皆是將尊師衆故並具其文或于歸生之下無帥師之字脫耳左傳鄭公子歸生受命于楚伐宋宋華元樂吕樂吕司寇獲不書非元帥也禦之二月壬子戰于大棘宋師敗績囚華元獲樂吕宋人以兵車百乘文馬百駟贖華元于鄭半入華元逃歸左氏記羊斟及華元巡功城者謳譏之事啖氏曰皆近誣又非釋經之體義實瑣屑類于小說榖梁云盡其衆以救其將以三軍敵華元雖獲不病矣趙氏曰按軍敗身獲而云不病此說非也但緣師先敗績身乃見獲依次第書之有何褒貶乎杜氏曰得大夫生死皆曰獲大棘在陳晉襄邑縣南胡傳將尊師少稱將不稱師師衆將卑稱師不稱將將尊師衆並書于策者示人君不可輕役大衆又重將帥之選其義深矣書法之意見下夏侵鄭條下秦師伐晉左傳秦師伐晉以報崇也遂圍焦晉河外邑崇上恐合有侵字夏晉人宋人衛人陳人侵鄭左傳夏晉趙盾救焦遂自隂地及諸侯之師侵鄭隂地晉河南山北自上洛以東至陸渾以報大棘之役楚鬬椒若敖之族自子文以來世為令尹救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之杜氏曰鄭為楚伐宋獲其大夫晉趙盾興諸侯之師將為宋報耻畏楚而還失霸者之義故貶稱人按諸侯之從晉也謂晉之可恃也興諸侯以伐宋問弒君之故與宋之不當立者宋人懼而納賂晉遽失其所討猶立文公而還諸侯笑之鄭穆公於是曰晉不足與矣受盟于楚而侵宋侵宋者有所侮也晉乃芘宋以發鄭是時趙盾姦于攬權而偷于為政實無鬭心故棐林之役楚囚解揚晉師即還楚鄭又益謂晉易與矣於是歸生受命于楚以伐宋聲其罪曰伐彼得晉宋之情矣直言以責其曲耳宋負瑕而敵為戰之主遂至師崩將獲為效如是亦可創矣乃趙盾復因救焦而侵鄭潜師掠境稍欲洗大棘之耻塞宋意而還耳而不虞楚師之遽出也彼曰能欲諸侯而惡其難乎遂次于鄭以待晉師先我師之未至也先人有奪人之心於是趙盾者氣滑意沮謬曰彼宗競于楚殆將斃矣復引而去之夫以全晉之强合諸侯之師遇一鬬椒不暇交綏事之不收一至于此起于受賂釋宋不討而已春秋行事必正其本為末流之若此也其垂戒明矣秋八月乙丑晉趙盾弒其君夷臯臯公作嗥户刀反又古刀反左傳晉靈公不君厚斂以雕畫也墻從臺上彈人而觀其辟丸也宰夫胹音而煮也熊蹯扶元反不熟殺之置諸畚以草索為之筥屬使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也㑹請先不入則子繼之三進及溜力救反屋霤也而後視之士季隨㑹也三進三伏公不省而又前也公知欲諫故佯不視曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣賴之又曰衮職有闕惟仲山甫補之能補過也衮君之上服闕過也言服衮者有過則仲山甫能補之君能補過衮不廢矣常服衮也猶不改宣子驟諫公患之使鉏麑晉力士賊之晨往寢門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死槐趙盾庭槐秋九月晉侯飲趙盾酒伏甲將攻之其右軍右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒猛犬焉明搏而殺之盾曰棄人用犬雖猛何為鬬且出提彌明死之初宣子田獵也於首山在河東蒲坂縣東南舍於翳桑見靈輒晉人餓問其病曰不食三日矣食音嗣之舍其半問之曰宦三年矣宦學也孔氏曰曲禮云宦學事師則二者俱是學也但宦者學仕宦學者學經藝以此為異未知母之存否今近焉請以遺之使盡之而為之簞食與肉置諸槖以與之既而與為公介為公甲士倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也此乃趙盾出亡耳杜注為靈輒非是乙丑趙穿攻靈公於桃園盾授之㫖也曰攻則有兵甲矣穿握兵也宣子未出山晉竟之山也而復大史書曰趙盾弒其君以視于朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子曰嗚呼我之懷矣自詒伊戚其我之謂矣逸詩孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也為法受惡惜也越竟乃免宣子使趙穿逆公子黑臀文公子于周而立之壬申朝于武宫穀梁傳穿弒也盾不弒而曰盾弒何也以罪盾也其以罪盾何也曰靈公朝諸大夫而暴殘暴彈徒丹反又徒旦反之觀其辟丸也趙盾入諫不聽出亡至于郊趙穿弒公而後反趙盾招使還史狐書賊曰趙盾弒公盾曰天乎天乎豫無罪孰為盾句而忍弒其君者乎回已易他誰作盾而當忍弒其君乎史狐曰子為正卿入諫不聽出亡不逺君弒反不討賊則志同志同穿也志同則書重非子而誰故書曰晉趙盾弒其君夷臯者過在下也曰於盾也見忠臣之至於許子止見孝子之至傳意言盾非不忠以不討賊見責以弒君止非不孝以不嘗藥見責以弒父按聖人所書因董狐也程子曰聖人不言趙穿何也曰趙穿手弒其君人誰不知若盾之罪非春秋書之更無人知也胡傳盾僞出而實聞乎故以髙貴鄉公之事觀焉則盾為首惡明矣劉侍讀敞曰左氏叙孔子之言曰惜也越竟乃免非也安在越竟則君臣之義絶乎吾以為此非聖人之言胡侍即銓曰盾弒逆之迹見于不討賊所以正其罪不得言為法受惡葉氏曰弒君天下之大惡使其與聞乎故雖在四海之外無所逃安取於越竟使不與聞雖在朝如晏子誰敢責之趙氏曰弒君者趙穿而春秋書曰趙盾者穿之手而盾之心耳按三國志髙貴鄉公紀帝見威權日去不勝自忿曰司馬昭之心路人所知也吾不能坐受廢辱遂率殿中宿衛官童數百鼓譟而出中護軍賈充逆戰南闕下太子舍人成濟問充曰當何如充曰司馬公畜養汝等正為今日濟抽戈刺帝刃出于背昭聞之大驚自投于地入殿中召羣臣㑹議尚書左僕射陳泰曰獨有斬賈充可以少謝天下耳賈充逆戰而嗾成濟下手充不自下手者知昭必歸獄下手者以自解也逆戰南闕下者魏主已至昭門則昭難于為禦故充迎擊以緩之使昭得為備陳泰欲斬充者以其逆戰也充非不知當先逆戰廷議必不赦而敢為者知權在昭也昭久之曰更思其次意在濟也曰泰言惟有進於此不知其次至哉泰之言其即董狐之意也司馬昭已無辭於泰而後世乃欲為趙盾辭乎歐陽永叔以傳不足信謂經書趙盾弒君則弒者實盾耳非穿也此亦過於立論矣抑晉襄公托其子於趙盾曰此子也才吾受子之賜不才吾惟子之怨君言猶在耳而盾遽欲背之舍之不立而外求君不忠已見於此矣及患穆嬴之言不得已而立靈公使盾知大臣輔幼主之道早諭教而慎其防使非正之人不近于側非正之言不聞于耳非正之事不接于前則靈公雖冥頑不亦可以免于過乎盾既逸其苙而欲以强諫收之於後難矣及君臣相拂積其忿戾以至於相賊乃猶曰吾非弒君將誰欺乎附左傳初驪姬之亂詛無畜羣公子自是晉無公族無公子故廢公族之官及成公即位乃宦卿之適子而為之田以為公族宦仕也為置田邑以為公族大夫又宦其餘子嫡子之母弟亦為餘子亦治餘子之政其庶子為公行掌率公戎行晉於是有公族餘子公行皆官名按晉自是公室孤而私門强三家分晉其來有漸矣東萊吕氏語見僖五年冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望公羊傳其言之何緩也之助語耳曷為不復卜據定十五年牛死改卜牛養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在于滌三月於稷者唯具是視滌者養牲之宫名取蕩滌潔清之意於稷者唯視其身體具無災害而已不特養于滌宫所以降稷尊帝郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自內出者無匹不行自外至者無主不止左傳不郊而望皆非禮也望郊之屬也不郊亦無望可也胡傳乃不郊為牛之口傷改卜牛而牛又死也趙氏曰養牲只養二牛既並死自然合廢郊不然郊矣禮為天王服斬衰周人告喪於魯史策已書而未葬也祀帝于郊夫豈其時而或謂不以王事廢天事豈禮乎張氏曰此因事之變以明魯郊之非禮蓋僣禮之中復有忘哀從吉之罪三年之喪乃臣子斬衰奔赴之時豈可僣天子越紼行事之禮春秋所以特書之胡傳三望者公羊曰祭泰山河海夫天子有天下凡宇內名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎季氏旅于泰山冉求不能救而夫子責之為泰山魯侯所主也季氏不得旅泰山則河海非魯之封內其不得祭亦明矣葬匡王四月而葬簡也㑹者不書微也或曰公親往也以常事不書耳崩葬始終之大變豈以是為常事而不書也附左傳晉侯伐鄭及郔鄭及晉平士㑹入盟郔鄭地楚子伐陸渾之戎渾户門反榖無之字公作賁渾戎後同賁音奔或音六左傳楚子伐陸渾之戎遂至于雒雒水出上雒冢領山至河南鞏縣入河觀兵于周疆定王使王孫滿勞楚子王孫滿周大夫楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物按逺方圖物者圖上山川地里耳鑄鼎象物者象所圖物鑄之于鼎耳蕭何入關先收秦圖籍得具知九州道里户口地形厄塞古人鑄之于鼎取不朽也左氏因謂圖鬼神百物之形使民知備入山林川澤魑魅罔兩莫能逢之此不足信蓋見後世鐘鼎圖鬼神物象而附㑹耳桀有昏德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏今河南也卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也夏楚人侵鄭左傳鄭即晉故也秋赤狄侵齊赤狄始見經宋師圍曹宋文公逐武穆之族事在文十八年二族以曹師伐宋不書非討罪也宋師圍曹報武氏之亂書者宋有不赦之罪人莫能討而興戎以報人也直書而其義見矣冬十月丙戌鄭伯蘭卒葬鄭穆公穆公作繆葬不月闕文也或曰葬速禮不備也四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向杜氏曰莒郯二國相怨故公與齊侯共平之向莒邑東海承縣東南有向城按小邾射以邑歸魯魯使大夫盟之辭曰使子路約我無所用盟推子路之心居郯莒之間安有不聽者哉魯於郯有婚姻之嫌於莒有積不相下之釁徒挾齊之力而要以必從其不肯也宜矣宣公遽以兵加莒而取其一邑以已之不平求人之平又因以為利乎春秋首書公及而終以取向深責之也及所欲也取者盜也秦伯稻卒夏六月乙酉鄭公子歸生弒其君夷事不可考止據經文可也左氏所載猥陋不足信子公之黿不類羊斟之羊乎公食大夫君臣禮㑹豈得遽有染指于鼎之事靈公初立豈應即以小故欲殺大夫借曰一時之怒言非不可解之罪子公何至遽與子家歸生謀先乎怒者子公也子家無罪何事而與之謀子家聞此狂謀寧不駭異而顧曰畜老猶憚殺之而况君乎此與殺老牛莫之敢尸悖語同必其君素無道之甚積憾不堪而有之靈公初立子家無怨聞謀不詰而驟出此言尤非情也又謂子公反譖子家子家懼而從之譛者托何事以見信懼者因何危疑自度必不免而遂見從乎歸生貴戚之卿當國秉權君臣無釁謂其自有妄圖猶不可知而謂其以嘗黿之故從人弒逆雖病狂者亂不至此雖至愚者信不至此矣胡氏惑左氏而曲為之說嗚呼說經者先入於所聞而遊移前却以擬人之誅赦宜乎地下之趙盾得借口於歸生而欲移其獄矣使人不信于此則并其可信者而疑之矣歐陽公不信趙穿之事由此類啓之也赤狄侵齊秋公如齊公至自齊胡傳君行告至常事不書宣公比年如齊而皆致危之也附左傳初楚司馬子良生子越椒子良子文弟子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大戚及將死聚其族曰椒也知政乃速行矣無及于難且泣曰鬼猶求食若敖氏之鬼不其餒而而語助及令尹子文卒鬭般為令尹子文之子子揚子越為司馬椒也蒍賈為工正譛子揚而殺之子越為令尹已為司馬賈為椒譛子揚而已得椒處子越又惡之惡賈乃以若敖氏之族圄囚也伯嬴蒍賈於轑音遼陽楚邑而殺之遂處蒸野楚邑將攻王王以三王之子三王文成穆為質音致焉弗受師于漳澨市制反漳水邊秋七月戊戌楚子與若敖氏戰于臯滸楚地伯棼越椒也射王汰過也輈車轅及鼓跗車上不得置簨􅒶以縣鼓故為之跗若殷之楹鼓著於丁寧鉦也又射汰輈以貫笠轂兵車無蓋尊者則籩人執笠依轂而立以禦寒暑名曰笠轂此言箭過車轅及王之蓋師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡于是矣射中王車由射之工不由矢善若其由矢王所有其一何不發以取越椒乎蓋軍人神伯棼之射故王托矢以强衆心鼓而進之遂滅若敖氏初若敖娶於䢵國名生鬭伯比若敖卒從其母畜于䢵淫於䢵子之女生子文焉䢵夫人使棄諸夢澤名中虎乳之䢵子田見之懼而歸夫人以告告女私通所生遂使收之楚人謂乳穀如口反謂虎於音烏菟音徒故命之曰鬭榖於菟以其女妻伯比實為令尹子文鬬氏為令尹始于子文其孫針尹官名克黃子揚之子使於齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘于司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生易其名也冬楚子伐鄭左傳鄭未服也胡氏謂三年書人書侵為罪之此年鄭公子歸生弒其君諸侯未能討而楚師至故特書爵以豫之非也楚師之來為鄭未服非為討賊也何得豫之五年春公如齊左傳公如齊髙固使齊侯止公請叔姬焉夏公至自齊左傳書過也杜氏曰往朝見止要昏於鄰國之臣厭尊毁列辱其先君而於廟行飲至之禮故書以示過秋九月齊髙固來逆子叔姬左無子字左傳齊髙固來逆女自為也故書曰逆叔姬卿自逆也榖梁傳諸侯之嫁子於大夫主大夫以與之來者接內也不正其接內故不與夫婦之稱也謂不言逆女劉氏曰榖梁非也不曰逆女别於逆君夫人耳杜氏曰適諸侯稱女適大夫稱字所以别尊卑也不書女歸降於諸侯胡傳其曰來者以公自為之主稱子者或謂别於先公之女也宣公逼於髙固降與之婚惟不知以禮為守身之幹是以得此辱也叔孫得臣卒何氏曰不日者知公子遂欲弒君為人臣知賊而不言明當誅按不日闕文也冬齊髙固及子叔姬來左傳反馬也杜氏曰叔姬寧固反馬按禮嫁女留其送馬謙不敢自安三月廟見遣使反馬髙固親來非禮也叔姬初嫁未合歸寧亟來亦非禮也大夫適他國必有君命與公事舍君事而從婦歸寧皆非也楚人伐鄭左傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳按晉救不書晉若討鄭之賊楚師不禦而自去矣若楚能仗義亦孰能與之爭惟志不在於討賊而在于爭强交罪之也六年春晉趙盾衛孫免侵陳左傳春晉衛侵陳陳即楚故也公羊傳趙盾弒君此其復見何據宋督鄭歸生齊崔杼後不復見也按弒君復見者多矣公羊立此義非親弒君者趙穿也親弒君者趙穿則曷為加之趙盾不討賊也何以謂之不討賊晉史書賊曰晉趙盾弒其君夷嗥趙盾曰天乎無辜吾不弒君誰謂吾弒君者乎史曰爾為仁為義人弒爾君而復國不討賊此非弒君而何趙盾之復國奈何靈公為無道使諸大夫皆內朝然後處乎臺上引彈而彈之已趨而辟九己巳諸大夫也是樂而已矣以是為樂笑趙盾已朝而出與諸大夫立于朝有人荷畚荷負也畚草器若今市所用量榖者自閨而出宫中小門趙盾曰彼何也始怪何等物之辭夫畚曷為出乎閨熟視知其為畚乃言夫畚者賤器何故乃出君之閨乎呼之不至曰子大夫也欲視之則就而視之恐靈公謂荷畚者泄死人事於大夫欲以見就為解也趙盾就而視之則赫然死人也赫然乍見可駭之貌趙盾曰是何也曰膳宰也熊蹯掌不熟公怒以斗摮而殺之摮五羔反猶摮也支解將使我棄之趙盾曰嘻趨而入靈公望見趙盾訴而再拜訴者驚貌先拜者知其欲諫欲以敬拒之趙盾逡巡北面再拜稽首趨而出靈公心怍焉欲殺之於是使勇士某者往殺之勇士入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉堂不設守視人故不言堂焉者俯而窺其户方食魚飱勇士曰嘻子誠仁人也吾入子之大門則無人焉入子之閨則無人焉上子之堂則無人焉是子之易也子為晉國重卿而食魚飱是子之儉也君將使我殺子吾不忍殺子也雖然吾亦不可復見吾君矣遂刎頸而死靈公聞之怒滋欲殺之甚衆莫可使往者於是伏甲于宫中召趙盾而食之趙盾之車右祁彌明者國之力士也仡然從乎趙盾而入放依也乎堂下而立趙盾已食靈公謂盾曰吾聞子之劒蓋利劒也子以示我吾將觀焉趙盾起將進劒祁彌明自下呼之曰盾君前臣名食飽則出何故拔劒于君所趙盾知之由人曰知之自已知曰覺焉躇丑略反階而走躇猶超遽不暇以次靈公有周狗周地所産者謂之獒犬四尺呼獒而屬之獒亦躇階而從之祁彌明逆而踆之音存以足逆􅟩曰踆絶其頷趙盾顧曰君之獒不若臣之獒也然而宫中甲鼓而起有起於甲中者抱趙盾而乘之趙盾顧曰吾何以得此于子曰子某時所食活我于暴桑下者也趙盾曰子名為誰曰吾君孰為介介甲也晉君誰為興此甲兵豈不為盾乎子之乘矣何問吾名趙盾驅而出衆無留之者趙穿緣民衆不說起弒靈公然後迎趙盾而入與之立于朝而立成公黑臀胡傳愛人不親反其仁治人不治反其智晉嘗命上將帥師救陳又再與之連兵伐鄭今而即楚無乃於已有闕而遽以兵加之故林父不書伐而盾免書侵以正晉人所以主盟非其道也夏四月附左傳夏定王使子服周大夫求后于齊秋赤狄伐晉圍懷及邢丘今河內平臯縣晉侯欲伐之中行桓子曰使疾其民驕則數戰為民所疾以盈其貫將可殪也以緡穿物曰貫書曰商罪貫盈言紂之為惡如物在緡索之貫纍而至于滿也杜訓為習非秋八月螽冬十月附左傳冬召桓公王卿士逆王后于齊楚人伐鄭取成而還杜氏曰九年十一月傳所稱厲之役蓋在此按厲恐是地名此處傳文似有脫略七年春衛侯使孫良夫來盟左傳春衛孫桓子來盟始通且謀㑹晉也胡傳來盟為前定者嘗有約言矣未足效信而釋疑又相歃血固結之耳是盟衛欲為晉致魯而魯專事齊初未與晉通也必有疑焉而衛侯任其無咎故遣良夫來盟而公卒見辱盟非春秋之所貴義自見矣夏公㑹齊侯伐萊秋公至自伐萊左傳不與謀也凡師出與謀曰及不與謀曰㑹萊國今東萊黃縣大旱杜氏曰書旱不書雩雩無功或不雩冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤左傳鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黑壤王叔桓公周卿士臨之以謀不睦晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黃父即黑壤公不與盟以賂免故黑壤之盟不書諱之也按自文公以來晉以不朝討魯者再矣文公二年見辱以處父之盟直書其事者以諸侯之立當朝王耳非晉之所當責也今年黃父之㑹止公于㑹而不與于盟書㑹不書盟何也恭近於禮逺恥辱也每歲適齊而簡于晉恥辱由宣公自掇之也春秋為尊者諱冬㑹而春書至考其故而義自見矣抑宣公篡立逭於天討七年矣使晉成能一問之執而歸諸京師正宣公襄仲之罪則霸義舉而諸侯服矣乃直以其簡已之故舍大而問小得賂而罷是其責又不在禮也夫儀不及物猶曰不享謂可貨取侮孰甚焉以此連諸侯是盜賊之威而已矣奚霸之有宣公因齊而得篡故事齊甚至由其專于齊也故忘其替于晉使晉討其賊則殺惡及視之怨既正其典而比齊慢晉之故亦誅其心亂賊不復敢恃人以為惡矣八年春公至自㑹宣公篡立不朝未聘非實敢慢晉也懷疑而不敢自通耳晉成之立而不敢正趙盾趙穿之罪則亦安能討魯乎宜乎責朝取賂為諸侯笑而已然而因㑹見止改歲而始反使晉國有人天牖其衷事未可知矣獨不思曰彼數數于齊繄何德而親乎使晉有疑者則事未可知矣故至者危其不得反也夏六月公子遂如齊至黃乃復公羊傳其言至黃乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞喪徐行而不反聞喪者聞父母之喪徐行者不忍疾行又為君當使人追代之以喪喻疾者喪尚不當反况疾乎范氏曰黃齊地杜氏曰大夫受命而出雖死以尸將事遂以疾還非禮也儀禮聘禮篇若有私喪則哭于館哀而居不饔食歸使衆介先衰而從之又曰若賓死未將命則既斂于棺造于朝介將命陸氏曰榖梁云還者事未畢復者事畢文正倒也當為還者事畢復者事未畢師還公還自晉歸父還自晉士丐聞齊侯卒乃還皆不復更往故曰還事畢也公如晉至河乃復公孫敖如京師不至而復仲遂至黃乃復皆事未畢而復也辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥大音泰去起吕反籥羊略反左傳有事于大廟襄仲卒而繹非禮也杜氏曰有事祭也禮有一犆一祫之說或分享于五廟或合享于大廟合享則書有事于大廟分享則書四時祭名為凡祭而失禮則書祭名祭非失禮下事張本則不書祭名仲遂卒與祭日同略書有事為繹張本不言公子因上行還間無異事省文從可知也垂齊地非魯竟故書地大夫卒竟內不地竟外地繹又祭陳昨日之禮所以賓尸萬舞名籥管也孫炎曰尋繹復祭也爾雅繹陳也是陳昨日之禮朱子曰賓尸以賓客之禮燕為尸者籥如笛而六孔所吹以節舞也猶者可止之辭魯人知卿佐之喪不宜作樂而不知廢繹故內舞去籥惡其聲聞公羊傳繹者何祭之明日也萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者廢其無聲者廢置也置不去也齊人語存其心焉爾存其心焉爾者何知其不可而為之也明其心猶存于樂知其不可故去其有聲者而為之猶者通可以己也何氏曰禮大夫死為廢一時之祭有事于廟而聞之者去樂卒事而聞之者廢繹日者起明日也言入者據未奏去籥時書凡祭自三年喪以下各以日月廢時祭唯郊社越紼而行事可按曽子問諸侯祭社稷俎豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢由廢則知雖當祭必告所以然者天子后至尊無二君夫人於一國尊親無二薨終大故豈容不告聞告則致哀無二所以廢也大夫則不當告公羊謂君有事于廟聞大夫之喪去樂卒事禮也非也榖梁謂君在祭樂之中大夫有變以聞大夫國體也古之人重死見昭十五年叔弓卒亦非也按檀弓衛太史栁莊寢疾公曰疾革雖當祭必告則知舊不告也公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往此記其失禮非善之也夫禮莫重于當祭大夫有變而不以聞則內得盡其誠敬之心於宗廟外全隱恤之意於大臣是兩得之也衛當祭而告神明已接而禮不終乃以請于尸而往示全于祖魯卒事而聞而不知廢繹乃以萬入去籥示全于臣是兩失之也辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥以為去籥之示變不如不繹之為愈也癸酉有事于武宫籥入叔弓卒去樂卒事蓋叔弓在祭所籥入而卒緣先祖之心見大臣之卒必聞樂不樂緣孝子之心神明已接不可以卑廢尊故去樂卒事而可也書仲遂猶繹志禮之失也書叔弓去樂志禮之變也二者不同檀弓仲遂卒于垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹告喪去籥非盡敬于宗廟存其心焉非致哀于大臣仲者遂之字卒而以字加于名之上者賜之族而以其字為氏豫命其子孫世世為卿如季友之例也干舞武舞籥舞文舞萬者干舞也令尹子元欲蠱文夫人為館于其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也則萬為武舞明矣吕氏詩記謂萬乃文武二舞之總名春秋萬入去籥言二舞皆入去其有聲者耳公羊乃以萬為武舞與籥舞對言失經意矣按萬入去籥謂武舞入文舞不入耳非二舞並行乃留萬而去籥也公羊不誤吕氏引公庭萬舞考仲子之宫將萬焉為二舞總名之證俟再考戊子夫人嬴氏薨公榖作熊氏按敬嬴文公妾也稱夫人踵乎成風也哀姜淫乎慶父與弒二君齊桓討而殺之僖公之心必以哀姜不可入宗廟配其父而不敢明言故於成風生則禘于太廟用致夫人既尊之以齊其父矣於其殁也豈肯别立宫如仲子乎有二夫人祔廟自成風始也雖由僖公欲尊其母而實因哀姜義絶于廟故當時得生此義也此猶漢吕后負劉氏稱制王諸吕而文帝之後諸臣因尊薄姬以配髙帝事正同也敬嬴見成風之事欲自附以為尊襄仲緣季友之迹欲自文以非賊而豈知出姜無罪為賊臣悖妾所逐歸死母家非以義絶而不得奉宗廟配先君既不與哀姜同而敬嬴私事襄仲與之殺嫡立庶逐嫡母僣夫人亦不與成風同惟王室不競中國無霸故得肆行而無忌然哀姜慶父先後誅慶父知不容而自縊亦誅也而敬嬴襄仲亦後先殞何其相類也孰謂天道逺哉汪氏曰春秋既書夫人姜氏薨于夷又書夫人風氏薨則知哀姜為莊公夫人而成風乃妾也既書夫人姜氏歸于齊又書夫人嬴氏薨則知出姜為文公夫人而敬嬴乃妾也直書于策讀者比事而觀微傳而見矣晉師白狄伐晉白狄始見經左傳春白狄及晉平夏㑹晉伐秦杜氏曰白狄狄别種故西河郡有白部胡髙氏曰殽之役書及姜戎此不言及者以傳考之白狄為主也經先晉者不與夷狄之㑹中國也家氏曰不書及晉偶晉於狄亦狄晉耳按成十三年晉絶秦書曰白狄與君同州君之仇讐而我之婚姻也君來賜命曰吾與汝伐狄寡君不敢顧婚姻畏君之威而受命于吏君有二心於狄曰晉將伐女狄應且憎是用告我左氏謂秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉由此言之曲固在秦然安知非是役啓之耶秦伐白狄晉不顧婚姻而從之秦有二心於狄狄又以其情告晉秦也晉也狄也同一不羞反覆難保信者也春秋每狄秦狄晉無怪也然晉秦自河曲戰後久已厭兵趙穿生事侵崇秦嘗報晉至是秦共晉靈皆殁怨已易世而晉復伐秦知白狄昏姻之可與抑獨不念秦之昏姻之尤親中夏纍世盟好之尤重耶傎悖亦甚矣楚人滅舒蓼公作舒鄝左傳楚為衆舒叛故伐舒蓼滅之楚子疆之正其界也及滑于八反水名汭盟吳越而還吳國今吳郡越國今㑹稽山隂縣傳言楚强吳越服從後吳越大杜氏曰舒蓼二國名按春秋未有二國連書者雖狄别種尚書甲氏及留吁舒蓼不言及實一國耳舒同宗而異國曰舒蓼曰舒庸曰舒鳩皆舒也所謂羣舒也蓼國文五年已滅故知云二國者非也象山陸氏曰聖人貴禮義賤僣亂中國禮義之所在貴中國者貴禮義也蠻荆僣亂禮義將無所施矣此聖人之大憂也楚人滅弦滅黃滅江滅庸至是又滅舒蓼聖人是以悉書之秋七月甲子日有食之既象山陸氏曰日者陽也陽為君為父為夫為中國苟有食之斯為變矣食至于既變又大矣言日不言朔食不在朔也日之食必在朔食不在朔厯差也杜氏曰月三十日食附左傳晉胥克有蠱疾郤缺為政代趙盾秋廢胥克使趙朔盾之子佐下軍代胥克冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬敬嬴公穀作頃熊左傳冬葬敬嬴雨不克葬禮也禮卜葬先逺日辟不懷也卜葬先卜逺日辟不思念其親似欲汲汲而早葬之也先逺日謂先下旬不吉卜次旬又不吉卜上旬旬之外曰逺日旬之內曰近日喪事先逺日吉事先近日穀梁傳葬既有日不為雨止禮也雨不克葬喪不以制也按左氏以雨不克葬為禮穀梁以葬既有日不為雨止為禮孝子慈孫當送終之大事備貴於豫而變難於期雨而無害如穀梁之說可也如雨甚而不可以即土汲汲焉葬反為不可追之悔則左氏之說亦未為失城平陽大喪之後亟用民力所以書杜氏曰今泰山有平陽縣楚師伐陳左傳陳及晉平楚師伐陳取成而還九年春王正月公如齊有母之喪辨冕而朝于鄰國乎公至自齊夏仲孫蔑如京師左傳春王使來徴聘夏孟獻子聘于周王以為有禮厚賄之勤齊至矣又冒哀而往而於京師缺如也因徴聘而大夫黽勉於一行象山陸子曰直書于策比而讀之而無懼心者吾不知矣齊侯伐萊東萊有萊山萊東於齊之小國也秋取根牟杜氏曰根牟東夷國也今琅琊陽都縣東有牟鄉八月滕子卒九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳辛酉晉侯黑臀卒于扈左傳㑹于扈討不睦也陳侯不㑹晉荀林父以諸侯之師伐陳晉侯卒于扈乃還扈鄭地公羊曰晉邑非也諸侯不卒于其國都例書地公羊曰卒其封內不地非也諸侯卒于師曰師卒于㑹曰㑹不言卒干㑹者㑹禮已畢故不言耳公羊云未出其地故不言㑹亦非也冬十月癸酉衛侯鄭卒晉成公何以不葬衛成公何以不葬魯不㑹也宋人圍滕左傳因其喪也伐滕之喪不仁間晉之喪以侵小不義曰圍則師非少楚子伐鄭晉郤缺帥師救鄭左傳楚子為厲之役故伐鄭六年傳止云楚人伐鄭取成而還而不詳厲役之事此云楚子為厲之役故伐鄭則知前有闕失矣厲蓋地名杜預謂取成於厲既成而鄭伯逃歸楚子恨之晉郤缺救鄭鄭伯敗楚師於栁棼鄭地國人皆喜唯子良憂曰是國之災也吾死無日矣按自厲之役鄭南北無屬楚未得志七年鄭又及晉平㑹于黑壤故楚今年伐鄭不以黑壤興戎逺稱厲之役者志恨在厲役也是時晉景方立郤缺救而不能定是以十一年辰陵之盟鄭子良曰晉楚不務德而兵爭與其來者可也乃從楚然楚莊之立加兵于鄭者凡四而兩書楚子說凡例者紛然愚意書楚子者君為將也書人者大夫也僣亂內侵何可褒而以書楚子曲生意義耶不務德而兵爭此一言斷盡晉楚爭鄭之是非說經者乃方以一字為褒貶曰某事與之某事貶之屑屑較量吾知必為子良之所笑矣陳殺其大夫泄冶泄息列反作泄非唐人諱世字雖偏傍亦然改泄為泄冶音也左傳陳靈公與孔寧儀行父二人陳卿通于夏姬鄭穆公女陳大夫御叔妻皆衷其衵女乙反服近身衣以戲于朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之納藏衵服公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶穀梁傳稱國以殺其大夫殺無罪也按稱陳殺其大夫殺無罪也或譏泄冶薦圭璧於泥塗固已疏矣觸虎狼以取死庸得為智乎夫臣之于君猶子之于父雖知不可諫而心不可已也比干諫而死比干豈欲徒死而沽名哉庶幾吾言得行而紂改焉耳詳泄冶之諫直而不激非鬻拳先軫國武子之比故靈公亦愧乎其言愧者良心之發也安知其終不能改改而君不死於徴舒陳不夷于九縣泄冶之力也泄冶之諫胡可少哉或又曰仕於昏亂之朝異姓者如宋子哀潔身而去可也其貴戚而不食其祿如魯叔肸善矣冶雖效忠其猶在子哀叔肸之後乎是又不然夫君子之道或出或處或默或語惟其時而已必于潔身逺患非也必于出身犯難亦非也觀泄冶之能諫知其非貪乎寵祿見幾而不去者如皆欲為子哀叔肸則亂世何賴于有君子乎十年春公如齊公至自齊齊人歸我濟西田左傳齊侯以我服故歸濟西之田趙氏曰公羊云齊已取之矣其言我何言我者未絶于我也按已取之又言未絶何迂誕之甚言我者為濟水長不必是魯田以别他田爾榖梁云公娶齊齊由以為兄弟反之不言來公如齊受之也按但言歸我則足知其來也省文耳夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛左傳夏齊惠公卒崔杼有寵于惠公髙國二家齊正卿畏其逼也公卒而逐之奔衛書曰崔氏非其罪也且告以族不以名典策之法告者皆當書以名今齊特以族告夫子因而存之以示無罪凡諸侯之大夫違奔放也告于諸侯曰某氏姓之守臣某名失守宗廟敢告所有玉帛之使者謂聘則告不然則否恩好不接故亦不告公羊傳稱崔氏何譏世卿也胡氏曰此非公羊本㫖蓋門人因尹氏武氏稱世卿而附益之于此穀梁傳氏者舉族而出之之辭也胡傳書曰崔氏以族奔也許翰謂崔杼出而能反反而能弒者以其宗彊於此舉氏辨之早也其說得矣按自此至崔杼弒莊公凡五十一年古者四十而仕五十而爵使為一人則崔杼蓋百歲矣以棠姜亂國以崔明滅家必非耋耄之人所為然則非一人也公如齊五月公至自齊左傳公如齊奔喪癸巳陳夏徴舒弒其君平國左傳陳靈公與孔寧儀行父飲酒于夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廏射而殺之二子奔楚胡傳陳靈公之無道也而稱大夫之名氏以弒何也禍莫大於拒諫而殺直臣忠莫顯於身殺而其言驗泄冶直諫靈公不能納又殺之卒以見弒亡其國此萬世之大戒也以為罪不及民故稱大夫以弒者非經意矣六月宋師伐滕左傳滕人恃晉而不事宋六月宋師伐滕滕小國也居大國之間而從於彊令不能兩給非其心也大當字小恤其不及去年因其喪而圍之今年動衆而伐之故特稱師以著其陵弱暴寡之罪公孫歸父如齊葬齊惠公晉人宋人衛人曹人伐鄭左傳鄭及楚平諸侯之師伐鄭取成而還按晉楚交伐鄭亦乍晉乍楚以應之子良所謂不務德而兵爭與其來者可也子家曰居大國之間而從於强令豈其罪也子駟曰民急矣姑從楚以紓吾民晉師至又從之敬共幣帛以待來者小國之道也犧牲玉帛待于二境以待强者而庇民焉君子曰子家子駟之言鄭國之情也晉可以察矣子展曰小所以事大信也晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸杖莫如信完守以老楚杖信以待晉不亦可乎君子曰子展之言君子之道鄭國不易之長策也晉可以省矣秋天王使王季子來聘左傳劉康公來報聘報孟獻子之聘王季子後食采于劉胡傳公羊氏曰王季子者王之母弟也宣公享國至是十年不朝于周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿㑹匡王葬而使歸父㑹齊侯之葬縱未舉法而使王季子來王靈益不震矣自是王聘春秋不書矣公孫歸父帥師伐邾取繹繹公作蘱杜氏曰繹邾邑魯國鄒縣北有繹山孔氏曰文十三年傳稱邾遷于繹則繹為邾之都矣更别有繹邑今魯伐取之非取邾之都也亦因繹山為名蓋近在邾都旁耳大水季孫行父如齊冬公孫歸父如齊左傳季文子初聘于齊齊侯初即位冬子家如齊伐邾故也魯侵小恐為齊所討故往謝齊侯使國佐來聘左傳國武子來報聘報行父之往饑楚子伐鄭左傳楚子伐鄭晉士㑹救鄭逐楚師于潁北潁水出河南陽城至下蔡入淮諸侯之師戍鄭鄭子家卒鄭人討幽公之亂斫子家之棺而逐其族改葬幽公諡之曰靈象山陸氏曰當是時晉伯既不復可望齊魯之間熟爛如此楚子之肆行其誰遏之伐鄭之書聖人所傷深矣左氏所載士㑹逐楚師于潁北不見於經縱或有之亦不足為輕重也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵穀作夷陵盟楚與晉狎主左傳春楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也杜氏曰辰陵陳地頴川長平縣東南有辰亭胡氏有與楚之說吾於入陳鄭論之公孫歸父㑹齊人伐莒秋晉侯㑹狄于櫕亟櫕才端反左傳晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉赤狄潞氏最强故服役衆狄秋㑹于櫕亟狄地衆狄服也按比事而觀上則楚子陳侯鄭伯盟于辰陵成乎霸主矣下則楚人殺陳夏徴舒行乎霸討矣而魯方㑹齊伐莒晉方㑹狄于櫕亟其言外之意可謂深切著明矣冬十月楚人殺陳夏徴舒公羊以楚子稱人為貶其專討但檢前後弒君見討者皆稱人以殺殺有罪也直書而義自見然殺徴舒之後即入陳而納其亂臣比事而觀則春秋非豫楚明矣據傳入陳而後殺徴舒經以討賊之義為重故先書殺後書入耳丁亥楚子入陳納公孫寧儀行父于陳寧公作寧左傳冬楚子為陳夏氏亂故伐陳謂陳人無動將討于少西氏少西徴舒之祖子夏之名遂入陳殺夏徴舒轘音患車裂也諸栗門陳城門因縣陳陳侯在晉靈公子成公午申叔時使於齊齊楚通反復命而退王使讓之曰夏徴舒為不道弒其君寡人以諸侯討而戮之諸侯縣公皆慶寡人楚縣大夫皆僣稱公女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弒其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊音兮人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎曰吾儕小人所謂取諸其懷而與之也取人物于其懷而還之為愈于不還乃復封陳鄉取一人焉以歸謂之夏州州鄉屬示討夏氏所獲程子曰人衆辭大惡人所欲誅也誅其罪義也取其國惡也胡傳先書殺後書入者與討賊故先之也陸氏曰楚子之討正也故書人入人之國又納淫亂之臣邪也故明書其爵以示不正春秋之義彰善疸惡纎芥無遺稱事原情瑕瑜不掩斯之謂也入人之國制人之上下使不得其君臣之道不可賈逵曰二子不繫之陳絶于陳也按使楚莊真有討賊之心則辰陵之盟執徴舒而誅之一夫之力耳奚假動大師臨其城紿入其國謂陳人無動將討于少西氏陳人信之故不禦而後為快哉夏徴舒不勝忿耻以弒其君其賊易知也而孔寧儀行父之為賊難見也何則公告泄冶之故寧行父請殺之公弗禁遂殺之然則躬殺泄冶者二賊也徴舒之耻發于似女亦似君之言然則激自廏之射者又二賊也平國既弒不他奔而奔楚蓋志在以陳餌楚而殺徴舒矣楚莊動於利而興師非申叔時之言則陳遂縣矣然則致胡公大姬幾不祀者又二賊也使盡乎天討則二賊之誅不當在徴舒之後而反納之楚莊之志可知矣抑申叔時之言固善然楚子之所以不遂取陳者實以陳侯之在晉耳晉率諸侯納陳之故君而不泯其社稷陳人應之反楚如反掌矣此楚所以不敢取而復封之以為名知不能有也附左傳厲之役鄭伯逃歸事在六年自是楚未得志焉自厲之役鄭南北無屬故未得志楚于九年伐鄭十年又伐而鄭及楚平鄭平不書鄭既受盟于辰陵又徼事晉辰陵盟後又徼事晉經亦不書傳特發此以為明年楚圍鄭起十有二年春葬陳靈公公羊傳討此賊者非臣子也何以書葬君子辭也楚巳討之矣臣子雖欲討之而無所討也楚子圍鄭左傳春楚子圍鄭旬有七日鄭人卜行成不吉卜臨哭也于大宫鄭祖廟且巷出車吉出車于巷示將見遷不得安居國人大臨守陴者皆哭陴婢支反城上僻倪楚子退師鄭人修城進復圍之三月克之入自皇門至于逵路塗方九軌鄭伯肉袒牽羊以逆示服為臣僕曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福于厲宣桓武不泯其社稷使改事君夷於九縣楚滅九國以為縣願得比之君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾音冀乎言鄭未可得退三十里而許之平潘尫楚大夫入盟子良鄭伯弟出質按鄭與陳皆服楚盟于辰陵矣口血未乾楚先叛盟入陳而欲縣之若以為討於少西氏則徴舒之弒在宣十年之夏辰陵之盟在宣十一年之夏閲一朞矣既盟其君借曰為君討其先君之賊宜不待師旅直煩一介召之耳而躬帥師以入其國不曰利之其誰信之陳鄭一體也入陳之國制人之上下使不得其君臣之道陳之賢于縣鄙無幾耳鄭安得不因而生二心又徼事晉乎楚不自反而又肆而虐師旅所加有史所不忍記者宋易子而食析骸而爨鄭國人大臨守陴者皆哭無辜肝腦塗地者不知其幾矣其君非有大惡於民而折伏困辱同于俘虜楚之無道亦極矣滅不言入陳嘗縣之矣而不書曰滅入不言圍鄭入自皇門至于逵路矣而但書曰圍此聖人之深意非人所易識也夫二國楚蓋幾于有之矣然而人心未去故家巨室猶存先聖神明之胄數百年有奉之社稷未易變而除之也故釋之以示服此楚莊之諼也實不能有故録其卒而略其始其文則實録其義則存中國不使蠻荆盡其虐滿其辭之微意也若曰與其能有討于中夏故未減其慿陵之罪而曰入而圍則大乖聖人之意矣夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績邲扶必反一音弼左傳夏六月晉師救鄭荀林父將中軍代郤缺先縠在之彘季代林父士㑹將上軍河曲之役郤缺將上軍宣八年代趙盾為政將中軍士㑹代將上軍郤克佐之郤缺之子代臾駢趙朔將下軍代欒盾欒書佐之欒盾之子代趙朔趙括趙嬰齊皆趙盾異母弟為中軍大夫鞏朔趙穿為上軍大夫荀首林父弟趙同嬰兄為下軍大夫韓厥萬𤣥孫為司馬及河聞鄭既及楚平桓子欲還曰無及于鄭而勦民焉用之桓子林父勦勞也楚歸而動伐鄭不後隨武子士㑹曰善㑹聞用師觀釁而動見可而進知難而退軍之善政也彘子先榖曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死以中軍佐濟佐彘子所帥也濟渡河韓獻子厥謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也今鄭屬楚是失屬彘子以偏師陷是亡師事之不捷惡有所分與其專罪六人同之不猶愈乎朱子語録先生問人傑記左傳分謗事否人傑以韓獻子將殺人郤獻子馳救不及使速以徇對先生曰近世士大夫多是如此只要徇人情如荀林父邲之役先縠違命而濟乃謂與其專罪六人同之是何等見識當時為林父者只合按兵不動召先縠而誅之人傑曰若如此豈止全軍雖進而救鄭可也先生又云當時孫叔敖不欲戰伍參爭之事有合爭處須當力爭不可苟徇人情也師遂濟楚子北師次于郔鄭北地沈尹將中軍子重將左子反公子側將右將飲馬于河而歸聞晉師既濟王欲還嬖人伍參欲戰伍奢之祖父令尹孫叔敖弗欲曰昔歲入陳今茲入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反斾王告令尹改乘轅而北之次于管以待之晉師在敖鄗苦交反之間滎陽京縣東北有管城敖鄗二山名在滎陽縣西北鄭皇戌使如晉師曰鄭之從楚社稷之故也未有二心楚師驟勝而驕其師老矣子擊之鄭師為承楚師必敗彘子曰敗楚服鄭於此在矣欒武子書曰師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從楚少宰官名如晉師曰寡君少遭閔凶不能文聞二先君成王穆王之出入此行也將鄭是訓定豈敢求罪于晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命先王封唐叔于晉王子友于鄭皆以王室懿親使之夾輔周室當中國之樞蓋有深意晉必恤鄭今鄭不率寡君使羣臣問諸鄭以先王之命也鄭豈楚之所當訓定哉無鄭是無王命也晉容得不問哉此破鄭是訓定非求罪于晉之語豈敢辱候人敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹於鄭攘逐之異名也曰無辟敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師單車挑戰又示不欲崇和以疑晉之羣帥晉人逐之左右角之張兩角從旁夾攻之樂伯左射馬而右射人角不能進晉魏錡求公族未得而怒錡犨之子求為公族大夫欲敗晉師請致師弗許請使許之遂往請戰而還人知先縠之違命而不知魏錡之志之尤憯也楚潘黨尫之子逐之趙旃穿子求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之此等皆見荀林父為帥不能制命與魏錡皆命而往郤獻子克曰二憾往矣弗備必敗士季曰備之善若二子怒楚楚人乘我喪師無日矣不如備之楚之無惡除備而盟何損于好諸侯相見軍衛不撤警豈以兩軍相對和戰未定而遽不為備乎果然則晉之偷甚矣彘子不可何冥至是士季使鞏朔韓穿帥七覆為伏兵七處故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡錡退趙旃夜至于楚軍二人雖俱受命而不同行故旃後至席於軍門之外布席坐示無畏使其徒入之楚子為乘廣分為左右右廣雞鳴而駕日中而說舒鋭反舍也左則受之日入而說許偃御右廣飬由基為右彭名御左廣屈蕩為右王更迭載之故各有御右二廣王之親兵乙卯王乘左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳下曰裳晉人懼二子之怒楚師也使軘車軘徒溫反兵車名逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我軍志曰先人有奪人之心薄之也遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動言餘軍皆移去唯上軍在經所以書戰言猶有陳工尹齊楚大夫將右拒陳名卒以逐下軍楚子使潘黨率游闕游車補闕者四十乘從唐侯以為左拒以從上軍唐屬楚小國駒伯郤克也上軍佐曰待諸乎隨季曰楚師方壯若萃於我吾師必盡不如收而去之分謗同奔為分謗生民不戰為生民不亦可乎殿其卒而退不敗及昏楚師軍于邲晉之餘師不能軍不能成營也宵濟亦終夜有聲兵非不衆將不能用丙辰楚重輜重至于邲遂次于衡雍潘黨曰君盍築武軍築軍營以章武功而收晉尸以為京觀去聲積尸封土其上也臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武文字夫武禁暴戢兵保大定功安民和衆豐財者也今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無德而强爭諸侯何以和衆利人之幾危也而安人之亂以為已榮何以豐財兵動則年荒武有七德我無一焉何以示子孫其為先王宫告成事而已武非吾功也古者明王伐不敬取其鯨鯢大魚之名以喻不義之人吞食小國而封之以為大戮於是乎有京觀今罪無所晉國無所犯也而民皆盡忠以死君命又何以為京觀乎祀於河作先君宫告成事而還杜氏曰邲鄭地胡傳欒書救鄭軍帥之欲戰者八人武子遂還衆不敢遏逼陽之舉丐偃二將皆請班師荀罃令曰七日不克必爾乎取之遂下逼陽林父既知無及於鄭焉用之矣先縠若獨以中軍佐濟者下令三軍無得妄動按軍法而行辟夫豈不可既不能令乃畏失屬亡師之罪而從韓厥分惡之言知難而冒進是棄晉師於誰責乎故敗績特以林父主之也李廉曰春秋中國與楚戰不以勝負皆以中國為主徐邈曰內晉而外楚是也公羊以為大夫不敵君荀林父稱名氏以敵楚子者為惡林父非也此因得臣與晉侯戰稱人得臣未命之卿例不書名氏無他義也而穿鑿耳秋七月附左傳鄭伯許男如楚秋晉師歸桓子請死晉侯欲許之士貞子士渥濁諫曰不可城濮之役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭况國相乎及楚殺子玉公喜而後可知也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競今天或者大警晉也而又殺林父以重楚勝其無乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食焉何損于明晉侯使復其位冬十有二月戊寅楚子滅蕭左傳冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰蕭宋附庸國滅蕭蓋以逼宋也晉人宋人衛人曹人同盟于清丘此大夫同盟之始左傳晉原縠宋華椒衛孔達曹人同盟于清丘曰恤病討二於是卿不書不實其言也程子曰晉為楚敗諸侯懼而同盟既而皆渝故書人以貶之杜氏曰清丘衛地今在濮陽縣東南按諸侯懼楚而區區于盟約已末矣况旋踵而皆渝乎原縠敗邲師罪人主盟所從皆可知矣原縠先軫之後先軫或稱原軫原其食邑也縠食采於彘故稱彘子今又稱原縠襲其先世之稱也宋師伐陳衛人救陳左傳宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之胡傳陳有弒君之亂宋不能討而楚討之雖曰縣陳尋復封之其德於楚而不二未足責也宋人不能內自省德遽以大衆伐之非義舉矣衛人書救意在責宋也若衛叛盟則不待貶而自見矣十有三年春齊師伐莒公作伐衛左傳莒恃晉而不事齊故也夏楚子伐宋左傳以其救蕭也楚有事于中國常自鄭及宋宋不為固本之圖輕為兵先而與之爭於外今年之伐明年之圍又明年之平而南北之勢成矣秋螽公作􅏑冬晉殺其大夫先縠縠作榖音同按左傳赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師而殺之盡滅其族邲之戰三帥不欲也先縠愎戾專行以及於敗至是以為討然君不擇將是以其國豫敵也晉之從政者新未能行令其佐先縠剛愎不仁敵國知之矣而晉侯懵焉又釋趙旃魏錡不討而獨誅縠同罪異討殺者不受治矣越椒將攻王楚莊尚思子文之治楚而復克黃之所今不念先軫之舊勳而盡滅其族不又過乎故稱國以殺不去其大夫罪纍上也十有四年春衛殺其大夫孔達左傳清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰苟利社稷請以我說春孔達縊而死衛人以說于晉而免復室其子使復其位胡傳罪纍上也夏五月壬申曹伯夀卒晉侯伐鄭左傳夏晉侯伐鄭為邲故也晉敗于邲鄭遂屬楚告於諸侯搜簡閲車馬焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張穆公孫代子良于楚鄭伯如楚謀晉故也鄭以子良為有禮故召之按十二年晉救鄭不及鄭已從楚而晉徒敗于邲故又責服于鄭諸葛武侯之敗於街亭也考微勞甄壯烈引咎責躬布所失於竟內厲兵講武以為後圗戎士簡練民忘其敗使晉能然何難於制楚而服鄭乎桓文之師猶以廟謀節制為本故能取威定霸晉成之師弟子輿尸出不以律敗不知創而用罔無已春秋直書其事而義自見矣秋九月楚子圍宋左傳楚子使申舟無畏聘于齊曰無假道于宋亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋文十年楚子田孟諸無畏抶宋公僕曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀申舟子而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也同我于縣鄙與亡國同殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屢及于窒皇寢門闕劒及于寢門之外車及于蒲胥之市秋九月楚子圍宋按是時楚已得陳鄭許蔡非得宋不已故滅蕭以逼之不假道以挑之歷三時而圍不解卒得宋平而後已宋服則齊魯可搖矣此楚圍中國之序也鄭在楚之彀中未易旦夕爭也是時急莫先于救宋宋救捷則鄭亦可招矣而晉不知所先後勞師于鄭而緩于救宋乃比之雖鞭之長不及馬腹不知宋既去則楚威震及齊魯而南北之勢成矣豈但失鄭而已甚矣晉人之顚冥也胡氏以端本為說專一責宋夫宋伐陳固有啓釁之道然清丘之盟晉宋衛曹咸在以同懼楚為志而相要以恤病討二其策未為不善但諸侯不同心而遂敗之耳春秋之義志內外消長之大機均責諸侯而首罪晉其所關者天下之勢周公懲荆舒驅猛獸以寧百姓之道非為一國謀也葬曹文公冬公孫歸父㑹齊侯于穀大夫㑹諸侯始於單伯㑹齊侯于鄄繼見於公孫敖㑹晉侯于戚至此非霸事而私相㑹矣莊僖以下大夫未專政也文宣以下大夫始專政矣或曰謀楚也十有五年春公孫歸父㑹楚子于宋魯大夫始特㑹楚左傳孟獻子言于公曰臣聞小國之免於大國也聘而獻物物玉帛皮幣也於是有庭實旅百主人亦設籩豆百品實于庭以答賓朝而獻功獻其治國若征伐之功於牧伯於是有容貌威儀容顔采章車服文章嘉淑令辭稱讃而有加貨命宥幣帛謀其不免也誅而薦賄則無及也今楚在宋君其圖之公說春公孫歸父㑹楚子于宋按以千乘之魯為之以道猶可自强齊晉諸與國猶可責以信義互為聲援也謀其不免至於薦賄何其卑乎昔楚執宋公以伐宋以獻捷威魯而魯懼先諸侯而趨之今楚子圍宋威未至魯而魯震先宋之未平而求媚焉何其益卑乎孟獻子號賢大夫而謀國若此亦可鄙也已以賄欵夷晉魏綘施之于戎則其屬也以此制御使仰我鼻息不敢叛者也趙宋施之於契丹則其敵也已非畫矣猶曰休兵息戰使餌于我而我不失中國之盛强也南宋施之於金人則其仇也我挾不報之憾勢不並存彼有兼我之力豈以賂饜得我之宇其利豈不大于賂乎謀其不免而計出于此者亦可謂愚矣秦檜主和士子說春秋凡此類皆諱之如公孫歸父㑹楚子于宋皆以罪其二霸為說朱子曰春秋豈率天下以從三王之罪人哉特罪其叛中國耳夏五月宋人及楚人平左傳宋人使樂嬰齊告急于晉晉侯欲救之伯宗晉大夫曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之强能違天乎諺曰髙下在心川澤納汙山藪藏疾山之有林藪毒害者居之瑾瑜美玉匿瑕玉之病國君含垢天之道也君其待之乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信欲為義者不行兩信信無二命欲行信者不受二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而成命臣之祿也寡君有信臣下臣獲考死又何求楚子舍之以歸夏五月楚師將去宋申犀稽首于王之馬前曰無畏知死而不敢廢王命王棄言焉王不能答申叔時僕御也曰築室反耕者築室于宋分兵歸田示無去志宋必聽命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞公羊傳外平不書書平五宣四年平莒及郯昭七年暨齊平定十年及齊平十一年及鄭平皆內平此何以書大其平乎已也已謂二大夫何大其平乎已據大夫無遂事莊王圍宋軍有七日之糧爾盡此不勝將去而歸爾於是使司馬子反乘堙而窺宋城宋華元亦乘堙而出見之司馬子反曰子之國何如華元曰憊矣曰何如曰易子而食之析骸而炊之司馬子反曰嘻甚矣憊雖然吾聞之也圍者柑馬而秣之柑者以木銜其口不欲令食粟示有畜積使肥者應客是何子之情也華元曰吾聞之君子見人之厄則矜之小人見人之厄則幸之吾見子之君子也是以告情于子也司馬子反曰諾勉之矣吾軍亦有七日之糧爾盡此不勝將去而歸爾揖而去之反于莊王莊王曰何如司馬子反曰憊矣曰何如曰易子而食之析骸而炊之莊王曰嘻甚矣憊雖然吾今取此然後歸爾司馬子反曰不可臣已告之矣軍有七日之糧爾莊王怒曰吾使子往視之子曷為告之司馬子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾先以諾受絶子反語舍而止雖然吾猶取此然後歸爾欲徴糧待勝也司馬子反曰然則君請處于此臣請歸爾莊王曰子去我而歸吾孰與處于此吾亦從子而歸爾引師而去之故君子大其平乎已也大其有仁恩此皆大夫也其稱人何貶曷為貶據大其平平者在下也穀梁傳人者衆辭也平稱衆上下欲之也按楚之圍宋九月於此不惟宋之憊也甚楚亦兵罷食盡而將去矣凡外平不書者彼既事解不來告也此書者宋幸得平以告諸侯故魯史有其事耳暨齊平不稱人此稱人者圍者與被圍者兩力俱竭華元子反因上下之意權事宜以生兩國之民榖梁所謂上下欲之是也臣無專美而亦有從權應變以成君濟國之義公羊謂大其平乎已則不知無專美之義謂貶其平者在下則不知有從權應變之道也夫宋之急至于易子而食析骸而炊其望援如在水火而四鄰環視莫之動心楚軍亦止有七日之糧爾而晉不能出一師以撼之待其威單力盡徐自解罷書曰宋人及楚人平傷中國之失道也明王不興賢霸不出强者恣其力貪者滿其意人之類不將胥而盡乎此孔子所以懼而作春秋也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸左傳潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目酆舒潞相晉侯將伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰不可必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章潞賢人而奪黎氏黎侯國上黨壺關縣有黎亭地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂德茲益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之不討有罪曰將待後母乃不可乎晉侯從之六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之按狄人與諸夏各有分域彼不自量而來犯則彼之不祥膺之可也彼不吾犯而我貪其土地滅而取之則我亦不祥也據左氏潞子與晉婚姻也其相酆舒傷君目弒君夫人而君不能討晉人討之則執酆舒而誅之可也其君無罪其民無罪乃滅其國而以其君歸謂之何哉楚為封豕長蛇以蠶食上國天下岌岌乎有胥而為楚之勢不此之懼而以廣地於狄為得計悖亦甚矣荀林父敗軍之將不克報於楚而徒逞志於狄方以為功而受狄臣千室之賞春秋略而不書而書晉師以見其勞民動衆縱大敵棄諸夏而施侮奪於裔夷之為可耻也滅國以其君歸皆稱爵言奔者不名以歸者名夷狄之君稱子公羊云潞子之為善也躬足以亡耳穀梁云其曰潞子賢也皆謬說也秦人伐晉左傳秋七月秦桓公伐晉次于輔氏晉地壬午晉侯治兵于稷以略取也狄土稷晉地河東聞喜縣西有稷山時新破狄土地未定度秦師之緩故别遣魏顆距秦而晉侯尚自東行定狄立黎侯而還狄奪其地故晉復立之及雒晉侯還及雒地雒晉地魏顆敗秦師于輔氏獲杜回秦之力人也王札子殺召伯毛伯左傳王孫蘇與召氏毛氏爭政三人皆王卿士使王子捷即王札子殺召戴公及毛伯衛卒立召襄襄召戴公之子穀梁傳王札子者當上之辭也王臣有書字而言子者王季子是也有書子而繫名者王子虎是也此變文先名而曰王札子惡天子不以禮間之而任以權也札蓋天子之庶兄殺召伯毛伯不言其何也按此謬說也凡殺大夫稱其者皆君也此豈可云王札子殺其大夫召伯毛伯乎兩下相殺也兩下相殺不志乎春秋此其志何也矯王命以殺之非忿怒相殺也故曰以王命殺也以王命殺謂言王札子殺召伯毛伯是知以王命而殺之以王命殺則何志焉為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也胡傳邢侯專殺雍子於朝叔向以殺人不忌為賊請施邢侯君子以為義事見昭十四年王札子之罪當服此刑而天王不能施之無政刑矣杜氏曰王札子王子札也蓋經文倒札字附左傳晉侯賞桓子狄臣千室千家亦賞士伯以瓜衍之縣士伯士貞子曰吾獲狄土子之功也微子吾喪伯氏矣伯桓子宇邲之敗晉侯將殺林父士伯諫而止秋螽仲孫蔑㑹齊髙固于無婁公作牟婁同承筐杜氏曰無婁杞邑初稅畝左傳初稅畝非禮也穀出不過藉周法民耕百畝公田十畝借民力而治之稅不過此以豐財也公羊傳稅畝者何履畝而稅也時宣公無恩信于民民不肯盡力于公田故履踐按行擇其善畝榖好者取之初稅畝何以書譏始履畝而稅也古者什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一行而頌聲作矣榖梁傳古者什一藉而不稅初稅畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏非責也吏田畯也私田稼不善是吏勸相無方使人不盡力故責吏公田稼不善則非民民當先公後私初稅畝者非公之去公田而履畝十取一也以公之與民為已悉矣悉謂盡其力古者公田為居井竈葱韭盡取焉損其廬舍家作一園以種五菜外種楸桑杜氏曰公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初趙氏曰穀梁云非公之去公田而履畝十取一也按稅畝蓋公田租外又履步其畝十稅其一論語云二吾猶不足是也若云公田而於一井中均行十一之稅所得與藉何殊是又不得謂之二矣冬蝝生蝝帨全反胡傳始生曰蝝既大曰螽秋螽未息冬又生子災重及民也詳志之者急民事謹天災仁人之心王者之務也趙氏曰左氏注云未為災而書之者幸其冬生不為物害喜而書之按此類生訖便為災如蠶生而食葉也但為秋螽未息冬又生子重為民災故書穀梁云非災亦非也饑十有六年春王正月晉人滅赤狄甲氏及留吁左傳春晉士㑹帥師滅赤狄甲氏及留吁鐸辰鐸辰不書留吁之屬三月獻狄俘晉侯請于王戊申以黻冕命士㑹將中軍且為大傅代林父將中軍且加以大傅之官黻冕命卿之服大傅孤卿天子大傅三公之官也諸侯大傅三孤之官也周禮典命云公之孤四命鄭衆云九命上公得置孤卿一人春秋時晉為伯主侯亦置孤卿有大傅陽子大師賈他於是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也胡傳按左氏董是役者士㑹也上將主兵其稱人貶辭也甲氏潞之餘種留吁其殘邑也春秋于外裔攘斥之不使亂區夏則止矣必欲盡殄滅之無遺類豈仁人之心王者之事乎夏成周宣榭火榭公作謝火公穀作災左傳人火之也凡火人火曰火天火曰災杜氏曰成周洛陽宣榭講武屋别在洛陽者爾雅室有東西廂曰廟無東西廂有室曰寢無室曰榭謂屋歇前劉氏曰公羊云外災不書此何以書新周也非也穀梁云周災不志亦非也宋災猶志况周災乎來告則書爾啖氏曰公羊云宣榭者宣宫之榭也按宣王之廟毁已久矣縱不毁止當在王城不當在成周也髙郵孫氏曰公榖皆云樂器之所藏榭藏樂器則何獨名宣乎汪氏曰榭既無室何以藏樂器乎李氏堯俞曰廟不應有榭榭不應藏樂榭者講武之所宣者其宣王之所為乎楚語云榭不過講軍實故知榭是講武屋也竊疑宣王南征北伐講武于此遂以為名秋郯伯姬來歸左傳出也胡傳春秋內女出夫人歸凡男女之際詳書于策所以正人倫之本也冬大有年七年大旱十年大水六年螽十五年螽又蝝生十年十五年皆饑而此年以有年書志民慶也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公胡傳日卒書名赴而得禮記之詳也葬而不月其略在內六月癸卯日有食之杜氏曰不書朔官失之已未公㑹晉侯衛侯曹伯邾子同盟于斷道斷音短左傳春晉侯使郤克徴召也㑹于齊齊頃公帷婦人使觀之郤子登婦人笑于房跛而登階故笑之獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬郤克之介使待命于齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使髙固晏弱蔡朝南郭偃㑹晏弱桓子及斂盂髙固逃歸夏㑹于斷道討二也盟于卷楚即斷道辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于溫執三子不書非卿野王縣今屬河內穀梁傳同者有同也同外楚也按郤克徴㑹本為謀楚榖梁之說是也胡氏以為謀伐齊此大誤矣徴㑹在未見笑之先左氏載婦人笑于房自為鞍之戰張本耳斷道之盟同志於外楚此天下之大計也因小忿而忘大計舍攘夷匡世之功而雪一笑之耻晉之所以可罪也附左傳秋八月晉師還范武子請老初受隨曰隨武子後更受范郤獻子為政秋公至自㑹冬十有一月壬午公弟叔肸卒肸許乙反穀梁傳其曰公弟叔肸賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴于春秋胡傳稱弟得弟道也稱字賢也論情可以明親親言義可以厲不軌公孫嬰齊與叔老皆肸之子叔老生叔弓叔弓生輒與叔鞅輒生叔詣十有八年春晉侯衛世子臧伐齊左傳晉侯衛太子臧伐齊至于陽穀齊侯㑹晉侯盟于繒以公子彊為質于晉晉師還蔡朝南郭偃逃歸公伐把夏四月附左傳夏公使如楚乞師欲以伐齊秋七月邾人戕鄫子于鄫戕音墻鄫榖作繒左傳凡自虐其君曰弒自外曰戕胡傳戕者殘賊而殺之也公羊語于鄫者刺臣子不能救君難也甲戌楚子旅卒旅榖作吕楚始書卒左傳楚莊王卒楚師不出既而用晉師成二年戰于鞍是楚於是乎有蜀魯地之役公羊傳何以不書葬吳楚之君不書葬辟其號也公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊笙公榖作柳左傳公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫臧宣叔文仲子武仲怒曰當其時不能治也後之人何罪子欲去之許武仲名請去之武仲時為司寇主行刑遂逐東門氏襄仲居東門故曰東門氏子家還及笙子家歸父字壇幃復命于介除地為壇而張帷將去使介反命于君既復命袒括髮即位哭三踊而出依在國喪禮設哭位公薨故遂奔齊書曰歸父還自晉善之也公羊傳還者何善辭也何善爾歸父使于晉還自晉至柳聞君薨家遣墠帷哭君成踊反命于介自是走之齊杜氏曰笙魯竟也故不言出歸父以君命出使未反而君薨在聘禮有執圭復命于殯之文升自西階子臣皆哭成公君臣死君而忘父逐之亟也榖梁子曰捐殯而奔其父之使者是亦奔父也得經意矣按行父因歸父謀去三桓假殺適立庶之說以逐東門氏不臣之跡著矣始而與襄仲同謀以成宣公之篡使齊納賂身為之役無所不至及君死未殯讐其預歸父之謀乃發其惡而逐其臣視嗣君無如也季氏無君世濟其惡豈不行父為之首哉然宣公出爾之報亦可謂昭然者矣臧孫許陽怒而不力爭又代為去之姦臣之黨也司冦掌國之平乃受權臣頥指氣使始逐莒僕今逐東門氏不啻鷹犬臧文仲教行父事君之禮見無禮于其君者如鷹鸇之逐鳥雀也為之子者為私門鷹犬可以愧死矣歸父之去諸家皆善其有禮然不聞楚針尹克黃之事乎使于齊還及宋聞若敖氏既滅其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘于司敗使歸父能如是斯盡人臣之道矣或曰歸父謀去三桓歸必見殺矣曰去三桓以張公室其心雖未可知其事未見非正君死未殯季氏以私恨逐其家歸父不忍死其君歸復命而又殺之彼獨不畏公義之討乎死生命也心明義直進退皎然一以盡人臣之道二亦足以懾姦臣之心而惜乎歸父之未足以及此也或曰歸父欲去三桓不謀于素厚之齊而謀于初交之晉及不克又不奔晉而奔齊左氏所載恐未必實蓋三桓以向不事晉之罪歸之傳云歸父以襄仲之立公也有寵此句可思行父專政宣公所忌歸父用事又三家所忌故宣公薨而反春秋輯傳卷七

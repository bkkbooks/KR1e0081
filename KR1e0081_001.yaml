body:
  text: 春秋凡例卷上眀王樵輯即位第一啖氏曰凡天子崩諸侯薨既殯而嗣子為君康王之誥是也未就阼階之位來年正月朔日乃就位南面而改元春秋所書是也凡先君正終則嗣子踰年行即位禮榖梁云繼正即位正也此說是也文成襄昭哀五公是凡先君遇弒則嗣子廢即位之禮不忍行也穀梁云繼弒君不言即位正也此說是也莊閔僖三公是凡繼弒君而行即位禮非也榖梁謂桓公繼弒君而行即位則是與聞乎弒也公羊謂宣公繼弒君而行即位其意也殺子赤而有其位宣公有其意二說並是也左氏不達而曲為之說云莊公不言即位文姜出故也閔公不言即位亂故也僖公不言即位公出故公出復入不書諱故也左氏以為閔公弒後成季以僖公適邾共仲奔莒乃入立之經無僖公出入之文者諱之故也且毋以得罪去國猶日不忍父為他國所殺其情若何不舉其大而舉其細非通論也且三月文姜方孫何妨正月即位乎故知解莊公不言即位妄也國有危難豈妨行禮故知解閔公不言即位妄也若君出諱而不書昭公何以書乎假如實出亦當非時即位如定公也昭三十二年十二月己未公薨于乾侯定元年夏六月癸亥公之喪至自乾侯戊辰公即位故知解僖公不言即位妄也朱子曰春秋是聖人據魯史以書其事使人自觀之以為鑒戒爾若欲推求一字之間以為褒貶所在恐非聖人之意如書即位者如魯君行即位之禮繼故不書即位者是不行即位之禮其為攝也為亂故也為不忍於先君之不以道終也皆不可知但是不行其禮則不書爾若桓公之書即位則是桓公自正其即位之禮爾以不弒自居隱其罪逆自同繼位立常而行即位其他崩薨卒葬亦無意義胡氏曰人君嗣立踰年必改元此重事也當國大臣必以其事告於廟秉筆史官必以其事書於策緣終始之義一年不二君故不改於柩前定位之初緣臣民之心不可曠年無君故不待於三年喪畢之後踰年春正月乃謹始之時得理之中者也於是改元著新君即位之始宜矣即位而謹始本不可以不正為子受之父為諸侯受之王此大本也咸無焉則不書即位隱莊閔僖四公是也聖人恐此義未眀又於衛侯晉發之書曰衛人立晉以見內無所承上不請命者雖國人欲立之其立之非也在春秋時諸侯皆不請王命矣然承國於先君者則得書即位以别於內復無所承者文成襄昭哀五公是也聖人恐此義未眀又於齊孺子荼發之荼幼固不當立然既有先君景公之命矣陳乞雖欲立長君其如先君之命何以乞君荼不死先君之命也命雖不敢死以别於內復無所承者可也然亂倫失正則天王所當治聖人恐此義未眀又於衛侯朔發之朔殺伋壽受其父宣公之命嘗有國矣然四國納之則貶王人拒之則褒於以見雖有父命而亂倫失正者所宜絶也由此推之王命重矣雖重天王之命若非制命以義亦將壅而不行故魯武公以括與戲見宣王王欲立戲仲山甫不可王卒立之魯人殺戲立括之子諸侯由是不睦聖人以此義非盡倫者不能斷也又特於首止之盟發之夫以王世子而出㑹諸侯以列國諸侯而上與王世子㑹此例之變也而春秋許之鄭伯奉承王命而不與是盟此禮之常也而春秋逃之所以然者王將以愛易儲二桓公糾合諸侯仗正道以翼世子使國本不搖而天下之為父子者定所謂一匡天下民到於今受其賜者也至是變而之正以大義為主而崇髙之勢不與焉然後即位謹始之義終矣萬世之大倫正矣故曰春秋之法大居正非聖人莫能修之謂此類爾文公九年春毛伯來求金公羊傳曰何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子也踰年稱公矣則曷為於其封內三年稱子緣臣民之心不可一日無君緣終始之義一年不二君故君薨稱子某既葬稱子眀繼體以繫臣民之心不可曠年無君故踰年稱公緣孝子之心則三年不忍當也孝子三年志在思慕不忍當父位故雖即位猶於其封內三年稱子書云高宗諒隂三年不言子曰何必高宗古之人皆然君薨百官總已以聽於冡宰三年何氏曰即位者一國之始政莫大於正始故春秋以元之氣正天之端以天之端正王之政以王之政正諸侯之即位以諸侯之即位正境內之治諸侯不上奉王之政則不得即位故先言正月而後言即位政不由王出則不得為政故先言王而後言正月也王者不承天以制號令則無法故先言春而後言王夫不深正其元則不能成其化故先言元而後言春五者同日並見相須成體乃天人之大本萬物之所繫不可不察也告月視朔第二趙氏曰天子常以今年冬頒眀年正朔於諸侯諸侯受之每月奉月朔甲子以告於廟所謂禀正朔也故曰王正月言王之所以頒也因以特牲薦謂之告月亦曰告朔故論語云子貢欲去告朔之餼羊也告於廟則謂之告朔因以聽治此月之政則謂之視朔文六年閏月不告月猶朝於廟左氏曰閏月不告朔非禮也閏以正時時以作事不告閏朔棄時政也趙氏曰文公以閏非正不行告朔之禮榖梁氏曰閏者附月之餘日也天子不以告朔而喪事不數也而以其朔日但身至廟拜謁而已故曰猶朝於廟以此朝空廟謁故經文譏之猶者不盡已之辭朝廟視朔皆不可已也猶朝於廟而朔可不告乎經言不告月眀當告也公榖非十六年夏五月公四不視朔自二月不視朔至於五月榖梁氏曰以公為厭政甚矣襄二十九年春王正月公在楚左氏曰釋不朝正於廟也郊廟雩社第三啖氏曰凡祭常事多不書失禮及非常乃書趙氏曰凡郊廟社稷所以奉天也尊祖考而重生本咸國之大禮也故過則書之祭統曰周公沒成王康王追念公之勳勞賜之重祭郊社嘗禘是也孔子曰魯之郊禘非禮也周公其衰矣胡氏曰春秋欲削而不書則無以見其失禮盡書之乎則有不勝書故因其失禮之中又更有失焉者則書於策所謂由性命而發言也聖人奚容心焉因事而書而鑒戒昭矣所謂由性命而發言也郊家語定公問於孔子曰寡人聞郊而莫同何也孔子曰郊之祭也迎長日之至也大報天而主日配以月故周之始郊其月以日至其日用上辛至於啓蟄之日則又祈榖於上帝此二者天子之禮也魯無冬至大郊之事降殺於天子是以不同也公曰其言郊何也孔子曰兆丘於南所以就陽位也於郊故謂之郊焉曰其牲器何如孔子曰上帝之牛角繭栗必在滌三月后稷之牛唯具所以别事天神與人鬼也牲用騂尚赤也用犢貴誠也掃地而祭貴其質也器用陶匏以象天地之性也萬物無可稱之者故因其自然之體也公羊氏曰魯郊非禮也天子祭天諸侯祭土襄七年夏四月三卜郊不從乃免牲左傳孟獻子曰吾乃今而後知有卜筮夫郊祀后稷所以祈農事也是故啓蟄而郊郊而後耕啓蟄夏正建寅之月祀天南郊郊而後耕是祈榖之後躬耕帝藉疏曰夏小正曰正月啓蟄其傳曰言始發蟄也故漢氏之始以啓蟄為正月中雨水為二月節及太和以後更改氣名以雨水為正月中驚蟄為二月節至今不改今既耕而卜郊宜其不從也榖梁氏曰夏四月不時也三卜禮也此言三卜雖禮而卜郊止于三月今書四月而三卜不從則過時不敬故書以譏非時而非譏其瀆卜也僖三十一年夏四月四卜郊不從乃免牲公羊氏曰三卜禮也四卜非禮也求吉之道三哀元年鼷鼠食郊牛改卜牛夏四月辛巳郊榖梁氏曰郊自正月至於三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用者也在成十七年郊三卜禮也四卜非禮也僖三十年哀十一年五卜强也成十年以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣啖趙謂當以二月周二月夏十二月卜三月上辛周三月夏正月不吉則卜中辛又不吉則卜下辛所謂吉事先近日也魯之郊周公故也不於日至避王室也卜用夏正於農耕之始也比旬而卜之逺怠慢也必更三旬禮盡於三也且郊之月殫矣求吉之道過三則瀆且此月日盡非農耕之始既耕不可復卜郊故不復卜按周禮太宰職云祀五帝前期十日帥執事而卜日然則將祭必十日之前豫卜之賈公彥云四時迎氣冬至夏至正月郊天等雖有常時常日猶須審慎故仍卜日公羊云禘當不卜郊何以卜卜郊非禮也卜郊何以非禮據上言三卜禮魯郊非禮也意以魯郊非禮故卜其說非也右郊時宣三年春王正月郊牛之口傷改卜牛牛死乃不郊公羊氏曰曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在於滌三月於稷者唯具是視滌者養牲之宫名於稷者唯視其身體具無災害而已不特養於滌郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自內出者無匹不行自外至者無主不止趙氏曰養牲只養二牛既並死自然合廢郊成七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛榖梁氏曰郊牛日展視也斛角而知傷斛角貌展道盡矣其所以備災之道未盡也雖日展而不能禦災使鼠得食之不敬也改卜牛鼷鼠又食其角非人之所能也改卜後宜知慎而又食知非有司之過所以免有司之過也胡氏曰非有司之過則變異也乃免牛免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然免牲不曰不郊免牛亦然僖三十一年夏四月四卜郊不從乃免牲卜郊不吉既不郊牲無所用故免牲免猶從放不殺之也此年鼠再食牛角妨于郊故免牛亦如卜郊不吉免牲之禮以免之以嘗置之上帝故也既免則不郊可知故不曰不郊哀元年榖梁氏曰牛傷不言傷之者傷自牛作也全曰牲傷曰牛未牲曰牛有變而不郊故卜免牛也已牛矣其尚卜免之何也嘗置之上帝矣謂在滌宫故卜而後免之不敢專也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲具新牲也然後左右之隨所用也以六月上甲始庀牲十月上甲始繫牲十一月十二月雖有變不道也以不妨郊故待正月然後言牲之變重其妨郊也啖氏曰養牲必在滌三月故自周之十月下旬而養牲至二月中旬而牲成故得以二月下旬卜三月上旬也右郊牲僖三十一年猶三望左氏曰望郊之屬也不郊亦無望可也公羊氏曰天子有方望之事無所不通諸侯山川有不在其封內者則不祭也三望者何望祭也曷祭祭泰山河海曷為祭泰山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而遍雨乎天下者唯泰山爾河海潤于千里按記曰周公祀泰山召公為尸則祀泰山者周公之舊越望而祭及河海者亦僭禮之後也按左氏云楚昭王有疾卜曰河為祟大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不德河非所獲罪也遂弗祭此可以證魯三望之為越三正記曰郊後必有望有虞氏受終而望因于類巡守而望因於柴若諸侯則有望而已望不越竟非所主者非所祭也魯僭天子之郊故亦於郊後而望又越望而祭及河海僖三十一年宣三年成七年皆不郊而猶三望書之見其失之中又有失也三傳所不盡者各見於本條之下書郊九皆卜不吉失時牛災則書之廟公羊氏曰周公稱太廟魯之始祖故稱太廟魯公稱世室伯禽始受封其廟稱世室言世世不毁也羣公稱宫尊始祖不令子孫同其稱故曰宫也隱五年九月考始成而祀仲子惠公之妾桓公之母之宫隱公為之别立宫初獻六羽始用六佾也魯僭天子之禮樂用八佾于太廟以祀周公已為非禮其後羣公皆僣用焉仲子以别宫故六桓二年夏四月取郜大鼎于宋戊申納於太廟內弒其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也八年春正月己卯蒸夏五月丁丑蒸黷祀也十四年秋八月壬申御廩災乙亥嘗八月嘗不時以災之餘而嘗不敬莊二十三年秋丹桓宫楹榖梁氏曰禮天子諸侯黝堊大夫蒼士黈丹楹非禮也女欲以夸齊下同二十四年春王三月刻桓宫桷諸侯之桷斫之礱之刻桷非正也閔二年夏五月乙酉吉禘于莊公說見後僖八年秋七月禘于太廟用致夫人禘天子大祭夫人成風也崇妾母為夫人自是始也文二年二月丁丑作僖公主立主喪主于虞吉主于練記云十三月而練僖公薨至是十有五月始作主譏其後也八月丁卯大事于太廟躋僖公大事祫也升僖公于閔公之上喪未終而吉祭又逆祀一書而再譏六年閏月不告月猶朝于廟已見前十三年秋七月太室屋壞譏不修也十六年夏五月公四不視朔告朔諸侯所以禀命于君親其怠如是宣八年六月辛巳有事于太廟仲遂卒于垂壬午猶繹萬入去籥知卿佐之喪不宜作樂而不知廢繹譏之成三年二月甲子新宫宣宫也神主未遷故曰新宫災三日哭未成廟遇災而哭於禮無當幾遷主緩且不戒於火而致災六年二月辛巳立武宫不宜立也昭十五年二月癸酉有事于武宫籥入叔弓卒卒于涖事之所去樂卒事此志禮之變與仲遂不同定元年九月立煬宫義同武公八年冬從祀先公陽虎欲去三桓順祀先公而祈焉順祀者正閔僖之位也所順非一故通曰先公啖氏曰凡宗廟之禮有常四時之祭雖失其月亦非大故其失時及失禮之大者乃書左氏云始殺而嘗閉蟄而蒸過則書公羊云春曰祠夏曰礿秋曰嘗冬曰蒸常事不書言失禮及非常乃書之此說皆是趙氏曰四時之祭皆用夏時言祠礿蒸皆用用夏之四時從物宜也周雖以建子為正至於祭祀則用夏時本月以行四時之祭故桓八年正月蒸則夏之仲冬也閔二年五月禘即夏之三月也凡四時之祭蓋用孟月宣八年六月周六月乃建已之月今四月孟夏是也有事于太廟即夏之孟月也若有故及日不吉即用仲月桓八年正月蒸是也周正月建子今十一月仲冬也若又有故及日不吉即用季月昭十五年有事于武宫即夏之季月也周二月建丑今十二月季冬也經文並無譏故但不失時即非違禮啖說是也然吉事先近日苟有故而用季月涉于怠矣當用仲月為嘉也時物既登且得二至二分之節故也周禮大宗伯以肆進所解牲體謂薦熟時獻謂薦血腥祼灌以鬱鬯始獻尸求神時享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王鄭氏曰宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也祭必先灌乃後薦腥薦熟於祫逆言之者與下共文眀六享俱然祫言肆獻祼禘言饋食者著有黍稷互相備也吳氏澄曰程子曰天子曰禘諸侯曰祫皆合祭也禘者禘其所自出之帝為東向之尊其餘皆合食於前此之謂禘諸侯無所出之帝則止於太祖之廟合羣廟之主以食此之謂祫祠禴嘗蒸四時祭名春物初生未有以享以祠為主故曰祠夏物未成用薄物以祭故曰禴秋物漸成以薦新為主故曰嘗冬物畢成可進者衆故曰蒸王制天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸天子犆特同礿祫禘祫嘗祫蒸吳澄曰按此春夏祭名是記者之誤礿當為祠禘當為禴閔二年胡傳云四時之祭有禘之名蓋禮文交錯之失陳詳道曰天子之禮春則特祭夏秋冬則祫享特祭各於其廟祫享同於太廟又曰祫有三年之祫有時祭之祫時祭之祫小祫也唯羣廟合食于太祖三年之祫大祫也毁廟之主陳于太祖未毁廟之主皆升合食于太祖時祭有大禮有小禮小禮春也大禮夏秋冬也公羊傳曰大事者何大祫也則眀時祭之為小祫矣問周禮記四時祭名云春祠夏礿秋嘗冬蒸公羊亦同而春秋無祠礿之祭何也趙氏曰春秋中一書蒸一書嘗兩書禘皆為失禮及有變故乃書爾於祠礿二祭無他故所以不書何足怪哉又曰禮記大傳云禮不王不禘眀諸侯不得有也禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尊始祖所出之帝而追祀之以其祖配之謂於始祖廟祭之而便以始祖配祭也此祭不兼羣廟之主為其疏逺不敢褻故也其年數或每年或數年未可知也鄭氏注祭法云禘謂配祭昊天上帝于圜丘也蓋見祭法所說文在郊上故為此說祭法所論禘郊祖宗謂六廟之外永世不絶者有此四種爾非關配祭也禘之所及最逺故先言之何關圜丘哉若然則春秋書魯之禘何也成王追寵周公故也故祭統云成王追念周公賜之重祭郊社禘嘗是也蓋於周公廟而上及文王文王即周公之所出也故此祭惟得於周公廟為之閔公時遂僭于莊公廟行之以其不追配故直言莊公而不言莊宫眀用其禮物爾不追配文王也本以夏之孟月為之至孟獻子乃以夏之仲月為之禮雜記云孟獻子曰正月日至可以有事于上帝七月日至可以有事于祖七月而禘獻子為之也今備引諸經書之文證之於左左氏云蒸嘗禘于廟此為見春秋經前後祭祀唯有此三種以為祭名盡于此但據經文不識經意故云爾又云禘于武宫僖宫襄宫此又見經中禘于莊公以為諸廟各行之故妄云爾又晉人云以寡君之未禘祀時未終喪也莊左氏見經文云吉禘于公以為喪畢當禘而不知禘本魯禮不合施于他國左氏亦自云魯有禘樂賔祭用之郊特牲曰春禘而秋嘗鄭氏注禘當為礿眀堂位曰季夏六月以禘禮祀周公于太廟夏之四月祭義曰春禘秋嘗鄭無注祭統曰春礿夏禘王制同鄭氏曰夏殷禮也撰禮記諸篇或孔門之後弟子或漢初之儒私皆約春秋為之見春秋禘于莊公遂以為時祭之名見春秋唯兩度書禘一春一夏所以或謂之春祭或謂之夏祭不相符㑹理可見也而鄭氏不達其意故注郊特牲云禘當為礿祭義與郊特牲同鄭遂無注其注祭統及王制則云此夏殷禮且祭統篇末云成王賜周公何得云夏殷哉王制又云礿則不禘禘則不嘗嘗則不蒸蒸則不礿鄭氏曰虞夏諸侯嵗朝廢一時祭也撰此篇者亦緣見春秋中唯有禘蒸嘗三祭謂魯惟行此三祭遂云爾若如鄭注逺國來往須歷數時何獨廢一時哉詩小序雍禘太祖也朱子曰祭法周人禘嚳又曰天子七廟三昭三穆及太祖之廟而七周之太祖即后稷也禘嚳於后稷之廟而以后稷配之所謂禘其祖之所自出以其祖配之者也祭法又曰周祖文王而春秋家說三年喪畢致新死者之主于廟亦謂之吉禘是祖一號而二廟禘一名而二祭也楊氏復曰鄭氏注王制及春官大宗伯詩殷頌皆曰魯禮三年喪畢而祫于太祖眀年春禘于羣廟自爾以後五年而再殷祭一祫一禘此大宗伯及王制鄭注文也商頌𤣥鳥祀髙宗也毛傳曰祀當為祫祫合也高宗崩而始合祭于契之廟歌是詩焉古者君喪三年既畢禘于其廟而後祫祭于太祖又眀年禘于羣廟自此之後五年而云云愚始讀之意其必有昭然可據之實及考其所自來則曰一祫一禘之說出於春秋魯禮及緯書夫溺於緯書之不足責也謂出於春秋魯禮者並無事實可證乃專取僖公之禘文公之祫二事穿鑿附㑹文致其說而已夫禘祫二禮其源本不相因今其說曰文公二年既有祫則僖公二年亦必有祫僖公八年既有禘則文公八年亦必有禘事之本無既牽合影射以為有蓋欲眀僖公之禘前有祫文公之祫前有禘以證一祫一禘之說而已此其妄一也夫既取僖公之禘文公之祫為證矣又增宣公八年之禘以眀之謂僖宣八年皆有禘考于春秋宣公八年有事于太廟未嘗有禘文乃鄭氏駕虛詞以多其證此其妄二也文二年公羊傳云五年而再殷祭所謂五年再殷祭者謂三年一祫五年再祫猶天道三年一閏五年再閏也鄭氏乃引之以為三年一祫五年一禘之證此其妄三也二年至八年相去凡七年與五年再殷祭之數不合也則為之說曰魯禮三年喪畢而祫于太廟眀年春禘于羣廟自爾以後五年而再殷祭夫謂三年喪畢而祫于太祖可也眀年春禘于羣廟何所據而為此說乎强添此事於五年再殷祭之前直欲以掩五年七年不合之數爾此其妄四也婁江魏子才曰禮家謂禘祫皆合食非也大祫乃羣昭羣穆已毁未毁之廟皆合食於太祖禮盛而繁禘則上尊太祖之自出故配不及羣廟禮大而簡特緣太祖起此義若又旁及羣廟則瀆矣又曰祫合祭也天子七廟諸侯五廟緣孝子之心春特享以各全其尊緣祖考之心三時合享象生時之燕聚也逺祖既祧矣時享弗之與矣子孫未忍忘則又為之大祫已毁廟之主陳于太祖未毁廟之主皆升合食于太祖象生時大合族之義也其大夫三廟適士二廟官師一廟祭皆弗及高祖先王曲盡人情大夫士有大事省于其君有功德見記録干祫及其高祖干者逆上之名以其上干諸侯之祫也使亦得以自伸也春秋時祭則書有事如有事于太廟有事於武宫之類是也祫祭則書大事如文二年八月大事于大廟是也蓋時祭之祫則祝迎四廟之主合食于太廟毁廟之主不與及三年大祫則毁廟之主皆陳焉趙氏曰凡祭而非者稱祭祭而失禮書祭名以本下者稱事祭非失禮為下事張本者則不書祭名大事于太廟躋僖公之類是也雩程子曰古者一年之間祭天甚多春則因民播種而祈榖夏則恐旱暵而舞雩以至秋則眀堂冬則圜丘皆人君為民之心也趙氏曰凡祈澤曰雩稱大國遍雩也程子曰諸侯雩於境內之山川爾成王賜魯重祭得郊禘大雩大雩雩於上帝用盛樂也雩嵗之常祀不能皆書因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書今按大雩程子說是桓五年秋大雩左氏曰書不時也凡祀啓蟄建寅之月而郊龍見建已之月而雩始殺而嘗閉蟄而蒸過則書杜氏曰建已之月蒼龍宿體昏見東方萬物始盛待雨而大故祭天逺為百榖祈膏雨公羊氏曰大雩者何旱祭也然則何以不言旱言雩則旱見言旱則雩不見榖梁氏曰雩得雨曰雩不得曰旱趙氏曰榖梁說是僖十一年秋八月大雩十三年秋九月大雩成三年秋大雩七年冬大雩襄五年秋大雩八年秋九月大雩十六年秋大雩十七年九月大雩二十八年秋八月大雩昭三年八月大雩六年秋九月大雩八年秋大雩十六年九月大雩二十四年秋八月大雩二十五年秋七月上辛大雩季辛又雩定元年九月大雩七年秋大雩九月大雩十二年秋大雩書大雩二十一皆在午未申之月建已之月常事不書社春秋於社無書因日食水災而見莊二十五年六月辛未朔日有食之鼓用牲于社秋大水鼓用牲于社于門文十五年六月辛丑朔日有食之鼓用牲于社左氏曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝又曰日有食之唯正陽之月建巳之月慝隂氣未作于是乎用幣于社伐鼓于朝又曰凡天災有幣無牲非日月之眚不鼓啖氏曰據左氏所說皆正理也此書門社皆記非常也婚姻第四啖氏曰凡婚姻合禮者皆不書趙氏曰凡男女之禮人倫之本也風教之本也是以先王敬之故紀其闕爾納幣莊二十二年冬公如齊納幣公羊氏曰納幣不書此何以書親納幣非禮也榖梁氏曰納幣大夫之事也罪公母喪未再朞而圖婚不待貶而惡見文二年冬公子遂如齊納幣譏在喪而圖婚也趙氏曰又譏使公子納幣也成八年夏宋公使公孫壽來納幣婚禮不稱主人此稱使者宋公無母自命之也公孫夀卿也納幣使卿非禮啖氏曰魯往他國納幣皆常事不書凡書者皆譏也他國來亦如之趙氏曰婚禮有六一納采二問名三納四納徴即納幣也五請期六親迎即逆女也春秋獨書其二納幣及逆女也以納幣方契成以前三禮並未結定逆女為事終舉重之義也逆王后桓八年冬祭公來遂逆王后于紀言遂逆者譏不躬白于王襄十五年春劉夏逆王后于齊士而逆后是不重人倫之本而輕天下之母矣當使卿往逆公監之啖氏曰古儒者或言天子當親迎或言不當親迎二說不同不敢定也然春秋所載皆譏也趙氏曰王者之尊海內莫敵故嫁女即使諸侯主之適諸侯諸侯莫敢有其土若屈萬乘之尊而行親迎之禮即何莫敵之有乎內逆女程子曰先儒皆謂諸侯當親迎親迎者迎於其所館故有親御授綏之禮豈有委宗廟社稷逺適他國以逆婦者乎非惟諸侯卿大夫而下皆然詩稱文王親迎于渭未嘗出疆也桓三年秋公子翬如齊逆女文姜也莊二十四年夏公如齊逆女哀姜也委宗廟社稷之重適讐國娶讐女文四年夏逆婦姜于齊出姜也左氏云卿不行非禮也榖梁以為公自行而成禮于齊宣元年春公子遂如齊逆女穆姜也年喪未朞成十四年秋叔孫僑如如齊逆女齊姜也外逆女隱二年九月紀履緰來逆女程子曰非命卿皆書名以君命來逆夫人也在魯故稱女內女嫁為諸侯夫人則書逆書歸眀重事也按內女歸于諸侯則尊同尊同則志此與其他婚禮以常事不書書則以著禮之失者固不同也莊二十七年冬莒慶來逆叔姬莒慶莒大夫叔姬莊公女諸侯嫁女于大夫而公自主之非禮也僖二十五年夏宋蕩伯姬來逆婦伯姬魯女為宋大夫蕩氏妻婦人越竟逆婦非禮又見公失禮下主大夫之婚也宣五年秋九月齊高固來逆子叔姬自為也曰來者以公自為之主稱子者别于先公之女也適諸侯稱女適大夫稱字尊卑之别不書女歸降于諸侯也公因齊得立脅而婚之王后歸桓九年春紀季姜歸于京師逆曰王后歸曰紀季姜季姜者父母之辭也左氏曰凡諸侯之女行唯王后書趙氏曰敬王室也言所以書記其是以著其非天下之母當取之于諸侯其歸也當赴告于天下春秋時王室無網少能如此故記此則不書者皆譏也榖梁曰為之中者歸之也言魯為媒居中間導成之所以書之按王后者天下之母不同于諸侯自合書之不關魯為之中乃書也王女歸莊元年冬王姬歸于齊譏與讐為婚主也十一年冬王姬歸于齊內女歸隱二年九月紀履緰來逆女冬十月伯姬歸于紀七年春王三月叔姬歸于紀非夫人也待年于國不與嫡俱行非禮之常所以書也或曰賢之也為莊十二年歸于酅起賢而得書亦春秋之法也莊十二年春王三月紀叔姬歸于酅紀亡以宗廟在酅歸奉其祀二十五年夏伯姬歸于把不言逆逆者非卿僖十五年秋季姬歸于鄫成九年二月伯姬歸于宋公榖云婦人謂嫁曰歸凡內女嫁為諸侯夫人則書以尊卑敵為之服也夫人至桓三年秋夫人姜氏至自齊文姜也不言公之以來公親受之于齊侯也莊二十四年八月丁丑夫人姜氏入哀姜也公羊謂言入言曰難也夫人與公有所要而後入杜氏曰以孟任故榖梁謂入者內弗受也曰入惡入者也以宗廟弗受也公羊得其事榖梁得其義宣元年三月遂以夫人婦姜至自齊穆姜也以者言不當以也喪未一年急于齊援敢于越典禮忍于薄天親成十四年九月僑如以夫人婦姜氏至自齊齊姜也義同宣元年書氏傳寫誤增啖氏曰凡夫人初至皆書告于廟也趙氏曰文四年逆婦姜出姜也不書至貶成禮于齊也詳見本條昭公娶吳孟子不書至恥娶同姓不告廟也襄公定公哀公並不迎夫人文九年夫人姜氏至自齊非初逆之至不入此例夫人如及㑹饗莊二年冬十有二月夫氏姜氏㑹齊侯于禚四年春王二月夫人姜氏享齊侯于祝丘五年夏夫人姜氏如齊師七年春夫人姜氏㑹齊侯于防冬夫人姜氏㑹齊侯于榖十五年夏夫人姜氏如齊十九年秋夫人姜氏如莒二十年春王二月夫人姜氏如莒以上俱文姜僖十七年秋夫人姜氏㑹齊侯于卞聲姜也僖公以滅項見止于齊夫人以公故㑹齊侯參譏也文九年春夫人姜氏如齊無父母而歸寧故云如譏之也啖氏曰凡夫人行皆書比於公也趙氏曰諸侯之女既嫁父母存則歸寧不然則否今則不爾故書曰如如者朝聘之名非婦人之事若歸寧合禮者則當云寧于某左氏例云夫人歸寧曰如某此說非也據經文所書者皆以非禮故也若以文姜如齊為禮則天下無非禮之事矣又書如莒豈是歸寧乎榖梁每經下皆云婦人既嫁不踰竟踰竟非禮也若然則父母存豈得絶其歸寧乎夫人歸本國文十八年冬夫人姜氏歸于齊子赤之母文公夫人趙氏曰言歸不反之辭也左氏曰夫人出曰歸于某據文公夫人歸于齊乃是襄仲殺子赤後自歸爾不可以此為例若夫人實有罪見出必當云出歸于某以示貶不應但云歸也內女來莊二十七年冬把伯姬來伯姬莊公女禮父母在嵗一歸寧春㑹于洮冬又來魯來者不當來也僖五年春把伯姬來朝其子參譏之二十五年夏宋蕩伯姬來逆婦二十八年秋杞伯姬來譏無父母而歸也三十一年冬把伯姬來求婦義同蕩伯姬宣五年冬齊高固及子叔姬來反馬也反馬遣使者也而高固親來非禮也見逆未易嵗而叔姬亟來亦非禮也內女出文十五年十有二月齊人來歸子叔姬子叔姬齊昭公之妃也生舍無寵昭公卒舍立公子商人弒之而自立執子叔姬季孫行父如晉晉詰齊齊來歸子叔姬宣十六年秋郯伯姬來歸成五年春王正月把叔姬來歸榖梁氏曰婦人之義嫁曰歸反曰來歸啖氏曰內女見出皆書曰來歸大其事也郯伯姬把叔姬不書嫁而書出或嫁時夫未為君也婚姻雜事桓三年九月齊侯送姜氏于歡禮送女父不下堂踰竟非禮也莊元年夏單伯逆王姬逆女不書以主讐婚而書二十四年八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣入義見前用幣非禮也用者不宜用者也不言及不正其行婦道故列數之也成九年夏季孫行父如宋致女女嫁三月使大夫致使卿非也媵莊十九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟成八年冬衛人來媵九年夏晉人來媵十年夏齊人來媵啖氏曰凡媵常事不書公子結為遂事起本也三國來媵非禮也故書太子生桓六年九月丁卯子同生啖氏曰君嫡子生以太子生之禮接之則史書之莊公是嫡夫人之子又以太子生之禮接之故書趙氏曰太子生多矣曷為書子同禮備故也禮備于嫡是重宗廟記其是以著其非也崩薨卒葬第五左氏曰凡崩薨來告則書不然則否啖氏曰天子卒曰崩諸侯卒曰薨皆臣子之辭外諸侯曰卒卒終也本國不言卒言卒如合終然故異其文公羊氏曰天子曰崩諸侯曰薨大夫曰卒士曰不祿陸氏曰按此說不了何者天子至尊天下稱曰崩可也諸侯曰薨則本國臣子言之至于赴告猶曰不祿王史及他國之史則書卒自此以下其家臣赴告並言不祿史官書之則曰卒則在臣子及他國異辭爾何得定配以為品例也自史記漢書以下有爵臣死皆言薨乖失甚矣且魯史書外諸侯猶言卒况王史乎王崩隱三年三月庚戌天王崩平王也桓十五年三月乙未天王崩桓王也此後莊王僖王不書崩僖八年冬十有二月丁未天王崩惠王也文公年秋八月戊申天王崩襄王也此後頃王不書崩宣二年冬十月乙亥天王崩匡王也成五年冬十有一月己酉天王崩定王也襄元年九月辛酉天王崩簡王也二十八年十有二月甲寅天王崩靈王也昭二十二年夏四月乙丑天王崩景王也趙氏曰春秋王崩三不書譏也見王室不告魯之不赴也王室若告國史當書之不然魯聞王崩使卿赴弔則知其月日亦當書也哀王室之無人著諸侯之不臣也王室雖不告諸侯聞之自當往嗣王即位皆不書大君即位天下更始當書其即位不能施令于天下但自即位而已不能有號令新政使天下盡知也罪諸侯不臣而莫之承也諸侯視之與不即位同不復重承也哀王道積微而莫之興也又曰王后世子廢興卒葬之不書何也王室不告諸侯不赴也哀其微也公薨隱十一年冬十有一月壬辰公薨桓公與羽父殺之桓十八年夏四月丙子公薨于齊齊令彭生殺之莊三十二年八月癸亥公薨于路寢閔二年秋八月辛丑公薨僖三十三年冬十有二月乙巳公薨于小寢文十八年春王二月丁丑公薨于臺下宣十八年冬十月壬戌公薨于路寢成十八年秋八月己丑公薨于路寢襄三十一年夏六月辛巳公薨于楚宫昭三十二年十有二月己未公薨于乾侯定十五年夏五月壬申公薨于高寢啖氏曰凡公薨必書其所詳內事重凶變也若遇賊則不地榖梁云公薨不地故也此說是趙氏曰公必薨于正寢以就公卿也大位姦之窺也危病邪之伺也若蔽于隱是使小人女子得行其志也夫人薨隱二年十有二月乙卯夫人子氏薨桓公母仲子也莊二十一年秋七月戊辰夫人姜氏薨桓公夫人文姜僖元年秋七月戊辰夫人姜氏薨于夷齊人以歸莊公夫人哀姜閔公之嫡母也文四年冬十有一月壬寅夫人風氏薨僖公妾母成風也十六年秋八月辛未夫入姜氏薨僖公夫人聲姜文公母也宣八年夏六月戊子夫人嬴氏薨宣公母也襄二年夏五月庚寅夫人姜氏薨成公夫人齊姜也四年秋七月戊子夫人姒氏薨襄公妾母九年五月辛酉夫人姜氏薨成公母昭十一年五月甲申夫人歸氏薨昭公妾母定十五年秋七月壬申姒氏卒哀公妾母哀十二年夏五月甲辰孟子卒昭公夫人啖氏曰凡夫人薨必書而不書地婦人無外事薨有常處也其君之妾母仲子則本以夫人禮娶又隱公以桓公為先君之嗣故行夫人喪禮書薨自成風之後妾母皆僭用夫人禮故亦書薨著其非禮也哀公母定姒卒時子未踰年雖行喪禮不可加於子凡未踰年君卒亦不書薨故書卒子既未成君故不稱夫人也孟子吳女也魯人恥娶同姓不可書曰夫人姬氏薨而曰孟子卒趙氏曰若薨于外則書地記事實也榖梁云夫人薨不地地故也故謂被殺此說非也假如夫人歸寧死于外豈得云不地乎且君皆記其寢被殺則不言地隱公是也桓公在齊被殺而亦書地故知在外薨不以有故無故皆當書地理甚昭然未踰年君卒莊三十二年冬十月己未子般卒文十八年冬十月子卒子赤也襄仲殺之襄三十一年秋九月癸巳子野卒毁也昭二十二年冬十月王子猛卒言王明當嗣也言子未踰年也言猛别羣王子也啖氏曰凡未踰年君卒皆書曰卒言嗣先君未成君也故不書崩薨而曰卒先君未葬則名之既葬則不名子亦是也外諸侯未踰年而卒則不書異于內也趙氏曰子般子赤以被殺故不書地義與隱同諸侯卒趙氏曰春秋記諸侯卒著易代也不曰薨異外內也與魯異也名之降于天子也隱三年八月庚辰宋公和卒具月日為正七年春王三月滕侯卒無日八年夏六月己亥蔡侯考父卒辛亥宿男卒同月桓五年春正月甲戌己丑陳侯鮑卒二日卒之疑也十年春王正月庚申曹伯終生卒以後此等皆不具僖四年夏許男新臣卒脫月七年七月曹伯斑卒無日十四年冬蔡侯肸卒脫月宣九年九月辛酉晉侯黑臀卒于扈成十三年五月曹伯廬卒于師襄七年十有二月鄭伯髠頑如㑹未見諸侯丙戌卒于鄵十八年冬十月曺伯負芻卒于師二十五年十有二月吳子遏伐楚門于巢卒二十六年八月壬午許男寧卒于楚昭二十三年夏六月蔡侯東國卒于楚二十五年十有一月己亥宋公佐卒于曲棘定四年五月把伯成卒于㑹趙氏曰凡諸侯同盟名于載書朝㑹名于要約約事之簡牘若今㑹計文牒等也聘告名于簡牘使使來聘及有告命之事皆有簡書也故于卒赴可知而紀也非此則否示詳慎也左氏云凡諸侯同盟故薨則赴以名此例於理不安豈有臣子正當創巨痛深之日乃忍稱君之名禮固不爾且禮篇所録亦云寡君不祿而已據春秋諸侯卒不同盟者凡五十二人九人不書名餘並書名九人卒不書名檢尋事迹並無朝㑹聘告所以不知其名是其眀證也諸侯卒于他國蔡侯東國卒于楚之類及卒于㑹卒于師則書之卒其封內亦書之晉侯卒于扈宋公卒于曲棘是也公羊云諸侯卒其封內不地有何理哉解晉侯即云欲㑹故也解宋公即云憂內故也今按餘國君更無書地者是知諸侯卒不於其國都例書地爾如魯卿卒于垂卒于貍蜃之類天子大夫卒隱三年夏四月辛卯尹氏卒文三年夏五月王子虎卒定四年秋劉卷卒趙氏曰臣無外交之禮今死而赴故書以譏內大夫卒趙氏曰外大夫卒春秋不書書內大夫吾史也尊吾命卿所以尊王命也不書葬降于君也啖氏曰魯卿既王命皆書卒隱公攝位不請命大夫故未命之卿亦書卒眀非怠慢也挾無駭是也餘公則不命之卿無書卒者責不尊王室也桓十一年柔㑹盟于折莊三年溺㑹伐衛並不書卒叔肸非卿而書弟卒美其得弟道特加之也公孫敖既奔書卒為喪歸赴也大夫卒于他國則書國諸出聘者經雖無其事理須然也卒于魯地則書地仲遂公孫嬰齊是也程子曰諸侯之卿必受命于天子當時不復請命故諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也唯宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之大義或日或不日因舊史也古史記事簡略日月或不備春秋因舊史有可損而不能益也愚按凡諸侯之子稱公子公子之子稱公孫公孫之子不可復言公孫則以王父字為氏禮諸侯之卿命於天子平王東遷諸侯無復請命故隱桓及莊之初如無駭挾之類不書族者未賜也未賜族而身為大夫則稱名而已其後不待賜而諸侯自豫之矣如宋立華氏之類內女卒莊四年三月紀伯姬卒二十九年冬十有二月紀叔姬卒歸于酅者僖九年秋七月乙酉伯姬卒公羊云許嫁故以成人之喪治之十六年夏四月丙申鄫季姬卒文十二年二月庚子子叔姬卒書卒書同伯姬趙氏曰時君之女故曰子以别非先君之女也成八年冬十月癸卯把叔姬卒襄三十年五月甲午宋災宋伯姬卒啖氏曰內女為諸侯之夫人則書卒以公為之服故也禮諸侯絶朞故無服唯適國君者為之服大功九月以其尊卑敵故榖梁云外夫人書卒者適諸侯則尊同以吾為之變故卒之此說是也許嫁為夫人者亦然凡內女為諸侯夫人而不書卒時魯公非其兄弟及兄弟之子也把叔姬雖出猶書為喪歸把故也杞伯來逆叔姬之喪以歸外夫人卒莊二年秋七月齊王姬卒啖氏曰外夫人卒不書書王姬者魯主婚公為之服也主其嫁則有兄弟之恩故服也榖梁云為主者卒之是也公羊同莊十一年王姬不書卒者不為之服故不書義可見也趙氏曰記是以著非也記二年是十一年非也王葬趙氏曰凡天王葬不㑹則不書著不臣也記是以著非也平王不書葬莊三年五月葬桓王王崩至是七年左氏曰緩也公榖曰改葬也此後莊王僖王惠王並不書葬文九年二月辛丑葬襄王七月而葬此後頃王不書葬宣三年春葬匡王三月而葬此後靈王不書葬昭二十二年六月葬景王三月而葬啖氏曰凡天王之葬魯往㑹則書不書者皆不㑹也故平王之葬不書而有武氏子來求賻是其證也榖梁云天子志崩不志葬必其時也舉天下而葬一人其義不疑也言合七月之禮悉不書也公羊同蓋見書葬者多不得禮言不合七月之禮故有此說爾且襄王之葬正合禮何以書乎杜氏曰萬國之數至衆封疆之守至重故天子之喪諸侯不得越竟而奔修服于國卿往弔送既葬卒服而除凶胡氏曰按周書康王之誥太保率西方諸侯入應門左畢公率東方諸侯入應門右再拜趨出王反喪服此奔成王之喪者安得以為修服于國而可乎故周人有喪魯人有喪周人往弔謂使人可也魯人不往謂當親之者而不可使人代也諸侯嵗時朝聘㑹同或從兵革之事越竟踰時不以為難何獨難于奔喪而薄君臣始終之義哉公葬趙氏曰葬稱我君舉其諡也臣子之敬辭桓十八年冬十有二月己丑葬我君桓公賊在異國凡九月乃葬閔元年夏六月辛酉葬我君莊公十一月乃葬亂故也文元年夏四月丁巳葬我君僖公五月十八年六月癸酉葬我君文公五月成元年二月辛酉葬我君宣公五月十八年十二月丁未葬我君成公五月襄三十一年十月癸酉葬我君襄公五月定元年秋七月癸巳葬我君昭公八月乃葬十五年九月丁巳葬我君定公雨不克葬戊午日下昃乃克葬正月而葬國君不當無雨備故譏不克葬若合為雨止則當不書故榖梁曰雨不克葬喪不以制也啖氏曰凡公葬皆書唯隱公閔公不書者言賊不討如不葬然也公羊云君弒賊不討不書葬以為無臣子也穀梁云君弒賊不討不書葬以罪下也此說皆是也凡未踰年之君不書葬無子不列序於廟故也公羊云未踰年之君有子則廟廟則書葬無子則不廟不廟則不書葬此說是也夫人葬莊二十二年春王正月癸丑葬我小君文姜桓公夫人七月乃葬僖二年夏五月辛巳葬我小君哀姜莊公夫人齊所殺十一月乃葬文五年三月辛亥葬我小君成風僖公妾母五月而葬十七年夏四月癸亥葬我小君聲姜僖公夫人文公母九月而葬宣八年冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬宣公妾母五月而葬襄二年七月己丑葬我小君齊姜成公夫人三月而葬四年八月辛亥葬我小君定姒襄公妾母踰月而葬九年秋八月癸未葬我小君穆姜宣公夫人成公母四月而葬昭十一年九月己亥葬我小君齊歸昭公母也五月而葬定十五年九月辛巳葬定姒哀公妾母三月而葬啖氏曰凡夫人葬皆書仲子不書葬者桓公母隱二年卒以諸侯不二嫡雖用夫人禮猶不列於廟也别築宫是也自文公葬成風之後乃有二夫人祔廟非禮也定姒之葬不書小君以子未踰年故也哀公未踰年子未成君故母亦未成夫人後立于廟故書葬趙氏曰孟子昭公夫人不書葬者以其與魯同姓不可列于廟諸侯葬趙氏曰凡諸侯葬皆如我之辭何也不言某國葬某公志我大夫之往㑹葬也生嘗遊好死不豫葬君子薄之記其是以著其非也隱五年夏四月葬衛桓公被弒十五月而葬八年八月葬蔡宣公三月桓十一年秋七月葬鄭莊公三月十七年秋八月癸巳葬蔡桓侯三月而葬蓋蔡季請王諡莊九年秋七月丁酉葬齊襄公被弒九月而葬二十一年冬十有二月葬鄭厲公僖十八年秋八月丁亥葬齊桓公九月乃葬亂故也二十七年秋八月乙未葬齊孝公三月文六年春葬許僖公冬十月公子遂如晉葬晉襄公三月宣十年六月公孫歸父如齊葬齊惠公三月十二年春葬陳靈公賊討國復二十一月乃葬成三年正月辛亥葬衛穆公六月二月乙亥葬宋文公七月四年夏四月葬鄭襄公二月襄十六年春王正月葬晉悼公三月十九年正月葬曹成公四月冬葬齊靈公三十年冬十月葬蔡景公世子般弒之十月乃葬昭六年正月葬秦景公七月八年冬十月壬午葬陳哀公十月乃葬國滅故也十年九月叔孫舍如晉葬晉平公三月十一年春王二月叔弓如宋葬宋平公三月十二年五月葬鄭簡公三月十三年冬十月葬蔡靈公國復乃葬凡三十一月十六年冬十月葬晉昭公三月二十六年春王正月葬宋元公三月二十八年春王三月葬曹悼公六月六月葬鄭定公三月三十年秋八月葬晉頃公三月定四年七月葬把悼公三月八年九月葬陳懷公三月九年六月葬鄭獻公二月哀二年冬十月葬衛靈公七月四年冬十有二月葬蔡昭公被殺十一月而葬九年春王二月葬把僖公二月十年五月葬齊悼公三月啖氏曰凡諸侯葬魯往㑹則書之其有書葬不書往者往者非卿也吳楚之君不書葬者不可言葬楚某王也公羊云吳楚之君不書葬者避其號也此說是也榖梁云變之不葬者三一曰失德不書葬按時君失德而書葬不失德而不書葬者多矣不可通也二曰賊未討不書葬本施於魯不及他國他國則從㑹不㑹之例但賊當國者多不得依常禮終不可為例也三曰國滅不書葬言無人葬之也公羊云諸侯記卒記葬者有天子存不得必其時也按自為魯㑹故書何關不得必其時諸侯及時自葬無待天子命之禮何故云不必哉五等諸侯本國臣子皆稱之曰公葬既不請王命因而私諡為公王禮諸侯薨諸侯皆合請王諡從而書之以見非禮按史記世本左氏傳蔡之諸君皆諡為侯經則皆稱公者以其私諡與僭同也唯蔡桓稱侯蓋告王請諡故特書之明得禮也外大夫葬莊二十七年秋公子友如陳葬原仲定四年秋葬劉文公啖氏曰陳原仲之葬書者見季友私事出境也趙氏曰劉文公天子畿內諸侯列國不當與行交往之禮今㑹其葬非禮也內女葬莊四年六月乙丑齊侯葬紀伯姬趙氏曰嫌國亡則非夫人故志之目齊侯見其滅圖之惡而葬之得禮三十年八月癸亥葬紀叔姬歸于酅者義與伯姬同也襄三十年秋七月叔弓如宋葬宋共姬為災而死髙其志行使卿往㑹所以書之啖氏曰凡內女之葬不書書者皆非常也雜喪事啖氏曰凡他國以喪事來皆非常乃書雜喪事合禮者皆常事不書隱元年秋七月天王使宰咺來歸惠公仲子之賵仲子縶惠公而言故正其名不曰夫人而曰惠公之仲子妾稱也以天王之尊下賵諸侯之妾其惡可知三年秋武氏子來求賻交譏之文元年二月天王使叔服來㑹葬㑹僖公葬記是以著非也五年春王正月王使榮叔歸含且賵承上文成風薨故不言來義同惠公仲子三月王使召伯來㑹葬㑹成風葬也義同歸賵九年冬秦人來歸僖公成風之禭妾母繫子而言耳非兼禭也十五年夏齊人歸公孫敖之喪成九年春王正月把伯來逆叔姬之喪以歸襄三十一年冬十月滕子來㑹葬非禮也定十五年夏邾子來奔喪義同襄三十一年九月滕子來㑹葬喪禮總論啖氏曰古者君喪皆斬衰三年小君喪則齊衰周年故禮曰大夫居倚廬士居堊室其吉事盟㑹征伐朝聘冠昏燕享皆不可衰麻從事若魯公伯禽以戎冦來侵不得已而討之自此以後失禮之國引以為比漸染成俗既卒哭金革無避久已然矣春秋失禮更甚故不可勝譏但引其年月即知居喪行吉事爾至於未踰年不稱子桓十三年衛侯戰于紀是也踰年而未葬亦不當朝㑹用兵及在喪而吉閔二年吉禘于莊公是也居喪昏莊二十三年公如齊納幣之類是也及未葬出㑹僖元年宋子盟于葵丘之類是也當時猶以為怪故唯譏此數事而已其惡大也餘則不復一一罪之不可勝書也古者大夫士居喪致事于君君亦不奪其親春秋時世卿既多承襲不復循喪紀此亦覽文可知亦不復具譏也趙氏曰凡諸侯在喪而有竟外之事以喪行者稱子以吉行者稱爵志惡之淺深也朝聘如第六啖氏曰人君相見曰朝使使致問曰聘此皆受之於廟以重禮也他國來魯朝聘皆書之朝朝也以朝時相見也聘問也魯君及卿往他國則曰如如往也趙氏曰朝聘諸侯必有昏姻之好疆埸之理故王者不絶其交焉春秋之代則多自于黨仇矣皆國之大事故君子志之其邪正則存乎其文矣各詳見本經下朝𨼆十一年春滕侯薛侯來朝桓二年春滕子來朝秋七月把侯來朝六年冬紀侯來朝七年夏榖伯綏來朝鄧侯吾離來朝九年冬曹伯使其世子射姑來朝十五年夏邾人牟人葛人來朝莊五年秋郳黎來來朝二十三年夏蕭叔朝公始封附庸之君故書字公時在榖故不言來啖氏曰凡書朝皆人君也禮所謂諸侯相朝兩君相見也趙氏曰穀梁云天子無事諸侯相朝時正也考禮修德以尊天子也按春秋諸侯不事天子自以强弱相制無考禮修德之事左氏云凡諸侯即位小國朝之此乃春秋事霸者之禮非常事也公羊曰諸侯來曰朝按諸侯以他事來者多矣不可悉云朝凡朝聘同時至同行禮則列序之滕侯薛侯是也一前一後不同行禮則各書之穀伯鄧侯是也胡氏曰周禮行人凡諸侯之邦交殷相聘也世相朝也然謂之殷則得中而不過謂之世則終諸侯之世而一相朝其為禮亦節矣周衰典禮大壞諸侯放恣無禮義之交唯强弱之視以魯事觀焉或來朝而不報其禮或屢往而不納以歸無合於中聘世朝之制矣且列國於天子述所職者蓋闕如也而自相朝聘可乎此其大義也餘不合禮者悉說見本經下諸侯非朝事來者桓五年冬州公如曹左氏曰淳于公如曹度其國危遂不復六年春正月實來左氏曰自曹來朝書曰實來不復其國也按實州公名莊三十一年六月齊侯來獻戎捷趙氏曰謬聞當云齊人僖二十九年春介葛盧來介東夷國葛盧其君名不稱朝時公在㑹不見公且不能行朝禮冬介葛盧來以未見公故復來襄十八年春白狄來三十一年冬十月滕子來㑹葬非禮也定十五年夏邾子來奔喪非禮也九月滕子來㑹葬非禮也啖氏曰凡諸侯來而非朝者各書其事皆譏之也介葛盧白狄不行朝禮又無他事故但曰來聘啖氏曰聘者致君命也主人受之於廟以重禮也趙氏曰禮以通好曰聘公羊云大夫來曰聘按大夫以他事來者多矣不可悉云聘王臣來聘隱七年冬天王使凡伯來聘九年春天王使南季來聘桓四年夏天王使宰渠伯糾來聘五年夏天王使仍叔之子來聘八年春天王使家父來聘莊二十三年春祭叔來聘啖氏曰不言使見其專往也書聘明其假王命以外交也僖三十年冬天王使宰周公來聘宣十年秋天王使王季子來聘啖氏曰周禮云天子時聘以結諸侯之好穀梁云聘諸侯非正也言天子不當聘諸侯殊誤矣按是時諸侯無王而王室下聘春秋所書皆傷之也此其大義也餘各見本經下外大夫聘隱七年夏齊侯使其弟年來聘兄弟先公之子不稱公子見其以弟之愛而見寵任也桓三年冬齊侯使其弟年來聘莊二十三年夏荆人來聘夷狄朝聘稱人君臣同辭是時楚始通未成其禮故書法如此後曰楚子使椒則彼浸浸乎中國之物章矣故亦實録之非美其能自通中夏而漸進之之說二十五年春陳侯使女叔來聘陸氏曰諸侯大夫王賜之圻內邑以為號使仍歸國者皆書族書字鄭祭仲單伯陳女叔是也僖三十三年春齊侯使歸國父來聘文四年秋衛侯使寧俞來聘九年冬楚子使椒來聘不稱氏義見名位例十二年秋秦伯使術來聘趙氏曰春秋之辭簡嚴凡言聘則知君使矣曷為稱其君以别乎不當稱使者也諸書來不言君使者隱元年冬十有二月祭伯來左氏云非王命二年九月紀履緰來逆女下言伯姬歸于紀足知為君逆不假言使三年秋武氏子來求賻左氏云王未葬故不言使桓八年冬祭公來遂逆王后于紀莊二十三年春祭叔來聘私行假言聘閔元年冬齊仲孫來二年冬齊高子來盟僖四年夏楚屈完來盟于師盟于召陵文九年春毛伯來求金左氏云王未葬故不書使十五年三月宋司馬華孫來盟啖氏曰凡外臣來不言君使者皆有義如啖氏曰凡公及內卿往他國朝聘皆書曰如非卿則不書若㑹葬則但書彼葬而已㑹葬非卿但書非葬趙氏曰凡內朝聘稱如以異外也周之制朝聘也有數春秋畢書之見如京師之簡也所以傷王室之微著諸侯之不臣也凡書㑹遇亦如之王伯厚曰公如京師非禮也晉楚可以言如京師不可以言如於是朝覲之禮廢矣按京師亦言如夷之于列國矣列國書如者實朝也而不書者不與其朝也如京師者實以他事非朝也故直書如者以著其慢也公如隱觀魚于棠五年莊如齊觀社二十三年夏如齊納幣二十二年冬如齊逆女二十四年夏朝于王所者二僖二十八年夏踐土冬壬申河陽如京師者一成十三年三月如齊者十僖十年正月十五年正月三十三年十月宣四年秋五年春九年春正月十年春十年夏昭二十七年春二十七年冬與夫人者一桓十八年春如晉者二十文三年冬十三年冬成三年夏四年夏四月十年秋七月十八年襄三年春四年冬八年正月十二年冬二十一年春正月昭五年春十五年冬至河乃復者六昭二年冬十二年三月十三年冬二十一年冬二十三年冬有疾定三年正月次于乾侯者二昭二十八年春二十九年春如楚者二襄二十八年十一月昭七年三月啖氏曰凡公行書其事者皆非常也若合常禮則但言如某今按但言如某而不書其事若如齊如晉之類即知是朝于大國是乃常事故不煩更言其事非以為合禮而録之也卿如啖氏曰凡卿行除盟葬之外若有書其事者皆非常也逆女者二桓三年公子翬成十四年叔孫僑如致女者一成九年季孫行父告糴者一莊二十八年臧孫辰乞師者一僖五年公子逆私出竟者一莊二十七年公子友如陳葬原仲納幣者一文二年冬公子遂喪娶並書使介者二文十八年公子逆叔孫得臣定六年季孫斯叔孫何忌外相如桓五年夏齊侯鄭伯如紀冬州公如曹趙氏曰外相如不書凡書皆譏也㑹盟第七㑹者王合諸侯之名也周禮曰時㑹以發四方之禁謂王將有征討之事非時合諸侯以禁止天下之不義其後諸侯相見于外亦曰㑹謂彼此俱不在國中春秋之世鮮復王事凡書㑹皆譏也諸侯之離合始于兩君相見而終于伯者主㑹或以結好或以興戎君子志之以謹世故而美惡則存乎其文矣㑹伐㑹侵入侵伐例公㑹隱二年潛九年防十年中丘十一年時來桓元年垂二年稷成宋亂三年正月嬴六月郕九月歡六年四月郕十年桃丘十一年九月夫鐘十二月闞十二年八月虛十二月龜十四年曹十五年艾十六年曹十八年濼莊二十七年城濮僖元年八月柳齊桓公主㑹謀鄭故也十一年夏陽穀夫人與焉非禮也十三年夏鹹淮夷病把故且謀王子帶之難也以下俱齊主㑹十六年淮謀鄫且東略也二十八年溫晉文公主㑹討不服也諱㑹天王也文十三年冬沓衛㑹公十二月棐鄭㑹公宣元年平州七年黑壤成十二年瑣澤十六年沙隨襄五年戚晉悼公主㑹㑹吳且命戍陳也七年鄬謀救陳也十年柤㑹吳十一年蕭魚鄭服也十六年溴梁晉平公初立諸侯在而大夫盟諸侯失政也二十一年商任錮欒氏也二十二年沙隨復錮欒氏也二十四年夷儀將伐齊也時欒盈在齊定八年瓦十年夾谷十四年牽哀七年鄫十二年夏槖臯秋鄖十三年黃池外相㑹桓二年鄧蔡鄭莊十三年北杏齊桓始霸平宋亂僖三年陽穀定江黃之交申伐楚之約二十一年盂宋襄公圖霸反為楚所執文十一年扈宣九年扈十一年攢函昭四年申楚䖍主㑹定四年洮公㑹外大夫啖氏曰凡公與他國卿盟則耻之㑹則不耻故蜀之㑹書楚公子嬰齊澶淵之㑹書鄭良霄左氏言澶淵之㑹趙武不書尊公也若如此良霄何不尊公乎蓋時㑹者非趙武别是未命之卿爾穀梁之義蜀之㑹以書公為嬰齊伉至于處父高傒又以不書公為伉理亦自相反也大夫㑹諸侯莊十四年冬單伯㑹齊侯桓宋公衛侯鄭伯于鄄宋服故也文元年公孫敖㑹晉侯于戚十六年季孫行父㑹齊侯商人于陽穀齊侯弗及盟宣十四年公孫歸父㑹齊侯于穀胡氏曰以國君而降班以㑹外臣以外臣而出位以伉諸侯十五年公孫歸父㑹楚子于宋襄五年仲孫蔑衛孫林父于善道哀六年叔還于柤俱㑹吳昭九年叔弓㑹楚子于陳定十年齊侯衛侯鄭游速㑹于安甫大夫㑹文十一年夏叔仲彭生㑹晉郤缺于承筐宣十五年仲孫蔑㑹齊高固于無婁成五年叔孫僑如㑹晉荀首于穀十五年諸侯之大夫于鐘離襄二年秋七月于戚冬于戚遂城虎牢八年于邢丘十四年春正月于向冬于戚二十七年夏于宋秋七月辛巳豹及諸侯之大夫盟于宋二十年冬于澶淵宋災故昭元年于虢十一年于厥憖二十五年夏于黃父二十七年秋于扈皆諸國之大夫襄十九年叔孫豹㑹晉士丐于柯昭三十一年季孫意如㑹晉荀躒于適歷遇古有遇禮公羊曰不期也穀梁曰不期而㑹曰遇此遇之本義也當時簡禮而㑹亦曰遇則非相遇而特從省易以遇禮相見者爾隱四年魯宋于清八年宋衛于垂莊四年齊陳鄭于垂二十三年魯齊于榖三十年魯齊于魯濟三十二年宋齊于梁丘穀梁為桓十年傳云不遇者志不相得遂云遇為志相得謬矣公羊又云遇者一君出一君邀之亦非盟趙氏曰王綱壞則諸侯恣而仇黨行故干戈以敵讐盟誓以固黨天下行之遂以為常若王政舉則諸侯莫敢相害盟何為焉賢君立則信著而義達盟可息焉觀春秋之盟有以見王政不行而天下無賢侯也兩盟隱元年魯邾于蔑二年秋魯戎于唐冬紀莒于密三年齊鄭于石門六年魯齊于艾桓元年魯鄭于越二年魯戎于唐十二年冬魯鄭于武父十七年魯邾于趡莊十三年魯齊于柯二十三年魯齊于扈閔元年魯齊于落姑文三年魯晉于晉十七年魯齊于榖襄三年魯晉于長樗定七年齊鄭于鹹齊衛于沙八年衛鄭于曲濮參盟隱八年宋齊衛于瓦屋桓十二年夏魯杞莒于曲池秋魯宋燕于穀丘十七年魯齊紀于黃僖二十五年魯衛莒于洮二十六年魯莒衛大夫于向同盟莊六年同盟于幽齊桓公始霸也二十七年同盟于幽申霸令也僖二年盟于貫結江黃也五年夏諸侯盟于首止定王世子也七年盟于寧母修禮于諸侯諸侯官受方物八年盟于洮而服鄭王人與盟非禮也九年盟于葵丘一明天子之禁也十五年盟于牡丘將救徐也十九年盟于曹南鄫子㑹盟于邾使邾子執而用之宋襄公始霸而無道也二十一年盟于濮釋宋公時宋公為楚所執也二十七年盟于宋諸侯以霸事楚也二十八年盟于踐土晉文公勝楚而宗諸侯也文七年盟于扈晉襄初立大夫出盟而魯後至十四年同盟于新城十五年盟于扈將討齊而受賂不克而還宣十一年楚陳鄭盟于辰陵楚莊霸中國也十七年同盟于斷道郤克以私怒將伐齊也成五年同盟于蟲牢七年同盟于馬陵九年同盟于蒲德則不競尋盟為事也十五年同盟于戚討曹負芻也十七年同盟于柯陵襄三年同盟于雞澤晉悼公為鄭服故且欲修吳好也九年同盟于戲十一年同盟于亳城北皆為服鄭故也皆晉悼公二十年盟于澶淵晉平公二十五年同盟于重丘受齊崔杼賂而許之成昭十三年同盟于平丘欲示威以服二二十六年齊莒邾把盟于鄟陵謀納公也定四年盟于臯鼬侵楚無功齊桓公非受命為伯假同盟之禮以率諸侯同奬王室自是始有盟主其後皆相襲為之而善惡各繫其事啖氏曰凡同盟者謂其盟辭同也如言同奬王室之類載書之內衆國共其信誓無彼此之異乃同盟也凡諸侯及王臣盟皆譏也此解不特言諸侯盟者臣無疑君之理故王臣在㑹但㑹而已多不與盟而其時或有王臣與諸侯盟皆書以示譏交譏之也趙氏曰公羊云同盟者同欲也豫謂小國被制而至豈皆同欲穀梁云同尊周也同外楚也且盟㑹之辭固當云同救災恤患勸善止惡等辭豈止尊周外楚一辭而已又曰凡經不書盟而左氏言盟者皆非也王伯厚曰溴梁之盟大夫無君申之㑹諸侯皆狄春秋之大變也有雞澤之盟而後有溴梁之盟有宋之盟而後有申之㑹君臣夷夏之分謹其微而已公與大夫盟莊九年公及齊大夫盟于蔇納讐人之子降禮而盟大夫故書公又言大夫以明非大夫之罪也所以異于高徯及處父也二十二年及齊高徯盟于防髙徯伉也文二年及晉處父盟處父伉也不書地在晉都凡不書公皆以示恥下放此文二年及蘇子盟于女栗私盟王臣成三年及荀庚盟及孫良夫盟十一年及郤犨盟襄七年及孫林父盟十五年及宋華向盟于劉隱元年及宋人盟于宿八年公及莒人盟于浮來僖十九年㑹陳人蔡人楚人鄭人盟于齊二十九年㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉成二年公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀凡書人者啖趙以為皆大夫陸氏曰齊髙徯晉處父俱書名以其霸國之强以臣敵君故罪之也他則皆自以屈禮而與之盟故但書人而已大夫特盟外諸侯如桓十一年柔㑹宋公陳侯蔡叔盟于折之類凡九事趙氏曰凡大夫特盟公侯非禮也陸氏曰言特者明更有諸侯則可兼大夫也言公侯者明可以㑹子男也大夫盟如文八年公子遂㑹晉趙盾盟于衡雍之類凡六事外人盟如桓十一年齊人衛人鄭人盟于惡曹之類凡六事來盟桓十四年鄭伯使其弟語閔二年齊高子僖四年楚屈完文十五年宋司馬華孫宣七年衛侯使孫良夫蒞盟僖三年公子友如齊文七年公孫敖如莒昭七年叔孫婼如齊定十一年叔還如鄭啖氏曰他國來魯盟者曰來盟魯往他國盟者曰蒞盟皆為盟而行故直以盟為文也若因朝聘而盟者則先書聘書如後乃言盟平啖氏曰凡和而不盟曰平約言而退曰胥命春秋凡例卷上

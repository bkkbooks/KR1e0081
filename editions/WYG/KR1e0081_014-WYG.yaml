body:
  text: 春秋輯傳卷十二明王樵輯定公元年春王三月公羊傳定何以無正月正月者正即位也無正月者即位後也即位何以後昭公在外得入不得入未可知也曷為未可知在季氏也定哀多微辭主人習其讀而問其傳則未知己之有罪焉爾榖梁傳不言正月定無正也定之無正何也昭公之終非正終也定之始非正始也昭無正終故定無正始不言即位䘮在外也孔氏曰凡新君初立必於歳首元日朝正於朝因即改元正位國史因書於䇿其或國有事故不得行即位之禮國史亦書元年春王正月見此月公應即位而有故不得隠莊閔僖四公元年無事而空書春王正月其義也此年不書正月者公即位在六月故也傳稱昭公喪及壞隤公子宋先入則正月定公猶從䘮在乾侯不是即位缺禮故不須書正月也晉人執宋仲幾于京師大夫專執於是始左傳春正月孟懿子㑹城成周不書公未即位庚寅栽設版築宋仲幾不受功曰滕薛郳吾役也欲使三國代受功役薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然固曰從舊薛舊為宋役薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳下邳縣仲虺奚仲之後居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊言居周世不得以夏殷為舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎山川鬼神盟所告士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣且已無辭而抑我以神誣我也必以仲幾為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍齊髙張後不從諸侯公羊傳仲幾之罪何不蓑城也若今以草衣城是也其言于京師何伯討也伯討則其稱人何大夫之義不得專執也榖梁傳曰人何微之也不正其執人於尊者之所也不與大夫之伯討也李亷曰此條以事言之則以王事討有罪以義言之則大夫專執人於王側而不歸之王吏故春秋亦不與也公羊以為大夫不得專執則是以京師為伯討則非左氏序仲幾不受功之事則實以為執以歸晉復歸諸京師則恐非事實矣楊士勛曰不書所歸唯舉其地者此晉自治之效是也按周衰諸侯不享覲天子之在者唯號與祭僅城成周諸侯之大夫猶相帥以從王事得變之正也晉人執宋仲幾于京師猶以王事討有罪亦得變之正也其歸諸王吏與自治皆不可知但既執于京師則不可復云歸之京師以大義而論則以王事執有罪固視其他之擅命者不同矣春秋不應舍仲幾而專苛議晉人也然則稱人葢全之也稱君則不在㑹稱臣則嫌與大夫之專執也夏六月癸亥公之喪至自乾侯戊辰公即位左傳夏叔孫成子婼之子不敢逆公之喪於乾侯季孫曰子家子亟言于我未嘗不中吾志也吾欲與之從政子必止之且聽命焉衆事皆諮問子家子子家子不見叔孫易幾而哭幾哭㑹也不欲見叔孫故朝夕哭不同㑹叔孫請見子家子子家子辭曰羈未得見而從君以出出時成子未為卿君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君逐季氏本公為之謀季氏以公衍見為大子欲併誣而廢之故云若公子宋主社稷則羣臣之願也凡從公出而可以入者將唯子是聽子家子未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貎而出者入可也貎出謂以義從公與季氏無實怨冦而出者行可也與季氏為冦讐者自可去若羈也則君昭公知其出也而未知其入也羈將逃也喪及壞隤徒回反公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位諸侯薨五日而殯殯則嗣子即位癸亥昭公喪至五日殯於宫定公乃即位公羊傳癸亥公之喪至自乾侯則曷為以戊辰之日然後即位正棺於兩楹之間然後即位子沈子曰定君乎國定昭公之喪禮然後即位榖梁傳殯然後即位也定無正見無以正也踰年不言即位是有故公也謂昭公在外故言即位是無故公也即位授受之道也先君見授後君乃受故須棺在殯乃言在位先君無正終則後君無正始也戊辰公即位謹之也定之即位不可不察也公即位何以日也戊辰之日然後即位也癸亥公之喪至自乾侯何為戊辰之日然後即位也正君乎國然後即位也諸侯五日而殯今以君始死之禮治之故須殯而後言即位沈子曰正棺乎兩楹之間然後即位也内之大事日即位君之大事也其不日何也以年决者不以日决也此則其日何也著之也欲有所見何著焉踰年即位厲危也也於厲之中又有義焉先君未殯則後君不得即位未殯則雖有天子之命猶不敢况臨諸臣乎以輕喻重也雖為天子所召不敢背殯而往况君䘮未殯而行即位之禮以臨諸臣乎周人有喪魯人有喪周人弔魯人不弔周人曰固吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也故周人弔魯人不弔以其下成康為未久也君至尊也去父之殯而往弔猶不敢况未殯而臨諸臣乎按昭公有太子季氏以其與謀逐已廢之而立定公定公受位于賊曾不曰有先君之適在故亦如其意而書即位比于桓宣夫豈與之亦以誅之也昭公薨至是閱七月矣已越葬期而喪始至喪至五日而定公始立葢意如無君不以禮正先君後君之終始逆之緩立之緩皆不以時其惡著矣凡公即位皆于遭喪明年之正月而定公以六月凡即位皆于朔日故不待書日而定公書日凡歳首必書正月而此年無正月所以著定公之制於强臣先君無正終已無正始也其義深切著明矣秋七月癸巳葬我君昭公左傳季孫使役如闞口暫反公氏將溝焉闞魯羣公墓所在公氏春秋言氏猶如言家故謂公之墓地為公氏季孫惡昭公欲溝絶其兆域不使與先君同榮駕鵞曰魯大夫榮成伯生不能事死又離之以自旌也縱子忍之後必或耻之乃止季氏問於榮駕鵞曰吾欲為君諡使子孫知之為惡諡對曰生弗能事死又惡之以自信也將焉用之乃止秋七月癸巳葬昭公于墓道南孔子之為司冦也溝而合諸墓九月大雩榖梁傳雩月雩之正也秋大雩非正也冬大雩非正也秋大雩雩之為非正何也冬禾稼既成猶雩則非禮可知秋禾稼始苗嫌當須雨故問也毛地之所生謂之毛澤百穀之潤澤未盡人力未竭未可以雩也雩月雩之正也月之為雩之正何也其時窮人力盡然後雩雩之正也何謂其時窮人力盡是月不雨則無及矣是年不艾則無食矣啖氏曰雩者以祈雨也若待毛澤盡人力竭雖雨何救哉蓋傳以日月為例故有此分别立煬宫煬羊譲反左傳昭公出故季平子禱于煬公九月立煬宫昭公死于外季氏自以為獲福胡傳煬公伯禽之子曰立者不宜立也喪事即逺有進而無退宫廟即逺有毁而無立冬十月隕霜殺菽公羊傳何以書記異也此災菽也曷為以異書異大乎災也何氏日異者所以為人戒也重異不重災君子所以貴教化而賤刑罰也周十月夏八月微霜用事未可殺菽榖梁傳未可以殺而殺舉重菽强稼難殺舉殺菽則殺草可知可殺而不殺舉輕僖三十三年冬十二月隕霜不殺草是也其曰菽舉重也傳嫌獨殺菽不害餘物故以輕重别之五行志曰災故言菽重殺榖一曰菽草之難殺者也言殺菽知草皆死也二月春王正月夏五月壬辰雉門及兩觀災觀工煥反杜氏曰雉門公宫之南門兩觀闕也天火曰災何氏曰天子諸侯臺門天子外闕兩觀諸侯外闕一觀孔氏曰雉門公宫南門之中門也釋宫云觀謂之闕周禮象魏鄭衆云象魏闕也劉熈釋名云闕在門兩旁中央闕然為道也崔豹云葢為二臺于門外作樓觀于上然則其上懸法象其狀魏魏然髙大謂之象魏使人觀之又謂之觀也是觀與象魏闕一物而三名也觀與雉門俱災則兩觀在雉門之兩旁矣何氏曰門為主觀為餙蜀杜氏曰魯立雉門兩觀僭天子也魯之僭禮聖人譏之必因其事而托義焉李亷曰公榖惑於桓宫僖宫災不言及遂謂災起兩觀春秋不以微及大故後言之此說非也桓僖二廟分明故不必言及此若不言及則嫌於雉門之兩觀獨災耳文法合如此何疑秋楚人伐呉左傳桐叛楚桐小國廬江舒縣西南有桐鄉呉子使舒鳩氏楚屬國誘楚人曰以師臨我教舒鳩誘楚使以師臨吳我伐桐為我使之無忌呉伐桐偽若畏楚師之臨已而為伐其叛國以取媚使楚不忌吳所謂多方以誤之秋楚囊瓦伐吳師于豫章從舒鳩言呉人見舟于豫章偽將為楚伐桐而潛師于巢寔欲以擊楚冬十月呉軍楚師于豫章敗之楚不忌故遂圍巢克之獲楚公子繁守巢大夫冬十月新作雉門及兩觀書新作侈而大之也雉門象魏之門其外為庫門而臯門在庫門之外其内為應門而路門在應門之内是天子之五門也魯有庫雉路其庫門似天子臯門其雉門似天子應門而設兩觀僭也災而不知以為戒又作而新之故脩舊不書據西宫災復修不書書新作雉門及兩觀以為不警天變不正厥事之明鑒也災自雉門延及兩觀及魯人脩之理合先門門者出入處也乃及兩觀門餙各據寔而書耳公榖强生義皆非也三年春王正月公如晉至河乃復二月辛夘邾子穿卒左氏載邾子卞急事殊𤨏屑不足録也夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔拔公作枝薛氏曰魯大夫盟諸侯邾喪未期而為㑹盟交失之附左傳蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公恵侯之後有兩肅所六反爽音霜駿馬名也馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之乆也官不共也明日禮不畢將死遣蔡侯之禮蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚晉楚兵交止此左傳三月劉文公合諸侯于召陵謀伐楚也文公王官伯也晉人假王命以討楚之乆留蔡侯故云晉荀寅求貨于蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山鮮虞不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之析羽為旌王者遊車之所建鄭私有之因謂之羽旄借觀之明日或斾以㑹或賤者也繼旐曰斾令賤人施其斾執以從㑹示卑鄭晉於是乎失諸侯按是時晉楚之德相似也其大夫用事而貪於賄又相似也諸侯兩貳而夷侈無厭縣視與國至以一裘一馬拘唐蔡之君三年而後遣蔡昭侯乃隠太子之子也於是赫然奮其讎恥之志指漢而誓沈玉而濟如晉請師以伐楚晉為之請命于天子天子為之特使其老以臨之大合十有八國之君蔡陳鄭許頓胡素屬於楚齊桓晉文之所不能一時悉致而今皆在於㑹可謂盛矣若能奉辭伐罪仗義必往于以服楚而諸侯之散者復合豈不多於齊桓召陵之功哉而奈之何晉大夫皆𨽻材也求貨弗得遂辭蔡人潛掠楚境而還是以伐號召而以侵終之故春秋從其實而書之其亦不待貶絶而罪惡見矣繼此而蔡以呉師入郢夫蠻夷自相攻其常事也惟中國失救患之義而外裔借之于是始争衡于上國若楚討徴舒而縣陳呉救蔡而入郢是已或曰是役劉子為之也劉子定内難復辟于周而楚納子朝故合諸侯以侵楚也明年王人殺子朝于楚不可謂之無功而書侵者侵淺事也不敢深犯紀實耳齊桓以八國伐楚而楚來盟晉文以四國戰楚而楚大敗今三倍于桓五倍于文纔一侵而退卒之救蔡敗楚之功乃出于吳終春秋之世諸夏不振吳越争長其機實失于此夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之姓音生後同公作歸左傳沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈按沈不㑹于召陵者與楚故也晉求貨于蔡而蔡攜假羽旄於鄭而鄭貳大合諸侯以伐楚不能損楚之毫毛而潛蹤略竟又肆虐于逺弱之小國蔡屢為楚所滅不思己之視楚猶沈視蔡也而藉晉威以棄不道又如此故書滅書殺以著其罪也五月公及諸侯盟于臯鼬鼬由又反臯鼬公作浩油左傳衛子行敬子衛大夫言於靈公曰㑹同難其使祝鮀大祝子魚從及臯鼬將長蔡於衛欲令蔡先衛㰱衛侯使祝鮀私於萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周為睦武王之母弟八人周公為太宰康叔為司冦聃季為司空五叔無官豈尚年哉五叔管叔鮮蔡叔度成叔武霍叔處毛叔聃也萇𢎞説告劉子與范獻子謀之乃長衛侯於盟王伯厚曰是年三月㑹于召陵蔡侯已在衛侯之上五月盟不序諸侯經無長衛之文傳不足信也陸氏曰重言諸侯劉子不與盟也程子曰公以不獲見于晉故因㑹而求盟焉受國於季氏故因不獲見於晉而懼則此盟公意也故書公及按齊桓召陵之師伐楚不戰而楚服故書伐書屈完來盟于師盟于召陵以美之今召陵之師名曰伐楚實不能伐而空還楚人亦不遣一介行李問師來之故故書侵書諸侯自盟于臯鼬以陋之杜氏曰繁昌縣東南有城臯亭復稱公者㑹盟異處故把伯成卒于㑹成公作戊不言卒于師者不成乎伐楚也六月葬陳惠公許遷于容城秋七月公至自㑹不敢侵楚譏無功也劉卷卒卷音權杜氏曰即劉蚠奉命出盟召陵死則天王為告同盟故不具爵趙氏曰畿内諸侯不同列國故不言劉子卷卒亦譏來赴故書之劉氏曰王者之制内諸侯禄也外諸侯嗣也故生稱爵其禄也卒稱名從正也葬稱公主人之事也髙氏曰召陵㑹罷而卒則知臯鼬之盟以疾不與也葬杞悼公楚人圍蔡左傳楚為沈故圍蔡何氏曰囊瓦稱人者罪重異於凡圍也晉士鞅衛孔圉帥師伐鮮虞圉公作圄召陵之役荀寅謂無損於楚而失中山故茲蔡圍不救而伐鮮虞也葬劉文公李亷曰天子三公稱公曽為三公而有土為畿内諸侯者亦曰公皆以其地配公字言之若祭公周公州公之類是也天子卿大夫為畿内諸侯者皆曰子温子劉子單子尹子之類是也然周末畿内諸侯卒皆諡公如成肅公單平公春秋因劉文公之葬特書以志其僭耳生稱劉子卒稱劉卷葬稱劉文公皆聖人謹嚴之筆也而何氏注公羊乃以其稱公之故而謂劉子本外諸侯入為天子大夫故上係采邑下係本爵其説無據不可從冬十有一月庚午蔡侯以吳子及楚人戰于栢舉楚師敗績楚嚢瓦出奔鄭栢舉公作伯莒穀作伯舉左傳伍員為呉行人以謀楚楚之殺郤宛也伯氏之族出伯州犁之孫嚭普鄙反為呉太宰以謀楚楚自昭王即位無歲不有呉師蔡侯因之以其子乾與其大夫之子為質于呉冬蔡侯呉子唐侯伐楚唐侯不書兵屬于吳蔡舍舟於淮汭吳乘舟從淮來過蔡而舍之自豫章與楚夾漢豫章漢東江北地名後徙江南左司馬戍謂子常曰子㳂漢而與之上下欲遮使勿渡我悉方城外以毁其舟毁吳所舍舟還塞大隧直轅冥阨三者漢東之隘道子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂子常曰黒楚武城大夫呉用木也我用革也用軍器不可乆也不如速戰史皇楚大夫謂子常楚人惡子而好司馬沈尹戍若司馬毁呉舟于淮塞城口而入城口三隘道之總名是獨克呉也子必速戰不然不免乃濟漢而陳自小别至于大别二别在江夏界三戰子常知不可知吳不可勝欲奔史皇曰安求其事求知政事難而逃之將何所入子必死之初罪必盡説言致死以克吳可以免貪賄致冦之罪十一月庚午二師呉楚師陳于栢舉闔廬之弟夫槩王晨請於闔廬曰楚瓦子常名不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乗廣死公羊傳呉何以稱子夷狄也而憂中國其憂中國奈何伍子胥父誅乎楚挾弓而去楚以干闔廬闔廬曰士之甚言其為賢士勇之甚將為之興師而復讐于楚伍子胥復曰諸侯不為匹夫興師且臣聞之事君猶事父也虧君之義復父之讐臣不為也於是止蔡昭公朝乎楚有美裘焉嚢瓦求之昭公不與為是拘昭公於南郢數年然後歸之於其歸焉用事乎河河非楚蔡之間時蓋北如晉請伐楚因祭河也曰天下諸侯苟有能伐楚者寡人請為之前列楚人聞之怒為是興師使嚢瓦將而伐蔡蔡請救于呉伍子胥復曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣於是興師而救蔡曰事君猶事父也此其為可以復讐奈何曰父不受誅子復讐可也父受誅子復讐推刃之道也一往一來曰推刃杜氏曰師能左右之曰以皆陳曰戰大崩曰敗績吳為蔡討楚從蔡計謀故書蔡侯以呉子言能左右之栢舉楚地按楚馮陵諸夏陳蔡尤被其毒葢嘗滅而夷之為縣其於蔡也誘般而殺之用隠太子於岡山逐朝呉出侯朱東國客死至呉又以囊瓦求美裘弗與拘於南郢數年而後歸之讐耻極矣故蔡侯呉發憤請師于晉晉不足與請師于呉呉子為之興師大敗楚兵于柏舉囊瓦奔鄭於是蔡人累世之讐憾少伸矣春秋書蔡侯以呉子所以伸蔡也呉子親行君重於師故不得不書以呉子也楚陵中國二百年中國不能制天厭之假手於呉國幾亡然敝楚而呉繼之此聖人之所傷也春秋書蔡侯以呉子所以伸蔡侯之義正中國之討其曰以呉又以傷中國耳胡氏乃謂呉進而稱子為善其伐楚解蔡圍成伯討之功失經意矣庚辰呉入郢郢公穀作楚左傳呉從楚師及清發水名將擊之夫槩王曰困獸猶鬬况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人為食呉人及之奔食而從之敗諸雍澨五戰及郢奔食食者走不陳故不在戰數己卯楚子取其妹季芊畀我以出渉睢睢水出新城昌魏縣東南至枝江縣入江是楚王西走鍼尹固與王同舟王使執燧象以奔呉師燒火燧繫象尾以驚却吳師庚辰吳入郢以班處宫左司馬戍及息而還息汝南新息也聞楚敗故還敗呉師於雍澨傷初司馬臣闔廬嘗在呉為闔廬臣故耻為禽焉謂其臣曰誰能免吾首呉句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之司馬己死剄取其首藏其身而以其首免楚子渉睢濟江入于雲中王寢盗攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芊以從鍾建楚大夫由于徐蘇而從鄖公辛之弟懷將弑王曰平王殺吾父我殺其子不亦可乎辛蔓成然之子昭十四年平王殺成然辛曰君討臣誰敢讐之君命天也若死天命將誰讐鬬辛與其弟巢以王奔隨呉人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奬天衷君之恵也漢陽之田君實有之楚子在公宫之北隨公宫也呉人在其南子期昭王之兄公子結似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭呉曰以隨之辟小而宻邇於楚楚實存之世有盟誓至於今未改若難而棄之何以事君執事之患不惟一人一人楚王若鳩安集也楚竟敢不聴命呉人乃退初伍員與申包胥楚大夫友其亡也謂申包胥曰我必復報也楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰呉為封豕長蛇以薦食上國虐始于楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰于君疆埸之患也逮呉之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就舘將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣秦風九頓首而坐無衣三章章三頓首秦師乃出五年春王三月辛亥朔日有食之三月公作正月附左傳王人殺子朝于楚夏歸粟于蔡左傳以周亟矜無資公羊傳孰歸之諸侯歸之曷為不言諸侯歸之離至不可得而序故言我也榖梁傳諸侯無粟諸侯相歸粟正也杜氏曰蔡為楚所圍饑乏故魯歸之粟按二傳皆稱諸侯歸蔡粟然其畧言之何也侵楚無功圍蔡不救及呉既破楚入郢解蔡圍然後相率而歸之粟救災恤鄰從簡書之道固如是乎故畧而不序見其事之末矣於越入呉左傳越入呉呉在楚也杜氏曰於發聲也孔氏曰公羊傳言越與於越立文不同事有褒貶左氏無此義越是南夷夷言有此發聲史官或正其名或從其俗越與於越史異辭無義例按於越猶云邾婁孔氏之説是也哀元年傳言呉之入楚也使召陳懐公懐公召國人而問焉逢滑對曰臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無徳亦不艾殺其民呉日敝于兵暴骨如莽而未見徳焉天其或者正訓楚也禍之適呉其何日之有逢滑之言視史墨之言可謂徴於近而當於理要言不煩矣六月丙申季孫意如卒左傳六月季平子行東野季氏邑還未至丙申卒于房陽虎將以璵音餘璠音煩斂璵璠美玉君所佩仲梁懐弗與懐亦季氏家臣曰改歩改玉昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君歩則亦當去璵璠陽虎欲逐之告公山不狃季氏臣費宰子洩也不狃曰彼為君也子何怨焉為君不欲使僣既葬桓子意如子季孫斯行東野及費子洩為費宰逆勞于郊桓子敬之勞仲梁懐時從桓子仲梁懐弗敬慢子洩子洩怒謂陽虎子行之乎行逐懷也胡傳内大夫有罪見討則不書卒公子翬是也仲遂殺惡及視罪與翬同而書卒者以事之變卒之也意如何以書卒見定公不討賊復以為大夫全始終之禮也秋七月壬子叔孫不敢卒附左傳申包胥以秦師至秦子蒲子虎帥車五百乗三萬七千五百人以救楚子蒲曰吾未知呉道道猶法術使楚人先與呉人戰而自稷㑹之大敗夫槩王于沂稷沂皆楚地呉人獲薳射楚大夫於柏舉其子帥奔徒散卒以從子西敗呉師于軍祥楚地秋七月子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗自為呉王號夫槩奔楚為堂谿氏呉師敗楚師于雍澨秦師又敗呉師呉師居麇地名子期將焚之子西曰父兄親暴骨焉不能収又焚之不可前年楚人與呉人戰多死麇中言不可併焚子期曰國亡矣死者若有知也可以歆舊祀言焚呉復楚則祭祀不廢豈憚焚之焚之而又戰呉師敗又戰于公壻之谿楚地名呉師大敗呉子乃歸囚闉輿罷楚大夫闉輿罷請先請先至呉遂逃歸遂逃歸楚言呉惟得楚一大夫復失之乙亥陽虎囚季桓子及公父文伯文伯桓子從父昆弟也陽虎欲為亂恐二子不從故囚之而逐仲梁懷冬十月丁亥殺公何藐季氏族己丑盟桓子于稷門之内魯南城門庚寅大詛逐公父歜昌欲反即文伯及秦遄市專反平子姑壻皆奔齊楚子入于郢賞鬬辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懷九子皆從王有大功者子西曰請舍懷也以初謀欲弑王王曰大德滅小怨道也申包胥曰吾為君也非為身也君既定矣又何求遂逃賞王將嫁季芊季芊辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹冬晉士鞅帥師圍鮮虞左傳報觀虎之役也三年鮮虞獲晉觀虎六年春王正月癸亥鄭游速帥師滅許以許男斯歸速公作遫後同左傳春鄭滅許因楚敗也二月公侵鄭左傳周儋翩子朝餘黨率王子朝之徒因鄭人將以作亂于周鄭於是伐馮滑胥靡負黍狐人闕外周六邑二月公侵鄭取匡鄭邑取匡不書歸之晉也為晉討鄭之伐胥靡也往不假道於衛及還陽虎使季孟自南門入出自東門陽虎將逐三桓欲使得罪于衛舍于豚澤衛侯怒使彌子瑕衛嬖大夫追之公叔文子老矣公孫發輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎衛文公之鼎成之昭兆寶龜定之鞶鑑鞶帶而以鏡為餙也今西方羌胡猶然古之遺服苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎太姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止按自宣公十八年書公伐把之後魯無君者將八十年至是而侵鄭再侵齊一圍成皆書公豈公室能張而兵權在公哉三桓既微陪臣執國命而挾公以行耳召陵之盟口血未乾而鄭受囊瓦之奔弱晉間楚之敗而滅許又黨王室之亂人加兵天子之六邑其罪大矣魯於是奉辭以伐之夫誰曰不可而陽虎之徒釁於勇嗇於禍以逞其私觀季孫獻俘於晉則魯安有奨王室之實哉故書侵以志其卑也公至自侵鄭是行也陽虎居中有異志焉往不假道還自南門入東門出以激怒於衛使微公叔文子之言公其危矣故致之夏季孫斯仲孫何忌如晉左傳夏季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣聘禮執圭以致君命執璧以致享幣其於夫人則聘用璋享用琮聘君與夫人一使兼致之夫人不别使也陽虎欲困辱三桓并求媚于晉既使桓子報聘晉君又别遣正卿報夫人聘晉人兼享之賤魯故不復兩設禮明經所以不備書孟孫立于房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故强為之請以取入焉按春秋於魯卿使鄰國變文書介副者二文十八年公子遂叔孫得臣如齊大夫擅廢立而君始失政也此年季孫斯仲孫何忌如晉陪臣執國命而大夫受制也二子專國而聽于陽虎行云則行止云則止立於房外致請于范鞅佯為陽虎道地而實以取入求哀于霸國吁何其衰也春秋之書皆欲以起問者見事情也附左傳四月己丑呉太子終纍闔廬子夫差兄敗楚舟師子期又以陵師陸軍敗于繁揚令尹子西喜曰乃今可為矣知懼故也於是乎遷郢於鄀音若而改紀其政以定楚國六月晉閻没戍周且城胥靡秋晉人執宋行人樂祁犂左傳秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立後而行吾室亦不亡知晉政多門往必有難唯君亦以我為知難而行也見溷樂祁子而行趙簡子逆而飲之酒於緜上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也己然子死晉國子孫必得志于宋范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁冬城中城榖梁傳城中城者三家張也或曰非外民也陸氏曰三家張為日乆矣此時陽虎用事三家始衰何言張也入春秋過二百年矣城壞須築何譏外民哉杜氏曰公為晉侵鄭故懼而城季孫斯仲孫忌帥師圍鄆杜氏曰鄆貳于齊故圍之何忌不言何闕文附左傳陽虎又盟公及三桓於周社盟國人于亳社詛于五父之衢冬十二月天王處于姑蕕周地辟儋翩之亂也七年春王正月附左傳春二月周儋翩入于儀栗周地以叛齊人歸鄆陽關陽虎居之以為政鄆陽關皆魯邑中貳于齊齊今歸之不書虎專之夏四月附左傳夏四月單武公穆公子劉桓公文公子敗尹氏于窮谷尹氏復黨儋翩共為亂也秋齊侯鄭伯盟于鹹諸侯始復特相盟左傳齊侯鄭伯盟于鹹徵㑹于衛杜氏曰鹹衛地陳氏曰特相盟自齊桓以來未之有也於是再見諸侯無主盟矣是故石門志諸侯之合也于鹹志諸侯之散也自是而後盟沙盟曲濮㑹安甫盟黄㑹牽㑹洮皆齊鄭糾合之事與隠公初年事相似齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙公作沙澤左傳衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟于瑣瑣即沙也杜氏曰陽平元城縣東南有沙亭此齊衛合黨之始自此以後次五氏次垂葭次渠蒢無非包藏禍心以圖晉為事夫齊固伯國之餘業而衛亦中州之大國也使能脩其德政豈不足以自强乃間晉楚之衰逞為不義未幾而屈于强呉曰既不能令又不受命是絶物也涕泣而女于呉兹非不義之明效哉大雩齊國夏帥師伐我西鄙左傳齊國夏伐我齊叛晉故陽虎御季桓子公斂處父孟氏家臣成宰公斂陽御孟懿子將宵軍齊師齊師聞之墮伏而待之堕毁其軍以示弱而設伏兵處父曰虎不圖禍而必死言虎欲夜掩齊師入其伏内則己必殺虎苫夷曰季氏家臣虎陷二子季孟於難不待有司余必殺女虎懼乃還不敗按昭公逐於季氏羈棲鄆邑惟齊是依而齊不能為之出偏師向魯鄙問季氏之罪今間晉之衰結盟鄭衛加兵于魯覬覦代興是知時之或可而不知己之不可也見義不為非分妄動無名棄好豈不愚哉九月大雩冬十月附左傳冬十一月戊午單子劉子逆王于慶氏慶氏守姑蕕大夫晉籍秦送王己巳王入于王城館于公族黨氏周大夫而後朝于莊宫莊王廟八年春王正月公侵齊公至自侵齊左傳公侵齊門于陽州士皆坐列言無鬭志曰顔髙魯人之弓六鈞百八十斤皆取而傳觀之言魯無軍政附左傳二月己丑單子伐榖城劉子伐儀栗討儋翩之黨榖城在河南縣西辛邜單子伐簡城劉子伐盂以定王室趙鞅言于晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁樂祁歸卒于大行晉東南山士鞅曰宋必叛不如止其尸以求成焉乃止諸州晉地二月公侵齊左傳公侵齊攻廪丘之郛主人焚衝戰車或濡馬褐馬衣以救之遂毁之毁郛主人出師奔三月公至自侵齊曹伯露卒夏齊國夏帥師伐我西鄙公㑹晉師于瓦公至自瓦左傳晉士鞅趙鞅荀寅救我公㑹晉師于瓦杜氏曰將來救魯公逆㑹之救不書齊師已去瓦衛地東郡燕縣東北有瓦亭按不曰㑹士鞅而曰㑹晉師君不㑹大夫且重師也棐林之㑹不言趙盾而言晉師瓦之㑹言晉師而不書士鞅秋七月戊辰陳侯桞卒晉士鞅帥師侵鄭遂侵衛士公作趙左傳晉師將盟衛侯于鄟澤自瓦還就衛地盟趙簡子曰羣臣誰敢盟衛君者前年衛叛晉與齊簡子意欲摧辱之渉佗成何曰我能盟之二子晉大夫衛人請執牛耳盟用牛耳卑者執之尊者涖之衛侯自以當涖牛耳請晉大夫執之成何曰衛吾温原也焉得視諸侯將㰱渉佗捘子對反擠也衛侯之手及捥血至捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故問不入故公以晉詬語之詬耻也且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子與大夫之子為質大夫曰苟有益也公子則往羣臣之子敢不皆負羈絏以從將行王孫賈曰苟衛國有難工商未嘗不為患使皆行而後可欲以激怒國人公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅㑹成桓公周卿士不書監帥不親侵也侵鄭圍蟲牢報伊闕也六年鄭伐周闕外遂侵衛葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛左傳晉故也冬衛侯鄭伯盟于曲濮杜氏曰結叛晉曲濮衛地從祀先公盗竊寳玉大弓左傳季寤季桓子之弟公鉏極公彌曽孫桓子族子公山不狃費宰皆不得志於季氏叔孫輒叔孫氏之庶子無寵於叔孫氏叔仲志叔孫帶之孫不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏己更孟氏冬十月順祀先公而祈焉辛卯禘于僖公不于太廟者順祀之義當退僖公懼于僖神故于僖廟行順祀禮祭尊可以及卑後代之主宜上徙太廟而食今徙上世之主下祀僖廟凟也壬辰將享季氏于蒲圃而殺之戒都車都邑之兵車曰癸巳至將以壬辰夜殺季孫明日癸巳以都車攻二家成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越虎從弟殿將如蒲圃桓子咋謂林楚曰咋詐同慙語也仕駕反杜云暫也而先皆季氏之良也爾以是繼之欲使林楚免已于難以繼其先人之良對曰臣聞命後猶晚也陽虎為政魯國服焉違之徴猶速也死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壯者三百人以為公期孟氏支子築室於門外托築室以聚衆實欲以備難林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎刼公與武叔叔孫不敢之子州仇以伐孟氏公斂處父帥成人自上東門入魯東城之北門與陽氏戰于南門之内弗勝又戰于棘下城内地名陽氏敗陽虎説甲如公宫取寳玉大弓以出舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余喜於徵死言喜於得脱上文林楚言違之徴死懼適孟氏不成而徒速死也今適孟氏成則徵死之懼轉而為喜矣故云然從者曰嘻歎聲速駕公斂陽在公斂陽請追之孟孫弗許陽欲殺桓子欲因亂討季氏以强孟氏孟孫懼而歸之不敢殺子言季寤辨猶周徧也舍爵於季氏之廟而出示無懼陽虎入于讙陽關以叛叛不書畧家臣公羊傳從祀者何順祀也文公逆祀去者三人諫不從而去之定公順祀叛者五人諫不以禮去曰叛榖梁傳貴復正也杜氏曰先公閔僖也將正二公之位次所順非一故通言先公胡傳蜀人馮山曰昭公至是始得從祀於太廟其説是也三傳皆以為順祀閔僖二公惟馮氏以為從祀昭公於太廟季氏逐君薨不得以時歸葬葬又絶其兆域在墓道之南則其主乆未得從昭穆而祔祭矣陽虎將殺季孫始以其主從祀太廟葢欲著季氏之罪以取媚於國人也薛氏曰從祀者何順祀也魯之祭也躋僖公外昭公從祀之始正其禮也此兼用二説似優劉氏曰陽虎將作亂而惡不得民心故於是為小正以售其大不正立小義以遂其大不義也按既正閔僖之逆祀使昭公果未從祀亦在所正可知矣凡祭而失禮則書祭名祭非失禮為所舉革之事而書者則書事此義重從祀故直云從祀先公而略其祭事也諸儒以為不書禘事與日者為事出陽虎而不正言之恐亦過矣公羊傳盗者孰謂謂陽虎也陽虎者曷為者也季氏之宰也季氏之宰則微者也惡乎得國寳而竊之陽虎專季氏季氏專魯國陽虎拘季孫何氏曰季孫逐昭公之後取其寳玉藏于其家陽虎拘季孫奪其寳玉季孫取玉不書者舉逐君為重今按經書盗竊則明是取之公宫何説無據孟氏與叔孫迭而食之睋五多反而鋟且審反其板以爪刻其饋器之上葢板曰某月某日將殺我于蒲圃力能救我則於是至乎日若時而出臨南者陽虎之出也姊妹之子為出或云從其家出而仕于公御之御季孫於其乗焉初上車時季孫謂臨南曰初上車時陽越未在故得私語以季氏之世世有子子可以不免我死乎臨南曰有力不足臣何敢不勉陽越者陽虎之從弟也為右為季孫車右諸陽之從者車數十乗至於孟衢臨南投䇿而墜之䇿馬捶也陽越下取䇿臨南駷素勤反馬振馬銜令馬走也而由乎孟氏陽虎從而射之矢著于莊門孟氏所入門名然而甲起于琴如地名弑不成却反舍于郊皆説他㑹反然息或曰弑千乗之主季氏專魯國故云千乗之主而不克舍此可乎陽虎曰夫孺子得國而已夫指季孫也言季孫孺子耳得免而已不能圗已如丈夫何睋而曰彼哉彼哉望見公斂處父之師而曰彼哉彼哉再言之者切遽意既駕公斂處父帥師而至慬其靳反然後得免自是走之晉寳者何璋判白判半也半圭曰璋白藏天子青藏諸侯魯得郊天故錫以白弓繡質質拊也龜青純純縁也謂縁甲􅏋也千嵗之龜青􅏋榖梁傳寳玉者何封圭始封之圭也大弓者武王之戎􅃓也周公受賜藏之魯蘓氏曰陽虎將殺季孫斯不勝而出取寳玉大弓於公宫以行其稱盗陪臣也寳玉大弓魯之分器也是時陽虎以鄆讙龜隂叛奔齊十年侯犯以郈叛及昭十二年南蒯以費叛皆以賤不書其書竊寳玉大弓何也分器重於地也分器重於地者賤貨而貴命也杜氏曰寳玉夏后氏之璜大弓封父之繁弱孔氏曰公羊傳曰寳者何璋判白弓繡質龜青純彼不知魯有先王分器謬為言耳且所盗無龜知其並是妄也九年春王正月附左傳宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢夏四月戊申鄭伯蠆卒蠆赦邁反公作囆得寳玉大弓公羊傳何以書國寳也喪之書得之書榖梁傳惡得之得之堤下或曰陽虎以解衆也六月葬鄭獻公附左傳六月伐陽關討陽虎也陽虎使焚萊門陽關邑門師驚犯之而出奔齊請師以伐魯曰三家必取之三加兵于魯齊侯將欲許之鮑文子諫曰臣嘗為𨽻於施氏矣施氏魯大夫文子鮑國也成十七年齊人召而立之至今七十四年文子葢九十餘矣魯未可取也上下猶和衆庶猶睦能事大國而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎奮其詐謀夫陽虎有寵于季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君冨於季氏而大於魯國茲陽虎所欲傾覆也魯免其疾而君又収之無乃害乎齊侯執陽虎將東之陽虎願東陽虎將西奔晉知齊必反已故詐願東乃囚諸西鄙盡借邑人之車鍥若刻反刻也其軸麻約而歸之刻其軸使易毁折麻約刻處而歸之令人不覺欲追者不能及載葱初江反靈寢於其中而逃葱靈輜車名賈逹云衣車也有葱有靈然則此車前後有蔽兩旁開葱可以觀望葱中竪木謂之靈其内容人卧追而得之囚於齊又以葱靈逃奔晉適趙氏秋齊侯衛侯次于五氏趙氏曰凡師駐曰次惡興師也言非奉王命以討罪救亂而擅興次猶不可次者無所用但次止耳經猶譏之况侵伐乎唯莊八年次于郎以俟陳人蔡人俟冦為免譏耳即明無冦而次是欲自為冦也皆譏也今按齊侯衛侯次于五氏未見所用正趙氏所謂無冦而次是欲自為冦也左氏言齊侯伐晉夷儀杜預謂不書伐者諱伐盟主以次告然襄二十三年書齊侯遂伐晉何不諱乎陳君舉又謂中國無霸春秋重絶晉故不言伐然文元年書衛人伐晉何以不重絶晉乎五氏晉地秦伯卒冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷公至自夾谷夾公穀作頰左傳夏公㑹齊侯于祝其實夾谷夾谷即祝其也孔丘相相㑹儀也犂彌言於齊侯曰孔丘知禮而無勇若使萊人齊所滅萊夷以兵刼魯侯必得志焉齊侯從之孔丘以公退曰士兵之以兵擊萊人兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥盟將告神犯之為不善於德為愆義於人為失禮君必不然齊侯聞之遽辟婢亦反去也之將盟趙氏曰按經不書盟傳何得云盟葢左氏欲以歸汶陽之田歸功于夫子故謬為此説殊不知要而得之非聖人之正也故自遽辟之以下至齊侯將享公悉不取齊人加於載書曰齊師出竟而不以甲車三百乗從我者有如此盟孔丘使茲無還揖對曰無還魯大夫而不反我汶陽之田吾以共命者亦如之張氏曰夾谷魯地漢東海祝其縣有夾山按陽虎奔齊請師以伐魯齊侯將許之以鮑文子之諌而止至是魯之君臣能用孔子魯國大治齊人慕義故今年三月及齊平而為夾谷之㑹焉安得有使萊人以兵刼魯侯之事乎是㑹也聖人相禮將使兩國繼好謀闕敦于信義以從先王之典何以盟為經言㑹而傳言盟足知其誣也其盟辭曰齊師出竟而魯以三百乗從是欲以邾滕視魯也及魯使茲無還答之則要其反我汶陽之田而已何其不倫乎使齊反汶陽之田則魯將為齊役乎他書載景公之言曰魯以君子之道輔其君而子獨以夷狄之道教寡人晏嬰之言曰小人之謝過也以文君子之謝過也以質君已知過則謝之以質爾於是齊人歸田以謝過此為是則左氏之説為非矣晉趙鞅帥師圍衛齊人來歸鄆讙龜隂田鄆公作運田上穀有之字公羊傳齊人曷為來歸運讙龜隂田孔子行乎季孫三月不違齊人為是來歸之杜氏曰三邑皆汶陽田也泰山博縣北有龜山隂田在其北也㑹夾谷孔子相齊人服義而歸魯田任公輔曰桓三年讙杜氏以為魯地濟北蛇丘縣有讙亭而汶水經濟北至東平須昌入濟鄆即昭公時齊取以居公者至是并以還魯二邑與龜隂俱在汶水北孔氏曰八年陽虎入於讙陽關以叛九年伐陽關陽虎奔齊其時虎以讙去鄆與龜隂亦從之家氏曰取濟西取汶陽書取不言歸以其仗大國而得之故書曰取歸濟西歸讙及闡歸疆也言歸不言來歸以其請之而後得非彼自歸也惟鄆讙龜隂書齊人來歸言齊人自以故疆來歸也聖人道化所感强暴為之革心有莫知其然而然者讀春秋至此可以信聖人之道不為空言儒者之學果非無實也左氏所載兹無還之對陋矣叔孫州仇仲孫何忌帥師圍郈郈音后左傳初叔孫成子欲立武叔公若藐叔孫氏之族固諌曰不可成子立之而卒武叔既定使郈馬正侯犯殺公若弗能其圉人叔孫氏之圉人殺公若侯犯以郈叛犯以不能副武叔之命自懷疑懼而叛武叔懿子圍郈弗克杜氏曰郈叔孫氏邑任公輔曰東平無塩縣東南有郈鄉秋叔孫州仇仲孫何忌帥師圍郈郈公作費左傳秋二子及齊師復圍郈弗克郈工師掌工之官駟赤謂侯犯曰居齊魯之間而無事無所服事必不可矣子盍求事於齊以臨民不然將叛侯犯從之齊使至駟赤為之宣言於郈中詐為齊使言曰侯犯將以郈易于齊齊人將遷郈民衆兇懼駟赤謂侯犯曰子不如易於齊齊人欲以此偪魯必倍與子地且盍多舍甲於子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯侯犯奔齊齊人乃致郈胡傳侯犯以郈叛不書書圍郈則叛可知矣再書二卿帥師圍郈則彊可知矣宋樂大心出奔曹左傳宋樂溷樂祁之子謂桐門右師右師樂大心溷族父也曰吾猶衰絰而子擊鐘何也忿其不逆父䘮因責其無同族之恩右師曰喪不在此故也既而告人曰已衰絰而生子余何故舍鐘子明溷聞之怒言於公曰右師將不利戴氏樂氏載公族不肯適晉將作亂也乃逐桐門右師宋公子地出奔陳地公作池後同左傳宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒扶魋而奪之母弟辰曰子為君禮辟君也不過出竟君必止子公子地出奔陳公弗止冬齊侯衛侯鄭游速㑹于安甫安甫公作鞌杜氏曰安甫地闕叔孫州仇如齊左傳武叔聘于齊謝致郈也齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之以致郈德叔孫對曰非寡君之望也所以事君封疆社稷是以以猶為也敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜言義在討惡非所以賜寡君宋公之弟辰暨仲佗石彄出奔陳暨下公穀有宋字彄苦侯反左傳辰為地請弗聽辰曰是我迋古况反欺也吾兄也吾以國人出君誰與處冬母弟辰暨仲佗石彄出奔陳佗仲幾子彄褚師段子胡傳其弟云者罪宋公以嬖魋故奔其二弟無親親之恩暨云者罪辰以地故自絶於君又牽帥其大夫以出無尊君之義夫暨者不得已之詞又以見仲佗石彄身為卿佐不能匡君靖難而為辰所率與之俱奔無大臣之節也十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭左傳宋公母弟辰暨仲佗石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也杜氏曰蕭宋邑胡傳出奔陳則稱暨入于蕭以叛則稱及及非不得已之詞也非不得已而果於叛君則無首從之别其罪一施之故不稱暨而稱及四卿在蕭而大心自曹從之其叛可知矣故不書叛而曰入于蕭入逆詞也初宋蕭邑大夫蕭叔大心有功于宋封為附庸楚滅之復為宋邑冬及鄭平叔還如鄭涖盟還音族涖公穀作莅左傳始叛晉也杜氏曰魯自僖公以來世服于晉至今而叛故曰始十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈墮許規反後同衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費費音秘後同左傳仲由為季氏宰將墮三都費郈成於是叔孫氏墮郈季氏將堕費公山不狃費宰叔孫輒帥費人以襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側至臺側仲尼時為司冦命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費公羊傳曷為帥師堕郈帥師堕費孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是帥師堕郈帥師堕費雉者何五板而堵八尺曰板五堵而雉百雉而城二萬尺凡周十一里三十三歩二尺公侯之制也禮天子千雉伯七十雉子男五十雉天子周城諸侯軒城何氏曰郈叔孫氏所食邑費季氏所食邑二大夫宰吏數叛患之以問孔子孔子曰陪臣執國命采長數叛者坐邑有城池之固家有甲兵之藏故也季氏説其言而堕之書者善定公任大聖復古制弱臣勢也不書去甲者舉堕城為重蘓氏曰此孔子之所以聖也孔子以羈旅之臣得政數月而能以治世之禮律衰世之臣堕名都出藏甲而三桓不疑其害己此有不言而信不怒而威者矣夫孔子之聖見於行事至此為無疑也秋大雩冬十月癸亥公㑹齊侯盟于黄齊公作晉十有一月丙寅朔日有食之公至自黄十有二月公圍成公至自圍成左傳將堕成公斂處父謂孟孫堕成齊人必至於北門城在魯北竟故且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克杜氏曰國内而書至者成彊若列國興動大衆故出入皆告于廟也朱子曰三家孟氏最弱季氏最强强者堕之而弱者反不可堕者强者不覺而弱者覺之故也又曰費郈之叛荐為叔季之害故叔季自欲堕之公斂在成方有功于孟氏則孟氏之不肯堕冝矣胡傳仲由為季氏宰孔子為魯司冦而不能堕成何也按是冬公圍成不克越明年孔子由大司冦攝相事然後誅少正卯與聞國政三月而商賈信於市男女别於途及齊人歸女樂孔子遂行然則圍成之時仲尼雖用事不能專魯國之政也使聖人得志行乎魯國以及朞月則不待兵革而自堕矣李氏亷曰胡氏引史記謂明年孔子由大司㓂攝相事至十四年然後行恐未然成不堕三家變矣聖人色斯舉矣安有明年攝相之事所以知其必無者考按經文明年無更敗起廢之事而築囿大蒐必非聖人在位仁山金氏曰按孔子生長於魯至是五十餘年天下之士多從之者魯之君臣豈有不知其賢者而未嘗能用孔子也定公之十年一旦起而用之莫有知其由者論語左氏皆不言其故獨孟子稱孔子于季桓子見行可之仕也而論語謂季桓子受女樂不朝孔子行是孔子此時之行藏係季桓子之用舍也何哉魯自三家四分公室而季氏取其二季氏專魯而魯公無民乆矣使魯之君而欲用孔子豈能遽奪季氏之權以畀孔子季氏亦豈肯遜已之權以與孔子哉自定公初年季平子卒其家臣陽虎始用事五年執桓子囚之而專魯政辱之於屏䧟之於齊師且盟且詛九年又將享桓子而殺之僅而獲免當是時非惟魯國不可為而季氏亦自不可支矣霜降水涸涯涘自見桓子于此亦謀所以為靖亂興衰之計故舉孔子於公而試用之已而政聲四達齊歸侵地於是攝行相事堕三都夫三都者三家强邑也當是時公山弗擾在費而郈侯犯之亂未乆也三家之有三都已非公室之便而三都之為三都至是亦非三家之便也故叔孫氏始堕郈繼而季桓子堕費已而孟孫氏不肯堕成圍之弗克其不肯堕成也公斂處父之言曰無成是無孟氏也然則無費是亦無季氏也而堕之當是時桓子之心未敢自計其私也夫三都已堕其二則成之不堕固亦未害然亦豈終不克堕哉夫子乆之必有處矣既而魯國方治而齊人歸女樂以沮之夫使孔子上下之交方固桓子之志未移則一女樂豈足以間之齊人素善謀功利者歸女樂而謂足以間魯之用孔子乎是殆必得其間矣季氏權臣也桓子舍己權以聽孔子而堕其名都以彊公室其中豈無介介者顧以衰敗之餘藉之振起為是降心以相從也今紀綱既定外侮既却魯既治矣桓子豈甘於終絀者縱桓子甘之季氏私人必有以為不利者故其信任之意必已漸衰特未敢漸舍孔子而孔子顧亦無隙可行爾故齊人歸女樂以促之夫齊何懼於我而歸女樂於事可疑於禮不正有國者固不可㗖此為隣國所覘也使桓子而猶為孔子之聽豈其受此受之已非矣而又君臣荒淫其中三日不朝此其心術蠧壞不復可與有為而其心固亦已無孔子矣故孔子去之此夫子出處之本末事情也十有三年春齊侯衛侯次于垂葭穀無衛侯字葭公作瑕左傳春齊侯衛侯次于垂葭實郥氏垂葭改名郥氏髙平鉅野西南有郥亭郥古閴反使師伐晉將濟河諸大夫皆曰不可邴意茲齊大夫曰可鋭師伐河内今河内汲縣傳張戀反必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内齊侯皆斂諸大夫之軒唯邴意兹乗軒以其言當夏築蛇淵囿大蒐于比蒲比音毗衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛左傳晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾邯鄲廣平縣也午晉邯鄲大夫十年趙鞅圍衛衛人懼貢五百家鞅置之邯鄲今欲徙置晉陽晉陽趙氏邑歸告其父兄父兄皆曰不可衛是以為邯鄲言衛以五百家在邯鄲常為是故與邯鄲親而置之晉陽絶衛之道也不如侵齊而謀之侵齊則齊當來報欲因懼齊而徙則衛與邯鄲好不絶乃如之而歸之于晉陽趙孟怒不察其謀謂午不用命召午而囚諸晉陽使告邯鄲人曰吾私有討於午也二三子唯所欲立遂殺午趙稷午子渉賔午家臣以邯鄲叛夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也壻父曰姻荀寅子娶吉射女而相與睦故不與圍邯鄲將作亂攻趙鞅董安于趙氏臣聞之告趙孟曰先偹諸趙孟曰晉國有命始禍者死為後可也安于曰與其害於民寧我獨死懼見攻必傷害民請以我說晋國若討可殺我以觧説趙孟不可秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之按邯鄲午無罪而趙鞅專殺不忌其心已無君矣荀寅范吉射不請于君而擅伐之信有罪也鞅不愬于君而遽興晋陽之甲抗晉人之圍非叛而何是時强臣皆强其私邑以耦國無事則專土以自豐有事則據邑以背叛鞅之欲歸衛貢五百家于晉陽也封殖私邑之計也而邯郸午慮絶衛親奉命不速鞅以午荀寅之甥荀寅范吉射之姻也疑午有貳心焉因是而遂殺之二家始禍葢亦有執言矣鞅苟有人臣之禮聽君大夫平其曲直可也而遽入私邑以叛罪豈容誅哉榖梁子曰以者不以者也叛直叛也此説是也左氏謂荀范不與圍邯郸將作亂又言董安于請先備諸而趙孟不肯始禍此皆趙氏之辭趙氏後有國而史家踵其緣餙之私言也不足信也吉射士鞅子冬晋荀寅士吉射入于朝歌以叛荀寅下公有吉字射食亦反又食夜反朝如字左傳范臯夷范氏側室子無寵於范吉射而欲為亂于范氏梁嬰父嬖於知文子荀躒文子欲以為卿韓簡子韓起孫不信與中行文子相惡文子荀寅魏襄子魏舒孫曼多亦與范昭子士吉射相惡故五子謀范臯夷梁嬰父知文子韓簡子魏㐮子將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晋侯曰君命大臣始禍者死載書在河為盟書沈之河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊髙彊子尾之子昭十年奔魯遂適晋也曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦知韓魏可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌杜氏曰朝歌屬汲郡汪氏曰朝歌衛之舊都衛徙楚丘朝歌後屬晋晋趙鞅歸于晋左傳韓魏以趙氏為請十二月辛未趙鞅入于絳盟于公宫公羊傳此叛也其言歸何以地正國也其以地正國奈何晋趙鞅取晋陽之甲以逐荀寅與士吉射荀寅與士吉射曷為者也君側之惡人也此逐君側之惡人曷為以叛言之無君命也胡傳書歸者易詞也韓魏為之請晉侯許之復而寅與士吉射去國出奔則無有難之者故其歸為易矣三子之叛其罪一也鞅以有援故得復寅吉射以無助故終叛春秋書鞅歸于晉非與之也以罪晋侯縱失有罪無政刑耳趙氏曰公羊云以地正國也據禮無專土藏兵之義今乃欲以私邑之强而正國則是末大而本小黜君而進臣也豈其然乎榖梁云貴其以地反也豈有身歸而地不歸乎按晋六卿二荀氏荀寅中行氏也荀躒知氏也士氏即范氏也荀士二家自此亡知氏春秋後亡故止韓趙魏三家分晉按趙鞅以地正國夫子正其叛臧武仲以防請後夫子正其要君誅不臣也公羊之言大失春秋之㫖矣叛臣專其私邑以地反亦非公家之有也何貴之有乎三家之簒自此始也桓四年天王使宰渠伯糾來聘桓殺君而立天討不加而反下聘也莊四年王使榮叔來錫桓公命終其世不誅又追命以寵之也晋曲沃以支子封是亦大夫也武公弑君簒晋而有之莊十六年王使虢公命曲沃伯以一軍為晋侯有魯桓之命而後有曲沃之命有曲沃之命而後有魏趙韓之命其所由來者漸矣周之東遷惟晉焉依王不恤同姓爵其賊臣始于命曲沃而文侯之晉亡終于命三大夫而文公之晉亦亡左氏終于智伯通鑑始于三晉朱子詩有馬公託始先幾之感其以是夫薛弑其君比比如字胡傳稱國以弑者當國大臣之罪也孫復以為舉國之衆皆可誅非矣三晋有國半天下若皆可誅刀鋸不亦濫乎頴川常秩曰孫復之於春秋動輒有罪葢商鞅之法耳棄灰於道者有誅歩過六尺者有罰其不即人心逺矣王回以是尚秩此善譏復者十有四年春魏公叔戍來奔衛趙陽出奔宋衛公穀作晋初衛公叔文子朝而請享靈公欲令公臨其家退見史鰌史魚而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣能執臣禮可以免富而能臣必免於難上下同之言尊卑皆然戍也驕文子之子其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戍必與焉及文子卒衛侯始惡於公叔戍以其富也公叔戍又將去夫人之黨靈公夫人南子黨宋朝之徒夫人愬之曰戍將為亂春衛侯逐公叔戍與其黨故趙陽奔宋戍來奔附左傳梁嬰父惡董安于謂知文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先發難也討於趙氏文子使告於趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晋國有命始禍者死二子既伏其罪矣敢以告趙孟患之安于曰我死而晉國寧趙氏定將焉用生人誰不死吾死莫矣乃縊而死趙孟尸諸市而告于知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟而後趙氏定祀安于於廟二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸二月公作三月孫公作子佗徒何反牂子郎反公作牄七良反左傳頓子牂欲事晉背楚而絶陳好二月楚滅頓何氏曰不别以歸何國者明楚陳以滅人為重頓子以不死位為重夏衛北宫結來奔左傳公叔戍之故也按衛靈沈耳于閨戍陽岐途而出結又來奔婦之口可以出走婦之哲可以傾城可無戒夫五月於越敗呉于檇李吳子光卒敗必邁反下並同檇音醉公作醉左傳吳伐越報五年越入吳越子句踐句踐越王允常子也初少康之庻子封于㑹稽後二十餘世至允常禦之陳于檇李句踐患吳之整也使死士再禽焉不動使罪人三行户郎反屬劒於頸而辭曰二君有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮越大夫以戈擊闔廬傷將指足大指取其一屨還卒於陘去檇李七里釋經所以不書滅夫差使人立於庭夫差闔廬嗣子苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越胡傳書敗者詐戰也杜氏曰檇李吳郡嘉興縣南醉李城通典蘇州春秋吳國之都也其南百四十里與越分界昔吳伐越越子禦之於檇李則今嘉興縣之地史記世家闔廬十九年伐越句踐迎擊之檇李賈逵注云檇李越地公㑹齊侯衛侯于牽牽公作堅又作掔齊魯為㑹止此左傳晋人圍朝歌公㑹齊侯衛侯於脾上梁之間即牽謀救范中行氏析成鮒小王桃甲二子晋大夫中行氏之黨率狄師以襲晋戰于絳中不克而還士鮒奔周小王桃甲入于朝歌杜氏曰魏郡黎陽縣東北有牽城公至自㑹秋齊侯宋公㑹于洮左傳范氏故也杜氏曰洮曹地天王使石尚來歸脤公羊傳石尚者何天子之士也天子上士以名氏通脤者何俎實也腥曰脤熟曰燔杜氏曰石氏尚名脤祭社之肉盛以蜃器以賜同姓諸侯親兄弟之國與之共福何氏曰禮諸侯朝天子助祭於宗廟然後受俎實時魯不助祭而歸之故書以譏之按周魯之交止此書天王止此天子之在者唯祭與號歸脤之後無書焉王室益微矣衛世子蒯聵出奔宋蒯苦怪反聵五怪反左傳衛侯為夫人南子召宋朝南子宋女也朝宋公子舊通于南子靈公召之非在此年傳為宋人歌而發端耳㑹于洮太子蒯聵獻盂邑名于齊過宋野就㑹獻之故自衛行而過宋野野人歌之曰既定爾婁豬盍歸吾艾豭婁豬求子豬以喻南子艾豭喻宋朝艾老也太子羞之謂戲陽速太子家臣曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余公執其手以登臺太子奔宋按是時南子行不正而疑人之將圖已也則恒先事而去之公叔戍惡宋朝之徒則誣之曰戍將為亂太子還自宋而朝少君見其顔色則誣之曰蒯聵將殺予皆無事狀而太子尤寃戲陽速之事葢以疑為實而增加之而傳者又信之也衛公孟彄出奔鄭左傳盡逐其黨故公孟彄出奔鄭自鄭奔齊太子告人曰戲陽速禍余戲陽速告人曰太子則禍余太子無道使余殺其母余不許將戕於余若殺夫人將以余説余是故許而弗為以紓余死諺曰民保于信吾以信義也使義可信不必信言按傳曰男女有别夫婦有義而後父子親父子親而後君臣正豈不信哉衛靈公以寵南子恣其所欲為之召宋朝而蒯聵至于欲殺夫人弗克而出奔身死而以孫為嗣致據國拒父沿及再世皆父不父而子不子則以南子故也漢武帝溺於聲色游燕後庭太子希得進見而巫蠱事起京師流血子父皆敗唐明皇以幸武恵妃而太子瑛鄂王瑶光王琚皆以母失職怨望而同日見殺然則男女無别夫婦無義而父子不親之為徴也豈不明哉豈不明哉公叔戍太子蒯聵皆以欲正南子之亂而不知其道是以及難易曰幹母之蠱不可貞以剛承柔而治其壞當巽以入之使之身正事治而已若伸已剛陽之道遽然矯拂則傷恩所害大矣是時靈公陽位而隂才南子隂尊而不正以易言之固幹母之蠱之時也公叔戍欲去夫人之黨疾惡之正也而不免為犯上世子蒯聵之命戲陽速羞惡之心也而不免為作亂故曰為人君父而不通春秋之義者必蒙首惡之名為人臣子而不通春秋之義者必陷簒弑之罪君人者治教所出治莫先于刑家教莫先于太子許世子止不知嘗藥累及許君父子無相去之義况世子乎書曰衛世子蒯聵出奔宋其以首惡罪靈公而以亂易亂為蒯聵之不子而不可以復世其國也豈不深切著明矣夫使戲陽速之事果行太子其得全乎將以速説其可免乎蒯聵雖不善謀不至是也太子既無事狀而見逐又盡逐其黨其名曰將圖已也則不在一戲陽速明矣三顧不進疑之而遂實之益可見矣葢夫人之忌太子而欲去之乆矣此等特以加之罪為之辭耳宋公之弟辰自蕭來奔大蒐于比蒲比音毗書蒐止此何氏曰書大蒐譏亟也大蒐之禮五年一為若數於此則書而譏亟若緩於此則書而譏罕張氏曰蒐而邾子來㑹則公親蒐矣而不書公以軍政不屬公也王伯厚曰三書蒐于昭公之時兵權在大夫再書蒐于定公之時兵權在陪臣邾子來㑹公杜氏曰㑹公于比蒲而不用朝禮故曰㑹何氏曰書者非邾子㑹人于都如入人都當修朝禮言公者不受于廟曲禮云諸侯相見于隙地曰㑹今乃㑹人于都故書而非之諸侯相過至竟必假途入都必朝隠十一年春滕侯薛侯來朝不言朝公者禮朝受之於大廟孝子謙不敢以己當之歸美于先君且重賔也莊二十三年夏蕭叔朝公譏受朝於外也城莒父及霄父音甫杜氏曰公叛晉助范氏故懼而城二邑此年無冬史闕文附左傳冬十二月晉人敗范中行氏之師于潞獲籍秦髙彊又敗鄭師及范氏之師于百泉十有五年春王正月邾子來朝左傳春邾隠公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯玉朝者之䞇子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能乆髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎鼷䑕食郊牛牛死改卜牛杜氏曰不言所食處舉死重也公羊云曷為不言其所食漫也謂食非一處以致死今杜不用改卜禮也趙氏曰常怪鼷䑕食郊牛致死上元二年因避地㑹稽時牛災小䑕噬牛纔傷皮膚無不死者二月辛丑楚子滅胡以胡子豹歸左傳吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡按召陵之㑹頓胡與焉去年滅頓今年滅胡討從晉也左氏之言未必實夏五月辛亥郊汪氏曰不書卜郊徐彦䟽云言郊則知卜吉可知夫正月改卜牛若在滌三月則當以四月郊今郊於五月蓋卜以四月郊而不吉又卜五月必龜從而後郊也故但書改卜牛不書卜郊經於卜郊不從則書之以譏凟卜卜而從則但書郊之過時以譏其慢耳壬申公薨于髙寢左傳夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也榖梁傳髙寢非正也鄭罕達帥師伐宋罕公作軒左傳鄭罕達敗宋師于老丘宋地杜氏曰宋公子地奔鄭鄭為之伐宋欲取地以處之齊侯衛侯次于渠蒢渠蒢公作蘧蒢蒢直居反左傳謀救宋也欲救宋則失乆好之鄭欲弗救則失新附之宋故為是觀望之役按五氏垂葭之次皆為伐晋此次疑亦為謀晋而出故明年伐晋邾子來奔喪公羊傳奔喪非禮也秋七月壬申姒氏卒姒穀作弋下同左傳不稱夫人不赴且不祔也公羊𫝊姒氏者何哀公之母也不稱夫人哀未君也榖梁傳弋氏卒妾辭也孔氏曰夫人初薨赴於同盟之國其辭當云夫人某氏薨是赴則成夫人也禮適妻祔於適祖姑妾祔於妾祖姑若得祔祖姑則亦成夫人矣此赴同祔姑皆是夫人之禮二者皆闕故不曰夫人薨劉氏曰左氏不稱夫人之説非也凡夫人始卒則史書之書之固云夫人矣不待赴祔而正其夫人也姒氏要為妾母哀未成君故未備夫人之禮耳僖宣昭即位乆故成風敬嬴齊歸皆以妾母尊為夫人哀初立定公喪在殯故定姒卒不稱夫人葬不稱小君未備尊崇之禮也八月庚辰朔日有食之九月滕子來㑹葬杜氏曰諸侯㑹葬非禮也丁巳葬我君定公雨不克葬戊午日下昃乃克葬昃穀作稷左傳葬定公雨不克襄成也事禮也雨而㐮事若汲汲於欲葬榖梁傳葬既有日不為雨止禮也雨不克葬喪不以制也乃急辭也不足乎日之辭也趙氏曰按凡稱乃緩詞不得云急詳經意譏臣子緩慢耳宣八年雨不克葬日中葬今日下昃乃葬則僅能葬而失虞之時也禮以葬日虞辛巳葬定姒左傳葬定姒不稱小君不成喪也杜氏曰公未葬而夫人薨煩於喪禮不赴不祔故不稱小君臣子怠慢也反哭於寢故書葬孔氏曰哀十二年孟子卒傳曰不反哭故不言葬小君是由反哭於寢故書葬也公羊傳定姒何以書葬未踰年之君也有子則廟廟則書葬胡傳公羊子曰有子則廟廟則書葬曾子問並有喪則如之何子曰葬先輕而後重其奠也其虞也先重而後輕同時有父母之喪或祖父母之喪葬則先母而後父奠則先父而後母葬是奪情之事故先輕奠是奉養之事故先重虞亦奠之類也據此則葬當先定姒而乃後之當時之失按左氏云不稱小君不成喪也非也若姒氏實夫人固當書夫人姒氏薨而後葬不稱小君明不成喪以責臣子可也今曰姒氏卒則非夫人也非夫人何足以見不成喪乎諸家皆以哀未踰年之君故定姒止書卒葬而不書夫人以薨小君以葬此皆因諸侯僣禮而為之辭其實子雖踰年成君亦不得夫人其妾母也自成風以來妾母皆僣用夫人之禮故春秋亦從而書夫人薨書葬小君以著其非禮姒氏哀公之母定公之妾已君未君皆不得稱夫人卒曰姒氏卒葬曰葬定姒皆正名也非以未踰年不稱夫人小君而已踰年則可稱也冬城漆左傳書不時告也杜氏曰實以秋城冬乃告廟魯知其不時故緩告書以示譏汪氏曰他國有事或過時而告於魯豈有魯國城邑過時而告于廟可以揜其實乎此非人情也按漆本邾邑庶其以來奔者也城之葢疑其貳於邾也昭公之世政在季氏待邾無道亟受其叛人與邑自定公為拔之盟邾好復修終其世無犯焉邾人德之故來㑹來朝又奔其喪禮雖過而情則真也大之比小末世所難定公行之而邾子奔喪滕侯㑹葬推此以往為善而人不悦附者未之有也定公既薨三桓復啓釁此年兩大喪之後亟城漆元年伐邾二年取其田七年俘其君卒致吳人來伐齊取讙闡利未得而害隨之謀國如此三桓之罪哀公之惛也魯欲不削得乎春秋輯傳卷十二

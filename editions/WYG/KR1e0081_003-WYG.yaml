body:
  text: 春秋輯傳卷一明王樵輯杜氏曰春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以繫逺近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也楊氏勛曰春秋者史官編年記事年有四時之序春先於夏秋先於冬故舉春秋二字以包之賈逵云取法隂陽之中知不然者以孝經云春秋祭祀以時思之豈是取法隂陽之中故知非也玉藻云動則左史書之言則右史書之左史所書春秋是也右史所書尚書是也則春秋立名必是仲尼以往三代以來不審誰立之耳韓宣子適魯見易象與魯春秋曰周禮盡在魯矣韓子所見葢周之舊典禮經也周衰官失其守仲尼因魯史䇿書成文考其真偽而志其典禮上以遵周公之遺制下以明將來之法隠公左傳惠公元妃孟子孟子卒繼室以聲子生隠公聲諡也益孟子之姪娣也諸侯始娶則同姓之國以姪娣媵元妃死則次妃攝治内事猶不得稱夫人故謂之繼室宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我生桓公而惠公薨言歸魯而生男惠公不以桓生之年薨是以隠公立而奉之程子曰夫子之道既不行於天下於是因魯春秋立百王之大法平王東遷在位五十一年卒不能興復先王之業王道絶矣孟子曰王者之迹熄而詩亡詩亡然後春秋作適當隠公之初故始於隠公胡傳孟子曰王者之迹熄而詩亡詩亡然後春秋作今按邶鄘而下多春秋時詩也而謂詩亡然後春秋作何也自黍離降為國風天下無復有雅而王者之詩亡矣春秋作於隠公適當雅亡之後又按小雅正月刺幽王詩也而曰赫赫宗周褒姒烕胡悅反之逮魯孝公之末幽王已為犬戎所斃惠公初年周既東矣春秋不作於孝公惠公者東遷之始流風遺俗猶有存者鄭武公入為司徒善於其職則猶用賢也晉侯捍王于艱錫之秬鬯則猶有誥命也王曰其歸視爾師則諸侯猶來朝也義和之薨諡為文侯則列國猶有請也及平王在位日乆不能自强於政治棄其九族葛藟有終逺兄弟之刺不撫其民周人有束薪蒲楚之譏至其晩年失道滋甚乃以天王之尊下賵諸侯之妾於是三綱淪九法斁人望絶矣夫婦人倫之本朝廷風化之原平王子母適冢正后親遭褒姒之難廢黜播遷而宗國顛覆亦可省矣又不是懲而賵人寵妾是拔本塞原自滅之也春秋於此葢有不得已焉耳托始乎隠不亦深切著明也哉元年春王正月公羊傳元年者何君之始年也何言乎王正月大一統也按何休謂惟王者然後改元若諸侯不當改元則魯史當書四十九年正月恐無此理葢列國奉王正朔至于紀事必自用其年耳杜氏曰因魯史作春秋故以魯紀年凡人君即位欲其體元以居正故不言一年一月左傳春王周正月言周以别夏殷穀梁傳雖無事必舉正月謹始也胡傳按左氏曰王周正月周人以建子為嵗首則冬十有一月是也前乎周者以丑為正其書始即位曰惟元祀十有二月朔則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也建子非春亦明矣乃以夏時冠周月何哉聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之驗也或曰非天子不議禮仲尼有聖徳無其位而改正朔可乎曰有是言也不曰春秋天子之事乎以夏時冠周月垂法後世以周正紀事示無其位不敢自專也其旨微矣朱子曰春秋書正據伊川則只是周正建子之月但非春而書春則夫子有行夏時之意而假天時以立義耳文定引商書十有二月漢史冬十月為證以明周不改月此固然矣然以孟子考之則七八月乃建午建未之月暑月苗長之時而十一月十二月乃建戌建亥之月將寒成梁之候又似併改月數此又何耶或是當時二者並行惟人所用但春秋既是國史則必用時王之正其比商書不同者葢後世之深文而秦漢直稱十月者則其制度之濶略耳又曰孟子所謂七八月乃今五六月所謂十一月十二月乃今之九月十月是周人固已改月矣但天時則不可改故書云秋大熟未穫此即止是今時之秋葢非酉戌之月則未有以見夫嵗之大熟而未穫也以此考之今春秋月數乃魯史之舊文而四時之序則孔子之微意伊川所謂假天時以立義者正謂此也若謂周人初不改月則未有明據故文定只以商秦二事為證以彼之博洽精勤所取猶止於此則無他可考必矣今乃欲以十月隕霜之異證之恐未足以為不改月之驗也葢隕霜在今之十月則不足怪在周之十月則為異矣又曰詩中月數又似不曾改如四月惟夏六月徂暑之類故熹向者疑其並行也又曰某親見文定家說文定春秋說夫子以夏時冠周月以周正紀事謂如公即位依舊是十一月只是孔子改作春正月某便不敢信恁地時二百四十二年夫子只證得箇行夏之時四箇字據今周禮有正月有正歲則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅詩七月朱子傳曰七月斗建申之月夏之七月也一之日謂斗建子一陽之月二之日謂斗建丑二陽之月也葢周之先公已用此以紀候故周有天下遂以為一代之正朔也逸周書周月篇曰凡四時成嵗有春夏秋冬各有孟仲季以十二月中氣著時應閏無中氣斗指兩辰之間萬物春生夏長秋收冬藏天地之正四時之極不易之道夏數得天百王所同其在商湯用師于夏除民之災順天革命改正朔變服號一文一質示不相沿以建丑為正易民之眡亦越我周王致伐于商改正異械以垂三統至於敬授民時巡狩烝享猶自夏焉愚按史以傳信時必與月合月必與所書之事合若以夏時冠周月則時與月下所書之事常差兩月朱子謂以書考之凡書月皆不著時疑古史記事例如此至孔子作春秋然後以天時加王月以明上奉天時下正王朔之義而加春于建子之月則行夏時之意亦在其中然魯史謂之春秋似元有此字吾謂夫子所因者魯史魯史所用者周正朔此處夫子無容有所增損也然則子月可為春乎曰子月為一歲之始猶子時為一日之始烏在子月不可為春乎經傳所記有例差兩月者是經用周正而傳取國史有自用夏正者失于更改也漢書陳寵傳曰冬至之節陽氣始萌天以為正周以為春左傳不書即位攝也公羊傳公何以不言即位公將平國而反之桓曷為反之桓桓幼隠長其為尊卑也微謂母俱妾國人莫知言惠公不早分别隠長又賢諸大夫扳隠而立之榖梁傳公何以不言即位將以讓桓也讓桓正乎曰不正春秋貴義而不貴惠信音申道而不信邪孝子揚父之美不揚父之惡先君之欲與桓非正也邪也雖然既勝其邪心以與隠矣已探先君之邪志而遂以與桓則是成父之惡也兄弟大倫也為子受之父為諸侯受之君已廢天倫而忘君父以行小惠曰小道也若隠者可謂輕千乗之國蹈道則未也程子曰元年隠公之始年春天時正月王正書春王正月示人君當上奉天時下承王正明此義則知王與天同大人道立矣周正月非春也假天時以立義耳平王之時王道絶矣春秋假周以正王法隠不書即位明大法於始也諸侯之立必由王命隠公自立故不書即位不與其為君也法既立矣諸公或書或不書義各不同既不受命於天子以先君之命而繼世者則正其始文成襄昭哀是也繼世者既非王命又非先君之命不書即位不正其始也莊閔僖是也桓宣定之書即位桓弑君而立宣受弑賊之立定為逐君者所立皆無王無君何命之受故書其自即位也定之比宣則又有間矣胡傳國君逾年改元必行告廟之禮國史主記時政必書即位之事而隠公闕焉是仲尼削之也古者諸侯繼世襲封則内必有所承爵位土田受之天子則上必有所禀内不承國於先君上不禀命於天子諸大夫扳已以立而遂立焉是與争亂造端而簒弑所由起也春秋首絀隠公以明大法父子君臣之倫正矣仁山金氏曰惠公妻其妾嫡其庶王法所當正也平王不惟不之正而反成之如歸賵等是也不足以懐魯而祗以壊王法成魯禍王室其有不衰乎然則王之正之將如何曰隠公上不敢違其父下不敢廢其弟而自以為攝天子於是錫命焉則是受天子之命為諸侯也隠定而桓之逆謀弭矣此所以正王法而懐諸侯也三月公及邾儀父盟于蔑父音甫凡人名地名放此邾公羊傳作邾婁與禮記檀弓同葢齊人語也蔑莫結反公榖作昧此私盟之始三月斗建寅之月公隠公也魯侯爵而稱公者臣子之辭禮五等之君國人稱之曰公見儀禮魯史所書聖人因而不革也左傳邾子克也未王命故不書爵曰儀父貴之也公攝位而欲求好於邾故為蔑之盟程子曰盟誓以結信出於人情先王所不禁也後世屢盟而不信則罪也諸侯交相盟誓亂世之事也凡盟内為主稱及外為主稱㑹在魯地雖外為主亦稱及彼來而我及之也兩國以上則稱㑹彼盟而往㑹之也邾附庸國邾子克字儀父附庸之君稱字同王臣也夷狄則稱名降中國也杜氏曰邾今魯國鄒縣也蔑姑蔑魯地魯國卞縣南有姑城趙氏曰盟者刑牲而徴嚴於神明者也王綱壞則諸侯恣而仇黨行故干戈以敵仇盟誓以固黨天下行之遂為常焉若王政舉則諸侯莫敢相害盟何為焉賢君立則信著而義達盟可息焉觀春秋之盟有以見王政不行而天下無賢侯也或曰周官司宼有司盟掌盟載之法又禮記云殷人作誓而人始畔周人作㑹而人始疑如此則何獨於衰世哉答曰周官之偽予已論之矣趙子著五經辯惑說周官是後人附益也聖人建邦創義豈先立此官禮記所言亦據二代之衰時耳按趙氏又謂三傳貴之褒之之說為非謂彼葢見莊十六年邾子克卒以為即儀父以同盟而書卒不知儀父非克也儀父亦邾君之名與季孫行父晉荀林父父字並同縁其未得王命故其卒不見於經至莊十六年名克者乃其嗣君自以王命為子而書卒耳附庸之君非有勤王之善縱能自通於大國有何嘉而字以褒之乎若儀父實賢桓十五年與牟人葛人來朝一例稱人何哉理又可見也今按此說有理宜並存之八年榖梁傳曰盟詛不及三王交質子不及二伯趙子善之謂起例宜於事首移附於此夏五月鄭伯克段于鄢鄢音偃左傳初鄭武公娶于申曰武姜申國今南陽定縣生莊公及共叔段段出奔共故曰共叔莊公寤生驚姜氏遂惡之寤寐而莊公已生故驚而惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉虢國今榮陽縣他邑唯命請京鄭邑今榮陽京縣使居之謂之京城大叔祭仲鄭大夫曰都城過百雉國之害也方丈曰堵三堵曰雉一雉之牆長三大高一丈侯伯之城方五里徑三百雉故其大都不得過百雉先王之制大都不過參國之一三分國城之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙鄭邊邑貳兩屬於已公子吕鄭大夫曰國不堪貳君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收貳以為已邑至于廩延言轉侵多也廪延鄭邑陳留酸棗縣北有延津子封公子吕也曰可矣厚謂土地廣大將得衆公曰不義不義於君不暱不親於兄厚將崩大叔完完城郭聚聚人民繕甲兵具卒乗步曰卒車曰乗將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乗以伐京古者兵車一乗甲士三人步卒七十二人京叛大叔段段入于鄢公伐諸鄢五月辛丑大叔出奔共共國今汲郡共縣書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也段實出奔而以克為文明鄭伯志在於殺難言其奔穀梁傳段弟也而弗謂弟公子也而弗謂公子賤段而甚鄭伯也何甚乎鄭伯甚鄭伯之處心積慮成于殺也于鄢逺也猶曰取之其母之懐中而殺之云爾甚之也然則為鄭伯者宜奈何緩追逸賊親親之道也胡傳姜氏當武公存之時常欲立段矣及公既没姜以國君嫡母主乎内段以寵弟多才居乎外國人又悦而歸之恐其終將軋已為後患也故授之大邑而不為之所縱使失道以至於亂然後以叛逆討之則國人不敢從姜氏不敢主而大叔屬籍當絶不可復居父母之邦此鄭伯之志也王政以善養人推其所為使百姓興於仁而不偷也況以惡養天倫使陷於罪因以翦之乎春秋推見至隠首誅其意以正人心示天下為公不可以私亂也垂訓之義大矣趙氏曰鄢當作鄔鄭地也在緱氏縣西南至十一年乃屬周左氏曰王取鄔劉蒍邗之田于鄭是也傳寫誤為鄢字杜注云今頴川鄢陵誤甚矣按從京至鄔非逺又是鄭地段以有兵衆故曰克若逺走至鄢陵已出境即無復兵衆何得云克又傳曰自鄢出奔共即自鄔過河向共城為便路若已南行至鄢陵即不當奔共也秋七月天王使宰咺來歸惠公仲子之賵咺吁阮反賵芳鳳反此王室下交諸侯之始左傳天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名惠公葬在春秋前故曰緩子氏仲子也薨不知在何年左氏以二年書薨者即仲子故此云未薨天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至此言赴弔各以逺近為差因為葬節耳贈死不及尸尸未葬之通稱弔生不及哀諸侯以上既𦵏則縗麻除無哭位諒闇終䘮豫凶事仲子在而來賵非禮也啖氏曰諸侯母在天子寧有歸其賵乎不辨菽麥者猶不當耳仁山金氏曰按左氏傳於隠公之篇多誤於莊公之篇多缺此考春秋者所當知也隠傳之誤如仲子之賵子氏之薨尹氏之卒是也左氏既誤以隠妻子氏之薨為仲子故此以仲子為未薨而王賵之其曰不及尸不及哀謂賵惠公之緩曰豫凶事謂賵仲子之豫也文之四年十有一月成風薨五年天王使榮叔歸含且賵九年秦人來歸僖公成風之賵則歸賵當是惠公仲子俱沒之後其沒在春秋之前左氏葢誤解矣陳氏曰緩且子氏未薨以下疑後人增益之雜記有大夫士訃于他國之君之禮則不但同位外姻也且文九年秦人歸成風之禭傳曰禮也諸侯相弔賀雖不當事苟有禮焉書也以無忘舊好則此以贈不及尸弔不及哀為非禮者又却自相悖矣公羊傳宰者何官也咺者何名也惠公者何隠之考也仲子者何桓之母也何以不稱夫人桓未君也賵者何䘮事有贈贈者葢以馬以乗馬束帛車馬曰賵貨財曰賻衣被曰襚桓未君則諸侯曷為來賵之隠為桓立故以桓母之䘮告于諸侯其言來何不及事也其言惠公仲子何兼之兼之非禮也當各遣一使異尊卑也二啖氏曰若言惠公仲子是二人則僖公成風亦是人若是二人則成風是僖公之母而春秋之文以子先母乎故榖梁之說是士趙氏曰宰官咺名此止是名氏耳如宰予之類王來魯例書名氏石尚是也按此亦一說何以不言及仲子仲子微也不言及仲子以仲子微而不得比夫人也信若此言則何以言母以子貴乎公羊於是乎自相矛盾矣朱子曰惠公仲子恐是惠公之妾僖公成風却是僖公之母不可一例看不必如孫明復之說榖梁傳母以子氏妾不得體君故以子為氏平王新有幽王之亂遷于成周欲崇禮諸侯仲子早卒無由追賵故因惠公之䘮而來賵之仲子者何惠公之母孝公之妾也啖趙主此說禮賵人之母則可賵人之妾則不可君子以其可辭受之其志不及事也趙氏曰按春秋凡此例常事皆不書若王當賵諸侯妾母則是常事何須書之且以此為得禮又何以正陵替乎經文縁是惠公之母故賵之自然須言惠公仲子而遂云以其可辭受之乃是天子之非禮以為合禮可乎賵者何也乗焉曰賵衣衾曰襚貝玉曰含錢財曰賻程子曰王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也春秋因王命以正王法稱天王以奉天命夫婦人倫之本最當先正春秋之時嫡妾僣亂聖人尤謹其名分男女之配終身不變者也故無再娶之禮大夫而下内無主則家道不立故不得已有再娶之禮天子諸侯内職具備后夫人已可以攝治無再娶之禮春秋之始尚有疑焉故仲子羽數特異僖公而後無復辨矣春秋因其竊號而書之以志僣亂仲子繫惠公而言故正其名不曰夫人而曰惠公仲子謂惠公之仲子妾稱也以夫人禮賵人之妾是亂人倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王王臣雖微不名況於宰乎胡傳上古應時稱號故其名三變春秋創制立名繫王於天為萬世法冢宰稱宰咺者名也王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之何也仲子惠公之妾耳以天王之尊下賵諸侯之妾是加冠於屨人道之大經拂矣天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則專掌其事而承命以賵諸侯之妾是壊法亂紀自王朝始也春秋重嫡妾之分故特貶而書名以見宰之非宰也或曰僖公之母成風亦莊公妾也其卒也王使榮叔歸含且賵其葬也王使召伯來㑹葬下賵諸侯之妾而名其宰榮召何以書字而不名也於前賵仲子則名冢宰於後葬成風王不稱天其法嚴矣汪氏克寛曰說公羊者以宰為士或引小宰宰夫為證然周官三百六十他官未嘗見經何獨於小宰而書之乎或以宰為氏引宰予為證然宰周公宰梁伯糾豈可亦以為氏乎唯劉氏意林謂春秋於大夫莫書其官至冢宰則書之此見任之最重宰者尊稱非中士所當冒最得經意且左傳僖九年稱宰孔使經不書宰周公而書其名則論者亦疑為士與氏矣愚按惠公元妃孟子既卒約昏於宋當是時寵愛之私未形也而其名號已講矣實以夫人禮娶也啖子謂仲子本以夫人禮娶又隠公以桓公為先君之嗣故行夫人䘮禮書薨自成風之後妾母皆僣用夫人禮故亦書薨著其非禮也凡夫人葬皆書仲子不書葬者以諸侯不二嫡雖用夫人禮猶不列於廟也别築宫五年考仲子之宫是也自文公葬成風之後乃有二夫人祔廟非禮也斯言得之矣抑先正惡惠公有昧禮再娶之失遂加以妾為妻之罪故於隠桓嫡庶之分辯雖多而未明於夫人子氏之書論雖多而不定也夫諸侯無再娶之禮而惠公再娶焉惠公之失禮也仲子固為夫人也自周衰典禮不明當時上下葢安之而莫察其非矣故隠公則終身自居於庶孽而以桓公為當立使其知仲子聲子皆妾也則隠與桓皆庶子也隠長而桓少安肯以其國讓桓哉其所以舉而讓桓者必其安於嫡庶之分而不敢亂也安於嫡庶之分者以當時諸侯不再娶之禮未之講也夫禮一差名一不正而其禍至於篡弑所由興可不謹哉春秋於前書天王歸惠公仲子之賵於後書考仲子之宫存其實以見夫失之不可掩正其名以見夫禮之不可亂豈不深切著明也哉朱子曰春秋一發首不書即位即君臣之事也書仲子嫡妾之分即夫婦之事也書及制盟朋友之事也書鄭伯克段即兄弟之事也一開卷人倫備矣九月及宋人盟于宿左傳惠公之季年敗宋師于黄宋邑陳留外黄縣東有黄城公立而求成焉九月及宋人盟于宿始通也公羊傳孰及之内之微者也榖梁傳及者何内卑者也宋人外卑者也趙氏曰脩二國之好而為盟誓非君則卿何得使微者先儒云微者不命之卿也按例外之不命卿來魯皆書名但不言氏耳且前後盟而不言内盟者凡七推尋事迹皆是公自盟義見篡例盟篇義例昭然不可或稱是公或稱是微者宿盟云是微幽盟云是公皆舛駁者也胡傳内稱及外稱人皆微者其地以國宿亦與焉今按此經三家說不同恐趙說是杜氏曰宿小國東平無鹽縣也凡盟以國地者國主亦與盟例在僖十九年宋今梁國睢陽縣冬十有二月祭伯來祭側界反之此王臣私交始左傳非王命也杜氏曰祭國伯爵也榖梁傳來者來朝也其弗謂朝何也寰内諸侯非有天子之命不得出㑹諸侯不正其外交故弗與朝也聘弓鏃矢不出境埸束脩之肉不行境中有至尊者不貳之也程子曰祭伯畿内諸侯為王卿士來朝魯不言朝不與其朝也當時諸侯不脩朝覲之禮失人臣之義王所當治也祭伯為王臣不能輔王正典刑而反與之交又來朝之故不與其朝以明其罪先儒有内臣無外交之說甚非也若天下有道諸侯順軌豈有内外之限其相交好乃常禮也然委官守而逺相朝無是道也周禮所謂世相朝謂鄰國耳啖氏曰榖梁曰寰内諸侯也按寰内諸侯例稱子若以伯為爵則毛伯召伯榮叔祭叔復是何爵乎是知天子大夫例書字按啖說是禮記郊特牲為人臣者無外交不敢貳君也檀弓古之大夫束脩之問不出境公子益師卒榖梁傳大夫日卒正也不日卒惡也程子曰諸侯之卿必受命於天子當時不復請命故諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也惟宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之義或日或不日因舊史也古史記事簡略日月或不備春秋因舊史有可損而不能益也東萊吕氏曰益師之卒春秋没其爵葢以命不出於天子雖有爵猶無爵也於此可以見王命之重焉内大夫之卒益師首以公子書所以譏魯之用人不以賢而以親視天職為私故特書公子以著其罪於此可以見天職之公焉君之卿佐是謂股肱股肱或虧何痛如之故小斂大斂君皆親臨恩厚惻怛匪自外至故春秋於其卒必謹而書之於此可以見春秋之義焉卒者人之終也君子保其身以沒為終其事也卿大夫佐君以任一國之重其事又何如也回省平生無一毫之可悔於心無一念一事之不盡於君而後可無憾以沒君子於斯寧無惕然而懼乎故於此可以見死生之際焉學者不是之求方且尺較寸量於日月𤨏碎之例亦獨何哉二年春公㑹戎于潛此書㑹之始始亦㑹戎狄之左傳脩惠公之好也戎請盟公辭杜氏曰戎而書㑹者順其俗以為禮皆為居中國若戎子駒支者陳留濟陽縣東南有戎城潜魯地穀梁傳㑹者外為主焉爾智者慮義者行仁者守有此三者然後可以出㑹㑹戎危公也何氏曰王者不治夷狄録戎者來者勿拒去者勿追程子曰周室既衰蠻夷猾夏有散居中國者方伯大國明大義而攘斥之義也其餘列國慎固封守可也若與之和好以免侵暴非所謂戎狄是膺所以容其亂華也故春秋華夷之辨尤謹居其地而親中國與盟㑹者則與之公之㑹戎非義也胡傳戎狄舉號外之也啖氏曰凡戎狄不書爵號君臣同詞内中國而外四夷使之各安其所也正朔不加奚㑹同之有書㑹戎譏之也王伯厚曰平王之遷戎為之也襄王之出狄為之也春秋之筆戎為先狄次之其末也淮夷列諸侯之㑹天下之變極矣夏五月莒人入向向舒亮反始此入國之公羊傳入者何得而不居也無駭帥師入極駭榖作侅後同帥朔律反後倣此此大夫專兵之始胡傳左氏曰莒子娶于向向姜不安莒而歸莒人入向以姜氏還此所謂案也春秋書曰莒人入向此所謂斷也以事言之入者造其國都以義言之入者逆而不順莒稱人小國也孫氏曰春秋小國卿大夫皆畧稱人陳氏曰入君大夫皆稱人君將書君自楚莊入陳始大夫將書大夫自郤缺入蔡始惟内大夫則書之按莒向皆小國宣四年公伐莒取向則向後為莒所并可知字陸氏曰經中一字徧施於諸例而義不同者唯人耳國而稱人則衆詞也師稱人則寡詞也名爵不貴而稱人則微詞也黜其名爵而稱人則貶詞也無駭不氏未賜族也張洽曰無駭挾皆内大夫之未賜族者左氏稱司空無駭經不書官夫子削之也其書帥師用大衆也非王命而入人國邑逞其私意見諸侯之不臣也擅興而征討不加焉見天王之不君也據事直書義自見矣杜氏曰向小國也譙國龍亢縣東南有向城莒國今城陽莒縣極附庸小國也賜族例在八年按向有二莒人入向與伐莒取向乃近莒之邑按一統志今莒州南七十三里有向城是也譙國龍亢之向城在今鳳陽府懐逺縣西北八十五里去莒為逺襄十四年㑹吳于向是此向也程子曰天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐春秋直書其事而責常在被侵伐者葢彼加兵于已則當引咎或自辯喻之以禮義不得免焉則固其封疆告于天子方伯若忿而與戰則以與戰者為主處已絶亂之道也秋八月庚辰公及戎盟于唐此盟外域之始左傳戎請盟秋盟于唐復脩戎好也胡傳按費誓稱淮夷徐戎此葢徐州之戎乆居中國在魯之東郊者也韓愈氏言春秋謹嚴君子以為深得其旨所謂謹嚴者何謹乎莫謹於中外之辨矣中國而無禮則外之外域内侵則膺之此春秋之㫖也而與戎㰱血以盟非義矣是故成於日者必以事繫日而前此蔑不日宿不日後此密不日石門不日獨盟于唐書日者謹之也張氏曰盟必詳其月日以其相與約信或尋或寒皆考于此前此蔑宿二盟不日者乆逺失之耳杜氏曰高平方與縣北有武唐亭八月無庚辰庚辰七月九日也日月必有誤孔氏曰杜勘檢經傳上下月日制為長厯此年八月壬寅朔其月三日甲辰十五日丙辰二十七日戊辰其月無庚辰也七月壬申朔則九日有庚辰杜觀上下若月不容誤則指言日誤若日不容誤則指言月誤此則上有秋下有九月則日月俱有誤故云日月必有誤也九月紀履緰來逆女冬十月伯姬歸于紀緰音須履緰左氏作裂緰左傳卿為君逆也公羊傳紀履緰者何紀大夫也何以不稱使昏禮不稱主人主人謂壻也為有㢘恥之心不欲自言娶婦然則曷稱稱諸父兄師友宋公使公孫壽來納娶則其稱主人何辭窮也辭窮者何無母也宋公無母莫使命之辭窮故自命之自命之則不得不稱使然則紀有母乎曰有有則何以不稱母母不通也婦人無外事母命不得通于隣國外逆女不書此何以書譏何譏爾譏始不親迎也始不親迎昉於此乎前此矣前此則曷為始乎此春秋之始也女在其國稱女在塗稱婦入國稱夫人伯姬者何内女也婦人謂嫁曰歸程子曰非命卿皆書名以君命來逆夫人也在魯故稱女内女嫁為諸侯夫人則書逆書歸明重事也來逆非卿則書歸而已見其禮之薄也先儒皆謂諸侯當親迎親迎者迎于其所舘故有親御授綏之禮豈有委宗廟社稷逺適他國以逆婦者乎非惟諸侯卿大夫而下皆然詩稱文王親迎于渭未嘗出疆也送之者雖公子公孫非卿則不書愚按内女歸于諸侯則尊同尊同則志此與其他昏禮以常事不書書則以著禮之失者固不同也親迎之禮程子盡之渭在周旁近地也而可以親迎韓因入覲便道也而可以親迎故文王得迎于渭韓侯得迎于蹶之里也况文王時為世子乎他如列國大昏皆使上卿逆于其國而至則親逆于其舘耳無出疆之理抑内女為夫人凡八見於經獨於紀詳焉夫亦以吾女遭人倫之變者乎是故履緰之逆其始也齊侯葬紀伯姬其終也吁春秋其亦有所慨也夫紀子伯莒子盟于密伯左作帛始此外相盟之程子曰闕文也當云紀子某伯莒子盟于密左氏附㑹作帛杜預以為裂繻之字春秋無大夫在諸侯上者公榖皆作伯杜氏曰密莒邑城陽淳于縣東北有密鄉李亷曰紀本非子爵恐子上猶有闕字或云子伯二字即侯字之誤十有二月乙卯夫人子氏薨公羊傳夫人子氏者何隠公之母也何以不書葬子將不終為君故母亦不終為夫人也榖梁傳夫人薨不地夫人者隠之妻也范氏曰夫人無出境之事薨有常處故不書地程子曰隠公夫人也婦人從夫者也公在故不書葬於此見夫婦之義矣今按夫人子氏左氏以為即仲子故以前歸賵為豫凶事程子曰豈有此理夫人子氏自是隠公之妻不干仲子事公羊以為即聲子但左氏明言惠公元妃孟子卒後繼室以聲子而生隠公繼室若在恐無縁再娶必是聲子卒後始又娶仲子而生桓公聲子仲子皆妾也故春秋書仲子但曰仲子則書聲子必不曰夫人葢子將不終為君母亦不終為夫人而夫子肯書曰夫人以損其實乎聲子乃孟子之姪娣孟子卒後聲子以次妃攝行内事謂之繼室不得稱夫人者以於禮無二嫡也不再娶夫人者以諸侯無再娶之禮也聲子卒後惠公以内事無主再娶仲子而正其名曰夫人以其非姪娣比也而不知其皆非禮也聲子仲子皆薨于春秋之前此年薨者自是隠公夫人雖攝實行君事春秋書隠曰公則書其妻曰夫人無可疑者左氏誤認為仲子故以天王歸賵為豫凶事甚至以尹氏為君氏以君氏為聲子知君氏之無理無據則知其前亦妄矣鄭人伐衛此諸侯專征伐之始胡傳按左氏鄭共叔之亂公孫滑段之子出奔衛衛人為之伐鄭取廪延至是鄭人伐衛討滑之亂也凡兵聲罪致討曰伐潜師掠境曰侵兩兵相接曰戰繯其城邑曰圍造其國都曰入徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗悉虜而俘之曰取輕行而掩之曰襲已去而躡之曰追聚兵而守之曰戍以弱假强而能左右之曰以皆誌其事實以明輕重内兵書敗曰戰書滅曰取特婉其辭為君隠也啖氏曰公羊云戰不言伐圍不言戰入不言圍滅不言入皆舉重也此說是有與例不合者則隨義釋之征伐天子之大權今鄭無王命雖有言可執亦王法所禁況於修怨乎不書戰者程氏以為衛已服也衛服則可免矣此義施於伐而不書戰皆可通矣陸氏曰成公已前侵伐書人者逺事難詳不必皆微者三年春王二月程子曰月王月也事在二月則書王二月在三月則書王三月無事則書時書首月葢有事則道在事無事則存天時正王朔天時備則嵗功成王道存則人理立春秋之大義也汪氏曰春秋書王正月者九十三書王二月者三十三書王三月者十九皆於歲首繫王著周王之正朔以明大一統之義或歲首所書事舊史止書時或例當書時則二月三月皆不書王如隠八年書遇垂三月歸祊襄十五年書向戌聘二月盟文九年書毛伯求金二月得臣如京三月夫人至之類是也何體乃謂二月殷之正月三月夏之正月王者存二王之後使紇其正朔其説謬甚當周之世而存夏殷之正朔豈所謂大一統耶己巳日有食之公羊傳何以書記異也日食則曷為或日或不日或言朔或不言朔曰某月某日朔日有食之者食正朔也桓三年秋七月壬辰朔日有食之是也日月之行無遲疾食不失正朔也其或日或不日或失之前或失之後失之前者朔在前也謂二日食己巳日有食之是也日行疾月行遲過朔乃食失之後者朔在後也謂晦日食莊十八年三月日有食之是也日行遲月行疾未至朔而食榖梁傳言日不言朔食晦日也其不言食之者何也謂經不書月食日知其不可知知也謂聖人慎疑作不知之辭者智也程子曰日有食之有食之者也更不推求者何也太陽君也而被侵食君道所忌然有常度災而非異也星辰陵歴亦然胡傳經書日食三十六去之千有餘歲而精厯筭者所能考也其行有常度矣然每食必書示後世治度明時之法也有常度則災而非異矣然每食必書示後世遇災而懼之意也日者衆陽之宗人君之表而有食之災咎象也克謹天戒則雖有其象而無其應弗克畏天災咎之來必矣凡經所書者或妾婦乗其夫或臣子背君父或政權在臣下或夷狄侵中國皆陽微隂盛之徴也是故十月之交詩人以刺日有食之春秋必書以戒人君不可忽天象也愚按此日食公羊以為失之前者朔在前榖梁謂言日不言朔食晦日也杜氏以長厯推明此食是二月朔不書朔史失之也食必在朔日不在朔日厯差也三月庚戌天王崩左傳三月壬戌平王崩赴以庚戌故書之杜註謂欲諸侯之速至故逺日以赴春秋不書實崩日而書逺日者即傳其偽以懲臣子之過按此説恐非公羊傳何以不書葬天子記崩不記葬必其時也諸侯記卒記葬有天子存不得必其時也曷為或言崩或言薨天子曰崩諸侯曰薨大夫曰卒士曰不禄杜氏曰不書葬魯不㑹榖梁傳髙曰崩厚曰崩尊曰崩天子之崩以尊也其崩之何也以其在民上故崩之其不名何也太上故不名也胡傳崩者上墜之形春秋歴十有二王桓襄匡簡景志崩志葬者赴告及魯往㑹之也平惠定靈志崩不志葬者赴告雖及魯不㑹也莊僖頃崩葬皆不志者王室不告魯亦不往也諸侯為天王服斬衰禮當以所聞先後而奔䘮今平王崩周人來訃而隠公不往是無君也其罪應誅不書而自見矣或曰萬國至衆也封疆至重也天王之䘮不得越境以奔而脩服於國卿供弔送之禮訖葬卒哭而除䘮禮乎按周書康王之誥太保率西方諸侯入應門左畢公率東方諸侯入應門右再拜趨出王反䘮服此奔成王之䘮者安得以為脩服於國而可乎故周人有䘮魯人有䘮周人往弔謂使人可也魯人不往謂當親之者而不可使人代也諸侯歲時或朝覲於京師或㑹同於方嶽或從兵革征討之事越境踰時不以為難何獨難於奔䘮而薄君臣始終存沒之義哉大非先王之禮失春秋之義矣趙氏曰春秋王崩三不書莊王僖王頃王見王室不告魯之不赴也王室使告國史當書之不然魯聞王崩使卿赴弔則知其日月亦當書也哀王室之無人王室陵夷公卿非其人故禮缺耳著諸侯之不臣也王室雖不告諸侯聞之自當往嗣王即位皆不書逾年而即位天下更始即當書其即位以見天下新有大君也不能施令于天下也但自即位而已不能有號令新政使天下知也亦猶詩有王風不為雅也罪諸侯不臣而莫之承也諸侯視之與不即位同不復重承也哀王道積微而莫之興也又曰王后世子廢興卒葬之不書何也王室不告諸侯不赴也不慶弔哀其微也夏四月辛夘尹氏卒尹左作君公羊傳尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿非禮也外大夫不卒此何以卒天王崩諸侯之主也趙氏曰春秋一字之義為經邦大訓豈有縁其為諸侯作主人之恩而録之於經乎胡傳尹氏天子大夫世執朝權為周階亂家父所刺秉國之均不平謂何者是也因其告䘮與立子朝以朝奔楚皆以氏書者志世卿非禮為後鑒也或曰世卿非禮裳裳者華何以作乎詩裳裳者華小序古之仕者世禄小人在位則讒諂並進棄賢之類絶功臣之世焉曰功臣之世世其禄世卿之官嗣其位禄以報功也故其世可延位以尊賢也故其官當擇官不擇人世授之柄黨與既衆威福下移大姦根據而莫除人主孤立而無助國不亡幸耳春秋於周言尹氏武氏仍叔之子於魯書季友仲遂皆志其非禮也公羊子此說必有所受矣薛氏曰先王之内諸侯祿也外諸侯嗣也有世祿而無世官尹氏則世官矣王臣不卒春秋因其交魯來赴而書之于䇿為萬世鑑也金氏曰按尹氏卒左氏作君氏謂聲子也為公故曰君氏非也古語氏猶今云家也國君之母卒而云公家卒則不詞甚矣故當從二傳附録左傳鄭武公莊公為平王卿士卿士王卿之執政者言父子秉周之政王貳于虢虢西虢公亦仕王朝王欲分政於虢則不復專任鄭伯鄭伯怨王王曰無之故周鄭交質王子狐平王子為質於鄭平王之末路陵夷至於此鄭公子忽為質於周王崩周人將畀虢公政周人遂成平王本意四月鄭祭足帥師取温之麥秋又取成周之禾四月今二月也秋今之夏也麥禾皆未熟言取者葢足踐之温今河内温縣成周洛陽縣也秋武氏子來求賻賻音附此來求之始左傳王未葬也公羊傳武氏子者何天子之大夫也其稱武氏子何譏何譏爾父卒子未命也何以不稱使當䘮未君也謂天子也武氏子來求賻何以書譏何譏爾䘮事無求求賻非禮也葢通于下榖梁傳武氏子者何也天子之大夫也天子之大夫其稱武氏子何也未畢䘮孤未爵平王之䘮在殯未爵使之非正也其不言使何也無君也桓王在䘮未即位故曰無君歸死者曰賵歸生者曰賻歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之程子曰武氏王之卿士稱武氏見其世官天王崩諸侯不供其䘮故武氏遣其子徴求於四國書之以見天子之失道諸侯不臣之甚也家氏曰武氏子仍叔子銜命而出必皆有位於朝今乃以某氏子書公榖於仍叔之子曰父老子代從政世其禄位者也於武氏子乃曰父卒子未命葢以仍叔尚存武氏已卒諦詳經旨皆父在而子世其官者耳子者父在之詞也金氏曰平王于魯猶歸惠公仲子之賵隠公于周不賻天王之䘮于報施之禮且猶不可況君臣之際乎八月庚辰宋公和卒榖梁傳諸侯日卒正也啖氏曰天子卒曰崩諸侯卒曰薨皆臣子之辭外諸侯則曰卒卒終也本國不言卒故異其文趙氏曰諸侯不曰薨異外内也名之降于天子也左傳宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人先君穆公兄宣公也與夷宣公子即所屬殤公寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮皮氷反也馮穆公子莊公也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢使公子馮出居於鄭辟殤公也八月宋穆公卒殤公即位按穆公之立殤公葢知殤公若不立而立馮殤公必不靖後此吳公子光即其事也然不當使馮居鄭鄭莊姦雄因而交鬭其間故禍宋者鄭莊而致鄭之為宋禍者穆公也公羊傳君子大居正宋之禍宣公為之也胡傳外諸侯卒國史承告而後書聖人皆存而弗削曷為弗削春秋天子之事也古者諸侯之交間問殷聘而世相朝葢王事相從則有和好之情及告終易代則有弔恤之禮是諸侯所以睦鄰國也周制王哭諸侯則大宗伯為上相司服為王制緦麻宰夫掌邦之弔事戒令與其幣器財用是王者所以懐諸侯也凡諸侯卒皆存弗削而交隣國待諸侯之義見矣卒而或名或不名者何㑹盟則名於載書聘問則名於簡牘未嘗㑹盟聘問而無所徴者雖使至告䘮其名亦不可得而知矣凡此類因舊史而不革者也諸侯曰薨夫夫曰卒五等邦君何以書卒夫子作春秋則有革而不因者周室東遷諸侯放恣專享其國而上不請命聖人奉天討以正王法則有貶黜之刑矣因其告䘮特書曰卒不與其為諸侯也故曰知我者其惟春秋乎罪我者其惟春秋乎按薨卒之例啖趙是矣胡氏謂夫子黜而書卒非也朱子曰劉秘丞説凡諸侯王以下當從陸淳例書卒温公以為確論而恨周秦漢紀不可請本追改則是已覺通鑑書薨之失而悔之矣葢薨乃臣子之辭不當施之于國史也今從其説冬十有二月齊侯鄭伯盟于石門此外諸侯特相盟之始杜氏曰來告故書石門齊地程子曰天下無王諸侯不守信義數相盟誓所以長亂也故外諸侯盟來告則書之范氏曰傳例曰外盟不日李亷曰齊鄭之交始此當是時鄭莊以小人之雄因是春交質之故有志於叛王而合諸侯始欲挾公子馮以謀宋而宋魯之好方固無間而入因齊僖有小伯之志於是黨齊以仇宋此石門為東諸侯合黨之始而實齊伯之權輿也左氏於是年首序周鄭交惡之事亦為有見于此王伯消長之機不在兹乎陳氏曰特相盟不書必關于天下之故而後書齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟于石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之始終也癸未葬宋穆公穆公榖作繆後同趙氏曰凡諸侯葬皆如我之辭何也怪不言某國葬某公志我大夫之往㑹也往㑹禮也生嘗邀好謂朝聘㑹盟也死不弔葬君子薄之記其是以著其非也啖氏曰凡諸侯葬魯往㑹則書之其有書葬不書往者往非卿也五等諸侯本國臣子皆稱之曰公葬既不請王命因而私諡為公正禮諸侯皆合請王諡從而書之以見非禮胡傳外諸侯葬其事則因魯㑹而書其義則聖人或存或削曷為或存或削春秋天子之事也傳稱諸侯五月而葬同盟至同盟謂同方嶽之盟者其生講㑹同之好其沒有葬送之禮是諸侯所以睦隣國也按周制有職䘮掌諸侯之䘮禮莅其禁令序其事凡諸侯及諸臣葬於墓者則冢人授之兆為之蹕而均其禁是王者所以懐諸侯也外諸侯葬或存或削而交隣國待諸侯之義見矣葬而或日或不日者何備則書日畧則書時其大致然也卒而或葬或不葬者何有怠於禮而不葬者有弱其君而不葬者有討其賊而不葬者有諱其辱而不葬者有治其罪而不葬者有避其號而不葬者宋殤齊昭告亂書弑矣而經不書葬是討其賊而不葬者也魯宋盟㑹未嘗不同而三世不葬是治其罪而不葬者也吳楚之君書卒者十亦有親送於西門之外者矣而經不書葬是避其號而不葬者也怠於禮而不往弱其君而不㑹無其事闕其文魯史之舊也討其賊而不葬諱其辱而不葬治其罪而不葬避其號而不葬聖人所削春秋之法也故曰知我者其惟春秋乎罪我者其惟春秋乎四年春王二月莒人伐把取牟婁此伐國取邑之始榖梁傳言伐言取所惡也諸侯相伐取地於是始故謹而志之也啖氏曰凡先言伐國下言取邑者明其國之邑也伐把取牟婁之類是也范氏曰明伐不以罪而貪其利兩書取伐以彰其惡於是始春秋之始也諸云某事之始放此按把當作紀隠桓之篇多誤紀為把牟婁紀邑在漢北海郡平昌今青州安邱縣把都雍邱距此甚逺趙氏曰凡力得之曰取不當取也不是其争奪雖復取本邑亦無異辭其有本是我邑及我附庸為彼所奪之後却取得當異其文謂其不能申明直辭請於王以正疆理但專以兵争奪不得正道故悉同辭書之左氏云凡書取言易也榖梁亦曰取易辭也按取者收奪之名何關難易假令取之難而得之欲如何書之乎又云凡克邑不用師徒曰取今經見云伐何得云不用師徒乎今謂凡係屬外而我克有之不論難易一切稱取其言伐某取某者是用師徒也戊申衛州吁弑其君完完音九州榖作祝後同此書弑之始左傳衛莊公娶于齊曰莊姜美而無子又娶于陳曰厲媯其娣戴媯生桓公莊姜以為已子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方石碏七畧反衛大夫弗納于邪驕奢淫泆所自邪也四者之來寵禄過也石碏之意葢謂驕奢淫泆乃邪之所自起而所以驕奢淫泆者由寵禄之過也邪者惡逆之謂將立州吁乃定之矣若猶未也階之為禍弗聴其子厚與州吁游禁之不可桓公立乃老四年春州吁弑桓公而立程子曰自古簒弑多公族葢自謂先君子孫可以為君國人亦以為然而奉之春秋於此明大義以示萬世故春秋之初弑君者皆不稱公子公孫葢身為大惡自絶於先君矣豈復得為先君子孫也古者公族刑死則無服況弑君乎大義既明於初矣其後弑立者則皆以屬稱或見其以親而寵之太過任之太重以至於亂或見其天屬之親而反為㓂讐立義各不同也春秋大率所書事同則辭同後人因謂之例然有事同而辭異者葢各有義非可以例拘也胡傳此公子也削而以國氏者罪莊公不待之以公子之道使豫聞政事主兵而當國也以公子之道待州吁教以義方弗納于邪不以賤妨貴少陵長則桓公之位定矣亂何由作以衛詩緑衣諸篇考之所謂前有讒而不見後有賊而不知者莊公是也其不稱公子而以國氏著後世為人君父者之戒耳故傳有之曰為人君父而不通春秋之義者必蒙首惡之名夏公及宋公遇于清此書遇之始左傳公與宋公為㑹將尋宿之盟未及期衛人來告亂夏公及宋公遇于清杜氏曰清衛邑濟北東阿有清亭古者諸侯或因朝覲或從王命無期約而適值於途必有兩君相見之禮近者為主逺者為賓稱先君以相接所以崇禮讓絶慢易也故謂之遇以别於朝㑹之正禮周衰諸侯放恣出入無度私為之約亦自比於不期而遇者直欲簡其禮耳托於邂逅簡約而行則莫適為主矣凡書皆譏之也按以下文推之此非無事而遇葢有所謀也宋魯合交將以謀鄭托於無約而遇葢秘其迹也清衛地葢衛亦與焉淇縣界清水合淇水入衛恐非阿之清亭宋公陳侯蔡人衛人伐鄭此諸侯㑹伐之始始亦東諸侯分黨之左傳宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將脩先君之怨於鄭二年鄭討公孫滑之亂伐衛而求寵於諸侯以和其民杜氏曰諸簒立者諸侯既與之㑹則不復討故欲求此寵弑孔氏曰春秋之世王政不行賞罰之柄不在天子君取國為罪雖大若已列於諸侯㑹者則不復討其有臣子殺之即與弑君無異未必禮法當然要其時俗如是按此乃黨助簒賊者自立之法人欲横流孔子所以懼而作春秋也使告于宋曰君若伐鄭以除君害害謂公子馮君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲魯大夫曰衛州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民盡於此一言於是乎不務令德而欲以亂成必不免矣胡傳是役首謀在衛而以宋主兵何也宋殤不恤衛有弑君之難欲定州吁而從其邪説是肆人欲滅天理非人之所為也故以宋公為首諸國為從示誅亂臣討賊子必先治其黨與之法也此義行為惡者孤矣故曰春秋成而亂臣賊子懼張氏曰陳在陳州宛丘縣蔡在蔡州上蔡縣愚按愚哉宋殤公也受國於穆公而虞其子有争位之心正當脩德和民外固隣好苟吾無間誰能害之況州吁弑君之賊内懐見討之懼外為脩怨之圖而求寵於諸侯知宋殤有間之可入也為伐鄭除害之言以誘之使殤公明於大義名其為賊告于王而討之則一舉而君臣父子之倫定鄭之心服而馮之望絶矣於是反馮於宗國而恩意有加焉豈不上不負先君而下足以示四國哉乃怵於邪説合陳蔡以助逆賊使宋國之人不復知君臣逆順之正理自是日從事於兵而弑逆之禍卒亦不免於其身皆由辨之不早之所致也可不戒哉秋翬帥師㑹宋公陳侯蔡人衛人伐鄭翬許歸反之此大夫㑹伐始左傳秋諸侯復伐鄭宋公使來乞師公辭之從衆仲之言羽父公子翬請以師㑹之公弗許固請而行故書曰翬帥師疾之也諸侯之師敗鄭徒兵取其禾而還程子曰再序四國重言其序左氏以為再伐妄也胡傳宋人來乞師而公辭之羽父請以師㑹而公弗許其辭而弗許義也翬以不義强其君固請而行無君之心兆矣隠公不能辨之于早是以及鍾巫之禍春秋去其公子以謹履霜之戒春秋之義至精詞極簡嚴而不贅也若曰翬帥師㑹伐鄭豈不白乎再序四國言之重詞之複其中必有大美惡焉四國合黨翬復㑹師同伐無罪之邦欲定弑君之賊惡之極也言之不足而再言聖人之情見矣誅討亂賊之法嚴矣愚按州吁之惡與四國黨逆之罪不容言矣鄭莊公於公孫滑之奔衛衛人嘗為之伐鄭則舉兵伐衛以討滑之亂至宋公子馮之居鄭不猶鄭公孫滑之在衛乎乃不能推是心以撫宋而欲納之搆其兄弟之釁傷其先君之恩成宋國簒弑之禍傾危之習如此此衛所以起脩怨之心而宋所以聴除害之誘樂從而不疑也然則推原事始鄭安得無罪吾故著之趙汸謂四國實是再舉九月衛人殺州吁于濮濮音卜左傳州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國􅄶小老夫耄矣無能為也此二人者實弑寡君敢即圖之陳人執之而請涖于衛九月衛人使右宰醜涖殺州吁于濮石碏使其宰獳奴侯反羊肩涖殺石厚于陳汪氏曰宋萬之弑宋人求賊于陳慶父之弑魯人求賊于莒皆貴賂而後與今此陳人能執州吁而不匿賊取賂亦賢於後此陳莒之為矣然陳乃衛桓之母家而陳侯亦親率兵㑹伐鄭欲定州吁之位則今日之善不足以贖前日之過故經不書陳人執州吁而止著衛人之殺之也君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎愚按左傳君子曰如此類極正當視宋宣公可謂知人矣信不由中質無益也等語霄壤之分矣公羊傳其稱人何討賊之辭也趙氏曰凡作亂自立為君而國人殺之者皆稱人以殺言衆所共棄不君之也榖梁傳于濮者譏失賊也胡傳于濮者憫衛人而著諸侯之罪也范氏曰譏其不能即討乃令至濮衛人失賊而曰著諸侯之罪何也夫州吁二月弑君而不能即討者縁四國連兵欲定其位故久然後能殺之于濮耳非諸侯之罪而何夫以討賊許衆人而以失賊罪鄰國與賊者寡矣故曰春秋成而亂臣賊子懼按陳乃衛桓之母家衛莊公惑于嬖妾戴媯至于大歸陳國既知之矣及嬖人之子弑立不舉討賊之師而反從助賊之國人心顛倒不宜至此觀石碏告于陳曰此二人者實弑寡君則前此陳或不知州吁之為賊也姦黨欺蔽其術多矣惑宋誤陳理所必有石碏老臣慮之熟矣賊方據國内外皆其黨與旁視無足與圖者圖之必於陳故先與陳定計然後風以朝陳使請王覲而即陳以圖之朱子語録有門人疑引之去陳後倘陳人不殺却如何葢未知此也杜氏曰濮陳地水名張氏曰在曹衛之間受河汳二水東北至灕𣲖分為二俱東北至鉅野入泲冬十有二月衛人立晉左傳衛人逆公子晉於邢冬十二月宣公即位書曰衛人立晉衆也榖梁傳人衆辭立者不宜立也程子曰諸侯之立必受命于天子當時雖不受命于天子猶受命于先君衛人以晉公子也可以立故立之春秋所不與也雖先君子孫不由天子先君之命不可立也故去其公子愚按為子受之父為諸侯受之君此天下之大義安國家定社稷之大本也衛桓公為州吁所弑州吁為衛人所殺晉於次當立而無先君之命衛之臣子宜以衛亂及賊討之故告于天王方伯而以王命立晉則名正而言順矣今也衛有君衛人立之是衛可以擅置其君而君可以專有其國也大義已不明大本已不正是以晉也繼亂而立殊無哀痛懲艾之心憤悱圖治之志未久而興兵脩怨侵尋至於斁敗彛倫基狄滅之禍葢觀其本之不正有以卜其永之不終春秋於其始立而正之其義豈不深切著明也哉衛人殺州吁于濮衛人立晉連書衛人而二事之是非曉然何也衛可以討賊不可以置君州吁為戮而晉受之春秋以是為無君父也五年春公觀魚于棠觀左作矢左傳公將如棠觀魚者説文云魚捕魚也天官獻人凡獻人掌其政令是謂補魚為魚魚者猶言獵者也臧僖伯諫曰凡物不足以講大事臧僖伯公子彄也僖諡也大事祀與戎其材不足以備器用則君不舉焉故春蒐蒐所求反擇取不孕者夏苗為苗除害秋獮息淺反殺也以殺為名順秋氣也冬狩手又反圍守也冬物畢成獲則取之無所擇也皆於農隙各隨時事之間以講事也三年而治兵入而振旅雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢整衆而還歸而飲至飲於廟以數上聲軍實車徒器械及所獲昭文章明貴賤辨等列行伍順少長出則少者在前還則在後習威儀也鳥獸之肉不登於俎俎祭器皮革齒牙骨角毛羽不登於器謂以飾器則公不射此以鳥獸言故云不射若魚則不可言射朱子謂據傳曰則君不射則失魚是將弓矢去射之如漢武帝射蛟江中之類愚按朱子此説未安公榖皆作觀魚左氏傳文亦自作觀魚明是左經文矢字誤不可援射蛟之比及傳文則公不射之語遂以矢魚為射也或者見遂往陳魚而觀之又訓矢為陳皆非是古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也公曰吾將略地焉孫辭以畧地畧縂攝巡行之名傳曰束畧之不知西則否矣遂往陳設張也魚捕魚之具而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言逺地也杜氏曰髙平方與縣北有武唐亭魯侯觀魚臺張氏曰在單州魚臺縣程子曰諸侯非王事民事不逺出逺出觀魚非道也附録左傳曲沃莊伯以鄭人邢人伐翼曲沃晉别封成師之邑在河東聞喜縣莊伯成師子也翼晉舊都在平陽絳邑縣東邢國在廣平襄國縣王使尹氏武氏助之翼侯奔隨尹氏武氏皆周世族大夫也晉内相攻伐不告亂故不書傳具其事為後晉事張本曲沃及翼本未見桓二年弱按晉文侯於平王有修扞之功其後嗣為曲沃所王室不能救已非矣桓王反使尹氏武氏助曲沃於君臣恩義邪正一切反之其末造趙魏韓三大夫分晉威烈王又爵命之王法往往王室自壊之謂之何哉夏四月葬衛桓公左傳衛亂是以緩程子曰稱桓公見國人私諡也魯往㑹故書送終大事也必就正寢不殁於婦人之手曾子易簀而殁豈苟然乎死而加之不正之諡知忠孝者肯為乎胡傳春秋於邦君薨正以王法而書卒至於葬則從其私諡而稱公或革或因詞顯而義微也附録左傳四月鄭人侵衛牧牧衛邑以報東門之役在四年衛人以燕師伐鄭南燕國今東郡燕縣鄭祭足原繁洩駕以三軍軍其前使曼伯與子元潜軍軍其後燕人畏鄭三軍而不虞制人北制鄭邑今河南城臯縣也一名虎牢六月鄭二公子曼伯子元也以制人敗燕師于北制君子曰不備不虞不可以師曲沃叛王秋王命虢公伐曲沃而立哀侯于翼春翼侯奔隨故立其子光秋衛師入郕郕音成公作盛左傳衛之亂也郕人侵衛故衛師入郕公羊傳曷為或言率師或不言率師將尊師衆稱某帥師將尊師少稱將將卑師衆稱師將卑師少稱人君將不言率師書其重者也趙氏曰公羊曰將尊師衆稱某帥師將尊師少稱將此例施於内師則可於外則不可何者凡外國來告侵伐但言其將何能悉以衆寡來告乎且春秋意在褒貶其事之是非不必預知其衆寡也又云將卑師少稱人按前後稱人以圍者凡十五若將卑師少何能圍國益知外師不可以多少為目也程子曰衛晉乗亂得立不思安國保民之道以尊王為先居䘮為重乃興戎脩怨入人之國書其失道也李亷曰郕之事書於經者四考其始末一入于衛再入于齊鄭既而降於齊又七十一年而奔魯春秋不復書矣夫以文昭之懿受甸伯之爵而迫脅於諸侯如此春秋抑强扶弱之書安得不重感乎齊鄭猶可也衛郕兄弟之國而若是甚矣杜氏曰東平亢父縣有郕鄉九月考仲子之宫初獻六羽公羊傳考宫者何始祭仲子也桓未君則曷為祭仲子隠為桓立故為桓祭其母也榖梁傳禮庶子為君為其母築宫使公子主其祭也君不親祭尊宗廟也於子祭於孫止左傳九月考仲子之宫將萬焉萬舞也公問羽數於衆仲對曰天子用八諸侯用六夫夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也胡傳考者始成而祀也杜氏曰成宫安其主而祭之服䖍曰宫廟初成祭之名為考今按榖梁曰考者成之也成之為夫人也釋考字非其稱仲子者惠公欲以愛妾為夫人隠公欲以庶弟為嫡子聖人以為諸侯不再娶於禮無二適孟子入惠公之廟仲子無祭享之所為别立宫以祀之非禮也故因其来賵而正名之曰仲子之賵因其考宫而正名之曰仲子之宫而夫人衆妾之分定矣隠公攝讓之實辨矣桓公簒弑之罪昭矣存則以氏繫姓以姓繫號如曰夫人姜氏沒則以諡繫號以姓繫諡如曰小君文姜者夫人也存不稱號沒不稱諡單舉姓字者妾也魯自成風而後妾母皆稱夫人稱小君稱諡惟定姒以哀未成君不稱夫人及小君然亦襲成風敬嬴齊歸之例而稱諡矣夫人且不當别有諡而況妾乎凡宫廟非志災失禮則不書初獻六羽者始用六佾也不謂之佾而曰羽者佾干羽之總稱也羽以象文德干以象武功婦人無武事則獨奏文樂故謂之羽而不曰佾也初者事之始魯僣天子之禮樂舊矣是成王過賜而伯禽受之非也用於大廟以祀周公已為非禮其後羣公皆僣用焉仲子以别宫故不敢同羣廟而降用六羽書初獻者明前此用八之僭也汪氏曰魯僣天子禮樂春秋因事書之以著其罪諸侯六佾而魯僣八佾隠公以仲子别立宫當下於羣公之廟疑於羽數乃從衆仲而改用六羽葢隠公之心若曰先公之廟可循舊用天子所賜之禮仲子别宫止當用諸侯之禮而不知先君之妾不可與君同安可用諸侯之禮乎聖人書曰初獻六羽以嘉隠公復王制之舊一以著崇寵妾之過也孔子之時季氏舞八佾則知隠公惟用六羽於仲子之宫而羣公仍僣八佾厥後成風敬嬴定姒齊歸皆以妾母用小君之禮則隠公此舉啓之也邾人鄭人伐宋左傳宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道鄭人以王師㑹之王師不書不以告也抑鄭莊時為王卿士豈其擅興天子郷遂之兵非王室遣將故不書乎然鄭自周畀虢公政怨王而不朝至于今矣豈能以王師出乎恐左氏誤也鄭以王師伐宋則隠九年之事耳左氏隠篇之多誤此亦其一事也伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也為七年伐邾傳程子曰先邾人為主也螟音𠖇此蟲災始公羊傳螟何以書記災也杜氏曰蟲食苖心者為災故書冬十有二月辛巳公子彄卒彄苦侯反左傳臧僖伯卒公曰叔父有憾於寡人諸侯稱同姓大夫長曰伯父少曰叔父有憾恨諫觀魚不聴寡人弗敢忘葬之加一等杜氏曰大夫書卒不書葬葬者臣子之事非公家所及宋人伐鄭圍長葛此書圍之始左傳以報入郛之役也榖梁傳伐國不言圍邑此其言圍何也乆之也伐不踰時戰不逐奔誅不填服程子曰伐國而圍邑肆其暴也汪氏曰明年冬書取長葛知圍至于經年而不解也非再舉之師杜氏曰潁川長社縣北有長葛城六年春鄭人來輸平輸左作渝左傳鄭人來渝平更成也杜氏曰和而不盟曰平渝變也公之為公子戰於狐壤為鄭所執逃歸怨鄭鄭伐宋公欲救宋宋使者失辭公怒而止忿宋則欲懐鄭鄭因此而來故經書渝平傳曰更成來孔氏曰渝變也變更前惡而復為和好自狐壤以與鄭不和今日復和故曰更成言更復狐壤以前之好也而狐壤之事見十一年傳以服䖍云公為鄭所獲釋不結平於是更為約束結之故曰渝平孔氏曰按傳公賂尹氏而與之逃歸非鄭所釋安得釋而結平也公羊傳輸平猶墮成也敗其成也何氏曰翬伐鄭後已相與平但外平不書故云爾劉氏曰公羊謂戰於狐壤隠公獲焉諱而言輸平非也戰而見獲而謂之輸平失其事實文與義乖非聖人本旨也何休言外平不書按魯之公子與鄭為平理無不通者榖梁傳輸者墮也來墮平者不果成也范氏曰春秋前魯與鄭平四年翬與宋伐鄭故來絶魯壊前平也按榖梁謂魯舊與鄭平至此而絶與後日歸祊㑹鄭之事不合劉氏曰公羊謂敗成穀梁謂不果成皆非也平者兩國約不相背云耳四年翬㑹伐鄭平絶可知安有鄭人又來請絶前平乎胡傳輸者納也平者成也鄭人曷為納成於魯以利相結解怨釋仇離宋魯之黨也高氏曰曰來輸必有挾也陳氏曰春秋之初魯宋衛陳蔡為一黨齊鄭為一黨今鄭先來與魯平就合齊魯之交自此以後魯合于齊鄭而離宋魯之交矣平不書必關於天下之故而後書明年宋陳及鄭平宣七年鄭及晉平文十六年及齊平襄二十年及莒平哀八年及齊平皆不書書鄭輸平以志諸侯之合書及鄭平以志諸侯之散愚按輸平左氏作渝公穀皆作輸文不同而訓義則一公榖訓輸為墮與左氏渝義一耳秦詛楚文云變輸盟刺輸亦即渝也但左氏更成之意謂變更前惡而復為和好公榖則直謂敗成絶平此其不同耳以經考之前年公子翬伐鄭是嘗有憾而未嘗有平公榖墮成之説既不通矣而左氏更成之義謂變更前惡而復為和好則渝與平為二意經文簡嚴何不直云鄭人來平之為明曉乎是以諸儒多從公榖作輸而不從其訓曰輸納也納平於我也是時鄭與齊黨魯與宋黨昨宋伐鄭圍長葛鄭宋之憾方深適前此宋使失辭而致魯君之怒宋魯之交可判鄭乗此隙致平於魯以離宋之黨故今年輸平之後夏公即與齊盟既而又與齊鄭㑹于中丘以謀伐宋自是魯持宋而與齊鄭合矣皆鄭輸平所致也言納平於我則變更前惡之義在其中矣或曰輸平者致平之意而已葢許八年所歸之祊田也輸之意若曰魯能不從宋而反兵救我當以祊田饋魯也然鄭徒言之而祊未入魯故魯雖不從宋亦未救鄭有所要也按此論精矣但輸平在六年歸祊在八年謂輸平為豫許祊乃意之之辭但鄭急於求魯而魯緩於許鄭至歸祊而後魯鄭合則明甚附録左傳翼九宗五正頃父之子嘉父逆晉侯于隨翼晉舊都也唐叔始封受懐姓九宗職官五正遂世為晉强家五正五官之長九宗一姓為九族也頃父之子嘉父晉大夫納諸鄂晉别邑晉人謂之鄂侯前年桓王立此侯之子于翼故不得復入翼别居鄂夏五月辛酉公㑹齊侯盟于艾艾五葢反之此齊魯交好始左傳夏盟於艾始平于齊也杜氏曰泰山牟縣東南有艾山附録左傳五月庚申鄭伯侵陳大獲往嵗鄭伯請成于陳按鄭伯輸平於魯請成于陳不憚屈己下人以濟其私其心雖私然我以繼好息争往先于人而人不從則不從者為不祥矣此鄭伯所以為一時之桀􅃛也宋衛陳蔡真昏庸哉陳侯不許五父陳公子佗諫曰親仁善鄰國之寶也君其許鄭陳侯曰宋衛實難乃旦反鄭何能為遂不許秋七月公羊傳此無事何以書春秋雖無事首時過則書首時過則何以書春秋編年四時具然後為年程子曰無事書首月天時王月備而後成歲也冬宋人取長葛程子曰宋人之圍長葛歲月周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而弗能保有赴訴卒䘮其邑皆罪也宋之强取不可勝誅矣宋人取長葛經以為冬傳以為秋劉原父謂左氏雜取諸侯史䇿有用夏正者有用周正者附録左傳冬京師來告饑公為之請糴于宋衛齊鄭禮也鄭伯如周始朝桓王也王不禮焉周桓公言于王曰我周之東遷晉鄭為依善鄭以勸來者猶懼不蔇至也況不禮焉鄭不來矣七年春王三月叔姬歸于紀胡傳叔姬伯姬之娣非夫人也則何以書古者諸侯一娶九女必格之同時者所以定名分窒亂源也今叔姬待年於宗國不與嫡俱行則非禮之常所以書也孫氏曰媵書者為莊十二年歸于酅起眉山蘇轍以為書叔姬賢之也若賢不得書必貴而後書則是以位而蔑德也小國無大夫至於接我則書是位不可以廢事也位不可以廢事而獨可以廢賢乎如叔姬不歸宗國而歸于酅以全婦道賢可知矣賢而得書亦春秋之法也滕侯卒程子曰不名史闕文也左傳滕侯卒不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終嗣也以繼好息民謂之禮經趙氏劉氏破赴以名之説胡傳見八年宿男卒下杜氏曰滕國在沛國公丘縣東南夏城中丘此書土功之始左傳書不時也公羊傳中丘内之邑也榖梁曰民衆城小則益城益城無極今按城完舊也未見益城之意榖梁意謂建國立城高下大小有制如民衆而城小輒益城是無限極也程子曰春秋凡用民力必書其所興作不時害義固為罪也雖時且義必書見勞民為重事也城中丘不以時非人君之用心也杜氏曰中丘在瑯邪臨沂縣東北齊侯使其弟年來聘此列國来聘之始左傳齊侯使夷仲年來聘結艾之盟也榖梁傳諸侯之尊弟兄不得以屬通其弟云者以其來接于我舉其貴者也公羊傳其稱弟何母弟稱弟母兄稱兄胡傳兄弟先公之子不稱公子貶也書盟書帥師而稱兄弟者罪其有寵愛之私罪其以弟之愛而寵任之過也任當擇賢親其親而不及以政可也書出奔書歸而稱兄弟者責其薄友恭之義考於事而春秋之義可見矣年者齊僖公母弟也程氏謂先儒母弟之説葢縁禮有立嫡子同母弟之文其曰同母葢謂嫡耳非以為加親也此義不明乆矣僖公私於同母寵愛異於他弟施及其子猶與適等而襄公絀之遂成簒弑之禍故聖人於年來聘特變文書弟以示貶焉鄭語來盟黒肩帥師皆罪其私也陳光奔楚而稱弟盜殺衛縶而稱兄秦鍼宋辰皆責其薄也仁人於兄弟絶偏繫之私篤友恭之義斯得之矣趙氏曰將國命大夫之事書弟譏之秋公伐邾此伐邾之始左傳秋宋及鄭平七月庚申盟于宿公伐邾為宋討也程子曰擅興甲兵為人而伐人非義之甚也愚按鄭人輸平宋魯之交離矣結鄭之新歡棄鄭之舊好魯在人術中而不復信義之顧宋之嗛魯不言而可知也至是鄭又平宋魯慙於宋而忌鄭之合無以為計乃為宋伐邾以悦宋迹其情態妾婦之不若可恥之甚也春秋書曰伐見其執言以加罪于邾醜之也渝蔑之盟猶其小者耳冬天王使凡伯来聘此王聘之始杜氏曰凡伯周卿士凡國伯爵汲郡共縣東南有凡城戎伐凡伯于楚丘以歸此戎患之始左傳初戎朝于周𤼵幣于公卿凡伯弗賓冬王使凡伯来聘還戎伐之于楚丘以歸杜氏曰楚丘衛地在濟隂城武縣西南胡傳國而曰伐此一人而曰伐見其以徒衆也楚丘衛地以歸易詞也于楚丘者罪衛不救王臣之患以歸者罪凡伯失節不能死于位也周之秩官敵國賓至關尹以告侯人為導司徒具徒司㓂詰姦佃人積薪火師監燎其貴國之賓至則以班加一等益䖍至於王吏則皆官正莅事今凡伯承王命以為過賓於衛而戎得伐之以歸是蔑先王之官而無君父也故旄丘録於國風見衛不能修方伯之職也戎伐凡伯于楚丘以歸見衛不救王臣之患也為狄所滅則有由矣張氏曰戎見隠二年或曰此戎州己氏之戎本昆吾氏之别種周衰入居中國者也楚丘今拱州之楚丘縣漢為梁國己氏縣此非衛之楚杜注非按聘魯始此而終于宣十年凡伯南季仍子家父皆大夫也而宰周公以三公之重王季子以介弟之尊而下聘以宰糾而聘桓以季子而聘宣寵簒弑矣春秋書之傷之中有傷焉附録左傳陳及鄭平八年春宋公衛侯遇于垂左傳齊侯將平宋衛平宋衛于鄭有㑹期宋公以幣請于衛請先相見衛侯許之故遇于犬丘犬丘垂也地有兩名杜氏曰垂衛地濟隂句陽縣東北有垂亭愚按宋衛素睦而鄭其深仇也齊侯將平宋衛於鄭既有㑹期矣宋衛乃請先相見而為垂之遇何哉葢有所謀也説者以為衛侯既不敢違齊侯之命又不能釋鄭國之怨有異志焉故遇於垂此似得事之情而以為衛侯則非也乃宋公耳傳固云宋公以幣請于衛夫有㑹期矣而請先相見相見可矣而以幣請焉宋公之情可睹已葢衛鄭之怨素淺自州吁為戮之後侵牧之外無大交兵惟宋鄭之争至於圍取長葛其怨深矣況公子馮之在鄭實宋殤之所不能一日忘情者乎然則異志者乃宋公而非衛也其所謀于衛者不可知豈必有所要於鄭者其在去馮乎以鄭莊之􅃛必不從故宋不果平瓦屋之盟傳稱齊人卒平宋衛于鄭然鄭不㑹其故可知也以殤之愚而欲遂其忍以莊之􅃛而柔之以詐加以齊僖捭闔其間實陽連宋衛而隂固鄭黨是以明年宋公不王之罪又𤼵於鄭宋之兵端不息立十年十一戰弑于華督而後已焉督已弑殤公卒召公子馮于鄭而立之以親鄭葢殤公始於忌馮之一念浸滋衆慝而終于殺其身良可以為貪忌無恩者之明鑒矣三月鄭伯使宛來歸祊祊必彭反公穀作邴左傳鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也成杜氏曰王營王城有遷都之志故賜周公許田以為魯朝宿之邑後世因而立周公别廟焉鄭桓公周宣王之母弟封鄭有助祭秦山湯沐之邑在祊鄭以天子不能復巡狩故欲以祊易許田各從本國所近之宜恐魯以周公别廟為疑故云已廢泰山之祀而欲為魯祀周公許田近許之田公羊傳宛者何鄭之微者也邴者何鄭湯沐之邑也天子有事于泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉何氏曰有事者巡守祭天告至之禮也當沐浴潔齊以致其敬故謂之湯沐邑也所以尊待諸侯而共其費也榖梁傳名宛所以貶鄭伯惡與地也去其族惡擅易天子邑啖氏曰不命之卿来魯例名之杜氏曰宛鄭大夫不書氏未賜族祊在琅邪費縣東南庚寅我入祊榖梁傳入者内弗受也邴者鄭伯所受命於天子而祭泰山之邑范氏曰王室微弱無復方岳之㑹諸侯驕慢亦廢朝覲之事故鄭以湯沐之邑易魯朝宿之田也諸侯有大功盛德於王室者京師有朝宿之邑秦山有湯沐之邑所以供祭祀也魯周公之後鄭宣王母弟若此有賜邑其餘則否許慎曰若令諸侯京師之地皆有朝宿之邑周有千八百國諸侯盡京師之地不足以容不合事理趙氏曰入祊之義與歸入之入同言不當入與用兵之入不同邑者先祖所受命於天子而以與人其罪著矣髙氏曰鄭始於平魯以離宋故歸祊以市魯魯桓纂君以求援故賂田以償鄭其地相易雖舊言而卒易則異故矣鄆讙龜隂本我之邑歸則有之矣此特書入者以其非我之有不當入也夏六月己亥蔡侯考父卒辛亥宿男卒胡傳天王崩告于諸侯則不名諸侯薨以名赴而自别於太上禮也古者死而不諡不以名為諱周人以諡易名於是乎有諱禮故君薨赴於他國則曰寡君不禄敢告執事春秋之時遵用此禮凡赴者皆不以名矣經書其終雖五霸强國齊桓晉文之盛莫不以名者是仲尼筆之也赴不以名而書其名者與魯通也已通而不名者舊史失之爾未通而名者有所徴矣故傳此義者記於禮篇曰諸侯不生名夫生則不名死則名之别於太上示君臣尊卑之等葢禮之中也諸侯薨赴不以名而仲尼革之必以名書變周制矣春秋魯史聖人修之也而孟子謂之作以此類也秋七月庚午宋公齊侯衛侯盟于瓦屋此參盟之始左傳齊人卒平宋衛于鄭秋㑹于温盟于瓦屋以釋東門之役杜氏曰齊侯尊宋使主㑹故序齊上瓦屋周地榖梁傳外盟不日此何以日諸侯之參盟於是始陳氏曰有參盟而後有主盟者矣按參盟非始於是也隠元年及宋人盟于宿已為參盟之端然宿小國而内稱及外稱人皆微者猶不足紀故榖梁𤼵義於此八月葬蔡宣公程子曰速也諸侯五月而葬不及期簡也九月辛夘公及莒人盟于浮來浮公榖作包胡傳莒小國人微者而公與之盟故特言及以譏失禮杜氏曰浮來紀邑東莞縣北有邳鄉邳鄉西有公來山號曰邳來間張氏曰浮來莒地今沂州沂水縣有浮來山螟程子曰為災也民以食為命故有災必書附録左傳齊侯使來告成三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明德冬十有二月無駭卒駭榖作侅左傳無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德立有德以為諸侯因生以賜姓因其所由生以賜姓謂若舜由媯汭故陳為媯姓胙之土而命之民報之以土而命氏曰陳諸侯以字為諡因以為族朱子曰姓與氏之分姓是本源所生氏是子孫下各分如商姓子其後有宋宋又有華氏魚氏孔氏之類周自黄帝以來姓姬其後魯衛毛耼晉鄭之屬各自以國為氏而其國之子孫又皆以字為氏如魯國子展之後為展氏展禽展喜是也三家以孟仲季為氏或因所居為氏如東門氏之類左氏曰天子因生以賜姓諸侯以字為諡因以為族天子因生以賜姓謂推其所自出而賜之姓如舜居媯汭及武王即位封舜之後于陳因賜姓為媯此所謂因地以賜姓也諸侯以字為諡諡只是氏字傳寫之譌遂以氏為諡無義理只是以字為氏如上文展氏孟氏之類也杜預㸃以字四字為句斷而為諡因以為族為一句此亦是强解㸔來只是錯了諡字官有世功則有官族邑亦如之官若晉之士氏中行氏邑若韓魏趙氏公命以字為展氏諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏程子曰未賜族書名而已九年春天王使南季來聘榖梁傳南氏季字也聘問也聘諸侯非正也胡傳刑則不舉謂諸侯不朝王法所當治遣使聘焉其斯以為不正乎按隠十年間王使三至矣以魯為周公之後而欲親之也而隠偃然受之曾無一介行李之上答春秋詳王使之來而隠罪著矣三月癸酉大雨震電庚辰大雨雪雨雪之雨干付反榖梁傳八日之間再有大變隂陽錯行故謹而日之也胡傳周三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷已出電已見則雪不當復降而大雨雪此隂氣縱也春秋災異必書雖不言其事應而事應具存惟明於天人相感之際響應之理則見聖人所書之意矣程子曰隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其說而不達其理故所言多妄挾卒挾公榖作俠公羊傳俠者何吾大夫之未命者也夏城郎左傳書不時也李亷曰郎魯近邑在高平方與縣東南隠再城之而桓之世三國來戰于此莊之世陳蔡之師亦次于此齊宋以兵窺魯又宿師于此則郎豈非魯之要地乎厥後築臺築囿又皆在此始城猶有警懼之心終遂為遊觀之地矣秋七月冬公㑹齊侯于防防公榖作邴左傳宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公㑹齊侯于防謀伐宋也榖梁傳㑹者外為主焉爾杜氏曰防魯地在琅邪縣東南髙氏曰防宋地明年魯遂取之胡傳周官行人曰時㑹以𤼵四方之禁月禮秋官大行人注時㑹即時見也無常期諸侯有不順服者王將有征討之事則既朝而王命為壇於國外合諸侯而𤼵禁命事焉此謂非時而合諸侯以禁止天下之不義也列國何為有此名凡書㑹皆譏也愚按此背瓦屋之盟將連兵以伐宋不欲兵出無名故假王命以行之左氏見其名而不察其實故如其言而録之曰宋公不王曰以王命討之曰以王命來告夫齊桓召陵之師仗義討楚責以王祭不共而楚人屈服雖無王命正而不譎君子以為彼善於此觀繻葛之戰則宋殤之不王豈至如鄭莊之甚懷惡而討矯誣而行春秋所以深惡之也隠公得位之初慨然視千乗如鴻毛將舉而遜其弟自鄭莊以利誘之歸祊納成遂忘狐壤見止之讐而罷民玩兵以為人役夫視祊為利則視千乗之魯果能脱然歸其弟乎宜菟裘之老不見信於允而公子翬得以行其譖也抑是時未有霸也而已為霸之漸前此惟兩君相㑹至此而諸侯參㑹矣前此惟敵國相攻至此而連諸侯伐宋矣自參盟而有主盟自連諸侯而摟諸侯以伐諸侯故其事則齊桓晉文其義則正王道明大法五伯三王之罪人也而放恣之諸侯又五伯之罪人也此春秋之大指也通一經言之則㑹戎于潛為春秋之始㑹吳黃池為春秋之終自中國諸侯之㑹而言則此㑹防為春秋之始哀十二年㑹衛侯宋皇瑗于鄖為春秋之終魯以望國從齊為春秋之始從吳為春秋之終觀其始終而惡有輕重各存乎其事然律以王朝時㑹𤼵禁之典則皆罪也故曰凡書㑹皆譏也惟襄十一年㑹于蕭魚晉悼公以不戰而屈楚推至誠以待鄭禮囚禁暴偃兵息民故書㑹伐而又書㑹為一經之特筆可謂彼善於此者矣十年春王二月公㑹齊鄭伯于中丘左傳春王正月杜氏曰傳言正月㑹癸丑盟釋例推經傳日月癸丑是正月二十六日知經二月誤公㑹齊侯鄭伯于中丘癸丑盟于鄧為師期盟不書葢公還告㑹而不告盟鄧魯地中丘地臨沂水順流而下可至宋之東鄙夏翬帥師㑹齊人鄭人伐宋左傳夏五月羽父先㑹齊侯鄭伯伐宋言先㑹明非公本期家氏曰翬去族不稱公子誅也終隠之篇皆去其族隠之賊也至桓而書族以明其與桓同惡也書法明甚或者乃以為與無駭挾同例其可得而例觀乎陳氏曰㑹稱君伐稱人略之也王氏曰人齊鄭則公之惡亦可見矣六月壬戌公敗宋師于菅辛未取郜辛巳取防菅古頑反郜古服反又工竺反左傳六月戊申公㑹齊侯鄭伯于老桃㑹不書不告于廟也老桃宋地六月無戊申戊申五月二十三日日誤壬戌六月七日公敗宋師于菅庚午十五日鄭師入郜辛未歸于我庚辰二十五日鄭師入防辛巳歸于我劉氏曰左氏云鄭伯入郜入防以歸于我經但言公敗宋師取郜防春秋豈縱漏鄭伯取邑之罪反移之其君耶公羊傳取邑不日此何以日一月而再取也何言乎一月而再取甚之也春秋録内而略外於外大惡書小惡不書於内大惡諱小惡書杜氏曰菅宋地濟隂城武縣東南有郜城髙平昌邑縣西南有西防城秋宋人衛人入鄭左傳鄭師入郊猶在郊宋人衛人入鄭程子曰鄭勞民以務外而不知守其國故二國入之髙氏曰鄭幸菅之敗而不備故師還及郊宋衛已乗其虛而入之矣宋人蔡人衛人伐戴鄭伯伐取之戴公榖作載左傳宋衛既入鄭而以伐戴召蔡人故不和而敗程子曰戴鄭所與也故三國伐之鄭戴合攻盡取三國之衆其殘民也甚矣家氏曰鄭自克段以來汰於用武伐衛伐宋入許敗王師皆極其兵力所至今也用竒一舉而取三國之師其不曰善戰可乎書鄭伯者目其人也善戰者服上刑奚爵之有哉杜氏曰戴國今陳留外黄縣東南有戴城冬十月壬午齊人鄭人入郕郕公作盛左傳蔡人衛人郕人不㑹王命冬齊人鄭人入郕討違王命也十有一年于寳曰十盈則更始以竒從盈數故曰有春滕侯薛侯來朝此諸侯朝魯之始亦旅見之始榖梁傳天子無事諸侯相朝正也考禮修德所以尊天子也諸侯來朝時正也犆言同時也若榖伯綏來朝鄧侯吾離來朝同時來不俱至累數皆至也若滕侯薛侯來朝同時俱至杜氏曰薛奚仲之後夏所封國在魯國薛縣胡傳周禮行人凡諸侯之邦交殷相聘世相朝也然謂之殷則得中而不過謂之世則終諸侯之世而一相朝其為禮亦節矣周衰典禮大壞諸侯放恣無禮義之交惟强弱之視以魯事觀焉或來朝而不報其禮或屢往而不納以歸無合於中聘世朝之制矣且列國於天子述所職者葢闕如也而自相朝聘可乎滕薛二君不特言者又譏旅見也夏公㑹鄭伯于時來公榖夏字下有五月字時來公作祁黎左又作郲左傳夏公㑹鄭伯于郲謀伐許也杜氏曰時來郲也滎陽縣東有釐城鄭地秋七月壬午公及齊侯鄭伯入許左傳秋七月公㑹齊侯鄭伯伐許庚辰傅于許瑕叔盈鄭大夫以蝥弧鄭伯之旗名登先登周麾而呼曰君登矣鄭師畢登壬午遂入許許莊公奔衛奔不書兵亂遁逃未知所在齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔許莊公弟以居許東偏東鄙也使公孫獲處許西偏公孫獲鄭大夫杜氏曰許頴川許昌縣按欲得許者鄭志也遂破許者鄭力也特以協兵齊魯故陽不有其功鄭則外假存許之名遂剖分其地魯隠餌於祊之小利既與之伐宋為鄭復怨又與之伐許為鄭益地春秋前書㑹以見伐許為鄭之本志後書及以見公之汲汲焉以趨鄭之事亦不待貶而其失自見矣㑹者外為主我所欲曰及胡傳隠公即位十有一年天王遣使來聘者再而未嘗朝于京師罪一也平王崩不奔䘮㑹葬至使武氏子來求賻罪二也禮樂征伐自天子出而擅興兵甲為宋而伐邾為鄭而伐宋罪三也山川土田各有封守上受之天王下傳之先祖而取郜及防入祊易許罪四也今又入人之國而逐其君罪五也凡此五不韙者人臣之大惡而隠公兼有之然則不善之殃豈特始於惠成於桓而隠之積惡亦不可得而揜矣使隠公者為國以禮而自强於善豈有鍾巫之難乎是故春秋所載以人事言則是非善惡之迹設施於前而成敗吉凶之效見於後以天道言則感應之理明矣不可不察也孔氏曰許姓姜四岳伯夷之後頴川許縣故許國漢世名許縣耳魏武改曰許昌冬十有一月壬辰公薨左傳羽父請殺桓公將以求太宰公曰為其少故也吾將授之矣使營菟裘魯邑在泰山梁父縣南吾將老焉羽父懼反譖公于桓公而請弑之公之為公子也與鄭人戰于狐壤狐壤鄭地止焉内諱獲故言止鄭人囚諸尹氏鄭大夫賂尹氏而禱于其主鍾巫主尹氏所主遂與尹氏歸而丘其主立鍾巫于魯十一月公祭鍾巫齊于社圃圍名館于寪氏于委反魯大夫壬辰羽父使賊殺公于寪氏立桓公而討寪氏有死者欲以弑君之罪加寪氏陽討其家有死者無正名謬及之詞也不書葬不成䘮也公羊傳何以不書葬隠之也何隠爾弑也弑則何以不書葬春秋君弑賊不討不書葬以為無臣子也子沈子曰君弑臣不討賊非臣也子不復讎非子也葬生者之事也春秋君弑賊不討不書葬以為不繫乎臣子也公薨何以不地不忍言也榖梁傳公薨不地不書路寢之比故也隠痛也之不忍地也其不言葬何也君弑賊不討不書葬以罪下也程子曰人君終于路寢見卿大夫而終乃正終也薨于燕寢不正其終也薨不書地弑也賊不討則不書葬無臣子也朱子曰凡魯君被弑則書薨而以不地著之葢臣子隠諱之義聖人之微意也春秋輯傳卷一

body:
  text: 春秋輯傳巻二明王樵輯桓公元年春王正月公即位公羊傳繼弑君不言即位此其言即位何如其意也弑君欲即位故如其意以著其惡榖梁傳桓無王其曰王何也謹始也其曰無王何也桓弟弑兄臣弑君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也繼故不言即位正也故謂弑也繼故不言即位之為正何也曰先君不以其道終則子弟不忍即位也繼故而言即位是為與聞乎弑也繼故而言即位是為與聞乎弑何也曰先君不以其道終已正即位之道而即位是無恩於先君也此明統例耳與弑尚然况親弑者啖氏曰凡天子崩諸侯薨既殯而嗣子為君康王之誥是也未就阼階之位来年正月朔日乃就位南靣而改元縁始終之義一年不二君故不改于柩前定位之初縁臣民之心不可曠年無君故不待于三年喪畢之後春秋所書是也凡先君正終則嗣子踰年行即位禮榖梁云繼正即位正也此說是也文成昭襄哀等五公是此例也凡先君遇弑則嗣子廢即位之禮不忍行也榖梁云繼弑君不書即位正也此說是也莊閔僖三公是凡繼弑君而行即位禮非也榖梁云桓公繼弑君而行即位則是與聞乎弑也公羊云宣公繼弑君而行即位其意也是也問春秋朱子曰此是聖人據魯史以書其事使人自觀之以為鑒戒耳其事則齊桓晉文有足稱其義則誅亂臣賊子若欲推求一事之間以為聖人褒善貶惡專在于是竊恐不是聖人之意如書即位者是魯君行即位之禮繼故不書即位者是不行即位之禮若桓公之書即位則是桓公自正其即位之禮耳其他崩薨卒葬亦無意義胡傳桓與聞乎故而書即位著其弑立之罪深絶之也髙氏曰隠公被弑經但書薨而賊不見主名嗣君實與其故而無以為别則後之觀者安知賊之為誰乎故著其簒立之罪特書其自即位者以不弑自弑也美惡不嫌同辭或問桓非惠公之適子乎適子當立而未能自立是故隠公攝焉以俟其長而授之位乆攝而不歸疑其遂有之也是以至於見弑而惡亦有所分矣春秋曷為深絶桓也曰古者諸侯不再娶於禮無二適惠公元妃既卒繼室以聲子則是攝行内主之事矣仲子安得為夫人母非夫人則桓乃隠之庶弟安得為適子謂當立乎桓不當立則國乃隠公之國其欲授桓乃實讓之非攝也攝讓異乎曰非其有而居之者攝也故周公即政而謂之攝推己所有以與人者讓也故堯舜禪授而謂之讓惠無適嗣隠公繼室之子於次居長禮當嗣世其欲授桓所謂推己所有以與人者也豈曰攝之云乎以其實讓而桓乃弑之春秋所以惡桓深絶之也按惠公違禮再娶既以仲子為夫人則必以桓公為適嗣此等在惠公生時其論已定故隠公不敢違特以桓少而攝實攝也非讓也迹隠公之平生亦非能輕千乗之國者故謂其讓桓謂其探惠公之邪志而成之皆非其實其及鍾巫之禍者以桓既長矣而隠猶據乎其位眷戀遲回羽父疑其有不反之心故請殺桓公以求太宰使隠公因是決以授桓猶不為晚乃曰吾將授之矣使營菟裘吾將老焉其眷戀不決如此故羽父反譖公于桓公而請弑之反譖公者謂公欲殺桓也其事情本未實如此乃若桓公大惡又何攝讓異評哉三月公㑹鄭伯于垂鄭伯以璧假許田杜氏曰公以簒立而修好于鄭鄭因而迎之成禮于垂終易二田然後結盟盟在下垂犬丘衛地也左傳公即位修好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也公羊傳其言以璧假之何易之也易之則其言假之何為恭也曷為為恭有天子存則諸侯不得專地也許田者何魯朝宿之邑也諸侯時朝乎天子天子之郊有有上舊有皆字今去之朝宿之邑焉此邑也其稱田何田多邑少稱田邑多田少稱邑程子曰隠公八年鄭伯使宛來歸祊葢欲易許田魯受祊而未與許及桓弑立故為㑹以求之復加以璧祊薄于許故又加之以璧朝宿之邑先祖受之於先王豈可相易也故諱之曰假按假鄭伯之詞也春秋因而書之不没其實而足以見其失公羊曰為恭也春秋之時冒為非禮非義者皆必有詞以自文易田而曰假襲紀而曰朝夫子傷周之敝曰利而巧文而不慙於春秋著其事以見王化衰而人心之壞也甚矣鄭伯之欺也欲甚段之惡則其詞若不敢違姜氏之欲伐許而據之則其詞若己德之不足以有許而煦然於許叔者期以復奉其社稷而鄭國有請謁焉射王中肩而使勞王問左右皆為恭之類也夏四月丁未公及鄭伯盟于越左傳結祊成也胡傳垂之㑹鄭為主故稱㑹越之盟魯志也故稱及夫弑逆之人鄭與之盟以定其位其罪大矣杜氏曰越近垂地名按鄭莊挾桓之惡而有所要既得許田而後與之盟盟曰渝盟無享國葢定弑逆之賊而結以同好誓以不渝猶前者宋魯諸國黨州吁之意也左傳以為結祊成不知此與祊事迹若相承而情不復相涉矣秋大水書水災之始程子曰君德脩則和氣應而雨𤾉若桓行逆德而致隂沴宜也榖梁傳髙下有水災曰大水冬十月榖梁傳無事焉何以書不遺時也春秋編年四時具而後為年二年春王正月戊申宋督弑其君與夷及其大夫孔父初宋穆公舍其子馮而立宣公之子與夷使馮出居鄭與夷既立而鄭莊公欲納馮於宋於是自隠四年以後鄭宋交兵大抵以馮故也殤公不能以恩處親以義決疑而輕聽讒人之交鬭立十年十一戰民不堪命則信有之孔父職為司馬而不能諫律以大臣之道固不能無罪矣華督葢馮之黨也伺間乆矣至是因民心内離鄭援外固殺孔父而奪其兵權因弑殤公而人莫敢動召公子馮于鄭而立之以親鄭魯齊陳鄭皆有賂遂相宋公凡督之本末如此左氏殺孔父取其妻之説葢謬聞也而公羊義形於色之云亦縁文生義耳人臣死君難例書曰及孔父荀息仇牧皆是也而其人之賢否與其死之善不善則各存乎其事矣孔父先死而曰及書尊及卑也書大夫死其官也此臣子之分書法之常亦非所謂賢乎孔父之意也以為足以儆乎偷生苟免者則可耳啖氏曰孔字父美稱也孔氏之先皆以字連父後來以孔為氏亦以王父字耳左氏稱孔父嘉杜氏以為孔父名嘉字按父有時配名林父行父是也有時配字儀父孔父是也滕子來朝滕於隠十一年稱侯今稱子者杜氏以為時王所黜使時王能黜諸侯春秋豈復作乎趙氏以為在䘮前不見滕侯卒何以知在䘮况終春秋之世不復稱侯無説矣胡氏謂桓公弟弑兄臣弑君天下之大惡已不能討又先隣國而朝之故降而稱子以正其罪然以論今之朝桓者可也後之不復稱侯豈以祖世有罪而并貶其子孫乎惟沙隨程可乆以為春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕國隘小不堪大國之徴求甘自降爵以從殺禮其後子孫不復自振故終春秋之世常稱子聖人因其實而書之故鄭子産嘗争承曰昔天子班貢輕重以列鄭伯男也而使從公侯之貢懼弗給也敢以為請即其事也斯言也得事之情矣然考之於經諸侯降爵惟滕薛把滕初稱侯桓二年稱子薛初稱侯莊三十一年書伯以為自降可也把初稱侯莊二十七年稱伯僖二十三年稱子文十二年稱伯而襄二十九年來盟又稱子其升降不一又何耶豈因時王不能以周班序其常而伯者因得以己意進退之歟觀魯欲視邾滕邾滕既嘗為列國而又為人私屬二邾皆自附庸升而為子傳者以為數從齊桓請于天子命為諸侯由是觀之當時諸小國爵秩或自貶或為時所升降所以稱號無常春秋從其實而書之以志王章之亂耳不可以一義求也三月公㑹齊侯陳侯鄭伯于稷以成宋亂左傳㑹于稷以成宋亂賂故立華氏也以宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰故因民之不堪命先宣言曰司馬則然已殺孔父而弑殤公召莊公于鄭而立之以親鄭以郜大鼎賂公郜國所造器也故繫名於郜濟隂城武縣東南有北郜城齊陳鄭皆有賂故遂相宋公杜氏曰成平也宋有弑君之亂故為㑹欲以平之稷宋地徐邈曰宋雖已亂若諸侯討之則有撥亂之功不討則受成亂之責趙氏曰言宋之惡逆自此成以病内也曰安定胡氏曰成就也讀如三年有成之成程子宋弑其君而四國共成定之天下之大惡也字謝氏曰去其亂之謂平遂其事之謂成愚按成之義諸家之説恐杜氏為優葢春秋不過直書事實而美惡自見魯桓欲為宋馮華督定其國事而曰吾以平乎宋亂葢猶托於誷息之名也春秋因而書之若作成遂之成恐非直書事實而美惡形于言外之意以宋災故書法例之固亦不合也宋災故亦是書事實若成遂宋亂則是聖人加以此字矣胡傳邾定公時有弑父者公瞿然失席曰是寡人之罪也嘗舉斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在官者殺無赦殺其人壞其室洿其宫而瀦焉葢君踰月而後舉爵華督弑君之賊也而桓與諸侯㑹而受賂立華氏使相宋公甚矣故特書其所為去聲而曰成宋亂夫臣為君隠禮也此其目言之何曰成宋亂而不言立華氏猶為有隠乎爾春秋列㑹未有言其所為者獨此與襄公末年㑹于澶淵各書其事者桓弑隠督弑殤般弑景皆天下大惡聖人所為懼春秋所以作也一則受宋賂而立華氏一則謀宋災而不能討故特書其事以示貶趙氏曰公羊云内大惡諱其目言之何逺也按逆祀僖公昭公出孫皆書之若以年逺不諱則桓公為齊所殺何不明書乎可諱則諱可譏則譏不以逺近為異也夏四月取郜大鼎于宋戊申納于大廟郜古報反大音泰左傳非禮也臧哀伯魯大夫僖伯之子諫曰君人者將昭德塞違以臨照百官百官於是乎戒懼而不敢易紀律今滅徳立違立華督逆亂之臣而寘其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公不聴公羊傳此取之宋其謂之郜鼎何宋始以不義取之故謂之郜鼎納于太廟何以書譏何譏爾遂亂受賂納于太廟非禮也榖梁傳桓内弑其君外成人之亂受賂而納以事其祖非禮也其道以周公為弗受也郜鼎者郜之所為也以是為討之鼎也曰宋取之宋也秋七月紀侯來朝紀左作把下入紀同今從公榖左傳把侯來朝不敬把侯歸乃謀伐之程子曰凡把稱侯者皆當為紀把爵非侯文誤也及紀侯大去其國之後紀不復稱侯矣祭侯鄭伯㑹于鄧此楚患之始左傳始懼楚也公羊傳鄧與㑹爾胡傳按左氏曰始懼楚也其地以國鄧亦與焉楚自西周已為中國之患宣王葢嘗命將南征矣及周東遷僭號稱王慿陵江漢此三國者地與之鄰是以懼也其後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人葢傷之也夫天下莫大于理莫强于信義循天理惇信義以自守其國家荆楚雖大何懼焉不知本此事醜德齊莫能相尚則以地之大小力之强弱分勝負矣觀春秋㑹盟離合之迹而夷夏盛衰之由可考也觀春秋進退予奪抑揚之旨則知安中夏待四夷之道矣孔氏曰楚芊姓顓頊之後也其後有鬻熊事周文王早卒成王封其曾孫熊繹于楚以子男之田居丹陽今南郡枝江是也熊達始稱武王武王居郢今江陵是也楚世家稱武王使隨人請王室尊吾號王弗聴楚王怒乃自立為楚武王是楚武王始僭號稱王也劉炫云號為武武非諡也武王十九年隠公元年也杜氏曰潁川召陵西南有鄧城孔氏曰釋例以此潁川鄧城為蔡地其鄧國則義陽鄧縣是也以鄧是小國去蔡路逺蔡鄭不宜逺㑹其都且蔡鄭懼楚始為此㑹何當反求近楚小國而與之結援故知非鄧國也按此説是九月入紀左傳討不敬也榖梁傳我入之也杜氏曰不稱主帥微者也弗地曰入程子曰將卑師少外則稱人内則止言入某伐某公及戎盟于唐左傳修舊好也惠隠之好冬公至自唐此書至之始左傳告于廟也凡公行告于宗廟反行飲至舍爵䇿勲焉禮也爵飲酒器也既飲置爵則書勲勞于䇿言速紀有功也按此當移于十六年至自伐鄭之下特相㑹往來稱地讓事也特相㑹公與一國㑹也㑹必有主二人獨㑹則奠肯為主兩讓㑹事不成故但書地自參以上則往稱地来稱㑹成事也成㑹事稱諸書至自㑹者所㑹悉非魯地故知四處至地者皆魯地故耳左氏不達内外異詞之例故云云啖氏曰凡公行總一百七十有六書至者八十有二不書至者九十有四此因時君告廟不告廟也左氏傳桓二年公至自唐曰告于廟也此説是告廟則書之于䇿故夫子隨其所致而書以示功過且志其去國逺邇遲速也其有一出而涉兩事者則或致前事若僖六年伐鄭救許書至自伐鄭之類或致後事若僖四年侵蔡伐楚書至自伐楚之類葢夫子擇其重者志之也程子曰君出而書至者有三告廟也過時也危之也桓公弑立嘗與鄭齊陳㑹矣皆同為不義及逺與戎盟故危之而書至戎若不如三國之黨惡則討之矣居夷浮海之之意也中國既不知義夷狄或能知也附録左傳初晉穆侯之夫人姜氏以條晉地之役生太子文侯也命之曰仇意取於戰相仇怨其弟以千畆之戰生命之曰成師桓叔也西河介休縣西南有地名千畆意取能成其衆師服曰異哉君之名子也師服晉大夫嘉耦曰妃怨耦曰仇今君命太子曰仇弟曰成師始兆亂矣兄其替乎穆公愛少子桓叔俱取於戰以為名所附意異故師服知桓叔之黨必盛於晉以傾宗國故因名以諷諫惠魯惠公之二十四年晉始亂文侯卒子昭侯元年危不自安故封桓叔于曲沃師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿置側室側室衆子也得立此一官大夫有貳宗適子為小宗次子為貳宗以相輔貳士有隷子弟庶人工商各有分親皆有等衰初危反是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎惠之三十年晉潘父晉大夫弑昭侯而納桓叔不克晉人立孝侯昭侯子也惠之四十五年曲沃莊伯桓叔子伐翼晉國所都弑孝侯翼人立其弟鄂侯鄂侯生哀侯哀侯侵陘庭之田翼南鄙邑陘庭啓曲沃伐翼三年春正月胡傳桓公三年而後經不書王有以為周不班厯者昭公末年王室有子朝之亂豈暇班厯而經皆書王非不班厯明矣又有以為此闕文也安得一公之内凡十四年皆不書王其非闕文亦明矣然則云何桓公弑君而立至于今三年而諸侯之䘮事畢矣是入見受命於天子之時也而王朝之司馬不施殘執之刑鄰國之大夫不聞有沐浴之請魯之臣子義不戴天反面事讐曾莫之恥使亂臣賊子肆其凶逆無所忌憚人之大倫滅矣故自是而後不書王者見桓公無王與天王之失政而不王也按不班厯是杜氏之説周雖不班厯月仍是王正月豈得不書且書王本以見奉周之正朔耳豈關班厯與不班也要之闕文之説是也魯史非一手桓公之篇有數年舊史偶皆不書王夫子以非大義所關因之而未嘗益耳附録左傳春曲沃武公伐翼次于陘庭韓萬御戎梁宏為右武公曲沃莊伯子也韓萬莊伯弟也御戎僕也右戎車之右逐翼侯于汾隰汾水邊獲之史記曰陘庭與曲沃武公伐晉于汾旁虜哀侯晉人乃立哀侯子小子為君是為小子侯公㑹齊侯于嬴音盈左傳㑹于嬴成昏于齊也杜氏曰公不由媒介自與齊侯㑹而成昏非禮也嬴齊邑今泰山嬴縣按桓以簒弑得國懼天下之討而結强隣以自固夫婚姻之有媒妁所以别嫌明微重大昏之始也今桓親為㑹以成約于齊匪媒而昏合不以正也以昏事越境㑹不以正也使私人往逆逆不以正也為齊侯親送至讙而親迎迎不以正也焉有始之不正而能以正終者乎求逭弑君之討而終殞于齊天也其後莊公躬納幣于齊盛飾禰宫以夸女成其婦之驕恣造端實始於此父之行子之效以致敗倫亂國歴數傳而未已可不謹哉夏齊侯衛侯胥命于蒲左傳不盟也公羊傳胥命者何相命也何言乎相命近正也此其為近正奈何古者不盟結言而退榖梁傳胥之為言猶相也相命而信諭謹言而退以是為近古也是必一人先其以相言之何也不以齊侯命衛侯也荀子大略篇春秋善胥命而詩非屢盟其心一也朱子曰盟詛畢竟非君子之所為故曰君子屢盟亂是用長將欲變之非去盟崇信俗不得而善也故伊川有言凡委靡隨俗者不能隨時惟剛毅特立乃所以隨時斯言可見矣問張洽尋常如何理㑹胥命曰嘗考之矣當從劉侍讀之説自王命不行則諸侯上僭之事由階而升然必與勢力之不相上下者共為之所以布於衆而成其僭也齊衛當時勢敵故齊僖自以為小伯而黎人責衛以方伯之事當時王不敢命伯而欲自為伯故於此彼此相命以成其私也及其乆也則力之能為者專之矣故桓公遂自稱伯以至戰國諸侯各有稱王之意不敢獨稱於國必與勢力之相侔者共約而為之齊魏㑹于苴澤以相王是也其後七國皆王秦人思有以勝之於是使人致帝于齊約共稱帝豈非相帝乎自相命而至于相王自相王而至于相帝僭竊之漸至於此豈非其明證乎曰然則左傳所謂胥命于弭何也曰此以納王之事相遜相先也曰說亦有理汪氏曰竊考莊二十一年鄭虢胥命于弭同謀納王不可云相命以伯况齊衛胥命之後不聞有㑹盟侵伐之事僅能一戰于郎一盟惡曹皆以鄭忽之故則非相推為伯矣杜氏曰蒲衛地在陳留長垣縣西南六月公㑹紀侯于盛紀左傳作把盛左作郕左傳把求成也汪氏曰程子云把稱侯皆當為紀左傳云把求成也因入把而附㑹與紀魯自是交好左傳把亦合作紀因討求成事自如此但字誤耳秋七月壬辰朔日有食之既榖梁傳言日言朔食正朔也既盡也胡傳榖梁曰既盡也言日言朔食正朔也凡二十六此年莊二十五二十六三十僖五文十五成十六十七襄十四二十二十一再二十三二十四再二十七昭七十五十七二十一二十二二十四三十一定五十二十五言朔不言日食既朔也桓十七朔之明日也言日不言朔食晦日也凡七隠三僖十二文元宣八十十七襄十五不言日不言朔夜食也凡二莊十八僖十五何以知其夜食曰王者朝日王者朝日則何以知其夜食乎日始出而有虧傷之處未之復也則知其食於夜矣日者衆陽之宗人君之象而有食之既則其為變大矣先儒以為荆楚僭號鄭拒王師之應杜氏曰厯家之說謂日光以望時遙奪月光故月食日月同㑹月掩日故日食食有上下者行有髙下日光輪存而中食者相揜密故日光溢出皆既者正相當而相揜間疏也然聖人不言月食日而以自食為文闕於所不見公子翬如齊逆女程子曰翬於隠世不稱公子隠之賊也於桓世稱公子桓之黨也卿逆夫人於禮為稱翬雖尊屬當官而行亦無嫌也按桓為嬴之㑹乞婚於齊逆女豈無他卿而使翬往使之重自結也桓之翬宣之遂一也胡文定謂紀侯於魯以小大言則親之者也而使履緰來魯侯於齊以逺邇言則親之者也而使公子翬往失其節矣愚謂先王制禮以定分縁宜以制禮五等邦君一也以小而親迎大則否以邇而親迎逺則否是大小以勢論逺邇以情遷縁宜定分之意安在哉親迎義見隠公二年榖梁謂逆女親者也使大夫非正也杜氏謂禮君有故則使卿逆葢皆執禮有親迎之文而云非定論也九月齊侯送姜氏于讙讙呼官反左傳齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之公羊傳何以書譏何譏爾諸侯越境送女非禮也此入國矣何以不稱夫人據讙魯地自我言齊父母之於子雖為隣國夫人猶曰吾姜氏榖梁傳禮送女父不下堂母不出祭門廟門也諸母兄弟不出闕門闕兩觀也在祭門之外父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般步干反本作鞶申之曰謹慎從爾父母之言送女越境非禮也杜氏曰讙魯地濟北蛇丘縣西有下讙亭已去齊國故不言女未至于魯故不稱夫人公㑹齊侯于讙榖梁傳無譏乎曰為禮也齊侯來也公之逆而㑹之可也程子曰齊侯出疆送女公逺㑹之皆非義也夫人姜氏至自齊公羊傳翬何以不致得見乎公矣榖梁傳其不言翬之以来何也公親受之于齊侯也杜氏曰告于廟也胡傳不能防閑兆于是矣按翬逆女齊侯送姜氏于讙公㑹齊侯于讙此文姜之始也公與夫人姜氏遂如齊公薨于齊此文姜之終也公如齊納幣公如齊逆女夫人姜氏入大夫宗婦覿用幣此哀姜之始也夫人姜氏孫于邾公子慶父出奔莒此哀姜之終也春秋據事而書讀者比事而觀而幾微著監戒昭矣冬齊侯使其弟年來聘左傳冬齊仲年來聘致夫人也趙氏曰按成九年季孫行父如宋致女仲尼書之以示譏此若致女亦當書之不容於隠左氏見彼有致女之文此又新婚之後而至遂附㑹耳程子曰稱弟義見隠七年有年公羊傳有年何以書以喜書也大有年何以書亦以喜書也此僅曰有年何僅有年也彼其曰大有年何宣十六年大豐年也僅有年亦足以當喜乎恃有年也榖梁傳五榖皆熟為有年也楊士勛曰凡書有年於冬下五榖畢入計用豐足然後書之愚按諸公之不書有年不勝其書也獨桓有年宣大有年書於經者或以為祥曰凡豐年皆告于宗廟勤民而敬先也是未達春秋不書祥瑞之意况以豐年為祥則適見其年不常豐矣年若常豐則常事不書又何書祥之有或以為紀異曰桓宣獲罪於天宜得水旱凶災之譴今乃有年則是反常也故以為異而存耳夫桓宣行惡而宜得天譴固矣民則何辜天降之有年正見人不恤民而天勤之也春秋乃不以為喜而以為異乎考於經元年大水五年旱螽八年建酉之月未霜而雪十三年又大水十四年無冰御廪災咎徴疊見惟此年以有年書見年為民之命國之所以存亡而深為人君不德召災之戒也昔紂之亡也不有康食葢上無善政而民得豐年猶或可以自存也歲復比不登則民始不堪而天之欲亡其國也決矣朱子言為政者當順五行脩五事以安百姓若曰賑濟於凶荒之餘處之縱善所惠淺矣知此則知春秋書有年之義矣四年春正月公狩于郎此蒐狩之始榖梁傳四時之田皆為宗廟之事也春曰田夏曰苖秋曰蒐冬曰狩四時之田用三焉唯其所先得一為乾豆上弑中心死速乾之以為豆實可供祭祀二為賓客次殺射髀骼死差遲三為充君之庖下殺中腸汚死最遲先宗廟次賓客後庖厨尊神敬客之義啖氏曰蒐狩合禮者常事不書非時及越禮則書趙氏曰四時之田其事各殊其名亦異春以閲武擇材故以蒐為稱夏以為苗除害故以苗為名秋則順天時以殺物故以獮為義冬則因守禽獸以習戰故以狩為目左氏曰春蒐夏苗秋猶冬狩是也周禮爾雅並同此說公羊則曰春曰苗秋曰蒐冬曰狩榖梁之説已見上公羊榖梁冬狩秋蒐並同而苖則公羊在春榖梁在夏公羊則夏時無名榖梁則春曰田田者四時獵之總名不當專在於春故非也公羊之義夏時務農不苗然則自非警急及有獸害苗則不苗也程子曰公出動衆皆當書于郎逺也何氏曰禮諸侯田狩不過郊已有三牲必田狩者先王之意以為己之所養不如天地自然之牲逸豫肥美禽獸多則傷五榖因習兵事又不空設故因以捕禽獸所以供承宗廟示不忘武備又因以為田除害杜氏曰冬獵曰狩行三驅之禮得田狩之時故傳曰書時禮也周之春夏之冬也田狩從夏時郎非國内之狩地故書地孔氏曰田狩之地須有常者古者民多地狹唯在山澤之間乃有不殖之地故天子諸侯必於其封内擇隙地而為之僖三十三年傳曰鄭之有原圃猶秦之具囿也魯則大野是也是其諸國各有常狩之處違其常處則犯害民物故書地以譏之狩于禚蒐于紅及比蒲昌間皆非常地故書地夏天王使宰渠伯糾來聘左傳父在故名杜氏曰宰官渠氏伯糾名也王官之宰當以才授位而伯糾攝父之職出聘列國故書名以譏之國史之記必書年以集此公之事書首時以成此年之歲故春秋有空時而無事者今不書秋冬首月史闕文他皆放此今按此年與七年不書秋冬二時胡文定謂古者賞以春夏刑以秋冬象天道也桓弟弑兄臣弑君而天討不加是陽而無隂歲功不能成矣故特去秋冬二時以志當世之失刑也獨於四年七年闕者前此猶有望焉至於宰糾下聘天王無復可望矣穀鄧自逺來朝諸侯無復可望矣此説近鑿謂聖人有意筆某字去某字以寄褒貶朱子猶謂非本音心况去天時乎不如杜氏言闕文之為長也宰渠伯糾左氏謂父在故名若果代父攝行卿事當依仍叔之子為文今但名之何自見其攝父之職乎此與宰咺同例皆貶也朱子曰桓公有兩年不書秋冬説者謂以喻時王不能賞罰若如是孔子亦可謂大迂闊矣又曰桓公不書秋冬史闕文也或謂貶天王之失刑不成議論可謂亂道矣五年春正月甲戌己丑陳侯鮑卒左傳再赴也於是陳亂文公子佗殺太子免而代之公疾病而亂作國人分散故再赴趙氏曰豈有正當禍亂之時暇競使人赴告哉假令實再赴夫子亦當詳定取其實日何乃總載之乎經文甲戌下當記陳佗作亂之事今簡脱之耳公羊傳曷為以二日卒之㤜也㤜呼迹反狂也齊人語甲戌之日亡己丑之日死而得君子疑焉故以二日卒之也啖氏曰人君雖狂而去亦當有臣子從之豈有人君走出臣下不追逐昧其死日乎榖梁傳春秋之義信以傳信疑以傳疑明實録也陳侯以甲戌之日出己丑之日得不知死之日故舉二日以包也范氏曰國君獨出必辟病潛行不按范說亦鑿今匹夫辟病潛行亦不至使人知其處况國君乎啖氏曰三傳皆不知有闕文之義故妄云耳夏齊侯鄭伯如紀左傳齊侯鄭伯朝于紀欲以襲之紀人知之程子曰齊侯欲為賊於鄰國不道之甚鄭伯助之其罪均矣胡傳此外相如耳何以書紀人主魯故來告其事魯史承告故書于䇿夫子存而弗削以著齊人滅紀之罪明紀侯去國之由劉敞意林所謂聖人誅意之效是也天王使仍叔之子來聘仍榖作任公羊傳仍叔之子者何天子之大夫也其稱仍叔之子何譏何譏爾譏父老子代從政也程子曰古之授任稱其才徳故仕無世官周衰官人以世故卿大夫之子代其父任事仍叔受命來聘而使其子代行也葬陳桓公不書月史失之城祝丘譏不時也據文姜享齊侯于祝丘則祝丘齊魯兩境上邑齊將襲紀故魯非時城此以備之秋蔡人衛人陳人從王伐鄭左傳王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父王卿士將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉黑肩周桓公也鄭子元請為左拒以當蔡人衛人子元鄭公子拒方陳為右拒以當陳人曰陳亂民莫有鬬心若先犯之必奔攻瑕之術王卒顧之必亂蔡衛不支固將先奔既而萃於王卒可以集事從之曼伯檀伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫司馬法車戰二十五乗為偏以車居前以伍次之承偏之隙而彌縫闕漏也五人為伍此葢魚麗陳法戰于繻葛鄭地命二拒曰旝動而鼓旝古外反旃也通帛為之葢今大將之麾也執以為號令一云建大木置石其上發機以磓敝蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝􅆅射王中肩王亦能軍祝􅆅請從之公曰君子不欲多上人况敢陵天子乎苟自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右祭足即祭仲之字葢名仲字仲足也按鄭自王貳于虢敢與天王交質子又稱兵以犯王略取其麥禾使鄭有臣如此能忍之乎入朝而不禮王之待鄭亦已恕矣土地天子所與非己所有鄔劉蒍䢴之田天子視鄭為内臣故易之而不嫌而鄭自是遂與周絶積其不臣之罪王討加之豈曰為過而鄭無一介之辭以自解謝遂抗王旅祝􅆅逆節加于王身天理滅矣人道絶矣此春秋之所以作也或者乃謂王視宋魯弑君而莫之討鄭伯不朝猶薄乎云爾而自將以攻之以此咎王謂不稱天者譏王失天討也嗚呼周室之衰典禮政刑顛倒錯紊春秋於歸賵來聘來求車求賻之類一書再書以見王之失道不啻明甚矣今鄭抗敗王師射王中肩為人理之大變人之所不忍言是猶有人焉為其僕隸所賊扶傷僅免為士師者未遑正其僕隷之罪而問其主之失馭不亦舛乎發禁命事方國畢㑹此天王征討之體也今書曰蔡人衛人陳人從王伐鄭則王能以其朋從而已夷於列國非能聲罪致討號召諸侯也蔡衛陳與鄭素怨耦也豈真有從王之義哉濟其私耳且陳佗新殺太子而自立王如不知而以其師從既昧於大義矣陳亂民莫有鬭心鄭子元知之而王不知卒以此敗是又懵於見事也用罔之凶應如影響可不戒哉程子曰王師於諸侯不書敗諸侯不可敵王也於外域不書戰外域不能抗王也大雩此書雩之始左傳書不時也凡把啓蟄而郊啓蟄夏正建寅之月祀天南郊龍見而雩龍見建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天逺為百穀祈膏雨始殺而嘗建酉之月隂氣始殺嘉穀始熟故薦嘗於宗廟聞蟄而烝建亥之月昆蟲閉户萬物皆成可薦者衆故烝祭宗廟過則書公羊傳大雩者何旱祭也然則何以不言旱言雩則旱見言旱則雩不見何以書記災也趙氏曰凡祈澤曰雩陸氏曰凡祈雨祭畢星及山林川澤稱大國徧雩也今按大雩當從程子說左氏云龍見而雩過則書又曰書不時也葢並謂建巳之月為不時耳若然則何用書大哉雩者為旱書也以明旱而雩有益也憂民故書之與書不雨義同榖梁云雩得雨曰雩不得曰旱此說是也程子曰成王尊周公故賜魯重祭得郊禘大雩大雩雩于上帝用盛樂也諸侯雩于境内之山川耳成王之賜魯公之受皆失也故夫子曰魯之郊禘非禮也周公其衰矣大雩歲之常祀不能皆書故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書螽公作􅏑公羊傳􅏑何以書記災也程子曰螽蝗也既旱又蝗饑不在書也冬州公如曹左傳淳于公如曹度其國危遂不復淳于州國所都城陽淳于縣也公羊傳外相如不書此何以書過我也榖梁同程子曰州公嘗為王三公故稱公張氏曰州稱公與祭公同則州必畿内之地河内州縣也杜氏曰曹國今濟隂定陶縣六年春正月寔來左傳自曹來朝書曰寔來不復其國也杜氏曰言奔則來行朝禮言朝則不復其國故變文言寔來程子曰五年冬如曹尚為君也故以諸侯書之今不能反國則匹夫也故名之來來魯也忽稱鄭忽明其正也寔不稱州亡其國矣按寔州公名也程胡皆以為名公羊云寔來者猶曰是人來也榖梁云寔來是來也杜預云寔實也皆謬州公之類大率國微不能自存春秋書以閔之見時無明王賢伯肆大侵小以至此耳夏四月公㑹紀侯于成成榖作郕左傳㑹于成紀來諮謀齊難也杜氏曰成魯地在泰山鉅平縣東南秋八月壬午大閱公羊傳大閱簡車徒也杜氏曰非時簡車馬孔氏曰大閲禮在仲冬今農時閱兵必有所為程子曰為國之道武備不可廢必于農隙講肄保民守國之道也盛夏大閱妨農害人失政之甚無事而為之妄動也有警而為之教之不素何以保其國乎蔡人殺陳佗陸氏曰佗雖踰年本簒弑之賊故不成之為君與無知同李亷曰討賊例已見州吁下公穀之說皆傳聞之謬耳獨程子曰蔡人雖以私殺之而春秋與以討賊者廣為義之塗也此善發明聖經矣愚按衞州吁之誅雖執于陳人而𤼵之者石碏涖殺之者又衞人也故與以國討而曰衞人殺州吁于濮陳佗立踰年矣陳國之臣子未聞有明其為賊者使非其淫獵輕出自隕其首於蔡人則遂成為君矣故書蔡人殺陳佗若曰陳之賊蔡人殺之耳胡文定乃謂名佗以善陳國之不以為君恐未是九月丁卯子同生左傳以太子生之禮舉之接以太牢卜士負之士妻食音嗣之公與文姜宗婦命之公問名於申繻魯大夫對曰名有五有信有義有象有假有類以名生為信若唐叔虞魯公子友以德命為義若文王名昌武王名發以類命為象若孔子首象尼邱取於物為假若伯魚生人有饋之魚因名之鯉取於父為類若子同生不以國不以山川不以隠疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山二山具敖也魯獻公名具武公名敖更以其鄉名山是以大物不可以命公曰是其生也與吾同物物類也謂同日命之曰同杜氏曰十二公唯子同是嫡夫人之長子備用太子之禮故史書之于䇿胡傳適冢始生即書于䇿與子之法也唐虞禪夏后殷周繼春秋兼帝王之道賢可禪則以天下為公而不拘於世及之禮子可繼則以天下為家而不必於讓國之義萬世之通道也與賢者貴於得人與子者定於立嫡傳子以嫡天下之達禮也故有君薨而世子未生之禮植遺腹朝委裘而天下不亂者以名分素明而民志定也經書子同生所以明與子之法正國家之本防後世匹嫡奪正之事垂訓之義大矣此世子也其不曰世子何也天下無生而貴者誓于天子然後為世子冬紀侯來朝左傳請王命以求成于齊公告不能紀微弱不能自通于天子欲因公以請王命七年春二月己亥焚咸丘程子曰古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也咸丘地名焚其地見其廣也杜氏曰焚火田也咸丘魯地高平鉅野縣南有咸亭孔氏曰不言蒐狩者以火田非蒐狩之法直書焚以譏盡物也夏穀伯綏來朝鄧侯吾離來朝公羊傳皆何以名失地之君也其稱侯朝何貴者無後待之以初也穀梁傳其名何也失國也失國則其以朝言之何也嘗以諸侯與之接矣雖失國弗損吾異日也杜氏曰不總稱朝者各自行朝禮也穀國在南鄉筑陽縣此愚按穀在襄陽府穀城縣鄧在鄧州皆去魯絶逺古者隣國世相朝魯在泰山之下穀鄧在方城之外兩君之好不相及也以事情論之二國實密邇於楚二君來朝而不返有迫而播越也公穀必有所受矣州公穀鄧皆志遷寓也州公止魯故曰來穀鄧朝魯之後復之他地不止魯故曰來朝附録左傳冬曲沃伯武公也誘晉小子侯哀侯子殺之八年春正月己卯烝公羊傳烝者何冬祭也春曰祠夏曰礿予若反秋曰嘗冬曰烝常事不書此何以書譏亟也杜氏曰此夏之仲冬非過也為五月再烝見凟書程胡同啖氏曰凡宗廟之禮有常四時之祭雖失其月亦非大故皆不書其失時及失禮之大者乃書左氏云始殺而嘗閉蟄而烝過則書公羊云春曰祠夏曰礿秋曰嘗冬曰烝常事不書此說皆是趙氏曰四時之祭皆用夏時從物宜也周雖以建子為正至于祭祀則用夏時本月以行四時之祭故桓八年正月烝則夏之仲冬也凡四時之祭用孟月若有故及日不吉即用仲月若又有故及日不吉即用季月天王使家父來聘胡傳下聘弑逆之人而不加貶何也既名冢宰於前其餘無責焉乃同則書重之義家氏父字天子大夫附録左傳春滅翼曲沃滅之夏五月丁丑烝正月既烝矣非時復烝譏黷也秋伐邾孫氏曰桓大惡諸侯宜討之而獲安其位反以兵伐人之國故直稱伐邾冬十月雨雪而于付反程子曰建酉之月未霜而雪書異也隂陽方中而寒氣先至此積隂侵陽之象附録左傳王命虢仲王卿士虢公林父立晉哀侯之弟緡亡巾反于晉祭公來遂逆王后于紀書遂始此公羊傳祭公天子之三公也何以不稱使婚禮不稱主人大夫無遂事此其言遂何成使乎我也其成使乎我奈何使我為媒可則因用是往逆矣女在其國稱女此其稱王后何王者無外其辭成矣杜氏曰天子娶于諸侯使同姓諸侯為之主祭公來受命而迎也天子無外故因稱王后卿不書舉重略輕孔氏曰凡言遂者因上事生下事之辭既書其來又言遂逆是先來見魯君然後向紀知王使魯主昏故祭公來受魯命而往逆也凡昏姻皆賓主敵體以致辭命相往覆天子嫁女於諸侯使諸侯為主令與夫家為禮天子聘后於諸侯亦使諸侯為主令與后家為禮嫁王女者王姬至魯而後至夫家其王后昏后不來至魯者以王姬至魯待夫家之逆以為禮故須至魯后則王命已成於魯無事故即歸京師於逆稱王后舉其得王之命后禮已成於歸稱季姜申父母之尊言子尊不加於父母從父母之家而將歸于王據父母之家為文也公不獨行必有卿副卿不書舉重略輕也何氏曰昏禮成於五先納采問名納吉納徴請期然後親迎時王遣祭公來使魯為媒可則因用魯往迎之不後成禮疾王者不重妃匹逆天下之母若逆婢妾故譏之不言如紀者辟有外文范氏曰四海之濱莫非王臣王命紀女為后則已成王后不如諸侯入國乃稱夫人程子曰祭公受命逆后而至魯先行私禮故書來而以逆后為遂事責其不䖍王命而輕天下之母也問或說逆王后使魯為主如何曰只是王姬下嫁則同姓諸侯為主逆王后無使諸侯為主之理九年春紀季姜歸于京師公羊傳紀季姜歸于京師其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜京師者何天子之居也京者何大也師者何衆也天子之居必以衆大之辭言之穀梁傳為之中者歸之也中如字范氏調中謂關與婚事則謂導達兩間為中不宜作去聲夏四月秋七月冬曹伯使其世子射姑來朝射音亦左傳冬曹太子來朝賓之以上卿禮也諸侯之適于未誓於天子而攝其君則以皮帛繼子男故賓之以上卿各當其國之上卿享曹太子初獻樂奏而歎施父魯大夫曰曹太子其有憂乎非歎所也穀梁傳朝不言使言使非正也使世子伉諸侯之禮而来朝曹伯失正矣諸侯相見曰朝以待人父之道待人之子以内為失正矣世子可以已矣尸子曰夫已多乎道程子曰君有疾而使世子出取危亂之道也胡傳周官典命凡諸侯之嫡子誓于天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出㑹朝聘之儀矣然攝其君繼子男者謂諸侯朝于天子有時而不敢後故老疾者使世子攝己事以見天子急述職也諸侯間於王事則相朝其禮本無時曹伯既有疾何急於朝桓而使世子攝哉十年春王正月庚申曹伯終生卒夏五月葬曹桓公秋公㑹衞侯于桃丘弗遇杜氏曰衞侯與公為㑹期中背公更與齊鄭故公獨往而不相遇也桃丘衞地濟北東阿縣東南有桃城按桓初簒立即結鄭齊以自固至是不知何以相失衞與公為㑹期亦不知為何事即其中變而更與齊鄭觀之則其事端在齊鄭可知此為戰郎張本也冬十有二月丙午齊侯衞侯鄭伯來戰于郎左傳齊衞鄭來戰于郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師于齊齊人以衞師助之故不書侵伐先書齊衞王爵也穀梁傳來戰者前定之戰也言戰則敗也胡傳加兵于魯未有書來戰者桓弑立天下大惡人人之所得討也鄭則首與之盟齊則繼與之㑹尋及昏姻今特以私忿親帥其師戰于魯境故以三國為主而書來戰于郎趙氏曰不書及罪專于外也鄭人主兵而首齊猶謂州吁主兵而先宋也趙氏曰魯以周班後鄭既是正禮鄭雖小恨豈至興師即合當年搆禍豈有經五年之後方合諸侯報此小怨乎按魯鄭自易許田結祊成之後其交深矣至是而離必有其故以周班後鄭事雖乆逺要之釁由是生而中間必更有事與齊僖鄭莊皆喜亂之人也又濟之以衞宣是時齊方圖紀其嗛魯必以紀故與十有一年春正月齊人衞人鄭人盟于惡曹胡傳盟㑹皆君臣之禮故微者之盟㑹不志於春秋凡春秋所志必有君與貴大夫居其間者也惡曹之盟即三國之君矣既不以道興師為郎之戰又結怨固黨為惡曹之盟故前書其爵而以來戰著罪後書此盟而以奪爵示貶陳氏曰自有參盟莫甚于惡曹故畧之而不爵也鄭敗王師齊滅后之母家衞亦無王乆矣三國同惡相濟惡曹之盟即戰郎之諸侯其惡不待貶而見書人恐非其君夏五月癸未鄭伯寤生卒左傳夏鄭莊公卒初祭封人仲足有寵於莊公祭鄭地陳留長垣縣東北有祭城封人守封疆者因以所守為氏莊公使為卿為公娶鄧曼曼鄧姓生昭公故祭仲立之髙氏曰昭公不終于位五世兵革不息自入春秋考莊公之處心行事知其積不善必有餘殃矣陳氏曰春秋之初罪莫甚於鄭莊宋魯齊衞次之而父子兄弟之禍亦莫甚於此五國者是可為不善者之戒矣秋七月葬鄭莊公九月宋人執鄭祭仲此書執之始左傳宋雍氏女於鄭莊公曰雍姞生厲公雍氏姞姓宋大夫也以女妻人曰女雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之杜氏曰祭氏仲名不稱行人罪之穀梁傳宋人者宋公也曰人貶之也突歸于鄭杜氏曰文連祭仲故不言鄭榖梁傳突賤之也歸易辭也祭仲易其事權在祭仲也死君難臣道也今立惡而黜正惡祭仲也胡傳突不稱公子絶之也小白入于齊則曰齊小白明宜有齊也突不以繫之鄭明不當立也不當立則何以書歸春秋書歸有二義一易辭一順辭也其書入亦有二義一難詞一逆詞也汪氏曰公羊謂歸者出入無惡入者出入惡復歸者出惡歸無惡復入者出無惡入有惡然突歸鄭赤歸曹不可謂無惡許叔入許天王入成周不可謂出入惡鄭忽曹襄出無惡魚石欒盈出入有惡則其説不可通矣難易逆順之說為是鄭忽出奔衞此書奔之始程子曰忽以國氏正也不能有其位故不爵胡傳出奔而名不能君也按詩小序有女同車刺忽也太子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之今按忽之辭昏正也其言曰自求多福在我而已大國何為充是言也脩德行仁以興鄭國可也忽之終不能君也無濟亂之才憫之可也罪之不可也語曰出乎爾者反乎爾者也鄭莊之惡極矣姑以其施於隣國者言之如搆人父子兄弟之隙而成其亂州吁弑桓簒位則欲定之宋公子馮奔鄭則欲納之曲沃莊公伐翼則助之魯桓弑隠則易許田結祊成宋督弑殤公而立莊公則成宋亂分宋賂是時諸侯同惡相求如市賈焉宋之脅祭仲出忽立突即莊公之為也夫寵庶抑適亂之本也莊公以多内寵故祭仲語忽以子無大援將不得立謂鄭國之禍非莊公為之忽之不立非莊公致之也可乎刺忽之云鄙夫之言也胡氏復取之誤矣柔㑹宋公陳侯蔡叔盟于折折之説反又市列反公羊傳柔者吾大夫之未命者也杜氏曰蔡叔蔡大夫叔名折地闕按郎之戰主兵者鄭魯於是結三國以圖鄭而其重尤在宋也葢鄭莊已没宋脅祭仲立突而魯與忽有怨而助突故為此盟要言歃血初無忠信誠慤相與之心又以大夫盟公侯而不知其僭宋之合未堅則又屢為㑹以要之而不知其凟書之皆譏也公㑹宋公于夫鐘夫音扶鐘公作童杜氏曰夫鐘郕地冬十有二月公㑹宋公于闞闞口暫反杜氏曰闞魯地在東平須昌縣東南十有二年春正月夏六月壬寅公㑹紀侯莒子盟于曲池紀左作杞曲池公作歐蛇左傳平把莒也杜氏曰曲池魯地魯國汶陽縣北有曲水亭程子曰把侯皆當作紀隠二年紀莒盟于蔑是時紀謀齊難故魯桓與之盟莒以援之耳秋七月丁亥公㑹宋公燕人盟于穀丘杜氏曰燕人南燕大夫穀丘宋地張氏曰南燕姞姓國魯宋數㑹有故燕人偶與焉非與謀八月壬辰陳侯躍卒杜氏曰不書葬魯不㑹壬辰七月二十三日書于八月從赴公㑹宋公于虛去魚反公作郯冬十有一月公㑹宋公于龜丙戌公㑹鄭伯盟于武父左傳宋多責賂于鄭鄭不堪命此二句舊在十三年戰紀下今移之此公欲平宋鄭秋公及宋公盟于句古侯反凟音豆之丘句凟之丘即穀丘也宋成未可知也故又㑹于虛冬又㑹于龜宋公辭平宋公貪故與公三㑹而卒不與鄭平故與鄭伯盟于武父遂帥師而伐宋戰焉宋無信也杜氏曰虛與龜皆宋地武父鄭地陳留濟陽縣東北有武父地按盟折之後夫鐘與闞兩㑹猶或有他故至穀丘虛龜三㑹則全以助突之故矣左氏盡其本末丙戌衞侯晉卒穀梁傳再稱日決日義也范氏曰明二事皆當日也十有二月及鄭師伐宋丁未戰于宋胡傳既書伐宋又書戰于宋者責賂無厭屢盟無信者宋也二國聲罪致討故書曰伐夫宋人之罪固可伐矣然取其賂以立督者魯桓也資其力以簒國者鄭突也無諸己然後可以非諸人春秋之義用賢治不肖不以亂易亂也故又書曰戰于宋來戰者罪在彼戰于郎是也往戰者罪在内戰于宋是也按宋莊之得國鄭力也鄭突之得國又宋力焉其類同則其交宜固矣然宋莊之立華督之相于稷之成以齊魯陳鄭之皆有賂故也今宋以己之前日望鄭而不副以至于伐戰春秋書郜鼎之取以見宋魯鄭之交以賂合書武父之戰以見宋魯鄭之黨以賂離吁嚴矣哉十有三年春二月公㑹紀侯鄭伯已已及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績胡傳左氏以為鄭與宋戰公羊以為宋與魯戰穀梁以為紀與齊戰趙匡考據經文内兵則以紀為主而先於鄭外兵則以齊為主而先於宋獨取穀梁之説葢齊紀者世讐也齊人合三國以攻紀魯鄭援紀而與戰戰而不地於紀也不然紀懼滅亡不暇何敢恃兵越國助魯鄭以増怨乎齊為無道恃强淩弱此以紀為主何也彼為無道加兵于己必有引咎責躬之事禮義辨喻之文猶不得免焉則亦固其封疆效死以守上訴諸天子下告諸方伯其必有伸之者矣不如是而憒然與戰豈已亂之道乎徐邈曰禮柩在堂上孤無外事今衞宣未葬而嗣子稱侯以出其失禮明矣宋陳稱子而衞稱侯隨其所以自稱者而書之得失自見矣杜氏曰大崩曰敗績例在莊十一年或稱人或稱師史異辭也衞宣公未葬惠公稱侯以接隣國非禮也胡傳衞不稱子吉服從戎也其惡大矣按紀逼于齊鄭突以責賂而怨宋魯主紀因怨忽而助突此一兵也齊謀紀忽嘗有功于齊故齊主之宋以賂怨突而忽奔衞故衛主之此一兵也志各有在相糾合為此戰非一紀能主兵也紀侯爵故序鄭上非以紀主兵也胡傳罪紀恐未是抑是時紀弱不能自存齊志必在滅紀疑若無可為者然魯鄭一糾合為此戰而三國敗績則知列國若同心以助義小國能立己以自强則强暴豈能肆哉三月葬衞宣公胡傳葬自内錄也既與衞人戰曷為葬宣公怨不棄義怒不廢禮是知古人以葬為重也夏大水春秋書大水惟桓莊之世為多桓元年及是年五行志曰夫人驕淫將弑君隂氣盛桓不寤卒弑死莊七年大水亡麥苗董仲舒劉向以為莊公釋父讎復娶齊女未入先與之淫一年再出㑹于道逆亂之應也十一年宋大水董仲舒以為魯宋比年為乗丘鄑之戰百姓愁怨隂氣盛故二國俱水二十四年二十五年又俱大水亦以為哀姜不婦隂盛之應秋七月冬十月十有四年春正月公㑹鄭伯于曹杜氏曰脩十二年武父之好以曹地曹與㑹無冰何氏曰周之正月夏之十一月法當堅冰無冰者温也夏五不書月闕文鄭伯使其弟語來盟語穀作禦左傳鄭子人來尋盟且脩曹之㑹子人即弟語也其後為子人氏穀梁傳來盟前定也前定之盟不日秋八月壬申御廪災杜氏曰御廪公所親耕以奉粢盛之倉乙亥嘗左傳書不害也陸氏曰八月嘗非時也又以災之餘而祭譏不敬非為不害而書公羊傳常事不書此何以書譏何譏爾譏嘗也曰猶嘗乎御廪災不如勿嘗而已矣趙氏曰有災當警懼修飭而改卜何得便闕先君之祀乎穀梁傳御廪之災不志趙氏曰此乃大故何得不志此其志何也以為唯未易災之餘而嘗可也唯以未易災之餘而嘗然後可志也志不敬也用大焚之餘以祭宗廟非人子所以盡其心力天子親耕以供粢盛王后親蠶以供祭服國非無良農工女也以為人之所盡事其祖禰不若以己所自親者也何用見其未易災之餘而嘗也曰甸甸師粟而内之三宫三夫人三宫米而藏之御廪夫嘗必有兼甸之事焉趙氏曰注云夫人兼甸人之事恐謬此旬字耳言祭事當久辨非一旬所了壬申御廪災乙亥嘗以為未易災之餘而嘗也按嘗秋祭也以物成而薦新為義周之八月夏之六月非嘗之時而又以災餘不可也周官時享前期十日帥執事而卜日誓戒今壬申乙亥相距四日不卜不戒其不警天變不嚴宗廟不止未易災之餘而已趙氏曰祭統云成王追念周公賜之重祭郊社禘嘗是也按郊禘天子之禮社嘗諸侯常祭撰禮者見春秋書嘗社以為與郊禘同遂妄言耳汪氏曰郊禘天子之禮故孔子云魯之郊禘非禮也嘗社諸侯所有故春秋一書嘗譏以災餘祭宗廟四書社皆以日食大水鼓用牲之非禮而志餘不書以為常事也漢儒見春秋書郊社禘嘗遂謂皆成王所賜之重祭謬矣冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衞人陳人伐鄭公蔡人在衞人下左傳冬宋人以諸侯伐鄭報宋之戰也公羊傳以者何行其意也榖梁傳以者不以者也民者君之本也使人以其死非正也胡傳列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也陳氏曰東遷之後諸侯㑹伐非一國之志也有小國主兵而序大國之上亦非一國之志也上無天子下無方伯以一國而用諸侯之師於是始十有五年春二月天王使家父來求車左傳非禮也諸侯不貢車服天子不私求財公羊傳何以書譏何譏爾王者無求求車非禮也穀梁傳古者諸侯時獻于天子以其國之所有故有辭讓而無徴求求車非禮也求金甚矣三月乙未天王崩夏四月己巳葬齊僖公王氏曰桓負大惡王非唯不討而八年之間三遣使來聘恩禮厚矣今王崩來赴魯無奔䘮㑹葬之事齊僖之存干戈歲尋卒則㑹葬如禮比事以觀不貶而惡自見五月鄭伯突出奔蔡公羊傳突何以名奪正也左傳祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子于郊吾惑之以告祭仲殺雍糾尸諸周氏鄭大夫之汪池也公載以出曰謀及婦人宜其死也啖氏曰凡人君奔例書名者罪其失地言非復諸侯也或曰臣出其君其罪不彰無乃揜姦乎答曰出君之罪史氏知之也春秋舉王綱正君則而已按啖説朱瑩詳見襄十四年衛侯衎出奔齊下張氏曰凡國君而失位出奔皆以自出書之所以罪其自失也書爵不名者罪輕惡淺其位為未絶突以庶簒嫡藉權臣之力得不以正政由祭氏勢則自然不能明大義請諸天王方伯以誅其不道之臣而謀於私昵為盜賊揜殺之計事不克反為所逐又誰咎哉乃以謀及婦人為雍糾恨亦可嗤也已鄭世子忽復歸于鄭公羊傳其稱世子何復正也曷為或言歸或言復歸復歸者出惡歸無惡復入者出無惡入有惡入者出入惡歸者出入無惡此例未通説見突歸于鄭下程子曰稱世子本當立者不能保其位故不爵朱子曰既書鄭伯突又書鄭世子忽據史文而書耳又曰才書忽又書鄭忽又書鄭伯突胡文定便要説突有君國之德須要因鄭伯兩字上求他是處似此皆是杜撰大槩自成襄已前舊史不全有舛逸故所記各有不同若昭哀已後皆聖人親見其事故記得其實不至於有遺處如何却説聖人予其爵削其爵賞其功罰其罪是甚説話許叔入于許穀梁傳許叔許之貴者也莫宜乎許叔其曰入何也其歸之道非所以歸也范氏曰進無王命退非父授故不書曰歸胡傳許太岳之裔先王建國迫於齊鄭不得奉其社稷未聞可滅之罪也今乃因亂竊入則非復國之義故書入杜氏曰許叔莊公弟也隠十一年鄭使許大夫奉許叔居許東偏鄭莊公既卒乃入居位叔本不去國雖稱入非國逆例孔氏曰杜以傳例云凡去其國國逆而立之曰入故言許叔本不去國非國逆之正例其實許叔得還有國逆之理矣公㑹齊侯于艾艾公作鄗穀作蒿左傳謀定許也李亷曰許之失國本鄭莊欲滅而并之故糾合齊魯以為入許之役然又以三國共利難獨專滅國之罪齊魯既遜而不受則鄭不得不假許叔奉祀以倡存許之説其實許地已入于鄭矣今許叔乗鄭亂以入而齊魯㑹艾以定之葢鄭莊方强則二國挾鄭以為利鄭莊既卒則二國定許以為名㑹艾之謀欲以自解前日之失耳邾人牟人葛人來朝朱子曰書人恐只是微者然朝非微者之禮而有書人者此類亦不可曉胡傳人狄之也天王崩不奔䘮而相率朝弑君之賊也此本董于之説陳氏曰旅見非邦交之禮自參以上甚矣蜀杜氏曰聖人不與諸侯之朝桓獨來則損其爵滕子二國則貶而名穀鄧三國則人而賤之杜元凱以為附庸世子安得三國同時遣世子耶杜氏曰牟國在泰山牟縣葛國在梁國寧陵縣東北秋九月鄭伯突入于櫟音歴左傳鄭伯因櫟人殺檀伯鄭守櫟大夫而遂居櫟胡傳厲公復國書入于櫟何也若曰既入于櫟則其國已復矣夫制邑之死虢君共城之叛太叔皆莊公所親戒也今又城櫟而寘子元焉使昭公不立何謀國之誤也衞有蒲戚而出獻公楚有陳蔡不羮而叛棄疾末大必折國之害也木訥趙氏曰諸侯再入不至於國惟鄭突入櫟衞侯入夷儀而已鄭突名而衞衎不名衎書復歸于衞而突不書歸于鄭此正與不正之辨也衞衎之出國固其國也林父逐之而立剽不正也突之出位固非其位乃簒也突入櫟將迫兄而出之謀再簒也衎自夷儀入春秋書之以明衎之當有衞也突入鄭不書明突不當有鄭也家氏曰鄭有君而突自外竊入亦書鄭伯此因舊史之已書而存之以示戒魯桓與突同惡相濟出師輔簒至於再三故魯史崇突而卑忽以鄭伯書春秋因之以示戒程子所謂以戒居正之不能保也按諸家説春秋泥爵名人為予奪之義所存故説多而至于鑿惟朱子謂春秋大旨其可見者誅亂臣賊子内中國外夷狄貴王賤伯而已未必如先儒所言字字有義也如鄭忽突之事可見已突稱鄭伯家氏之説似得之但謂夫子因于魯史崇突而卑忽故書突曰鄭伯似未盡突據國數與諸侯盟㑹稱鄭伯矣故書曰鄭伯非予其為諸侯也忽雖正嫡而未踰年而出奔及突為祭仲所逐雖乗亂竊入而不與諸侯盟㑹無事可見不乆即為人所弑當時依其故稱曰鄭世子忽而已故春秋亦因其實而書之葢知鄭伯世子非予奪之義所存則知亦非魯史故崇突而卑忽而春秋因之矣諸家泥於爵號褒貶之例故未免文致忽之罪而以為力不足以君國故不成乎為君嗚呼君與不君果視其力與援也而成不成因之則曹馬諸雄孰非國人君之諸侯助之者也其亦害於義而傷於教矣豈春秋之㫖乎杜氏曰櫟鄭别都在河南陽翟縣冬十有一月公㑹宋公衞侯陳侯于袲伐鄭宋公之上公羊有齊侯袲昌氏反公作侈左傳㑹于袲謀伐鄭將納厲公也弗克而還穀梁傳地而後伐疑詞也非其疑也胡傳忽弱突强諸侯不顧是非而計其强弱始疑於輔正終變而與邪穀梁所謂非其疑者非其疑於為義而果於為不義相與連兵動衆納簒國之公子也張子曰魯桓宋莊衞朔皆以不正得國其為突謀乃水流濕火就燥獨陳侯疑之耳然寡不勝衆所以疑而遂合也王氏曰突之未出也宋欲有所責故嘗伐之突而既出也宋懼無所得故求納之始宋不和而公以鄭伐宋及突已奔而公與宋伐鄭向者相戾之深今也相同之固豈無自而然哉葢以正繼正禮之常諸侯無所求以亂易亂國之釁諸侯有所責故利其亂幸其危貪其賄黨其邪自突入櫟公與宋公三㑹諸侯而再伐鄭無他賄故也陳氏曰㑹伐㑹盟㑹救㑹侵皆前定之詞也未前定則書㑹于某而後伐㑹于某而後盟㑹于某而後救㑹于某而後侵前定同欲也未前定繼事也杜氏曰袲宋地在沛國相縣西南十有六年春正月公㑹宋公蔡侯衞侯于曹左傳謀伐鄭也納突夏四月公㑹宋公衞侯陳侯蔡侯伐鄭胡傳蔡嘗先衞今序陳下者先儒以為後至也以至之先後易其序是以利率人而不要諸禮也秋七月公至自伐鄭此致伐之始冬城向失亮反啖氏曰按左氏曰書時也下有十一月則此乃十月夏之八月農功未畢未可興役十有一月衞侯朔出奔齊左傳初衞宣公烝上淫曰烝於夷姜宣公庶母生急子屬諸右公子為之娶于齊而美公取之生壽及朔屬壽於左公子左右媵之子因以為號夷姜縊宣姜宣公所取急子之妻與公子朔搆急子公使諸齊使盜待諸莘衞地將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子洩右公子職立公子黔牟羣公子惠公奔齊公羊傳衞侯朔何以名絶曷為絶之得罪於天子也其得罪于天子奈何見使守衞朔朔十二朔政事也朝廟告廟是也謂衞侯見使守宗廟告朔行政起下不能奉天子之命而不能使衞小衆時天子使發小衆不能使行越在岱隂齊越走也泰山之隂齊地屬負兹舍不即罪爾屬託也諸侯有疾稱負兹舍止也托疾而止不就罪也穀梁傳朔之名惡也天子召而不往也按公穀皆謂朔獲罪于天子公羊文意迂晦不明有類傳聞之詞未審然否是時王靈不振不發小衆與召而不往天王豈能遽行討慴朔而至於出奔哉葢謀出左右公子而王與聞焉爾觀莊六年王人子突救衞朔之復入放黔牟于周則朔之出黔牟之立謀出二公子而王與知明矣然惜乎其為此舉之未盡也夫宣公之淫亂不容誅矣先儒以為此衞為狄所滅之因也惠公搆殺其兄竊位不道觀紀之戰父死未幾吉服從戎其視彛倫人紀不知為何物世類非人理所容以是聲其罪而廢之孰曰不可乃舍其大而問其小遲遲於五年之後二公子固無足道天王無亦未之思乎後之說春秋者亦復不能明此義惜哉陸氏曰失地諸侯皆名之公榖强生義非也十有七年春正月丙辰公㑹齊侯紀侯盟于黄左傳平齊紀且謀衞故也杜氏曰黄齊地黄紀地後屬齊今登州黄縣張氏曰公十三年㑹紀敗齊以益其怨今乃盟之豈足以釋憾又欲納朔一動而二失也按朔在齊納朔齊志也以是㑹魯而魯因欲以平紀其後齊卒納朔而紀不果平葢齊志在滅紀特以虛言役魯而魯為所愚耳大抵魯於時事不能先倡而常從人夫以周公之胄千乗之國為之以道豈不能自强而我所欲者常制於人而不能自必人所欲者常為所使而不能獨違惟其不强為善耳孔子一行乎定公齊人歸田豈非為之以道足以自强之明驗乎二月丙午公㑹邾儀父盟于趡㑹公穀作及趡翠軌反左傳尋蔑之盟也杜氏曰趡魯地汪氏曰下書伐邾則趡盟不待貶而惡自見矣隠桓皆盟邾而背盟皆以宋故以國君之重而其心無所適主尚足貴乎夏五月丙午及齊師戰于奚公闕夏字奚穀作郎齊魯交兵之始左傳疆事也於是齊人侵魯疆疆吏来告公曰疆埸之事慎守其一而備其不虞虞度也不度猶不意也姑盡所備焉事至而戰又何謁焉愚按自入春秋隠六年公㑹齊侯盟于艾此齊魯交好之始至今年及齊師戰于奚此齊魯交兵之始夫齊大國也變詐無常佚蕩而不好禮其習俗也魯與之隣敬而勿暱介而勿絶固其封疆守其禮信斯得待之之道矣奈何秉禮不堅自失其故一誘于鄭而結怨興戎再誘于齊而驕奢淫佚昏姻之後魯之氣類日變而齊矣善乎鄭忽之言曰人各有耦齊大非吾耦也夫耦大則聲氣强相應隨不惟易以自失而因好生隙其流獘有不可勝言者鄭不耦齊鄭無齊援亦無齊禍魯一耦之得齊禍無如魯之甚者般卒閔弑魯再罹婦禍也殺惡立接齊三成魯亂也豈非不善自守輕與人比之明戒哉杜氏曰奚魯地不言及者主名葢疆吏得公命而與戰也以微者故不書不書敗葢魯敗也或謂此公戰而諱不言公考明年公㑹齊侯于濼則齊魯之怨未深其非公與戰明矣六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡左傳蔡桓侯卒蔡人召蔡季于陳秋蔡季自陳歸于蔡蔡人嘉之也杜氏曰桓侯無子故召季而立之季内得國人之望外有諸侯之助故書字以善得衆稱歸以明外納何氏曰蔡侯封人無子季次當立封人欲立獻舞而疾害季季辟之陳封人死歸反奔䘮思慕三年卒無怨心故賢而字之今按杜氏謂桓侯無子召季而立之與何氏異諸家多從何氏胡傳季字也歸順詞公子不去國季何以去權也既歸何以不有國獻舞立矣癸巳葬蔡桓侯啖氏曰五等諸侯本國臣子皆稱之曰公葬既不請王命因而私諡為公正禮諸侯皆合請王諡從而書之以見非禮按史記世本左氏傳蔡之諸君皆諡為侯經則皆稱公者以其私諡與僭同也唯蔡桓稱侯葢告王請諡葢蔡季請王諡故特書之明得禮也問書蔡桓侯胡文定以為蔡季之賢知請諡如何朱子曰此只是文誤及宋人衞人伐邾左傳宋志也邾宋争彊魯從宋志背趡之盟正月與齊為黄之盟五月戰焉二月與邾為趡之盟八月伐之反顧前日刑牲詔神棄如敝屣屢盟之無益而適以長亂豈不信哉冬十月朔日有食之左傳不書曰官失之也天子有日官諸侯有日御日官天子掌厯者居卿不在六卿之數而位從卿以底平也日禮也日御不失日以授百官于朝趙氏曰此說非也凡不書日史官闕之或年深寫誤何關日官日御乎史官豈不知朔及每日甲子乎穀梁傳言朔不朔日食既朔也杜氏曰甲乙者厯之紀也晦朔者日月之㑹也日食不可以不存晦朔晦朔須甲乙而可推故日食必以書朔日為例附錄左傳初鄭伯將以髙渠彌為卿昭公惡之固諫不聴昭公立懼其殺已也辛卯弑昭公而立公子亹昭公弟十有八年春正月公㑹齊侯于濼盧篤反一音洛杜氏曰濼水在濟南歴城縣西北入濟公與夫人姜氏遂如齊公羊無與字左傳公將有行遂與姜氏如齊申繻曰女有家男有室無相黷也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊范氏曰公本與夫人俱行至濼公與齊侯行㑹禮故先書㑹濼既㑹而相隨至齊故曰遂夏四月丙子公薨于齊丁酉公之䘮至自齊左傳公及文姜如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乗公公薨于車莊元年公羊傳曰夫人譖公于齊侯齊侯恐與之飲酒於其出焉使公子彭生送之於其乗焉搚幹而殺之魯人告于齊曰寡君畏君之威不敢寧居来脩舊好禮成而不反無所歸咎惡於諸侯請以彭生除之按魯之告詞如此魯國之無人可見齊人殺彭生按春秋書魯公見殺之例有二在内則以不地見其弑凡公薨必書其所如小寢路寢高寢之類詳内事重凶變也若遇弑則不地穀梁云公薨不地故也在外則不容不書其地趙氏曰在外薨不以有故無故皆當書其地而以上下文之特異者見之此書公㑹齊侯于濼公與夫人姜氏遂如齊公薨于齊公之䘮至自齊夫人孫于齊讀此經雖無傳亦知公之不得其死賊在齊侯而釁由夫人矣濼之㑹書與夫人如齊而不言其反以下文孫于齊見之知夫人曾從公䘮而反矣秋七月附録左傳秋齊侯師于首止陳師首止討鄭弑君也首止衞地陳留襄邑縣東南有首鄉子亹㑹之髙渠彌相不知齊欲討己齊人陳師欲討己乃不知而往㑹之事亦可疑葢齊師誘之七月戊戌齊人殺子亹而轅車裂髙渠彌齊以詐誘而殺之故不成為討祭仲逆鄭子昭公弟子儀于陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知去聲免仲曰信也初祭仲出忽立突既而突患其專欲除之而為仲所逐而忽入忽不能君而突入于櫟祭仲中立無所助髙渠彌弑忽而立子亹仲亦若無聞焉者觀其釁也高渠彌與子亹為齊所殺仲先知之仲真姦臣也周公欲弑莊主而立王子克莊王桓王太子王子克莊王弟子儀辛伯周大夫告王遂與王殺周公黑肩王子克奔燕初子儀有寵于桓王桓王屬諸周公辛伯諫曰並后妾如后匹嫡庶如嫡兩政臣擅命耦國都如國亂之本也周公弗從故及冬十有二月己丑葬我君桓公公羊傳賊未討何以書葬讎在外也穀梁意同趙氏曰葬稱我君舉其諡也將葬方作諡若只言桓公則恐涉他國君故明言我君以舉其新加之諡也臣子之敬辭也陸氏曰賊在異國故可葬朱子曰春秋之法君弑賊不討則不書葬者正以復讐之大義為重而揜葬之常禮為輕以示萬世臣子遭此非常之變則必能討賊復讐然後為有以葬其君親者否則雖棺槨衣衾極於隆厚實與委之於壑為狐狸所食蠅蚋所嘬無異其義可謂深切著明矣今按朱子發明君弑賊不討不書葬之義諸家所不及然則在内不書葬者示臣子急於討賊之意讐在外書葬者讐在外勢或未可以遂討難於乆暴露其親必俟賊討而後葬耳葬者權也必討者義也不討則義猶不葬也非許其可緩也春秋輯傳巻二

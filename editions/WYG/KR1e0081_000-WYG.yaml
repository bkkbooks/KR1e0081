body:
  text: 春秋輯傳春秋類提要臣等謹案春秋輯傳十三卷春秋凡例二卷明王樵撰樵有周易私録已著録是編朱􅂜尊經義考作十五卷又别出凡例二卷註曰未見此本凡輯傳十三卷前有宗㫖三篇附論一篇共為一卷與十五卷之數不符葢􅂜尊偶誤又凡例二卷今實附刻書中􅂜尊亦偶未檢也其輯傳以朱子為宗博采諸家附以論㫁未免或失之冗然大㫖猶為醇正其凡例則比類推求不涉穿鑿較他家特為明簡明人之説春秋大抵範圍於胡傳其為科舉之計者庸濫固不足言其好持議論者又因仍苛説彌用推求巧詆深文争為刻酷尤失筆削之㣲㫖樵作此書差為篤實其在當日亦可云不移於俗學者矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋宗㫖明王樵輯孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出葢十世希不失矣自大夫岀五世希不失矣陪臣執國命三世希不失矣天下有道則政不在大夫天下有道則庶人不議此章通論天下之勢備春秋之終始顔淵問為邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲逺佞人鄭聲淫佞人殆子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也所因謂三綱五常所損益謂制度文為之間雖三王迭興因時有作亦只欲扶持此三綱五常而已所謂經世大法也程子曰天之生民必有出類之才起而君長之治之而爭奪息道之而生養遂教之而倫理明然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以開人必因時而立政暨乎三王迭興子丑寅之建正忠質文之更尚人道備矣天道周矣聖人既不復作有天下者雖欲倣古之迹亦私意妄為而已事之謬秦至以建亥為正道之悖漢專以智力持世豈復知先王之道也夫子當周之末以聖人之不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者矣先儒之論曰游夏不能贊一辭辭不待贊也言不能與於斯道也斯道也惟顔子嘗聞之矣行夏之時乘殷之輅服周之冕樂則韶舞此其準的也後世以史視春秋謂褒善貶惡而已至於經世之大法則不知也春秋大義數十炳如日星乃易見也惟其微辭奥義時措從宜者為難知也或抑或縱或予或奪或進或退或微或顯而得乎義理之安文質之中寛猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物然後識化工之神聚衆材然後知作室之用於一事而欲窺聖人之用非上智不能也故學春秋者必優游涵泳黙識心通然後能造其微後王知春秋之義則雖非禹湯尚可以法三代之治自秦而下其學不傳予悼夫聖人之志不得明於後世也故作傳以明之俾後之人通其文而求其義得其意而法其用則三代可復也朱子曰四代之禮樂此經世之大法也春秋之書亦經世之大法也然四代之禮樂是以善者為法春秋是以不善者為戒孟子曰世衰道微邪説暴行又作臣弑其君者有之子弑其父者有之孔子懼作春秋春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼又曰王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣又曰五霸者三王之罪人也今之諸侯五霸之罪人也又曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也胡氏曰古者列國各有史官掌記時事春秋魯史爾仲尼就加筆削乃外史傳心之要典也而孟氏𤼵明宗㫖目為天子之事者周道衰微乾綱解紐亂臣賊子接迹當世人欲肆而天理滅矣仲尼天理之所在不以為已任而誰可故曰我欲載之空言不如見諸行事之深切著明也空言獨能載其理行事然後見其用是故假魯史以寓王法惇典庸禮命徳討罪其大要則皆天子之事也故曰知我者其惟春秋乎罪我者其惟春秋乎知孔子者謂此書遏人欲於横流存天理於既滅為後世慮至深逺也罪孔子者謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣是故春秋見諸行事非空言比也公好惡則𤼵乎詩之情酌古今則貫乎書之事興常典則體乎禮之經本忠恕則導乎樂之和著權制則盡乎易之變故君子以為五經之有春秋猶法律之有斷例也不學是經而處大事決大疑能不惑者鮮矣武進唐應徳曰春秋之難明也其孰從而求之曰孔子嘗自言之矣吾之於人也誰毁誰譽斯民也三代之所以直道而行也春秋者聖人有是非而無所毁譽之書也直道之所是春秋亦是之直道之所非春秋亦非之春秋者所以寄人直道之公心也人人之心在焉而謂其文有非人人之所與知者乎儒者則以為聖經不如是之淺也而徃往謂之微辭是以説之過詳而其義益蔽且夫春秋之為春秋以誅亂討賊而已子而嚴父臣而敬君人人有不知其為是而弑君簒父人人有不知其為非者哉人人知其為非而或陷於弑逆焉者昔人所謂以意為之也雖其以意陷於弑逆而其直道而行之心固隠然而在也聖人早為之辨醒其隠然而在之心以消其勃然敢動於邪之意是以亂臣賊子懼焉而能自還也其使之懼者不逆之於勃然而動者之不可忍而牖之於隠然而在者之不容息是以能使之懼也非書其弑以懼之之謂也其懼者但覺其隠然而在者之忽露而不覺其勃然而動者之暗消是以懼也非懼其書我而不敢為之謂也故曰孔子懼作春秋春秋成而亂臣賊子懼孔子之懼心斯人直道而行之心一也斯人直道而行之心亂臣賊子之懼心一也人人之心在焉而謂其文有非人人所與知者乎右上篇莊周氏曰春秋經世先王之志也聖人議而不辯又曰春秋以道名分漢上大夫壺遂曰昔孔子胡為作春秋太史公曰余聞之董生周道廢孔子知時之不用道之不行也是非二百四十二年之中以達王事子曰我欲載之空言不如見之行事之深切著明也上明三王之道下辨人事之經紀撥亂世反之正莫近於春秋春秋文成數萬其㫖數千萬物之聚㪚皆在春秋有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通春秋之義者必蒙首惡之名為人臣子而不通春秋之義者必陷篡弑誅死之罪其實皆以善為之而不知其義故春秋禮義之大宗也又曰吳楚之君自稱王而春秋貶之曰子踐土之㑹實召天子而春秋諱之曰天王狩于河陽推此類以繩當世筆則筆削則削子夏之徒不能贊一辭隋王通氏曰春秋之於王道是輕重之權衡曲直之繩墨也舍是則無所取衷矣周子曰春秋正王道明大法也孔子為後世王者而脩也亂臣賊子誅死者於前所以懼生者於後也程子曰五經載道之文春秋聖人之用五經之有春秋猶法律之有斷例也律令惟言其法斷例始有法之用又曰五經如藥方春秋如用藥治病聖人之用全在此書春秋一句即一事是非便見於此乃窮理之要學者只觀春秋亦可以盡道矣又曰春秋傳為按經為斷又曰春秋之文一一意在示人如土功之事無大小莫不書之其意止欲人君重民力也又曰禮義失則人之異于禽獸者幾希聖人初恐人入于禽獸也故于春秋之法極謹嚴中國而不用先王之禮則外之韓愈言春秋謹嚴深得其㫖又曰春秋以前既已立例到後來書得全别一般事便書得别有意思若依前例觀之殊失之也又曰春秋大率所書事同則辭同後人因謂之例然有事同而辭異者葢各有義非可例拘也又曰某看春秋有兩句法以傳考經之事迹以經别傳之真偽邵子曰春秋孔子之刑書也功過不相揜五伯者功之首罪之魁也先定五伯之功過而學春秋則大意立矣春秋之間有功者未有大於四國者也有過者亦未有大於四國者也不先定四國之功過則事無統理不得聖人意矣孫明復曰春秋有貶而無褒邵子曰春秋禮法廢君臣亂其間有能為小善者安得不進之也况五伯實有功於天下安得不與之也又曰人言春秋非性命書非也聖人無我由性命而𤼵言因事褒貶皆非有意於其間故春秋盡性之書也又曰春秋為君弱臣强而作故謂之名分之書又曰夫聖人之經渾然無迹如天道焉春秋錄實事而善惡形于其中矣張子曰春秋之書在古無有乃仲尼所自作惟孟子為能知之非理明義精殆未可學先儒未及此而治之故其説多鑿邵伯温曰聖人以二百四十二年之事繫之以萬世之法法者何也君臣父子夫婦人道之大倫也性之者聖人也誠之者君子也違之者小人也亡之者禽獸也興之則為治廢之則為亂用之則為中國舍之則為僣亂五伯去王也逺矣不猶愈於亂乎當世之諸侯去伯也逺矣鄰于亂也不亦近乎微聖人之生春秋之作則天下後世之人其安于僣亂矣春秋有天道焉有地道焉有人道焉王者舉而用之則帝王之功豈難致胡氏曰春秋聖人傾否之書又曰春秋為誅亂臣賊子而作其法尤嚴於亂賊之黨又曰春秋所書有事同則辭同後人因謂之例然有事同辭異者葢各有義非可例拘也辭同者正例也辭異則其例變矣正例非聖人莫能立變例非聖人莫能裁朱子曰春秋以形而下者説上那形而上者去春秋皆亂世之事聖人一切裁之以天理聖人作春秋不過直書其事善惡自見以下俱朱子之言春秋大㫖其可見者誅亂臣討賊子内中國外夷狄貴王賤伯而已未必如先儒所言字字有義也想孔子當時只要備二三百年之事故取史文冩在這裏何嘗云某事用某例邪且如書㑹盟侵伐大意不過見諸侯擅興自肆耳書郊禘大意不過見魯僭禮耳至如三卜四卜牛傷牛死是失禮之中又失禮也如不郊猶三望是不必望而猶望也如書仲遂卒猶繹是不必繹而猶繹也如此等義却自分明春秋只是直載當時之事要見當時治亂興衰非是於一字上定褒貶初間王政不行天下都無統屬及五伯出來扶持方有統屬禮樂征伐自諸侯出到後來五伯又衰政自大夫出到孔子時皇帝王伯之道掃地故孔子作春秋據他事實寫在那裏教人見得當時事是如此安知用舊史與不用舊史今硬説那箇字是孔子文那箇是舊史文如何驗得更核聖人所書好惡自易見如葵丘之㑹召陵之師踐土之盟自是好本末自是别及後來五伯既衰溴梁之盟大夫亦出與諸侯之㑹這箇自是差異不好今要去一字兩字上討意思甚至以日月爵氏名字上皆為褒貶如王人子突救衛自是衛當救當時是有箇子突孔子因存他名字今諸儒解却道王人本不書字緣其救衛故書字孟子説臣弑其君有之子弑其父有之孔子懼作春秋説得極是了又曰春秋無義戰彼善於此則有之矣此等皆看得地步濶聖人之意只是如此不解恁地細碎春秋大槩自成襄以前舊史不全有舛逸故所記各有不同若昭哀以後皆聖人親見其事故記得其實不至於有遺處如何却説聖人子其爵削其爵賞其功罰其罪是甚説話問孟子説春秋天子之事如何曰只是被孔子冩取在此人見者自有所畏懼耳若要説孔子去褒貶他去其爵與其爵賞其功罰其罪豈不是謬也其爵之有無與人之有功有罪孔子也予奪他不得或人論春秋以為多有變例所以前後所書之法多有不同曰此烏可信聖人作春秋正欲褒善貶惡示萬世不易之法今乃忽用此説以誅人未㡬又用此説以賞人使天下後世皆求之而莫識其意是乃後世弄法舞文之吏之所為也曽謂大中至正之道而如是乎問讀春秋之法曰只是據經所書之事迹而準折以先王之道某是某非某人是底猶有未是處不是㡳猶有彼善於此處只将道理折衷便見只是聖人言語細宻要人子細斟量考索耳看春秋固當以類例相通然亦須隨事觀理反覆涵泳令胸次開濶義理通貫方有意味答魏元履曰欲為春秋學甚善但前輩以為此學者最後一段事葢自非理明義精則止是較得失考同異心緒轉雜與讀史傳摭故實無異春秋本是正誼明道之書今人只較齊晉霸業優劣反成謀利大義都晦了正誼不謀利明道不計功尊王賤霸内諸夏外夷狄此春秋之大㫖不可不知也春秋固是尊諸夏外夷狄然聖人當初作經豈是要率天下諸侯而尊齊晉自秦檜和戎之後士人諱言内外而春秋大義晦矣問先生於三禮書春秋未有説何也曰春秋是當時實事孔子書在册子上後世諸儒學未至而各以己意猜度正横渠所謂非理明義精而治之故其説多鑿也惟伊川以為經世之大法得其㫖矣又曰程子所謂春秋大義數十炳如日星者如成宋亂宋災故之類乃是聖人直著誅貶自是分明如胡氏謂書晉侯為以常情待晉侯書秦人為以王事責秦穆處却恐未必如此須是己之心果與聖人之心神交心契始可斷他所書之㫖不然則未易言也程子所謂微辭隠義時措從宜者為難知耳南軒張氏謂當取其大義數十斷為定論而詳味其抑揚予奪輕重之宜則有以權萬變矣啖氏曰夫子所以脩春秋之意三傳無文説左氏者以為春秋者周公之志也暨乎周徳衰典禮喪諸所記注多違舊章宣父因魯史成文考其行事而正其典禮上以遵周公之遺制下以明将來之法言公羊者則曰夫子之作春秋將以黜周王魯變周之文從先代之質解穀梁者則曰平王東遷周室微弱天下板蕩王道盡矣夫子傷之乃作春秋所以明黜陟著勸戒吾觀三家之説誠未達乎春秋大宗予以為春秋者救時之弊革禮之薄杜氏所論褒貶之指惟據周禮若然則周徳雖衰禮經未冺化人足矣何必復作春秋乎何氏所云變周之文從先代之質雖得其言不用之於性情而用之於名位周徳雖衰天命未改變從夏政惟在立忠為教原情為本非謂改革爵列損益禮樂者也故夫子傷主威不行下同列國首王正以大一統先王人以黜諸侯不書戰以示莫敵稱天王以表無二尊反云黜周王魯悖禮誣聖矣范氏之説粗陳梗槩殊無深㫖且歴代史書皆是懲勸春秋之作豈獨爾乎趙氏曰啖氏依公羊家舊説云春秋變周之文從夏之質予謂春秋因史制經以明王道其指大要二端而已興常典也著權制也故凡郊廟喪紀朝聘蒐狩昬取皆違禮則書之是興常典也非常之事典禮所不及則裁之聖心以定褒貶所以窮精理也聖人當機𤼵斷以定厥中辨惑質疑為後王法何必從夏乎然則春秋救世之宗㫖安在在尊王室正陵僭舉三綱提五常彰善癉惡如斯而已故褒貶之指在乎例諸凡例是綴敘之意在乎體所謂體者其大槩有三而區分有十所謂三者凡即位崩薨卒𦵏朝聘盟㑹此常典所當載也故悉書之隨其邪正而加褒貶此其一也祭祀婚姻賦税軍旅蒐狩皆大國之事亦所當載也其合禮者夫子修經之時悉皆不取故公穀云常事不書是也其非者及合於變之正者乃取書之而増損其文以寄褒貶之意此其二也慶瑞災異及君被殺被執及奔放逃叛歸入納立如此並非常之事亦史册所當載夫子則因之而加褒貶焉此其三也此􅄒作之大凡也所謂十者一曰悉書以志實朝聘用兵之類一切書之以著事實二曰略常以明禮祭祀婚姻等合禮者皆常事不書三曰省辭以從簡經文貴從省觸類盡然諸前目後凡帥師不言君使之類是也四曰變文以示義但經文比常例變一字者必有褒貶之義五曰即辭以見意謂不成例者但于辭中見褒貶之義公追齊師至酅齊人來歸公孫敖之喪之類是也六曰記是以著非書子同生及𦵏諸侯之類是也七曰示諱以存禮内惡事皆隠避其文以示臣禮八曰詳内以異外内卿卒皆書被伐皆言某鄙之類是也九曰闕略因舊史宣成以前人名及甲子多不具是也十曰損益以成辭如鄭渝平若言鄭伯使人來渝平即不成言辭此損文也如西狩常事不合書為獲麟故書西狩此益文也知其體推其例觀其大意然後可以議之耳或曰聖人之教求以訓人也微其辭何也恠其辭意深微人難曉解不可以訓曰非微之也事當爾也人之善惡必有淺深不約其辭不足以差之也如弑君有稱國稱人稱盜之異來盟有書名書字書官之異必假一字以示善惡淺深若廣其辭則是史氏之書爾焉足以見條例而稱春秋乎辭簡義隠理自當爾非微之也故成人之言童子不能曉也縣官之才民吏不能及也是以小智不及大智况聖人之言乎此情性自然之品彚非微之也今持不逮之資欲勿學而能此豈里巷之言苟爾而易知乎餘干胡叔心曰春秋乃孔子之行事因當世之事一處置從天理上去堯舜三代之道具見於此其斟酌權衡以定百王之法先儒傳注多穿鑿𤨏細惟孟子程子得其本原大意朱子謂以形而下者説上那形而上者去葢孟子程子朱子之學具聖人之全體故深得聖人作用黙契聖人心事非若諸儒但推測億度也又曰讀春秋使人自然戒懼不敢萌一毫私意又曰讀春秋便是得君是君臣是臣父是父子是子長是長幼是幼夫婦朋友中國外裔截然分明而各止其所其於天道人道分殊理一無不明備此聖人手段又曰春秋以正大之理觀之則見當時王道不行諸侯皆是營營於私意或當為而不為或不當為而為之或昏弱而不振或恃强以為暴或怠惰而不知脩省或僭逆而無狀聖人之意葢欲一歸天理之正而後己其於天地生物之心保民救時之意生殺子奪之權隠然見於書法之中實為百王經世之大法或者乃欲計區區伯業之盛衰又以姓名日月爵號為誅賞其穿鑿𤨏碎甚矣又曰伯者雖有功於當時然三綱五常卒扶不起故仲尼作春秋以明之又曰春秋不與五伯者是他心術不正事事把私心去做那些仁義是假的或曰齊桓晉文若以真心行仁義春秋亦與之乎曰他若以真心行仁義即王道也春秋不必作矣他本無明理正心之學故謂之假仁又曰春秋即人事以明天理用天理以處人事右中篇武進唐應徳曰春秋王道也天下無二尊是王道也禮樂征伐㑹盟朝聘生殺之權一出於天子而無有一人之敢衡行無有一人之敢作好惡作威福是王道也是故大宗伯以賓禮親邦國而以間㑹𤼵四方之志天子巡守諸侯既朝則設方明而盟是㑹盟者天子之權也其或不出於天子而私㑹私盟者罪也故春秋凡書㑹書盟者皆罪之諸侯朝于天子而諸侯之自相與也有聘禮無朝禮凡其不朝于天子而私相朝者罪也故凡春秋之書如書朝者皆以罪其朝者與其受朝者九伐之法掌於司馬而天子賜諸侯弓矢斧鉞然後得專征伐雖其專之亦必其臨時請命于天子而後行是侵伐者天子之權也其不出於天子而私侵私伐者罪也故凡春秋之書侵書伐者皆罪之諸侯之大夫公子雖其有罪必請于天子而後刑殺焉其不請於天子而專殺者罪也故凡春秋書殺大夫殺公子者皆罪之夫侵伐有貪兵有憤兵有應兵有討不睦有以外域侵中國有以中國攘外域有以中國借外域而戕中國者故戰有彼善於此者要之無義戰盟㑹有解讐有固黨有同欲相求有同力相援有同患相恤有以夷狄受盟有以夷狄主盟者故㑹盟有彼善於此者而要之無義㑹義盟殺大夫有誅叛有討貳有愎諫有借以説於大國有為强臣去其所忌故殺大夫有彼善於此者要之無義殺是故春秋自于稷澶淵兩㑹之外並不書其故而至於盟㑹侵伐則絶無一書其故者非略也以為其㑹其盟其侵其伐其戰既足以著其罪矣不必問其故也殺大夫必名亦有不名而但書其官如宋人殺其大夫司馬者亦有并其官不書如曺殺其大夫者非略也以為義繫乎其殺之者而不繫乎其殺者義繫乎其殺之者則其殺也足以著其罪矣義不繫乎其殺者則不必問其為何人與其為有罪無罪焉可也説春秋者不達其意而𤨏為之説曰其㑹也以某故殺某大夫也以某故至於盟戰侵伐亦然是皆無益於春秋也而徒為蛇足之畫者夫春秋經世之書也其經世也以正亂賊也易曰臣弑其君子弑其父非一朝一夕矣不早辨也説春秋者亦云人臣無将夫人臣而竊其君侵伐㑹盟刑殺之權其為将也甚矣人臣竊其君侵伐㑹盟刑殺之權而久假焉而莫之歸也其為漸也甚矣故臣子至於推刃於其君父而春秋書某國弑其君某某人弑其君某者是弑之成也是春秋之所深痛也臣而竊其君㑹盟刑殺之權是弑之漸也將也是春秋之所辨也孔子嘗自言之矣曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出無道而至於自大夫出無道而至於陪臣執國命嗚呼是春秋之勢也挈其柄於陪臣大夫者而還之諸侯挈其柄於諸侯者而還之天子是春秋撥其亂而反之正也夫周自東遷以前雖王室已不競矣而其權固在也幽殺而平徙岐豐之地委為草莽瀍洛之外聲教阻絶於是尾大之勢成而諸侯横變易禮樂憑衆暴寡大小相朝强弱相刼無一不出於諸侯者而天子曽不得尺寸之權矣葢周之盛王道行頌聲作而其可見者莫如詩雅蓼蕭湛露是諸侯之㑹同於天子者也彤弓是諸侯聽征伐之命於天子者也出車采薇是天子之自為征伐而四夷不敢侵畔者也故曰詩亡而春秋作詩未亡天子之權存詩亡天子之權喪春秋收既喪之權而還之天子者也春秋所以接詩亡之後雖一日不得緩也文宣而下則諸侯又不能自執其權而大夫之交政於中國者攘攘矣三桓六卿七穆孫甯魚華陳鮑擁兵樹黨而主勢孤矣𦵏原仲而私交始矣作三軍舍中軍而魯之權罄於大夫矣盟溴梁盟宋而天下之權罄於大夫矣衎出奔孫陽州孫越入彭城入朝歌入晉陽而大夫之為禍烈矣葢天下之勢愈下而春秋之治也愈詳桓僖以前列國之大夫惟特使而與魯接者則名之而㑹盟侵伐則大夫未有以名見者夫救徐夫夫特将也翟泉大夫特盟也春秋第曰人曰大夫而已不以名見也若此者非略也以為不繫乎大夫也文宣而下侵伐㑹盟大夫未有不以名見者雖溴梁之㑹其君在也而大夫盟書雞澤之盟君既盟也而大夫盟書若此者非煩也以為繫乎大夫也不繫乎大夫雖夷吾隰朋狐偃趙衰之勲且賢未嘗以名見焉繫乎大夫雖劣如欒黶荀偃高厚華閲則𤨏𤨏以見焉不繫乎大夫雖其君不在而大夫特盟則亦弗詳焉翟泉是矣繫乎大夫雖其君在而大夫綴盟則亦詳焉溴梁雞澤是矣不繫乎大夫雖主帥亦略而人之桓僖以前侵伐書人者是矣繫乎大夫雖偏禆亦牽連而名之鞌之戰是矣其弗詳大夫者以專治諸侯之為亂賊也其詳大夫者以并治大夫之為亂賊也説春秋者不達其義而曰人大夫貶也夫書人為貶彼黶閲之徒以名見者乃為褒也邪惟曺薛滕許之大夫始終書人説春秋者曰小國無大夫非也夫此數君者将為人役之不暇而未嘗敢執天下之權也而况其大夫乎葢不繫乎其大夫是以始終人之而弗詳今曰書人為貶則曰齊晉諸大國之大夫偏受褒而曺薛滕許之大夫偏受貶邪侯犯南蒯弗狃陽虎之徒出則大夫又不能自執其權而陪臣實執之矣堕郈書堕費書圍成弗克書竊寶玉大弓書而春秋之正陪臣者又詳矣故孔子欲往公山佛肸之召而曰吾為東周云者即春秋書堕費堕郈意也是春秋之終也或曰盟葵丘盟踐土師于召陵城濮説春秋者以為聖人與之也今亦曰是禮樂征伐自諸侯出也而奪焉可乎曰是不然矣桓文之未出也權雖不在天子而諸侯亦未能盡得天子之權也葢其權㪚桓文之既出也則權既不在天子又不在他諸侯而桓文獨盡得天子之權也葢其權聚譬之主人有千金焉而竊之者十人雖金已不在主人矣然十人而得百金焉尚未足以當主人也而竊之者一人苟一人而併千金焉則是疑於主人也權之㪚臣悖於主權之聚臣疑於主故較利害則權之㪚而交鬭猶不若權之聚而可以紓禍息民語王道則權之聚而疑主猶不若權之㪚而未有所屬隨之屯曰隨有獲人隨而我獲之未害也而謂之凶豫之坤曰由豫由我致豫未害也而六五以為貞疾故桓文者臣之凶而主之所以貞疾者也且桓文以前諸侯固有相朝者則亦一二小邦而已猶未有六服羣然相朝者固有私盟㑹擅侵伐者則亦一國兩國相讐相結而已未有舉中國而聽於一人未有十餘國而攻一國者是天子之權未有所屬也桓文之興五年一朝三年一聘而諸侯之玉帛相率而走於其庭天子黼扆之前乃不得一人秉圭而北面者彼齊晉亦偃然受諸侯之朝已而終其身未嘗一涉天子之庭也衣裳之㑹兵車之㑹未嘗有一介請於天子也是故糾合諸侯同奨王室未有如葵丘踐土者諸侯之羣然役屬臣僕於諸侯亦未有如葵丘踐土之甚者戎狄攘斥中夏又安未有如召陵城濮者而摟諸侯以伐諸侯亦未有如召陵城濮之甚者説春秋者不達其意而曰㑹于某盟于某是聖人以諸侯援之齊晉也夫王室之不競也諸侯既已盡折而入於齊晉矣聖人不能挈而還之天子也其又推而授之以益其逼也邪夫權自諸侯出不問其如何而均謂之無道敵國相征不問其如何而均謂之無義不知禮樂征伐之出於桓文也其為有道邪其為無道邪桓文之戰其為義邪其為無義邪使桓文而誠於勤王誠於攘夷急病而其柄則倒持也其分則上陵也聖人猶必律之以法而桓文且將為法受惡矣况其借名勤王而實則自殖陽為急病而陰欲養亂哉滅譚滅遂本以自肥執曺畀宋為譎已甚桓之末年侈然有封禪革命之心而文至於請隧以𦵏此其去問鼎者無㡬耳又何以責楚也然則聖人所稱民免於左袵而仁之何也曰是聖人之專論功也而春秋者專以明道也穀梁氏曰仁不勝道存王室也然則説春秋者曰謹華夷之辨何也曰此誅亂賊之一也夫春秋之所夷者吳與楚楚之先鬻熊為姬文師國於江漢之間而泰伯端委以臨吳葢皆神明之胄矣荆人不道間周之亂革子以王叢毒上國吳亦相傚而王是亂賊之尤也是以春秋從而夷之春秋諸侯中其顯然為逆者莫如楚吳其陰逆而陽順者莫如齊晉如斷獄之家楚吳則功意俱惡齊晉則功遂意惡功意俱惡故聖人顯誅之顯誅之故其辭直如書卒不書𦵏君臣同辭之類凡皆直辭也功遂意惡故聖人陰奪之陰奪之故其辭微如邢遷于夷儀城楚丘狩河陽之類凡皆微辭也夫小雅未廢而四夷不敢交侵小雅盡廢而後四夷交侵春秋始書荆入蔡以獻舞歸則其躑躅之勢已見桓文奮而振之其鋒稍阻文也沒而晉霸衰而楚人之圗北方者遂日長而不可制是故春秋書荆入蔡此霸之未興而楚猾中國之始春秋書次于厥貉此霸之既衰而楚窺中國之始葢桓文之所以扼楚者其力有難易而楚與中國之所以盛衰其機有倚伏桓起於海濱而所從者宋衛陳蔡皆弱國故謀之十餘年結江結黄連十二國之師而後能服楚於召陵文據表裏山河之固而所從者齊秦皆勁國故反國一年僅連三國之師而克楚於城濮一戰而殺其専兵之将然晉之克楚也得䇿於結秦而晉之不競於楚也失䇿於讐秦自殽之役而秦晉相讐殺者歴四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一强援自生一强敵失一强援則其氣力不完强敵伺近則其勢不暇於略逺故晉霸之衰而楚益横者殽之役實然説春秋者乃曰殽之役春秋許晉襄繼霸吾不知也夫楚莊者又蠻酋之雄耳而逺交秦巴近攻陳鄭則是晉之讐秦非特生一强敵乃又借盜以兵也春秋書楚人秦人巴人滅庸而楚之謀益狡矣書楚子圍鄭而中國虎牢之險淪於夷矣書宋人及楚人平而南北衡矣天下之勢一變也雖然於時諸侯固有附楚者而猶未敢公然附楚也晉雖已不能盡得諸侯而猶未肯甘心以諸侯委之楚也蜀之盟謂之匱盟葢諸侯猶惴晉人知之也弭兵之説倡而南北之從交見於是中國諸侯公然朝楚向之玉帛於齊晉者盡在楚矣申之㑹空中國而聽焉齊晉之所連以扼楚者今楚人連之以扼中國矣申之㑹諸侯獻六王之禮宋之㑹虢之㑹長楚于晉則是諸侯甘心為夷役而晉人甘心以諸侯委於夷也天下之勢又一變也至於吳越交兵而夷禍極矣書伐剡入州來㑹黄池入吳而春秋所以治夷者又詳矣是春秋之終也或曰楚横而齊晉扼之則是中國果不可無桓文矣今曰禮樂征伐自諸侯出也而奪焉夫頼人之功以紓患靳人之權以資敵是責鷹鶻之搏而縶其足也不亦迂乎曰不然吾又有以譬之今有僕於此鳩黨鑄兵而主人弗能令也然盜夜入室則其僕揭兵嘯黨以逐之以僕為不善也然而足以逐盜以僕為善也然而足以抗主故天下無霸而至於四裔縱横而莫之禁者非天下之幸也天下有霸而至於臣疑於主而莫之恠者非天下之幸也夫春秋之事齊桓晉文是也齊桓晉文之功定而王道明矣王道明而亂賊懼矣或謂春秋誅亂賊者誅其弑君者也曰若是則春秋所書者止於弑三十六君之人耳其亦狹矣然則所誅亂賊者何也曰治弑也治諸侯之專也治大夫也治陪臣也治夷也凡無王者皆亂賊之道也右下篇趙氏曰啖氏依舊説以左氏為丘明受經於仲尼今觀左氏解經淺於公穀誣謬實繁若丘明才實過人豈宜若此推類而言皆孔門後之門人但公穀守經左氏通史故其體異耳且夫子自比皆引徃人故曰竊比於我老彭又説伯夷等六人云我則異於是並非同時人也丘明者葢夫子以前賢人如史佚遲任之流耳焚書之後莫得詳知也學者各信胸臆見傳及國語俱題左氏遂引丘明為其人如事既無明文唯司馬遷云丘明喪明厥有國語劉歆以為春秋左氏傳是丘明所為且遷好竒多謬故其書多為淮南所駁劉歆則以私意所好編之七略七略以左氏傳丘明所為班固因而不革漢書藝文志憑七畧後世遂以為真所謂傳虛襲誤也遷作吕不韋傳云不韋為秦相國集門客千人為吕氏春秋懸之秦市及其與任安書乃云不韋遷蜀世傳吕覽自相違背其説丘明之謬復何疑焉又曰左傳國語文體不倫序事又多乖刺定非一人所為也葢左氏廣積諸國之史以釋春秋傳成之後葢其家子弟及門人見嘉謀事迹多不入傳或有雖入傳而復不同為諸國各有史故雖一事而説各異故各隨國編之而成此書耳近儒又妄為記錄云丘明以授魯魯申申傳呉起起傳其子期期傳楚人鐸椒椒傳虞卿卿傳荀况况傳張蒼蒼傳賈誼此乃近世之儒欲尊崇左氏妄為此説向若傳授分明如此漢書張蒼賈誼及儒林傳何故不書則其偽可知也或曰公穀定何時人也漢儒林傳藝文志並無年代名字答曰此二傳雖不記事迹然其解經密於左氏是知必孔門後之門人也但不知師資㡬世耳傳記無明文故三傳先後亦莫可知也先儒或云公羊名高子夏弟子也應劭風俗通云或云漢初人何休隠二年紀子伯莒子注中云然或云穀梁亦子夏弟子名赤亦風俗通云或曰秦孝公同時人糜信云或曰名俶字元始阮孝緒七錄云皆為强説也啖氏曰古之解説悉是口傳自漢以來乃為章句如本草皆後漢時郡國而題以神農山海經廣説殷時而云夏禹所記自餘書籍比比甚多是知三傳之義皆本口傳後之學者乃著竹帛而以祖師之目題之予觀左氏傳書周晉齊宋楚鄭等國之事最詳晉則每一出師具列将佐宋則每因興廢備舉六卿故知史䇿之文每國各異左氏得此數國之史以授門人義則口傳未形竹帛後代學者乃演而通之總而合之編次年月以為傳記又廣采當時文籍故典與子産晏子及諸國卿佐家傳并卜書夢書及雜占書縱横家小説諷諫等雜在其中故敘事雖多釋意殊少是非交錯渾然難證其大畧皆是左氏舊意故比餘傳其功最高博采諸家敘事尤備能令百代之下頗見本末公羊穀梁初亦口授後人據其大義㪚配經文傳中猶稱穀梁子曰是其證也故多乖謬失其綱統然其大㫖亦是子夏所傳故二傳解經密於左氏穀梁意深公羊辭辯隨文解釋往往鉤深但以守文堅滯泥難不通比附日月曲生條例義有不合亦復强通蹖駁不倫或至矛盾不近聖人夷曠之體也夫春秋之文一字以為褒貶誠則然矣其中亦有文異而義不異者詳内畧外之類二傳穿鑿悉以褒貶言之是故繁碎甚於左氏公羊榖梁又不知有不告則不書之義凡不書者皆以義説之且列國至多若盟㑹征伐喪紀不告亦書則一年之中可盈數卷况他國之事不憑告命從何得書但書所告之事定其善惡以文褒貶耳左氏言褒貶者又不過十餘條其餘事同文異者亦無他解舊解皆言從告及舊史之文若如此論乃是夫子冩魯史耳何名修春秋乎故謂二者之説俱不得中又曰三傳分流其源則同擇善而從且過半矣歸乎允當又何常師今公羊榖梁二傳殆絶習左氏者皆遺經存傳談其事迹翫其文采如覽史籍不復知有春秋微㫖嗚呼買櫝還珠豈足恠哉又曰三傳文義雖異意趣可合者宜演而通之文意俱異各有可取者宜並立其義有一事之傳首尾異處者宜皆聚於本經之下至於義指乖越理例不合浮辭流遁事迹近誣及尋常小事不足為訓者皆不錄若須存以通經者删取其要諫諍謀猷之言有非切當者畧之及雖當存而浮辭多者亦撮要凡敘戰事亦有委曲繁文并但敘其戰人身事義非二國成敗之要又無誠節可紀者亦皆不取凡論事有非與論之人而私評其事自非切要亦皆除之其巫祝卜夢鬼神之言皆不錄其有闗於勸戒者則存之趙氏曰公穀舉例悉不稱凡又每一義輒數處出之今去其重複以從簡要左氏每盟下皆曰尋某年之盟每聘下則曰報某人之聘侵伐下多云報某之役凡此類皆檢前以符後更無他義今考取須留者留之左氏記事多不達經意遂妄云禮也今考其合經者留之餘悉不取胡氏曰傳春秋者三家左氏敘事見本末公羊穀梁辭辯而義精學經以傳為案則當閲左氏玩辭以義為主則當習公穀如恵公元妃繼室及仲子之歸於魯即隠公兄弟嫡庶之辨攝讓之實可按而知也當閲左氏謂此類也若夫來賵仲子以為豫凶事則誣矣王正月之為大一統及我欲之暨不得已也當習公羊氏謂此類也若夫母以子貴媵妾許稱夫人則亂矣段弟也弗謂弟公子也弗謂公子賤段而甚鄭伯之處心積慮成於殺也當習穀梁氏謂此類也若夫曲生例條以大夫曰卒為正則鑿矣要在反求於心斷之以理精擇而慎取之自晉杜預范甯唐啖助趙匡此數子者用力甚勤時有所取雖造宫牆之側㡬得其門而入要皆未見宗廟之美百官之富者也故不與七家之列七家謂孟子莊周董仲舒王通邵堯夫張子厚程正叔也胡氏取其言為春秋綱領已見中篇七家所造固自有淺深獨程氏嘗為之傳然其説甚略於意則引而不發欲使後學慎思明辨自得於耳目見聞之外者也故今所傳事按左氏義采公羊穀梁之精者大綱本孟子而微辭多以程氏之説為證云元城劉氏曰公穀皆解正春秋春秋所無者公穀未嘗言之故漢儒推本以為真孔子之意然二家亦自矛盾則亦非孔子之意矣若左傳則春秋所有者或不解春秋所無者或自為傳故先儒以為左氏或先經以起事或後經以終義或依經以辨理或錯舉以合異然其説亦有時牽合要之讀左氏者當經自為經傳自為傳不可合而為一也然後通矣問三傳優劣朱子曰左氏曾見國史考事頗精只是不知大義專去小處理㑹往往不曽講學公穀考事甚踈然義理却精二人乃是經生傳得許多説話往往都不曽見國史又曰春秋之書且據左氏當時天下大亂聖人且據實而書之其是非得失付諸後世公論葢有言外之意若必於一字一辭之間求褒貶所在竊恐不然齊桓晉文所以有功於王室者葢當時楚最强大時復加兵於鄭鄭在王畿之内又伐陸渾之戎觀兵周疆其勢與六國不同葢六國勢均力敵不敢先動楚在春秋時他國皆不及其强向非桓文有以遏之則周室為其所并矣又諸侯不朝聘於周而周反下聘於列國是甚道理又曰左氏是一個審利害之㡬善避就底人所以其書有貶死節等事其間議論有極不是處如周鄭交質之類是何議論其曰宋襄公可謂知人矣立穆公其子饗之命以義夫只知有利害不知有義理此段不如公羊説君子大居正却是儒者議論人曰孔子作春秋時亦須與門人講論所以公穀左氏得一箇源流只時漸漸訛舛當時若是全無傳授如何鑿空撰得又曰左傳是後來人做為見陳氏有齊所以言八世之後莫之與京見三家分晉所以言公侯子孫必復其始以三傳言之左氏是史學公穀是經學史學者記得事却詳於道理上便差經學者於義理上有功然記事多誤又曰左氏有一箇大病是他好以成敗論人又曰公穀二傳所以異者類多人名地名而非大義之所繫又曰解春秋者以日月為褒貶穿鑿得全無義理若胡文定所解乃是以義理穿鑿故可觀問春秋胡文定之説如何曰尋常亦不滿於胡説且如解經不使道理明白却就其中多使故事大與做時文答䇿相似又曰或云左丘明左丘其姓也左傳自是左姓人作或云左氏是楚左史倚相之後故載楚事軷詳右附論春秋宗㫖

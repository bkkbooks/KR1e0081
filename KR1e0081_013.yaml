body:
  text: 春秋輯傳卷十一明王樵輯昭公二十有五年春王正月吳子夷末卒公作夷昧二月癸酉有事于武宫籥入叔弓卒去樂卒事左傳春將禘于武宫戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也祲妖氛也蓋見于宗廟故以為非祭祥也氛惡氣也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也公羊傳其言去樂卒事何禮也君有事於廟聞大夫之喪去樂卒事大夫聞君之喪攝主而往臣聞君喪義不可以不即行故使兄弟若宗人攝行主事而往不廢祭者古有分土無分民大夫不世已父未必為今君臣大夫聞大夫之喪尸事畢而往賔尸事畢而往大夫祭謂之賔尸穀梁傳君在祭樂之中聞大夫之喪則去樂卒事禮也君在祭樂之中大夫有變以聞可乎大夫國體也古之人重死君命無所不通杜氏曰略書有事為叔弓卒起也武宫魯武公廟成六年復立之孔氏曰祭必有樂樂有文舞武舞文執羽籥武執干戚其入廟也必先文而後武當籥始入叔弓暴卒故去樂不用而卒祭事也叔弓之卒當籥入之時故舉籥入也及其去之則諸樂皆去故云去樂非獨去籥舞也祭禮鼎俎既陳籩豆既設然後樂舞始入緣先祖之心以大臣之卒必聞樂不樂又孝子之心不忍徹已設之饌故去樂卒事按曽子問當祭而聞天子崩后之喪君薨夫人之喪皆廢而未及大臣檀弓記衛大史栁莊寢疾君曰疾革雖當祭必告是知舊不告也不告禮也衛當祭而告神明已接而禮不終乃以請于尸而往示全于祖魯襄仲之喪卒事而聞而不知廢繹乃以萬入去籥示全於臣是皆失之今年有事於宗廟叔弓涖事籥入而卒去樂卒事得禮之變矣緣先祖之心以大臣之卒必聞樂不樂緣孝子之心禮儀既行神明已交不可以卑廢尊故去樂卒事而可也若叔弓殁於家則不可告公榖之説非也宗廟合禮者常事不書此記禮之變而書之者也左氏妄以禘為四時之祭故云禘於武宫説見吉禘于莊公夏蔡朝吳出奔鄭朝公作昭無出字左傳楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圗必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳非不欲善吳然而前知其為人之異也言其多權謀吳在蔡蔡必速飛以鳥喻去吳所以翦其翼也杜氏曰朝吳故蔡大夫公孫聲子歸生之子言吳在蔡必能使蔡速強而背楚胡傳朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷為出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪太子建殺連尹奢屏王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首志朝吳出奔而入郢之亂機兆矣然朝吳身居舊國處危疑之地若能以忠信自達有功不居深避寵利而早杜讒嫉之謀則善矣費無極乃語之曰子亦長矣而在下位辱也吾助子請是以寵利窺之而莫能先覺故特書其出奔示人居危疑之地立讒妬之所道不可不前定為後戒也按朝吳忠於蔡亦有功於平王費無極害之者害其寵也朝吳安於下位似非貪于寵利者惜乎復蔡之後不早自謀焉推朝吳之心內不忍逺於舊君外不敢自踈於楚王此兩難也則勿居其位可也張子房韓讐已報不賴漢寵翩然物外得其道矣朝吳有功兩國見信兩主而身兩事焉此費無極所以來位下之言在其上者所以生及難之慮楚王所以信速飛之謗而不復詰也費無極固巧於讒然在君子不可不精於自處也六月丁巳朔日有食之晉荀吳帥師伐鮮虞左傳晉荀吳帥師伐鮮虞圍鼓鼓白狄之别巨鹿下曲陽縣有鼓聚鼓人請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰或以吾城叛吾所深惡也吾不可以欲城而邇姦使鼓人殺叛人而繕守備圍鼓三月鼓人請降使其民見曰猶有食色姑修而城鼓人告食竭力盡而後取之以鼓子鳶鞮歸陳氏曰嘗狄晉矣則荀吳何以無貶於其重焉貶餘實録而已冬公如晉左傳平丘之會故也十有六年春左傳春王正月公在晉晉人止公不書諱之也猶以取郠故齊侯伐徐左傳齊侯伐徐二月丙申齊師至於蒲隧徐地徐人行成徐子及郯人莒人會齊侯盟於蒲隧賂以甲父之鼎甲父古國名楚子誘戎蠻子殺之公作戎曼公羊傳楚子何以不名夷狄相誘若不疾乃疾之也楚大蠻小皆以子稱杜言河南新城縣有蠻城則是內地之戎在楚北也戎是種號蠻是國名子爵也夏公至自晉秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之左傳祝史請所用幣昭子曰日有食之天子不舉不舉盛饌伐鼓於社責羣隂諸侯用幣於社請上公伐鼓於朝退自責禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也平子不識正月正月謂建巳正陽之月也於周為六月于夏為四月慝隂氣也四月純陽用事隂氣未動而侵陽災重故有伐鼓用幣之禮也平子以為六月非正月故太史答言在此月也正陽之月者十一月建子為陽始此後每月一陽息一隂消至四月建巳六隂消盡六陽並盛是為純乾之卦正陽之月也五月建午為隂始此後每月一隂息一陽消至十月建亥六陽消盡六隂並盛是為純坤之卦正隂之月也日過分而未至過春分而未夏至三辰日月星有災日月相侵又犯是宿故三辰皆為災於是乎百官降物素服君不舉辟移時辟正寢過日食時樂奏鼓祝用幣於社史用辭自責故夏書曰辰不集於房日月不安其舍瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣日食隂侵陽臣侵君之象故平子不肯救日食昭子知其無君也秋郯子來朝左傳郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也少皥金天氏黃帝之子己姓之祖郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名黃帝軒轅氏姬姓之祖也受命有雲瑞故以雲紀事百官師長皆以雲為名號縉雲氏蓋其一官也炎帝氏以火紀故為火師而火名炎帝神農氏薑姓之祖也亦有火瑞以火紀事名百官共工氏以水紀故為水師而水名共工以諸侯霸有九州者在神農前太皥後太皥氏以龍紀故為龍師而龍名太皥伏羲氏風姓之祖也我髙祖少皥摯之立也鳯鳥適至故為鳥師而鳥名鳯鳥氏厯正也鳯鳥知天時故以名厯正之官玄鳥氏司分者也玄鳥燕也春分來秋分去伯趙氏司至者也伯趙伯勞也以夏至鳴冬至止青鳥氏司啓者也青鳥倉庚也以立春鳴立夏至丹鳥氏司閉者也丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆厯正之屬官祝鳩氏司徒也祝鳩鷦鳩也鷦鳩孝故為司徒主教民鴡鳩氏司馬也鴡鳩王鳩也鷙而有别故為司馬主法制鳲鳩氏司空也鳲鳩鴶雛也鳲鳩平均故為司空平水土爽鳩氏司冦也爽鳩鷹也鷙故為司冦主盜賊鶻鳩氏司事也鶻鳩鶻雕也春來冬去故為司事五鳩鳩民者也鳩聚也治民上聚故以鳩為名五雉為五工正五雉雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉利器用正度量夷民者也九扈為九農正扈有九種也春扈鳻鶞夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹行扈唶昔宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教民事竊即古之淺字竊玄淺黑也竊藍淺青也竊黃淺黃也竊丹淺赤也竊脂淺白也扈民無淫者也扈止也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也按上古朴略故因瑞紀事名官取大意而已中古文明漸開故因事正名命以民事如唐虞之四嶽九官十二牧成周之六官乃萬世不易之道非不能紀逺而紀近也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信失官官不修其職也八月晉荀吳帥師滅陸渾之戎公作賁渾戎穀無之字左傳晉侯使屠蒯如周請有事於雒雒水與三塗山名在陸渾南萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周也周大獲按先王居允姓之姦於瓜州自晉惠公誘以來逼諸姬入郊甸世為周患后稷封殖天下而戎制之晉之咎也使因王命驅而逐之庶乎可贖前咎矣今非為王室除患乃因其二楚而隂襲之使非萇𢎞先見戎備素警則為王室之震驚也大矣書晉荀吳帥師滅陸渾之戎罪之也無王命動大衆掩戎狄之不備不顧郊甸之震驚言滅則是利而取之非攘之也凡此數者皆不待貶絶而見矣或者猶謂此役異於闢土服逺而得無貶者失之矣冬有星孛于大辰左傳有星孛於大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申須魯大夫曰彗所以除舊布新也天事恆象天道恆以象類告人今除於火火出必布焉諸侯其有火災乎今火向伏故知當須火出乃布散為災梓慎曰往年吾見之是其徵也徵始有形象而微也火出而見前年火出時今茲火出而章必火入而伏隨火行也其居火也久矣歷二年其與不然乎言必然也火出於夏為三月謂昏見於商為四月於周為五月夏數得天得天正若火作其四國當之在宋衛陳鄭乎宋大辰之虛也大辰大火宋分野陳太皥之虛也太皥居陳大火所自出鄭祝融之虛也祝融髙辛氏之火正居鄭皆火房舍也也星孛天漢漢水祥也衛顓頊之虛也故為帝丘衛今濮陽縣昔帝顓頊居之其星為大水衛居營室營室水也水火之牡也其以丙子若壬午作乎水火所以合也丙午火壬子水水火合而相薄水少而火多故水不勝火若火入而伏必以壬午尚未知今孛星當復隨火星俱伏不故言若不過其見之月火見周之五月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘圭也斚玉爵玉瓉勺也鄭必不火子産弗與杜氏曰大辰房心尾也孔氏曰大火蒼龍宿心在中最明故時候主焉以候四時故曰辰胡傳大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛於東方不言宿名者不加宿也當是時吳人僣亂憑陵上國日敝於兵暴骨如莽其戾氣所感固將壅吳而降之罰也故氛祲所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣楚人及吳戰于長岸左傳吳伐楚陽丐穆王曽孫令尹子瑕為令尹卜戰不吉司馬子魚公子魴曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉得吉兆戰於長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇舟名吳公子光曰喪先王之乘舟請取之以救死衆許之使三人潛伏於舟側曰我呼餘皇則對師吳師夜從之三呼皆迭對楚師亂吳人大敗之取餘皇以歸杜氏曰吳楚兩敗莫肯告負故但書戰長岸楚地胡傳言戰不言敗勝負敵也十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災左傳夏五月火始昏見火心星丙子風梓慎曰是謂融風火之始也東北曰融風融風木也木火之母故曰火之始七日其火作乎從丙子至壬午七日壬午水火合之日戊寅風甚壬午大甚宋衛陳鄭皆火禆竈曰不用吾言鄭又將火鄭人請用之子産不可曰天道逺人道邇非所及也遂不與亦不復火火作子産辭晉公子公孫於東門新來未入使司冦出新客新來聘者禁舊客勿出於宫為其知國情使子寬子上二子鄭大夫巡羣屏攝屏攝祭祀之位至於大宫鄭祖廟巡行不使火及之使公孫登徙大龜登開卜大夫使祝史徙主祏於周廟告於先君祏廟主石函周廟厲王廟也有火災故合羣主于祖廟易救護使府人庫人各警其事商成公鄭大夫警司宫司宫巷伯寺人之官出舊宫人先公宫女置諸火所不及司馬司寇列居火道備非常也行火所焮城下之人伍列登城明日使野司寇縣士各保其徵謂所役之人郊人助祝史除於國北為祭處于國北者就太隂禳火禳火於玄冥水神回祿火神祈於四鄘鄘城也城積土隂氣所聚故祈祭之以禳火之餘災書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也胡傳禆竈所言蓋以象推非妄也而鄭不復火者子産當國方有令政此以德消變之驗矣是知吉凶禍福固有可移之理古人所以必先人事而後言命也六月邾人入鄅音禹左傳鄅人藉稻周之六月夏之四月種稻之時其君自出履行之藉履也邾人襲鄅遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女杜氏曰鄅今琅邪開陽縣妘姓國秋葬曹平公冬許遷于白羽左傳楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣冬楚子使王子勝遷許於析實白羽杜氏曰自葉遷也畏鄭而樂遷故以自遷為文十五年平王復遷邑許自夷還居葉孔氏曰十三年楚師滅蔡靈王遷許胡沈道房申於荆則許從夷向荆也平王復之當從荆向夷自夷又請遷近楚楚以葉與之葉在楚界故為居楚地十有九年春附左傳楚子之在蔡也郹陽封人之女奔之生太子建及即位使伍奢舉之子為之師費無極為少師無寵欲譛諸王曰建可室矣王為之聘於秦無極與逆勸王取之正月楚夫人嬴氏至自秦王自取之故稱夫人宋公伐邾左傳鄅夫人宋向戌之女也故向寧請師寧向戌子二月宋公伐邾圍蟲三月取之乃盡歸鄅俘夏五月戊辰許世子止弒其君買左傳夏許悼公瘧五月戊辰飲太子止之藥卒太子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也杜曰止獨進藥不由醫公羊傳止進藥而藥殺也榖梁傳不弒而曰弒責止也止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死故君子即止自責而責之也胡傳自小人之情度之世子弒君欲速得其位而止無此心故曰我與夫弒者不立乎其位哭泣啜飦粥嗌不容粒未踰年而死無此心故被以大惡而不受自君子聽之止不嘗藥是忽君父之尊而不慎也而止有此心忽君父之尊而不慎此篡弒之萌堅氷之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子止弒君乃除惡於微之意也張洽問於朱子曰嘗讀歐陽公論許世子止之事未免疑之及讀胡文定公傳未足以破其疑洽既而考之左氏公羊之傳自明但後人因榖梁不嘗藥之説遂執此一句以為止之罪如此而已殊不考左氏曰許悼公瘧飲世子止之藥卒公羊曰止進藥而藥殺也此可以見悼公之死於藥矣當是之時雖未有明文而洽嘗觀近世治瘧者以砒霜煅而餌之多愈然不得法不愈而反殺人者亦多矣悼公之死必此類也不然當時所進非必死之藥止偶不嘗而已則公羊何以謂之藥殺世子亦何為遽棄國而出奔孟子曰殺人以梃與刃有以異乎以刃與政有以異乎進藥而藥殺可不謂之弒哉其所以異於商臣蔡般者過與故之不同耳心雖不同而春秋之文一施之者以臣子之於君父不可過也如此觀之似足以正近世傳經之失而破歐公之疑不識先生以為何如朱子曰胡文定通旨中引曽吉父説如律中合御藥誤不如本方造御舟誤不堅固之類已有此意矣但考之於經不見許止棄國出奔之事不知果何謂也仁山金氏曰履祥按古今亂臣賊子弒其君者蓋亦多故有以藥物弒者霍顯王莽梁兾之徒是也又有雖無弒逆之意而以奇藥誤其君者山人柳泌之徒是也故律謂藥不依本方致殺人者與故殺同而天子升遐侍醫視疾無狀者死蓋謹亂賊之防也止雖無弒君之心然不幸而進藥而卒故夫子因其所自咎者又立此法其諸以示萬世之防也與己卯地震附左傳楚子為舟師以伐濮南夷費無極言於楚子曰晉之霸也邇於諸夏而楚僻陋故弗能與爭若大城城父今襄城城父縣而置太子焉以通北方王收南方是得天下也王説從之故太子建居於城父令尹子瑕聘於秦拜夫人也秋齊髙發帥師伐莒左傳齊髙發帥師伐莒莒子奔紀鄣莒邑東海贛榆縣東北有紀城冬葬許悼公公羊傳賊未討何以書葬不成於弒也樂正子春曽子弟子之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈脫然疾除貌也言消息得其節止進藥而藥殺是以君子加弒焉爾曰許世子止弒其君買是君子之聽止也葬許悼公是君子之赦止也赦止者免止之罪辭也明止但得免罪不得繼父後許男斯代立無惡文是也榖梁傳日卒時葬不使止為弒父也曰子既生不免乎水火母之罪也羈貫謂交午剪髮以為飾成童八嵗以上不就師傳父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子不知嘗藥纍及許君也按君弒賊不討不書葬者非史䇿故不書也亦非孔子削之以為義例也大凡君弒賊不討必是賊自當國不肯禮葬其君崔杼側莊公于北郭之類不赴於列國列國無由往會其葬史䇿何由而書葬某公也哉間有書者或其人隱其罪逆自同繼位之常禮葬其君如蔡般是也或賊已就討或出奔而他人繼葬之如禮列國往會如許止既奔而斯繼之是也公榖不知此義乃以君弒賊不討不書葬為春秋定例至于悼公書葬謂之赦止恐非經旨二十年春王正月附左傳費無極言於楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣謂納建妻何信於讒王執伍奢忿奢切言方按費無極言建與伍奢將以城之外叛王問伍奢則奢猶可言也盡言明建之無他不入而見執則無如之何今乃直云王一過多矣何信于讒王方信讒又切言以激之奢亦未盡也使城父司馬奮揚殺太子未至而使遣之知太子寃故遣令去三月太子建奔宋王召奮揚奮揚使城父人執已以至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能苟二奉初以還奉初命以周旋不忍後命故遣之既而悔之亦無及己王曰而敢來何也對曰使而失命召而不來是再姦也逃無所入王曰歸從政如他日無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚奢之長子為棠大夫謂其弟員音云曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也仁者貴成功擇任而往知也員任報讐知死不避勇也尚為勇父不可棄俱去為棄父名不可廢俱死為廢名爾其勉之相從為愈伍尚歸奢聞員不來曰楚君大夫其旰食乎楚人皆殺之員如吳言伐楚之利于州于州于吳子僚公子光曰是宗為戮而欲反其讐不可從也光吳公子闔廬也員曰彼將有他志光欲弒僚不利員用事故破其議余姑為之求士而鄙以待之計未得用故進勇士以求入于光退居邉鄙乃見鱄設諸勇士焉而耕于鄙夏曹公孫會自鄸出奔宋鄸莫公反穀作夢公羊傳奔未有言自者此其言自何畔也畔則曷為不言其畔為公子喜時之後諱也喜時子臧也子臧讓國事見成十三年君子之善善也長惡惡也短惡惡止其身善善及子孫榖梁傳自夢者専乎夢也曹無大夫其曰公孫何也言其以貴取之而不以叛也劉氏曰公羊云不言其畔為公子喜時之後諱也非也所以諱賢者之過者謂小不足以妨大短不足以毁長而可以成人之美者也若乃大惡至叛君専地而猶為之諱乎汪氏曰春秋書大夫自叛邑出奔者皆先書叛故宋華亥向寧華定自南里出奔楚先書入南里以叛宋公弟辰自蕭來奔先書入蕭以叛此書自鄸出奔而先不書叛則非叛也蓋鄸乃公孫會繼其父之食邑而得専制之如榖梁之説爾得罪待放君無赦命是以自其所食之邑而奔他國也李氏亷曰此條書法與宋華向自南里出奔楚同左氏無傳已不可考賈逵及公羊皆以為叛然經不書叛故公羊有為喜時之後諱之説夫叛逆而以其祖父故諱之是管蔡不當誅於周也大傷教矣惟劉氏意林曰春秋之時臣能専其邑無不叛其國者能使其衆無不要其君者深察公孫歸父之至柳奔齊公孫會之自鄸奔宋其賢於臧武仲逺矣此説蓋本榖梁而胡氏亦取之然公孫會之書例之公孫手可矣胡氏亦謂為賢者之後諱之似鑿按公羊猶曰諱胡氏直謂其待放而後出奔得去國之禮而賢之矣又曰待放而後出奔臣子常禮免於貶足矣而何以賢之為公子喜時之後賢之也視公羊猶迂曲矣附左傳宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈于死先諸華亥偽有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廩八子皆公黨公如華氏請焉弗許遂劫之癸卯取太子欒與母弟辰公子地以為質辰及地皆元公弟公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質秋盜殺衛侯之兄縶公穀作輒左傳衛公孟縶狎輕也齊豹齊惡之子為衛司冦奪之司寇與鄄豹邑有役則反之無則取之縶足不良故有役則以官邑還豹使行公孟惡北宫喜褚師圃欲去之公子朝通于襄夫人宣薑靈公嫡母懼而欲以作亂故齊豹北宫喜褚師圃公子朝作亂初齊豹見宗魯于公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟聞難而逃是僣子也子行事乎吾將死之丙辰衛侯在平壽衛下邑公孟有事於蓋獲衛郭名之門外齊氏伏甲焉華齊御公孟宗魯驂乘及閎中曲門中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入乘驅乘車而疾驅也閲門衛城門蓋偏側之門載寶以出如死鳥衛地齊氏之宰渠子召北宫子喜也北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟於彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉霄子髙魴出奔晉閏月戊辰殺宣薑三十一年傳曰邾黑肱以濫來奔賤而書名重地也君子曰名之不可不慎也如是或求名而不得或欲蓋而名彰懲不義也齊豹為衛司寇守嗣大夫作而不義其書為盜邾庶其莒牟夷邾黑肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也劉氏曰左氏以齊豹書盜為求名而不得非也豹挾怨憤為亂耳本無不畏強禦之名不畏強禦之名亦非豹所求也榖梁傳盜賤也其曰兄母兄也目衛侯衛侯纍也然則何為不為君也曰有天疾者不得入乎宗廟輒者何也曰兩足不能相過齊謂之綦楚謂之踙女輒反衛謂之輒李氏亷曰春秋書盜者四尉止也齊豹也公孫翩也陽虎也皆大夫也任公輔以為豹非卿故曰盜而陳氏亦曰既奪之司寇則非卿矣恐其説亦是其罪衛侯之説穀梁得之冬十月宋華亥向寧華定出奔陳寧公作寧左傳宋公請於華費遂大司馬將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎恐殺太子臣是以懼敢不聽命公曰子死亡有命余不忍其詬恥也冬十月公殺華向之質而攻之戊辰華向奔陳華登費遂之子奔吳十有一月辛卯蔡侯廬卒廬左作盧附左傳齊侯疥遂痁痁瘧疾期而不瘳諸侯之賔問疾者多在梁丘據與裔欵二子齊嬖大夫言于公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知謂我不敬君盍誅於祝固史囂以辭賔公説告晏子晏子曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之衡鹿舟鮫虞侯祈望皆官名言公専山澤之利不與民共縣鄙之人入從其政逼介之關近關暴征其私鄭玄云古者竟上乃為關自竟至國更無關也齊於竟內更復置關縣鄙之人入從國役而又征其私也承嗣大夫世位者強易其賄布常無藝徵斂無度宫室日更淫樂不違內寵之妾肆奪於市外寵之臣僣令於鄙民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東齊西界也平原聊城縣東北有攝城姑尤以西齊東界也姑水尤水皆在城陽郡東南入海其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史修德而後可公説使有司寬政毁關去禁薄斂已責十二月齊侯田於沛至自田晏子侍于遄臺子猶梁丘據馳而造焉公曰惟據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪燀炊也宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘書聘止此宋華亥向寧華定自陳入于宋南里以叛叛公作畔左傳宋華費遂時為大司馬生華貙敕俱反華多僚華登貙為少司馬多僚為御士公御士與貙相惡乃譛諸公曰貙將納亡人亟言之公曰司馬以吾故亡其良子謂華登死亡有命吾不可以再亡之對曰君若愛司馬則如亡言愛司馬則當亡走失國死如可逃何逺之有言亡可以逃死勿慮其逺以恐動公公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬告司馬使逐貙司馬嘆曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐華貙臣尤之怪賜之厚曰必有故使子皮華貙承宜僚以劒而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩任翩亦華貙家臣殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸橫梁國睢陽縣南有橫亭華氏居盧門宋東南城門以南里叛六月庚午宋城舊鄘故城及桑林之門城門名而守之胡傳南里宋城內之里名也傳稱華氏居盧門以南里叛而宋城舊鄘及桑林之門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋汪氏曰榖梁云南里宋之南鄙非也不言邑而繫之宋為宋城內之里名無疑矣又曰叛直叛也謂直叛而不作亂夫外挾吳楚之援將以覆其宗國其君幾不免猶曰不作亂邪其書自陳陳亦有罪矣以奔亡之臣而能入國為亂非陳助之不能也晉荀吳會齊衛曹之師以救宋而不書圍宋南里者悼公圍彭城則以五大夫歸荀吳救宋而逸賊使華向逭於誅故不以討叛豫之也秋七月壬午朔日有食之左傳公問于梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行分同道也至相過也其他月則為災陽不克也故常為水二分日夜等故言同道二至長短極故相過理必相侵故言不為災按詩十月之交朔日辛卯日有食之亦孔之醜周之十月夏之八月秋分之月也而甚可醜惡七年四月甲辰朔日食春分之月也而云魯衛惡之安在其不為災邪梓慎不能因公之問告以省德消變之實而為是説以滋其怠玩卒使出逐應陽微之象非忠臣也八月乙亥叔輒卒輒公作痤附左傳冬十月華登以吳師救華氏齊烏枝鳴齊大夫戍宋厨人濮宋厨邑大夫曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師于鴻口梁國睢陽縣東有鴻口亭獲其二帥華登帥其餘以敗宋師公欲出出奔厨人濮曰吾小人可藉死可借使死難而不能送亡句君請待之待復戰決勝負乃徇曰揚徽幟也者公徒也衆從之國人皆揚徽齊烏枝鳴曰用少莫如齊致死齊致死莫如去備備長兵也彼多兵矣請皆用劔從之華氏北復即之厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏於新里華氏所取邑十一月癸未公子城以前年奔晉今還救宋以晉師至曹翰胡曹大夫會晉荀吳中行穆子齊苑何忌齊大夫衛公子朝前年出奔晉今還衛救宋丙戌與華氏戰於赭丘宋地大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我迋恐也不幸而後亡使華登如楚乞師華貙以車十五乘徒七十人犯師而出食于睢上哭而送之乃復入入南里楚薳越帥師將逆華氏太宰犯諫曰諸侯惟宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣冬蔡侯朱出奔楚朱榖作東左傳費無極取貨于東國東國隱太子之子平侯廬之弟朱叔父也而謂蔡人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴於楚楚子將討蔡無極曰平侯與楚有盟故封盟于鄧依陳蔡人以國其子有二心故廢之子謂朱也靈王殺隱太子其子與君同惡德君必甚又使立之不亦可乎且廢置在君蔡無他矣榖梁傳東者東國也何為謂之東也王父誘而殺焉父執而用焉奔而又奔之曰東惡之而貶之也奔既罪矣又奔讐國惡莫大焉汪氏曰或疑此書朱出奔楚後書東國卒於楚朱無歸入葬之文東國無出奔之事疑只是一事東即東國而誤為朱也然左傳昭二十七年記沈尹戍之言亦曰出蔡侯朱而史記蔡世家亦曰隱太子子東國攻平侯子而代立則朱東國固兩人也豈榖梁經文因後書東國而誤也與公如晉至河乃復左傳公如晉及河鼓叛晉晉將伐鮮虞故辭公二十有二年春齊侯伐莒左傳春王二月甲子齊北郭啓齊大夫帥師伐莒莒子將戰苑羊牧之莒大夫諫曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師於壽餘莒地齊侯伐莒莒子行成司馬竈齊大夫如莒涖盟莒子如齊涖盟盟於稷門齊城門之外莒于是大惡其君宋華亥向寧華定自宋南里出奔楚左傳楚薳越使告於宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚於父兄華向公族故稱父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過若惠保敝邑無亢不衷以奬亂人孤之望也唯君圗之楚人患之知義不直故諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚宋公使公孫忌為大司馬代費遂邊卬為大司徒代華定樂祁為司城仲幾為左師代向寧樂大心為右師代華亥樂挽為大司寇以靖國人按入春秋亂臣賊子有之矣未有劫其君殺其羣公子質其太子母弟亡而再入圗危宗社與君分國而居君臣日戰借敵國之援如宋華向之甚者也黨乎亂賊為之羽翼者亦有之矣未有借之師以抗諸侯之討如楚之甚者也楚莊王入陳納公孫寧儀行父于陳君子猶惡之以為內弗受而強納之制人之上下使不得其道況遣將帥師以逆鄰國不令之臣曰寡君請受而戮之明為亂臣之地制其君使無討是豈止于亢不衷奬亂人而已乎欒盈奔楚再入於曲沃而晉得誅之華向奔陳再入於南里而楚特脫之楚之右賊而蔑中國也至是極矣夫人之所以為人中國之所以為中國以有君臣父子也若楚人者淫名荐食多為不義九鼎可問則無君宫甲可圍則無父無父無君禽獸而已矣而恃兩廣荆尸之衆以主中國之盟會則可以制中國之君臣使不得其所於是宋華亥向寧華定自宋南里出奔楚矣豈非禽獸逼人人將相食之明驗乎卒之吳師入郢故臣鞭尸而楚遂以不振身為亂首又奬亂臣天之報施不爽也然薳越之使來告也宋之辭直楚人患之使中國有人秉吾理直之壯宋竭力必討之于內諸侯協心必討之于外區區南里之賊已搏膺而呼旦夕為欒氏之不暇楚知千里勞師以逆亂人得一二亂人何利于楚而徒失諸侯必亦遁矣而諸侯之戍遽曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功固請於宋而宋從之是怠於救患亦諸侯之罪而佚賊亦宋之罪也故晉荀吳齊苑何忌衛公子朝曹大夫皆略而不書而書自宋南里出奔楚交見之矣大搜于昌間間公作姦八年秋搜于紅十一年夏大搜于比蒲此年春大搜于昌間皆三家假搜禮以數軍實擇材勇強私黨耳或于秋或于夏或于春不過以搜事耳意非在應時禮也文王之時人倫既正爰整于旅朝廷既治無淫于田是以詩歌庶類蕃殖搜田以時魯昭之世大夫不有其君陪臣不有其大夫人綱人紀紊於朝廷軍政之本亡矣而亟搜之為務出於強家而公不與焉故屢書以為後戒也昌間魯地夏四月乙丑天王崩左傳王子朝景王之庶長子賔起子朝之傅有寵于景王王與賔孟即起也説如字之欲立之劉獻公劉摯之庶子伯蚠劉狄事單穆公單旗惡賔孟之為人也願殺之又惡王子朝之言子朝有非分之言以為亂願去之夏四月王田北山洛北邙也使公卿皆從將殺單子劉子王有心疾乙丑崩于榮錡氏河南鞏縣有榮錡澗戊辰劉子摯卒無子單子立劉蚠五月庚辰見王見王猛遂攻賔起殺之盟羣王子於單氏六月叔鞅如京師如京師止此葬景王王室亂左傳丁巳葬景王王子朝因舊官百工百官之喪職秩者與靈景之族以作亂帥郊要餞之甲三邑周地以逐劉子壬戌劉子奔揚周邑單子逆悼王子猛也于莊宫以歸王子還子朝黨夜取王以如莊宫癸亥單子出王子還與召莊公召伯奐子朝黨謀曰不殺單旗不捷與之重盟必來遂奉王以追單子及領周地大盟而復劉子如劉單子亡乙丑奔于平畤周地之知王子還謀故羣王子追之單子殺還姑發弱鬷延定稠八子靈景之族子朝奔京丙寅伐之單子伐京京人奔山劉子入於王城辛未鞏簡公敗績于京乙亥甘平公亦敗焉甘鞏二公周卿士皆為子朝所敗胡傳何言乎王室亂王者以天下為家則以京師為室京師者本也以京師為室王畿為堂諸夏為庭户四夷為藩籬治外者先自內治逺者先自近本亂而末治者否矣景王寵愛子朝欲以孽奪嫡使至爭亂故言王室亂言其父子兄弟自亂之也劉子單子以王猛居于皇左傳單子欲告急于晉秋七月戊寅以王如平畤遂如圃車次于皇出次以示急胡傳凡稱以者不以者也尊不以乎卑貴不以乎賤劉蚠扶粉反單旗臣也曷為能以王猛乎猛無寵于景王不能自定其位制在劉單也按左氏景王太子壽以昭十五年卒至是八年矣猛與丐皆其母弟禮無疑于當立然久而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子爭欲立以正則有猛以寵則有朝猛雖正而無寵朝雖寵而不正二子廢立皆恃大臣強弱而後定者也故特稱曰以而景王弱後嗣輕宗社之罪亦著矣易曰王居旡咎稱居于皇者明其有土當得位之稱也杜氏曰河南鞏縣西南有黃亭秋劉子單子以王猛入于王城左傳劉子如劉單子使王子處守于王城距子朝盟百工于平宫平王廟辛邜鄩肸子朝黨伐皇大敗獲鄩肸壬辰焚諸王城之市八月辛酉司徒醜以王師敗績于前城子朝所取邑百工叛己巳伐單氏之宫敗焉百工伐單氏為單氏所敗庚午反伐之單氏反伐百工辛未伐東圉百工所在冬十月丁巳晉籍談荀躒帥九州之戎州鄉屬也五州為鄉九州戎陸渾戎十七年滅屬晉及焦瑕溫原晉四邑之師以納王于王城庚申單子劉蚠以王師敗績于郊前城人子朝衆敗陸渾于社周地胡傳猛未踰年何以稱王示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也君前臣名劉單不名而王名不嫌于例置乎曰君前臣名常禮也禮當其變臣有不名名其君而不嫌者矣王不當稱未踰年而稱王名不當稱立為君而稱猛皆禮之變也惟可與權者能知其變而不越乎道之中再書劉子單子之以王何也春秋詞繁而不殺者必有美惡焉劉子單子蓋挾天子以令諸侯而専國柄者也王猛在喪不稱子而稱王明正也書名者别子朝也居于皇入于王城而書猛别嫌也王猛未踰年是以不可稱天王又不可以諸侯例稱子也獨言子則似魯之子冠王于子又與他王子相亂故稱王繫猛王城天子都而子朝之黨在焉故言入入者難詞也公羊言篡辭榖梁云內弗受皆妄也冬十月王子猛卒左傳王子猛卒不成喪也釋所以不稱王崩敬王即位猛母弟丐館于子旅氏周大夫十二月庚戌晉籍談荀躒賈辛司馬督帥師軍于隂籍談所軍于侯氏荀躒所軍于溪泉賈辛所軍次于社司馬督所次王師軍于汜于解次于任人王師分在三邑閏月晉箕遺樂徴右行詭三子晉大夫濟師渡伊洛取前城軍其東南王師軍于京楚子朝所在辛丑伐京毁其西南孫氏曰言王所以明當嗣之人也言子所以見未踰年之君也言猛所以别羣王子也不崩不葬降成君也安定胡氏曰生則書王明實為嗣死乃稱子正未踰年未成天子之至尊李氏亷曰公榖皆以子猛為篡故卒義不可從十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉婼勑略反公作舍下同癸丑叔鞅卒晉人執我行人叔孫婼左傳邾人城翼邾邑還將自離姑邾邑從離姑則道經魯之武城公孫鉏邾大夫曰魯將御我欲自武城還循山而南至武城而還依山南行不欲過武城徐鉏丘弱茅地三子邾大夫曰道下遇雨將不出是不歸也遂自離姑武城人塞其前斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師獲鉏弱地邾人訴于晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐訟曲直叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制故也乃不果坐韓宣子使邾聚其衆將以叔孫與之叔孫聞之去衆與兵而朝示欲以身死士彌牟謂韓宣子曰子弗良圗而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸子雖悔之何及所謂盟主討違命也若皆相執焉用盟主乃弗與使各居一館分别叔孫子服回士伯聽其辭而訴諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏欲使邾人見叔孫之屈辱先歸邾子士伯曰以芻蕘之難從者之病將館子于都别都謂箕也叔孫旦而立期焉立待命也從旦至暮為期乃館諸箕舍子服昭伯于他邑范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣為叔孫故申豐以貨如晉叔孫曰見我吾告女所行貨見而不出留申豐不使得出不欲以貨免吏人之與叔孫居于箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其墻屋去之如始至晉人圍郊左傳春王正月壬寅朔二師王師晉師圍郊癸卯郊鄩潰二邑皆子朝所得丁未晉師在平隂今河隂縣王師在澤邑王使告間音間庚戌還晉師還按郊子朝邑也不書大夫之名氏又不稱師而曰晉人微之也所謂以其事而微之者也天子蒙塵晉為方伯不躬率諸侯以赴其急直取子朝以定王位乃徐遣大夫帥偏師薄為之援勤王之義若是乎書晉人圍郊而罪自見矣夏六月蔡侯東國卒于楚因朝于楚而卒也榖梁有失德不葬之説東國其是矣王父殺父見用奔而又奔之也秋七月莒子庚輿來奔左傳莒子庚輿虐而好劔苟鑄劍必試諸人國人患之又將叛齊烏存莒大夫帥國人以逐之庚輿將出聞烏存執殳而立于道左懼將止死苑羊牧之曰君過之烏存以力聞可矣何必以弒君成名遂來奔齊人納郊公著丘公之子戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧父公穀作甫髠苦門反逞公作楹齧五結反左傳吳人伐州來楚薳越帥師令尹以疾從戎故薳越攝其事及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒即令尹不起所疾也楚師熸熸子潛反吳楚之間謂火滅為熸軍之重主喪亡故其軍人無復氣勢吳公子光曰諸侯從于楚者衆而皆小國也畏楚而不獲已是以來吾聞之曰作事威克其愛雖小必濟胡沈之君幼而狂陳大夫夏齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一帥賤薳越非正卿也軍多王之寵人政令不一于越七國同役而不同心帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威示之不整以誘之後者敦陳整旅吳子從之戊辰晦戰于雞父吳子以罪人三千先犯胡沈與陳三國爭之吳為三軍以繫于後中軍從王光帥右掩餘帥左掩餘吳王夀夢子吳之罪人或奔或止三國亂吳師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也不言戰楚未陳也公羊傳君死於位曰滅生得曰獲大夫生死皆曰獲穀梁傳中國不言敗此其言敗何也中國不敗胡子髠沈子盈其滅乎其言敗釋其滅也獲陳夏齧獲者非與之辭也杜氏曰不書楚楚不戰也雞父楚地安豐縣南有雞備亭胡傳吳伐州來楚令尹帥師及諸侯之師與吳戰曷為不書楚令尹既喪楚師已熸六國先敗楚師遂奔是以不書楚也諸侯之師曷為略而不序頓胡沈則其君自將蔡陳許則大夫帥師言戰則未陳也言敗績則或滅或獲其事亦不同也或曰滅或曰獲别君臣也君死曰滅胡子髠沈子逞是也生得曰獲秦晉戰於韓原獲晉侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也書其敗不以國分而以君大夫為序書其死不以事同而以君臣為别皆所以辨上下定民志雖顛沛必於是也其義行而亂自熄矣劉氏曰疑楚本與諸侯同救州來既而令尹卒楚軍留而諸侯之師先至吳以詭計勝之楚師實未與吳相接故經不書楚也天王居于狄泉尹氏立王子朝朝如字杜氏曰敬王辟子朝也狄泉今洛陽城內大倉西南池水也時在城外尹氏周世卿也書尹氏立子朝明非周人所欲立敬王始立而遽稱天王者景王崩已踰年不可曠年無君故稱之且明正也立者不宜立也稱立而目尹氏見世卿之擅權亂國為後戒也八月乙未地震左傳八月丁酉南宫極震萇𢎞謂劉文公曰周之亡也三川震今西王之大臣亦震天棄之矣西王謂子朝南宫極其黨杜氏曰經書乙未地震魯地也丁酉南宫極震周地亦震也為屋所壓而死三川涇渭洛也地動川岸崩謂幽王時楚太子建之母在郹召吳人而啓之冬十月甲申吳太子子樊入郹孔氏曰吳子遏號諸樊王僚是遏之弟子何容僚子乃取遏號為名恐傳寫誤取楚夫人與寶器以歸楚司馬薳越追之不及將死衆曰請遂伐吳以徼之薳越曰再敗君師死且有罪亡君夫人不可以莫之死也乃縊于薳澨楚地杜氏曰郹郹陽也平王娶秦女廢太子建故母歸其家郹古閴反冬公如晉至河有疾乃復至河下公穀又有公字左傳公為叔孫故如晉及河有疾而復附楚囊瓦子囊乏孫子常也代陽丐為令尹城郢沈尹戍曰子常必亡郢苟不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四竟慎其四竟結其四援民狎其野三務成功民無內憂而又無外懼國焉用城今吳是懼而城于郢守已小矣卑之不獲能無亡乎若敖蚡冒至于武文土不過同慎其四竟猶不城郢今土數圻而郢是城不亦難乎二十有四年春王二月丙戌仲孫貜卒婼至自晉公有叔孫字婼作舍按左氏榖梁無叔孫字左氏曰婼至自晉尊晉也杜預曰貶婼族所以尊晉婼行人故不言罪已蓋以意如至自晉傳言尊晉罪已意如以罪見執宜在罪已婼本使人不應見執故尊晉而已內大夫行還皆不書至異于公也今此二人執而見釋更以書至見義也今按生事疆埸侵奪寡小罪在季氏而晉不能討徒能加怒于使人君子蓋賤晉之偷也何尊晉之有若以為推魯之心魯之于晉畏威而強服亦未必知罪而悔則尊晉罪已亦非魯人之心也意如之不氏一事而再見卒名耳婼公羊作舍而有叔孫字胡氏因以為春秋特書氏以賢之恐亦未必經意也婼父子皆因季氏見執季武子伐莒取鄆叔孫豹見執子會趙文子求貨于叔孫而弗與至是邾人城翼未嘗我犯而襲取其師蓋亦季氏之謀也叔孫婼又見執于晉范獻子求貨而又弗與昔晉歸意如子服惠伯曰合諸侯而執其老若曰無罪而惠免之請從君惠于會晉人患之使叔魚見季孫曰歸子而不歸鮒也聞諸吏將為子除館于西河季孫懼而逃歸叔孫婼聞將館于箕則立而待命從旦至暮從容不屈晉人卒禮而歸之由是觀之婼與意如之賢不肖逺矣附左傳三月庚戌晉侯使士景伯涖問周故就問子朝敬王知誰曲直士伯立于乾祭王城北門而問于介大也衆晉人乃辭王子朝不納其使夏五月乙未朔日有食之左傳梓慎曰將水隂勝陽故昭子曰旱也日過分而陽猶不克克必甚能無旱乎按梓慎叔孫皆妄測天道或傳者因時之旱而附會也日食之示戒逺矣非為水旱也日過分而陽猶不克克必甚此流行之氣也日月隂陽之精也以精之盛衰相為虧蝕水旱之故不相及也附左傳六月壬申王子朝之師攻瑕及杏敬王邑皆潰鄭伯如晉子太叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯而憂宗周之隕為將及焉嫠寡婦也寡婦織不憂其緯之不繼而憂周之隕為將及已今王室實蠢蠢動擾貌焉吾小國懼矣然大國之恥也吾儕何知焉獻子懼而與宣子韓起圖之乃徴會于諸侯期以明年秋八月大雩丁酉杞伯郁釐卒郁公作鬱冬吳滅巢左傳楚子為舟師以略吳疆略行也行吳界將侵之沈尹戍曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆埸無備邑能無亡乎越大夫胥犴勞王于豫章之汭水曲越公子倉歸王乘舟倉及壽夢帥師從王壽夢大夫王及圉陽楚地而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戍曰亡郢之始于此在矣王一動而亡二姓之帥謂守巢與鍾離大夫幾如是而不及郢胡傳巢楚之附庸實邑之也書吳入州來著陵楚之漸書吳滅巢著入郢之漸葬把平公二十有五年春叔孫婼如宋左傳叔孫婼聘于宋宋公享昭子明日宴飲酒樂宋公使昭子右坐以相近言改禮坐語相泣也樂祁佐退而告人曰吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久季公若平子庶叔父之姊平子庶姑與公若同母為小邾夫人生宋元夫人平子之外姊生子以妻季平子昭子如宋聘且逆之公若從從昭子謂曹氏宋元夫人勿與魯將逐之曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣文子武子平子魯君喪政四公矣宣成襄昭無民而能逞其志者未之有也靖以待命猶可動必憂杜氏曰平子人臣而因卿逆季氏強橫夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父詣五計反公穀作倪音詣後同大心公作世心後同父音甫左傳夏會于黃父謀王室也趙簡子鞅令諸侯之大夫輸王粟具戍人曰明年將納王子太叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮者天之經也道之常地之義也利之宜民之行也人所履行天地之經而民實則之則天之明日月星辰天之明也因地之性髙下剛柔地之性也生其六氣隂陽風雨晦明用其五行金木水火土氣為五味發為五色章為五聲淫則昏亂民失其性滋味聲色過則傷性是故為禮以奉之使不失性為六畜馬牛羊犬豕雞五牲麋鹿麏狼兔三犧祭天地宗廟三者之牲曰犧以奉五味為九文山龍華蟲以下九章六采畫績之事雜用天地四方之色青與白赤與黑玄與黃皆相次五章青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五色備謂之繡以奉五色為九歌八風七音六律以奉五聲九歌九功之德皆可歌也六府三事謂之九功八風八方之風七音宫商角徵羽變宫徵也六律隂律六陽律六為君臣上下以則地義君上治臣下承以法地之髙下為夫婦內外以經二物夫治外婦治內各治其物以法地之剛柔地事少故先言之為父子兄弟姑姊甥舅昏妻父媾重昏姻壻父亞兩壻相謂以象天明日月星辰猶親屬之相繫其明有大小之象其躔離逺近有親踈之象為政事庸力行務以從四時在君為政在臣為事民功曰庸治功曰力行其德教務其時要禮之本也為刑罰威獄使民畏忌以類其震曜殺戮雷電震曜秋冬殺戮天之威也刑象之為溫慈惠和以效天之生植長育春生夏長雨露滋培天之惠也德象之民有好惡喜怒哀樂生于六氣情志之感稟六氣而生是故審則可否之宜宜類輕重之等以制六志使不過節哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生于好怒生于惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協于天地之性是以長久簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者猶言能自矯揉以合禮之節不徑情也謂之成人大不亦宜乎張氏曰黃父即黑壤晉地按敬王初立子朝多黨然晉一徵會而諸侯響答是知邪不勝正久矣然此王事也而無美辭何也王室不靖于今四年矣晉蓋徐徐焉其君不親又待來年逮王室之將定而竊其功故書辭如此有鸜鵒來巢鸜其俱反稽康音權本又作鴝音劬公作鸛音權鵒音欲左傳書所無也傳載童謡明言昭公出辱之事不足信公羊傳何以書記異也何異爾非中國之禽也宜穴又巢也考工記鸜鵒不踰濟注云不踰濟無妨中國有也何休曰自下居上之徵秋七月上辛大雩季辛又雩左傳秋書再雩旱甚也杜氏曰季辛下旬之辛也九月己亥公孫于齊次于陽州己亥榖作乙亥孫音遜陽公作楊左傳初季公鳥平子庶叔父公若之兄娶于齊鮑文子生申公鳥死季公亥即公若與公思展季氏族與公鳥之臣申夜姑相其室及季姒公鳥妻鮑文子女與饔人檀通而懼乃使其妾抶已以示秦遄魯大夫之妻公鳥妹秦姬也曰公若欲使余余不可而抶余又訴于公甫平子弟曰展與夜姑將要余秦姬以告公之亦平子弟也公之與公甫告平子平子拘展于卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使豎勿內日中不得請有司逆命迎受殺生之命公之使速殺之故公若怨平子季郈之雞鬭季氏介其雞為雞著甲髙誘注呂氏春秋云鎧著雞頭郈氏為之金距平子怒以其不下已益宫于郈氏侵彼以自廣且讓責也之故郈伯亦怨平子臧昭伯臧為子之從弟會為讒于臧氏而逃于季氏臧氏執旃平子怒拘臧氏老將禘于襄公萬者二人其衆萬于季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓于公為公為昭公子務人且與之出射于外而謀去季氏公為告公果公賁果賁皆公為弟公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難知字難下恐合有辭字告郈孫郈孫以可勸告子家懿伯子家羈莊公玄孫懿伯曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圗也公退之辭曰臣與聞命矣言若泄臣不獲死乃館于公叔孫昭子如闞魯邑公居于長府九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許魯城南自有沂水請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝姦惡作弗可知也衆怒不可蓄也季氏衆蓄而弗治將蕰蕰蓄民將生心生心同求將合君必悔之弗聽郈孫曰必殺之公使郈孫逆孟懿子仲孫何忌叔孫氏之司馬鬷戾言于其衆曰若之何莫對衆疑所助又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入陷公圍也公徒釋甲執氷而踞氷櫝丸蓋櫝丸箭筒也其蓋可以取飲遂逐之逐公徒孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之于南門之西遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止使若非君本意者君自可止不出意如之事君也不敢不改公曰余不忍也與臧孫如墓謀辭先君且謀所奔遂行己亥公孫于齊次于陽州杜氏曰陽州齊魯竟上邑未敢直前故次于竟程子曰人君之尊雖屯難之世于其名位非有損也唯其施為有所不行德澤有所不下是屯其膏既膏澤有所不下是威權不在已也威權去已而欲驟正之求凶之道魯昭公髙貴鄉公之事是也故小貞則吉小貞則漸正之也若盤庚周宣修德用賢以道馴致為之不暴也按史記是年孔子適齊答景公問政有君君臣臣父父子子之語斯言人但知其為景公而發不知其微意所在殆亦為魯事而發也使齊能用孔子豈但齊國之君臣父子定魯之君臣父子亦定矣聖人以此正天下王道可興焉又豈但齊無陳氏之禍昭公可以速正反本不至于乾侯再辱而已哉齊侯唁公于野井唁音彥左傳齊侯將唁公于平隂公先至于野井齊侯曰寡人之罪也使有司待于平隂為近故也齊侯曰自莒疆以西請致千社二十五家為社千社二萬五千家欲以給公以待君命待君伐季氏之命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也子家子曰天祿不再天若祚君不過周公以魯足矣失魯而以千社為臣誰與之立且齊君無信不如早之晉弗從杜氏曰濟南祝阿縣東有野井亭齊侯來唁公公不敢逺勞故逆之往至野井公羊傳昭公將弒季氏告子家駒子家駒曰牛馬維婁繫馬曰維繫牛曰婁委己者也委食己者而柔焉言牛馬之維婁乃呞已者實為之而服聽焉物固受制于鼻息我者也魯國之人維婁于季氏也久矣季氏得民衆久矣君無多辱焉昭公不從其言而敗焉走之齊齊侯唁公于野井昭公噭然而哭諸大夫皆哭以人為災災周埒垣也以幦為席幦車覆笭以鞍為几以遇禮相見榖梁傳弔失國曰唁趙氏曰弔生曰唁詩歸唁衛侯冬十月戊辰叔孫婼卒左傳昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰苟使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之恐從者知叔孫謀公與昭子言于幄內曰將安衆而納公公徒將殺昭子昭子謀歸安衆而後納公則獨公得入從公伐季氏者不得入故欲殺昭子伏諸道左師展告公公使昭子自鑄歸辟伏兵也平子有異志不欲復納公冬十月辛酉昭子齊于其寢使祝宗祈死戊辰卒恥為平子所欺因祈而自殺左師展將以公乘馬而歸公徒執之展魯大夫欲與公俱輕歸古者服牛乘馬馬以駕車不單騎也至六國時始有單騎蘇秦所云車千乘騎萬匹是也曲禮云前有車騎禮記漢世書耳李亷曰昭公之禍原于叔孫氏之司馬昭子既歸倘正鬷戾之罪而誅之亦庶足以翦季氏之羽翼而徐為之圗今乃付之無可奈何不及寧俞逺矣祈死之説不可信按平子雖有異志改立君其所未敢也昭子而在則納公之事昭子以身任之通內外安衆心必克有成而後已此固昭子之心也何至遂祈死而自裁乎此年春昭子在宋樂祁已知其將死則昭子實夀終耳季氏逐君為之徒者衆矣昭子謀歸安衆而後納公蓋欲安助季氏伐公徒之衆也無季氏是無叔孫氏也三家同情使叔孫不如闞必不能助公以伐季氏矣而可望以誅鬷戾乎十有一月己亥宋公佐卒于曲棘左傳宋元公為公故如晉卒于曲棘公羊傳曲棘者何宋之邑也諸侯卒其封內不地此何以地憂內也杜氏曰曲棘宋地陳留外黃縣城中有曲棘里胡傳宋元意如之外舅而求納公是以正倫恤患為心而不匿其私親之惡者也故雖卒于封內而特書其地以别之也十有二月齊侯取鄆公羊傳外取邑不書此何以書為公取之也榖梁傳取易辭也內不言取以其為公取之故易言之也家氏曰是時晉政已衰霸權未有所屬齊景有志修桓公之業當請命天王號召與國納昭公于魯戮意如以示天下而霸政舉矣乃以取鄆為首務姑塞已責勇于義者不爾按取魯邑以處公蓋無意于納公也使移圍鄆之師直指魯郊問昭公出故執意如歸之京師復昭公于魯則齊之義聲振于天下矣二十有六年春王正月葬宋元公三月公至自齊居于鄆左傳言魯地也杜氏曰入魯竟故書至猶在外故書地自是每嵗公行必書至書居凡五見及鄆潰乃書公在乾侯曰居雖非其所猶吾土也曰在者非吾土矣夏公圍成左傳夏齊侯將納公命無受魯貨申豐從女賈二人皆季氏家臣以幣錦二兩二犬為一端二端為一兩所謂匹也二兩二匹縳一如瑱瑱充耳縳卷也急卷使如充耳易懷藏適齊師謂子猶梁丘據之人髙齮子猶家臣能貨子猶為髙氏後粟五千庾言若能為我行貨于子猶當為請使得為髙氏後又當致粟五千庾庾十六斗凡八千斛髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財言魯人買此甚多布陳之以百兩為數子猶受之言于齊侯曰羣臣不盡力于魯君者非不能事君也然據有異焉宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯君有罪于鬼神故及此也君若待于棘十年傳云柏子召子山而反棘焉杜云齊國西安縣東有戟里亭此即彼棘也本無曲字今世本誤使羣臣從魯君以卜焉卜知可伐否若可師有濟也君而繼之茲無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公鉏齊大夫成大夫公孫朝謂平子曰有都以衛國也請我受師以成邑受齊師許之請納質恐見疑弗許曰信女足矣告于齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩於齊詐降以致齊師圍成使魯得為備齊師圍成成人伐齊師之飲馬于淄水出泰山梁父縣西北入汶者曰將以厭衆以厭衆心不欲使知已降也魯成備而後告曰不勝衆言衆不欲降師及齊師戰于炊鼻魯地按齊侯謀納公幸臣梁丘據餌季氏之貨獻謀于齊侯而齊侯聽之使公子鉏帥師從公則當書公以齊師圍成否則曰公及齊師圍成可也而曰公圍成者惡齊之為利回為義疚以為雖得其師不足以也為齊侯者當昭公次于陽州之時悉賦以從直造魯都詰其罪人而戮之則一舉而事定大義申矣而乃唁之野井是拒其適已也取鄆以居之是示不急納之也遷延而為是師身不自臨將非正卿使公子鉏帥師從公以卜可伐而已齊之無能為季氏知之矣故使成大夫偽降以牽留齊師成備而後薄與之戰齊人皆無鬬心所謂若其無成君無辱焉持是以復于齊侯齊侯亦姑有所藉口以塞魯君之意而已夫以討罪之舉而區區圍一邑昭公將其偏師不恥與大夫同事而亦區區自圍其一邑季氏貨餌幸臣遙制齊侯之心腹按兵國都以遙竟之一邑受其師吾君在焉而以有司常𨽻敵而與之亢齊之罪季氏之惡與昭公之無復反之兆也具見之矣杜氏曰成孟氏邑不書齊師帥賤衆少重在公秋公會齊侯莒子邾子把伯盟于鄟陵鄟音專又市轉反左傳謀納公也杜氏曰鄟陵地闕公至自會居于鄆九月庚申楚子居卒左傳楚平王卒令尹子常欲立子西平王之長庶曰太子壬昭王弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也言王子建聘之是章君王之惡國有外援秦也不可瀆慢也也王有適嗣不可亂也敗親速讎不立壬秦將來討亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王冬十月天王入于成周左傳晉荀躒音歷趙鞅帥師納王使女寬晉大夫守闕塞洛陽西南伊闕也守之偹子朝王入于成周晉師使成公般晉大夫戍周而還安定胡氏曰因狄泉故稱入孫氏曰子朝之亂甚矣悼王既死敬王即位于外四年始反正于宗廟不言歸而言入者言歸嫌與即位于內者同故變文言入以著即位于外也陳氏曰惠王出入皆不書襄王雖書出猶不書入也於是悼王自皇敬王自狄泉則曷為皆書入幸之也王室亂矣入無足諱焉爾按漢河南縣即郟鄏武王遷九鼎周公營以為都是為王城漢洛陽縣周公營下都以遷殷民是為成周王城曰東都蓋以鎬京為周之西都相對而言也成周為下都蓋以王城為洛之上都相對而言也平王東遷定都于王城子朝之亂王城為所據故敬王入于成周而居焉後竟定都成周左氏敘王入成周在子朝奔楚之後今依經正之成周既天子之都則不曰入于京師何也京師衆大之稱自諸侯言則曰如京師歸之于京師必以衆大言之以示所尊也自天王自言則曰入于王城入于成周直以地名書之足矣或謂著其衰弱齊于列國故不稱京師非也尹氏召伯毛伯以王子朝奔楚左傳晉師克鞏知躒趙鞅之師王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚按經書召伯傳言召氏之族杜預以召伯當云召氏王子朝使告于諸侯曰單旗劉狄剝亂天下晉為不道是攝是贊兹不榖震蕩播越竄在荆蠻未有攸底昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及太子壽早夭即世單劉贊私立少以間先王唯伯仲叔季圗之何氏曰立子朝獨舉尹氏出奔并舉召毛者明本在尹氏當誅首惡然後治其黨附左傳齊有彗星出齊之分野齊侯使禳之晏子曰無益也祗取誣焉天道不諂不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損齊侯與晏子坐于路寢公嘆曰美哉室其誰有此乎晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施于民豆區釡鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣公曰是可若何對曰惟禮可以已之在禮家施不及國大夫不收公利公曰善哉吾不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自専婦聽而婉禮之善物也二十有七年春公如齊公至自齊居于鄆憂四月吳弒其君僚左傳吳子欲因楚喪而伐之前年楚平王卒使公子掩餘公子燭庸二子皆王僚母弟帥師圍潛楚邑在廬江六縣西南使延州來季子聘于上國季子本封延陵後復封州來故曰延州來遂聘于晉以觀諸侯楚莠尹然王一作工尹麋帥師救潛二尹楚官然麋其名左司馬沈尹戍帥都君子與王馬之屬以濟師都君子在都邑之士有復除者王馬之屬王之養馬官屬校人也濟益也與吳師遇于窮令尹子常以舟師及沙水名汭而還左尹郤宛工尹夀帥師至于潛吳師不能退楚師強故吳不得退去吳公子光曰此時也不可失也欲因其師徒在外國不堪役以弒王告鱄設諸曰上國有言曰不索何獲我王嗣也光吳王諸樊子也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弒也母老子弱是無若我何猶言我無若是何欲以老弱托光光曰我爾身也夏四月光伏甲于堀室堀地為室而享王王使甲坐于道及其門坐道邊至光門門階户席皆王親也夾之以鈹普皮反劍也羞者獻體改服于門外羞進食也獻體解衣執羞者坐行膝行而入執鈹者夾承之及體以相授也鈹及進羞者體以傳授食光偽足疾入于堀室恐難作王黨殺已素辟之鱄設諸置劒于魚中以進全魚炙抽劍刺王鈹交于胸遂弒王闔廬以其子為卿季子至曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復使命于僚墓復位而待復本位待光命吳公子掩餘奔徐公子燭庸奔鍾吾小國楚師聞吳亂而還言聞吳亂明郤宛不取賂而還杜氏曰僚亟戰民罷又伐楚喪故光乘間而動稱國以弒罪在僚楚殺其大夫郤宛郤穀作郤宛於苑反又於元反左傳郤宛直而和國人説之鄢將師為右領官名與費無極比而惡之令尹子常賄而信讒無極譛郤宛焉謂子常曰子惡欲飲子酒子惡郤宛又謂子惡令尹欲飲酒于子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何酬獻報無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗曰帷諸門左無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也此春救潛之役吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉編菅苫也或取一秉把也秆稿也焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟定及他令終陽丐子與晉陳楚大夫及其子弟晉陳之族呼于國曰鄢氏費氏自以為王専禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何令尹病之秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈左傳秋會于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨于季孫謂司城子梁宋樂祁也與北宫貞子衛北宫喜曰季孫未知其罪而君伐之請囚請亡于是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而説甲執氷以遊叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援公雖在齊言齊不致力有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圗國者也而欲納魯君鞅之願也請從二子以圖魯無成死之二子懼皆辭乃辭小國而以難復胡傳文十五年諸侯盟于扈將為魯討齊齊侯賂之而不克討故在會諸侯略而不序今此謀納公亦以賂故不克納而諸國之大夫皆序何也曰利于納公者宋衛之大夫也受賂而不欲納公者獨范鞅主之耳又況戍周之令行乎所以列序而不略也以此見聖人取舍之大情而輕重審矣按淮夷與之有十年之備欲何為哉有列國之權而弗敢宣也事君如在國意如之姦深矣冬十月曹伯午卒邾快來奔徐邈曰自此以前邾畀我庶其並來奔今邾快又至三叛人俱以魯為主邾魯鄰國而聚其逋逃為過之甚故悉書之以示譏也小國無大夫故但舉名而略其氏家氏曰庶其畀我來奔季孫宿始納之今邾快又來奔意如復納之宿意如世濟其凶不君其君又誘人之臣使之叛其君而已為之逋逃主罪可勝誅乎快邾之賤者不足録也而春秋録之誅季氏之無君也三十一年黑肱以濫來復受之而不疑推其無忌憚之心亦何所不至春秋詳之非誅叛人實誅季氏也附左傳孟懿子陽虎伐鄆陽虎季氏家臣伐鄆欲奪公鄆使公不得居也鄆人將戰子家子曰天命不慆久矣慆疑也言棄居不疑使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知近鄆地楚郤宛之難國言未已進胙者國中祭祀也莫不謗詛也令尹沈尹戌言于子常曰夫左尹與中廏尹莫知其罪而子殺之以興謗讟至于今不已左尹郤宛也中廏尹陽令終戍也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圗不亦異乎夫無極楚之讒人也民莫不知去朝吳出蔡侯朱喪太子建殺連尹奢屏王之耳目使不聰明不然平王之溫惠共儉有過成莊無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗三不辜郤氏陽氏晉陳氏幾及子矣子而不圗將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位吳新有君光新立疆埸日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月己未子常殺費無極與鄢將師盡滅其族以説于國謗言乃止公如齊左傳齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安比公于大夫也禮君不敵臣晏大夫使宰為主獻獻爵也請安齊侯請自安不在坐也子仲魯公子憖十二年奔齊之子曰重為齊侯夫人曰請使重見子家子乃以君出公至自齊居于鄆附左傳十二月晉籍秦籍談子致諸侯之戍于周魯人辭以難二十有八年春王三月葬曹悼公公如晉次于乾侯左傳春公如晉將如乾侯子家子曰有求于人而即其安人孰矜之其造于竟弗聽使請逆于晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安於甥舅其亦使逆君言自使齊逆君使公復于竟而後逆之杜氏曰乾侯在魏郡斥丘縣晉竟內邑夏四月丙戌鄭伯寧卒寧公作寧六月葬鄭定公秋七月癸巳滕子寧卒寧公作寧冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使髙張來唁公左傳春公至自乾侯處于鄆齊侯使髙張來唁公稱主君比公于大夫子家子曰齊卑君矣君祗辱焉公如乾侯杜氏曰唁公至晉不見受公如晉次于乾侯左傳平子每嵗賈買也馬具從者之衣履而歸之于乾侯公執歸馬者賣之乃不歸馬衛侯來獻其乘馬曰啓服馬名塹而死公將為之櫝子家子曰從者病矣請以食之乃以幃裹之公賜公衍羔裘使獻龍輔玉名于齊侯遂入羔裘齊侯喜與之陽榖齊邑公衍公為之生也其母偕出之産舍公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公私喜于陽榖而思於魯曰務人公為為此禍也始與公若謀逐季氏且後生而為兄其誣也久矣乃黜之而以公衍為太子夏四月庚子叔詣卒榖梁傳季孫意如曰叔倪無病而死此皆無公也是天命也非我罪也秋七月冬十月鄆潰孔氏曰公自二十六年以來常居于鄆此時公既如晉必留人守鄆鄆人潰散而叛公使公不得更來當是季氏道之使然三十年春王正月公在乾侯范太史淳夫論唐事而及此曰季氏出其君魯無君者八年春秋每嵗必書公之所在不與季氏之専國也唐史列武后于本紀不沒其實以著其惡竊以為不然中宗之有天下受之于髙宗天下者唐之天下也武氏安得而間之復繫嗣聖之年黜武氏之號竊取春秋之義雖獲罪于君子而不辭也劉氏曰左氏云不先書鄆與乾侯非公且徵過也非也向者公雖去國然猶居鄆古人所謂若在竟內則猶君也是以不嵗首書鄆耳去年公如晉次于乾侯但是暫時次止之名猶以鄆為居自然不得書公在乾侯也今鄆人潰散公無所入羈旅他國國非其有故書公在以繫一國之事是聖人至意深淺各有所出豈但徵過哉公雖有過不若季氏之悖也其寧縱釋季氏専攻公身而已夏六月庚辰晉侯去疾卒秋八月葬晉頃公頃音傾左傳夏六月晉頃公卒秋八月葬鄭遊吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬今吾子無二何故弔葬共使對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備禦不虞之患豈忘共命言不敢忘共命以所備禦者多不及辦之先王之制諸侯之喪士弔大夫送葬唯嘉好聘享三軍之事于是乎使卿晉之喪事敝邑之間先君有所助執紼挽索矣若其不間雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圗之晉人不能詰冬十有二月吳滅徐徐子章羽奔楚羽公作禹左傳吳子使徐人執掩餘使鍾吾人執燭庸二十七年奔故二公子奔楚楚子大封而定其徙大封與土田定其所徙之居使監馬尹大心逆吳公子使居養二子奔楚楚逆之于竟也養即所封之邑莠尹然左司馬沈尹戌城之城養取于城父與胡田胡子之地以與之將以害吳也子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又疆其讎以重怒之無乃不可乎吳周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文將自同于先王先王謂太王王季亦自西戎始不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉王弗聽吳子怒冬十二月吳子執鍾吾子遂伐徐防山以水之防壅山水以灌徐己卯滅徐徐子章羽斷其髮自刑示懼攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戌帥師救徐弗及遂城夷使徐子處之夷城父也吳子問于伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄勞也焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚于是乎始病啖氏曰徐子名者初已服吳子唁而送之非能自奔也常山劉氏曰齊滅談楚滅弦狄滅溫君奔皆不名者強暴加于小弱力不能勝而奔義未絶也訴于天子方伯則理可申而國可復豈可遽絶之哉章羽既已服吳而後奔楚則既降矣安有興復之志哉故名之以著其絶也三十有一年春王正月公在乾侯左傳言不能內外也杜氏曰公內不容於臣子外不容於齊晉所以久在乾侯季孫意如會晉荀躒於適歷杜氏曰季氏出其君而納邾快黑肱卒大夫會葬晉宋滕薛晏然如二君矣君在外雖卿有事不書必有諸侯之事而後書故文公在晉敖會垂隴襄公在晉宿會邢丘皆伯令也昭公在乾侯意如會適歷非諸侯之事也則何以書以晉之釋君而助臣也士鞅會諸侯之大夫于扈將以納公取貨于季而遂不果荀躒復為此會昭公所以死於外也襄昭之際大夫無君之禍晉人為之也夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯左傳夏四月季孫從知伯荀躒如乾侯子家子曰君與之歸一慙之不忍而終身慚乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人謂季孫也己所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難言恐獲不納君之罪今納而不入何敢復知耶臣請復于寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸附左傳秋吳人侵楚伐夷侵潛六皆楚邑楚沈尹戌帥師救潛吳師還楚師遷潛于南岡而還吳師圍弦左司馬戍右司馬稽帥師救弦及豫章吳師還始用子胥之謀也冬黑肱以濫來奔肱公作弓左傳冬邾黑肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有地也有名而不如其已以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回不為義疚見義即為之或求名而不得或欲蓋而名章懲不義也齊豹為衛司冦守嗣大夫作而不義其書為盜邾庶其莒牟夷邾黑肱以土地出求食而已不求其名賤而必書春秋叛者多唯取三人來適魯者三人皆小國大夫故曰賤此二物者所以懲肆而去貪也物事也齊豹書盜懲肆也三叛人名去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之若竊邑叛君以徼大利而無名貪冒之民將置力焉是以春秋書齊豹曰盜三叛人名以懲不義也社氏曰黑肱邾大夫濫東海昌慮縣不書邾史闕文唐陳氏曰不曰邾史闕文二傳不言其闕互相穿鑿汪氏曰習于公榖而不得其義者或以為通濫為國或以為别乎邾皆妄説也齊楚大國且未嘗分其地以封子弟況蕞爾之邾乎苟别于邾而自為國又何為挾地以歸他國乎十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞杜氏曰闞魯地在東平須昌縣東南公居乾侯遣人誘闞而取之張氏曰昭公之難叔孫如闞定公元年將葬昭公季孫使役如闞公氏將溝焉此魯地而公取之也蜀杜氏曰志公在外而得邑於季氏雖復得之如取諸外也杜氏曰公羊云不繫邾婁諱亟也凡春秋書取地而不繫國公羊皆以為邾邑而諱亟抑何謬耶夏吳伐越左傳始用師于越也史墨曰不及四十年越其有吳乎存亡之數不過三紀嵗星三周三十六嵗故曰不及四十年越得嵗而吳伐之必受其凶此年嵗在星紀星紀吳越之分也嵗星所在其國有福吳先用兵故受其凶秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周世叔穀作太叔莒人下公有邾婁人穀有邾人左傳秋八月王使富辛與石張如晉請城成周子朝之亂其餘黨多在王城敬王畏之徙都成周成周狹小故請城之天子曰天降禍于周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不遑啓處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望嵗懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈於成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屏晉之力也其委諸伯父使伯父實重圗之俾我一人無徴怨于百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音韓不信對曰天子有命敢不奉承以奔告于諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟尋平丘盟且令城成周己丑士彌牟營成周計丈數揣髙卑度厚薄仞溝洫度髙曰揣度深曰仞物土方議逺邇物相宜也相土之方面逺近之宜量事期知事幾時畢計徒庸知用幾人功慮財用知費幾財用書餱糧知用幾糧食以令役于諸侯屬役賦丈付所當城丈尺書以授帥帥諸侯之大夫而效諸劉子韓簡子臨之以為成命榖梁傳天子微諸侯不享覲天子之在者惟祭與號故諸侯之大夫相帥以城之此變之正也十有二月己未公薨于乾侯左傳十二月公疾遍賜大夫從公者大夫不受賜子家子雙琥玉器一環一璧輕服細好之服受之大夫皆受其賜己未公薨子家子反賜于府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也趙簡子問于史墨曰季氏出其君而民服焉諸侯與之君死于外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰有三地有五行有五體有左右有兩各有妃耦陪二王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死于外其誰矜之社稷無常奉君臣無常位自古以然故詩曰髙岸為谷深谷為陵小雅三后之姓于今為庶主所知也昔成季友桓之季也文薑之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功于魯受費以為上卿至于文子武子世增其業不廢舊績魯文公薨而東門遂殺嫡立庶魯君于是乎失國政在季氏于此君也四公矣民不知君何以得國是以為君慎器車服與名爵號不可以假人胡氏一桂曰昭公乾侯之事人道非常之大變也史墨乃妄引陪二之説而謂夫生季氏以二魯侯夫天使季氏二君何嘗使季氏逐君哉如墨言一歸之天道則亂臣賊子接迹于世矣其與春秋書公薨乾侯如青天白日昭昭乎不可欺蔽以誅季氏不臣之罪者豈不大戾哉春秋輯傳卷十一

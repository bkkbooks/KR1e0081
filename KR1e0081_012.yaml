body:
  text: 春秋輯傳卷十明王樵輯昭公元年春王正月公即位榖梁傳繼正即位正也胡氏曰子野毁而卒穆叔不欲立昭公然則昭公受誰之命乎其書即位有子野之命矣叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曺人于虢國弱公作國酌齊惡公作石惡罕虎公作軒虎虢公作漷穀作郭左傳春楚公子圍聘于鄭且娶于公孫段氏伍舉為介將入舘鄭人惡之使行人子羽與之言乃舘于外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聴命小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使距違君命是懼不然敝邑舘人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜示無弓而入許之正月乙未入逆而出遂㑹于虢鄭地尋宋之盟也祁午謂趙文子曰宋之盟楚人得志于晉謂先歃今令尹之不信諸侯之所聞也子弗戒懼又如宋楚重得志于晉晉之恥也楚令尹圍請用牲讀舊書宋之盟書加于牲上不歃血而已晉人許之三月甲辰盟杜氏曰楚恐晉先歃故欲從舊書經所以不書盟按宋之盟楚人曰子言晉楚匹也若晉常先是楚弱也是欲互為先也今以尋宋之盟則恐晉之先也故讀舊書讀舊書則楚仍先晉但不歃血耳楚意不在于盟取得志于晉而已趙武無辭以却而又從之夫盟不寒何事於尋却之可也况圍初不為尋盟而出聘鄭娶於豐氏而以尋盟為遂事也合諸侯大事也以大夫専之於境外圍之無君其何足言唯聴於楚已為中國之恥而一呼而至羣然以奉楚大夫之令趙武子産皆諸侯之良而不能出一辭是可怪也胡傳此陳侯之弟招也諸侯之尊弟兄不得以屬通曰公子者其常稱曰弟者因事而特稱之也三月取鄆公作運左傳季武子伐莒取鄆莒人告於㑹楚告於晉曰尋盟未退而魯伐莒凟齊盟請戮其使樂桓子樂王鮒相趙文子欲求貨於叔孫而為之請使請帶焉難指求貨故以帶為辭弗與梁其踁叔孫家臣曰貨以藩身子何愛焉叔孫曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為人之有墻以蔽惡也墻之隙壊誰之咎也雖怨季孫魯國何罪趙孟聞之乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也自無令王諸侯逐進狎主齊盟其又可壹乎言強弱無常恤大舍小足以為盟主大謂纂弑滅亡之禍莒魯爭鄆為日久矣苟無大害於其社稷可無亢也固請諸楚楚人許之乃免叔孫趙孟謂叔向曰令尹自以為王矣何如對曰王弱令尹強其可哉言可成雖可不終令尹為王必求諸侯晉少懦矣諸侯將往若獲諸侯其虐滋甚民弗堪也將何以終胡傳不曰伐莒取鄆者乗莒亂而取邑故不悉書為内諱也李亷曰季孫伐邾取鄆與歸父伐邾取繹何異而書法不同程氏胡氏以為乗亂取邑故隠諱其詞然則不乗亂而取之者不貶乎陳氏曰歸父伐邾猶公命也此則専取邑而已此亦未當然則云何曰書伐莒是以討賊子魯也不書伐而書取則收奪而已矣附左傳叔孫歸季孫勞之旦及日中不出曽天季氏臣謂曽阜曰叔孫氏臣魯以相忍為國也忍其外欲受楚戮不忍其内日中不出焉用之阜謂叔孫曰可以出矣乃出見之夏秦伯之弟鍼出奔晉鍼其亷反左傳秦后子鍼也桓公子景公弟有寵於桓如二君於景其母曰弗去懼選選數也謂録其罪癸夘鍼適晉其車千乗司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸能知其過必有令圖令圖天所贊也公羊傳有千乗之國而不能容其母弟故君子謂之出奔也榖梁傳諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也六月丁巳邾子華卒晉荀呉帥師敗狄于大鹵鹵音魯公穀作太原左傳晉中行穆子敗無終山戎及羣狄於太原崇卒也將戰魏舒曰彼徒我車所遇又阨以什共車必克更増十人以當一車之用困諸阨又克請皆卒去車為步卒自我始乃毁車以為行五乗為三伍乗車者車三人五乗十五人今改去車更以五人為伍分為三伍為五陳以相離兩於前伍於後専為右角參為左角偏為前拒皆臨時處置之名以誘之狄人笑之未陳而薄之大敗之杜氏曰大鹵太原晉陽縣胡傳太原近地而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘而敗之耳使後世車戰法亡爭以變詐相髙皆此啓之書敗狄譏之也按魏絳嘗言於悼公曰勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華毋乃不可乎故悼公之亡狄師不出戎狄犯疆埸而驅逐之邊吏之事不足書亡者皆有義也箕與交剛皆稱人至是卿帥師矣秋莒去疾自齊入于莒去起吕反左傳莒展輿立而奪羣公子秩公子召去疾於齊秋齊公子鉏納去疾展輿奔呉杜氏曰齊雖納去疾莒人先召之故從國舊例書入胡傳其以國氏與去疾之討有罪也此莒之公子曷為不稱公子自謂先公之子可以有國不疑遂立乎其位而無所禀也其書入者難詞也按於次去疾為長本當立者也密州舍之而立展輿既立展輿而又廢之國人患其虐而弑之展輿因而即之國本去疾之國也故春秋正之曰莒去疾入於莒不與密州之舍去疾也不與國人之君展輿也與去疾之討則正弑者之誅矣君臣父子兄弟之亂於人者皆撥而反之正矣程子曰齊小白言當有齊也莒去疾亦其例也凡義當承國者名繫國而不稱公子以殊於大夫胡氏以為因不禀命而削其公子恐非也莒展輿出奔呉展下公穀無輿字程子曰為弑君者所立而以國氏者罪諸侯也趙氏曰鄭忽曺羈未踰年出奔不稱爵言不能嗣先君也莒展雖踰年不稱爵其罪大也李氏曰罪諸侯之意似晦竊意衛衎與剽莒去疾展輿皆以二君書變例也彼既立踰年成君矣不書爵已見絶之不書莒何以見其已立乎陳佗見討亦繫國則展輿之繫國不必求他義也若殺州吁無知之不國則上文已見矣叔弓帥師疆鄆田左傳因莒亂也髙氏曰文十二年季孫行父嘗帥師而城之復為莒所取今乗莒亂而取之又帥師以疆其田必帥師者懼不服也疆之者溝封之以别乎莒也葬邾悼公邾始書葬附左傳晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺音胡駘音台為祟史莫之知敢問此何神也子産曰昔髙辛氏帝嚳有二子伯曰閼於葛反伯季曰實沈居於曠林地闕不相能也日尋干戈以相征討后帝堯也不臧遷閼伯於商丘宋地主辰主祀辰星辰大大也商人湯先相士封商丘是因故辰為商星遷實沈於大夏今晉陽縣主參唐人若劉累之等累遷魯縣此在大夏是因以服事夏商其季世曰唐叔虞唐人之季世其君曰叔虞也服䖍以為即下句邑姜所生者彼乃晉之始祖豈得以後世始封之君謂之前代之末世也當武王邑姜武王后齊太公女方震之慎反懐胎也太叔夢帝謂已余命爾子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封太叔焉故參為晉星叔虞封唐侯叔虞之子爕父改為晉由是觀之則實沈參神也昔金天氏帝少皥有裔子曰昧為𤣥冥水官師長也生允格臺駘臺駘能業其官宣通汾洮二水障大澤以處大原晉陽臺駘之所居帝顓頊用嘉之封諸汾川沈姒蓐黄實守其祀四國臺駘之後今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜音詠之日月星辰之神則雪霜風雨之不時於是乎禜之臺駘汾神是山川之神實沈參神是星辰之神若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聴政晝以訪問夕以修令念所施夜以安身於是乎節宣其氣凡人形神有限不可久用神久用則竭形太勞則敝不可以久勞也神不用則鈍形不用則痿不可以久逸也固當節其勞以宣疏其氣朝以聴政久則疲疲則易之以訪問訪問久則倦倦則易之以修令修令久則怠怠則易之以安身安身久則滯滯則易之以聴政則氣順體暢勿使有所壅不行閉不通湫氣聚底氣止以露其體氣不散則食不消食不消則食少食少則肌膚瘦骸骨露也兹此也心不爽明也而昏亂百度形之與神相隨而有形以神為主神以形為宅形強則神強形弱則神弱神常隨形而盛衰也既露其體則神識亦弱致使此心不明照察失宜而亂百事之節也今無乃壹之同四時也馳騁田獵甘酒嗜音恒舞酣歌勞非所勞也深居簡出日晏視朝逸非所逸也則生疾矣叔向曰善哉肸未之聞也晉侯聞子産之言曰博物君子也晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱女在房室故以室言之非鬼非食惑以喪志言公病之狀良臣將死天命不祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節遲速本末以相及也中聲以降五降之後不容彈矣醫和言女當有節然難言也故喻以樂先王制外樂以禁内情所以為百事之凖節也故為樂有五聲之節為聲有遲有速從本至末緩急相及使得中和之聲降者聲下而息也五聲一周聲下而息前聲罷退以待後聲非作樂息也樂曲成乃息非五聲一周得息也五降之後聲一成而曲未成當從上始不容更復彈作於是有煩手淫聲慆堙心耳乃忘平和君子弗聴也物亦如之至於煩乃舍已無以生疾説降後不彈之意言不以後聲接前聲而容手妄彈擊是為煩手此所擊非復正聲是為淫聲淫聲之慢塞人心耳乃使人忘失平和之性故君子不聴也物亦如之指女也煩乃舍已無以生疾則節女矣君子之近琴瑟以儀節也非以慆心也儀法也為心之法使動不過度班固曰樂而有節則和平夀考及迷者勿顧以生疾而隕性命天有六氣説見下文降生五味謂金味辛木味酸水味鹹火味苦土味甘五行在天為六氣在物生五味謂之降者對天有而言也發為五色辛色白酸色青鹹色黑苦色赤甘色黄發見也味嘗而知色視而見徵為五聲白聲商青聲角黒聲羽赤聲徵黄聲宫徵驗也色既不同其聲亦異也淫生六疾淫過也滋味聲色所以養人然過則生害六氣曰隂陽風雨晦明也分為四時序為五節六氣並行無時止息但氣有温暑凉寒分為四時春夏秋冬也序此四時以為五行之節計一嵗每行得七十二日有餘土無定方分王四季故每季之末有八十日也過則為菑隂淫寒疾陽淫熱疾風淫末疾末四肢也風為緩急雨淫腹疾雨濕之氣為泄注晦淫惑疾晦夜也夜當安身女以宣氣近女過度則心惑亂也明淫心疾明晝也晝以營務營務當用心思慮煩多則心勞敝也隂陽風雨四者雖各以其氣與人為病若能自防䕶受之不多則不為病晦明天有常度不以病人但人用晦明過度則為病也女陽物而晦時女常隨男故曰陽物家道常在夜故曰晦時淫則生内熱惑蠱之疾今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蠱為蠱文字也榖之飛亦為蠱左周易女惑男風落山謂之蠱巽下艮上蠱巽為長女為風艮為少男為山少男而説長女非匹故惑山木得風而落皆同物也物猶類也趙孟曰良醫也厚其禮而歸之冬十有一月己酉楚子麇卒麇九倫反公穀作卷音權左傳楚公子圍使公子黑肱圍之弟子晳伯州犂城犨縣屬南陽櫟今河南陽翟縣郟縣屬襄城鄭人懼子産曰令尹將行大事而先除二子也黑肱伯州犂禍不及鄭何患焉冬楚公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之孫卿曰以冠纓絞之遂殺其二子幕及平夏皆郟敖子右尹子干王子比出奔晉宫廐尹子晳出奔鄭因築城而去殺太宰伯州犂於郟葬王于郟謂之郟敖楚人謂未成君為敖使赴於鄭伍舉問應為後之辭焉問赴者對曰寡大夫圍伍舉更之曰共王之子圍為長此告終稱嗣不以纂弑赴諸侯楚靈王即位薳罷音皮為令尹薳啓疆為太宰靈王圍也即位易名熊䖍按程子之論學春秋也曰以傳考經之事迹以經别傳之真偽至於傳可據而經不同則曷從乎亦當闕疑而已矣楚子麇卒是也必欲為之說則反傷於義理矣公子圍之弑君以前則蒲宫自異執戈者前諸侯之大夫皆知之而明譏之於㑹所矣以後則將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之楚國之臣子公言之矣王弗聴負之斧鉞以狥於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之七國淮夷三軍之衆耳目所屬明為慶封所訐軍人粲然皆笑天下傳以為口實不但趙盾董狐之筆崔杼齊太史之簡矣近則左氏公榖逺則戰國策載不修春秋之言皆曰圍弑其君則傳可信不誣也决矣經何以書卒而不正其弑也哉杜預以為楚以瘧疾赴故不書弑商臣弑父其不以實赴也决矣春秋胡從而大書之乎胡康侯以為圍弑君而自立中國力所不加不能致討則亦已矣至大合諸侯于申與㑹者凡十有三國其臣舉六王二公之事其君用齊桓召陵之禮聖人憫之甚愳之甚是故察微顯權輕重而畧其篡弑以扶中國夫中國之所以為中國不因亂賊而存亡也何扶之有隠公弑而書薨春秋魯史故也若曰為中國諱申之辱書廩曰卒是君楚矣薨曰薨卒曰卒弑曰弑事各有實其文則史各紀其實聖人不能易亦不可易也有史從偽赴而聖人正之者矣未有史皆曰弑而聖人書卒者也今以書薨書弑為凡史皆可及唯或薨或不薨或弑或不弑裁自聖心為仲尼之所獨此何異於走文弄法以為非獄吏守典者之所知乎闕疑闕文聖有明訓強説無益於經而有害吾故曰傳可據而經不同闕之可也楚公子比出奔晉二年春晉侯使韓起來聘左傳春晉侯使韓宣子來聘且告為政而來見禮也趙氏曰霸國正卿無適諸國告為政之理止是聘耳觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也夏叔弓如晉秋鄭殺其大夫公孫黒左傳鄭公孫黑將作亂欲去游氏而代其位游氏太叔之族黑與游楚爭室為游楚所擊傷故欲害其族傷疾作而不果游擊所擊傷創子産使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪専伐伯有而罪一也昆弟爭室而罪二也爭徐吾犯之妹薰隧之盟女矯君位而罪三也鄭為游楚亂故盟諸大夫公孫黑強與於盟使大史書其名且曰七子不速死大刑將至七月壬寅縊尸諸周氏之衢加木焉書其罪于木加于尸上劉氏曰稱國以殺罪累上也黑伐良霄而逐之君弗誅也以為大夫又與公孫楚爭娶徐吾氏黑乃楚之從兄徐吾氏歸於楚君放楚也而盟諸大夫黑欲殺楚而娶其妻楚擊傷黑子産以為直鈞則幼賤當罪放楚於呉黑於是自以為卿又將為亂疾作而臥子産使吏數諸其家則幸而勝之耳夫君専殺大夫非王法所得為者也然而春秋或予之所以見君臣之禮扶上而抑下也聖王之罰不誅不教不誣無罪及其惡成而罪見誅之猶鷹鸇之發也無留獄矣豈幸而勝之哉冬公如晉至河乃復季孫宿如晉左傳晉少姜卒齊女平公妾公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫遂致服焉襚服胡傳舉動人君之大節賢哲量之以行藏其道姦邪窺之以作止其惡四隣視之以厚薄其情故有國者必謹於禮而後動此守身之本保國之基也禮雖自卑而尊人亦不妄悦人以自辱昭公不能據經守正失禮妄動躬弔隣國之寵妾見辭而還後之失國出奔旅死乾侯兆於此行矣三年春王正月丁未滕子原卒原公作泉夏叔弓如滕五月葬滕成公滕始書葬杜氏曰卿共小國之葬禮過厚葬襄公滕子來㑹故魯厚報之秋小邾子來朝八月大雩冬大雨雹北燕伯欵出奔齊左傳燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比而殺公之外嬖公懼奔齊書罪之也四年春王正月大雨雹雹公穀作雪杜氏曰當雪而雹故以為災而書之左傳大雨雹季武子問於申豐曰雹可禦乎對曰聖人左上無雹雖有不為災古者日在北陸而藏氷西陸朝覿春分之中奎星朝見東方而出之朝之禄位賓食喪祭於是用之祭寒司寒而藏之獻羔而啓之公始用之火出而畢賦火星昏見東方謂三四月中自命夫命婦至於老疾無不受氷其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨七月之卒章藏氷之道也胡傳隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象申豐者季氏之孚所信任也不肯端言其事歸咎藏氷之失夫山谷之氷藏周用徧亦古者本末具舉燮調之一事耳謂能使四時無愆伏凄苦之變則亦誣矣附左傳春王正月許男如楚楚子止之遂止鄭伯前年十月鄭伯如楚復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有恵賜盟於宋曰晉楚之從交相見也以嵗之不易寡人願結驩於二三君使舉請間君若苟無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修徳以待其歸若歸於徳吾猶將事之况諸侯乎若適淫虐楚楚人將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞隣國之難是三殆也四嶽岱華衡恒三塗山名太行轘轅崤澠也陽城山名河南陽城縣東北大室即嵩髙也為中嶽在陽城縣西北荆山在新城沶鄉縣南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修徳音以亨神人亨通也不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇於國則四垂為宇宇屋簷若何虞難齊有仲孫之難而獲桓公至今賴之晉有里㔻之難而獲文公是以為盟主衛邢無難狄亦喪之故人之難不可虞也恃此三者而不修政徳亡於不暇又何能濟君其許之乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉椒舉遂請昏晉侯許之夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申楚子専㑹諸侯始此左傳夏諸侯如楚魯衛曺邾不㑹鄭伯先待于申六月丙午楚子合諸侯於申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此㑹也夏啓有鈞臺之享河南陽翟縣南有鈞臺陂盖啓享諸侯于此商湯有景亳之命亳即偃師周武有孟津之誓時伐紂也成有岐陽之蒐周成王歸自奄大蒐於岐山之陽岐山在扶風美陽縣西北康有酆宫之朝酆在始平鄠縣東有靈臺康王於是朝諸侯穆有塗山之㑹塗山在夀春東北齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男㑹公之禮六何氏曰不殊淮夷者楚子主㑹故君子不殊其類所以病中國楚人執徐子左傳徐子呉出也以為貳焉故執諸申秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐呉左傳秋七月楚子以諸侯伐呉宋大子鄭伯先歸時晉之屬國皆歸獨言宋鄭者鄭伯久於楚宋太子以後至不得時見故慰遣之宋華費遂鄭大夫從從伐呉以答見慰杜氏曰胡國汝隂縣西北有胡城執齊慶封殺之左傳使屈申蕩之子圍朱方呉邑慶封所封八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聴負之斧鉞以狥於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯王使速殺之榖梁傳此入而殺其不言入何也慶封封乎呉鍾離言時殺慶封自於鍾離實不入呉慶封其以齊氏何也據已絶于齊為齊討也靈王使人以慶封令於軍中曰有若齊慶封弑其君者乎慶封曰子一息我亦且一言曰有若楚公子圍弑其兄之子而代之為君者乎軍人粲然皆笑慶封弑其君而不以弑君之罪罪之者慶封不為靈王服也衛人殺州吁蔡人殺陳佗楚人殺夏徵舒皆討賊之詞此云執齊慶封殺之不與以討賊也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懷惡而討雖死不服其斯之謂與穀梁之義精遂滅賴賴公穀作厲左傳遂以諸侯滅賴遷賴於鄢楚邑楚子欲遷許於賴使鬭韋龜子文𤣥孫與公子棄疾城之而還為許城也申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校築城外竟諸侯莫與爭王心不違民其居乎言將有事民之不處其誰堪之啖氏曰左氏云賴子面縳銜璧楚子焚櫬按經但言滅是死位也他年賴降而舍之故誤耳九月取鄫左傳言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取著丘公去疾也附左傳鄭子産作丘賦杜氏曰丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦出田賦在哀十一年彼注云丘賦之法因其田財通馬一匹牛三頭今欲别其田及家財各為一賦渾罕子寛曰君子作法於凉薄也其敝猶貪作法於貪敝將若之何冬十有二月乙夘叔孫豹卒左傳初穆子去叔孫氏成十六年辟僑如之難奔齊及庚宗魯地遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬夢天壓已勿勝穆子夢顧而見人黑而上僂肩傴深目而豭喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及宣伯穆子之兄僑如奔齊饋之饋宣伯宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之久矣言凡始為亂已則有今日之願盖忿言魯人召之不告而歸所宿庚宗之婦人獻以雉問其姓女生曰姓謂子也對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為䜿小臣有寵長使為政公孫明齊大夫知叔孫於齊歸未逆國姜孟仲母子明取之故怒怒其妻其子長而後使逆之逆二子怒其母故不即逆田於丘蕕音由地名遂遇疾焉䜿牛欲亂其室而有之強與孟盟不可叔孫為孟鐘曰爾未際際接也言孟未與諸大夫相接見饗大夫以落之以豭猪血釁鐘曰落既具使䜿牛請日入弗謁出命之日及賓至聞鐘聲牛曰孟有北婦人國姜之客謂公孫明怒穆子信之將往牛止之賓出使拘而殺諸外殺孟丙牛又強與仲盟不可仲與公御萊書觀於公萊書公御之名觀私游觀公公所公與之環使牛入示之示叔孫入不示出命佩之牛謂叔孫見仲而何而何如何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜洩叔孫氏宰見告之饑渴牛不食叔孫授之戈使討牛對曰求之而至又何去焉言求食可得無為去䜿牛䜿牛曰夫子疾病不欲見人使寘饋於个東西箱而退牛弗進則置虚命徹㵼器令空示若叔孫已食十二月癸丑叔孫不食乙夘卒三日絶糧牛立昭子豹之庶子婼而相之季孫謀去中軍䜿牛曰夫子固欲去之五年春王正月舎中軍左傳舍中軍卑公室也杜氏曰罷中軍季孫稱左師孟氏稱右師叔孫氏則自以叔孫為軍名五孔氏曰初作三軍十二分其國民三家得七公得國民不盡屬公公室已卑矣今舍中軍四分公室三家自取其稅减已稅以貢于公民全不屬公公室益卑也初作三軍三分公室而各有其一季氏盡征之無所入於公叔孫氏臣其子弟以父兄歸公孟氏取其半焉復以子弟之牛歸公及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公仲至自齊季孫欲立之南遺曰季氏家臣叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎此與盧蒲嫳告慶封之語同䜿牛即叔孫之東郭偃棠無咎也孟丙仲壬則崔成崔疆也叔孫之季孫則崔舒之慶封也南遺使國人助䜿牛攻諸大庫之庭攻仲壬也魯城内有大庭氏之虚于其上作庫司宫射之中目而死䜿牛取東鄙三十邑以與南遺昭子即位朝其家衆曰䜿牛禍叔孫氏使亂大從殺適立庶又披其邑昭子不知牛餓殺其父故但言其見罪將以赦罪罪莫大焉必速殺之䜿牛懼奔齊昭子無意决殺之故猶使得奔當時就執之以請於君大夫而誅之可也孟仲之子殺諸塞關之外齊魯界上關投其首於寧風之棘上寧風齊地按舍中軍非獨欲弱公室亦欲乗叔孫婼位之未定薄仲叔二家之厚以厚已也公穀以為復古復正非也苟曰後此二卿二軍則十年季孫意如叔弓仲孫貜帥師伐莒及哀二年季孫斯叔孫州仇仲孫何忌帥師伐邾何以三卿並將三軍並出邪荀恱云春秋之義舍中軍則善之皆惑於公榖之説而未之考也楚殺其大夫屈申左傳楚子以屈申為貳於呉殺之公如晉左傳公如晉自郊勞至時至於贈賄去時無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈莊公𤣥孫弗能用也奸大國之盟陵虐小國謂伐莒取鄆利人之難因莒亂而取鄆不知其私不知已國亦有釁公室四分民食於他他謂三家言公知民然仰給食于三家思莫左公不圖其終羣臣無為公慮而圖其終者為國君難將及身不恤其所禮之本末將於此乎在修政用賢守信睦隣威福在已國家安定禮之大節也而屑屑焉習儀以亟言善於禮不亦逺乎時晉侯亦失政叔齊以此諷諌夏莒牟夷以牟婁及防兹來奔左傳牟夷非卿而書尊地也公羊傳莒牟夷者莒大夫也莒無大夫此何以書重地也其言及防兹來奔何不以私邑累公邑也穀梁傳以者不以者也來奔者不言出及防兹以大及小也莒無大夫其曰牟夷何也以其地來也以地來則何以書重地也杜氏曰城陽平昌縣西南有防亭姑幕縣東北有兹亭按取卞而襄公幾欲適諸侯伐莒取鄆而叔孫豹幾戮於㑹今公在晉而所為復爾盖欲陷公使晉人執之也秋七月公至自晉左傳莒人愬於晉晉侯欲止公范獻子曰不可人朝而執之誘也乃歸公戊辰叔弓帥師敗莒師于蚡泉蚡扶粉反公作濆穀作賁左傳莒人來討不設備叔弓敗諸蚡泉莒未陳也杜氏曰蚡泉魯地秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越始見經左傳冬楚子以諸侯及東夷伐呉以報棘櫟麻楚東鄙三邑名四年冬呉伐楚入此之役薳射以繁陽之師㑹於夏汭越大夫常夀過帥師㑹楚子于瑣楚地聞呉師出薳啓疆帥師從之遽不設備呉人敗諸鵲岸廬江舒縣有鵲尾渚楚子以馹至於羅汭羅水名楚師濟於羅汭沈尹赤㑹楚子次於萊山薳射帥繁陽之師先入南懷楚師從之及汝清南懐汝清皆楚界呉不可入楚子遂觀兵于坻箕之山是行也呉蚤設備楚無功而還此為楚通越制呉之始自合晉楚之成中國兵未及弭而荆楚摟吾諸侯以伐呉徒為不義役矣六年春王正月把伯益姑卒葬秦景公秦始書葬附左傳鄭人鑄刑書鑄於鼎叔向使詒子産書曰先王議事以制不為刑辟民知有辟則不忌於上並有爭心以徴於書而徼幸以成之弗可為矣夏季孫宿如晉左傳拜莒田也謝前年受叛邑不見討宿之營私無禮甚矣左傳反以其辭加籩為知禮葬把文公宋華合比出奔衛左傳宋寺人栁有寵太子佐惡之華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族亡人華臣也襄十七年奔衛既盟於北郭矣公使視之有焉遂逐華合比合比奔衛於是華亥合比弟欲代右師乃與寺人栁比從為之徵公使代之按殺太子痤也以寺人伊戾之讒逐華合比也以寺人栁之讒刑人之能敗人國家也如此然附伊戾者向戌比栁者華亥得外臣之合而其譛乃售刑人與小人隂類相合間人之父子兄弟以至於墜宗隕祀者多矣可不戒哉秋九月大雩楚薳罷帥師伐呉罷音皮左傳徐儀楚聘於楚儀楚徐大夫楚子執之逃歸懼其叛也使薳洩楚大夫伐徐呉人救之令尹子蕩帥師伐呉師於豫章而次於乾谿在譙國城父縣南楚東竟呉人敗其師于房鍾呉地子蕩歸罪於薳洩而殺之按帥師非薳洩也而洩伏其誅故書薳罷伐呉以正之楚再不競於呉乃移兵有事陳蔡至復伐徐而國亂矣冬叔弓如楚左傳聘且弔敗也按四年公不㑹申將朝楚而使叔弓先聘耳楚恃其強必不告敗於諸侯彼不來告吾何由弔之左氏之說非也附左傳十一月齊侯如晉請伐北燕晉侯許之齊侯伐伐燕左傳十二月齊侯遂伐北燕將納簡公北燕伯三年出奔齊按晉人納㨗菑於邾則書弗克納此納北燕伯亦不克而還不書者諸侯失國諸侯納之正也非奉少奪長之比但齊景受賂而退故止書伐耳七年春王正月暨齊平左傳齊求之也賈逵何休以為魯與齊平許恵卿以為燕與齊平杜云間無異事故不重言燕左傳癸巳齊侯次于虢燕竟燕人行成二月戊午盟於濡上濡水出髙陽縣東北燕人歸燕姬賂以瑶玉也罋玉櫝匱也斚耳玉爵不克而還受賂不克果納簡公李氏曰推之經例暨齊平正與及齊平及鄭平句法相似而下文又有叔孫涖盟正與叔還涖盟之事相類且左氏下文明說燕人行成而上文又以為齊求之文法自相背今若截齊求之也四字正解齊魯之平而以癸巳以下方終齊燕之事則兩得之矣盖左氏本無誤而許恵卿之誤也五年傳有齊燕平之月則謂濡上之盟耳疏強増暨字以實之非胡傳我所欲曰及不得已曰暨三月公如楚左氏謂楚子成章華之臺願與諸侯落之召公而公往也叔孫舍如齊涖盟舍左穀作婼丑畧反後同涖音利人音類榖梁傳内之前定之辭謂之涖外之前定之辭謂之來夏四月甲辰朔日有食之附左傳鄭子産聘於晉鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也駟帶助攻伯有明年壬寅余又將殺段也公孫段豐氏黨及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子産立公孫洩子孔之子及良止伯有之子以撫之乃止立以為大夫使有宗廟殺子孔在襄十九年子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也太叔曰公孫洩何為子孔不為厲問何為併立洩子産曰說也為身無義而圖說伯有無義以妖鬼故立之恐惑民并立洩使若自以大義存誅絶之後者以解於民從政有所反之以取媚也及子産適晉趙景子問焉中軍佐趙成曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂孔氏曰此將說淫厲故逺本其初人之生也始變化為形形之靈者名之曰魄也既生魄矣魄内自有陽氣氣之神者名之曰魂也魂魄神靈之名附形之靈為魄附氣之神為魂附形之靈者謂初生之時耳目心識手足運動啼呼為聲此則魄之靈也附氣之神者謂精神性識漸有所知此則附氣之神也鄭𤣥祭義注云氣謂虚吸出入者也耳目之聰明為魄是言魄附形而魂附氣也人之生也魄盛魂強及其死也形消氣盡聖王縁生事死制其祭祀别為之名改生之魂曰神改生之魄曰鬼劉炫云人之生也形必有氣氣形相合義無先後而此云始生曰魄魄陽曰魂有先後者以形有質而氣無質尋形以知氣故先魄而後魂其實無先後者也朱子曰子産此論窮理甚精用物精多則魂魄強是以有精爽至於神明匹夫匹婦強死不病也其魂魄猶能馮依於人以為淫厲况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆抑諺曰蕞爾國而三世執其政柄其用物也宏矣其取精也多矣其族又大所馮厚矣而強死能為鬼不亦宜乎秋八月戊辰衛侯惡卒左傳衛襄公卒晉大夫言於范獻子曰衛事晉為睦晉不禮焉庇其賊人孫林父而取其地戚地故諸侯貳今又不禮於衛之嗣衛必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衛弔且反戚田衛齊惡告喪於周且請命王使成簡公如衛弔且追命襄公九月公至自楚冬十有一月癸未季孫宿卒十二月癸亥葬衛襄公左傳衛襄公夫人姜氏無子嬖人婤姶生孟縶及元孟縶之足不良故孔成子孔達之孫立靈公八年春陳侯之弟招殺陳世子偃師左傳陳哀公元妃鄭姬生悼太子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過皆哀公弟哀公有廢疾三月甲申公子招公子過殺偃師而立公子留書曰陳侯之弟招殺陳世子偃師罪左招也榖梁傳鄉曰陳公子招在元年今曰陳侯之弟招何也曰盡其親所以惡招也孔氏曰招與公子過共殺偃師而立公子留及楚殺徴師留出奔鄭招乃歸罪於過而使陳人殺之及楚師來討又推過為首得免重責不死而放之於越是以招為從罪也若其從招之詐如楚之意則宜書過殺偃師今書曰陳侯之弟招殺陳世子偃師是仲尼知其實狀以招為首也今按稱弟以殺世子者叔父之親加戕於國儲君貳之重以立庶孽致楚滅陳盡其親所以甚其惡也哀有庶嫡矣又屬其嬖孽於二公子戕其國本哀自為之也書曰陳侯斥君之辭也餘如孔氏説夏四月辛丑陳侯溺卒左傳夏四月辛亥哀公縊憂恚自殺經書辛丑從赴叔弓如晉左氏謂晉築虒祁之宫成而諸侯賀之未知信否然前年楚成章華之臺召諸侯落之則晉成虒祁之宫而諸侯賀之固也及是時般樂怠敖可弔也而賀之史趙知之矣虒音斯虒祁地名在絳西四十里臨汾水楚人執陳行人干徵師殺之左傳干徴師陳大夫赴於楚且告有立君公子勝愬之於楚楚人執而殺之書曰楚人執陳行人干徴師殺之罪不在行人也陳公子留出奔鄭秋蒐於紅蒐所求反書蒐始此左傳秋大蒐於紅自根牟至於商衛革車千乗大蒐數軍實簡車馬也根牟魯東界瑯琊陽都縣有牟鄉商宋地魯西竟接宋衛也言千乗明大蒐且見魯衆之大數也榖梁傳因蒐狩以習武事禮之大者也艾蘭以為防蘭香草也防為田之大限置旃以為轅門旃旌旗之名通帛曰旃轅門仰車以其轅表門以葛覆質以為𣙗質椹也𣙗門中臬流旁握謂車兩轄頭各去門邊空握握四寸也御轚者不得入轚挂則不得入門車軌塵塵不出轍馬候蹄發足相應遲疾相投揜禽旅揜取衆禽御者不失其馳不失馳騁之節然後射者能中過防弗逐不從奔之道也戰不逐奔面傷不獻嫌誅降不成禽不獻惡虐幼小禽雖多天子取三十焉其餘與士衆以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也杜氏曰紅魯地沛國蕭縣西有紅亭劉氏曰蒐春事也秋興之非正也蒐有常地於紅亦非正也曷為不言公公不與蒐也昭定之蒐不言公按公羊云以罕書榖梁云正也皆非此三家既分公室假蒐禮以數軍實隂擇其才勇之士以強私黨耳春蒐者獵之淺秋獮者獵之深比秋而行蒐禮姑淺獵而寡獲示不貪於從禽其實則數軍實而已諸家非時之論未盡其情也陳人殺其大夫公子過古未反左傳陳公子招歸罪於公子過而殺之大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐奐公作瑗左傳九月楚公子棄疾帥師奉孫呉偃師之子圍陳宋戴惡㑹之冬十一月壬午滅陳壬午十月十八日傳言十一月悞使穿封戍楚大夫為陳公晉侯問於史趙曰陳其遂亡乎對曰未也臣聞盛徳必百世祀虞之世數未也繼守將左齊其兆既存矣謂陳氏杜氏曰孔奐招之黨葬陳哀公九年春叔弓㑹楚子于陳杜氏曰以事往非行㑹禮此與宣十五年公孫歸父㑹楚子於宋事同許遷于夷左傳二月庚申楚公子棄疾遷許于夷實城父此時改城父為夷故傳實之城父屬譙郡取州來淮北之田以益之杜氏曰許畏鄭欲遷故以自遷為文附左傳周甘人與晉閻嘉爭閻田晉梁丙張趯他歴反率隂戎陸渾之戎伐潁周邑王使桓伯周大夫辭於晉責讓之曰我自夏以后稷魏駘芮岐畢吾西土也在夏世以后稷功受此五國為西土之長及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢隊是為豈如弁髦而因以敝之童子垂髦始冠必三加冠成禮而棄其始冠故云先王居檮杌於四裔以禦螭魅故允姓之姦隂戎之祖與三苗俱放三危者居於瓜州今敦煌伯父恵公歸自秦僖十五年而誘以來僖二十二年使偪我諸姬入我郊甸則戎焉取之戎有中國誰之咎也后稷封殖天下修封疆殖五穀今戎制之毁封疆踐五稼唯以畜牧不亦難乎伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毁冕拔本墓原専棄謀主雖戎狄其何有余一人伯父猶然戎狄何責叔向謂宣子曰文之伯也豈能改物翼戴天子而加之以共自文以來世有衰徳而暴滅宗周以宣示其侈諸侯之貳不亦宜乎且王辭直子其圖之宣子説王有姻喪使趙武如周弔且致閻田與襚反潁俘王亦使賓滑周大夫執甘大夫襄以説於晉晉人禮而歸之夏四月陳災公穀作火公羊傳陳已滅矣其言陳火何存陳也曰存陳悕悲也矣曷為存陳滅人之國執人之罪人指公子招殺人之賊指孔瑗即孔奐此傳以孔奐為招手殺偃師葬人之君此傳以陳哀公為楚葬之若是則陳存悕矣穀梁傳國曰災邑曰火火不志此何以志閔陳而存之也范氏曰陳已滅矣猶書火者不與楚滅也不可以方全國故不云災杜氏曰天火曰災陳既已滅降為楚縣而書陳災者猶晉之梁山沙鹿崩不書晉災害繫於所災所害故以所在為名孔氏曰以彼不繫晉知法自不當繫楚非是存陳趙氏曰災公榖皆為火按前後未有書外火者唯宣榭火以樂器所在見周之所司無人示譏耳此則不同其例也當依左氏為災按春秋地名繫其本國者是其原封所有也滅國未有還繫之者况陳以千乗侯封三恪之尊雖一時為強夷所乗後五年復封有其社稷者五十二年葬陳哀公列國猶㑹史猶書於䇿陳實未亡也春秋安得遽曰楚之陳乎陳災與宋災同亦直書災異爾存陳之說固非本㫖以梁山沙鹿為比而謂其已降為縣而不書楚者繫災所在為名此亦非也存陳之説雖非本㫖不傷教意漢建安二十五年通鑑已紀黄初之元朱子以為奪漢太速予魏太亟非春秋存陳之意以不與楚之滅而存陳此本可通但公羊家又以存陳為天意左氏亦有火出而火陳逐楚而建陳之説皆諸儒以意衍説不足信也國曰災邑曰火亦非秋仲孫貜如齊貜俱縛反冬築郎囿左傳季平子欲其速成叔孫昭子曰詩曰經始勿亟庶民子來焉用速成以𠞰民無囿猶可無民其可乎按桓四年狩于郎莊三十一年築臺于郎今又築為囿禄去公室政在大夫而淫於游觀昭公之志可知矣或曰意如虞君於耳目之玩而有其權也十年春王正月夏齊欒施來奔齊公作晉左傳齊恵欒髙氏皆者酒欒髙二族皆出恵公信内信婦人言多怨強於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子受甲而如鮑氏見文子鮑國則亦授甲矣遂伐欒髙氏五月庚辰戰于稷欒髙敗欒施髙強來奔陳鮑分其室按此陳氏専國之漸也秋七月季孫意如叔弓仲孫貜帥師伐莒意公作隠後同左傳平子伐莒取郠按舍中軍是借二軍復古之名以掩中分魯國之實爾其平居也四分其民季氏擇二二子各一至其出軍則季氏専將一軍身為元帥而孟仲各將一軍之半以為之副此所以雖曰舍中軍而三卿帥師盖舊額固存也八年蒐於紅自根牟至於商衛革車千乗邾人告呉曰魯賦八百乗則魯軍制非能復古可見矣叔孫婼居守故叔弓所將者叔孫氏之兵也取郠不書公見討於平丘故諱之戊子晉侯彪卒左傳晉平公卒鄭伯如晉及河晉人辭之禮諸侯不相弔游吉遂如晉九月叔孫舍如晉葬晉平公左傳九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曺人莒人邾人薛人把人小邾人如晉葬平公也鄭子皮將以幣行子産曰喪焉用幣子皮固請以行既葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中既葬未卒哭故猶服斬衰其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見十有二月甲子宋公成卒成公作戍十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡左傳楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於憾今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲饗蔡侯於申而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫呉以討於陳曰將定而國陳人聴命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎桀克有緡以喪其國紂克東夷而隕其身楚小位下而亟暴於二王能無咎乎胡傳世子般弑其君十三年矣楚子不以大義致討乃誘殺之聖人深惡而名之也其慮逺矣後世討亂者或畏其强或幸其弱不以大義興師用詐勝之若事之㨗反側皆懼苟其不㨗適足長亂如代宗之圖思明憲宗之紿王弁昧於春秋垂戒之㫖矣按楚奉孫呉以討陳而遂縣之今誘殺般其辭於人必又曰吾討其弑君也春秋深惡之故名䖍於誘殺般之上言䖍與般等耳夫般弑其君諸侯與通㑹盟者十三年於兹以楚子為之㑹主也以弑君之賊㑹弑君之賊同惡相求諸侯非唯力不能討亦勢不敢討矣今楚以得陳又欲舉蔡故為此詐諼之舉烏可於十三年之後以倡義致討責之懷惡之人哉楚子未暇治也而責其討般胡氏之義疎矣公羊傳楚子䖍何以名絶曷為絶之為其誘討也此討賊也雖誘之則曷為絶之懷惡而討不義君子不予也五月甲申夫人歸氏薨大蒐于比蒲比音毗左傳齊歸薨大蒐於比蒲非禮也襄三十一年傳言敬歸之娣齊歸則襄公之妾也妾母稱夫人義見成風薨葬按九月葬齊歸晉士之送葬者歸語魯故叔向曰君有大喪國不廢蒐不忌君也蒐於紅不言公公不與蒐也此又在君夫人之喪公不與可知而大蒐不廢是三家以馳騁田獵間君喪也叔向所謂不忌君也三家之罪不待貶絶而見矣其書大蒐又見僭禮也抑人亦有言為政不難其身正則巨室畏之巨室服則一國服矣昭公始即位在慼而有嘉容今齊歸之喪又無慼容叔向以為有三年之喪而無一日之慼不顧親也臣不忌君君不顧親能無卑乎然則書大蒐亦罪昭公薄於人倫其身不正故不為強臣之所忌而專國擅兵間國哀而耀武也仲孫貜㑹邾子盟于祲祥祲子鳩反又七林反公作侵羊秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曺人杞人于厥憖魚靳反公作屈銀左傳楚師在蔡晉荀呉謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不恤亡國將焉用之秋㑹於厥憖謀救蔡也按蔡世子有與楚義不同天堅守不下其志亦可憫矣厥憖合天下之兵畏而不敢救遣使乞請於楚卑辱己甚夫宋之盟以弭兵召諸侯故諸侯麇至今楚背盟肆暴欲逞無厭於陳蔡晉不能以義責之而反以姑息舍忍冀保前好豈不悖哉春秋備書諸國之大夫罪之也胡氏謂心欲救蔡而力弗加春秋恕其不能而不求備失聖人之意矣祲祥厥憖地皆闕左傳晉人使狐父請蔡于楚弗許九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之左傳楚子滅蔡用隠太子於岡山按楚誘蔡侯般而殺之其世子有先是居守至是痛父飲血誓不與讐賊俱生被圍八月抗敵不下力盡勢竭終不肯屈服故為賊䖍所執而虐用之怒其拒師之久也有之於世子之道得矣故書之以閔而賢之也有受命居守父殺國圍窮迫之中捍敵不暇固未暇立乎其位則世子者其本稱也公羊以為未踰年之君非也又謂不君靈公不成其子故稱世子聖人善善惡惡各以其身安得不君靈公不成其子耶附左傳楚子城陳蔡不羮襄城縣東南有不羮城定陵西北有不羮城使棄疾為蔡公十有二年春齊髙偃帥師納北燕伯于陽杜氏曰三年燕伯出奔髙偃髙傒𤣥孫齊大夫陽即唐燕别邑中山有唐縣不言于燕未得國都三月壬中鄭伯嘉卒夏宋公使華定來聘左傳通嗣君也公如晉至河乃復左傳取郠之役莒人愬于晉晉有平公之喪未之治也故辭公公子憖遂如晉穀梁傳季孫氏不使遂乎晉也五月葬鄭簡公楚殺其大夫成熊熊公作然穀作虎秋七月冬十月公子憖出奔齊憖公作整左傳季平子立而不禮于南蒯南遺之子季氏費宰南蒯謂子仲憖吾出季氏而歸其室於公子更代也其位我以費為公臣子仲許之以告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊言及郊解經所以書出楚子伐徐左傳楚子狩于州來次于潁尾潁水之尾在下蔡使蕩侯潘子司馬督囂尹午陵尹喜五子楚大夫帥師圍徐呉之與國以懼呉楚子次于乾谿在譙國城父縣南以為之援雨雪王皮冠秦復陶秦所遺羽衣翠被豹舄執鞭以出僕析父從楚大夫右尹子革鄭丹夕莫見王見之去冠被舍鞭敬大臣與之語曰昔我先王熊繹楚始封君與吕伋齊太公之子丁公王孫牟衛康叔子康伯燮父晉唐叔子禽父周公子伯禽並事康王成王子四國皆有分分以寶玉我獨無有今我使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路籃縷以處草莽跋涉山林以事天子唯是桃弧棘矢以共禦王事言楚在山林少所出有齊王舅也成王母太公女晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅陸終氏生大子長曰昆吾嘗居許地少曰季連即楚之祖今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乗子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也又加之以楚四國陳蔡二不羮敢不畏君王哉工尹路請曰君王命剥圭以為鏚斧也柲柄也破圭玉以飾斧柄敢請命請制度之命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲子革曰摩厲以須王出吾刃將斬矣以已喻刃言摩厲以待斬王之淫慝王出復語左史倚相趨過倚相楚史名王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬跡焉此楚靈王心事也既得諸侯又滅陳蔡必將觀兵周郊以求九鼎以許田為名移兵臨鄭為改物之圖矣左氏詳記有意祭公謀父周鄉作祈招之詩以止王心祈父周司馬世掌甲兵之職招其名祭公方諫游行故指司馬官而言此詩逸王是以獲没於祗宫言不見簒弑臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔安知貌式昭徳音思我王度式如玉式如金形民之力而無醉飽之心孔氏曰穆王之時有祈父司馬官名招職掌兵甲常從王行祭公諫王游行設言以戒司馬言祈招之愔愔美其志性安和愔愔然也女當用此職掌以明我王之徳音也思使我王之徳度用如玉然用如金然使之堅而且重可實愛也若用民力當隨其力任不可使勞役過其所堪鑄冶之家將作器而制其模謂之為形用民之力亦依模用之故言形民之力也醉飽是酒食饜足過度之名穆王用民之力不知饜足故令去其醉飽過盈之心力朱子曰形字今家語作刑注云傷也極分曉盖言傷民之而無饜足之心也刑愚按作刑雖分曉但於上式如玉式如金意不接家語作亦與形同型鑄器之法孔氏説已明盡不可破也王揖而入饋不食寢不寐數日深感子革之言不能自克以及於難愚按楚子伐徐此已滅陳蔡欲肆其心將有事於北方而患呉之撓其後故伐徐以威呉也然則曷不遂伐呉乎盖懲鵲岸房鍾之兩敗且慮兵連釁結未易得解為北方諸侯之所窺故乗滅陳蔡之威加兵於徐欲以先聲脅呉使不敢動爾何以知其將有事於北方曰使人於周求鼎以為分求伯父昆吾舊宅之許田於鄭此非啟其端乎且申之㑹所聞六王二公之事其心薰然歆美極其願之所止固必如穆王周行天下皆有車轍馬跡而後已也子革之言固其志矣動之以後禍其心暫而怵焉隋楊廣之江都金完顔亮之江上與楚子䖍之乾谿前後一也春秋書滅陳蔡伐徐弑於乾谿比而觀之亂賊可以知所戒矣然非自天罰之亦安知報復之不爽如是乎春秋畏天命責人事制治於未亂故謹嚴於亂賊之變以見意也晉伐鮮虞左傳晉荀呉偽㑹齊師者假道鮮虞遂入昔陽秋八月壬午滅肥以肥子緜皋歸晉伐鮮虞因肥之役也鮮虞白狄别種在中山新市縣昔陽肥國都樂平沽縣東有昔陽城肥白狄也緜皋其君名鉅鹿下曲陽縣西有肥累城胡傳書晉伐鮮虞狄之也楚奉孫呉討陳因以滅陳誘蔡般殺之因以滅蔡晉莫能救則亦已矣而效其所為以伐人國是中國居而夷狄行也按當楚有事於中夏則晉常有事於狄不競於楚無志於中夏也夫戎狄豺狼不可啟也諸夏親暱不可棄也今親暱翦於豺狼而無畏簡書之志乃區區焉狄之為事又以狄道克之是狄而已矣十有三年春叔弓帥師圍費左傳春叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫魯大夫曰若見費人寒者衣之饑者食之為之令主而供其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏胡傳費内邑也卿為主將舉大衆圍其城若敵國然家臣強也語不云乎有一言而可以終身行之者其恕乎季氏以所惡於下者事上攘奪其君至於四分公室有其二以所惡於上者使下不禮其臣使怨而謀逐之何辭可執而以討於南蒯乎春秋之法不書内叛書圍費罪意如也按南蒯之叛雖以不見禮之故然其謀一則曰歸其室于公一則曰我以費為公臣盖亦不平季氏之所為而不忘乎公室云爾未始欲以邑附他國也故後雖以費入齊而君子不名其叛唯於此書圍費則其罪之在季氏可見矣公山弗擾以費叛召子欲往告子路曰夫召我者而豈徒哉夫子若往豈但使弗擾效順於季氏而已君實有國大夫不得有其家反之正必使公室與季氏各安其所然後紀綱立而治化可與是春秋書圍費墮費之意也家臣而欲張公室罪莫大焉當時大夫黨乎其類之私言爾若家臣心乎公室即為貳心於大夫是與大夫之専邑無君也夏四月楚公子比自晉歸於楚弑其君䖍于乾谿谿穀作溪左傳楚子之為令尹也殺大司馬薳掩而取其室在襄三十年及即位奪薳居掩之族田遷許而質許圍許大夫蔡洧有寵於王洧仕楚王之滅蔡也在十一年其父死焉其父在國故死王使與於守使洧與居守楚而行王行至乾谿申之㑹在四年越大夫戮焉王肅云越大夫常夀過也申之㑹經書淮夷而不書越以常夀過被罪不得列㑹故也戮者以令衆不必殺也故下文常夀過作亂王奪鬭韋龜令尹子文𤣥孫中犨邑名又奪蔓成然韋龜子邑而使為郊尹治郊竟大夫蔓成然故事蔡公棄疾有當璧之命故成然事之故薳氏之族及薳居許圍蔡洧蔓成然因羣喪職之族啟越大夫常夀過作亂圍固城克息舟楚邑城而居之觀起之死也在襄二十二年其子從在蔡事朝呉曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳二子皆靈王弟元年子干奔晉子晳奔鄭及郊而告之情告以蔡公不知謀強與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行使子干居蔡公之牀食蔡公之食並偽與蔡公盟之徵驗以示衆已觀從狥於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之詐言蔡公將以師助二子蔡人聚將執之辭曰失賊子干子晳已行成軍蔡公助之而殺余何益乃釋之朝呉曰二三子指蔡人若能死亡則如違之以待所濟言若能為靈王死亡則可違蔡公之命以待成敗如何靈王蔡讐也蔡人豈能為之死亡哉朝呉特以激之若求安定則如與之以濟所欲蔡人决不為靈王死亡則莫如與蔡公可得安定蔡也且違上何適而可上謂蔡公言蔡公制命勿論所適當從衆曰與之蔡人悟乃奉蔡公召二子而盟於鄧潁川召陵縣西南有鄧城蔡公初不與謀至是同謀矣依陳蔡人以國國陳蔡而依之楚公子比子干公子黑肱子晳公子棄疾蔡公蔓成然蔡朝呉帥陳蔡不羮許葉之師因四族之徒四族薳氏許圍蔡洧蔓成然以入楚及郊蔡公使須務牟與史猈先入二人皆楚大夫蔡公之黨也因正僕人殺大子禄及公子罷敵蔡公志乎為君故殺靈王之二子特以長幼推比使立而因歸惡名焉正僕大子之近官公子比為王公子黑肱為令尹次於魚陂竟陵縣城西北有甘魚陂公子棄疾為司馬先除王宫使觀從從師于乾谿而遂告之從乾谿之師告使叛靈王且曰先歸復所後者劓師及訾梁而潰金完顔亮之事類此王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎右尹子革曰請待於郊以聴國人聴國人之所與王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聴大國之圖君也王曰大福不再祗取辱焉然丹子革乃歸於楚王沿夏漢水别名將欲入鄢芋尹無宇之子申亥求王遇諸棘里名闈門也以歸夏五月癸亥王縊於芋尹申亥氏蘇氏曰亂始於觀從成於棄疾以比為名而已然比動於利而隨之則比雖不弑而弑君之名比尸之矣汪氏曰隋司馬徳戡裴䖍通等與宇文智及弑煬帝推智及之兄化及而立之後史皆書化及弑君是亦春秋書楚比之義按比之弑君以春秋誅心而言召之而來盟之而從帥陳蔡不羮之師因四族之徒以入楚則躬為戎首畧不辭避是比有爭國之心明矣以春秋書法而言凡為弑君者所立而與聞乎故則以首惡書之討賊而不能明正其罪則不以討賊之辭書之䖍弑君而立比為是出奔及䖍罪貫盈國人内叛比歸而正名討賊夫誰曰不可乃志在於乗亂竊入因人成事初無討賊之意則是以一亡公子爭國而已䖍有覆載不容之罪而人莫之疾戴以為君者有年於兹起於二三失職怨望之徒因其在外反之於内則臣弑其君而已比無親於楚無援於晉進不能正討賊之義退不能為曺子臧呉季子力辭不受為人所用援之立則立書法得以加弑君之名怖之死則死棄疾得以歸弑君之獄其又奚怪哉然罪比是矣而使棄疾逃誅則姦人之計推人使先而徐圖其後人受其惡名而身享其利者是將為得乎曰春秋之文一事而兼衆義其㫖甚深而人多不察今熟玩於經則得之矣曰楚公子比自晉歸于楚弑其君䖍於乾谿楚公子棄疾殺公子比比方自晉歸於楚身未至于乾谿則弑䖍於乾谿者誰哉下書楚公子棄疾殺公子比則棄疾實當國而弑䖍殺比皆在其手也明矣當以棄疾為主則前而比之歸中而䖍之弑後而比之殺皆棄疾所為爾春秋實未嘗專歸獄於比而漏棄疾之誅但讀者不察耳䖍之弑君以縊而䖍亦自縊䖍殺麇之二子幕與平夏而禄與罷敵亦先死焉自投車下曰人之愛其子亦如余乎噫天道好還乃如是哉或曰弑其君䖍上脱一楚字楚公子棄疾殺公子比殺公作弑左傳觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉觀從曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣相恐以靈王也乙夘夜棄疾使周走而呼曰王至矣國人大驚蔓成然走告子干子晳曰王至矣國人殺司馬將來矣司馬棄疾也言司馬見殺以恐子干君若蚤自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺丙辰棄疾即位名曰熊居葬子干於訾實訾敖不成君無號諡者楚皆謂之敖郟敖訾敖並以地名冠敖又楚之先君有若敖在位多年亦稱為敖不知敖是何義殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗為令尹蔓成然平王封陳蔡復遷邑復九年所遷邑施舍寛民宥罪舉職召觀從使為卜尹他年芋尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸初共王無冢適有寵子五人無適立焉乃大有事於羣望星辰山川而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室祖廟之庭使五人齊側皆反而長以長幼入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐微見璧紐以為審識子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈音古焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也寵須賢人而固有人而無主二也内主有主而無謀三也䇿謀有謀而無民四也民衆有民而無徳五也四者既備當以徳成子干在晉十三年矣晉楚之從從子干游者不聞達者可謂無人族盡親叛可謂無主族屬已盡親者異心無釁而動可謂無謀靈王無道民心内離可謂有釁但子干無主於内無助於外輕信妄動故曰無釁為羈終世客於晉可謂無民亡無愛徴可謂無徳楚人無愛念之者涉五難以弑舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉時穿封戌死棄疾并領陳事城方城苛慝不作盗賊伏隠民無怨心芉姓有亂必季實立楚之常也獲神一也當璧拜有民二也君陳蔡民無怨令徳三也無苛慝寵貴四也貴妃子居常五也棄疾季有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣位不尊其寵棄矣父既没故民無懷焉國無與焉將何以立義已見上秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曺伯莒子邾子滕子薛伯杞伯小邾子于平丘左傳晉成虒祈諸侯朝而歸者皆有貳心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徴㑹告於呉秋晉侯㑹呉子於良下邳有良城縣水道不可呉地水行故言水道不可言水行值難呉子辭乃還七月丙寅治兵於邾南甲車四千乗三十萬人羊舌鮒叔向弟攝司馬遂合諸侯於平丘杜氏曰平丘在陳留長垣縣西南八月甲戌同盟于平丘左傳晉人將尋盟齊人不可曰諸侯討貳則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經業貢賦之業有業而無禮經則不序須禮而有次序有禮而無威序則不共禮須威嚴而後共有威而不昭共則不明威須昭告神明而後信義著是故明王之制使諸侯嵗聘以志業志識也嵗聘問以互修其職業間朝以講禮三年而一朝正班爵之義率長幼之序再朝而㑹以示威六年而一㑹以訓上下之則制財用之節再㑹而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再㑹王一巡狩盟於方嶽之下自古以來未之或失也存亡之道恒由是興晉禮主盟依先王先公舊禮主諸侯盟懼有不治奉承齊犧齊盟之犧牲而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼曰小國言之大國制之敢不聴從叔向曰諸侯有間隙矣不可以不示衆鄙哉叔向八月辛未治兵習戰建而不斾斾斿也壬申復斾之諸侯畏之軍將戰則斾故曳斾以恐之邾人莒人愬於晉曰魯朝夕伐我幾亡矣我之不共魯故之以不共晉貢晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服恵伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死言牛倒豚上豚必死也謂魯以晉無能故以瘠牛自喻南蒯子仲之憂其庸可棄乎若奉晉之衆閒其二憂何求而弗克魯人懼聴命不敢與盟甲戌同盟於平丘齊服也子産爭承承貢賦之次曰昔天子班貢輕重以列位也列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請自日中以爭至於昏晉人許之按自晉楚為成晉之君臣自謂天下無事媮惰苟安無復四方之志楚由是虎視中夏肆其無厭熊䖍罪盈惡稔自底覆亡晉昭公誠欲於是而號召諸侯修復悼公之業無亦求之有本行之有序今揣己度徳未有以服人心改觀聴而汲汲於㑹之是徴盟之是重未聞主夏盟奉齊犧求終事而矜其威力恐脅諸侯自喻牛雖瘠僨於豚上如此盟之卑者也詞之不殺惡之也晉自城把之役於今十六年不得齊不能以徳結其心而徒示甲兵之威自雞澤之盟於今四十二年不勤王不能以義示諸侯而上盟天子之老書同盟兼譏之也晉合諸侯止此鄟陵之後參盟復作矣晉自重丘之後㑹盟皆大夫至此而再合諸侯晉昭初立楚國有亂有志於收諸侯也而叔向諸臣徳卑材下故卒於無成自是亦不復合諸侯穀梁以為善其因楚有難而反陳蔡之君公羊注又以為諸侯欲討棄疾是皆不得其傳而臆度之言也公不與盟與音預胡傳臣子之於君父隠諱其恥禮也㑹於沙隨不見公盟於平丘公不與曲不在我故直書而不諱也李氏曰胡氏全無貶魯之文恐亦小偏黑壤之曲全在魯故諱而不書沙隨平丘之曲雖在晉然沙隨以僑如之譖魯實無罪平丘以邾莒之訴魯亦不能無責焉於曲之中又分曲直則書法兩通矣晉人執季孫意如以歸左傳公不與盟晉人執季孫意如以幕蒙之使狄人守之晉人以平子歸子服湫恵伯從胡傳稱人以執非伯討也季氏不臣何以非伯討乎晉人若按其罪以大義廢之選於魯卿更意如之位收斂私邑為公室之民則方伯之職修矣今魯與邾通好亦不朝夕伐莒而鄆郠之故又非昭公意也徒以邾莒之言曰我之不共魯故之以遂辭魯君而執意如則是意在貨而不在義也何得為伯討乎按邾莒之怨大率皆季氏為之也昭之世邾雖通好非得已也前此受其叛人庶其以漆閭丘來奔亦季氏也其愬於晉豈一無事而誣之哉若莒曰朝夕伐我盖甚之之詞雖不朝夕伐之然魯之削莒亦甚矣不止鄆郠一事也前此救台遂入鄆元年取鄆帥師疆鄆田五年受其叛人牟夷以牟婁及防兹來奔敗其師於蚡泉十年伐莒取郠皆季氏主之也即邾莒所愬季氏之罪多矣而况攘奪其君又魯之所未能愬者乎使舉伯討誅之可也沙隨不見公則執行父平丘公不與盟則執意如晉人固知季氏之専魯政矣而終不能討晉君昏庸強家以氣類相庇其執其舎但欲示威無心於行義也公至自㑹蔡侯廬歸於蔡陳侯呉歸於陳左傳楚之滅蔡也靈王遷許胡沈道房申六小國於荆荆山焉平王即位既封陳蔡而皆復之隠大子大子有之子廬歸於蔡悼大子偃師之子呉歸於陳公羊傳此皆滅國也其言歸何不與諸侯専封也榖梁傳此未嘗有國也使如失國辭然者不與楚滅也胡傳歸者順辭不與楚滅也不言自楚不與楚封也冬十月葬蔡靈公穀梁傳變之不葬有三失徳不葬啖氏曰按時君失徳而書葬不失徳而不書葬者多矣不可通也廢今按喪葬人之常禮鄰國往㑹則書豈以失徳而常禮蔑喪紀何以為訓哉弑君不葬啖氏曰賊未討不書葬本施於魯不及他國他國則從㑹不㑹之例但賊當國者多不得依常禮葬終不可為例也滅國不葬言無人葬之然楚滅陳葬陳哀公是葬禮猶行列國猶㑹或言楚葬之非然且葬之不與楚滅且成諸侯之事也范氏曰蔡靈公弑逆無道以至身死國滅不宜書葬書葬者不令夷狄加乎中國且成諸侯興滅繼絶之善也趙氏曰據蔡既興復以禮改葬魯往㑹故書耳無多説也公如晉至河乃復左傳公如晉荀呉謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯文伯子彌牟辭公於河按先是公子憖欲去季氏以告公而從公如晉事雖不遂公之欲除季氏明矣季氏見執而公復如晉人皆以為請季氏而譏其失進退以吾觀之公之意殆不其然公之意謂此除季氏之機也邾莒之事託於請之隂以明之然晉之執意如本以我之不共魯故之以之一言而已未暇深問相犯之曲直也晉之大夫亦魯之季氏豈有為魯討不臣之事哉呉滅州來左傳呉滅州來令尹子旗請伐呉王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在呉猶在楚也子姑待之令尹上當有楚字州來屬楚之小國成六年呉入之至是滅之附左傳季孫猶在晉子服恵伯私於中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳于晉親親與大賞共罰否所以為盟主也子其圖之穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫恵伯曰寡君未知其罪合諸侯而執其老若猶有罪死命晉命可也若曰無罪而恵免之諸侯不聞是逃命也何免之為請從君恵於㑹宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君襄二十一年坐叔虎與欒氏黨微武子之賜不至於今季武子雖獲歸骨於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除舘於西河其若之何且泣平子懼先歸恵伯待禮待見遣之禮十有四年春意如至自晉左傳尊晉罪已也劉氏曰左氏之舍族為尊晉罪已非也一事再見卒名耳孫氏曰不氏前見也穀梁傳大夫執則致大夫不致見執而後致致則名意如惡然而致見君臣之禮也附左傳南蒯之將叛也盟費人司徒老祁為一人慮癸為一人因民之欲叛也請朝衆而盟遂刧南蒯曰羣臣不忘其君君謂季氏欲請送子遂奔齊侍飲於景公公曰叛夫對曰臣欲張公室也子韓晳齊大夫曰家臣而欲張公室罪莫大焉司徒老祁慮癸來歸費齊侯使鮑文子致之三月曺伯滕卒夏四月秋葬曺武公八月莒子去疾卒左傳莒著丘公卒郊公著丘公子不慼國人弗順欲立著丘公之弟庚輿蒲餘侯莒大夫兹夫也惡公子意心恢而善於庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之胡傳卒自外録者也莒人來赴故魯史書其卒葬自内録者也魯人不往是以闕其葬自昭公以來把薛微國無不㑹其葬矣何獨闕於莒乎意如專國莒嘗愬其疆鄆取郠之罪故怒而不往也以此見意如之専恣矣若意如者其很然不顧敢施於鄰國則廢其喪紀不能少忍於其君則偪之出奔及在晉一聞除舘西河之言則恐懼逃歸一匹夫不若何也小人無禮喜怒勇怯不中節皆若是耳苟不逺之其能國乎冬莒殺其公子意恢左傳冬十二月蒲餘侯兹夫殺公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田髙郵孫氏曰公榖皆以為曺莒無大夫盖曺莒小國其大夫之位纔當大國之士春秋諸侯之士皆不書名故曺莒大夫之名不見于經其有事繫懲勸法當書者則雖賤而名之邾庶其黑肱莒牟夷意恢是也襄陵許氏曰公子鐸首亂而無見焉者韓愈曰春秋書王法不誅其人身此類皆所以表見王道若鐸不書者多矣附左傳晉邢侯楚申公巫臣之子與雍子亦故楚人爭鄐田久而無成士景伯如楚士景伯晉理官叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也施行罪也雍子自知其罪而賂以買直鮒也鬻獄邢侯専殺其罪一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺逸書三者皆死刑皋陶之刑也請從之乃施邢侯而尸雍子與叔魚于市仲尼曰叔向古之遺直也治國制刑不隠于親春秋輯傳卷十

body:
  text: 春秋輯傳卷八明王樵輯成公元年春王正月公即位二月辛酉葬我君宣公無氷杜氏曰周二月今之十二月而無冰書冬溫胡傳無氷者常燠也按洪範曰豫恆燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家其象已見策書所載皆經邦大訓人有微而不登其姓名事有小而不記其本末雨雹冰雪何以悉書天人一理也萬物一氣也觀於隂陽寒暑之變以察其消息盈虛此制治於未亂慎於微之意也每慎於微然後王事備矣三月作丘甲左傳為齊難故作丘甲杜氏曰周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書胡傳為齊難作丘甲作者不宜作也唐太宗問李靖楚廣與周制如何靖曰周制一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乘耳今作丘甲即丘出一甲是一甸之中共百人為兵矣則未知其所作者三甸而增一乘乎每乘而增一甲乎魯至昭公時嘗搜于紅革車千乘則計甸而增乘未可知也楚人二廣之法一乘至用百有五十人則魯每乘而增一甲亦未可知也賦雖不同其實皆為益兵其數皆增三之一耳按成公以前甸賦車一乘每乘步卒七十二人甲士三人每甲士統二十四人即五伍為兩也甲士為之長故亦名兩為甲每甸四丘共出三甲是為兵車一乘之數作丘甲則一丘出一甲其於賦增三之一也杜征南最號知兵及釋此亦誤公羊云譏始丘使也何休云譏使丘民作鎧也穀梁云古者農工皆有職以事上甲非人人之所能為也丘作甲非正也范寧云甲鎧也按以甲為鎧以作丘甲為使丘作鎧不待深於文義者始知其妄也杜氏云長轂一乘甲士步卒七十五人此甸所賦使丘出之按丘者十六井耳甸乃六十四井使丘供甸賦是加四倍恐無此理且經自云丘甲不云丘乘也此條惟胡氏得之蓋司馬法舊制四丘出三甲三甲七十五人今欲益兵或三甸而增乘或每乘而增甲大要是一丘出一甲四丘為百人矣四丘六十四井五百一十二家也出百人視舊為增三之一故民猶可供若如杜氏之說豈有一丘十六井一百二十八家而使之出一乘之賦哉夏臧孫許及晉侯盟于赤棘左傳聞齊將出楚師夏盟于赤棘按前年魯乞師于楚欲以伐齊楚師不出今齊又將出楚師欲以伐魯故懼而與晉盟赤棘晉地也稱及魯所欲也宣公之有國也襄仲謀于齊而立之自是疏晉而親齊及其患三桓之專也歸父謀於晉而欲去之不克見逐而奔齊自是三桓仇齊而媚晉矣歸父本與晉謀去三桓及其不克乃不奔晉而奔齊者晉亦强家用事寧肯為魯去强家哉此其議必有所不諧也幸而宣公遽薨使其尚在則昭公陽州之孫不待季平之世矣是時齊少懦矣三家本欲叛齊而事晉加以上怨宣公於是追治襄仲之事而逐歸父此其所以叛齊之決而從晉之堅也成公即位之初方經大故未聞拊循其民而作丘甲將以修怨於鄰國且以反好為仇則昨齊今晉而無恧色乞師報怨則乍晉乍楚而無愧辭為操如此盟亦何賴而汲汲以干於大國又出於三桓忿戾之私罪可見矣秋王師敗績于茅戎公穀作貿戎左傳晉侯使瑕嘉平戎于王劉康公邀戎將伐之叔服曰背盟而欺大國必敗不聽遂伐茅戎三月癸未敗績于徐吾氏徐吾氏茅戎之别也杜氏曰茅戎戎别種也不言戰王者至尊天下莫之得挍故以自敗為文不書敗地而書茅戎明為茅戎所敗啖氏曰王師不書戰無敵也敵則但書敗而巳人臣無敵君之義也常山劉氏曰王者不能以義征四夷乃徼戎以取敗聖人立法垂教一書王師敗績于茅戎而尊王之義與王自取敗及諸侯不勤王之義咸見之矣冬十月穀梁傳季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘于齊齊使秃者御秃者使眇者御眇者使跛者御跛者使僂者御僂者蕭同姪子處臺上而笑之聞于客客不說而去郤克眇范氏從杜氏作跛按恐無四國聘使秃眇跛僂適在同時之理此事當從左氏范氏曰經冬十月下疑脫季孫行父如齊六字附左傳冬臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至間晉之爭雖晉人伐齊楚必救之是齊楚同共也我也知難而有備乃可以逞二年春齊侯伐我北鄙左傳春齊侯伐我北鄙圍龍魯邑在泰山博縣西南頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊磔也諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘取龍及侵巢丘不書其義未聞夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績左傳衛侯使孫良夫林父之父石稷碏四世孫寧相寧俞子向禽將侵齊與齊師遇齊伐魯還而衛師與之遇也石子欲還衛本聞齊伐魯而潛師侵之故遇其師而欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如如不如也無出今既遇矣不如戰也夏有闕文失新築戰事石成子曰師敗矣子不少須衆懼盡成子石稷也衛師已敗而孫良夫復欲戰故成子欲使須救子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居衛地新築人仲叔于奚救孫桓子大夫守邑以邑冠之呼為某人桓子是以免既衛人賞之以邑辭請曲縣音懸軒縣也周禮天子樂宫縣四面諸侯軒縣闕南方繁步于反纓馬飾以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人杜氏曰新築衛地皆陳曰戰良夫不從石稷之言必進而戰喪師辱國春秋所以罪良夫而以之主是戰也六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績郤去逆反首公穀作手鞍音安左傳孫桓子還于新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役無能為之役使請八百乘許之郤克將中軍士燮范文子將上軍代荀庚欒書將下軍代趙朔韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之師從齊師于莘齊地六月壬申師至于靡笄山名之下齊侯使請戰曰子以君師辱于敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾于敝邑之地寡君不忍使羣臣請于大國無令輿師淹于君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也癸酉師陳于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而後朝食不介馬而馳之郤克傷于矢流血及屨未絶鼓音曰余病矣張侯解張也曰師之耳目在吾旗鼓進退從之此車一人殿鎮也之可以集事若之何其以病敗君之大事也擐音患貫也甲執兵固即就也死也病未及死吾子勉之左并去聲轡右援枹音浮鼓槌也而鼓馬逸不能止師從之齊師敗績逐之三周華不注華不注山名逢丑父與公易位將及華泉驂絓于木而止韓厥執縶張立反馬絆也馬前示修臣僕之職再拜稽首奉觴加璧以進亦以示敬曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏言欲以已不敏攝承空乏從君俱還丑父使公下如華泉取飲鄭周父御佐車副車宛茷扶廢反為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者郤子曰人不難以死免其君赦之以勸事君乃免之晉師從齊師入自丘輿齊邑下同擊馬陘齊侯使賓媚人國佐也賂以紀甗玉磬與地甗玉甑皆滅紀所得不可則聽客之所為賓媚人致賂晉人不可曰必以蕭同叔子為質同叔蕭君之字齊侯外祖父子女也難斥言其母故逺言之而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命于諸侯而曰必質其母以為信其若王命何且是以不孝令也詩大雅曰孝子不匱永錫爾類若以不孝令于諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝小雅今吾子疆理諸侯而曰盡東其畝而已晉之伐齊循壟東行徑易無回曲無顧土宜無乃非先王之命也乎四王之王也禹湯文武樹德而濟同欲焉五伯之霸也夏昆吾商大彭豕韋周齊桓晉文勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩商頌曰布政優優和也百祿是遒在由反聚也子實不優而棄百祿諸侯無害焉不然寡君之命使臣則有辭矣曰子以君師辱于敝邑畏君之震師徒橈敗吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一欲於城下復借一戰魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許仇我必甚唯子則又何求子得其國寶我亦得地而紓于難其榮多矣晉人許之對曰羣臣率賦輿以為魯衛請若苟有以藉口而復于寡君君之惠也敢不唯命是聽禽鄭自師逆公禽鄭魯大夫歸逆公㑹晉師張氏曰晉為盟主興師討齊非有救亂誅暴之名而起于郤克恥一笑之憤齊桓伐衛與衛人戰先書伐而後書戰此不書伐故春秋不以齊為主見晉魯衛曹之大夫志乎是戰雖得一朝之勝不足道也陳氏曰凡帥非卿不書雖卿非元帥亦不書書魯四卿是各自帥也自文季年而無使介使舉上客而不及其介將稱元帥而不列其副春秋之例至是而無將佐魯三家之勢成矣秋七月齊侯使國佐如師己酉及國佐盟于袁婁穀作援婁左傳秋七月晉師及齊國佐盟于袁婁使齊人歸我汶陽之田公羊傳曷為不盟于師而盟于袁婁鞍之戰齊師大敗師還音環環繞也齊侯晉郤克投戟逡巡再拜稽首馬前逢丑父者頃公之車右也面目衣服與頃公相似代頃公當左使頃公取飲頃公操飲而至不知頃公將欲堅敵意抑勢未得去邪曰革取清者革更也頃公用是佚而不反逢丑父曰吾賴社稷之神靈吾君已免矣郤克曰欺三軍者其法奈何顧問執法者曰法斫在略反於是斫逢丑父齊侯使國佐如師郤克曰與我紀侯之甗音言反魯衛之侵地使耕者東畝且以蕭同姪子為質則吾舍子矣國佐曰紀侯之甗魯衛之侵地請諾使耕者東畝則是土齊也蕭同姪子者齊君之母也齊君之母猶晉君之母也不可請戰一戰不勝請再再戰不勝請三三戰不勝則齊國盡子之有也何必以蕭同姪子為質揖而去之郤克眣魯衛之使使以其辭而為之請以目通指曰眣然後許之逮于袁婁而與之盟穀梁傳鞍去國五百里袁婁去國五十里一戰綿地五百里焚雍門之茨國齊國也雍門齊城門茨蓋也侵車東至海今按鞍之戰當用左氏說盟于爰婁當用公羊氏說鞍與袁婁相去逺近不可知穀梁之言恐未可信齊之四竟不應過遙鞍已是齊地未必竟上之邑豈得去齊有五百里乎穀梁云一戰綿地五百里又云侵車東至海皆侈辭也然國佐如師不盟于師而盟于袁婁則明是郤克恃戰勝强力以非義要齊至欲質其君之母故國佐得以正義直辭折之郤克語塞國佐揖而去之郤克使魯衛為國佐之辭以為之請追及乎袁婁而與之盟此則公羊之說為可信也蕭同叔子公穀作蕭同姪子公羊注謂蕭同為國名姪子者姪娣之子嫁于齊而生頃公榖梁注謂蕭為國同為姓姪子為字其母更嫁齊惠公而生頃公二家皆傳聞有誤因而衍說耳左氏是也鞍戰之由亦惟左氏得之宣公十七年郤克徵㑹于齊跛而登階婦人笑于房郤克怒出而誓曰所不此報無能涉河歸而請伐齊晉侯弗許蓋知興師之無名矣斷道之盟執齊三子為見侮故也宣公薨季文子欲叛齊事晉作丘甲盟赤棘皆為齊也齊伐我北鄙釁于是乎遂搆而衛孫良夫以新築之敗亦誓欲必報于齊故與季文子皆因郤獻子以請師于晉以郤克憾齊而未有名以興師故也郤克之答齊師一則曰大國朝夕釋憾于魯衛二則曰寡君使羣臣為魯衛請足知是役也以魯衛之請而魯衛之請自各以見侵之故耳二傳增魯衛亦見笑之事者妄說也豈有三國因一笑之恥謀之三年始空國以伐人乎書齊侯使國佐如師而不曰來盟于師見盟非前定尚欲徐觀可否齊非有誠服之心也書及國佐盟于袁婁見晉義曲師老而汲汲欲盟者反在晉也若此類見曲直之繩墨矣八月壬午宋公鮑卒左傳八月宋文公卒始厚葬用殉君子謂華元樂舉于是乎不臣君生則縱其惑死又益其侈是棄君于惡也何臣之為庚寅衛侯速卒速公作遫左傳衛穆公卒晉二子自役弔焉取汶陽田汶音問公羊傳汶陽田者何鞍之賂也杜氏曰晉使齊還魯故書取不以好得故不言歸汶陽田汶水北地汶水出泰山萊蕪縣西入濟冬楚師鄭師侵衛十有一月公㑹楚公子嬰齊于蜀楚書公子自嬰齊始左傳楚令尹子重救齊王卒盡行彭名御戎蔡景公為左許靈公為右王卒盡行故王戎車亦行雖無楚王令二君當左右之位二君弱皆强冠之冬楚師侵衛遂侵我師于蜀侵及陽橋魯地孟孫請往賂之以執斫匠人執針女工織紝織繒布者皆百人公衡成公子為質以請盟楚人許平杜氏曰蜀魯地胡傳侵衛則書侵我致賂納質沒而不書非諱也杜氏云公賂之而退故不書侵書其重者則莫重乎其以中國諸侯降班失列下與夷狄之大夫㑹也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左傳十一月公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫不書其名非卿盟于蜀卿不書匱乏也盟也於是畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位附左傳楚師及宋公衡逃歸晉侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功于齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司于王室鞏朔上軍大夫非命卿又奸先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯鞏朔不能對三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭左傳諸侯伐鄭次于伯牛鄭地討邲之役也遂東侵鄭鄭公子偃穆公子帥師禦之使東鄙覆伏兵也諸鄤亡袁反敗諸丘輿鄤丘輿皆鄭地晉偏軍為鄭所大敗故不書皇戌如楚獻捷胡傳宋衛未葬曷為稱爵背殯越竟以吉禮從金革之事也按前年冬楚師鄭師侵衛故晉今討之左氏以為討邲之役非也邲之役晉救鄭而自敗于楚非鄭之罪也奚討乎若曰討二我克則來不克遂往我固知之矣不能爭于當時而討于今鄭豈受治乎使晉有志於抗楚而服鄭曷若移鞍之役于今日乎移八百乘之兵以距楚楚必却移七大夫之同心以爭鄭鄭必服今兵力既盡于齊而區區摟諸侯于從楚之餘宜其不能得也乃若鄭恃夷而抗中國蔑親昵覆敗晉師夫晉獻齊捷于周天子猶以為奸先王之禮況敗盟主兄弟甥舅而以為功乃獻之于夷狄冦仇以取媚乎鄭之罪不可勝誅矣辛亥葬衛穆公穆公作繆二月公至自伐鄭甲子新宫災三日哭新宫者宣宫也不曰宣宫神主未遷也宫成而主未入遇災而哭禮乎禮稱焚其先人之室則三日哭今新宫神主未遷以上則不成乎廟以下則非先人之室也災而哭于人情何居然則何以書宣公薨至是二十有八月緩于遷主可知矣又不戒于火而災以為無慎重宗廟之心憯怛念親致生神明所依之意是以書也乙亥葬宋文公夏公如晉左傳拜汶陽之田鄭公子去疾帥師伐許左傳許恃楚而不事鄭鄭子良伐許公至自晉附左傳晉人歸楚公子穀臣與連尹襄老之尸于楚以求知罃邲之戰楚獲知罃而知季則射連尹襄老獲之而載其尸射公子穀臣囚之以二者還於是荀首知罃父即知季佐中軍矣故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好二國有好臣不與及其誰敢德王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報王曰雖然必告不穀對曰以君之靈纍臣得歸骨于晉寡君之以為戮死且不朽身死而朽腐此恩不朽腐也若從君之惠而免之以賜君之外臣首首其請于寡君而以戮于宗亦死且不朽若不獲命而使嗣宗職次及于事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之秋叔孫僑如帥師圍棘左傳叔孫僑如圍棘取汶陽之田棘不服故圍之僑如得臣子公羊傳棘者何汶陽之不服邑也杜氏曰棘汶陽之邑在濟北蛇丘大雩晉郤克衛孫良夫伐牆咎如牆在良反公作將穀作牆咎音羔左傳討赤狄之餘焉牆咎如潰杜氏曰經闕此四字上失民也晉嘗滅赤狄潞氏甲氏及留吁矣其餘黨散入牆咎如又欲盡殄滅之非仁人之心也段紀明請滅羌種羌雖滅漢亦亡後世豈嘗絶羌患哉牆咎如潰削而不書聖人之情見矣惟不使之侵擾華夏斯止矣冬十有一月晉侯使荀庚來聘晉來聘之始衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟聘而遂盟之于是始左傳冬十一月晉侯使荀庚來聘且尋盟尋元年赤棘盟庚林父之子衛侯使孫良夫來聘且尋盟尋宣七年盟公問諸臧宣叔曰中行伯之于晉也其位在三下卿孫子之于衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也古制公為大國侯伯為次國子男為小國衛在晉不得為次國春秋時以强弱為大小故衛雖侯爵猶為小國晉為盟主其將先之計等則二人位敵以盟主故先晉丙午盟晉丁未盟衛禮也劉氏曰諸侯有聘無盟聘禮也盟非禮也庚與良夫生事專命為非禮不信以干先王之典故不繫於國以見其遂事之非也胡傳其言及者公與之盟而不言公見二卿之抗也盟者春秋所惡于惡之中又有惡焉者此類是也今按公羊云聘而言盟者尋舊盟也左氏亦云聘且尋盟是皆以為二子聘盟兩受命惟劉氏以為生事專命李氏曰聘而遂盟例五此年荀庚良夫十一年郤犨襄七年林父十五年向戌其皆書日一則以别于微者一則以别于前定也穀梁疏曰前定之盟不日則此非前定可知矣又曰卑者之盟不日則此非卑者可知矣以非前定則知其生事以非卑者則知其抗公鄭伐許程子曰鄭附于楚一年而再伐許故夷之附左傳十二月甲戌晉作六軍韓厥新中軍趙括佐韓厥鞏朔新上軍韓穿佐朔荀騅新下軍趙㫋佐騅皆為卿賞鞍之功也四年春宋公使華元來聘左傳通嗣君也為共公謀昏張本三月壬申鄭伯堅卒杞伯來朝左傳歸叔姬故也將出叔姬先修朝禮言其故夏四月甲寅臧孫許卒公如晉左傳公如晉晉侯見公不敬季文子曰晉侯必不免葬鄭襄公未五月秋公至如晉左傳秋公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇于我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止冬城鄆公作運杜氏曰公欲叛晉故城而為備按鞍之役晉方有德于魯曾未幾日率先諸侯受盟于楚晉人無討幸矣兩如晉未足以救匱盟之過一不為所禮又將叛晉而即夷甚矣魯之無義也夫國保于義杖莫如信魯無信義城鄆何益哉家氏曰鄆有三莒之别邑亦曰鄆九年楚人入鄆是也魯自有二鄆文十二年城諸及鄆此東鄆莒魯所爭者也成十六年公待于鄆此西鄆今此所城也鄭伯伐許左傳冬十一月鄭公孫申帥師疆許田許人敗諸展陂亦許地鄭伯伐許取鉏任泠力丁反敦之田晉欒書將中軍代郤克荀首佐之士燮佐上軍以救許伐鄭取汜音凡祭側界反東汜祭鄭地成臯縣有汜水楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決胡傳悼公稱爵喪未踰年以吉禮從金革之事所以著其惡也五年春王正月把叔姬來歸穀梁傳婦人之義嫁曰歸反曰來歸杜氏曰出也仲孫蔑如宋左傳孟獻子如宋報華元也夏叔孫僑如㑹晉荀首于穀首公作秀左傳荀首如齊逆女故宣伯餫野饋諸穀梁山崩公羊傳梁山者河上之山也梁山崩壅河三日不㳅音流何以書為天下記異也杜氏曰梁山在馮翊夏陽縣北張氏曰同州韓城縣有禹貢梁山所謂治梁及岐胡傳左氏載絳人之語絳人曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉時晉侯將召伯宗謀之伯宗以告而從之於禮文備矣而未盡其實也夫不舉去盛饌降服損盛服乘縵車無文徹樂息八音出次舍于郊祝幣祝官主陳玉帛史辭史主為辭自罪貴七者禮之文也必有恐懼修省之心主于內若成湯以六事檢身高宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川主謂所主祭至于崩竭當時諸侯未聞有戒心而修德也故自是而後六十年間弒君十有四亡國三十二其應亦憯矣春秋不明著事應而事應具存其可忽諸附左傳許靈公訴鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戍及子國穆公子故鄭伯歸使公子偃請成于晉秋八月鄭伯及晉趙同盟于垂棘晉地秋大水冬十有一月己酉天王崩十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢左傳冬同盟于蟲牢鄭服也程子曰天王崩而㑹盟不廢書同見其皆不臣杜氏曰蟲牢鄭地陳留封丘縣北有桐牢汪氏曰天子之喪人道始終之大變諸侯相見揖讓入門而聞訃則不得終禮況已聞而猶相與㑹盟可乎李氏曰鄭自邲之役後皆從楚至此始從晉而晉人不能明尊王之義以示之汲汲于要之以盟誓此所以終不能訓定鄭雖再救而卒無功也六年春王正月公至自㑹二月辛巳立武宫左傳二月季文子以鞍之功立武宫非禮也聽于人以救其難不可以立武立武由已非由人也公羊傳武宫者武公之宫也立者不宜立也立武宫非禮也按宣十二年潘黨勸楚子立武軍楚子答以武有七德非巳所堪其為先君宫告成事而巳為先君宫其亦立武宫之類也乎武宫者武公之宫武公伯禽元孫成公十一世祖禮過高祖不得復立廟今立之服䖍以為鞍之戰禱武公以求勝故立其宫豈或然歟抑武公嘗有伐齊之功故歟明堂位曰魯公之廟文世室也武公之廟武世室也俗儒習魯之故遂夸而大之以僭為典然是時魯有武宫煬宫晉悼公朝于武宫晉頃公時中行穆子獻俘于文宫皆逺世應毁之廟則知當時諸侯之廟親盡不毁者固多矣取鄟音專胡傳鄟微國書取者滅之也內諱滅曰取項亦國也而書滅者以僖公在㑹季孫所為故直書而不𨼆根牟鄟邿皆微國也公羊皆曰邾邑然春秋未有取他國之地而不繫國者苟曰諱亟公羊云不繫于邾婁諱亟也謂甫盟蟲牢而背信之亟也則僖取須句訾婁可謂亟矣何以繫邾邪衛孫良夫帥師侵宋左傳三月晉伯宗夏陽說亦晉大夫衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏河南新城縣東有蠻城侵宋以其辭㑹也前年蟲牢之盟諸侯謀再㑹宋以公子圍龜之難辭杜氏曰經唯書衛孫良夫獨衛告也按楚莊逞志于宋國幾斃而晉不能救今宋盟于蟲牢未有二志諸侯未歸又謀再㑹晉令實繁而尤宋之以國難辭遂使魯衛兩國興師迭伐繼書于策晉之惡見矣左氏載衛人不保夏陽說欲襲之伯宗不可曰衛唯信晉故師在其郊而不設備若襲之是棄信也無信何以求諸侯乃止及師還衛人登陴此與經絶不相類且晉方與衛侵宋而反欲襲衛亦首尾自相戾然亦晉之素無信有以招是言也附左傳晉人謀去故絳晉復命新田為絳故謂此為故絳諸大夫皆曰必居郇瑕氏古國名河東解縣西北有郇城之地沃饒而近盬盬河東鹽池袤五十一里廣七里周總百一十六里字從鹽省古聲國利君樂不可失也韓獻子曰不可郇瑕氏土薄水淺其惡易覯民于是乎有沈溺濕疾重膇治僞反足腫之疾不如新田土厚水深居之不疾有汾澮以流其惡汾水出太原經絳北西南入河澮水出平陽絳縣南西入汾惡垢穢且民從教十世之利也公說從之夏四月丁丑晉遷于新田夏六月邾子來朝公孫嬰齊如晉左傳子叔聲伯如晉命伐宋晉命也壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋左傳孟獻子叔孫宣伯侵宋晉命也按魯宋交好去年仲孫蔑方報華元之聘今遽為人役出二卿動大衆不直無名民無信不立以千乘之國而背信棄好視如鴻毛將何以立乎楚公子嬰齊帥師伐鄭楚始書大夫將左傳楚子重伐鄭鄭從晉故也冬季孫行父如晉左傳季文子如晉賀遷也晉欒書帥師救鄭左傳晉欒書救鄭與楚師遇于繞角鄭地楚師還晉師遂侵蔡楚公子申公子成以申息之師楚二縣救蔡禦諸桑隧汝南朗陵縣東有桑里在上蔡西南趙同趙括欲戰請于武子欒書武子將許之知莊子荀首中軍佐范文子士燮上軍佐韓獻子韓厥新中軍將諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣申息何榮之有焉若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政中軍元帥將酌于民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎按晉師救鄭與楚師遇于繞角則非不及事也楚師去我是晉無亡矢遺鏃之費而救鄭之義亦申矣于是全師而退三卿之善謀欒書之知擇而有斷均之乎不可掩也故春秋書以與之易曰師或輿尸凶言軍旅之任不專一而衆人主之覆敗必矣河曲之師趙盾為將而令出趙穿邲之師荀林父為將而令出先縠輿尸之效豈不昭然也哉欒書蓋有懲于邲之敗而不狃于鞍之勝者夫有懲于敗而戒不狃于勝而驕君子之心王者之道也聖人于欒書取節焉以立教也雖然晉不班師于繞角楚師既還之後乃遷戮而侵蔡則無名矣再致楚師不亦危乎使無知莊子范文子韓獻子三人力主之則邲之覆轍未必不蹈之矣然則師固忌于衆主而衆謀亦不可以不盡也欒子曰善衆之主也三卿為主可謂衆矣斯言可為聽謀用衆之法七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛鼷音奚胡傳穀梁子曰郊牛日展視也觓音求角貌角而知傷展道盡矣其所以備災之道不盡也不能防災禦患致使牛傷改卜牛鼷鼠又食其角非人之所能也改卜後宜知慎而又食知非有司之過非有司之過則變異也其應云何許翰曰小害大下賊上食而又食三桓子孫相繼之象也宣公有虞三桓之志至成始弗戒矣理或然也劉向曰鼠小蟲性盜竊鼷又其小者也牛大畜祭天尊物也角兵象在上君威也小小鼷鼠食至尊之牛角象季氏乃盜竊之人將執國命以傷君威而害周公之祀也改卜又食天重譴之也按改卜牛卜稷牛而代之也稷牛不吉及有變傷食之類則皆不郊凡未成牲者曰牛牲傷者亦曰牛已牛矣而又免之何也嘗置之上帝矣謂置之滌宮故卜而免之不敢專也免放也為之緇衣纁裳有司𤣥端送至于南郊也言免牛則不郊明矣下經復書不郊者為三望起吳伐郯音談經吳始見吳今平江府郯今淮陽軍下邳縣越江淮而伐郯吳始大也曰吳狄之也吳太伯之後以屬則周之伯父也何以狄之僭王也夏五月曹伯來朝不郊猶三望秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵左傳秋楚子重伐鄭師于汜音凡鄭地在襄城縣南諸侯救鄭鄭共仲侯羽二子鄭大夫軍楚師軍字疑囚鄖公鍾儀獻諸晉八月同盟于馬陵尋蟲牢之盟且莒服故也莒本屬齊齊服故莒從之晉人以鍾儀歸囚諸軍府軍藏府也杜氏曰馬陵衛地陽平元城縣東南有地名馬陵程子曰同盟于馬陵諸侯同心病楚也公至自㑹高氏曰諸侯㑹而楚師退故不以救鄭至吳入州來左傳楚圍宋之役師還子重請取于申吕以為賞田王許之申公巫臣曰不可此申吕所以邑也是以為賦以御北方若取之是無申吕也晉鄭必至于漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行適晉子反亦怨之及共王即位子重子反殺巫臣之族而分其室巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷于奔命以死巫臣請使于吳晉侯許之吳子壽夢說之乃通吳于晉以兩之一卒適吳舍偏兩之一焉司馬法百人為卒二十五人為兩車九乘為小偏十五乘為大偏蓋留九乘車及一兩二十五人令吳習之與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之㑹吳入州來子重自鄭奔命子重子反於是乎一歲七奔命蠻夷屬于楚者吳盡取之是以始大通吳于上國陳氏曰吳楚之交兵不書至是始書之王氏曰州來楚與國杜氏曰州來楚邑淮南下蔡縣是也高氏曰吳楚爭强始見于此州來屬楚吳以兵入之楚方强而敵已生其肘下矣至昭十三年吳滅州來劉氏曰州來小國世服于楚未通中夏謂真楚邑則背于經矣冬大雩穀梁傳雩不月而時非之也冬無為雩也劉氏曰穀梁云冬無雩非也周之十月今之八月若久不雨可不雩乎衛孫林父出奔晉左傳衛定公惡孫林父良夫之子冬孫林父出奔晉衛侯如晉晉反戚林父邑焉林父出奔戚隨屬晉衛侯如晉故晉還其邑杜氏曰春秋中年諸侯之大夫外交强國以仇其君衛之孫氏魯之季氏其尤也林父自結于晉之權臣為衛國患幾四十年晉黨叛臣為之羽翼衛獻魯昭所以失國晉實為之也八年春晉侯使韓穿來言汶陽之田歸之于齊左傳晉侯使韓穿來言汶陽之田歸之于齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師于齊使歸諸敝邑今有二命曰歸諸齊詩衛風曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉霸主將德是以而二三之其何以長有諸侯乎詩曰猶圖也之未逺是用大簡諫也雅詩大行父懼晉之不逺猶而失諸侯也是以敢私言之公羊傳曷為使我歸之鞍之戰齊師大敗齊侯歸弔死視疾七年不飲酒不食肉晉侯聞之曰嘻奈何使人之君七年不飲酒不食肉請皆反其所取侵地恐無此事公羊蓋意之耳杜氏曰齊服事晉故晉來語魯使還之杜說是按蟲牢馬陵之盟齊既服晉俾魯歸田所以堅齊也韓宣子有環其一在鄭商宣子謁諸鄭伯子産弗與宣子買諸賈人請諸子産子産曰吾子得玉而失諸侯必不為也韓宣子辭玉子産能使韓宣子辭玉唯信義有素晉人重之故言出而服也魯德二三素見輕于晉故不敢公言以却之而季文子私于韓穿亦何益乎來言緩辭蓋晉知言之不順歸之于者易辭魯之義不足以自直而不敢逆也已不能以王法正疆理保有周公之宇而由大國取之由大國歸之亦不得不唯命是聽而已矣晉欒書帥師侵蔡左傳晉欒書侵蔡遂侵楚獲申驪楚大夫楚師之還也謂六年遇于繞角時晉侵沈今汝南平輿縣獲沈子揖初從知韓范也自繞角之役常從三子之謀公孫嬰齊如莒左傳聲伯如莒逆也自為逆婦而書者因聘而逆宋公使華元來聘左傳聘共姬也夏宋公使公孫壽來納幣公羊傳納幣不書此何以書録伯姬也伯姬賢所以殊于衆女何氏曰隱二年傳婚禮不稱主人此稱使者宋公無母自命之也胡傳納幣不書此何以書公孫壽卿也納幣使卿非禮也晉殺其大夫趙同趙括左傳晉趙莊姬晉成公之女趙朔妻朔盾之子為趙嬰趙盾弟之亡故譖之于晉侯曰原屏將為亂欒郤為徵趙嬰通于趙莊姬原屏放諸齊原趙同食邑屏趙括食邑皆嬰之兄六月晉討趙同趙括武莊姬子從姬氏畜于公宫以其田與祁奚韓厥言于晉侯曰成季趙衰之勳宣孟趙盾之忠而無後為善者懼矣三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也乃立武而反其田焉韓厥言必在他年傳終言之按趙同趙括好勇而輕觀邲之役與欒書之救鄭二人皆不度其可而鋭于戰非欒書有主則晉又敗矣趙嬰淫亂罪所當討不請于君而擅放之專而無上不為無罪然晉侯聽姬氏之譖一朝而尸二大夫以趙衰之勳不復念而奪其田祿則失政刑矣故稱國以殺而不去其官按史記屠岸賈者始有寵于靈公至景公之三年賈為司冦乃治靈公之賊遍告諸將曰盾雖不知猶為賊首以臣弒君子孫在朝何以懲罪請誅之韓厥曰靈公遇賊趙盾在外吾先君以為無罪故不誅今誅其後非先君之意賈不聽攻趙氏于下宫殺趙朔朔妻有遺腹走匿公宫朔客公孫杵臼謂朔友程嬰曰立孤與死孰難程嬰曰死易立孤難耳杵臼曰趙氏先君遇子厚子强為其難者吾為其易者請先死乃二人謀取他嬰兒匿山中程嬰出謬謂諸將曰誰能與我千金吾告趙氏孤處諸將許之隨攻公孫杵臼遂殺杵臼與孤兒然趙氏真孤乃在程嬰卒與俱匿山中居十五年韓厥具以告于是景公召趙氏孤兒匿之宫中名曰武史記之說人多不信以左氏所不載也然左氏採雜記成書又歷二千餘年豈容無所遺脫司馬遷去春秋戰國不逺必有所傳不可廢也人所以疑者以據左氏則趙氏之禍由莊姬據史記則趙氏之禍由屠岸賈其說抵牾不可强合然嘗深考之則屠岸賈殺趙朔自一事也趙莊姬譖殺同括又一事也觀鄭人追討歸生弒君之罪斫其棺而滅其族則屠岸賈之事豈可謂無乎崔杼弒君慶封黨之滅崔慶之族者盧蒲嫳及莊公之嬖人盧蒲癸王何也屠岸賈亦猶是矣但史記謂同括嬰齊同見殺于下宫之難則傳聞之誤耳至于趙武畜于公宫則左氏史記又無不吻合夫晉殺同括因莊姬之言同括雖死趙盾之室自在使無他外患莊姬何至無依乃將武而畜于公宫乎景公何不念莊姬趙武之存忍即以其田與祁奚乎蓋朔死于下宫之難趙盾之系幾絶而盾之異母弟同括嬰專趙氏之政趙嬰通于莊姬同括因而逐之雖曰以罪然中心未必不出于爭權故內則莊姬怨之而行其譖外則欒郤疾之而為之徴趙武之匿始則虞屠岸賈之害終則武之尚存必亦非原屏所利也故從姬氏畜于公宫及原屏既死韓厥始言于公而立之此事之實也邲之役趙朔將下軍宣十二年晉景三年屠岸賈之難左此年鞍之役欒書將下軍代趙朔成二年晉景十一年朔死矣秋七月天子使召伯來賜公命賜公穀作錫錫命止此賜錫義同天王天子通稱耳陸氏曰書天子或依策命之文或傳寫誤也冬十月癸卯把叔姬卒左傳來歸自把故書杜氏曰愍其見出來歸故書若更適則不復書出而書卒者為明年逆喪起晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯左傳晉士燮來聘言伐郯也以其事吳故公賂之請緩師文子士燮不可曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師㑹伐郯按爭鄭于楚而不得又不能于吳而伐郯徒能虐小弱耳且聘而後言伐晉之為盟主可見矣不能以大義令諸侯吳初伐郯季孫曰中國不振旅蠻夷入伐而莫之或恤亡無日矣季孫能有後言而不能以正義匡贊盟主及晉來言伐郯而以賂請緩師何其卑乎衛人來媵媵賤事不書公子結為遂事起本也三國來媵非禮也故書諸侯娶一國嫡夫人也則二國往媵之是為左媵右媵所謂次妃以姪娣從所娶嫡夫人之國與往媵之二國俱以姪娣從諸侯一聘九女以上並公羊氏語禮也以禮制欲則治以欲敗禮則亂三國來媵則十二女矣後世掖庭萬人起于無禮以為之節也故備書三國以明逾制為後戒也左氏云凡諸侯嫁女同姓媵之異姓則否若然則莒姓已邾姓曹同姓至少孰為媵乎天子之內職百二十女于天子者曰備百姓也又可一姓乎若直為譏異姓不合來媵則止于明年書齊人來媵則知非禮何假先書衛晉乎公羊云録伯姬也穀梁云以伯姬之不得其所故盡其事也春秋欲顯伯姬之賢而哀其遇變豈假于辭之繁費于所不必書而書乎九年春王正月杞伯來逆叔姬之喪以歸左傳春把桓公來逆叔姬之喪請之也魯强請之杞叔姬卒為杞故也示恩于杞未許其絶故卒之而為之服繫之杞逆叔姬為我也已出而又逆其喪明為魯故按男女居室人之大倫王法所重宋襄公母出歸于衛襄公即位其母思之義不可往賦河廣之詩而聖人取之則出妻固與廟絶無復反之理也把叔姬之歸傳初不言其故然其來歸也杞伯先來朝而言其故其卒也杞伯因魯之請而逆其喪觀其事推其情其與他人之大歸者不同明矣疑叔姬無子心不自安而願歸故把伯來魯言其故魯人許之而後歸之逮其卒也魯人請之而復逆之魯人許之者以順叔姬之情後復請之者以明不絶之義故左氏曰把叔姬卒為杞也逆叔姬為我也以見魯杞不知出母廟絶之義苟順私情相為姑息之禮既逆喪歸葬又知祔廟矣春秋書之著其非禮也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲左傳為歸汶陽之田故諸侯二于晉晉人懼㑹于蒲以尋馬陵之盟是行也將始㑹吳吳人不至按晉德不足以宗諸侯而又常二三其命懼諸侯之二己而即楚也故又為是舉威强以御之明神以要之不知信不由中雖交質子猶無益而況盟乎于是鄭魯皆有叛意執鄭伐鄭止公盟公徒為是紛紛也晉以已之不信而要人之必信故特書同盟以罪晉也卒至㑹瑣澤而與楚成㑹鍾離而借吳援晉文襄霸主之餘勢於是盡矣然豈止晉一國之故哉杜氏曰蒲衛地在長垣縣西南公至自衛二月伯姬歸于宋杜氏曰宋不使卿逆非禮附左傳楚人以重賂求鄭鄭伯㑹楚公子成于鄧夏季孫行父如宋致女杜氏曰女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤昏姻之好趙氏曰公羊云録伯姬也按春秋之義以辨正是非但云録伯姬是何褒貶晉人來媵何氏曰朝廷侈于妒上婦人侈于妒下伯姬以至賢為三國所爭媵張氏曰納幣致女皆過乎厚觀左傳載穆姜之辭出房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人則前後越禮皆穆姜之意與秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭左傳秋鄭伯如晉晉人討其二于楚也執諸銅鞮丁兮反晉别縣在上黨欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也楚子重侵陳以救鄭按霸國失道蠻荆抗衡自文宣以來晉楚爭鄭鄭從楚則晉師至從晉則楚師至邲之戰鄭之從楚者十年自蟲牢馬陵之㑹楚方備吳未暇爭鄭鄭在晉者亦五年今年蒲之㑹鄭方從晉楚以重賂求鄭鄭復㑹楚于鄧夫惟利之從而不要諸義鄭信有罪矣然旋即悔過而躬朝于晉即當原其不獲已之情待之以禮斯得服二之道矣豈有以禮來朝而反蒙執辱者哉況伐其國又殺其行人邪明年又使衛侵鄭又㑹諸侯伐鄭間楚之不爭而肆暴無已故楚一求成鄭即甘心于楚自是比楚以撓中國凡二十年間諸侯之役無寧歲鰓鰓然以失鄭為憂尚誰咎哉故稱人而執與執其君而伐其國皆直書而義自見矣殺伯蠲不書既執其君舉重也楚侵陳以救鄭不書不與其救也所以存中國而抑外裔也冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆左傳楚子重自陳伐莒圍渠丘城惡衆潰楚師圍莒城亦惡庚申莒潰楚遂入鄆莒無備故也杜氏曰鄆莒别邑任公輔曰東鄆也按莒今密州在齊魯之宇下楚師至于潰莒入鄆中國之事可知矣抑楚之為是舉非與莒有惡蓋報晉之伐鄭也莒同盟又非逺國坐視而不救何哉鄭㑹楚則執其君而伐之莒困極于楚則視而莫恤盟主之道固如是乎秦人白狄伐晉左傳諸侯二故也按秦晉之不交兵久矣今以晉政衰諸侯二秦人白狄因而交伐土宇甲兵猶故也而氣焰威靈已為人所窺小國叛之大國侮之矣白狄介秦晉之間秦晉迭挾之以互相伐宣八年晉師白狄伐秦不言及夷之也鄭人圍許左傳示晉不急君也是則公孫申謀之曰我出師以圍許示不畏晉為將改立君者而紓晉使勿亟遣使詣晉示欲更立君晉必歸君城中城穀梁傳城中城者非外民也譏公恃城自固不能衛其人民按中城杜氏以為魯邑在東海廪丘縣西南或曰魯之內城定六年城中城穀梁云三家張也以是觀之非廪丘矣城中城蓋懲莒而備楚與趙氏曰若中城實摧壞豈得不修之穀梁以為凡城之志皆譏也唐陳氏曰凡書土功重民力附左傳十二月楚子使公子辰如晉報鍾儀之使前年晉釋鍾儀而歸之使合晉楚之成請修好結成十年春附左傳晉侯使糴徒弔反茷扶廢反晉大夫如楚報大宰子商楚公子辰之使也衛侯之弟黑背帥師侵鄭左傳衛子叔黑背侵鄭晉命也稱衛侯之弟與齊夷仲年同夷仲年之子無知黑背之子剽夏四月五卜郊不從乃不郊穀梁傳夏四月不時也五卜强也師氏曰卜至于五其瀆甚矣皇天饗道果可以僭而徼其吉邪李氏曰卜郊不從四條惟此年五卜詳見僖三十一年左正義曰五卜者當是三月三卜四月又二卜皆不吉乃止也五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭左傳鄭公子班聞叔申之謀謀改立君三月子如公子班立公子繻夏四月鄭人殺繻立髠頑鄭成公太子子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立大子州蒲以為君而㑹諸侯伐鄭生立子為君有是理乎春秋亦從而書曰晉侯有是法乎此傳妄也鄭子罕穆公子賂以襄鐘鄭襄公之廟鐘子然盟于修澤滎陽卷縣東有修武亭子駟為質子然子駟皆穆公子辛巳鄭伯歸齊人來媵九女已足而又來媵魯亦不辭交失也丙午晉侯獳卒獳乃侯反附左傳鄭伯討立君者戊申殺叔申叔禽叔禽叔申弟秋七月公如晉左傳秋公如晉親弔非禮晉人止公使送葬于是糴茷未反是春晉使糴茷至楚結成晉謂魯二于楚故留公須糴茷還驗其虛實冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也按公親奔喪因見止送葬不書葬晉景公此所謂諱其辱而不葬者也夫奔喪送葬諸侯事天子之禮也行之于晉是降等失列同于縣鄙也縱使諸侯皆在猶辱也禮之所不得者聖人之所不與也故不書冬十月公無此三字十有一年春王三月公至自晉左傳晉人以公為二于楚故止公公請受盟而後使歸晉侯使郤犨來聘己丑及郤犨盟犨尺由反公作州後同左傳郤犨來聘且蒞盟義與荀庚同夏季孫行父如晉左傳季文子如晉報聘且蒞盟也按杜氏謂郤犨文子交盟魯晉之君其意一也意既同矣可書一以包二宜舉重而略輕遣使為輕君親為重故郤犨書聘書盟文子書如晉而盟略焉此恐未然郤犨之來以聘為名實要公降列而與之盟耳行父之往乃畏晉而報其虛禮豈敢亦言蒞盟縱有亦使大夫耳豈能得晉君而盟之乎諱而不書皆魯之恥也秋叔孫僑如如齊左傳宣伯聘于齊以修前好鞍以前之好按鞍之役齊疾魯矣歸汶陽之田則怨少損矣至是魯激于晉之辱而往修好也齊亦知鞍之師由郤克以忿興而外托魯衛以為名也師敗君幾見獲齊之怨晉深矣故至是因晉魯有間亦樂于結魯也冬十月左傳宋華元善于令尹子重又善于欒武子聞楚人既許糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成十有二年春周公出奔晉左傳周公楚楚名惡惠襄之逼也惠王襄王之族且與伯輿周卿士爭政不勝怒而出及陽樊晉地王使劉子復之盟于鄄而入鄄周邑三日復出奔晉書曰周公出奔晉凡自周無出周公自出故也高氏曰周無出也天下皆周也周公天子三公乃與伯輿爭政不勝而出王既復之又違命而奔于諸侯故書出以為萬世之戒是時王室衰微號令不行于天下故逋逃之臣諸侯敢受之書此而晉罪昭矣李氏曰王室書居三居皇居狄泉不書出惟襄王居鄭書出王臣書奔三子瑕子朝不書出惟周公奔晉書出陸氏曰公羊云王者無外此其言出自其私土而出也按周是畿內之國不當以私土為義穀梁云周有入無出上下一見之也按二百四十二年適有此二事耳非故見上下也夏公㑹晉侯衛侯于瑣澤公作沙澤左傳宋華元克合晉楚之成夏五月晉士燮㑹楚公子罷許偃二子楚大夫癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之此語甚鄙俚恐後人雜撰者交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成㑹于瑣澤成故也家氏曰晉楚為成關係不細春秋略而不書豈無意乎晉自靈成君昏暗而臣惰偷以避楚為得計至是因俘纍以通意遂交聘而為成晉固苟安而楚益桀驁略無息肩之意後三年淪盟伐鄭無所恤也又其後宋向戌復持弭兵之說為盟而長楚遂使中國諸侯北面于夷楚之庭申之㑹冠屨倒置其禍端實兆于此故瑣澤之㑹書法如此不與晉為此㑹也汪氏曰僖三十一年楚鬭章求成于晉晉陽處父報之晉楚始通然則南北之交晉文公開其端也今按左氏傳全然與經不合經之所書㑹于瑣澤者晉魯衛也傳之所載則宋合晉楚之成盟于宋西門之外者是晉人宋人楚人也而如晉聽成㑹于瑣澤者又鄭伯也非衛侯也魯又初不與也不知何年之事而左氏誤附趙氏謂此若實事則無不告諸侯之理經不應不書也蓋舊說有晉令鍾儀歸求成事竟不集左氏遂誤附㑹為此傳耳蓋晉厲公初立而求諸侯故為此㑹魯因見止之辱有二心焉至是復與晉為好㑹而衛侯與焉疑晉欲撫納魯而衛侯居間以成之也以宣七年衛孫桓子來盟欲為晉致魯而知其然又按傳稱華元克合晉楚之成謂之克合則必如向戌之事晉楚之上卿實來而諸侯皆㑹始足以證其成今乃三國各遣大夫而已猶秦晉為成將㑹于令狐晉侯先至而秦伯不肯涉河次于王城使史顆秦大夫盟晉侯于河東晉郤犨盟秦伯于河西秦伯歸而背晉成是二事適在一時蓋皆無意于果成也趙氏謂事竟不集是也然則宜春秋之不書也晉㑹魯衛于瑣澤自又是一事左氏乃曰㑹于瑣澤成故也此妄也又以鄭伯如晉聽成而為㑹使㑹有鄭伯經何以不書邪成者晉楚宋鄭㑹者晉魯衛無異于風馬牛之不相及也秋晉人敗狄于交剛敗必邁反左傳狄人間宋之盟以侵晉而不設備秋晉人敗狄于交剛鄭氏曰交剛狄地今按宋之盟止三國之大夫君不行師不從何虛之乘且狄盜晉之邊自其出沒之常未必皆窺晉之有事而動也狄入晉地豈容不設備左氏蓋因敗而生文耳凡中國與夷狄不言戰皆曰敗之穀梁說不欲以相敵與彼也左氏不達此義遂謬說冬十月附左傳晉郤至如楚聘且蒞盟楚子享之子反相為地室而縣焉縣鐘鼓也郤至將登金奏作于下擊鐘而奏樂驚而走出子反曰日云莫矣寡君須矣吾子其入也賓曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢言此兩君相見之禮子反曰如天之福兩君相見無亦唯是一矢以相加遺遺去聲焉用樂言晉楚必不肯相期唯戰乃相見寡君須矣吾子其入也賓曰若讓之以一矢禍之大者其何福之為世之治也諸侯間音間于天子之事則相朝也王事缺暇則修私好于是乎有享宴之禮享以訓共儉享有體薦設几而不倚爵盈而不飲肴乾而不食所以訓恭儉共與恭同宴以示慈惠宴則折俎相與共食共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕不夕言無事此公侯之所以扞城其民也扞蔽也言諸侯交好兵革不興人得安息所以蔽扞其民如城然干盾所以扞蔽故借言扞故詩曰國風周南赳赳武貌武夫公侯干城干盾也干與城皆所以為蔽扞言武夫禦侮扞患足為公侯之干城也及其亂也諸侯貪冒莫報反又亡北反侵欲不忌爭尋常以盡其民八尺曰尋倍尋曰常喻所爭之微少便相攻伐貪冒無厭也略其武夫以為已腹心股肱爪牙略取也言世亂則公侯取武夫為一已搏噬之用侵害鄰國與干城相反故詩曰赳赳武夫公侯腹心此借用也詩義本為同心同德之臣此借以為亂世諸侯用武夫為私腹心也天下有道則公侯能為民干城而制其腹心言為人扞患不私一已亂世則反之不能扞患而反為民患厭縱其心腹之欲今吾子之言亂之道也言以一矢相加遺是志于兵爭而無意于扞患安人也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫冬楚公子罷如晉聘且蒞盟十二月晉侯及楚公子罷盟于赤棘晉地十有三年春晉侯使郤錡來乞師錡魚綺反左傳晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也禮以檢于外耳目手足由于規矩故謂身之幹敬以主于心邪妄不萌志氣不亂故謂身之基郤子無基且先君之嗣卿也將社稷是衛而惰棄君命也不亡何為杜氏曰將伐秦也侯伯當召兵而乞師謙辭按晉主夏盟徵㑹討二用諸侯之師者多矣未嘗書乞而此來乞師蓋為卑辭以感魯也然因是可見諸侯土地甲兵受之天子無王而擅興有時而不直于辭矣三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦左傳三月公如京師宣伯欲賜欲王賜請先使王以行人之禮禮焉不加厚見周語載僑如至京師王孫說其人而賤之言于王孟獻子從王以為介而重賄之介輔相威儀者獻子之相公以禮故王重賄公及諸侯朝王遂從劉康公王季子成肅公㑹晉侯伐秦劉成二公不書兵不加秦成子受脤于社不敬服䖍曰脤祭社之肉盛于蜃器故謂之脤劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也隂陽合德是曰天地之中民受此以生乃所謂命也故凡動作禮義威儀皆有自然之凖則過之非中也不及非中也所以然者以其有定命也命出于天一定而不可易雖欲違之可得乎動作之則如出入起居禮義之則如辭受取豫威儀之則如拜跪興俯升降周旋能者養之以福雖有定命能不能在養不養養之者順而致福敗之者逆而取禍曲禮曰毋不敬儼若思安定辭此養之之道也成王曰思夫人自亂于威儀不能者敗敗其則以取禍是故君子勤禮小人盡力君子以道帥人所勤者禮以自養也小人嚴事于下所盡者力以自養也勤禮莫如致敬盡力莫如敦篤敬在養神敬之所施莫先事神篤在守業國之大事在祀與戎祀有執膰音煩祭肉戎有受脤神之大節也今成子惰棄其命矣其不反乎按能者養之以福當作養以之福故孔氏云養其威儀禮法以往適于福夏四月戊午晉侯使吕相絶秦其亂兩誣今不取秦桓公既與晉厲公為令狐之盟事在十一年秦伯不肯涉河一盟于河東一盟于河西范文子曰是盟也何益秦伯歸而背晉成詳瑣澤下而又召狄與楚欲道以伐晉諸侯是以睦于晉晉詞多誣秦故傳據此二事以正秦罪晉欒書將中軍荀庚佐之庚代荀首士燮將上軍代荀庚郤錡佐之代士燮韓厥將下軍代郤錡荀罃佐之代趙同趙旃將新軍代韓厥郤至佐之代趙括郤毅御戎郤至弟欒針其廉反為右欒書子孟獻子曰晉帥軍帥乘車士和師必有大功五月丁亥晉師以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差初佳反及不更秦爵女父曹宣公卒于師師遂濟涇涇水出安定東南徑扶風京兆高陵縣入渭及侯麗而還迓晉侯于新楚既戰晉侯止于新楚故師還過迎之麻隧侯麗新楚皆秦地成肅公卒于瑕晉地公羊傳其言自京師何公鑿造意也行也公鑿行奈何不敢過天子也不敢過天子而不朝故復生事造意修朝禮而後行程子曰不書朝王因㑹伐而行也故不成其朝以伐秦為遂事明朝為重胡傳諸侯每歲侵伐四出未有能修朝覲之禮者今公欲㑹伐秦道自王都不可越天子而往也故皆朝王而不能成朝禮書曰如京師見諸侯之慢也因㑹伐而行又書公自京師以伐秦為遂事者明朝王為重存人臣之禮也按晉文公為踐土河陽之㑹不敢入王都而㑹於其近地諸侯因而朝于王所意不失為尊王故猶書其朝此直九國連兵大㑹于京師朝王而行有若假道故不與其朝緣其本意非為朝王春秋安得而書朝哉秦師或不大敗故不書杜預反謂經文闕漏者妄也或曰略之師者聖人所重豈容以秦晉之爭不足詳而略三軍之命乎曹伯廬卒于師廬左作盧左傳曹人使公子負芻守使公子欣時逆曹伯之喪二子皆宣公庶子秋負芻殺大子而自立諸侯請討之晉人以役之勞請俟他年穀梁傳閔之也公大夫在師曰師在㑹曰㑹劉氏曰諸侯死于行則紀其所例自如此耳非閔之而書也秋七月公至自伐秦孫氏曰不以京師至者明本非京師冬葬曹宣公左傳冬葬曹宣公既葬子臧將亡子臧公子欣時國人皆將從之不義負芻故成公負芻懼告罪且請焉請留子臧乃反而致其邑還邑于成公十有四年春王正月莒子朱卒渠丘公即季他也在位三十二年子密州嗣是為黎比公莒大于邾至此始書卒徐邈曰莒行夷禮君終無諡故不書葬夏衛孫林父自晉歸于衛左傳春衛侯如晉晉侯强見孫林父焉欲歸之定公不可夏衛侯既歸晉侯使郤犨送孫林父而見之衛侯欲辭定姜定公夫人曰不可是先君宗卿同姓之卿之嗣也孫氏出于衛武公大國又以為請不許將亡雖惡之不猶愈于亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之衛侯饗苦成叔郤犨寧惠子寧殖相苦成叔傲寧子曰苦成家其亡乎古之為饗食也以觀威儀省禍福也故詩曰小雅兕觥以兕角為觥所以罰不敬其觩陳設之貌㫖酒思柔言君子好禮飲酒皆思柔德雖設兕觥觩然不用彼交匪傲彼之交于神而不惰傲萬福來求乃萬福之所求今夫子傲取禍之道也高氏曰晉受衛國罪戾之臣又强歸之故書自晉歸按林父此年歸國襄十四年逐衛獻公立公孫剽其冬晉㑹于戚而不能討二十五年獻公入于夷儀二十六年林父入于戚以叛晉㑹澶淵反為林父討衛疆戚田取衛西鄙懿氏六十以與孫氏此晉黨孫氏之本末也歸易詞也自晉奉之故也秋叔孫僑如如齊逆女左傳秋宣伯如齊逆女稱族尊君命也宣元年已發尊君命尊夫人之例今復發者彼以喪娶嫌非正禮且公子非族故重明之劉氏曰左氏云稱族尊君命舍族尊夫人非也一事而再見卒名耳高氏曰公即位十有四年國家無事迄今始娶又不親迎而使同姓之卿逆之援公子遂之例也故書以為戒鄭公子喜帥師伐許左傳八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封四年鄭公孫申疆許田許人敗之不得定其封今許以是所封田求和按鄭逼許楚困鄭以國大小兵力彊弱更相吞噬人理盡矣楚爭盟于中國欲諸侯之事已而已非能制其相侵也晉亦視而不問明年許遷于葉無依而依楚襄三年晉荀罃伐許猶討其與楚也悲夫九月僑如以夫人婦姜氏至自齊左傳舍族尊夫人也舍族謂不稱叔孫穀梁傳大夫不以夫人以夫人非正也刺不親迎也稱婦穆姜尚存趙氏曰書氏傳寫誤增冬十月庚寅衛侯臧卒左傳衛侯有疾使孔成子寧惠子孔成子達之孫立敬姒定公妾之子衎獻公以為太子冬十月衛定公卒夫人姜氏既哭而息見太子之不哀也不內酌飲歎曰是夫也將不唯衛國之敗其必始于未亡人嗚呼天禍衛國也夫吾不獲鱄衎之母弟也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器于衛盡置諸戚孫氏邑而甚善晉大夫秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒公羊傳仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使于晉而未反何以後之叔仲惠伯傅子赤者也文公死子幼公子遂謂叔仲惠伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何幼君之有公子遂知其不可與謀退而殺叔仲惠伯弒子赤而立宣公宣公死成公幼臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲惠伯之事孰為之諸大夫皆雜然曰仲氏也其然乎于是遣歸父之家然後哭君歸父使乎晉還自晉至柳聞君薨家遣墠帷哭君成踊反命于介自是走之齊魯人徐傷歸父之無後也于是使嬰齊後之也穀梁傳此公孫也其曰仲何也子由父疏之也李氏曰以仲遂生而賜氏俾世其卿之說考之則仲固為族無可疑矣故劉炫曰仲遂受賜為仲氏故子孫稱仲氏是也穀梁說尤失之啖氏曰時有叔肹子公孫嬰齊此故稱仲以别之二傳不知此而妄說癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師歸于公作歸之于左傳春㑹于戚討曹成公也執而歸諸京師書曰晉侯執曹伯不及其民也惡不及民凡君不道于其民諸侯討而執之則曰某人執某侯稱人示衆所欲執不然則否謂身犯不義者諸侯將見子臧于王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋胡傳春秋執諸侯者衆矣未有執得其罪如此者張氏曰春秋爵厲公而執曹伯與其討也然猶不掩曹伯之與盟者以為先執曹伯以令諸侯然後盟之乃盡善也觀曹人請君于晉曰若有罪則君列諸㑹矣由一舉措之不當遂開釋姦之門豈小失哉公至自㑹夏六月宋公固卒楚子伐鄭左傳楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石楚邑欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰秋八月庚辰葬宋共公共音恭宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左傳秋八月葬宋共公于是華元為右師魚石為左師蕩澤為司馬華喜督𤣥孫為司徒公孫師莊公孫為司城向為人為大司冦鱗朱為少司冦鱗矔孫向帶為大宰魚府為少宰蕩澤弱公室輕公室以為弱殺公子肥文公子華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也華元華喜司城莊族也六官者皆桓族也魚石蕩澤向為人鱗朱向帶魚府皆出桓公魚石將止華元魚府曰右師反必討是無桓氏也恐并及六族魚石曰右師苟獲反雖許之討必不敢言畏桓族强且多大功國人與之不反懼桓氏之無祀于宋也右師討猶有戍在向戍桓公曽孫言其賢華元必不討桓氏雖亡必偏偏不盡也魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺大夫山言背其族也蕩氏宋公族還害公室故去族以示其罪魚石向為人鱗朱向帶魚府出舍于睢上水名華元使止之不可冬十月華元自止之不可乃反五子不止華元還魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之五子亦騁而從華元則決睢澨水涯閉門登陴矣左師二司冦二宰遂出奔楚四大夫不書獨魚石告華元使向戍為左師老佐戴公五世孫為司馬樂裔為司冦以靖國人趙氏曰按經文云奔晉又云自晉歸于宋傳云魚石自止華元于河上請討許之乃反且魚石自請討蕩澤則是處無過之地既討之後何事魚石又奔假如魚石為與蕩氏同族慙而自去則是知恥之人後不應却入彭城為亂考之事理無非乖繆魚石直與蕩澤同惡耳又左氏云華元自止之不可乃反按國亂用兵相攻是仇敵也如何自止之乎何氏曰不復省文再出宋華元者宋公卒子幼華元以憂國為大夫山所譖出奔晉晉人理其罪宋人反華元誅山言歸者明出入無惡大夫山不氏者貶之明以譖華元故魚石與山有親恐見及故奔楚李氏曰何氏此說近事情如左氏說則魚石亦自知其罪又知華元之有大功寧自奔而反華元華元又立向戍以存桓氏矣何至後來魚石親為亂首直入彭城以披宋乎誅有罪而稱國以殺者陳氏云不氏所以别其非無罪也以不氏見其罪則稱國者有司法守之詞也附左傳晉三郤害伯宗譖而殺之及欒弗忌晉賢大夫伯州犂奔楚伯宗子韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待既殺伯宗又及弗忌故曰驟也初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及于難冬十有一月叔孫僑如㑹晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離咎其九反鰌音秋此㑹吳之始亦晉大夫與諸侯之大夫為㑹之始左傳十一月㑹吳鍾離始通吳也公羊傳曷為殊㑹吳外吳也春秋內其國而外諸夏內諸夏而外夷狄王者欲一乎天下曷為以外內之辭言之言自近者始也杜氏曰鍾離楚邑淮南縣胡傳吳以號舉夷之也㑹而殊㑹外之也殊㑹有二義㑹王世子于首止尊王室也㑹吳于鍾離于柤于向賤夷狄也陳氏曰於是大夫自為㑹矣孫氏曰諸侯大夫不敢致吳子也吳子在鍾離故相與㑹吳子于鍾離爾趙氏曰公穀皆曰再言㑹外吳按實再㑹依實書之何外吳之有徒為煩迂耳按先儒因再書㑹而生外吳之說其實諸國之大夫先相約集而後㑹吳于鍾離春秋據事直書耳若曰外吳獨不外楚乎㑹楚何以不殊也趙氏謂再㑹亦非只一㑹也許遷于葉舒涉反左傳許靈公畏逼于鄭請遷于楚辛丑楚公子申遷許于葉穀梁傳遷者猶得其國家以往者也其地許復見也按許此年遷葉昭九年遷夷十八年遷白羽定四年遷容城皆避鄭也又二年卒滅于鄭杜氏曰許畏鄭南依楚故以自遷為文葉今南陽葉縣十有六年春王正月雨木氷公羊傳雨木氷者何雨而木氷也何以書記異也穀梁傳雨而木氷也志異也傳曰根枝折杜氏曰記寒過節氷封著樹何氏曰木者少陽幼君大臣之象氷者凝隂兵之類也氷脅木者君臣將執于兵之徵也朱子曰上溫故雨而不雪下冷故著木而氷附左傳楚子自武城使公子成以汝隂之田汝水之南近鄭地求成于鄭鄭叛晉子駟從楚子盟于武城夏四月辛未滕子卒鄭公子喜帥師侵宋左傳鄭子罕伐宋宋將鉏樂懼敗諸汋音酌陂敗鄭師也樂懼戴公六世孫將鉏樂氏族退舍于夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也汋陂夫渠汋陵皆宋地附左傳衛侯伐鄭至于鳴鴈為晉故也鳴鴈在陳留雍丘縣西北六月丙寅朔日有食之晉侯使欒黶來乞師黶於斬反一於玷反左傳晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之代荀庚郤錡將上軍代士燮荀偃佐之代郤錡偃荀庚子韓厥將下軍郤至佐新軍荀罃居守荀罃下軍佐于是郤犨代趙旃將新軍新上下軍罷矣郤犨如衛遂如齊皆乞師焉欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績鄢音偃左傳戊寅晉師起鄭人聞有晉師使告于楚楚子救鄭司馬將中軍子反令尹將左子重右尹子辛將右公子壬夫五月晉師濟河聞楚師將至范文子欲反曰我僞逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅衆散敗也箕之役先軫不反命死于狄也邲之師荀伯林父不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆彊不盡力子孫將弱今三彊服矣敵楚而已唯聖人能外內無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡子重子反王卒以舊罷老不代鄭陳而不整蠻軍而不陳陳不違晦晦月終隂之盡故兵家以為忌左陳而囂喧譁也合而加囂各顧其後莫有鬭心舊不必良以犯天忌我必克之楚子登巢車以望晉軍巢車車上為櫓子重使大宰伯州犂晉伯宗子前年奔楚侍于王後王曰騁而左右何也曰召軍吏也皆聚于中軍矣曰合謀也張幕矣曰䖍卜于先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也左將帥右車右戰乎曰未可知也乘而左右皆下矣曰戰禱也伯州犂以公卒告王苗賁皇楚鬬椒子宣四年奔晉在晉侯之側亦以王卒告苗賁皇言于晉侯曰楚之良在于中軍王族而已請分良以擊其左右而三軍萃于王卒必大敗之吕錡魏錡夢射月中之退入于泥占之曰姬姓日也異姓月也必楚王也射而中之退入于泥亦必死矣及戰射共王中目王召養由基楚之善射者與之兩矢使射吕錡中項伏韜他刀反弓衣以一矢復命旦而戰見星未已子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苗賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀穀陽豎子反內豎獻飲于子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀范文子立于戎馬之前曰君幼諸臣不佞何以及此君其戒之公羊傳敗者稱師楚何以不稱師王痍也王痍者何傷乎矢也穀梁傳日事遇晦曰晦楚不言師君重于師也杜氏曰楚師未大崩楚子傷目而退故曰楚子敗績鄢陵鄭地今屬潁州郡何氏曰凡舉師敗績為重衆今親傷人君當舉傷君為重今按楚子敗績不言師君重于師也泓之戰宋公傷股不書宋公敗者泓之師亦大崩而鄢陵楚師未大崩也凡君將不言帥師以君重于師也戰陳以師相敵死亡既多舉師為重矣若君將被殺獲則既書師敗又書殺獲韓之戰獲晉侯大棘之戰獲華元雞父之敗胡沈之君滅是也按中國勝楚者城濮鄢陵二戰而已城濮之勝文公之治國訓武經營有年一戰而霸猶且不喜而憂知一勝之未可恃也厲公鄢陵之捷豈其成謀不愆于素哉亦幸而已一勝之後無以居之反不為晉國之福也范文子蓋知之矣楚殺其大夫公子側左傳楚師還及瑕楚地王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽王引過亦所以責子反也臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義言以義命已不敢不受側亡君師敢忘其死王使止之弗及而卒秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公左傳戰之日齊國佐高無咎高固子至于師衛侯出于衛公出于壞隤魯邑隤徒回反宣伯通于穆姜成公母欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過二子公庶弟指之曰女不可是皆君也公待于壞隤申宫警備設守而後行是以後使孟獻子守于公宫秋㑹于沙隨謀伐鄭也宣伯使告郤犨曰魯衛待于壞隤以待勝者郤犨將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公于晉侯晉侯不見公杜氏曰沙隨宋地梁國寧陵縣北有沙隨亭唐陳氏曰公不及鄢陵之戰宣伯誣于晉晉侯不察是罪不在公故直書不諱公至自㑹附左傳曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子謂子臧奔宋是大泯曹也先君無乃有罪乎若有罪則君列諸㑹矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之公㑹尹子晉侯齊國佐邾人伐鄭王臣始㑹伐左傳公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚鄭東地不敢過鄭子叔聲伯使叔孫豹僑如弟請逆于晉師僑如於是遂作亂豹因奔齊為食于鄭郊師逆以至聲伯戒叔孫以必須所逆晉師至乃食聲伯四日不食以待之食使者而後食使者豹之介諸侯遷于制田滎陽宛陵縣東有制澤知武子荀罃佐下軍以諸侯之師侵陳至于鳴鹿陳國武平縣西南有鹿邑遂侵蔡侵陳蔡不書公不與未反諸侯遷于潁上戊午鄭子罕宵軍之宋齊衛皆失軍將主與軍相失杜氏曰尹子王卿士子爵宋衛不書後也高氏曰晉為曹伯請于天子因假王命以再伐鄭家氏曰春秋于尹氏之卒與立子朝以朝奔走皆書氏以著世卿之譏于盟㑹侵伐稱尹子則指其人而正其爵陳氏曰春秋不以諸侯用王師陽處父之救江王叔桓公不書前年伐秦之役劉子成子猶不書也於是初以尹子與齊國佐邾人序曹伯歸自京師左傳曹人復請于晉晉侯謂子臧反吾歸而君子臧反自宋反曹伯歸子臧盡致其邑與卿而不出胡傳曹伯不名其位未嘗絶也啖氏曰諸侯在他國則是失地之君故反國則名之今曹伯在京師而王不黜之是不失國故不名也九月晉人執季孫行父舍之于苕丘舍如字苕音條公作招章遙上饒二反左傳宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令于是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志于魯請止行父而殺之我斃蔑也獻子時守公宫而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆魯西邑使子叔聲伯請季孫于晉郤犨曰苟去仲孫蔑而止季孫行父吾與子國親于公室對曰僑如之情子必聞之矣僑如欲去季孟而取其室若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讎謂齊楚亡而為讎治之何及郤犨曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫于魯相二君矣宣成妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫杜氏曰苕丘晉地舍之于苕丘明不以歸不稱行人非使人程子曰置之于苕丘也冬十月乙亥叔孫僑如出奔齊左傳冬十月出叔孫僑如而盟之諸大夫共盟以僑如為戒僑如奔齊十有二月乙丑季孫行父及晉郤犨盟于扈左傳十二月季孫及郤犨盟于扈歸刺公子偃召叔孫豹于齊而立之公至自㑹鄭康成曰伐而致㑹于伐事不成啖氏曰有不致本事者蓋本事非功也附左傳齊聲孟子靈公母通僑如使立于高國之間位比二卿僑如曰不可以再罪奔衛亦間于卿乙酉刺公子偃穀梁云先刺後名殺無罪也啖氏曰偃直書刺者有罪當殺也按穆姜怒成公指偃與鉏而謂之曰女不可是皆君也事止如是則偃無罪據經則上書僑如奔齊下書刺公子偃則偃蓋為僑如所纍不止于穆姜之一言矣然使偃有罪必不能大于僑如介弟之親縱有大故而情有可原者猶有議親之辟況罪狀未明者乎今也出僑如而刺偃難言乎誅當其罪矣十有七年春衛北宫括帥師侵鄭括公作結左傳春王正月鄭子駟侵晉虛滑晉二邑滑故滑國為秦所滅時屬晉後屬周無按鄭侵晉恐此事衛北宫括救晉侵鄭至于高氏在陽翟縣西南夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭左傳夏五月鄭太子髠頑侯獳鄭大夫為質于楚楚公子成公子寅戌鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至于曲洧今新汲縣治曲洧城臨洧水杜氏曰晉為兵主而先尹單尊王命也六月乙酉同盟于柯陵左傳尋戚之盟也穀梁傳柯陵之盟謀復伐鄭也陸氏曰不重言諸侯譏尹單與盟趙氏曰齊晉之盛天子之大夫㑹而不盟尊周也柯陵之㑹尹單始與諸侯之盟自是習以為常非禮也薛氏曰前此征伐未嘗出王官也未嘗盟卿士也去年王官出今年卿士盟三伐鄭而鄭不服無益于事徒以為亂而巳秋公至自㑹左傳楚子重救鄭師于首止諸侯還不以伐致而以㑹致穀梁所謂二事偶則以後事致是也于此乃又曰不至自伐鄭者公不周信也乎伐鄭也自違前例齊高無咎出奔莒左傳齊慶克慶封父通于聲孟子與婦人蒙衣乘輦而入于閎蒙衣亦為婦人服與婦人相冒閎巷門鮑牽見之叔牙曽孫以告國武子武子召慶克而謂之慶克久不出慚臥于家而告夫人曰國子謫我國子相靈公以㑹高鮑處守高無咎鮑牽及還將至閉門而索客搜索備姦人孟子訴之曰高鮑將不納君而立公子角頃公子國人知之秋七月壬寅刖鮑牽而逐高無咎無咎奔莒高弱無咎子以盧高氏邑叛齊人來召鮑國牽之弟文子而立之初鮑國去鮑氏而來為施孝叔臣鮑國相施氏忠故齊人取以為鮑氏後九月辛丑用郊公羊傳用者何用者不宜用也九月非所用郊也周之九月夏之七月天氣上升地氣下降又非郊時然則郊曷用郊用正月上辛三王之郊一用夏正穀梁傳夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用也宫室不設不可以祭衣服不修不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味也吳氏曰九月乃夏時建申之月不卜日不卜牲而强用其禮故曰用非時之甚不敬之大也或曰懼卜而不從始不卜而直用之故書曰用郊晉侯使荀罃來乞師冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭左傳冬諸侯伐鄭十月庚午圍鄭十有一月公至自伐鄭左傳楚公子申救鄭師于汝上十一月諸侯還杜氏曰不書圍畏楚救不成圍而還按夏伐鄭楚師至而諸侯還冬伐鄭楚師至而諸侯還晉自鄢陵之役兵威非不振而若此者君臣驕泰已甚無真憂諸夏之意直以兵為戲耳動以示威退以保勝壬申公孫嬰齊卒于貍脤貍力之反疹市軫反公作軫穀作蜃公羊傳非此月日也曷為以此月日卒之據下丁巳朔知壬申在十月待君命然後卒大夫前此者嬰齊走之晉公㑹晉侯將執公嬰齊為公請公許之反為大夫歸至于貍軫而卒公至曰吾固許之反為大夫然後卒之穀梁傳十一月無壬申壬申乃十月也致公而後録臣子之義也言嬰齊實以十月壬申日卒而公以十一月還先致公而後録其卒故壬申在十一月下其地未踰竟也杜氏曰十一月無壬申日誤也貍脤闕陸氏曰春秋編年月之書一例以先後書之言卿卒後言公至皆據實事何傷教意二傳不達文有謬誤之理遂妄說耳附左傳齊侯使崔杼為大夫使慶克佐之帥師圍盧討高弱國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛齊侯與之盟于徐關而復之十二月盧降使國勝國佐子告難于晉以高氏難告待命于清清陽平樂縣是齊欲討國佐故留其子于外十有二月丁巳朔日有食之邾子貜且卒貜俱縛反且子餘反定公也在位四十年子牼嗣是為宣公晉殺其大夫郤錡郤犨郤至左傳晉厲公侈多外嬖外嬖愛幸大夫反自鄢陵欲盡去羣大夫而立其左右胥童克之子以胥克之廢也怨郤氏宣八年郤缺廢胥克而嬖于厲公郤錡奪夷陽五田五亦嬖于厲公郤犨與長魚矯爭田執而牿之與其父母妻子同一轅繫之車轅既矯亦嬖于厲公欒書怨郤至以其不從已而敗楚師也欲廢之鄢陵戰欒書欲固壘郤至言楚有六間以取勝也使楚公子茷告公曰此戰也郤至實召寡君鄢陵戰晉囚公子茷以歸以東師之未至也齊魯衛之師與軍帥之不具也曰此必敗荀罃佐下軍居守郤犨將新軍乞師故言不具吾因奉孫周以事君孫周晉襄公曽孫悼公君楚王也公告欒書書曰其有焉不然豈其死之不恤而受敵使乎鄢陵戰時楚子問郤至以弓君盍嘗試也使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕進之于公寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命爭死命罪孰大焉壬午胥童夷陽五帥甲八百八百人將攻郤氏長魚矯請無用衆公使清沸魋徒回反助之亦嬖人抽戈結衽衽裳際而僞訟者僞與清沸魋訟三郤將謀于榭榭講武堂矯以戈殺駒伯郤錡苦成叔郤犨于其位溫季郤至曰逃威也矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃于朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄公使辭于二子曰寡人有討于郤氏郤氏既伏其辜矣大夫無辱胥童劫而執之故云辱其復職位皆再拜稽首曰君討有罪而免臣于死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊于匠麗氏嬖大夫家欒書中行偃遂執公焉召士丐士丐辭召韓厥韓厥辭曰昔吾畜于趙氏少為趙盾所養孟姬之讒在八年吾能違兵晉將討趙氏而厥去其兵示不與黨言此者明已無所偏助古人有言曰殺老牛莫之敢尸而況君乎二三子不能事君焉用厥也張氏曰郤氏雖多怨既為大夫則君之股肱也厲公不正其有罪無罪而用嬖幸胥童長魚矯之計一朝殺三卿又劫欒書中行偃能無及乎此春秋所以列書而深罪之也楚人滅舒庸左傳舒庸人以楚師之敗也道吳人圍巢伐駕圍釐虺巢駕釐虺楚四邑遂恃吳而不設備楚公子橐師襲舒庸滅之任公輔曰舒庸東夷偃姓之國地譜廬州城下舒成薛氏曰舒庸舒之别種也詩曰荆舒是懲則荆舒之國皆非一種也春秋之始荆舒皆以名見舒庸舒蓼舒鳩之滅荆舒一于楚矣十有八年春王正月晉殺其大夫胥童左傳欒書中行偃殺胥童杜氏曰以其劫已故民不與郤氏胥童道君為亂故皆書曰晉殺其大夫杜氏曰厲公以私欲殺三郤而三郤死不以無罪書書偃以家怨害胥童而胥童受國討文明郤氏失民胥童道亂宜其為國戮庚申晉弒其君州蒲左傳春王正月晉欒書中行偃使程滑弒厲公程滑晉大夫穿此與趙何異葬之于翼東門之外以車一乘使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽庚午盟而入館于伯子同氏辛巳朝于武宫武公曲沃始命君逐不臣者七人周子有兄而無慧不能辨菽麥故不可立問胡氏傳欒書弒晉厲公事其意若許欒書之弒何也朱子曰舊亦嘗疑之後見文定之甥范伯達而問焉伯達曰文定之意蓋以為欒書執國之政而厲公無道如此亦不得坐視為書之計厲公可廢而不可弒也張洽言傳中全不見此意曰然文定既以為當如此作傳雖不可明言豈不可微示其意乎今異數百言而其意絶不可曉是亦拙于傳經者也張洽曰聞之師曰稱國以弒者衆弒其君之辭也孟子論貴戚之卿曰君有大過則諫反覆之而不聽則易位厲公之過大矣昵用小人殺戮無辜舉朝諸卿不保首領書偃晉之世臣以社稷為心可以行易位之權而程滑遽弒之故稱國以弒而不言二臣分其惡于衆也悼公逐不臣者七人而不誅書偃正以非里克寧喜之比故也啖氏曰凡他國公子篡大夫弒必書名若州吁宋督之類志罪也稱國以弒自大臣也州蒲之類凡四君有道則大臣稱名卑者稱盜君無道則大臣稱國卑者稱人今按弒君未有不書其賊之主名者其不書者非史闕文則當闕疑未易率然立說也書人者三宋人弒其君杵臼齊人弒其君商人莒人弒其君密州也書盜者一盜殺蔡侯申是也書閽者一閽弒吳子餘蔡是也稱國者四莒弒其君庶其晉弒其君州蒲吳弒其君僚薛弒其君比也閽不稱名姓閽不得齊于人不稱其君閽不得君其君也殺蔡侯申者公孫翩也非微者而書盜此則費于說矣宋昭公無道國人殺之正其弒名而書宋人見失衆也弒齊商人者邴歜閻職也微而書人且商人無道不足録其主名也莒子密州虐國人弒之與宋昭公同莒弒其君庶其事亦與此同但省人字耳吳僚據左氏則公子光使專諸弒之也而稱國此則又費乎說矣薛弒其君比胡氏曰稱國以弒者當國大臣之罪也孫復以為舉國之衆皆可誅非矣三晉有國半天下若皆可誅刀鋸不亦濫乎潁川常秩曰孫復之於春秋動輒有罪蓋商鞅之法耳按此論薛比之弒者亦即所以論晉州蒲之弒者也啖子之說固已如此矣理之長者也可無議矣若張洽氏之說恐未得聖經之意也自謂聞之師恐亦未必朱子之意也朱子固又嘗謂晉之文下漏欒書二字矣拘于守文而敢于立說者不若闕文闕疑之為尊經也陳氏曰弒不言故比事而見晉殺其大夫郤錡郤犨郤至晉殺其大夫胥童晉弒其君州蒲蔡殺其大夫公子駟蔡放其大夫公孫獵盜殺蔡侯申春秋書弒未有詳于此者也或曰厲公無道貴戚之卿不可坐視然可廢而不可弒也信斯言也使書偃廢之則無罪矣乎曰不然孟子曰有伊尹之志則可書偃何人哉殺趙同趙括謂其將為亂也欒郤為徵殺三郤謂其召楚師而欲奉孫周以事楚也欒書徵其有焉或曰欒書中行偃執厲公殺胥童使程滑弒厲公使其果有之也悼公逐不臣者七人而不誅書偃何也曰事難質言矣然悼公清原告大夫之言曰人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也斯固已指諸臣之無君矣使書偃心迹素順而悼公有是言乎且盟而後入無疑又焉用盟乎逐不臣者如夷陽五之屬致厲公之亂者耳若厲公之賊則未易討也故不得不且置之然其事難質言矣齊殺其大夫國佐左傳齊為慶氏之難故前年國佐殺慶克甲申晦齊侯使士華免齊大夫以戈殺國佐于內宫之朝內宫夫人宫師逃于夫人之宫伏兵內宫恐不勝書曰齊殺其大夫國佐棄命專殺以穀叛故也使清人殺國勝國弱來奔弱勝弟王湫國佐黨奔萊慶封為大夫慶佐為司冦皆慶克子既齊侯反國弱使嗣國氏禮也按是時魯有僑如齊有慶克然魯君猶能知僑如之情不聽穆姜去季孟之命齊靈直為婁豬艾豭之所不快刖鮑牽逐高無咎既盟國佐而復之而又殺之故棄命專殺以穀叛國佐雖不為無罪而稱國以殺罪纍上也國勝何罪又殺諸清慶克死未正其討又秩其子刑賞如是宜乎慶封稔禍政歸陳氏其效豈不明哉附左傳二月乙酉朔晉悼公即位于朝朝廟五日而即位也厲公弒絶故悼公不以嗣子居喪始命百官施舍己責施恩惠舍勞役止逋貴逮鰥寡恩及微振廢滯起舊德匡乏困救災患匡亦救也禁淫慝薄賦斂宥罪戾節器用時用民使民以時欲無犯時不縱私欲使魏相錡子士魴㑹子魏頡顆子趙武為卿荀家荀㑹欒黶韓無忌厥子為公族大夫使士渥濁士貞子為太傅右行辛為司空辛將右行因以為氏辨糾御戎辨糾欒糾也荀賓為右卿無共御立軍尉以攝之省卿戎御令軍尉攝御而已祁奚為中軍尉羊舌職佐之魏絳犨子為司馬張老為候奄鐸遏冦為上軍尉籍偃談父為之司馬程鄭荀氏别族為乘馬御乘車之僕凡六官之長皆民譽也公如晉左傳朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城左傳夏六月鄭伯㑹楚子伐宋同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還書曰復入凡去其國國逆而立之曰入謂本無位紹繼而立復其位曰復歸亦國逆諸侯納之曰歸以惡曰復入胡傳此伐宋以納魚石其不曰納宋魚石于彭城何也劉敞曰不與納也諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也諸侯托于諸侯禮也大夫托于諸侯非禮也其言復入者已絶而復入惡之甚者宋魚石晉欒盈是矣汪氏曰諸侯失國而諸侯納之春秋皆不書惟書納頓子納北燕伯譏納者之非正也況納大夫乎楚莊納寧行父于陳使之復為大夫春秋猶非之況納叛臣而據地以逼其君乎書伐書復入而不言納見魚石之復入由楚鄭之伐也蘇氏曰魚石之書復入而先言楚鄭之伐以著其納亂臣也故不言自楚而言復入不言叛者將以亂國非直叛君而已故魚石欒盈之罪重于趙鞅宋辰也陳氏曰奔大夫復不書莊閔以上有書歸若入者矣則皆不書奔者也奔而言歸自衛元咺始咺訟其君者也雖然歸猶言自也若宋魚石晉欒盈是賊而已矣故魚石不言自楚欒盈不言自齊劉氏曰左氏歸入之例事與例合者少與例違者多左傳宋人患之西鉏吾宋大夫曰若楚人與吾同惡以德于我惡謂魚石吾固事之今將崇諸侯之姦而披其地崇長也披分也以塞夷庚夷庚吳晉往來之要道逞姦封魚石為快姦而攜服諸侯見楚助賊服者皆攜矣毒諸侯而懼吳晉隔吳晉之道故懼吾庸多矣非吾憂也且事晉何為言平日事晉何為正欲其患難相恤晉必恤之按楚之為是舉非直納宋之叛臣其意尤在隔吳晉之道也晉之通吳蓋懼吳楚之合為患于中國也蓋是時楚方張而吳亦始大楚莊之世嘗盟吳越非直欲服屬之亦以已爭衡于中國而虞其為患于後也而吳人之氣不為楚下故晉用申公巫臣之計因而離之教之乘車教之叛楚楚欲合吳巫臣素知其情故因而行策于晉吳楚爭强中國之利也吳既通晉明年遂興鄢陵之師大敗楚鄭吳興楚之肘也楚氣奪矣晉得吳不附楚晉得氣矣夫晉齊諸國不但中夏禮義聲名文物之所在亦自古形勢之區武勇强力之地也而顧患吳楚者諸夏處極盛之後文繁物夥漸生驕惰豢養之積雖强勇變為脆弱而蠻夷戎狄崛起僻陋鼓其全鋭以乘中國之衰所以能為吾敵也荆楚地大人悍與中國襟帶相接故窺便乘利為患最劇若吳則阻隔江海非中國引之吳豈能長驅于中原哉中國利其一時牽楚之助而忘其他日不制之害是為失耳然用吳牽制楚後實為得算惜不善用之而晉悼之後中國道消遂至以所以長楚者而長吳此非吳之能霸中國而中國諸侯實自為之也吳敝楚越敝吳此天使裔夷自相弱以保中國禮義之區而不使盡為荐食也令晉齊有人焉收諸侯如反掌矣陵夷不收遂為戰國於是晉分為三此天下之大機也秦人曰韓魏中國之處而天下之樞也於是急攻韓魏既得其樞則以漸舉此秦人之計也中國形勢分裂敵則相持莫敢先動少懦則自救不暇天下大勢於是歸秦矣楚併吳越地益大而戰國之楚反不如春秋之楚者沈酣豢養散越其精鋭猶夫昔日之諸夏也而秦起西戎據有周興之地形勢之强力完氣厚未嘗漸染于諸夏繁曲淫靡之習又常為諸國所擯排而不與通以發其憤忘其驕而鬱養其鋭是時惟齊亦强國號東西帝然齊豈秦敵哉此天下大勢所以歸秦也杜氏曰彭城宋邑今彭城縣公至自晉晉侯使士丐來聘左傳范宣子來聘且拜朝也秋把伯來朝左傳杞桓公來朝勞公且問晉故公以晉君語之杞伯于是驟朝于晉而請為昏附左傳七月宋老佐華喜圍彭城老佐卒八月邾子來朝左傳即位而來見也築鹿囿左傳書不時也杜氏曰築牆為鹿苑公羊傳何以書譏何譏爾有囿矣又為也穀梁傳築不志此其志何也山林藪澤之利所以與民共也虞之非正也己丑公薨于路寢左傳言道也在路寢得君薨之道穀梁傳路寢正也男子不絶于婦人之手以齊終也冬楚人鄭人侵宋左傳冬十一月楚子重救彭城伐宋先遣輕軍與鄭人侵宋子重為後鎮故稱人而不言伐宋華元如晉告急韓獻子為政於是欒書卒韓厥代將中軍曰欲求得人必先勤之成霸安疆自宋始矣晉侯師于台谷地闕以救宋遇楚師于靡角宋地之谷楚師還晉侯使士魴來乞師魴音房十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾杼直吕反虛起居反朾他丁反左傳孟獻子㑹于虛朾謀救宋也宋人辭諸侯而請師以圍彭城不敢煩諸侯但請其師孟獻子請于諸侯而先歸㑹葬杜氏曰虛朾地闕或曰宋地高氏曰諸侯師至而楚鄭之師已退故宋人辭諸侯而請其師以圍彭城而先為此盟也丁未葬我君成公左傳書順也薨于路寢五月而葬國家安靖世適承嗣故曰書順春秋輯傳卷八

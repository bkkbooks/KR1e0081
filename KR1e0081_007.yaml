body:
  text: 春秋輯傳卷五明王樵輯僖公元年春王正月左傳不稱即位公出故也公出復入不書諱之也公羊傳公何以不言即位繼弒君子不言即位此非子也其稱子何臣子一例也榖梁傳繼弒君不言即位正也按左氏以為閔公弒後成季以僖公適邾共仲奔莒乃入立之經無僖公出入之文者諱之也然去年八月閔公遭弒僖公自邾入為君至此久矣國內已粗定不應猶以出奔之故不行即位之禮也身出復入恥不在公何嫌而諱若君出諱而不書昭公何以書乎齊師宋師曺師次于聶北救邢曺師左作曺伯聶女輒反公羊傳救不言次此其言次何不及事也邢已亡矣孰亡之蓋狄滅之曷為先言次而後言救君也君則其稱師何不與諸侯專封也趙氏曰公羊云邢已亡矣蓋狄滅之按邢實未亡何得云亡又云君則其稱師何不與諸侯專封也按齊宋曺三國君實不在但使師救耳邢實未亡又何封乎啖氏曰救者救其患難凡救皆美也救而次失救道也救邢之師譏不速赴故先書次于聶北邢竟得其援故又言救邢言有成事也杜氏曰次于聶北者按兵觀釁以待事也聶北邢地夏六月邢遷于夷儀夷儀公作陳儀後同左傳諸侯救邢實大夫而言諸侯總衆國之詞也邢人潰出奔師奔聶北之師也邢潰不書不告也師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之救患也凡侯伯州長救患分災分甫問反又如字謂分之穀帛討罪禮也公羊傳遷者何其意也遷之者何非其意也榖梁傳遷者猶得其國家以往者也其地邢復見也非若宋人遷宿滅不復見杜氏曰邢遷如歸故以自遷為文夷儀邢地齊師宋師曺師城邢公羊傳此一事也曷為復言齊師宋師曺師不復言師則無以知其為一事也穀梁傳是向之師也使之知改事然美齊侯之功也陸氏曰三國先救邢邢遷後乃城之各一事據實書耳秋七月戊辰夫人薑氏薨于夷齊人以歸杜氏曰傳在閔二年不言齊人殺諱之書地者明在外薨閔二年傳曰共仲通于哀薑哀薑欲立之閔公之死也哀薑與知之故孫于邾齊人取而殺之于夷以其尸歸公羊傳夷者齊地齊地則其言齊人以歸何桓公召而縊殺之趙氏曰穀梁云夫人薨不地地故也此説非也假如夫人歸寧在路遇疾而薨豈得不書地乎且君薨者皆記其寢被殺即不言地隱公是也桓公在齊被殺而亦書地故知在外薨不論有故無故皆當書地理甚昭然愚按此春秋正哀薑之誅豫齊桓以討賊之義也本國之辭理不得直言故書薨于夷而曰齊人以歸所以著齊人殺之也左氏乃謂君子以齊人殺哀薑為已甚矣女子從人者也何物君子而為是言女子從人在夫家有他罪謂非父母國所討可也與弒二君大義滅親使哀薑在魯魯不能討桓公猶不可但已况其逸而在于邾乎取而殺之于夷以其尸歸桓公之意蓋以其義已絶于魯不可反葬于魯故也以歸之義胡文定程沙隨皆謂齊以喪歸魯竊詳若果歸其喪齊魯鄰境豈得七月死至十有二月喪始至乎經凡言以歸者以歸其國也左氏是矣崔銑曰齊桓戮哀薑晉文納王晉悼討魚石乃定伯之柄乎人倫稍明紀綱粗立所謂假之也與是故儒學王道修彛倫而已矣楚人伐鄭荆始書楚左傳鄭即齊故也八月公會齊侯宋公鄭伯曺伯邾人于柳柳敕呈反公作朾左傳盟于犖謀救鄭也犖力角反即柳也地有二名杜氏曰柳宋地陳國陳縣西北有柳城公及其會而不書盟還不以盟告汪氏曰經書會而左氏言盟傳誤耳按楚兵已退鄭已在會則此舉非為謀救鄭也謀却楚也九月公敗邾師于偃敗必邁反偃公作纓左傳公敗邾師于偃虛丘之戍將歸者也杜氏曰偃邾地又曰虛丘邾地邾人既送哀薑還齊人殺之因戍虛丘欲以侵魯公以義救齊齊歸薑氏之喪邾人懼乃歸故要而敗之按柳之盟邾人在焉越月而敗其師傳亦不能詳其故不知虛丘誰地何故戌之杜氏亦不過以意言之耳蓋以哀薑嘗遜于邾邾人或有所要于魯魯自求于齊齊人許歸其喪邾欲侵魯魯敗其師敗之者為主譏在魯也冬十月壬午公子友帥師敗莒師于酈獲莒拿酈力知反公作犁穀作麗拿女居反又女加反左傳冬莒人來求賂公子友敗諸酈獲莒子之弟拿非卿也嘉獲之也公賜季友汶陽之田及費汶陽田汶水北地汶水出泰山萊蕪縣西入濟公羊傳莒拿者何莒大夫也莒無大夫此何以書大季子之獲也何大乎季子之獲季子治內難以正謂拒慶父禦外難以正其禦外難以正奈何公子慶父弒閔公走而之莒莒人逐之將由乎齊齊人不納反却舍子汶水之上使公子奚斯入請季子曰公子不可以入入則殺矣奚斯不忍反命于慶父自南涘音俟水涯也北面而哭時慶父在汶水之北慶父聞之曰嘻此奚斯之聲也諾已諾已自畢竟之詞曰吾不得入矣於是抗舟竹由反小車轅經而死莒人聞之曰吾已得子之賊矣以求賂于魯魯人不與為是興師而伐魯季子待之以偏師按左氏公羊皆謂豫季友之獲今考經書鄭獲蔡公子燮宋華元吳獲陳夏齧齊國書未有以書獲為善者此于友書敗書獲自責在友耳若夫莒逐慶父死于汶水之上而不書莒人殺慶父與宋萬奔陳而不書陳人殺萬同義其納姦要賂之罪蓋在其中矣何必謂嘉季子之獲哉凡詐戰曰敗觀經書敗某師則知其非以正勝榖梁乃有屏左右而相搏之説大謬可笑者也陸氏曰三傳皆謂拿非卿以魯獲故書之按例凡不命卿事執于魯以及執殺奔放皆書莒慶鄭宛之類是也何乃于獲别生義乎十有二月丁巳夫人氏之喪至自齊公羊曰貶必與其重者莫重乎以喪至也趙氏曰文薑何不於死及葬貶之乎榖梁曰不言薑為齊侯諱殺同姓也趙氏曰文薑不言薑亦是為齊諱乎杜氏曰僖公請而葬之故告于廟而書喪至也齊侯既殺哀薑以其尸歸絶之于魯僖公請其喪而還不稱薑闕文今按杜説是也齊桓治哀薑之罪取而殺之于夷以其喪義不可歸于魯故遂以歸焉齊桓之為義也盡矣使魯有知義者因使告于齊曰夫人氏實與弒寡君幸君討之若君以先君之故不忍肆諸市朝敢請其喪齊人許之則即其死所而葬之可也今乃請而還之于魯葬以小君之禮大義滅矣春秋詳書之所以深著魯君臣之罪也胡氏乃謂書齊人以歸夫人氏之喪至自齊者譏桓公也夫不譏僖公而譏桓公何倒見乎上文敗邾師于偃三傳俱無明説惟何休云公怨邾人以夫人與齊恐得事之情二年春王正月城楚丘公羊傳孰城城衛也曷為不言城衛滅也孰滅之蓋狄滅之趙氏曰按經文但言入無滅文然則孰城之桓公城之曷為不言桓公城之不與諸侯專封也趙氏曰按經文自為衛築城耳如何謂之封乎榖梁傳楚丘者何衛邑也其城何封衛也則其不言城衛何也衛未遷也愚按桓公之于衛實有存亡繼絶之功故木瓜之詩夫子録之然以小惠評之則齊桓為有德以大法論之則諸侯無專封故城楚丘城者非獨魯也而獨書魯者以彼之為未足以為功故反循吾之常義而稱城焉耳猶晉文使諸侯朝王朝者亦非獨魯也而獨書魯者以彼之為未足以為義故反循吾之常道為朝焉耳貴義而不貴惠貴正而不貴功亦略小善而優大節抑霸權而尊王室斯春秋之旨也宋子魚曰齊桓存三亡國義士猶或薄之夫薄之者非小其功也記曰私惠不歸德君子不自留處也焉詩曰王命仲山甫城彼東方又曰經營四方告成于王斯春秋責桓之意也夏五月葬我小君哀薑虞師晉師滅下陽公穀作夏陽晉始見經左傳晉荀息將以屈産之乘與垂棘之璧假道于虞以伐虢荀息荀叔也屈地生良馬垂棘出美玉故以為名四馬曰乘自晉適虢途出于虞故假道公曰是吾寶也對曰若得道于虞猶外府也公曰宫之竒虞忠臣存焉對曰宫之竒之為人也懦而不能強諫且少長于君君昵之雖諌將不聽乃使荀息假道於虞曰冀為不道入自顛軨音零伐鄍亡丁反三門前是冀伐虞至鄍鄍虞邑河東大陽縣東北有顛軨坂冀之既病則亦惟君故言虞報伐冀使病將欲假道故稱虞強以悅其心冀國名平陽皮氏縣東北有兾亭是也今虢為不道保于逆旅逆旅客舍也虢稍遣人分依客舍以聚衆抄晉邉也以侵敝邑之南鄙敢請假道以請罪于虢問虢伐已以何罪虞公許之且請先伐虢宫之竒諌不聽遂起師夏晉里克荀息帥師會虞師伐虢滅下陽先書虞賄故也下陽虢邑在河東大陽縣公羊傳虞微國也曷為序乎大國之上使虞首惡也曷為使虞首惡虞受賂假滅國者道以取亡焉其受賂奈何獻公朝諸大夫而問焉曰寡人夜者寢而不寐其意也何諸大夫有進對者曰寢不安與其諸侍者有不在側者與獻公不應荀息進曰虞虢見與獻公攝而進之以手通指曰攝遂與之入而謀曰吾欲攻虢則虞救之攻虞則虢救之如之何願與子慮之荀息對曰君若用臣之謀則今日取虢而明日取虞耳君何憂焉獻公曰然則奈何荀息曰請以屈産之乘與垂棘之璧往必可得也則寶出之內府藏之外府馬出之內廄繫之外廄耳君何喪焉獻公曰諾雖然宫之竒存焉如之何荀息曰宫之竒知則知矣雖然虞公貪而好寶見寶必不從其言請終于往於是終以往虞公見寶許諾宫之竒果諌諌曰唇亡則齒寒虞虢之相救非相為賜則晉今日取虢而明日虞從而亡耳君請勿許也虞公不從榖梁傳夏陽者虞虢之塞邑也滅夏陽則虞虢舉矣其載荀息之言曰玩好在耳目之前而患在一國之後此中知以上乃能慮之臣料虞君中知以下也公遂借道而伐虢愚按左氏云先書虞賄故也公羊云先書虞使虞首惡也二家皆未盡設謀在晉春秋乃以虞公餌賄而使虞首惡非公論矣據左傳虞先起師晉侯會之春秋從其先後書之耳無他意也程子曰虞假道而助晉伐虢虢之亡虞實致之故以虞為主下陽邑也虢之亡由此故即書滅按以虞首兵猶邾之導鄭又如以宋首州吁徐彥曰虢之滅由于下陽之亡郢之入由于州來之亡故皆書滅張氏曰下陽與上陽為對虢之塞邑在今陜州平陸縣上陽在陜縣虢所都也虞仲雍之後虢文王弟虢叔之後秋九月齊侯宋公江人黃人盟于貫公貫下有澤宇榖梁傳貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟按管仲逺慮卓見張氏曰江在汝南安陽縣今蔡州新息縣今蔡黃嬴姓國在汝南缺陽縣今光州定城縣也貫今興仁府濟隂縣有貫城齊桓謀楚先服此二國皆近楚之國也所以逺交而孤楚之勢此桓公服楚之規模也惟宋預盟不煩諸侯也今按張氏此説最是杜氏亦謂江黃楚與國也始來服齊故為合諸侯此得事之情但諸侯唯齊宋蓋宋王者之後中州之大國自齊桓初霸即與宋同力常推先焉今諸侯無異志者逺盟江黃獨與宋俱張氏所謂不煩諸侯也陽榖之會亦同公榖皆以為大國言齊宋逺國言江黃則以其餘為莫敢不至也此蓋推言其勢之若是非諸侯之果皆與盟也春秋序盟會皆從其實無包舉之例此舉不出于管仲而諸家盛稱為制楚之竒䇿恐未然附左傳齊寺人貂始漏師于多魚寺人內豎貂名多魚地名闕為齊亂張本虢公敗戎于桑田桑地虢地在宏農陕縣東北晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒鑒所以自照而益其疾也必易晉而不撫其民矣不可以五稔熟也冬十月不雨榖梁傳不雨者勤雨也欲得雨之心勤也楚人侵鄭左傳楚人伐鄭鬭章囚鄭聃伯經書侵傳言伐本以伐興權行侵掠三年春王正月不雨榖梁傳不雨者勤雨也夏四月不雨榖梁傳一時言不雨者閔雨也經一時輒言不雨憂民之至閔雨者有志乎民者也按雨㿩繫乎人時關乎民命故災則書旱僖二十一年夏大旱宣七年秋大旱勤雨則書不雨閔雨則每時而一書不雨喜雨則書雨今年示人君恤民也文公之篇自十有二月不雨至于秋七月而書文二年自正月不雨至于秋七月而書文十年十三年皆著其慢也或者乃緣榖梁閔雨之言欲飾成僖公恤民之實則亦過矣何休有省百官放佞臣理冤獄四百餘人之説杜氏曰一時不雨則書首月傳例曰不曰旱不為災五行志庶徴之恆㿩劉向以為春秋之大旱也不傷二榖謂之不雨徐人取舒杜氏曰徐國在下邳僮縣東南舒國今廬江舒縣勝國而不用大師亦曰取孔氏曰諸侯相滅亡者多是王壤鄰接思啓封疆徐在下邳舒在廬江相去甚遙而越境滅國不知所以李亷曰外滅國書取者惟此左氏公羊皆以為易趙氏以為不絶其祀也夫用兵雖有難易而滅人之罪無重輕何得以易而減其滅罪乎以為不絶其祀則書降書遷足矣以為舒自取滅亡則書潰書亡足矣何得稱取稱取者與魯兵書滅曰取同文先儒林氏以為舒者楚之黨徐人取舒為齊桓通伐楚之徑也春秋以其效順于中國也故書人書取此説疑得之六月雨左傳春不雨夏六月雨自十月不雨至於五月不曰旱不為災也杜氏曰亦旱不竟夏周六月夏四月於播種五稼無損榖梁傳雨云者喜雨也喜雨者有志乎民者也髙氏曰建巳之月萬物始盛待雨而大古者以是月雩而祈雨則六月之雨尤為可喜秋齊侯宋公江人黃人會于陽榖左傳謀伐楚也杜氏曰陽榖齊地在東平須昌縣北趙氏曰據明年伐楚江黃不與則知此説非也按胡傳諸侯之帥同次于陘所謂聚而為正也江人黃人各守其地所謂分而為竒也此類舉業鋪張之辭江黃小國實不能為中國掎角桓公不用管仲之言乃其失䇿無濟于事適促二國之亡耳公羊云此大會也曷為末言爾按此義同盟貫諸侯無包舉之例其載桓公之言曰無障谷無貯粟無易樹子無以妾為妻者此蓋聞葵丘五命之略而𠞰傳之焉耳兼此文亦不完上下意不屬也榖梁云陽穀之會桓公端委搢笏而朝諸侯諸侯皆諭乎桓公之志並附會之浮辭兩與盟會一從伐陳滅亡繼之况敢犯楚乎胡氏謂次陘之役江黃守境按兵以為八國之援以此為克敵制勝之謀並非其實冬公子友如齊涖盟榖作公子季友涖公穀作蒞後同公羊傳涖盟者何徑盟乎彼也來盟者盟于我也公蓋有故不會陽榖是以季友往涖盟或曰聽伐楚之期也涖盟對來盟為義公羊得之楚人伐鄭左傳鄭伯欲成孔叔鄭大夫不可曰齊方勤我棄德不祥四年春王正月公會齊侯宋公陳侯衛侯鄭伯許男曺伯侵蔡蔡潰遂伐楚次于陘左傳春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使問師故管仲對曰昔召康公周太保召公奭命我先君太公曰五侯九伯五等諸侯九州之伯女實征之以夾輔周室爾貢包裹來茅菁茅不入王祭不共無以縮所六反酒束茅而灌之以酒為縮寡人是徴昭王南征而不復寡人是問昭王南巡守涉漢船壞而溺周人諱而不赴對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濱師進次于陘杜氏曰民逃其上曰潰遂兩事之辭陘楚地頴川召陵縣南有陘亭按齊桓圖伯二十餘年至是始有事于楚猶未敢聲言伐之也以侵蔡召諸侯借侵蔡以出楚不意蔡自莊十四年荆入蔡蔡哀侯折而事楚已易世不通中國今二十有四年矣蔡已入楚則次及于鄭蔡鄭當楚之衝華夷之門户也故齊不得蔡無以及楚侵蔡伐楚勢當然矣公怒蔡姬歸之未絶而蔡嫁之説者遂為齊侯以私憾加兵者謬也因諸侯之師震而潰之遂事伐楚不與角力示之以形勢以全取勝故一問而楚詞屈兵不血刃孔子稱其一匡天下遂以仁許之春秋舉重凡師再有事不悉書茍悉書則以遂言之兵事言遂必關于天下之大故也楚入春秋浸強而諸夏之交兵非以定篡弒則修怨而已問不及楚也桓公始有志于制楚合九國之衆兵莫盛焉楚雖強足以一戰乃次陘不戰以待其來折以話言而楚即服雖然荆楚僭王罪之大者也包茅不入罪之小者也昭王之不復則非其罪矣管仲乃舍其大而問其小且及于事之久逺不明而非其罪者仗義執言固當如是而已乎吁此其所以為霸者之師也禹之征苗湯之伐桀皆明徴其辭蓋有諸已而後可求諸人無諸已而後可非諸人齊桓之霸所謂以力服人而已內嬖如嫡同産不嫁內之失德多矣滅談滅遂遷陽降鄣外之失義多矣楚大國也僣王其大惡也我以大惡責之彼肯弭然受責者哉攻之弗克圍之弗下將何辭以退師乎故舍其所當責者而及其不必責者庶幾楚人之為辭也易不盡力以抗我我之服楚也亦易不勞師而有功鳴呼此其所以為霸者之心也孔子曰管仲之器小哉孟子曰管仲功烈如彼其卑也泛而觀之則聖賢之貶伯功若以存教而絶人之趨于功利也唯以是而深考之則其實卑而小也猶斗筲之不可強以譽為鐘鼎春秋尊王賤霸猶首冠足履之不可以易置也豈唯存教云乎哉胡氏謂齊師雖強桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕庶幾乎王者之事此等並過論也夏許男新臣卒劉氏曰諸侯卒于外者在師則稱師在會則稱會今許男一無稱者此去師與會而復歸其國之驗也召陵地在頴川去許密邇是以許男復焉古者國君即位而為椑音闢棺襯尸也嵗一漆之出疆必載椑卒于師曰師卒于會曰會正也許男新臣卒非正也按許男春在陘而夏卒師未退不言卒于師故先儒以為歸國而卒未見非正之意劉氏之説過矣榖梁則謂死于師而不地內桓師也楚屈完來盟于師盟于召陵屈居忽反完音完召上照反左傳夏楚子使屈完楚大夫如師觀齊因屈完覩齊之盛而求盟師退次于召陵因楚已服退舍以禮之齊侯陳諸侯之師與屈完乘共載而觀之齊侯曰豈不榖是為先君之好是繼與不榖同好何如對曰君惠徼福于敝邑之社稷辱收寡君寡君之願也齊侯之辭禮故屈完之對亦謙雖非情而不得不順齊侯曰以此衆戰誰能禦之以此攻城何城不克齊侯于是乎失言矣使管仲侍行其為斯言乎對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之齊侯亦屈而不能對矣退是時齊為虛禮善詞以柔楚故楚亦虛禮善詞以齊取完師却敵而已意不欲生事蓋令尹子文之謀也而屈完亦俊士也折桓數言楚之雄壯抗衡中夏不為人下之氣具見于此矣桓公之不能終定楚亦坐判于此都方城山在南陽葉縣南以言竟上之逺漢水出武至江夏南入江言其險固以當城池屈完及諸侯盟召陵頴川縣公羊傳其言盟于師盟于召陵何師在召陵也曷為再言盟喜服楚也楚有王者則後服無王者則先叛夷狄而亟病中國南夷與此夷交中國不絶若線桓公起中國而攘夷狄卒帖荆以此為王者之事也趙氏曰若不重言盟于召陵則無以知退軍乃似盟于陘也若惟言盟于召陵則莫知與誰盟又無以示退軍之禮榖梁曰以桓公得志為僅矣按是時北有狄人之患南伐至于邢衛矣南有荆楚之難北伐至于鄭矣所謂南夷與北夷交而中國不絶若線桓公此却狄而南帖荆其有功于諸夏大矣然其却狄也緩而帖荆也僅狄已蹙邢而始次于聶此以救邢狄已入衛而二年之後楚丘始城衛北州之大國也及其廬于曺也止遺民男女七百有三十人益之以共滕之民為五千人亡而後存之齊將以為非是不足以見德也乎若夫楚之為患又有百于狄者始而吞噬羣蠻繼而憑陵中夏已盡漢陽之諸姬睥睨宗周之九鼎入蔡滅息比年伐鄭始專意北方矣鄭之為國也前嵩後河右洛左濟虎牢之險天下所聳中國有鄭則足以據北面南而為政于天下周召之所以分陜而治德化大成于內而南方之國莫不從教者也及其衰也荆楚抗衡中夏則必爭鄭桓文攘却荆楚則必服鄭不然不克天下大勢之所在亦可見矣惜乎桓文無周召之心楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄德不祥鄭之受兵亟矣齊未嘗救而孔叔猶有勤我之言蓋知于柳于貫陽榖之會皆為謀鄭故也桓公之于却楚謀中夏也僅僅焉耳不于斯見之矣乎召陵之後僅得屈完之盟故保不戰之勝榖梁氏曰以桓公得志為僅矣可謂辭約而義深矣然則曾西所謂功烈之卑也豈無見哉齊人執陳轅濤塗轅公穀作袁左傳陳轅濤塗謂鄭申侯曰師出于陳鄭之間國必甚病當有供給之費故若出東方觀兵于東夷而循海而歸其可也東夷郯莒徐夷也觀兵示威申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出于東方而遇敵懼不可用也若出于陳鄭之間供其資糧屝符費反革屨也屨其可也齊侯説與之虎牢執轅濤塗公羊傳稱侯而執者伯討也稱人而執者非伯討也此執有罪何以不得為伯討古者周公東征則西國怨西征則東國怨桓公假途于陳而伐楚陳人不欲其反由已者師不正故也不修其師而執濤塗古人之討則不然也啖氏曰公羊云濤塗説桓公令師濱海而歸師陷沛澤之中顧而執濤塗若然則是軍失路致陷非濤塗之罪故左氏説是李亷曰濤塗誤軍之罪疑公羊得之如左氏之説則仍從陳鄭而歸足矣執其卿而又侵伐其國者至是甚乎按齊實未嘗濱海而歸安從有陷師沛澤之事秋及江黃伐陳江黃皆汝旁國而近陳自伐楚歸就令伐陳則路由陳鄭明矣濤塗之言雖私其國然不聽則已何至勤師以討蓋陳蔡二國終以近楚常有二心今不欲齊師反而由已有厭苦之之心齊人以為此叛齊即楚之漸故因歸師以威之堅其意耳觀再侵而陳乃成則陳初未肯服也陳不心服桓再興師得其成而後已蓋定陳之從齊非專以濤塗故也秋及江人黃人伐陳左傳秋伐陳討不忠也榖梁傳不言其人及之者何內師也汪氏曰或謂書及者蒙上文齊人執轅濤塗之文乃齊及之非魯及之也然求之一經書法他國再有事必書遂如遂滅逼陽遂滅賴之類此不言遂實魯及之耳愚按江黃雖從齊然不敢明出師以助伐楚故陘之師江黃不與順小國之情且使整旅保境以待事也至有討陳之舉而用之然齊桓之計失于是矣小國使之侵伐結怨深讐而我救或不能及則反以快敵而負小國效順之初心矣八月公至自伐楚榖梁傳有二事偶則以後事致後事小則以先事致其以伐楚致大伐楚也范氏曰楚強莫能伐故以伐楚為大事啖氏曰或致前事或致後事蓋夫子擇其重者志之也李亷曰致先事致後事之説榖梁傳得之啖氏之説亦榖梁意也然則以伐楚盟召陵致伐而不致會對侵楚盟臯鼬致會而不致侵論之則伐楚之義大而侵楚之事淺矣又以侵蔡遂伐楚致伐而不致侵對伐鄭遂救許致伐而不致救論之則伐楚之功美而討鄭之事亦重矣其公羊以為得意致會不得意致伐者獨于伐鄭會蕭魚致會則可通于此不通則以為楚復叛盟故不以會致皆強生論也劉氏曰諸致例有可通者有不可通者不足泥也葬許穆公穆公作繆左傳許穆公卒于師葬之以侯禮也凡諸侯薨于朝會加一等死王事加二等于是有以衮斂按許男實不卒于師已見前卒下同盟重其從伐楚也過以加等之禮褒之耳冬十有二月公孫兹帥師會齊人宋人衛人鄭人許人曹人侵陳兹公作慈後同杜氏曰兹叔牙子叔孫戴伯左傳叔孫戴諡伯帥師會諸侯之師侵陳陳成歸轅濤塗胡傳桓公識明而量淺管仲器不足而才有餘楚方受盟志已驕溢陳大夫一謀不協其身見執其國再見侵伐桓德于是乎衰矣張氏曰是時大兵之後復以師出重困諸侯况兵以憤興則後有當討者應之必怠人亦侮之故楚終不服鄭伯逃盟以至弦滅而不能救皆怒陳之過致之也故詳書伐侵以著其罪附左傳初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長物生而有象象而後有滋滋而後有數龜象筮數故象長而數短也弗聽立之生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂太子曰君夢齊薑必速祭之太子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之毒酒經宿輒敗而經六日明公之惑穀梁云君將食驪姬跪曰食自外不可不試也公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子穀梁云驪姬下堂而啼呼曰天乎天乎國子之國也子何遲于為君太子奔新城曲沃公殺其傅杜原欵或謂太子子辭君必辨焉以六日之狀自理太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂自理則姬死姬死則君不樂是不樂由吾也曰子其行乎太子曰君實不察其罪被此名也以出人誰納我十二月戊申縊于新城姬遂譛二公子曰皆知之重耳奔蒲夷吾奔屈五年春晉侯殺其世子申生左傳晉侯使以殺太子申生之故來告初晉侯使士蒍為二公子築蒲與屈不慎夷吾訴之公使讓之對曰詩云大雅懷德唯寧宗子唯城以德安國則宗子之固若城君其修德而固宗子何城如之三年將尋師焉焉用慎及難公使寺人披伐蒲重耳曰君父之命不挍踰垣而走披斬其袪袂也遂出奔翟公羊傳曷為直稱晉侯以殺殺世子母弟直稱君者甚之也此傳之極簡明得經旨者穀梁傳日晉侯斥指斥殺惡晉使也按太子縊于新城則其斥殺何春秋之法前有讒而不見則其君之罪也按外傳公之優曰施通于驪姬驪姬問曰吾欲為難安始而可優施曰必于申生其為人小心精潔精潔易辱甚精必愚是故先施讒于申生又優施教驪姬夜半而泣謂公曰吾聞申生甚仁而強今謂君惑于我必亂國無乃以國故而行強于君盍殺我無以一妾亂百姓公曰夫豈惠于民而不惠于父乎驪姬曰為仁與為國不同為仁者愛親之謂仁為國者利國之謂仁故長民者無親衆以為親茍衆利而百姓和豈能憚君公懼曰若何而可驪姬曰君盍老而授之政彼得政而行其欲乃釋君公曰不可我以威與武是以臨諸侯未沒而亡政不可謂武有子而不勝不可謂威爾弗憂我將圖之驪姬曰以臯落翟之苛我邉鄙君盍使之伐翟以觀其果于衆也若不勝翟雖濟益也其罪可也若勝翟則善用衆矣求必益廣乃可厚圗也公説故使申生伐東山申生敗翟而返讒言益起驪姬告優施曰君既許我殺太子而立奚齊矣吾難里克奈何優施飲里克酒中飲起舞乃歌曰暇豫之吾吾不如烏烏人皆集于菀木茂貌已獨集于枯譏里克不能擇所依如烏鳥能擇茂木而捿之吾吾自得也里克曰而言戲乎抑有所聞之乎優施告之故里克曰阿君以殺太子吾不忍拒命吾不敢中立其免乎優施曰免西山真氏曰驪姬之殺申生也其機變亦甚巧矣夫父子之情日相親近則間言不得而入惟以術離之然後可故驪姬首賂二五説獻公出三子于外此離人之術也獻公者喜功貪得之人以闢地啓土中其情安得不悅而從之三子既出則圖之易矣既又與優施謀作難之先後優施知申生之可陷也則請先之其言曰精潔易辱又曰甚精必愚蓋精潔之人惜名矜行惟恐點汚故曰易辱以節自勵不以術自全故曰必愚若是者可以術激之而使死石顯之陷蕭望之亦猶是也申生輕死重名故優施欲先陷焉然恐獻公猶未忍果于殺也則又夜半而泣以危言動之謂申生有將為逆之意自請先死公懼而謀之則又勸授之政而避禍焉夫獻公剛猛人也肯為其子屈乎懷怒必殺之心自此啓矣然猶患無隙以加之罪也則使將兵而伐翟勝則加以得衆之名而敗則繩以覆師之罪申生至是無逃死之所矣然又慮大臣或守正力爭則公之意未可知也則又使優施以杯酒從容歌舞微詞諷其為附麗之計里克大臣也許以中立則無復事矣獻公之意其成也已久故歸胙之詐至易辨而不復辨申生之仁恐傷公意又不忍自辨則有死而已申生死而二子奔無不如優施之所料者然奚齊立里克弒之卓子立又弒之夷吾不終逮重耳立而後定晉國之亂垂二十年由驪姬之讒而三嬖二五優施助之也故女子小人表裡交締者危國亡家之本也東萊吕氏曰晉殺其世子申生孰殺之士蒍殺之也殺申生者實驪姬之譛士蒍何與焉士蒍開其隙驪姬乘其隙也羣公子之出于桓莊者豈他人哉非獻公之諸父則王父昆弟也士蒍逢獻公之惡使屠其宗族昆弟如艾草菅略無憯怛不忍之意其于宗族昆弟既如此何獨難于其子乎驪姬之譛即襲吾前日譛富子之術也城蒲與屈即前日城聚之意也吾嘗考晉國之本末又知開禍端者非獨士蒍其所從來逺矣晉穆侯之二子長則文侯而桓叔其季也自桓叔以來視文侯之子孫不啻冦讐必鋤其根奪其據而後已者良欲啓子孫之業耳殊不知吾私其子而殺其昆弟則吾之子亦私其子而殺其昆弟矣當桓莊翦害文侯子孫之時其心必謂是本既除則吾子孫無復有患矣豈知害其子孫者乃吾子孫即當獻公翦害桓莊子孫之時其心亦謂是逼既除則吾嗣子無復有患矣而豈知害其嗣子者又吾也即嗚呼私生于愛而害愛者莫如私天下未有私而能愛者也將立奚齊乃定之矣必死申生奪夷吾重耳而後安者為奚齊慮也而奚齊以弒卓子又弒使二子不保又非獻公為之也邪徒設此心兩俱棄之致晉亂二十餘年所謂為人君父而不知春秋之義必蒙首惡之名者豈不信哉豈不信哉朱子謂驪姬之亂詛無畜羣公子自是晉無公族而以卿之子為公族大夫這箇便是六卿分晉之漸晉無公族語在宣二年把伯姬來朝其子來字句絶相朝諸侯之禮也把伯在無使其子行之禮魯無以待人父之道待人子之禮又俱無使婦人參之之禮書把伯姬來朝其子參譏之也伯姬歸把方十三年有子必尚幼是年把惠公卒昔曺伯有疾遣其世子射姑來是時惠公疑亦有疾朝其子而伯姬俱來蓋托之于魯也杜氏曰伯姬來寧寧成風也時子在十嵗左右不成朝禮故繫于母而曰朝其子夏公孫兹如牟私交也左氏以為如牟娶焉公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止公穀作首胾後同按史記周惠王太子鄭母早死後母曰惠后陳媯惠后生叔帶封于甘故左傳稱甘昭公有寵于惠后惠王以惠后故將廢太子而立之故齊桓帥諸侯會王世子以定其位左傳會于首止會王太子鄭謀寧周也公羊傳曷為殊會王世子世子貴也世子猶世世子也穀梁傳及以會尊之也何尊焉王世子王之二也杜氏曰世子不名而殊會尊之也王之世子尊與王同首止衛地陳留襄邑縣東南有首鄉按據史記則叔帶與襄王異母僖二十四年傳曰天王出居于鄭辟母弟之難也注云叔帶襄王同母弟此蓋因母弟字而誤説依史記為是左傳此處載事只云謀寧周也而不明言惠后欲立帶事至鄭忽辭昏魯為其班後鄭此等小事却兩處見之汪氏曰齊桓會王世子于首止以定其位而王室寧使惠王無易樹子之過若景王不能早正國本而王室亂使諸侯有戍周城成周之勤晉頃寧王室于已亂之後不若齊桓能弭難于未亂之先也或言世子無王命而出會諸侯是世子外交霸國以脅制其君齊桓不請于王而率諸侯以會王世子是為世子私植黨以拒父也是不然漢髙欲易太子張良招四皓與逰卒定惠帝程子與之以為得納約自牖之義彼四皓非以髙帝之命而至惠帝亦非以父命而招四人也春秋許會首止之意亦猶是也陸氏曰齊侯非會主故言及齊侯秋八月諸侯盟于首止公羊傳諸侯何以不序一事而再見者前目而後凡也榖梁傳無中事而復舉諸侯何也尊王世子而不敢與盟也尊則其不敢與盟何也盟者不相信也不敢以所不信而加之尊者天子微諸侯不享覲桓控大國扶小國統諸侯不能以朝天子亦不敢致天子尊王世子于首胾乃所以尊天王之命也世子受之可乎是亦變之正也天子微諸侯不享覲世子受諸侯之尊已而天王尊矣世子受之可也鄭伯逃歸不盟左傳王使周公宰孔也召鄭伯曰吾撫汝以從楚輔之以晉可以少安王恨齊桓定太子之位故召鄭伯使叛齊鄭伯喜于王命而懼其不朝于齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親孔叔鄭大夫親黨援也失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸趙氏曰凡言逃者皆謂義當留而竊去也故榖梁云逃義曰逃君臣同辭逃者匹夫之事也按是時齊桓攘楚諸侯服從會于首止匡戴王室大義明于天下周室積衰之勢自此可振而惠王以嬖孽之私棄義理之正撫鄭從楚惎間中國自是楚復張矣故知中國之卒不競于楚非獨楚之強與諸侯之罪亦王室有以啓之也可勝嘆哉春秋逃鄭伯則王之畔義棄忠不待貶而惡亦見矣孔氏曰逃在盟前避盟而逃故曰逃歸不盟楚人滅弦弦子奔黃楚始滅中國左傳楚鬬榖於菟滅弦弦子奔黃于是江黃道柏方睦于齊皆弦姻也姻外親也道國在汝南安陽縣南柏國名汝南西平縣有伯亭弦子恃之而不事楚又不設備故亡按召陵之盟楚非誠服也侵陳之役諸侯有叛心矣觀鄭伯以不朝于齊而懼夫其不朝也端有故乎又疑于見討而懼則其生心久矣故一聞惠王撫汝以從楚之言遂喜于王命而逃歸不盟自是竊與楚通也楚窺此間遂滅弦以嘗齊夫召陵之盟與不穀同好此言皎如白日而楚敢畔之蓋有以知齊間之可乘耳使齊之為義出于誠飭躬正已上事王室內撫其民外綏諸侯莫不盡其道上下內外皆中心悅而誠服之也則以背盟滅弦問楚之罪可也楊雄有言為政有幾曰思斁周公東征四國是皇其思矣夫齊欲徑陳陳不果納執轅濤塗其斁矣夫夫桓德既斁于人義不信于天王氣不聨于與國此所以不能再興問楚之師也江黃道柏齊之睦而弦之姻也滅弦者圖四國之漸也齊將僕僕然救之乎彼處南海而吾處北海彼威之旦夕耳而吾救在千里之外豈所能及不救則盟楚之功墮矣齊桓之失在于積義不以平素而假其一二以為名故無以充其類而不在于滅弦不救之日也杜氏曰弦國在弋陽馱縣東南九月戊申朔日有食之冬晉人執虞公左傳晉人復假道于虞以伐虢宫之竒諌曰虢虞之表也虢亡虞必從之晉不可啓冦不可玩一之為甚其可再乎謗所謂輔頰輔車牙車相依唇亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰太伯虞仲太王之昭也太伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勳在王室藏于盟府司盟之官將虢是滅何愛于虞且虞能親于桓莊乎其愛之也桓莊之族何罪而以為戮不唯逼乎親以寵逼猶尚害之况以國乎弗聽許晉使宫之竒以其族行八月甲午晉侯圍上陽上陽虢國都在宏農陜縣東南冬十二月丙子朔滅虢虢公醜奔京師不書不告也師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢于王故書曰晉人執虞公罪虞且言易也公羊傳虞公抱寶牽馬而至荀息見曰臣之謀何如獻公曰子之謀則已行矣寶則吾寶也雖然吾馬之齒亦已長矣蓋戲之也虞已滅矣其言執之何不與滅也不與虞公以見滅滅者亡國之善辭上下之同力者也杜氏曰稱人以執同于無道于其民之例所以罪虞公且言易也晉侯修虞之祀而歸其職貢于王故不以滅同姓為譏啖氏曰春秋時以強暴弱故執諸侯皆稱人亂辭也按公羊謂虞不言滅不與虞以亡國之善辭可也杜氏謂晉侯修虞祀歸職貢于王故不以滅同姓為譏非也啖説得之六年春王正月附左傳晉侯使賈華晉大夫伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也嫌與重耳同謀而相隨不如之梁梁近秦而幸親幸焉乃之梁秦既大國且穆姬在焉故欲因以求入夏公會齊侯宋公陳侯衛侯曺伯伐鄭圍新城左傳諸侯伐鄭以其逃首止之盟故也圍新密鄭所以不時城也實新密而經言新城者鄭以非時興土功齊并以為討杜氏曰新城鄭新密今滎陽密縣秋楚人圍許諸侯遂救許冬公至自伐鄭按伐而不服故圍新城合六國之師圍新造之邑宜若振稿然圍而不舉見桓公以德綏鄭心不在于為暴也楚人圍許以救鄭也諸侯遂救許皆伐鄭之諸侯故不復更敘也凡言救未有不善之也書遂救許善之尤者也其致以久也左傳蔡穆侯將許僖公以見楚子面縛御璧夫楚本圍許以救鄭諸侯救許則鄭已解圍楚師亦退許有何懼乃隨蔡侯為滅國之禮乎若爾許已從楚齊容得不爭乎八年許男即會盟于洮豈得嘗降楚而又即齊如是之速乎左史楚人辭多右楚失之誣明矣况面縛者圍息而出降之事也秋救許楚子已還至冬迄圍解在數月之後乃無故而行此乎且引微子面縛尤妄也紂之末年微子行遁商書有明文矣謂之出迪謂之行遁則去於商未亡之前其蹤迹必不可物色矣周師至而靣縛銜璧非微子之事也武庚也左氏于此下誣許男上誣微子信乎文勝之史記多而志寡之有害也七年春齊人伐鄭左傳齊人伐鄭孔叔言于鄭伯曰諺有之曰心則不競何憚于病心則弱于齊矣何外憚屈服之病而不肯下乎既不能強又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我欲以申侯説對曰朝不及夕何以待君夏小邾子朝公作小邾婁子後同杜氏曰郳黎來始得王命而來朝邾子别封故曰小邾鄭殺其大夫申侯按左氏申侯申出也姊妹之子為出有寵于楚文王文王將死與之璧使行曰唯我知女女專利而不厭我死女必速行無適小國將不女容焉政狹法峻既葬出奔鄭又有寵于厲公信斯傳也則申侯故楚臣而久用事于鄭鄭伯近欲從楚蓋申侯有謀焉不然則所謂欲以申侯説于齊者何事乎左氏好旁采小事謂陳濤塗怨申侯之反已于召陵故勸之城其賜邑而美遂譛諸鄭伯曰美城其賜邑將以叛也申侯由是得罪至是殺之以説于齊夫齊以申侯為忠賜之虎牢以濤塗誤軍道至于見討今鄭以濤塗之譛殺申侯正忤齊侯之意矣何得謂説于齊乎説之云者蓋以逃盟從楚歸罪于申侯以自解于齊也春秋前書鄭伯逃歸不盟鄭伯之罪已不可文矣此書鄭殺其大夫申侯稱國以殺罪纍上也上下皆失不知自返移過于下茍以自免于大國而擅殺其大夫不待貶而見矣如申侯者專利反覆為佞不忠是足以殺其身而已秋七月公會齊侯宋公陳世子欵鄭世子華盟于寧母母音某又音無穀作寧毋音同左傳秋盟于寧母謀鄭故也管仲言于齊侯曰臣聞之招攜以禮懷逺以德德禮不易無人不懷齊侯修禮于諸侯諸侯官受方物諸侯官司各于齊受其方所當貢天下之物鄭伯使太子華聽命于會言于齊侯曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣齊侯將許之管仲曰君以禮信屬諸侯而以姦終之無乃不可乎君其勿許鄭必受盟齊侯辭焉冬鄭伯使請盟于齊榖梁傳衣裳之會也杜氏曰寧母魯地髙平方與縣有泥母亭音如寧曺伯班卒班公作般公子友如齊杜氏曰罷盟而聘謝不敏也冬葬曺昭公附左傳惠王崩襄王惡太叔帶之難懼不立不發喪而告難于齊八年春王正月公會王人齊侯宋公衛侯許男曺伯陳世子欵盟于洮鄭伯乞盟陳世子欵下公有鄭世子華左傳盟于洮謀王室也鄭伯乞盟請服也襄王定位而後發喪公羊傳王人者何微者也曷為序乎諸侯之上先王命也榖梁傳兵車之會也按左氏謂去年冬閏月惠王崩襄王惡去聲太叔帶之難懼不立不發喪而告難于齊今年盟于洮謀王室也襄王定位而後發喪據經今年十二月丁未方書天王崩恐祕不發喪難于經年而叔帶乃襄王親弟非外國逺人亦難以祕喪為欺也且既云定位而後發喪則正月二月位已定何得至十二月乎祕不發喪蓋後世之事取權一時信史書之亦必從其實歷考後史可見豈春秋乃有此事因其權祕一時遂從其虛日而不改乎襄王有子帶之難此盟為謀王室即不可知惟祕喪則決不可信或曰寧母及洮兩合諸侯皆為鄭也杜氏曰王人與諸侯盟不譏者王室有難故洮曺地夏狄伐晉秋七月禘于太廟用致夫人左傳禘而致哀薑非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也杜氏曰禘三年大祭之名太廟周公廟致者致新死者之主于廟而列之昭穆夫人淫而預弒不薨于寢于禮不應致故僖公疑其禮歷三禘今果行之寢小寢同同盟公羊傳夫人何以不氏譏以妾為妻也蓋聘于楚而脅于齊媵女之先至者也榖梁傳成風也言夫人而不言氏姓非夫人也立妾之辭范氏曰夫人者正嫡之稱非崇妾之嘉號以妾體君則上下無别雖尊其母是卑其父劉氏曰春秋雖亂世未有妾母稱夫人者也自成風始矣孫氏曰禘天子大祭夫人成風也不言風氏者成風僖公妾母嫁非廟見不得與祭僖公既為君欲專其母故因此秋禘祭用夫人之禮致于太廟使之與祭也妾母稱夫人僣之大者故不言風氏以貶之蘇氏曰公羊之説非人情以齊楚之強齊能脅魯使以其媵女為夫人而楚乃肯安然使其女降為妾哉成風之為夫人非正也春秋以為非正而不可以廢焉故與之不足之文而已矣方其存也不可以不稱夫人而去其氏及其沒也不可以不稱諡而去其夫人皆所以示不足于成風也况乎禘于周公而用致焉則其罪已不容于貶矣今按夫人之説左氏以為哀薑哀薑以元年見討于齊僖公為之請其喪而葬以小君之禮久矣烏見疑其禮至今方致于廟乎或言十一年公及夫人薑氏會齊侯于陽穀則夫人為薑氏而僖娶于齊審矣此禘而致之者夫人廟見也按納幣逆女不見于經無上事而遽書廟見又沒其薑氏亦無此理公羊蓋因疑此而遂有脅于媵女先至者之説蘇氏闢之當矣孫明復從榖梁以夫人為成風其説明盡至于禮不王不禘而行之于周公之廟舉大事于祖廟而用之以崇妾母以妾體君是卑其父致于太廟是誣其祖其罪皆不待貶絶而見矣初成風聞季友之繇遂事之而屬僖公焉故僖公立而季友受費以為上卿自是季氏世專魯政惠公仲子猶别立宫至成風乃有二夫人祔廟是私門之強嫡妾之亂皆自僖公始也故春秋謹而志之冬十有二月天王崩據傳實以前年冬崩今始來告九年春王正月宋公御説卒正月公作三月御魚吕反公穀作禦説音悅左傳宋公疾太子兹父固請曰目夷子魚長且仁君其立之公命子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退九年春宋桓公卒襄公即位以目夷為仁使為左師以聽政于是宋治故魚氏世為左師仁山金氏曰宋故國也得一子魚為政遂足以霸惜其不能盡用子魚所以不能遂霸耳不書葬魯不會公羊云為襄公諱蓋見未葬而會諸侯故強生説夏公會宰周公齊侯宋子衛侯鄭伯許男曺伯于葵丘左傳宋桓公卒未葬而襄公會諸侯故曰子凡在喪公侯曰子會于葵丘尋盟且修好禮也王使宰孔賜齊侯胙胙祭肉尊之比二王後曰天子有事于文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受榖梁傳宋稱子未葬之辭也禮柩在堂上孤無外事今背殯而出會以宋子為無哀矣程子曰天子之宰與世子禮異故不殊會杜氏曰陳留外黃縣東有葵丘秋七月乙酉伯姬卒穀梁傳內女也未適人何以卒許嫁而死則以成人之喪治之蜀杜氏曰嫁為夫人則繫國啖氏曰內女為諸侯夫人書卒許嫁為夫人者亦然九月戊辰諸侯同盟于葵丘孟子曰五霸桓公為盛葵丘之會諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好按左傳止載凡我同盟之人三句豈前有佚邪穀梁傳陳牲而不殺讀書加于牲上一明天子之禁會盟同地而再言葵丘盟稱諸侯前目後凡且見不敢上盟周公也杜氏曰宰孔先歸不與盟趙氏曰公羊云貫澤之會桓公有憂中國之心不召而至者江人黃人也葵丘之會桓公震而矜之叛者九國按此會唯六國會鹹牡丘皆七國會淮八國並舊盟之國寧有九國叛乎按九國叛之説固無據但桓公之心至是滿甚宰孔料其將亂矣左傳宰孔先歸遇晉侯曰可無會也齊侯不務德而勤逺略此一語斷盡故北伐山戎南伐楚西為此會也東略之不知西則否矣其在亂乎君務靖亂無勤于行晉侯乃還按宰孔之料齊桓可謂智矣然齊桓素以尊周攘楚為心晉于周莫親于國莫大以齊之才輔之以晉帖楚有餘矣而晉藐然于王室唯知狡焉啓其封疆為心而已今風動于齊桓之義而來宰孔正宜因其善心勸以同奬王室是時齊之六嬖五公子晉之驪姬奚齊卓子齊晉之家政蓋兄弟也其曰其在亂乎君務靖亂無勤于行蓋知齊亂已成因以諷晉然晉自有亂豈能靖齊之亂惜乎宰孔為言之不盡使晉侯泛然聽之徒敗其從伯之志而已其後楚卒橫于中國正緣齊晉之常不同志也然則晉侯斯行宰孔斯言其關于盛衰進退之故豈細也哉甲戌晉侯佹諸卒甲戌左作甲子以前戊辰推當從公穀作甲戌為是左傳九月晉獻公卒里克丕鄭欲納文公丕鄭晉大夫丕普悲反故以三公子申生重耳夷吾之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐藐妙小反又亡角反諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也往死者居生者耦兩也送死事生兩無猜恨所謂貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復踐也言而愛身乎冬晉里克殺其君之子奚齊殺公作弒左傳冬十月里克殺奚齊于次書曰殺其君之子未葬也公羊曰未踰年君之號也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之穀梁傳其君之子云者國人不子也國人不子何也不正其殺世子申生而立之也按奚齊齊舍皆未踰年書奚齊曰其君之子書齊舍曰君舍正而奚齊不正也不正者國人實不之君非春秋故奪之也附左傳齊侯以諸侯之師伐晉及髙梁晉地在平陽縣西南而還令不及魯故不書按晉之亂使齊桓公所藏乎身者恕奉辭以正其亂而定立其君可也此實一大有為之幾而桓公不能也已德如晉何以能正晉之亂乎師及髙梁而還其不克強于為義也由無其本也晉郤芮郤克祖父使夷吾重賂秦以求入曰人實有國我何愛焉言國非已之有何惜不以賂秦入而能民得民土于何有不患無土從之齊隰朋齊大夫帥師會秦師納晉惠公十年春王正月公如齊左傳始朝齊也狄滅溫溫子奔衛左傳謂蘇子叛王即狄又不能于狄狄人伐之王不救故滅蘇子司冦蘇公之後國于溫故曰溫子國名為蘇所都之邑名為溫晉里克弒其君卓及其大夫荀息杜氏曰弒卓在前年而以今春書者從赴按當從經是今春弒也獻公既葬卓以免喪故稱君按稱君説見下按外傳里克見丕鄭曰優施告我君謀成矣將立奚齊丕鄭曰子何謂曰吾對以中立丕鄭曰惜也不如曰不信以疏之亦固太子以攜之多為之故以變其志志少疏乃可間也今子曰中立是固其謀也彼有成矣難以得間里克曰往言不可及也明日稱疾不朝三旬難乃成觀丕鄭所謂乃可間也難以間矣豈里克欲中立之意猶欲有所圖乎漢髙帝欲易太子叔孫通周昌等則強諌留侯則從容招四皓使髙帝之意自回此二者皆是也大臣之義力能為張良則為張良不能則秉義力爭執節無二以固太子濟則國之福不濟死之亦于分畢矣于心無憾矣唐髙宗欲立武后待李績之一言晉獻公驪姬之計深矣亦待里克之一言今曰中立則丕鄭知之矣曰固其謀也彼有成矣胡間之俟甚矣里克之愚也以智自免而終亦不免等死耳不死于世子而死于弒君所謂為人臣而不知春秋之義必陷于篡弒誅死之罪里克是也夫奚齊卓子一耳國人不子奚齊則不子卓子矣而書曰弒其君卓何也二子雖不正而有先君之命則固里克之君也不正既于奚齊見義則于卓子成其君臣之名以正里克之罪非聖人不能修此類是也仇牧荀息書法説見孔父經下荀息召忽同公羊傳獻公謂荀息曰士何如則可謂之信矣對曰使死者反生生者不愧乎其言則可謂信矣里克弒奚齊卓子荀息死之荀息可謂不食其言矣司馬公曰左氏書荀息死之引詩斯言之玷不可為也杜元凱以為荀息有此詩人重言之義元凱失左氏之意矣彼生言而死背之是小人穿窬之行君子所不譏也晉獻公溺于嬖寵廢長立少荀息不能諌正遽以死許之是其言玷于獻公未沒之先而不可救于已沒之後也左氏之言貶也非褒也按荀息嘗為獻公為取虞虢之計此其人可知矣胡康侯取其節不如栁子厚曰春秋進荀息非聖人之情也進荀息以甚茍免之惡也夏齊侯許男伐北戎當是時患有大于戎者狄及晉楚是也晉滅虢滅虞近又國亂狄入衛逼邢前年伐晉近滅溫召陵之後楚滅弦圍許所當問者多矣曽不之及而北戎之為事君子以桓公為失所事矣况許方患楚而驅以伐戎非用人之道也杜氏以北戎為山戎然春秋書戎有茅戎雒戎之屬書狄有白狄赤狄皆以别其種部前書山戎而此言北戎則北戎非山戎明矣晉殺其大夫里克左傳夏四月周公忌父周卿士王子黨周大夫會齊隰朋立晉侯晉侯殺里克以説自解説不篡將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劍而死于是丕鄭聘于秦且謝緩賂故不及榖梁傳稱國以殺罪纍上也里克弒二君與一大夫其以纍上之辭言之何也其殺之不以其罪也其殺之不以其罪奈何里克所為弒者為重耳也夷吾曰是又將殺我乎故殺之不以其罪也按里克弒二君其罪顯矣惠公申生之介弟于次當立齊秦納之周公忌父王子黨臨之不可謂不正使能覲于天王而後受命然後治晉之亂以告先君求世子之所以死則驪姬二五優施之交搆猶當窮治其黨里克之罪人之所知者弒二君惠公之所疾者懷二心而不知其在獻公時志在中立此尤其罪之本而不可不問者也如是則一舉而君臣父子兄弟之義明晉國百世之基定矣而惠公曽無家難之恤方且因亂以為利納賂以求入外因秦伯內因里丕則奚齊卓子之見殺實夷吾心所利耳觀其告里克曰微子不及此則初未嘗有討里克之心特以其志在重耳而不在已故榖梁載其言曰是又將殺我乎此之謂懷私而討雖死不服故春秋不以討賊之辭書惠公之入不書者晉不告也秋七月冬大雨雪雨于付反雪公作雹附左傳晉侯改葬共太子丕鄭之如秦也言于秦伯曰吕甥郤稱兾芮三子晉大夫實為不從不與秦賂若重問以召之問聘問之幣臣出晉君君納重耳蔑不濟矣冬秦伯使泠至秦大夫報問且召三子郤芮曰幣重而言甘誘我也遂殺丕鄭祁舉晉大夫及七輿大夫左行户剛反下同共華右行賈華叔堅騅音佳歂市專反纍虎特宫山祁侯伯七命副車七乘七子七輿大夫也皆里丕之黨也丕豹奔秦豹丕鄭之子言于秦伯曰晉侯背大主秦也而忌小怨里丕民弗與也伐之必出十有一年春晉殺其大夫丕鄭父丕普悲反杜氏曰書春從告按稱國以殺罪纍上也丕鄭里克之黨也言于秦伯請出晉君納重耳則鄭有罪矣其纍上何也使夷吾有君人之德將舉晉國願以為君里丕雖桀其何敢二重耳雖才其何能使人二哉不此自反既殺里克不以其罪丕鄭之徒又以一言罪狀未明而皆死濫刑甚矣郤芮背惠不與秦賂詿誤晉君懷復私怨贊其濫殺其罪亦安可辭胡氏謂稱國者兼罪用事大夫得之矣夏公及夫人薑氏會齊侯于陽榖杜氏曰婦人送迎不出門見兄弟不踰閾與公俱會齊侯非禮髙氏曰公之娶夫人之歸皆不書者合禮故也此會于陽榖則非禮矣公稔聞桓莊之失而不改其轍齊侯親見兩國之事亦躬蹈其非以兩君相會而使夫人參于其間何以示侍御僕從之臣乎家氏曰桓公之始霸憤齊女之無度以哀薑為首戮諸夏肅然知中國所以嚴于禮義實在于是齊襄衛宣汙染之習為之一掃庶乎古方伯之遺烈矣及其暮年志得而驕乃復與僖薑為陽榖與卞之會霸業已衰矣乎附左傳夏揚拒泉臯伊雒之戎同伐京師入王城焚東門揚拒泉臯皆戎邑及諸雜戎居伊水雒水之間者今伊闕北有泉亭王子帶召之也秦晉伐戎以救周秋晉侯平戎于王秋八月大雩榖梁傳雩月正也雩得雨曰雩不得雩曰旱諸侯旱而雩禮也大雩僣也冬楚人伐黃左傳黃人不歸楚貢冬楚人伐黃楚之強暴凡近楚之國皆責之以納職貢如事天子之禮黃既從齊故不歸楚貢而楚伐之滅不書伐今年冬伐明年夏滅經歷三時告命已至而援師不出故特書伐以責齊胡傳按穀梁子曰貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黃桓公不能救故君子閔之也逺國慕賢春秋之所取也被兵城守更厯三時告命已至而援師不出故滅弦滅溫皆不書伐滅黃而書伐者罪桓公不救也以貫之盟陽穀之會徒足以亡其國耳十有二年春王三月庚午日有食之夏楚人滅黃胡傳春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難之節又無克復之志貪生畏死甘就執辱其罪為重許斯頓牂作郎反之屬是也出奔者雖不死于社稷有興復之望焉託于諸侯猶得寓禮其罪為輕弦子溫子之類是也若夫國滅死于其位是為得正而斃焉者矣于禮為合于時為不幸江黃二國是也其書滅者責方伯連帥之不修其職使小國寡民困于強暴不得其所公羊子所謂亡國之善詞上下之同力者也秋七月附左傳王以戎難故討王子帶秋王子帶奔齊愚按王子帶召戎伐京師入王城圖危王室在王室則管蔡之比也屬籍當絶在天下則王室之賊天下之所當共討也今王以戎難之故聲其罪而討之齊侯不聞其助王而反受其賊之奔又不執以歸京師執以歸于京師有文武之典刑在焉當使司冦議其辟縱王以懿親之故不忍行誅人臣猶當執法以請齊侯推首止之心為王室永除禍本豈至其亂迄十餘年而不定致襄王播遷出居于鄭哉况是時戎患尤亟前年秦晉伐戎以救周齊師不出今年王討戎難而齊受其賊謂之何哉戎伐王室天下古今之大變自幽王以來遂狃以為常事諸侯修方伯之職謂宜以是為勤王之首不在射肩問鼎之次而齊桓之徒曽莫之恤其昧于義而缺于職也甚矣方且使管仲平戎于王夫鄰好和合之謂平戎犯王室而平焉惡用方伯連率為矣戎狄豺狼不可厭也獨不憶是言乎諸夏親昵猶不可棄而况王室天下之元首腹心乎左傳齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋來承王命何以禮焉節時也陪臣敢辭王曰舅氏伯舅之使故曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職不言位而言職者管仲位卑而執齊政故欲以職尊之無逆朕命管仲受下卿之禮而還不敢以職自髙卒受本位之禮不明年春齊侯使仲孫秋聘于周且言王子帶事畢與王言歸復命曰王怒未息其十年乎不十年王弗召也則按以平戎及言子帶二事觀之齊侯之志蓋亦荒矣冬十有二月丁丑陳侯杵臼卒杵公作處十有三年春狄侵衛楚滅弦黃戎伐王室狄今年侵衛明年侵鄭淮夷亦來病杞而不忌交有所侮而動也文武以至誠無息仁義禮樂化成天下而其效猶足以維持于數百年之後五霸以假借仁義收威取勝歡虞一時而其缺露敗壞已見于其身未死之時其事則直書于䇿其義則講于聖人之道者自知之矣夏四月葬陳宣公公會齊侯宋公陳侯衛侯鄭伯許男曺伯于鹹左傳夏會于鹹淮夷病把故且謀王室也秋為戎難故諸侯戌周齊仲孫湫致之榖梁傳兵車之會也杜氏曰鹹衛地東郡漢陽縣東南有鹹城秋九月大雩冬公子友如齊陽榖寧母及鹹之會其後公子友皆如齊僖公委國以聽季氏而季友能善事齊桓數年之間魯國幾治而僖公稱為賢君季友之力也附左傳冬晉荐飢麥禾皆不熟使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎百里秦大夫其即百百奚乎自虞適秦者乎對語正大對曰天災流行國家代有救災恤鄰道也去其行道有福一句丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦于是乎輸粟于晉自雍及絳相繼命之曰泛舟之役十有四年春諸侯城緣陵此會鹹之諸侯也再言諸侯者間有事也不再敘者前目後凡也左氏云不書其人有闕也穀梁云其曰諸侯散辭也並妄緣陵把邑左氏謂辟淮夷遷都淮去杞逺恐無病杞之事公羊謂徐莒脅之徐方屬中國明年楚見伐則必不脅把而敢勞霸主為之城邑而遷矣况莒又素在齊之宇下而敢乎然則把自懼楚而遷耳齊桓城三國而書詞不同胡氏謂城楚丘則歿諸侯而不書城緣陵則書諸侯而不序城邢則再序三國之師何也邢以自遷為文故再列三師而書城邢者美其得救患分災之義無封國之嫌也淮夷病杞諸侯會于鹹城緣陵而遷把焉則其事專矣故前目後凡直書諸侯而不序也衛為狄滅東徙渡河野處曺邑桓公使公子無虧戍以甲士歸之祭服乘馬其力尤勤其功尤大其事尤専而春秋責之尤重曰城楚丘而不書諸侯正王法也今按上無天子下無方伯天下諸侯有相滅亡者能救而存之治亂持危使不失祀此齊桓之美也然此王事也王命仲山甫城彼東方經營四方告成于王凡相救相援皆以奉王職非以相為德而以私惠自留也五霸者假之以為功者也故衛廬漕而楚丘城邢奔播而夷儀遷亡而後存之非是不足以見德桓公有是心焉城把之及事與不及事雖不可考然此城一杞而彼之滅黃圍許與侵衛侵鄭者紛然與吾交騁而莫吾忌也則有以窺吾之不誠而謂吾之為義有所不給故耳至是力亦不贍矣孰謂伯者終能以力服人哉此則桓公之罪也桓公之功罪三處同旨初無差别春秋亦非以詳略見義也胡氏論之過矣專封之説起于公羊以今論之昔未有國今始有國者封也周公之封魯大公之封齊宣王封其母弟于鄭是也若邢若衛若把建國舊矣不幸以王室衰微為外域所侵陵雖都邑殘破而人心未散桓公因而修捍為之改營而植社稷焉此乃救患之常事安得謂之封而以專封為罪哉蓋伯者欲自侈其事自尊其名以為恩比于再造故自謂之封而齊魯諸儒亦眩于其名實陽貶而隂張之曰不與諸侯專封也曰實與而文不與也文不與而實與何異朝四而暮三乎是以聖人之筆為蘇張之口矣夏六月季姬及鄫子遇于防使鄫子來朝鄫似陵反穀作繒後同左傳鄫季姬來寧公怒止之以鄫子之不朝也來寧不書而後年書歸鄫更嫁之文也明公絶鄫昏既來朝而還夏遇于防而使來朝公穀皆謂季姬魯未嫁女使鄫子來請已范氏以為非以左傳為是秋八月卒卯沙鹿崩公羊傳為天下記異也左傳晉卜偃曰期年將有大咎幾亡國胡氏曰書沙鹿崩于前書獲晉侯于後雖不指其事應而事應俱存杜氏曰沙鹿山名在平陽元城縣趙氏曰凡山崩不繫國者以其自有常處不比隕星退鷁也按沙鹿崩與梁山崩一例沙鹿是山名不是疑故不言山從省文也公羊以為河上之邑言崩者襲邑也何注云襲者默陷入地中榖梁謂林屬于山為鹿無崩道而崩故志然則當云陷不得言崩此並妄也狄侵鄭冬蔡侯盻卒盻許乙反臣子慢則赴不具日月春秋因舊文耳先儒謂盻父哀侯為楚所執盻不附中國而常事父讐故惡之而不書日非也附左傳冬秦飢使乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國十有五年春王正月公如齊楚人伐徐左傳徐即中夏故也三月公會齊侯宋公陳侯衛侯鄭伯許男曺伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐帥公作率後同左傳盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之榖梁傳兵車之會也遂繼事也次止也有畏也鄭氏曰牡丘齊地與匡近杜氏曰匡衛地在陳留長垣縣西南公孫敖慶父之子諸侯既盟次匡皆遣大夫將兵救徐故不復具列國按徐素不柔之國宣王常南征焉今慕義而即諸夏尤難得而可嘉也郢在江南徐在淮北越國而伐之楚之憑陵著矣楚志非徐而已也徐齊之南土也伐徐所以震齊之鄰耳齊桓于此謂當朝告而夕救尤以為遲今書盟于牡丘則見諸侯有不協者矣書次于匡則見其宿留無急難之心矣卒之君皆不親而使大夫行惟桓公之志自不足以帥其氣故不能一諸侯之志而作其氣假之者之功烈所以卑而不足道也夏五月日有食之左傳不書朔與日官失之也范氏曰夜食此據傳云不言日不言朔夜食也故云秋七月齊師曺師伐厲左傳謂以救齊也杜氏曰厲楚與國義陽隨縣北有厲鄉按繼此楚敗徐于婁林則伐厲不足以解徐左氏蓋意之也九日齊曺偏師伐厲冬宋人伐曺不請不待終齊桓之世而諸侯散矣八月螽公作􅏑九月公至自會季姬歸于鄫已卯晦震夷伯之廟晦者晦朔之晦據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰于鄢陵並書晦朔則知古史之體應合書曰而遇晦朔必書之以為厯數之證公榖皆云晦冥也非也夷伯魯大夫展氏之祖父夷諡伯字也震者雷擊之公羊曰記異也左氏曰震伯夷之廟罪之也于是展氏有隱慝焉杜氏謂隱惡非法所得尊貴罪所不加聖人因天地之變以設教使人自懲肅此意甚佳然震不出于它處而于夷伯廟故榖梁又以夷伯之廟過制故震之未有以知其然否至公羊以夷伯為季氏之子又曰微者以天戒之故大之而稱夷伯則誕矣大夫既死加諡之後不更稱名如原仲夷伯是也冬宋人伐曺左傳討舊怨也按莊十四年曺與諸侯伐宋逮今幾年矣而討舊怨乎宋自畔伯違盟以私略耳蓋至是而齊伯衰諸侯散矣楚人敗徐于婁林左傳徐恃救也杜氏曰婁林徐地下邳僮縣東南有婁亭按齊桓大合諸侯以救徐而三出三時無功而返故書楚人敗徐以病之十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦始見經左傳晉侯之入也在九年秦穆姬申生姊秦穆夫人屬賈君獻公次妃賈女也焉且曰盡納羣公子羣公子晉武獻之族宣三年傳曰驪姬之亂詛無畜羣公子晉侯蒸于賈君人不納羣公子是以穆姬怨之晉侯許賂中大夫國內執政里丕等既而皆背之賂秦伯以河外列城五按賂上合有許字東盡虢略從河南而東盡虢界南及華山內及解梁城今河東解縣既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉晉侯謂慶鄭曰冦深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚郤犨之父御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事君必悔之弗聽九月晉侯逐秦師使韓簡晉大夫韓萬之孫視師復曰師少于我鬬士倍我公曰何故對曰出因其資入用其寵飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎狃忕也言辟秦則使忕來遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰于韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諌違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅五嫁反迎也秦伯將止之止獲也鄭以救公誤之遂失秦伯獲晉侯以歸經書十一月壬戌十四日經從赴晉大夫反首髮下垂拔草舍止從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至狐突適下國遇太子太子使登車僕而告之曰夷吾無禮余得請于帝矣將以晉界秦按夷吾改葬加諡于申生不薄矣申生有靈不加于肆讒交搆之徒而夷吾是怨誤矣蓋晉人妄托也以至至秦晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以太子瑩廉公名𢎞其母弟與女簡璧瑩𢎞姊妹登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃舍諸靈臺在京兆鄠縣周之故臺大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之若得晉侯入則夫人或自殺大夫其何有焉且晉人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶秦大夫曰不如殺之無聚慝焉子桑曰歸之而質其太子必得大成晉未可滅而殺其君祗以成惡乃許晉平十月晉隂飴音怕甥會秦伯于王城隂飴甥即吕甥也食采于隂故曰隂飴甥王城秦地馮翊臨晉縣東有王城今名為武鄉秦伯曰晉國和乎對曰不和小人恥失其君而悼喪其親親謂父兄為秦所殺不憚征繕以立圉也曰必報讎寧事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉牛羊豕各一為一牢十一月晉侯歸丁丑殺慶鄭而後入是嵗晉又飢秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者于是秦始征晉河東置官司焉按君子喻于義躬自厚而薄責于人則逺怨矣以德報德若是者無入而不自得也晉惠公以賂求入背秦三施秦伯以責報而興戎皆失也以君子聽其輕重則晉之失許食言在先而其應于人也又甚夫名位公器而欲因亂取土地世守而許以賂人本既不正矣出因其資入用其寵飢食其粟而一旦倍之非唯秦之觖望雖晉人固不直惠公矣然則召秦師者惠公也兩國非有父兄之怨疆埸之爭也彼涉吾境我固不得不應然獨不可先之以一介之使以禮義再三辨喻安知秦伯之不悔而還乎下之不獲而後戰則我之士氣亦倍矣而惠公輒使請戰曰寡人不佞能合其衆而不能離也躁而用罔如此烏得不敗而見獲乎程子曰春秋之時諸侯不稟命天王擅相侵伐聖人直書其事而常責夫被侵伐者蓋兵加于已則引咎自責或辨喻之以禮又不得免焉則固其封疆上告之天王下訴之方伯近赴于鄰國必有所直矣茍不勝其憤而與戰則以與之戰者為主責已絶亂之道也斯言可以斷惠公之事矣凡戰之道以主及客主人服則客不戰故戰由主人而成如韓之戰以晉及秦是也凡戰不言及交為主也如秦初伐晉而退晉復追之至河曲交戰之類是也秦伯伐晉而不書伐戰不言伐也胡傳謂専罪晉非是獲晉侯舍諸靈臺而不書以歸異乎以歸也實未嘗以入國又未久即改館而歸之故異乎以歸胡傳謂以歸而不書歸免秦伯也非是君獲不言師敗績君重于師也大夫戰而見獲敗必書師敗績師與大夫敵也如戰于大棘書宋師敗績獲宋華元之類公羊曰君獲不言師敗績此説是惜不竟陸氏曰按左氏晉侯以戎馬還濘而止師實不敗也今按陸説非是安有兩國未嘗交鋒而可以言戰乎戎馬還濘自紀晉侯之所以見獲耳無以見師實不敗也隂飴甥曰小人恥失其君而悼喪其親失其君為君獲喪其親非師敗乎榖梁亦有民未敗而君獲之説俱妄也十有六年春王正月戊申朔隕石于宋五隕公作霣于敏反左傳隕星也公羊傳曷為先言霣而後言石據星霣後言霣霣石記聞聞其磌然視之則石察之則五杜氏曰隕落也聞其隕視之石數之五各隨其聞見先後而記之莊七年星隕如雨見星之隕而墜于四逺不見其在地之驗此則見在地而不見始隕之星史各據事而言是月六鷁退飛過宋都鷁五歷反穀作鶂過五禾反左傳風也杜氏曰是月隕星之月重言是月嫌同曰鷁水鳥髙飛遇風而退宋人以為災告于諸侯故書公羊傳曷為先言六而後言鷁據隕石後言五六鷁退飛記見也視之則六察之則鷁徐而察之則退飛程子曰隕石于來自空凝結而隕六鷁退飛必有氣驅之也春秋所書災異皆天人響應有致之之道人以淺狹之見便以為無應然漢儒拘于事應又皆牽合不足信三月壬申公子季友卒凡諸侯之子稱公子公子之子稱公孫公孫之子不復言公孫則以王父字為氏如鄭穆公之子曰公子騑字子駟其子曰公孫夏其孫則曰駟帶駟乞宋桓公之子曰公子目夷字子魚其子曰公孫友其孫則曰魚莒魚石是也亦有以王父名為氏者魯孝公之子曰公子展其子曰公孫夷伯其孫則曰展無駭展禽鄭穆公之子曰公子豐其子曰公孫段其孫則曰豐卷豐施是也亦有不以王父字為氏而以父字為氏者如公子遂之子曰公孫歸父字子家其後為子家氏是也又如公孫枝字子桑其後為子桑氏亦是也亦有以父名為氏者如公孫牙之子曰公孫兹字戴伯其後為兹氏是也又如季孫鉏字子彌其後為公鉏氏亦是也以名字為氏者甚多左氏但記王父字而已其二曰以次為氏次者長幼之次伯仲叔季之類是也次亦為氏人生其始也皆以長幼呼及乎往來既多交親稍衆則長幼有不勝呼然後命氏焉長幼之次可行于家里而已此次與字之别也所以魯國三家皆以次命氏而亦謂之字焉良由三家同出其始也一家之人爾亦不止如魯三家他如丁氏癸氏以先後别也祖氏禰氏以上下别也第五氏第八氏同居之别也南宫氏南伯氏同稱之别也禮諸侯之卿命于天子平王東徙諸侯無復請命故隱桓及莊之初如無駭俠之類不書族者未賜也未賜族而身為大夫則稱名而已卒而後賜氏故無駭卒不書氏自宋立華氏於是有未死而賜族者矣賜族者皆命之世為卿也季友立僖襄仲立宣二君者不勝私情欲以異賞報之故皆生而賜氏俾世其官經于其卒各以氏書者志變法亂紀之端遺權臣竊命之禍其垂成逺矣夏四月丙申鄫季姬卒內女為諸侯之夫人則書卒以公為之服故也內女之葬不書書者皆非常也莊四年三月紀伯姬卒六月乙丑齊侯葬紀伯姬二十九年冬十二月紀叔姬卒三十年八月癸亥葬紀叔姬襄三十年五月甲午宋災伯姬卒秋七月叔弓如宋葬宋共姬皆以非常而書也胡氏謂紀其卒則必紀其葬有不紀者此筆削之旨非可以例求也恐未是秋七月甲子公孫兹卒附左傳王以戎難告于齊齊徴諸侯而戍周冬十一月乙卯鄭殺子華冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曺伯于淮左傳謀鄫且東略也城鄫役人病有夜登丘而呼曰齊有亂不果城而還杜氏曰淮臨淮郡左右怠于勤王而勤逺略十有七年春齊人徐人伐英氏左傳春齊人為徐伐英氏楚與國以報婁林之役也附左傳夏晉太子圉為質于秦秦歸河東而妻之夏滅項左傳師滅項淮之會公有諸侯之事未歸而取項齊人以為討而止公內諱執皆言止按公猶在齊滅項非公命也向也費伯帥師城郎非公命不書此何以書城郎常事滅項非常事也僖公德季氏擁佑之私假之以權待之不疑其後遂至不可制襄在楚而宿取卞昭在晉而意如納邾莒叛人皆此年滅項啓之故書此志魯君失權之漸也公穀以滅項者齊也曰君子惡惡疾其始善善樂其終桓公嘗有存亡繼絶之功故君子為之諱也事雖非是以其語而存之杜氏曰項國今汝隂項縣秋夫人薑氏會齊侯于卞卞皮彥反左傳秋聲薑以公故會齊侯于卞杜氏曰卞魯國卞縣九月公至自會左傳九月公至書曰至自會猶有諸侯之事焉且諱之也恥見執故託會以告廟按臣滅項而止其君非討也會夫人而歸公非禮也由臣得罪霸主而反國不討無政也冬十有二月乙亥齊侯小白卒左傳齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好內多內寵內嬖如夫人者六人長衛姬生武孟公子無虧少衛姬生惠公公子元鄭姬生孝公公子昭葛嬴生昭公公子潘密姬生懿公公子商人宋華子華氏之女子姓生公子雍公與管仲屬孝公于宋襄公以為太子雍巫雍人名巫即易牙有寵于衛共姬因寺人貂以薦羞于公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因內寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛已夜殯六十七日乃殯史記曰五公子各樹黨爭立桓公卒遂相攻以故宫中空莫敢棺桓公尸在牀六十七日尸蟲出于户無虧立乃棺赴東萊吕氏曰管仲始進説于桓公盤逰縱佚之屬皆曰不害伯其深戒痛絶以為害伯者獨參用小人而已仲之意謂有抑必有揚有操必有縱故其得政之始首與君約舉一國之樂皆歸君舉一國之權皆歸已其所以得有為者固以此抑不知資人君之樂者君子乎小人乎名曰佚樂未有不資小人者名曰小人未有不貪權勢者已許其縱佚樂而禁其近小人容其近小人而禁其勿侵權勢必不之能也仲急於功利亟欲得齊之柄不暇長慮而為是約至寺人貂漏師多魚恃寵干政正犯仲之約而不能誅則固已隂悔初約之謬矣逮仲將死始言豎刁開方易牙之姦欲併逐之平時則不敢排擊以為保自之計將死則盡言不諱以取知人之名其自為謀亦巧矣嗚呼管仲輔桓之初心其自期何如邪卒使桓公不能自定其子區區與仲屬所欲立于宋襄公者乃內嬖鄭姬之子于次未當立者也致五公子交爭國統殆絶自死不殯蟲流户外其亦可哀也夫其亦可鑒也夫十有八年春王正月宋公曺伯衛人邾人伐齊宋公下公羊有會字左傳宋襄公以諸侯伐齊三月齊人殺無虧榖梁傳非伐喪也附左傳鄭伯始朝于楚按此特筆也夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績甗魚免反又魚偃反又音言一音彥左傳齊人將立孝公不勝四公子之徒無虧已死故曰四公子遂與宋人戰夏五月宋敗齊師于甗立孝公而還榖梁傳戰不言伐客不言及言及惡宋也程子曰書宋及曲在宋也奉少以奪長其罪大矣齊師敗績書敗責齊臣也杜氏曰無虧既死曺衛邾先去魯亦罷歸故宋師獨與齊師戰甗齊地何氏曰戰言及所以别主客直不直也鄭君曰及者别異客主耳不施于直與不直也直不直自在事而已李亷曰鄭説固足以辨何氏之失然兵凶戰危不得已而用之何得汲汲欲戰故凡志乎是戰者春秋皆貶之秋救齊秋八月丁亥葬齊桓公趙氏曰十一月而葬亂故八月無丁亥日誤西山真氏曰嫡庶不分繼嗣不定此有國之大患以桓公管仲之君臣而昧于此及諸子爭立無虧為國人所殺孝公立十年而其子為公子潘所殺潘立是為昭公十九年春卒子舍立又為公子商人所殺商人立是為懿公四年而遇弒國人迎公子元立之是為惠公蓋變亂相尋三十餘年而後已夫子頽子帶之禍桓公管仲所親見也而不之戒卒使禍流後嗣甚于王室豈非來世之永鑒哉家語子貢問于孔子曰今之人臣孰為賢子曰吾未識往者齊有鮑叔鄭有子皮則賢者矣子貢曰齊無管仲鄭無子産乎子曰賜汝徒知其一未知其二也汝聞用力為賢乎進賢為賢乎子貢曰進賢賢哉子曰然吾聞鮑叔達管仲子皮達子産未聞二子之達賢已之才者也按蘇胡允嘗有論責管仲不因桓公之問舉天下之賢者以自代蓋祖之家語冬邢人狄人伐衛左傳邢人狄人伐衛圍菟圃陸氏曰凡夷狄用兵唯舉國號如與諸侯列敘侵伐盟會則稱人以便文而君臣同辭他皆放此按陸説甚是榖梁謂狄稱人善纍而後進之伐衛所以救齊也此説非也狄懷禍心于中國久矣桓公在已嘗侵衛今乘齊亂又以救齊為名而興師伐衛宋襄之徒奉少奪長伐齊之喪而反使狄得以為辭邢衛皆嘗亡于狄賴齊而存今邢忘讎棄親而聽其驅以伐兄弟同難之國春秋書之所以傷列國之無人見狄人之益橫以為諸矦不能自強于禮義之明戒也或者反謂善其救齊失夫春秋之旨矣十有九年春王三月宋人執滕子嬰齊啖氏曰春秋時以強暴弱故執諸侯皆稱人亂辭也以私相執不歸京師趙氏曰被執失地則名不然則否滕嬰齊戎蠻赤失也凡執不言釋唯言釋宋公杜氏曰傳例不以名為義書名及不書名皆從赴今按稱人啖氏説是書名杜氏説是夏六月宋公曺人邾人盟于曺南公作宋人蜀杜氏曰公羊宋稱人誤按春秋諸會在國者即以國地而地主不列見會其國即地主與焉不言可知也此會地于曺南而曺人在列杜預因謂曺雖與盟而不心服不肯致餼無地主之禮此蓋因下文宋人圍曺傳云討不服而生此説耳鄫子會盟于邾杜氏曰不及曺南之盟諸侯既罷鄫子乃會之于邾故不言如會蓋鄫子如會適遇宋公歸國及邾之境故言會盟于邾已酉邾人執鄫子用之左傳宋公使邾文公用鄫子于次睢之社欲以屬東夷汴從河出睢從汴出此水次有妖神東夷皆社祀之次水旁也司馬子魚公子目夷曰古者六畜不相為用謂若祭馬先不用馬小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰享之齊桓公存三亡國魯衛邢以屬諸侯義士猶曰薄德謂欲因亂取魯緩救邢衛今一會而虐二國之君又用諸淫昏之鬼將以求伯不亦難乎得死為幸陸氏曰執鄫子用之取其血與之盟趙氏曰緣盟用之同于牲也杜氏曰不書宋使邾而以邾自用為文南面之君善惡自専不得托之于他命按用之據左氏是殺人以致祭二傳皆謂叩其鼻以衈釁也音二社陸氏謂取其血與之盟陸説頗合情理鄫子後會非大罪逆殺而用之如牲以祭社宋公邾人雖無道恐不至如是之殘忍也趙氏曰曺南之盟自是大夫盟耳若宋公自曺還宋何得路出于邾哉左氏云用之次睢之社以睢水在宋附會為此説據鄫子會于邾何得至宋哉按曺南之盟宋公當從公羊作宋人為是若霸主在曺邾無使大夫與盟之理秋宋人圍曹左傳宋人圍曺討不服也子魚言于宋公曰文王聞崇德亂而伐之崇崇侯虎軍三旬而不降退修教而伐之因壘而降今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動衛人伐邢左傳衛人伐邢以報菟圃之役于是衛大旱卜有事于山川不吉寧莊子曰昔周飢克殷而年豐今邢方無道諸侯無霸天其或者欲使衛討邢乎從之師興而雨按雨乃偶然天豈助虐甚矣寧莊子之逢君而左氏之好誣也按邢舍狄怨而從狄伐衛衛舍狄怨而専伐邢邢或被脅衛則肆忿也其惡大矣冬會陳人蔡人楚人鄭人盟于齊公作公會盟楚始與夏左傳陳穆公請修好于諸侯以無忘齊桓之德冬盟于齊修桓公之好也宋襄暴虐故思齊桓杜氏曰地以齊齊亦與盟按此盟以不忘齊桓之德為辭齊桓仗義以伐楚屈完來盟于師得尊中國攘夷狄之義未嘗引楚而內之也內楚而列于齊盟自此會始或者皆知合南北之成自向戌始而不知此會已為之權輿矣陳合齊楚之成而楚執宋公宋合晉楚之成而楚爭為長楚人衷甲冦不可啓漸不可長此之謂也梁亡左傳梁亡不書其主不書取梁者主名自取之也初梁伯好土功亟成而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁二十年春新作南門左傳書不時也失土功之時凡啓塞從時門戶道橋謂之啓城郭墻塹謂之塞榖梁曰作為也有加其度也言新有故也啖氏曰作門戶為啓當用春分以後城郭為塞當用秋分以後順天時以開閉也杜氏曰魯城南門也本名稷門僖公更髙大之今猶不與諸門同胡氏曰南門者南非一門也庫門天子臯門雉門天子應門天子五門臯庫應雉路魯有庫雉路魯之庫門制似天子臯門雉門制似天子應門夏郜子來朝郜古報反陸氏曰公羊云失地之君也按經無異文無所據也杜氏曰郜姬姓國後漢志濟隂城武北有郜城五月乙已西宫災公羊傳西宫者何小寢也小寢則曷為謂之西宫有西宫則有東宫矣魯子曰以有西宫亦知諸侯之有三宫也杜氏曰公别宫天火曰災何氏曰禮夫人居中宫少在前右媵居西宫左媵居東宫少在後鄭人入滑左傳滑人叛鄭而服于衛夏鄭公子士鄭文公子泄堵冦鄭大夫帥師入滑秋齊人狄人盟于邢左傳秋盟于邢為邢謀衛難也于是衛方病邢榖梁傳邢為主焉爾邢小其為主何也其為主乎救齊按齊已定何救齊之有左氏是冬楚人伐隨左傳隨以漢東諸侯叛楚冬楚鬬榖於莵帥師伐隨取成而還附左傳宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟按臧文仲之言天下之名言也二十有一年春狄侵衛杜氏曰為邢故按有他國則狄同稱人無他國則狄還本號而止稱狄益見進之之説非是宋人齊人楚人盟于鹿上左傳春宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗杜氏曰鹿上宋地汝隂有原鹿縣宋為盟主故在齊上按齊楚力敵齊義方著楚少懦焉故楚服而齊霸晉楚力敵楚勢方張晉少懦焉故南北合成而晉楚兩霸宋不強于魯衛而常有先諸侯之志前之襄公後之王偃其轍一也襄公徒慕齊桓假借仁義之迹而欲效之故不鼓不成列不禽二毛以為仁立孝公以為義徒慕齊桓以不戰屈楚之迹而欲效之故為鹿之盟以求諸侯而楚陽許之致而執之直以兒戲視之耳偃之王政襄之王道也偃之射天襄之用鄫子也夏大旱經書大旱二此年及宣七年秋孔氏曰春秋之例旱則修雩雩而得雨喜雩有應則書雩不書旱雩不得雨則書旱明災成也按郎覬謂魯僖遭旱修政自敕時雨自降然考于春秋初書不雨書雨已而書大旱公之晚政荒矣秋宋公楚子陳侯蔡侯鄭伯許男曺伯會于盂執宋公以伐宋盂公作霍穀作雩或作宇楚始書子左傳秋諸侯會宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之于是楚執宋公以伐宋榖梁傳孰執之楚子執之曷為不言楚子執之不與夷狄之執中國也按鹿上之盟楚嘗許宋以諸侯故為今會以定之執宋公以同執為文榖梁謂不與夷狄之執中國胡氏謂諸侯皆在會而蠻夷執其會主拱手以聽而莫之違故以分惡于諸侯也此皆得之抑宋襄一會而虐二國之君先為中國諸侯之所共嫉故楚得以乘間而諸侯莫違亦以見德義尊則人聽制命于已德可賤則已聽制命于人求諸侯志將以為雄也而其道一失非唯強楚得而加之陳蔡鄭曺許皆得而加之矣此春秋書法之意也鹿上之盟固楚人將誘而致之未容有他亦恃有齊在焉今之會齊不至事可疑矣陳蔡鄭許皆楚之黨而曺又宋之讐也見執烏乎疑春秋書吳楚之事初舉號繼而書爵皆曰子蓋因事異文有不得不然者非漸進之也蠻夷之君雖大曰子此周之舊典故吳楚僣王而春秋書之曰子以從舊典正大分也冬伐邾左傳任今任城縣宿須句在東平須昌縣西北顓臾在太山南武陽縣東北風姓也實司太皥伏羲也四國太皥之後與有濟之祀四國封近于濟以服事諸夏邾人滅須句須句子來奔因成風也成風為之言于公曰崇明祀保小寡周禮也蠻夷滑夏周禍也若封須句是崇皥濟而修祀紓禍也按此伐邾杜氏曰為邾滅須句故至二十二年復伐邾取須句楚人使宜申來獻捷公羊傳此楚子也其稱人何為執宋公貶之也宋公與楚子期以乘車之會公子目夷諌曰楚夷國也強而無義請君以兵車之會往宋公曰不可吾與之約以乘車之會自我為之自我墮之不可終以乘車之會往楚人果伏兵車執宋公以伐宋宋公謂公子目夷曰子歸守國矣吾不從子之言以至此公子目夷歸設守械而守國楚人謂宋人曰子不與我國吾將殺子君矣宋人應之曰吾賴社稷之神靈吾國已有君矣楚人知雖殺宋公猶不得宋國于是釋宋公公子目夷逆襄公歸榖梁傳捷軍得也其不曰宋捷何也不與楚捷于宋也按楚執宋公以伐宋將求諸侯也魯初不與故獻捷以威之晉景公使鞏朔獻齊捷于周天子猶責其姦先王之禮况于蠻夷陵暴中國而可受其捷乎魯義不能自強而遏楚之橫禮不能正亂以拒楚之使直書不待貶而義自見者也不言宋捷者杜預謂秋伐宋冬來獻捷事不異年從可知此説是也公羊謂為襄公諱胡康侯謂為魯諱此皆過矣不稱楚子使來不稱君命行禮或謂楚子貶而稱人亦誤十有二月癸丑公會諸侯盟于薄釋宋公左傳冬會于薄以釋之子魚曰禍猶未也未足以懲君榖梁傳不言楚不與楚專釋也按義同執杜氏曰薄史記作亳漢山陽薄縣即湯都張氏曰拱州考城漢薄縣按宋公先伐之後方修衣裳之會欲赴楚而納之而楚人包藏禍心潛伏兵車執之壇坫之上義甚不直而懸車深入淹歷秋冬師亦已老矣使中國有人焉以大義責其曲以重兵乘其老則走蠻荆釋宋公在我掌握耳豈至反與歃血要言求而釋之哉凡書諸侯見執而不失國例曰某侯某歸于某今不書宋公歸于宋而曰釋宋公見諸侯之失也二十有二年春公伐邾取須句句其俱反公作昫左傳伐邾取須句反其君焉禮也張氏曰須句今東平府須城縣按左氏謂須句國也邾滅之公伐邾而取之反其君焉禮也若是則魯之美事春秋當書邾滅須句須句子來奔公伐邾歸須句子于須句如歸邾子益之文然後明白今直書公伐邾取須句如莒人伐把取牟婁之類則須句為邾所滅而國為邑久矣魯伐邾而取邑耳未見反其君而修皥濟之祀也直書于䇿以見其無崇明祀保寡小之實至文公七年又書伐邾取須句是須句嘗反之邾而文公又伐取也夏宋公衛侯許男滕子伐鄭左傳三月鄭伯如楚夏公伐鄭子魚曰所謂禍在此矣杜氏曰怒鄭如楚故伐之為下泓戰起附左傳初平王之東遷也辛有適伊川辛有周大夫伊川周地伊水名見被髮而祭于野者曰不及百年此其戎乎其禮先亡矣秋秦晉遷陸渾之戎于伊川允姓之戎居陸渾在秦晉西北二國誘而徙之伊川遂從戎號至今為陸渾縣也晉太子圉為質于秦謂嬴氏曰與子歸乎對曰子晉太子而辱于秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸富辰周大夫言于王曰請召太叔王子帶十二年奔齊詩曰小雅協比其鄰和合近親昏姻孔云昏姻甚相歸附也云旋也吾兄弟之不協焉能怨諸侯之不睦王説王子帶自齊復歸于京師王召之也秋八月丁未及邾人戰于升陘陘音刑左傳邾人以須句故出師公卑邾不設偹而禦之臧文仲曰國無小不可易也無偹雖衆不可恃也君其無謂邾小蜂蠆有毒而况國乎弗聽八月丁未公及邾師戰于升陘我師敗績邾人獲公胄兜鍪縣諸魚門邾城門杜氏曰升陘魯地啖氏曰凡魯勝則曰敗某師榖梁云內不言戰舉其大者舉敗彼足知戰此説是也敗則但書戰而已不可斥言也公羊云內不言戰言戰乃敗績也榖梁云內諱敗舉其可道者二説並通冬十有一月己巳朔宋公及楚人戰于泓宋師敗績榖梁傳日事遇朔曰朔左傳楚人伐宋以救鄭宋公將戰大司馬固諌曰大司馬固莊公之孫公孫固也天之棄商久矣君將興之弗可赦也已言違天必取禍弗聽冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰子魚彼衆我寡及其未及濟也請擊之司馬此言非也或者以咎襄公不從司馬之言而致敗殊非理襄公自有以致敗耳公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官守門者師行則在君左右殱焉國人皆咎公公曰君子不重傷不禽二毛頭白有二色古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列恥以詐勝軍法鳴鼓以戰因謂交戰為鼓彼未成列則此不鼓也公之所言並是正道杜氏曰泓水名按襄公甫脫釁鼓之餘以歸不能引咎責躬修德勤政內輯其國外和四鄰蓄威養重待時而動而伐鄭以挑楚不度德不量力不徴詞欲無敗得乎司馬子魚于其用鄫子也曰齊桓公存三亡國義士猶曰薄德今一會而虐二國之君將以求伯不亦難乎于其圍曺也曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降今君德無乃猶有所闕而以伐人若之何盍姑內省德乎于其盟鹿上也曰小國爭盟禍也宋其亡乎幸而後敗于其會盂也曰禍其在此乎君欲已甚于其釋于薄也曰禍猶未也未足以懲君于其伐鄭也曰所謂禍在此矣凡襄公之舉皆其所以敗也而子魚必有言其言也不違于道義而盡利害之情使襄公能聽其一猶及有所救奈之何其皆弗聽也則不待于泓之戰而知其必敗矣以子魚平日之言則知逮其未畢濟而擊之未畢陳而擊之者非子魚之言也襄公猶恥以詐勝仁且知如子魚而肯反以此勸之乎子魚籌所以勝楚者豈他無其道乎襄公自用而不委之以師臨戰而子魚無言蓋知不可言矣若掩擊之言則決非子魚之言也左傳子魚曰君未知戰以下今並削之司馬恐是公孫固子魚字誤也楚稱人戰以宋主見城濮經下榖梁曰過而不改是謂之過襄公之謂也倍則攻敵則戰少則守二十有三年春齊侯伐宋圍緡緡亡巾反穀梁作閔後同左傳以討其不盟于齊也榖梁傳伐國不言圍邑此其言圍不正其以惡報惡也杜氏謂十九年盟于齊以無忘桓公之德而宋獨不會復召齊人共盟鹿上故今討之按此蓋受指于楚也宋襄公爭霸陵弱雖不義奉少奪長雖不順然于齊孝公不可謂無私德矣况鹿上之盟昭如也今乘其敗于楚而背之且會盂不來盟薄不與執宋公而齊坐視釋宋公而齊無力則齊之負宋也多矣于時荆楚之勢方張既無尊中國攘夷狄以纘父遺烈之志又無恤災患畏簡書以申固鄰好之心乃受指于人伐國圍邑春秋所惡也故書以著其罪凡書伐國圍邑討得其罪桓公伐鄭圍新城是也討得其罪則諸侯遂圍許圍宋彭城同圍齊皆非譏也徒恃兵力則雖攻其內邑之背叛如圍棘圍費圍鄆圍郈春秋未嘗與之也杜氏曰緡宋也髙平昌邑縣東南有宋緡城夏五月庚寅宋公兹父卒兹公作慈左傳夏五月宋襄公卒傷于泓故也魯不會故不書葬秋楚人伐陳左傳秋成得臣帥師伐陳討其二于宋也成得臣子王也遂取焦今焦縣夷一名城父今譙郡城父縣二地皆陳也城頓而還頓國今汝隂南頓縣子文以為之功使為令尹叔伯楚大夫薳吕臣曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與音餘句絶有幾西山真氏曰此言有得有失有功當賞固也然令尹相職也豈賞功之官乎其後子玉訖不勝任喪師而死若多與之邑則可矣薳吕臣知子玉之不可為令尹及其自為也乃奉已而不在民何責人之易而盡已之難也近世武臣有以勞而求節鉞者當國者抑而不與卒以召禍正如子文之言是亦不可不戒也按楚伐陳左氏以為討其二于宋恐未是曺南之盟伐鄭之役陳皆不與會盂執宋公盟薄釋宋公陳皆從楚考之經唯見陳之服于楚未見其二于宋也蓋陳蔡與鄭皆楚之所欲服屬而不欲其二于中國者也伐宋之後鄭既朝楚則威陳蔡以及曺許里所必至故以討二為名而伐取其二邑陳頓之爭始此附左傳九月晉惠公卒經在明年從赴懷公子圉命無從亡人重耳期如字期音基而不至無赦狐突之子毛及偃子犯從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名名書于所臣之䇿委質屈膝而君事之二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之曰乃大明服已則不明而殺人以逞不亦難乎民不見德而唯戮是聞其何後之有冬十有一月把子卒左傳把成公卒書曰子杞夷也不書名未同盟也凡諸侯同盟死則赴以名禮也赴以名則亦書之謂未同盟不然則否謂同盟而不以名告辟不敏也趙氏曰左氏云把成公卒書曰子把夷也按蠻夷之君雖大曰子降而稱子似亦有理薛乃稱伯把亦多稱伯有何理哉左氏不達國小降名之意誤為此説舊説皆云赴告廢先王之禮故貶之且升降名位當由王者若魯史專自貶降爵位乃春秋自為亂也且春秋若實以削黜為義則諸侯惡事非一何不黜其名位哉又以後把或稱伯即云捨夷禮或稱子即云復用夷禮彼二王之後常預大國盟會豈是兒童屢舍屢行哉蓋知是伯主升降之耳附左傳昔公子重耳之及于難也晉人伐諸蒲城蒲城人欲戰重耳不可遂奔狄從者狐偃趙衰趙夙弟顛頡魏武子魏犨司空季子胥臣臼季也時狐毛賈他皆從而獨舉此五人賢而有大功處狄十二年而行將適齊三字在前今有刪節移置之此過衛衛文公不禮焉及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀于桑下蠶妾在其上以告薑氏薑氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之薑曰行也懷與安實敗名公子不可薑與子犯謀醉而遣之及曺曺共公聞其駢脅合幹欲觀其祼浴薄迫也而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國若以為相夫子必反其國反其國必得志于諸侯得志于諸侯而誅無禮曺其首也子盍蚤自二焉乃饋盤飱置璧焉公子受飱反璧及宋襄公贈之以馬二十乘及鄭鄭文公不禮焉及楚楚子享之曰公子若反晉國則何以報不榖對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君此問此對良非偶然夷吾之人曰人實有國我何愛焉多以土地許秦而後倍之所以起釁者矣曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇于中原其辟君三舍若不獲命其左執鞭弭弭弓末無緣者右屬櫜古刀反以受箭鞬九言及以受弓以與君周旋子玉請殺之楚子曰吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之乃送諸秦秦伯納女五人懷嬴與焉子圉妻他日公享之公子賦河水逸詩公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳六月詩小雅道尹吉甫佐宣王征伐重耳敢不拜二十有四年春王正月附左傳春王正月秦伯納之不書不告入也及河子犯以璧授公子曰臣負羈絏羈馬絡首絏馬韁從君巡于天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏子犯重耳舅同心者有如白水投其璧于河濟河圍令狐入桑泉在河東解縣西令力丁反取臼衰衰初危反解縣東南有臼城二月甲午晉師軍于廬栁懷公追軍距重耳秦伯使公子縶如晉師師退軍于郇解縣西北有郇城辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫戊申使殺懷公于髙梁懷公奔髙梁髙梁在平陽縣西南不書亦不告也吕卻吕甥郤芮惠公舊臣畏逼害也將焚公宫而弒晉侯寺人披請見公使讓之且辭焉曰蒲城之役君命一宿女即至其後余從狄君以田渭濱女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鈎而使管仲相乾時之役管仲射桓公中帶鈎君若易之反齊桓何辱命焉行者甚衆豈唯刑臣公見之以難告三月晉侯潛會秦伯于王城己丑晦公宫火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏秦穆公女文嬴也以歸秦伯送衛于晉三千人實紀綱之僕晉侯賞從亡者介之推文公臣之語助不言祿祿亦弗及推曰獻公之子九人唯君在矣惠懷無親外內棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜况貪天之功以為己力乎下義其罪上賞其姦上下相蒙難與處矣遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善人西河界休縣南有地名綿上夏狄伐鄭左傳鄭之入滑也在二十一年滑人聽命師還又即衛鄭公子士泄堵俞彌堵俞彌鄭大夫帥師伐滑王使伯服遊孫伯如鄭請滑二子周大夫鄭伯怨惠王之入而不與厲公爵也事在莊二十一年又怨襄王之與衛滑也怨王助衛為滑請故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之太止以德撫民無親疏也其次親親以相及也先親以及疏推恩以明義昔周公弔傷也二叔管叔蔡叔或云夏殷之叔世之不咸同也故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曺滕畢原鄷郇十六國皆文王子文之昭也𨝍晉應韓武之穆也四國皆武王子凡蔣邢茅胙祭周公之胤也召穆公周卿士名虎召采地扶風雍縣東南有召亭思周德之不類故糾合宗族于成周而作詩曰棠棣之華鄂不􅙽􅙽以喻兄弟和睦則強盛而有光輝凡今之人莫如兄弟其四章曰兄弟鬩于墻外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勳親親昵近尊賢德之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也鄭有平惠之勳平王東遷晉鄭是依惠王出奔虢鄭納之又有厲宣之親鄭始封之祖桓公友厲王之子宣王母弟棄嬖寵申侯子華而用三良叔詹堵叔師叔于諸姬為近四德具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之當周公時故言有懿德其懷柔天下也猶懼有外侮捍禦侮者莫如親親故以親屏周召穆公亦云周公作詩召公歌之故言亦云今周德既衰于是乎又渝周召以從諸姦民未忘禍王又興之其若文武何王弗聽使頽完桃子出狄師二子周大夫夏狄伐鄭取櫟王德狄人將以其女為后富辰諌曰不可臣聞之曰報者倦矣施者未厭施功勞也有勞則望報過甚狄固貪婪王又啓之女德無極婦怨無終狄必為患王又弗聽初甘昭公王子帶也食邑于甘河南縣西南有甘水有寵于惠后惠后將立之未及而卒昭公奔齊王復之又通于隗氏王所立狄后王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圗之王遂出及坎欿坎若感反欿大感反坎欿周地國人納之秋頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰原毛皆采邑王出適鄭處于汜鄭南汜也在襄城縣南大叔以隗氏居于溫秋七月宋及楚平宋公如楚諸侯朝楚者有矣宋故霸國霸國朝楚未之有也冬天王出居于鄭左傳冬王使來告難曰不榖不德得罪于母氏之寵子帶鄙在鄭地汜鄙野也敢告叔父臧文仲對曰天子蒙塵于外敢不奔問官守王使簡師父告于晉使左鄢父告于秦二子周大夫天子無出書曰天王出居于鄭辟母弟之難也天子凶服素服降名稱不穀禮也鄭伯與孔將鉏石甲父侯宣多省視官具于汜三子鄭大夫省官司具器用而後聽其私政禮也晉侯夷吾卒杜氏曰晉文定位而後告惠公之喪故書于今年永嘉吕氏曰左氏記惠公卒在去年九月蓋春秋所據者魯史也左氏所據者他國之史也年月不同不可得而考矣二十有五年春王正月丙午衛侯燬滅邢左傳衛侯燬滅邢同姓也故名按諸家皆謂衛滅同姓故罪而生名之朱子謂經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而傳寫之誤此不易之見也記曲禮曰諸侯失地名滅同姓名小戴禮多漢儒雜説援春秋三傳以立文耳夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦杜氏曰伯姬魯女為宋大夫蕩氏妻自為其子來逆稱婦姑存之辭婦人越境逆婦非禮故書胡傳伯姬公女也而配蕩氏其往嫁不見于經者國君不與大夫敵也今來逆婦而史䇿書之見公失禮下主大夫之昏是慢宗廟卑朝廷姑自逆婦其失明矣宋殺其大夫附左傳秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文文侯之業而信宣于諸侯今為可矣晉侯辭秦師而下三月甲辰次于陽樊右師圍溫左師逆王夏四月丁巳王入于王城取太叔于溫殺之于隰城戊午晉侯朝王王饗醴命之宥既行饗而設醴酒又加之以幣帛以助勸也宥助也請隧闕地通路曰隧王之葬禮也諸侯皆縣柩而下弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原攢茅之田晉于是始啓南陽在晉山南河北故曰南陽陽樊不服圍之蒼葛陽樊人呼曰德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民取其土而已秋楚人圍陳納頓子于頓左傳秋秦晉伐鄀音若國名秦楚界上小國其後遷于南郡鄀縣楚鬭克申公子儀屈禦冦息公子邉以申息之師戍守也商密鄀别邑今南鄉丹水縣二子屯兵于析以為商密援秦人過析隈析楚邑一名曰科今南陽析縣隈隱蔽之處入而係輿人以圍商密昏而傅焉係輿人詐為克析得其囚俘者昏而傅城不欲令商密知囚非析人宵坎血加書偽與子儀子邉盟者掘地為坎以埋盟之餘血加盟書其上商密人懼曰秦取析矣戍人反矣乃降秦師囚申公子儀息公子邉以歸楚令尹子玉追秦師弗及遂圍秦納頓子于頓杜氏曰頓迫于陳而出奔楚故楚為頓圍陳以納頓子不言遂一事也頓國汝隂南頓縣按楚圍陳納頓子于頓書法如楚伐吳執齊慶封殺之蓋一事耳夫頓小弱而介于陳楚陳欲迫而并兼之故前年楚伐陳城頓而還此年納頓子以保恤小寡示恩以大義責陳而攝服之皆爭主夏盟之意納者不與納也葬衛文公附左傳冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫于兾趙衰為原大夫狐溱狐毛之子為溫大夫冬十有二月癸亥公會衛子莒慶盟于洮左傳衛人平莒于我十二月盟于洮修衛文公之好且及莒平也按莒以元年獲拿之故怨魯未嘗通衛文公將平之未及而卒成公斬然衰絰中為洮之會平莒于我成父志也然莒子不至以慶如會慶魯壻故蓋平之意出于衛莒疑魯之未肯平故以大夫聽命至明年向之盟而始成焉衛成公稱子未踰年也是時諸侯喪柩在堂而孤有外事者習以為常至如此區區者非甚不得已而亦越禮以為之甚矣事接于我雖非命卿皆書名榖梁云莒無大夫其曰莒慶以公之會目之也鑿説也君盟大夫自浮來而已然矣此不貶者從同杜氏曰洮魯地二十有六年春王正月己未公會莒子衛寧速盟于向速公作遫後同左傳公會莒兹丕公兹丕時君之號莒夷無諡以號為稱寧莊子盟于向尋洮之盟也莒今知魯肯平故莒子親來衛知魯莒已可平故在喪不再行而使大夫左氏言尋洮之盟洮之盟才一月何尋之有僖公以前盟莒子不親至故復為此會向者盟其大夫今衛又使大夫盟公皆失也杜氏曰向莒地齊人侵我西鄙公追齊師至􅈶弗及􅈶户圭反公作巂穀作嶲弗左作不左傳齊人伐我西鄙討是二盟也按是時晉文初起諸侯無伯齊侯是桓公之子以盟主自居故以洮向二盟來討無名興師可見故書侵以􅏺之于例將卑師少稱人將卑師衆稱師此來去一也而師人異文者據人本微者之稱侵曰人追曰師自不容不變文耳無他義也榖梁言美公能逐其師故大之而曰師非也胡氏謂前見弱以誘魯後伏衆以邀魯並非本義公逐齊師逺至齊地􅏺不言而可見趙氏曰冦至不知追而不及言內之無戎備也按此夏齊再來伐展禽有辭齊侯乃還比事而觀得失見矣杜氏曰濟此榖城縣西有地名􅈶下非紀季所入之􅈶夏齊人伐我北鄙衛人伐齊左傳夏齊孝公伐我北鄙衛人伐齊洮之盟故也公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱于敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職主也之太公為太師兼主盟載之事桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還公子遂如楚乞師書乞師始此左傳東門襄仲襄仲居東門故以為氏臧文仲為襄仲副故不書如楚乞師臧孫見子玉而道之伐齊宋以其不臣也不臣事王室按師出不正反戰不正勝古人重師重人之罪也非所乞也征伐自天子出國之大小師之衆寡皆有王制不可乞也故凡乞師與以某之師皆罪也而况乞師于南蠻導南蠻以伐中國乎夫子嘗罪臧文仲竊位觀其從襄仲借兵強夷為國之無謀可見矣展禽一言足以却齊則所以折衝禦侮必有道矣乃知其賢而不與立也一僖公也其先任公子友而從齊桓公則智其晚任公子遂而天下無伯則愚其始也頌于詩曰公車千乘公徒三萬戎狄是膺荆舒是懲以其從桓伐楚也其終也春秋書曰公子遂如楚乞師公以楚師伐齊取榖下喬木而入幽谷其斯舉之謂乎秋楚人滅夔以夔子歸夔求龜反公作隗杜氏曰夔楚同姓國今建平秭歸縣左傳夔不祀祝融髙辛氏之火正楚之逺祖與鬻熊祝融之十二世孫楚人讓之對曰我先王熊摰楚嫡子有疾不得嗣位鬼神弗赦而自竄于夔别封為夔子吾是以失楚又何祀焉秋楚成得臣令尹子玉鬬宜申司馬子西帥師滅夔以夔子歸按楚祖鬻熊夔祖熊摯諸侯祀不過其祖夔子之對楚問正也其激楚怒而見滅者以激之忿而奪言之正耳乃若楚本志在貪其土地而假不祀以為名滅同姓而以歸書以甚楚之惡不待貶而義見矣冬楚人伐宋圍緡緡亡巾反穀作閔左傳宋以其善于晉侯也叛楚即晉楚令尹子玉司馬子西帥師伐宋圍緡按宋襄公傷于泓而死為之子者有越勾踐之志則楚者必報之讐也前年乃與之平而往朝之晉文初興宋所依以雪讐恥者莫如晉從晉得矣曷若遂以楚陵中國有無王室之心告之天王協諸夏以討之乎大義既明不待晉重耳區區譎勝以為功矣左傳謂叛楚即晉何其乖又謂宋以其善于晉侯何其陋也公以楚師伐齊取榖左傳公以楚師伐齊取榖凡師能左右之曰以置桓公子雍于榖易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫于楚按世世子孫無相害也魯以先王之命退齊師而又自犯先王之命謂之何哉楚方西滅夔北討宋二東討齊強微晉文則楚遂伯矣楚志欲逞魯又導之書以楚師書伐取不待貶絶而惡自見矣公至自伐齊穀梁傳惡事不致此其致之何也危之也二十有七年春把子來朝左傳春把桓公來朝用夷禮故曰子公卑杞把不共也杜氏曰把迫于東夷風俗雜壞言語衣服有時而夷然異于介葛盧故有爵夏六月庚寅齊侯昭卒左傳齊孝公卒有齊怨不廢喪紀禮也弟潘弒其子而自立是為昭公秋八月乙未葬齊孝公乙巳公子遂帥師入把左傳責無禮也冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戌公會諸侯盟于宋左傳冬楚子及諸侯盟宋宋公孫固如晉告急先軫曰報施救患取威定伯于是乎在矣狐偃曰楚始得曺而新昏于衛若伐曺衛楚必救之則齊宋免矣前年楚使申叔侯戍穀以逼齊于是乎搜于被廬晉常以春搜禮改政令敬其始也被廬晉地作三軍閔元年晉獻公作二軍今復大國之禮謀元帥中軍帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也上二句是此一語便錯夏書曰賦納以言明試以功車服以庸君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓于狐毛偃之兄也而佐之命趙衰為卿讓于欒枝貞子也欒賔之孫先軫使欒枝將下軍先軫佐之荀林父御戎魏犫為右荀林父中行桓子晉侯始入而教其民二年欲用之子犯曰民未知義未安其居于是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用于是乎伐原以示之信民易資者不求豐焉不詐以求多明徴其辭公曰可矣乎子犯曰民未知禮未生其共于是乎大搜以示之禮作執秩主爵秩以正其官民聽不惑而後用之出穀戍釋宋圍一戰而伯文之教也桓文圗伯之始亦皆務農訓武足食足兵素教之士節制之兵故一用則足以取威定伯傳不無侈辭家氏曰春秋之法盟主爵而諸侯人者有矣未有盟主人而諸侯爵者也人楚子而爵諸侯不與楚子以主諸夏之盟也亦以正諸侯從夷之罪也陸氏曰凡稱人為惡者唯楚子稱人以圍宋既在諸侯之上明貶之同于荆蠻也所以然者罪諸國從荆蠻也榖梁云楚人者楚子也其曰人何也人楚子所以人諸侯也其人諸侯何也不正其信音申夷狄而伐諸國也榖梁義是杜氏曰諸侯伐宋公與楚有好而往會之宋方見圍無嫌于與盟故直以宋地二十有八年春晉侯侵曺晉侯伐衛左傳春晉侯將伐曺假道于衛曺在衛東故衛人弗許還自南河濟從汲郡南渡出衛南而東侵曺伐衛正月戊申取五鹿衛地二月晉郤縠卒原軫將中軍以丅軍佐超將中軍胥臣司空季子佐下軍上德也晉侯與齊侯盟于斂盂衛地衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛衛地杜氏曰再舉晉侯者曺衛兩來告按再舉晉侯自是文勢當然侵曺一事也伐衛一事也一出兵為兩事故不可云晉侯侵曺遂伐衛楚子鄭人侵陳遂侵宋可以言遂遂侵蔡遂伐楚可以言遂遂繼事也據楚人圍陳納頓子于頓兩事也再出楚人則贅此侵曺伐衛兩事也不再出晉侯則缺故知自是文勢宜爾不必字字有義也然晉文之伯功與齊桓同而勢與齊桓異齊桓之興天下習衰周之弊莫適為主故齊桓之求諸侯為難故屢會屢盟訓諭招懷而後諸侯服從晉文之興則諸侯蓋習于從伯晉文起而號召之一麾而至然楚之強則非齊桓之時也齊桓之時楚不出蔡鄭今則直蹈齊魯之郊自南以東皆楚矣晉文起而收之不其艱哉故齊桓伐楚至于召陵楚地也晉文敗楚止于城濮衛地也自楚及衛蓋千里而遙却楚千里而外以收魯宋曺衛陳鄭許蔡半天下之諸侯其用力為如何論者不察而妄訾晉文以為不及齊桓此不識天下之勢書生語也子曰晉文公譎而不正齊桓公正而不譎此二語指桓文之用兵而言乃春秋書法之斷也桓公曰伐楚則伐楚仗義執言不由詭道文公則匿其機于伐楚而試其端于救宋匿其機以救宋而出其不意于侵曺揚其聲于伐衛而隂以致楚觀春秋所書而其譎宛然在目也夫子蓋即其用兵而論之非為伯功之優劣言也其罪則孟子知之矣曰春秋無義戰五伯三王之罪人也明于五伯之功罪始可以言春秋區區起褒貶之義于一字之間者皆不知春秋者也公羊曰不言遂未侵曺也未侵曺言侵曺致其意也聖人不逆詐豈未行其事而先致其意乎穀梁曰再稱晉侯惡也棄其攘楚之大功而窮其報怨之小惡豈聖人與一匡天下之意乎如是則桓公侵蔡亦以蔡姬之怨亦當惡桓公乎或言衛已請盟而晉人弗之許則已甚矣夫衛已服而不許其自新誠若過甚然晉之志在于致楚則安肯遽許衛盟乎或又言楚之圍宋也陳蔡鄭許舉兵而從而曺衛則君不在會師不與圍方于諸國不猶愈乎此不知陳蔡鄭許被楚近驅勢不得不從此可後圖魯齊曺衛則吾與也得曺昏衛斷吾右臂矣故晉文之䇿莫急于收齊魯而治曺衛是時楚深入千里頓兵于宋堅城之下而吾不即近以乘其弊攻其所必救以致其來以逸待勞以主待客以收萬全必勝之績而欲親帥三軍逺造陳蔡之國都討其從夷之罪且以扼楚人之歸路豈不愚哉公子買戍衛不卒戍刺之刺敕賜反左傳公子買戌衛晉伐衛衛楚之昏姻魯欲與楚故戍衛楚人救衛不克公懼于晉殺子叢買字以説焉謂楚人曰不卒戍也此欺楚之詞穀子叢在楚救衛下經在上者救衛赴晚至啖氏曰內殺大夫謂之刺唯有二人此年買成十六年偃皆非卿而特書明其是公子也偃則直書刺者有罪當殺也買則上言晉人伐衛下言買不卒戌明不勝而還非其罪也楚人救衛楚為晉所致也凡書救皆善之也為中國救患分災而言也中國攘夷夷自救其與國不在此例晉文不許衛之請盟所以必致楚也蓋若許衛之盟楚或知難而退解宋之圍全師而去則無以大創之而絶其再來故不許衛之盟而攻之益急衛楚之昏也衛急矣楚近宋而亦不能救則楚弱矣楚豈能但已乎此狐偃所以坐䇿其必來也抑文公是舉專為救宋也向使直趨宋郊楚鋒方鋭而我迎而與之角非萬全之道也孫臏曰夫解雜亂紛糾者不控拳救鬬者不摶橶批亢搗虛形格勢禁則自為解耳今梁之輕兵鋭卒竭于外而老弱疲于內若引兵疾走其都彼必釋趙而自救是我一舉解趙之圍而收弊于魏也此即晉文之術也三月丙午晉侯入曺執曺伯畀宋人左傳晉侯圍曺門焉多死曺人尸諸城上晉侯患之聽輿人輿衆人之謀曰稱舍于墓師遷焉曺人凶懼因其凶也而攻之三月丙午入曺數之以其不用僖負羈而乘軒者三百人也宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦晉欲戰而齊秦未可漢追項羽而信越不至此正事機不可忽也漢有張良計出捐梁楚地許信越兩人使各自為戰正晉使宋舍我而賂齊秦之意也于此見晉不唯能致楚而又能使齊秦齊秦自欲戰則吾事濟矣當時使不顧而遂戰而齊秦前却其事必敗藉之告楚我執曺君而分曺衛之田以賜宋人楚愛曺衛必不許也必不許齊秦齊秦自怒矣喜賂怒頑能無戰乎言齊秦喜得宋賂而怒楚之不可告請必自戰也公説執曺伯分曺衛之田以畀宋人按楚方救衛晉遽舍衛又出曺之不意入其國執其君分其田畀其讐所以怒楚藉齊秦陽告楚楚必不許又所以怒齊秦也自晉侯侵曺至此皆春秋著文公致楚與戰之由也胡氏節節為之論今不取夏四月乙巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績左傳楚子入居于申申在方城內故曰入使申叔去榖使子玉去宋前救衛蓋分兵也居據左傳自初圍宋楚子即親來至是入于申以制師之進退曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年獻公之子九人唯文公在而除其害惠懷吕郤天之所置其可廢乎軍志曰允當則歸不求過分又曰知難而退又曰有德不可敵此三志者晉之謂矣子玉使伯棼子越椒也鬬伯比之孫請戰曰非敢必有功也願以間執猶塞也讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之楚子還申遣此兵以就前圍宋之衆楚有左右廣又太子有宫甲分取以給之若敖楚武王之祖父葬若敖者子玉之祖也六卒子玉宗人之兵六百人子玉使宛春告于晉師曰請復衛侯而封曺衛侯出居于襄牛未踰竟故曰復曺伯見執在宋已失位故言封臣亦釋宋之圍子犯曰子玉無禮哉君取一釋宋圍事歸晉臣取二復衛封曺事歸子玉不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讐已多將何以戰不如私許復曺衛不因楚請以攜之離曺衛心于楚執宛春以怒楚既戰而後圖之公説乃拘宛春于衛且私許復曺衛曺衛告絶于楚子玉怒從晉師晉師退所謂既戰而後圗之軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此退三舍辟之所以報也背惠食言以亢其讐我曲楚直其衆素飽正義有曰忿怒之深空腹不食直氣盈飽也今按素飽者言楚素資糧有餘耳不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔天皆齊大夫秦小子憖秦穆公子次于城濮楚師背􅈶邱陵險阻名而舍晉侯患之子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚惠何欒貞子枝曰漢陽水北諸姬楚實盡之思小惠而忘大恥不如戰也子玉使鬬勃楚大夫請戰晉侯使欒枝對曰寡君聞命矣詰朝將見已已晉師陳于莘北莘故國名胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍子西鬪宜申將左子上鬪勃將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔晉侯使齊秦貪賂怒頑而齊秦因胥臣先犯陳蔡而陳蔡奔堅瑕之分楚右師潰陳蔡屬楚右師狐毛設二斾大旗而退之使若大將稍却欒枝使輿曵柴而偽遁楚師馳之原軫郤溱以中軍公族橫擊之竒兵狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗三軍唯中軍完晉師三日館榖及癸酉而還汪氏曰唯此戰與柏舉皆書楚師敗績則楚非將卑而稱人矣此下書楚殺得臣則知楚人為得臣矣柏舉之戰下書囊瓦奔鄭則知楚人為囊瓦矣中國及楚君大夫戰皆稱人故宋襄及楚子戰于泓晉文及楚得臣戰城濮蔡侯以吳子及楚囊瓦戰柏舉皆稱楚人中國大夫及楚子戰稱名氏故邲之戰稱荀林父帥師此華夷尊卑之辨也唯鄢陵稱楚子以敗績在君不得不稱楚子也按何休曰戰言及所以别客主直不直也鄭君曰及者别異主客耳不施于直與不直也直不直自在事而已説者以鄭言為是此經書及在晉亦當以鄭君此意觀之杜氏曰城濮衛地唐應德曰春秋書荆入蔡此伯之未興而楚猾中國之始春秋書次于厥貉此霸之既衰而楚窺中國之始蓋桓公之所以扼楚者其力有難易而楚與中國之所以盛衰其機有倚伏桓起于海濱而從者宋衛陳蔡皆弱國故謀之十餘年結江結黃連十二國之師而後能服楚于召陵文據表裡河山之固而所從者齊秦皆徑國故反國一年僅連三國之師而遂能克楚于城濮一戰而殺其專兵之將然晉之克楚也得䇿于結秦而晉之不競于楚也失䇿于讐秦自殽之役而秦晉相讐殺者歷四五世戰彭衙戰令狐戰河曲積十餘戰而不解是晉人自失一強援自生一強敵失一強援則其氣力不完強敵伺近則其勢不暇于略逺故晉伯之衰而楚益橫者殽之役實然説春秋者乃曰殽之役許晉襄繼伯吾不知也宋公齊國歸父秦小子憖既次城濮以師屬晉不與戰也陳蔡屬右師失位故賤而不書楚殺其大夫得臣楚始書大夫左傳楚子玉既敗王使謂之曰大夫若入其若申息之老何申息二邑子弟皆從子玉而死言何以見其父老子西孫伯曰得臣將死二臣止之曰君其將以為戮孫伯即大心子玉子也及連榖而死至連穀王無赦命故自殺連穀楚地晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉已而已不在民矣衛侯出奔楚陸氏淳曰令叔武攝位而去故不名也按叔武攝君事以受齊盟而自出奔其位未絶若曺伯負芻之類故陸氏云云蓋晉文雖絶衛侯之位而春秋不絶其位罪文公不當廢衛侯也按敗楚之後曺衛可復矣而猶不復曺衛之所以疑也曺衛同見侵伐討已行矣曺伯又執而畀宋衛侯見曺伯之未釋也故懼而出奔至是晉侯之惡著矣衛侯不名位實未絶書以甚晉也五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土踐在演反左傳甲午至于衡雍鄭地今滎陽卷縣作王宫于踐土襄王聞晉戰勝自往勞之故為作宫鄉去聲屬也役之三月城濮役前之三月鄭伯如楚致其師為楚師既敗而懼使子人九子人氏九名行成於晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介四馬被介百乘徒兵步卒千鄭伯傅相也王用平禮也周平王享晉文侯仇之禮已酉王享醴命晉侯宥王命尹氏及王子虎皆王卿士內史叔興父大夫䇿命晉侯為侯伯賜之大輅金輅之服戎輅戎車之服二輅各有服彤弓一赤弓彤矢百玈弓矢千玈音盧黑弓也弓一矢百則弓十矢千矣諸侯賜弓矢然後專征伐秬黑黍鬯香酒所以降神一卣器名虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝逖逺地有惡于王者糾而逺之晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲癸亥王子虎盟諸侯于王庭要言曰皆奬王室無相害也榖梁傳諱會天王也杜氏曰踐土鄭地王子虎臨盟不同歃故不書衛叔武攝位受盟從未成君之禮故稱子而序鄭伯之下胡傳踐土之會天王下勞晉侯削而不書何也周室東遷所存者號與祭耳其實不及一小國之諸侯晉文之爵雖曰侯伯而號令天下幾于改物實行天子之事此春秋之名實也與其名存實亡猶愈于名實俱亡故天王下勞晉侯于踐土則削而不書去其實以全名所謂君道也父道也晉侯以臣名君則書天王狩于河陽正其名以統實所謂臣道也子道也或曰踐土之盟于溫之會天王皆在踐土之盟聖人唯書公朝于王所不書王所在及所以出之故按經于僖二十四年書天王出居于鄭自後未嘗書歸踐土鄭土則天王蓋居于是久矣何下勞之有左氏有晉侯納王之事夫春秋以周室為重安有晉侯納王而不書者哉天王之歸蓋因今踐土之盟也冬書河陽之狩則天王既歸而出狩也文公非緩于納王也蓋先勝楚而後納王也此亦一説陳侯如會公羊傳其言如會何後會也榖梁傳如會外乎會也不及序也于會受命也杜氏曰來不及盟故曰如會公朝于王所公羊傳曷為不言公如京師天子在是也天子在是則曷為不言天子在是不與致天子也榖梁傳朝不言所言所者非其所也按受摰于朝受享于廟朝者位于內朝而序進覲者位于廟門外而序入此朝于京師之禮也京師之外則天子巡狩于四方有常時諸侯朝于方嶽有常所未有非時出王畿見諸侯諸侯亦即其所而朝焉者有之自襄王始其名則勞晉侯也其迹則若從諸侯之會也故穀梁曰諱會天王也則名為朝也其實致天子也故公羊傳曰天子在是而不言天子在是不與致天子也榖梁曰朝不言所言所者非其所也諸侯見天子于京師于方嶽皆言朝春秋書公朝于王所者二書朝而不至京師則非其所書公如京師者一雖至京師而不書朝則非其禮六月衛侯鄭自楚復歸于衛衛元咺出奔晉左傳或訴元咺于衛侯曰立叔武矣其子角元咺子從公公使殺之咺不廢命奉夷叔以入守夷諡六月晉人復衛侯以叔武受盟于踐土故寧武子寧俞與國人盟于宛濮陳留長垣縣西南有宛亭近濮水曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉牛曰牧馬曰圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不二衛侯先期入不信叔武寧子先長牂衛大夫守門以為使也與之乘而入寧子患公之欲速故先入欲安喻國人公子歂市專及犬華仲前驅衛侯遂驅掩寧子未備二子衛大夫叔武將沐聞公至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之公以叔武尸枕其股歂犬走出公使殺之元咺出奔晉公羊傳文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故于是已立然後為踐土之位治反衛侯衛侯得反曰叔武篡我元咺爭之曰叔武無罪終殺叔武元咺走而出按如左氏之言則殺叔武者歂犬也而非衛侯之意知其無罪而哭之即誅􅞰犬亦足以自白矣元咺復何訴乎吾觀衛侯在外則殺元咺之子返國則已盟而先入是皆有忌叔武之心􅞰犬之徒蓋探旨承意者耳其使二人為前驅前驅云者即漢人清宫誅少帝之意也歸罪歂犬猶以彭生除之之謂也枕之股而哭之遂殺歂犬蓋欲以此欺晉而免其討次必殺元咺以滅口而不料元咺之覺而先奔也晉侯所以疾衛侯之深蓋以叔武也而後儒皆以為偏信元咺之訴否則又謂以不禮之舊怨妄矣胡傳衛侯失國出奔則不名復歸得國則何以名殺叔武也陳侯欵卒秋杞伯姬來公子遂如齊冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫晉侯下穀無齊侯秦與中國會始此左傳冬會于溫討不服也杜氏曰討衛許中國諸侯伐楚而同圍宋者陳蔡鄭許也楚敗之後蔡鄭即從晉陳亦如會唯許不至故討許衛侯既赦之復國矣猶欲討衛者元咺有訟也陳共公稱子先君未葬例在九年宋襄公稱子自在本班陳共公稱子降在鄭下陳懷公稱子而在鄭上傳無義例蓋主會所次非褒貶也天王狩于河陽狩穀作守左傳是會也晉侯召王以諸侯見仲尼曰以臣召君不可以訓故書曰天王狩于河陽公羊傳不與再致天子也榖梁傳全天王之行也為若將守而遇諸侯之朝也水北為陽山南為陽溫河陽也杜氏曰河陽晉地今河內有河陽縣晉實召王為其辭逆而意順故經以王狩為辭程子曰晉文公欲率諸侯以朝王正也懼其不能故譎以行之召王以就焉人獨見其召王之非而不見其欲朝之本心是以譎而掩其正也按孟子曰天子之地方千里不千里不足以待諸侯周之衰其地不及一小國之諸侯朝覲會同之禮久廢不講非但諸侯驕惰怠于臣禮而王室之力亦自以不足以待諸侯而安于廢弛矣晉文公欲率諸侯朝王不至王城乃致王以就焉蓋為此故也杜預謂若令朝于京師恐諸侯不從夫諸侯從于伯令無敢後至豈有已會于溫而憚至王城者乎又謂晉已強大率諸侯而入王城亦有自嫌之意夫晉雖強大唯其無忠順之實心則已矣果有是心何嫌何疑况前此納王亦嘗朝京師矣而後此齊威王亦嘗朝周矣而何獨今時則不可朝乎其非為是也明矣齊桓公葵丘之會天王使宰孔勞之賜胙命無下拜其隆之亦至矣而不親出奚獨踐土乃親下勞哉蓋自晉侯納王親奉王入于王城王享醴命之宥賜之田其待之之隆更有加故為之而不自以為異而豈知稍踰于禮則下堂而見諸侯已遂為上替之端而况至于踐土乎天王既為是過越之禮晉侯與諸侯之心蓋不安也故又為溫之會將相率朝王以上答天王之寵且假王靈以討不服焉王聞晉侯之來而重其入也故狩于河陽而就見之諸侯因順天王之意朝于王所此事之實也踐土之下勞不書而河陽書者諸儒所謂踐土王自來故沒而不書存君體也河陽晉召王故書天王自狩存臣禮也其説是也夫王重晉侯之來而狩以就見之又謂晉侯召王何也曰晉侯不務尊王以誠招攜以德而數數于會屑屑于彌文以勤君父非召王而何哉溫者河陽之邑也于諸侯之會以其邑言于天王之狩以其方言夫天子之狩故言其方而不定其地也壬申公朝于王所榖梁傳獨公朝與諸侯盡朝也杜氏曰壬申十月十日有日而無月史闕文陳氏曰朝繫日見先狩而後朝也晉人執衛侯歸之于京師左傳衛侯與元咺訟爭殺叔武事寧武子為輔針莊子為坐士榮為大士大士治獄訟也周禮命夫命婦不躬坐獄元咺又不宜與其君對坐故使叔針莊子為主又使衛之忠臣及其獄官質正元咺輔輔莊子也衛侯不勝觀此則所謂歂犬殺之者承衛侯之意明矣殺士榮獄官不能以法直君故罪重刖針莊子謂寧俞忠而免之執衛侯歸之于京師置諸深室寧子職納槖饘焉槖衣囊饘麋也趙氏曰公羊云歸之于者罪已定矣歸于者罪未定也按歸于與歸之于其義一也或傳寫衍縮耳按之于皆語助文勢有舒約耳非關傳寫也不煩妄釋又云衛侯之罪殺叔武也何以不書為叔武諱也春秋為賢者諱何賢乎叔武讓國也據理反是為衛侯諱是掩惡也何名為叔武諱且凡褒賢之義不聞諱殺也又云此晉侯也其稱人何貶曷為貶衛之禍文公為之也按例執諸侯皆稱人不必别生義按是時諸侯其心一沒于寵利至有視兄弟如仇讐剪骨肉如草菅雖以桓文之賢而殺糾于魯殺懷公于髙梁不能無遺憾焉而亦未聞有以意忌信讒戕害骨肉為當世人倫之大不美而欲問其罪者至文公始治衛侯殺叔武之罪雖非盡出于公然亦足以警憒憒之耳矣且執以歸于京師亦得討罪之禮乃春秋之意則若不與之何哉豈非啓君臣之訟其所傷反多邪且雖歸之京師而實專聽其獄囚諸深室使醫鴆之皆晉侯之意未嘗取舍決于天王而輕重付之公論也則安得而與之哉故稱晉人以其受臣之訴以執其君同之以強暴弱執諸侯皆稱人之亂辭而不殊也啖子曰春秋時以強暴弱故執諸侯皆稱人亂辭又注云以私相執不歸京師今按晉雖歸京師討不盡義故同而不殊曰歸之于京師者強致之之詞也且其君既坐其臣亦安得無罪而縱釋元咺君囚臣歸復擅立君無禮如此而晉懵如也是可忍也其孰不可忍也哉衛元咺自晉復歸于衛左傳元咺歸于衛立公子瑕公羊傳自者有力焉者也陸氏曰按例凡大夫還悉書所自無他義按逆臣藉強伯為主故曰歸則歸甚易而無難視易置其君如奕棋然書自以罪晉公羊之義亦不可廢國語晉侯執衛成公歸之于周請殺之王曰不可夫君臣無獄今元咺雖直不可聽也君臣皆獄父子將獄是無上下也而叔父聽之一逆矣又為臣殺其君其安庸刑布刑而不庸再逆矣一合諸侯而有再逆政余懼其無後也不然余何私于諸侯按王之言至言也據外傳晉之歸衛侯以王之言也諸侯遂圍許會溫本為討衛許也故于是遂圍許許之淪于楚深矣欲其自拔也難矣故以蕞爾之國合十一國之衆逾時閲嵗而不能成功雖曰難變其亦有懲于江黃也歟抑晉侯是時伯業成矣是後當休兵息民增修其德以服諸侯之心而禮繁威黷外騖不已踐土之盟血未乾又徴會城濮之大勞甫息又圍許諸侯亦罷于應命矣諸侯強從而非心樂晉伯之所以遂衰也與胡氏謂討其不朝于王所蓋誤曺伯襄復歸于曺遂會諸侯圍許左傳丁丑諸侯圍許晉侯有疾曺伯之豎侯獳貨筮史使曰以曺為解齊桓公為會而封異姓今君為會而滅同姓曺叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命城濮許復二國而不與偕復非信也同罪異罰非刑也公説復曺伯遂會諸侯圍許按專執而罪之專釋而歸之晉罪見矣叔孫豹叔孫婼見執于晉或求貨而為之言豹婼不與而拒之大夫且恥以貨求免况諸侯乎名賤之也附左傳晉侯作三行尹即反以禦狄荀林父將中行屠擊將右行先蔑將左行晉置上中下三軍今復增置三行以避天子六軍之名三行無佐二十有九年春介葛盧來左傳介葛盧來朝舍于昌衍之上魯國東南有昌平城公在會饋之芻米禮也杜氏曰介東夷國也在城陽黔陬縣葛盧介吾名也不稱朝不見公且不能行朝禮雖不見公國賔禮之故書公至自圍許前年書公朝于王所諸侯遂圍許不以王所致而致圍許亦猶成十三年如京師會伐秦不以京師致而致伐秦皆所以著其本心不在于尊王也夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉會上公有公字翟亭歷反公作狄左傳夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟也且謀伐鄭也經書蔡人而傳無名氏即微者秦小子憖在蔡之下者若宋向戌之後會也卿不書罪之也在禮卿不會公侯會伯子男可也杜氏曰晉侯始霸翼戴天子諸侯輯睦王室無虞而王子虎下盟列國以瀆大典諸侯大夫上敵公侯虧禮傷教故貶諸大夫諱公與盟大國之卿當小國之君故可以會伯子男諸卿之見貶亦兼有此闕故傳重發之翟泉今洛陽城內太倉西南池水也程子曰晉文連年會盟皆在王畿之側而此盟復迫王城又與王人盟強逼甚矣故諱公諸侯貶稱人惡之大也胡傳兼用杜氏及程子之意諸侯當作大夫李亷曰晉文公三大盟會本皆非禮踐土于溫致天王翟泉盟王子其視齊桓之尊王人不敢盟世子周公者大不侔矣然春秋原情之法則踐土王實自勞非晉之罪于溫召王事雖逆而情順故皆諱之以存其尊王之名若翟泉則羣然會于王都之側上與王子虎歃血以約言既非踐土子虎涖盟之比又無于溫懷自嫌之心春秋不得不重貶之以顯其慢王之實矣蓋至此方結正晉文之罪是亦望其始而不足其終也或曰此經缺公字如莊十九年之説為是盟不寒則不必尋也踐土之盟有齊宋蔡鄭及後至之陳今齊宋陳蔡皆在而鄭獨不至鄭已怠于從晉矣文公于此盍亦姑自反乎衛既歸而復執曺納賂而後歸諸侯之不心服宜矣卒之圍許而竟不能服許圍鄭而竟不能得鄭故曰以力服人者未有能服人者也五伯假之也功烈之所以卑而不足道者也大夫之交政于是始文公為之也秋大雨雹雹弼角反胡傳正蒙曰凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風和而散則為霜雪雨露不和而散則為戾氣曀霾隂常散緩受交于陽則風雨調寒暑正雹者戾氣也隂脅陽臣侵君之象當是時僖公即位日久季氏世卿公子遂專權政在大夫萌于此矣按雹雨氷也劉向曰盛陽雨水溫暖而湯熱隂氣脅之不相入則轉而為雹盛隂雨雪凝滯而氷寒陽氣薄之不相入則散而為霰故沸湯之在閉氣而湛于寒泉則為之氷則雪之消亦氷解而散此其驗也故雹者隂脅陽也冬介葛盧來左傳以其未見公故復來朝禮之加燕好三十年春王正月夏狄侵齊胡傳左氏曰晉人伐鄭以觀其可攻與否狄間晉之有鄭虞也遂侵齊詩不云乎戎狄是膺荆舒是懲四夷交侵所當攘斥晉文公若移圍鄭之師以伐之則方伯連帥之職修矣上書狄侵齊下書圍鄭此直書其事而義自見者也秋衛殺其大夫元咺及公子瑕衛侯鄭歸于衛左傳晉侯使醫衍鴆衛侯寧俞貨醫使薄其鴆不死公為之請納玉于王與晉侯皆十玨雙玉曰瑴王許之秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適公子瑕子儀瑕母弟公入祀先君周冶既服將命服卿服將入廟受命周歂先入及門遇疾而死冶厪辭卿見周歂死而懼公羊傳衛侯未至其稱國以殺何道殺也時已得天子命還國于道路遇而殺之此非此殺其大夫其言歸何歸惡乎元咺也曷為歸惡乎元咺元咺之事君也君出則已入君入則已出以為不臣也榖梁傳稱國以殺罪纍上也以是為訟君也衛侯在外其以纍上之辭言之何也待其殺而後入也此是范氏曰元咺訟君之罪于伯者君忌之使人殺之而後入案宣九年陳殺其大夫泄冶傳曰稱國以殺其大夫殺無罪也此傳曰稱國以殺罪纍上也凡稱國以殺大夫或殺無罪或罪纍上參互不同略當近半然則稱國以殺有二義泄冶忠賢而君殺之是君無道也衛侯雖有不德臣無訟君之道元咺之罪亦已重矣然君子之道譬之于射失諸正鵠反求諸其身衛侯不思致訟之愆躬自厚之義過而不改而又怨忌上下皆失故曰罪纍上趙氏曰公子瑕即元咺所立瑕立而自秉國權瑕亦未如君也故以君殺大夫之辭言之而反在元咺之下以咺罪重于瑕也胡氏謂瑕不與衛剽同者是瑕能拒咺辭其位而不立也不與陳他同者是瑕能守節不為國人之所惡也今未見得此義按今法子孫告祖父母父母者杖一百徒三年但誣者絞此可以定元咺之獄矣周禮大司馬以九伐之法正邦國賊殺其親則正之衛侯宜正此罪而當時王法不明伯討不正使大義反為私曲此則文公不能無罪也君臣無獄君臣皆獄父子將獄是無上下也而叔父聽之周王此數言者義理分明聖人復起不能易也然則秉彛之在人心何間于衰時末運而時之所以衰而不復能振者不自達其所明耳使王遂以是決正衛侯之獄而歸之豈不休哉故曰不為也非不能也吾身不能居仁行義謂之自棄也以外傳晉侯請殺衛侯而王不可推之則知必無使醫衍鴆之之事晉侯雖鷙忍既不專殺之又豈隂行鴆之哉納玉于王與晉侯皆十玨此亦誣也當因侯獳貨筮史而聨飾之耳曺事容有之晉侯必不親受賂而釋衛侯也叔武君命奉之以受盟故稱衛子公子瑕乃元咺偽立之而咺實自秉國權瑕固未如君春秋亦不與咺君之也瑕因咺而得誅故言及趙子謂以君殺大夫之辭言之而反在元咺下以咺罪重于瑕也此言是也晉人秦人圍鄭左傳晉侯秦伯圍鄭以其無禮于晉按踐土于溫之會鄭伯皆在越五年兩同盟豈至是而始責舊怨哉乃討翟泉之不會耳以左氏此處之不足信則他處言以不見禮之故者不足全信可知矣且二于楚也晉軍函陵秦軍泛南此東汜也在滎陽中牟縣佚之狐言于鄭伯曰若使燭之武見秦君師必退佚之狐燭之武皆鄭大夫公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋懸城而下而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也設得鄭以為秦邉邑則越晉而難保焉用亡鄭以倍益也鄰鄰之厚君之薄也若舍鄭以為東道主行李使人之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也晉君謂惠公也焦瑕晉河外五城之二邑朝濟河而夕設版築以距秦言背秦之速夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圗之秦伯説與鄭人盟使把子逢孫楊孫戍之乃還三子秦大夫子犯請擊之公曰不可微夫人力不及此因人之力而敝之不仁失其所與不知以亂易整不武秦晉各整其旅而出今反相攻是以亂易整也吾其還也亦去之初鄭公子蘭穆公子出奔晉從于晉侯伐鄭請無與圍鄭許之使待命于東晉東界鄭石甲父侯宣多二子鄭大夫逆以為太子以求成于晉晉人許之秦晉之爭始此今按昔管仲言于桓公曰招攜以禮懷逺以德德禮不易無人不懷今鄭二于楚無乃晉之德猶有所闕懷之以德招之以禮未有不格者也乃黷武不已既失之于鄭矣秦西州之競國也齊桓之所不能致而晉以甥舅之好土壤之接得以同力以挫強楚此計之最得者也况穆公之賢可以義動晉不能以信義固其親而常以詐諼啓其二城濮之役齊秦之未肯戰無亦晉義之有未孚乃使宋隂賂之而激之使戰今與秦圍鄭而秦伯私與鄭盟蓋亡鄭以倍鄰闕秦以利晉晉之心人皆窺見之矣我信之不足而彼亦背我不難固其所也齊桓公不從鄭子華之請而鄭伯受盟今晉文公乃以鄭公子蘭從于伐鄭何以訓乎以禮信屬諸侯而以姦終之猶曰不可况終始以無禮不信乎無怪秦伯之先畔而又何以責鄭焉介人侵蕭杜氏曰蕭宋附庸國冬天王使宰周公來聘左傳王使周公閲來聘饗有昌歜昌蒲菹白熬稻黑熬黍形鹽鹽形象虎辭曰國君文足昭也武足威也則有備物之饗以象其德薦五味羞嘉榖鹽虎形以獻其功吾何以堪之公子遂如京師此聘周之始遂如晉此聘晉之始左傳東門襄仲將聘于周遂初聘于晉杜氏曰如京師報宰周公既命聘周未行故曰將又命自周聘晉故曰遂自入春秋魯始聘晉故曰初胡傳大夫出疆有以二事出者謂本受二事之命也穀梁云遂繼事之辭有以一事出而專繼事者謂但受一事之命而復專再行一事公羊云遂者何生事也注專事也其書皆曰遂公子遂如周及晉與祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則專繼事者也季孫宿救台遂入鄆亦是是非得失則存乎其事矣宰周公聘魯魯既不朝京師而使公子遂往又以二事出夷周室于列國此大不恭之罪春秋之所誅也按晉未聘魯魯昉往聘故左傳曰遂初聘于晉周先聘魯魯本欲往報故左傳曰將聘于周以將字起下遂字因來而報不專于王室而以二事遣使直書而義自見矣三十有一年春取濟西田左傳春取濟西田分曺地也公羊傳取之曺也晉侯執曺伯班其所取侵地于諸侯也杜氏曰濟水自滎陽東過魯之西至樂安入海按濟西田不繫曺魯故田也汶陽田不繫齊亦魯故田也非吾田則繫國邾田是也漷東沂西田不繫國者承上伐邾文也凡力得之田取無王命以正疆界雖取吾故田邑亦無異辭不當取也况晉奪之曺以與魯非以義討乎鄆歡龜隂歡闡言歸言歸者其所欲也公子遂如晉左傳襄仲如晉拜曺田也夏四月四卜郊不從乃免牲猶三望公羊傳三卜禮也四卜非禮也求吉之道三魯郊非禮也天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封內者則不祭也曷為或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤于百里者天子秩而祭之觸石而出膚寸而合側手為膚按指為寸不崇朝而遍雨乎天下者唯泰山河海潤于千里猶者何也可以已也譏不郊而望祭也穀梁傳夏四月不時也四卜非禮也免牲者為之緇衣熏裳有司玄端奉送至于南郊免牛亦然猶者可以已之辭也左傳望郊之細也不郊亦無望可也啖氏曰天子以冬至祭上帝又以夏之孟春祈榖于上帝禮行于郊故謂之郊魯以周公之故特得以孟春周之三月祈榖于上帝亦謂之郊郊皆用辛日故以周之二月卜三月上辛不吉則卜中辛又不吉則卜下辛所謂吉事先近日也孟獻子曰郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也古啓蟄在正月禮曰養牲必在滌三月滌者養牲之宮名故自周之十一月下旬而養至二月中旬而牲成故得以二月下旬卜三月上辛也凡養牲必養二牲一以祀上帝一以祀后稷帝牛有變變謂傷食之類則改卜稷牛以代之而别以他牛為稷牛禮曰帝牛必在滌三月稷牛唯具凡卜三旬皆不吉則不郊牛死及牛有災害則卜稷牛而代之若卜稷牛不吉及既養稷牛又死亦皆不郊凡不郊皆卜免牲免猶縱也穀梁所謂為之緇衣熏裳者云云是也榖梁曰卜免牲吉則免之不吉則繫而待庀牲庀具也待明年具牲時卜也然後左右之隨所用也凡未成牲曰牛穀梁曰牲傷者亦曰牛已牛矣而又免之何也嘗置之上帝矣置之滌宫故也卜而免之不敢專也趙氏曰郊者天子所以事上帝也魯曷為之周公故也成王尊周公之德故賜天子之禮焉不于日之至避王室也卜周夏正于農耕之始也比旬而卜之逺怠慢也必更二旬禮盡于三也且郊之月殫矣李亷曰三望説左氏者以為分野星及國內山川然望乃祭山川之名何得及分野之星三望既魯之封內魯所得祭則常事又何書乎蓋因郊而望皆僭禮故河海雖不在其封內而亦祭耳按楚昭王曰三代命祀祭不越望江漢睢漳楚之望也韓宣子謂子産曰寡君寢疾並走羣望記曰晉人將有事于河必先有事于惡池齊人將有事於泰山必有事于配林又曰周公祀泰山召公為尸此並諸侯望祭之事魯三望之名不知所始疑祀泰山者周公之舊越望而祭及河海者僣禮之後也三正記曰郊後必有望有虞氏受終而望因于類巡狩而望因于柴此天子之禮若諸侯則有望而已望不越境非所主者非所祭也魯僭天子之郊故亦于郊後而望又越望而祭及河海凡魯之郊禘望皆非禮也春秋欲削而不書則無以見其失盡書之乎則不可勝書故因其失禮之中又有失焉者因事書之以垂鑒戒秋七月附左傳秋晉搜于清原河東聞喜縣北有清原作五軍以禦狄趙衰為卿二十八年晉作三行今罷之更為上下新軍二十七年命趙衰為卿讓于欒枝今始從原大夫為新軍帥秋把伯姬來求婦胡傳蕩伯姬來逆婦而書者以公自為之主失其班列書也杞伯姬敵矣其來求婦曷為亦書見婦人之不可預國事也王后之詔命不書于天下夫人之教令不施于國中昏姻大事也把獨無君乎而夫人主之也狄圍衛十有二月衛遷于帝丘胡傳帝丘東郡濮陽顓頊之虛亦衛地也狄嘗迫逐黎侯黎侯寓于衛而衛不能修方伯連率之職戎嘗伐凡伯于楚丘而衛不救王臣之患其後遂為狄人所滅東徙渡河齊桓公攘夷狄封之而衛國忘亡今又為狄所逼遷于帝丘避狄難也而列國衰微外域強盛衛侯不能自強于政治晉文無却四夷安諸夏之功皆見之矣附左傳鄭泄駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚瑕文公子傳為納瑕張本泄駕非隱五年泄駕三十有二年春王正月附左傳春楚鬭章請平于晉晉陽處父晉大夫報之晉楚始通杜氏曰晉楚自春秋以來始交使命為和同按楚昔聞齊伯之漸衰而滅黃伐徐今聞晉伯之漸衰而請平于晉其不忘逞于中國一也楚非衰弱不振畏我而請平也我與之平非能使之受齊盟而遵約禁也攘討之義怠故和同之説入焉晉文之志荒矣夏四月己丑鄭伯捷卒捷公作接衛人侵狄秋衛人及狄盟左傳夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟杜氏曰不地者就狄廬帳盟冬十有二月已卯晉侯重耳卒左傳冬晉文公卒庚辰將殯于曲沃曲沃有舊宫焉出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉聲自柩出故曰君命大事戎事也卜偃聞秦密謀故因柩聲以正衆心把子自鄭使告于秦三十年秦使大夫把子戍鄭曰鄭人使我掌其北門之管鑰也若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也蹇叔秦大夫師知所為鄭必知之公辭焉召孟明百明孟明視西乞西乞術白乙白乙丙里世族譜以百里孟明視為百里奚之子則姓百名視字孟明也古人之言名字者皆先字後名而連言之其術丙必是名西乞白乙或字或氏不可明也使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀爾墓之木拱合子曰拱矣蹇叔之子與師哭而送之曰晉人禦師必于殽殽在宏農澠池縣西殽有二陵焉其南陵夏后臯之墓也夏桀之祖父其北陵文王之所辟風雨也此道在二陵之間南谷中谷深委曲兩山相嶔故可以辟風雨古道由此魏武帝西討巴陵惡其險而更開北山髙道必死是間以其深險故余收爾骨焉秦師遂東三十有三年春王二月秦人入滑左傳秦師過周北門左右免胄而下兵車非大將御者居中故左右下御不下超乘者三百乘王孫滿尚幼觀之言于王曰秦師輕而無禮必敗謂過天子門不卷甲束兵超乘示勇輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市于周遇之以乘韋四韋先牛十二犒師先韋乃入牛古者將獻遺于人必有以先之曰寡君聞吾子將步師出于敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽傳車告于鄭則束載厲兵秣馬矣告于鄭下有脫句蓋把子本約潛師以來已為內應故束載厲兵秣馬以待者謂杞子之徒待秦師也弦髙使遽告于鄭鄭始知其事使視客館則束載厲兵秣馬以待矣乃使皇武子辭焉曰云云三子知事露故把子奔齊逢孫楊孫奔宋也杜氏此等處殊憒憒使皇武子辭焉曰吾子淹久于敝邑唯是脯資糧也餼生曰餼牽牛羊豕可牽行竭矣為吾子之將行也鄭之有原圃猶秦之有具囿也原圃具囿皆囿名吾子取其麋鹿以間音間敝邑若何使秦戍自取麋鹿以為行資敝邑得間暇滎陽中牟縣西有圃田澤把子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還按滑國伯爵近于鄭經書入未滅也傳言滅杜預曰滅而書入不能有其地此正如狄入衛而傳亦言滅衛齊侯使國歸父來聘左傳齊國莊子來聘自郊勞至于贈賄禮成而加之以敏迎來曰郊勞送去曰贈賄敏審當于事臧文仲言于公曰國子為政齊猶有禮君其朝焉臣聞之服于有禮社稷之衛也夏四月辛巳晉人及薑戎敗秦師于殽秦下公羊無師字左傳晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽傳車興薑戎調發子文公未葬故稱子墨衰絰以凶服從戎故墨之梁泓御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉于是始墨文嬴晉文公夫人秦女襄公嫡母請三帥曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長冦讐亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明欲使孟明還拜謝因而執之孟明稽首曰君之惠不以纍臣釁鼓使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德眚過也杜氏曰薑戎薑姓之戎居晉南鄙戎子駒支之先也殽在𢎞農澠池縣西按秦固不義晉子在喪要擊敗其師亦非禮棄親為讎晉卒不競于楚以失秦也殽之役為之也圍鄭之役秦與鄭盟子犯請擊之文公不可蓋知大計也公羊經脫一師字諸家遂有狄秦之説蹇叔諸人諌秦伯但曰千里而襲人未有不亡者也不知縱使幸而捷秦豈能越晉而邑鄭乎故燭之武曰越國以鄙逺君知其難也秦伯非不知此然而為之竟不可曉晉人角之諸戎掎之不同陳故言及按書及薑戎貶也晉子稱人癸巳葬晉文公狄侵齊左傳因晉喪公伐邾取訾婁訾子斯反訾婁公作叢穀作訾樓秋公子遂帥師伐邾左傳公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾晉人敗狄于箕左傳狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子狄别種也故西河郡有白部胡先軫曰匹夫逞志于君謂不顧而唾而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生初臼季胥臣使過冀晉邑見冀缺耨鋤也其妻饁野饋之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎缺父冀芮欲弒文公對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也詩國風也葑菲之菜上善下惡食之者不以其惡而棄其善文公以為下軍大夫反自箕襄公以三命命先且居先軫之子其父死敵故進之將中軍以再命命先茅之縣賞胥臣曰舉郤缺子之功也先茅絶後故取其縣以賞胥臣以一命命郤缺為卿復與之冀還其父故邑亦未有軍行按狄為列國患甚矣移邀秦之師為撻伐之武使匹馬隻輪無反者可也乃十人而九得志僅此一敗其師獲白狄子在晉為俊功而春秋不貴也故書晉人敗狄于箕杜氏曰太原陽邑縣南有箕城郤缺稱人者未為卿冬十月公如齊十有二月公至自齊乙巳公薨于小寢左傳冬公如齊朝且弔有狄師也反薨于小寢即安也榖梁傳小寢非正也胡傳左氏曰即安也周制王宫六寢路寢一小寢五君日出而視朝退適路寢聽政使人視大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寢魯子以諸侯有三宫則列國之制蓋降于王其以路寢為正則一爾君終不於路寢則非正矣隕霜不殺草李梅實隕公作霣周之十二月夏之十月也隕霜不殺物李梅冬實隂假陽威之應隕霜二此年不殺草定元年殺菽榖梁云未可殺而殺舉重可殺而不殺舉輕重謂菽輕謂草輕者不死則重者可知程子曰雨木氷上濕而下冷隕霜不殺草上冷而下濕晉人陳人鄭人伐許左傳討其二于楚也附左傳晉陽處父侵蔡楚子上救之與晉侯夾泜而軍泜水出魯陽縣東經襄城定陵入汝陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譖子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上春秋輯傳卷五

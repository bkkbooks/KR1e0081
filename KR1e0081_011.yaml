body:
  text: 春秋輯傳卷九明王樵輯襄公元年春王正月公即位榖梁傳繼正即位正也杜氏曰於是公年四歲仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城莒邾滕薛始皆列於會左傳春圍宋彭城於是為宋討魚石故稱宋且不登叛人也登成也不與其專邑叛君故使彭城還繫宋彭城降晉不書賤略之晉人以宋五大夫歸置諸瓠丘晉地河東東垣縣東南有壺丘齊人不會彭城晉人以為討二月齊大子光為質於晉胡傳楚已取彭城封魚石戍之三百乘矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖専其地君子不登叛人所以正疆域固封守謹王度也杜氏曰魯與謀於虗朾而書會者稟命霸主非匹敵故夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫厥公作屈鄫公作合按晉悼公既禽五大夫於是伐鄭以討其從楚納魚石之罪然不重勤諸侯使韓厥將偏師而東諸侯次于鄫以為之援楚兵不出則韓厥足以當鄭楚兵出則五國之師足以撓楚此皆放於義合於節制而不輕用也悼公獻子之賢著矣左氏謂韓厥荀偃帥諸侯之師伐鄭入其郛又謂自鄭以鄫之師侵楚並與經不合杜氏曰鄫鄭地在陳留襄邑縣東南書次兵不加鄭次鄫以待晉師秋楚公子壬夫帥師侵宋救鄭而侵宋攻其所必救也左氏謂楚子辛救鄭侵宋吕留二邑屬彭城蓋即此也胡氏謂傳書子辛救鄭而經削之似以壬夫子辛為二人子辛壬夫字也救鄭侵宋為二事誤矣九月辛酉天王崩邾子來朝冬衛侯使公孫剽來聘晉侯使荀罃來聘天王崩赴告己及而小國朝大國聘左氏皆曰禮也此何禮乎杜預范寧謂赴未至然下無日未有以辨其久近也二年春王正月葬簡王鄭師伐宋左傳楚令也夏五月庚寅夫人薑氏薨六月庚辰鄭伯睔卒睔古困反左傳鄭成公疾子駟請息肩於晉兵役無休以負擔喻兾從晉而得息公曰楚君以鄭故親集矢於其目非異人任楚子任此患不為他人寡人也若背之是棄力與言其誰昵我言盟誓之言免寡人唯二三子秋七月鄭伯睔卒晉師宋師衛寧殖侵鄭杜氏曰晉伐喪非禮宋雖非卿師重故敘衛上秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚左傳會于戚謀鄭故也孟獻子曰請城虎牢舊鄭邑今屬晉以逼鄭知武子曰善鄫之會吾子聞崔子之言今不來矣次于鄫時崔杼有不服晉之言獻子曽以告武子左氏有缺文滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊以城事請齊以觀其志得請齊人如命而告告諸侯會築虎牢吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君賴之大夫専會己丑葬我小君齊薑齊諡也左氏謂齊侯使諸薑宗婦來送葬婦人越疆送葬異哉叔孫豹如宋左傳通嗣君也冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢左傳冬復會于戚齊崔武子及滕薛小邾之大夫皆會知武子之言故也遂城虎牢鄭人乃成按虎牢故東虢之邑鄭滅虢為制邑巖險聞于天下楚鄭倚之以抗中國故晉帥諸侯取而城之以扼其要害虎牢城而鄭服鄭服而楚失其所以爭強於上國而諸夏息肩故城虎牢天下之大計也為天下之計而城之故不繫之鄭文自當然非聖人有意削之也彭城為宋之叛臣所據諸侯圍彭城為宋也故可曰宋彭城若虎牢方為伐鄭不服而城其巖邑以制之又豈可曰城鄭虎牢耶况晉必以師取之而後城之則板築興之日虎牢固非復鄭虎牢矣諸儒不知此義故或謂以霸主討不服之國地非鄭之所得私或謂鄭叛華即夷辱天子之封守罪當削奪故不曰鄭虎牢者削之於鄭也此皆非也楚殺其大夫公子申左傳楚公子申為右司馬多受小國之賂以逼子重子辛楚人殺之故書曰楚殺其大夫公子申三年春楚公子嬰齊帥師伐吳吳楚交兵始見經左傳楚子重伐吳克鳩兹吳邑在丹陽蕪湖縣東至於衡山在吳興烏程縣南使鄧廖侵吳吳人要而擊之獲鄧廖子重歸吳人伐楚取駕公如晉左傳始朝也夏四月壬戌公及晉侯盟于長樗樗勑居反公至自晉六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤左傳晉為鄭服故且欲修吳好將合諸侯使士丐告于齊曰寡君使丐以歲之不易不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使丐乞盟齊侯欲勿許而難為不協晉言願相見以謀不協而齊不許是齊為不協也乃盟于耐外與士丐盟耐水名音而六月公會單頃公及諸侯己未同盟于雞澤單頃公王卿士晉侯使荀會逆吳子于淮上吳子不至榖梁傳同者有同也同外楚也杜氏曰雞澤在廣平曲梁縣西南按前年城虎牢鄭人請成故今年合諸侯鄭列於會而同盟以堅服鄭也堅服鄭以同外楚也單子與盟蓋自齊桓假王人為重然首止葵丘會王人而不敢援與同盟世變日降王人之同盟屢矣習俗既成雖以悼公之賢而不知革也而其失亦難掩矣然是役也左氏謂非惟為鄭服之故固將以會吳也夫中國之於外裔制御有常道非有藉於外裔之有釁而自相制也使吳有慕義親諸夏之心因其來而禮接之可也今乃因患楚而通吳吳未始先於上國而上國屈冠裳禮義之尊決內外藩籬之限勤諸侯而逺會之宿師停旅延望其來又使卿逆諸淮而吳竟不至則其為失又已甚焉嗟乎悼之誠與其才君子之所與也而未免乎前人之斃者以其求諸外者多而正其本事諸內者或淺也本正不在威強而在德義事內則當先朝廷次華夏而後外裔也此春秋書雞澤同盟之義也陳侯使袁僑如會僑其驕反左傳楚子辛為令尹侵欲於小國陳成公使袁僑如會求成晉侯使和組父告於諸侯杜氏曰陳侯疾楚政而來屬晉本非召會而自來故言如會榖梁傳如會外乎會也於會受命也戊寅叔孫豹及諸侯之大夫及陳袁僑盟諸侯在而大夫自為盟始于此杜氏曰諸侯既盟袁僑乃至故使大夫别與之盟言諸侯之大夫則在雞澤之諸侯也殊袁僑者明諸侯之大夫所以盟盟袁僑也按榖梁氏曰諸侯盟又大夫相與私盟是大夫張也故雞澤之會諸侯始失政矣啖子曰諸侯盟已畢而袁僑至故大夫與之盟耳無他義也愚謂大夫奉君命而盟袁僑非大夫相與私盟也非大夫張也晉君方明六卿皆民譽諸侯和協何得因一盟而失政自是始乎但踐土之盟陳穆公如會文公未嘗再要以盟而陳服於晉歷三世而不叛袁僑受陳侯之指而來苟有誠服之心又何必汲汲以盟誓結之哉此則悼公不知本之過也秋公至自會冬晉荀罃帥師伐許左傳許靈公事楚不會于雞澤冬晉知武子帥師伐許張氏曰荀罃悼公之賢大夫也見陳人之服不能輔悼益修德以保陳陳固則許何患其不來今遽帥師以問罪於許規模欲速宜其并陳不能保也四年春王三月己酉陳侯午卒左傳春楚師為陳叛故前年何忌侵陳之師猶在繁陽楚地在汝南鮦陽縣南韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也杜云知時未可爭此陋説也一日之間天命未絶則為君臣已絶則為獨夫知此時也今我易之難哉晉力未能服楚受陳為非時三月陳成公卒楚人將伐陳聞喪乃止陳人不聽命夏叔孫豹如晉左傳穆叔如晉報知武子之聘也秋七月戊子夫人姒氏薨姒公作弋下定姒同左傳秋定姒薨不殯於廟無櫬親身棺不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎杜氏曰成公妾襄公母姒杞姓啖氏曰若如左氏所言則當不書薨葬此傳文當在定十五年姒氏卒下誤在此耳葬陳成公陳即中國魯會其葬八月辛亥葬我小君定姒公羊傳定戈者何襄公之母也定諡死才三十三日此定姒襄公之母也定十五年葬定姒哀公之母也襄哀越世未久不應皆諡曰定其必有誤或云此年定姒當從公羊作弋冬公如晉襄公之立至是才七歲爾且有母之喪孟獻子請鄫為屬而晉許之陳人圍頓按左氏楚人使頓間陳而侵伐之故陳人圍頓非處己寡怨之道也激楚怒耳山戎無終子嘉父因魏絳以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜二勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛因言和戎有五利公説從之五年春公至自晉夏鄭伯使公子發來聘左傳鄭子國來聘通嗣君也子國子産父叔孫豹鄫世子巫如晉左傳穆叔覿鄫太子於晉以成屬鄫書曰叔孫豹鄫太子巫如晉比諸魯大夫也巫若自受鄫命則豹當言及今巫來至魯魯侯命之令與豹同行故不言及比之魯大夫也魯大夫兩人同行皆不言及劉氏曰鄫屬於魯為附庸故相與往見於晉也諸侯死社稷正也不能守其國以卑其宗廟鄫失正矣天子建附庸非天子命而私有之魯失正矣汪氏曰諸侯之世子未誓以皮帛繼子男而亞於大夫之列非禮也然春秋時較強弱之勢無君臣之分以大國之卿當小國之君故鄫國微弱而其世子次於魯大夫也杜氏曰鄫小國今琅邪鄫縣仲孫蔑衛孫林父會于善道道公穀作稻左傳吳子使壽越吳大夫如晉辭不會於雞澤之故且請聽諸侯之好更請會晉人將為之合諸侯使魯衛先會吳且告會期故孟獻子孫文子會吳於善道杜氏曰魯衛俱受命於晉故不言及吳先在善道二大夫往會之故曰會吳善道地闕按此懲前日吳子之不至故重勤二大夫入吳地就吳子之所在而面會之秋大雩左傳旱也杜氏曰雩夏祭所以祈甘雨若旱則又修其禮故雖秋雩非書過也雩而獲雨故書雩而不書旱楚殺其大夫公子壬夫左傳楚人討陳叛故殺公子壬夫貪也杜氏曰陳之叛楚罪在子辛共王既不能素明法教陳叛之日又不能嚴斷威刑以謝小國而擁其罪人興兵致討加禮於陳四年楚將伐陳聞喪而止而陳恨彌篤乃怨而歸罪子辛子辛之貪雖足以取死然共王用刑為失其節矣公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚左傳九月丙午盟於戚會吳且命戍陳也杜云公及其會而不書盟非公後會蓋不以盟告廟穆叔以屬鄫為不利使鄫大夫聽命於會公羊傳吳何以稱人吳鄫人云則不辭胡傳謂吳來會諸侯而不為主則進而稱人諸侯往與之會而主吳則貶而稱國恐經無此意要之公羊之説是矣公至自會冬戍陳杜氏曰諸侯在戚皆受命各還國遣戍不復有告命故獨書魯戍程子曰非王命而勤民逺戍罪也而善於戍陳何哉蓋陳附中國而楚爭之則戌之者在於助陳而距楚與之可也楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳曹伯下公穀有莒子邾子滕子薛伯左傳楚子囊為令尹公子貞范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊代陳十一月甲午會于城棣以救之公及救陳而不及會故不書城棣城棣鄭地陳留酸棗西南有棣城李氏曰范宣子憂晉之不能保陳與管仲憂齊之不能保江黃正相類甚矣逺人之來固不可不恤而中國之力亦不可不量也然晉之竭力以救陳與齊之坐視不救又有間矣十有二月公至自救陳榖梁傳善救陳也辛未季孫行父卒左傳季文子卒大夫入斂公在位在阼階西鄉宰庀家器為葬備庀具也無衣帛之妾無食粟之馬無藏金玉無重器備器備謂珍寶甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎六年春王三月壬午把伯姑容卒左傳杞桓公卒始赴以名同盟故也夏宋華弱來奔左傳宋華弱與樂轡少相狎長相優又相謗也子蕩樂轡怒以弓梏華弱於朝張弓以貫其頸平公見之曰司武而梏於朝難以勝矣遂逐之夏宋華弱來奔秋葬杞桓公滕子來朝莒人滅鄫左傳鄫恃賂也杜氏曰鄫有貢賦之賂在魯恃之而慢莒劉氏曰五年秋穆叔以屬鄫為不利使鄫人聽命於會故經書吳人鄫人是魯已絶鄫鄫無賦於魯矣尚何恃賂取滅之有乎左氏之説非也公羊此年無傳五年傳云莒女有為鄫夫人者蓋欲立其出出謂鄫之甥莒之子也榖梁曰莒人滅鄫非滅也立異姓以􅊩祭祀滅亡之道也趙氏曰此蓋因昭四年復有魯取鄫之文以為若實滅之不合如此所以云立異姓也按莒今滅鄫以為附庸後魯取得之何妨書取鄫乎且定六年鄭滅許哀元年許復見經則鄫之滅而再見亦何足怪若鄫人實取外孫為國嗣罪自在鄫非莒之過則經文又當如梁亡之類而言鄫亡不得書滅且以人情物理言之鄫雖小國亦有君臣社稷豈肯居然取於異姓為後乎案其事情莒人以兵破鄫而立其子使守之其子鄫之外孫因令為附庸以奉鄫祀神不歆非類是使鄫絶祀事須書滅公榖但傳得立鄫甥守祀之説而不知事實耳冬叔孫豹如邾左傳冬穆叔如邾聘且修平四年邾人莒人伐鄫臧紇侵邾敗于狐駘季孫宿如晉左傳晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命趙氏曰據前年會於戚已令鄫聽命於會即明不私屬魯今鄫亡自不關魯事何得來討按滅鄫者莒也晉不問莒而問魯何耶蓋滅鄫之説三傳互異皆無的據妄説耳襄公幼弱政在季孫宿嗣父任喪未期而執使命植私交也魯既世卿而大夫無復三年之喪十有二月齊侯滅萊齊圖萊久矣自宣七年伐萊至是遂滅之萊薑姓例稱滅同姓書名今齊滅萊不名則例之説不通矣公羊傳曷為不言萊君出奔國滅君死之正也七年春郯子來朝夏四月三卜郊不從乃免牲左傳孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊夏正建寅之月郊而後耕今既耕而卜郊宜其不從也榖梁傳夏四月不時也三卜禮也汪氏曰三卜雖禮而卜郊止於三月今書四月而三卜不從則過時不敬故書以譏非時而非譏其瀆卜也杜氏曰牛已稱牲既卜日也卜郊又非禮也小邾子來朝城費音祕左傳南遺為費宰費季氏私邑叔仲昭伯為隧正主役徒欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費李氏曰自南遺既城之後費邑強南蒯繼為費宰非特季氏世卿而陪臣亦世其邑矣秋季孫宿如衛左傳報子叔之聘聘在元年趙氏曰豈有鄰國之聘經七年始報乎但其間非卿故不書耳左氏不達此説諸稱尋某之盟報某之聘多此類也八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟左傳衛孫文子來聘且拜武子之言辭緩報非二而尋孫桓子之盟盟在成三年楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬于軌反左傳楚子囊圍陳會于鄬以救之杜氏曰謀救陳陳侯逃歸不成救故不書救也鄬鄭地汪氏曰書楚圍陳書會于鄬書陳侯逃歸而不言救陳所以著荆楚滑夏之強晉悼安攘之怠而陳侯棄夷即華之心不固也自是凡會同無陳矣鄭伯髠頑如會未見諸侯丙戌卒于鄵髠苦門反公榖作髠原鄵七報反又采南反字林干消反左氏謂鄭僖公將會于鄬子駟相不禮焉及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯然諸侯方會其郊子駟其敢然乎胡氏曰弒而可以偽赴又順其欲而不彰則亂臣賊子免于見討而春秋非傳信之書矣黎氏曰若君實被弒以疾赴遂徒而書之則弒君豈有以實告者乎趙氏曰若實弒而書卒是春秋庇逆賊也公羊云曷為不言其大夫弒之為中國諱也鄭伯將會諸侯于鄬其大夫諌曰中國不足歸也以中國為義則伐我喪以中國為強則不若楚于是弒之榖梁云其不言弒何也不使夷狄之民指諸大夫欲與楚者加乎中國之君也按大夫欲與楚君不從而弒之此亦不近情理是時晉君方明豈不討乎趙氏曰按經文未見諸侯則是已出境臨欲相見耳公羊乃云未出境益見其非也公羊云未見諸侯其言如會何致其意也榖梁云禮諸侯不生名此其生名何也卒之名也卒之名則何為加之如會之上見以如會卒也此並是杜氏曰鄵鄭地據趙氏説則昨鄭地不欲再稱鄭伯故約文書其名于會上陳侯逃歸左傳陳人患楚慶虎慶寅二人陳執政大夫謂楚人曰吾使公子黃哀公弟往而執之楚人從之二慶使告陳侯于會曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸胡傳為陳侯計者下令國中大申警備立太子以固守親聽命于諸侯當是時晉君方明八卿和睦必能致力于陳矣奈何不顧而為匹夫之事乎故書逃歸以罪之八年春王正月公如晉左傳春公如晉朝且聽朝聘之數趙氏曰會邢丘亦言聽朝聘之數若朝時已受命何須更會左氏朝聘之下一切須言事由多非其實夏葬鄭僖公鄭人侵蔡獲蔡公子燮榖作濕後同左傳鄭子國子耳子耳之良之子侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順子産子國子曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗能寧矣公羊傳此侵也其言獲何侵而言獲者適得之也榖梁傳人微者也侵淺事也而獲公子公子病矣言公子病不任為將帥故獲鄭人曰蔡人不從以討於蔡春秋書曰侵則無名也言獲甚之也晉楚狎至鄭自啓戎也季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘左傳五月甲辰會于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊高厚宋向戌衛寧殖邾大夫會之鄭伯獻捷于會故親聽命大夫不書尊晉侯也榖梁傳見魯之失正也公在而大夫會也杜氏曰時公在晉晉悼難勞諸侯唯使大夫聽命故季孫在會而公先歸邢丘故邢國河內平臯縣也胡傳朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人而不由德乎使政在大夫又豈所以愛之也後此八年溴梁之會悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿會見魯之失政也諸侯之大夫貶而稱人謹其始也啖氏曰左氏云大夫不書尊晉侯也按尊晉侯則季孫亦當不書且魯君與他國大夫會例書名何獨尊晉侯乎李氏曰此條左氏得其事胡氏得其義論其事則不欲煩諸侯者晉侯之美意也論其義則不可委大夫者春秋之深意也左氏所謂尊晉侯者亦不過不以大夫敵諸侯之意耳公至自晉莒人伐我東鄙左傳以疆鄫田按莒滅鄫伐魯以疆鄫田其為姦齊盟大矣而伯討不及晉方慮楚故也據此則莒以兵滅鄫明矣孰謂以其子後鄫為滅鄫也秋九月大雩左傳旱也冬楚公子貞帥師伐鄭左傳冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔穆公子子蟜子遊子子展子罕子欲待晉子駟曰周詩有之曰俟河之清人壽幾何逸詩兆卜云詢謀多職主競作羅羅罔謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二境以待強者而庇民焉寇不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五會之信謂三年會雞澤五年會戚又會城棣七年會鄬八年會邢丘今將背之雖楚救我將安用之親我無成晉親鄭鄙我是欲楚欲以鄭為鄙邑不可從也不如待晉晉君方明四軍無闕上中下新軍八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之子展名聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云小雅謀夫孔多是用不集發言盈庭誰敢執其咎如匪彼也行邁謀謀于路人也是用不得于道衆無適從請從楚騑子駟名也受其咎乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索盡也敝賦以討于蔡獲司馬燮獻于邢丘今楚來討曰女何故稱兵于蔡焚我郊保馮陵我城郭馮迫也敝邑之衆夫婦男女不遑啓小跪也處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介獨使也行李行人也告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之于是及楚平不書鄭無信也晉侯使士丐來聘左傳范宣子來聘且拜公之辱告將用師于鄭九年春宋災災公作火左傳春宋災樂喜子罕為司城以為政素戒為備火之政使伯氏宋大夫司里里宰火所未至徹小屋塗大屋陳畚簣籠挶土輿具綆汲索缶汲器備水器盆􅧲之屬量輕重計人力所任蓄水潦積土塗巡丈城十尺為丈巡行其城以丈度之故云丈城繕守備行度守備之處恐因災作亂表火道使華臣華元子為司徒具正徒後徒令隧正官名納郊保奔火所使華閲討右官官庀其司閲亦華元子代元為右師討治庀具也向戍左師討左亦如之使樂遄司冦庀刑器刑書亦如之使皇鄖命挍正出馬工正出車備甲兵庀武守皇鄖皇父充石之後挍正主馬工正主車使各備其官使西鉏吾太宰也庀府守六官之典令司宫奄臣巷伯寺人警宫二師左右師令四鄉正鄉大夫敬享祝宗用馬于四墉祀盤庚于西門之外祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之逺祖凡天災有幣無牲用馬祀盤庚皆非禮晉侯問於士弱士渥濁之子莊子曰吾聞之宋災於是知有天道何故對曰古之火正或食於心或食於咮竹又反以出內火是故咮為鶉火心為大火謂火正之官配食于火星建辰之月鶉火星昏在南方則令民出火建戌之月大火星伏在日下夜不得見則令民內火禁放火陶唐氏之火正閼伯髙辛氏之子閼於葛反居商丘祀大火而火紀時焉謂出內火時相土因之契孫商之祖也故商主大火相土始代閼伯之後居商丘祀大火商人閲其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也杜氏曰天火曰災來告故書夏季孫宿如晉左傳報宣子之聘也五月辛酉夫人薑氏薨秋八月癸未葬我小君穆薑公作繆薑附左傳秦人侵晉晉飢弗能報也冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲許冝反左傳冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士丐門於鄟門鄭城門衛北宫括曹人邾人從荀偃韓起門於師之梁亦鄭城門滕人薛人從欒黶士魴門於北門杞人郳人從趙武斬行栗行栗表道樹甲戌師於汜東汜令於諸侯曰修器備盛餱糧歸老幼示捋久師居疾於虎牢諸侯已取鄭虎牢故使諸軍疾病息其中肆緩也眚過也圍鄭不書圍鄭逆服不成圍鄭人恐乃行成中行獻子荀偃曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍分四軍為三部與諸侯之鋭諸侯之鋭士亦分為三部以逆來者逆楚於我未病楚不能矣晉各一動而楚三來故曰不能猶愈於戰暴骨以逞不可以爭言爭當以謀不可以暴骨大勞未艾息也君子勞心小人勞力先生之制也尚謀為勞心之勞諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也將盟鄭六卿公子騑子駟公子發子國公子嘉子孔公孫輒子耳公孫蠆子蟜公孫舍之子展及其大夫門子卿之適子皆從鄭伯晉士莊子士弱為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與強可以庇民者是從而敢有異志者亦如之荀偃曰改載書子駟亦以所言載于䇿故欲改之公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還按荀罃欲分兵以敝楚後來三駕即用此䇿也左氏於乃盟而還之下又記晉人不得志於鄭十二月癸亥復伐之門其三門杜氏不悟其誤因云晉果三分其軍各攻一門與前注自相戾杜氏曰伐鄭而書同盟則鄭受盟可知戲鄭地啖氏曰左氏云冬十月諸侯伐鄭云云門于鄟門云云門于師之梁云云門于北門云云下又云諸侯復伐之十二月癸亥門其三門蓋誤重説也古史或有用周正者或有用夏正者故有兩月不同蓋作傳者承兩國之舊史月數不同遂兩載之又十有一月己亥同盟于戲左氏云鄭服也因載晉鄭盟辭云云按此誤也若是鄭與盟何不書及鄭同盟乎又左氏所載之辭乃是晉鄭二國相要何關諸國之事故知傳所載者自是晉鄭盟也經書同盟自是晉與諸國同盟鄭不與也永嘉吕氏曰按左氏同盟于戲鄭與焉然柯陵之盟亦書于伐鄭之後則鄭服未可知今以經考之盟柯陵之後諸侯再伐鄭則其未得志于鄭可知盟戲之後楚子伐鄭則為鄭服可知十一年同盟亳城北亦鄭受盟也會于蕭魚亦鄭與會也皆書于伐鄭之後比事而觀可見矣胡傳晉悼公屢與諸侯伐鄭楚輒救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之會以美之楚子伐鄭左傳楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯強是從今楚師至晉不我救則楚強矣盟誓之言豈敢背之且要盟無質主也神弗臨也所臨唯信信者言之瑞也善之主也是故臨之明神不蠲潔也要盟背之可也乃及楚平公子罷戎入盟同盟于中分中分鄭城中里名罷戎楚大夫楚莊夫人卒共王母王未能定鄭而歸附左傳晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下苟有積者盡出之國無滯積散在民亦無困人不匱乏公無禁利與民共亦無貪民禮讓行祈以幣更不用牲賔以特牲務崇省器用不作車服從給行之期年國乃有節三駕而楚不能與爭十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤柤莊加反左傳會于柤會吳子壽夢也三月癸丑齊髙厚相太子光以先會諸侯于鍾離夏四月戊午會于柤杜氏曰吳子在柤晉以諸侯往會之故曰會吳柤楚地夏五月甲午遂滅逼陽逼音福又彼力反穀作傳左氏謂晉荀偃士丐請伐逼陽而封向戍焉五月甲午滅之書曰遂滅逼陽言自會也以與向戍向戍辭乃豫宋公杜氏曰逼陽妘姓國今彭城逼陽縣也按逼陽及柤皆在今沛縣乃吳入中國之要路會吳于柤遂滅逼陽蓋為吳開道也左氏封向戍之説無據公至自會楚公子貞鄭公孫輒帥師伐宋陳氏曰凡専將言帥師苟二國會則先序主兵者而不言帥師言帥師是國自為帥也晉師伐秦左傳報其侵也杜氏曰荀罃不書不親兵也按方勞師于會吳滅逼陽而又西伐秦可謂虐用其民矣諸侯惟宋事晉最謹今宋受兵不速救而且以報怨又不知務也據左氏實荀偃帥師而不書略之也文公帖楚資秦之力吾以為悼公通吳之不若好秦也秋莒人伐我東鄙左傳莒人間諸侯之有事也故伐我東鄙公會晉侯宋公衛侯曺伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭此三駕之一左傳諸侯伐鄭齊崔杼使太子光先至于師故長于滕己酉師于牛首冬盜殺鄭公子騑公子發公孫輒騑公榖作斐按左氏鄭公子騑當國發為司馬輒為司空騑與尉止有爭及為田洫司氏堵氏侯氏子師氏皆喪田故五族聚不逞之徒以作亂入西宫殺三卿于朝不稱大夫程子以為失卿職也杜氏曰以盜為文故不得言其大夫戍鄭虎牢楚公子貞帥師救鄭左氏載諸侯之師城虎牢而戍之鄭及晉平楚子囊救鄭晉荀罃曰我實不能禦楚鄭何罪不如還也楚人亦還前城虎牢不言鄭此戍虎牢則繫之鄭者黎氏云城則取而城之故經有城楚丘城緣陵皆不繫之國戍者以兵守衛之故經有戍衛戍陳皆繫之國王氏云城虎牢不繫之鄭者時鄭從楚中國取其虎牢而城之為中國守險以制鄭非為鄭而城之也戍虎牢而繫之鄭者時鄭已從晉中國恐楚伐鄭故置兵守衛以拒楚是為鄭而戍之也按鄭及晉平于戍虎牢之後則謂鄭已從晉恐楚伐鄭為鄭而戍者亦未合左氏曰非鄭地也言將歸焉恐實有此意蓋既欲駐師厄險以逼之亦兼欲斷荆楚之路為鄭屏蔽鄭服則將歸焉德威並行以示懷納于鄭故春秋原其志而書之也城而不戍猶不城也楚來爭鄭徐合諸侯以救之無及于楚而勦民猶不救也此戍虎牢之意也戍則常宿兵峙糧據險退可守進可戰鄭服則保鄭以拒楚鄭二則我扼其要而制其肩膂南向足以禦楚而反向足以臨鄭胡氏謂不繫鄭者責在鄭繫鄭者罪諸侯不以義服書救者許楚皆非經意公至自伐鄭十有一年春王正月作三軍左傳春季武子將作三軍魯本無中軍唯上下二軍皆屬于公有事三子更帥以征伐季氏欲専其民人故假立中軍因以改作告叔孫穆子曰請為三軍各征其軍征賦稅也穆叔曰政將及子子必不能政者伯國之政令禮大國三軍魯次國而為大國之制貢賦必重故憂不能堪耳武子固請之穆子曰然則盟諸穆子知季氏將復變易故盟之乃盟諸僖閎僖宫之門詛諸五父之衢五父衢道名在魯國東南正月作三軍三分公室而各有其一三子各毁其乘説見下季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍説並見下孔氏曰昭五年云舍中軍明此年作而彼年舍故知舊有二軍今增立中軍也然則止是作中軍耳而云作三軍者傳言三子各毁其乘則舊時屬己之乘毁之以足成三軍是舊軍盡廢而全改作之故云作三軍也往前民皆屬公國家自有二軍若非征伐不屬三子故三子自以采邑之民為己之私乘如子産出兵車十七乘之類是其私家車乘也今既三分公室所分得者即是己有不須更立私乘故三子各自毁壞舊時車乘部伍分以足成三軍也其乘之人即所分得者國內三分有一之人也役謂共官力役則今之丁也邑謂賦稅若今之租調也以其役與邑皆來入季氏者則無公征不入季氏者則使公家倍征之設利病以懼民驅之使入已耳孟氏取其子弟之半四分其乘之人以三歸公而取其一叔孫氏盡取子弟以其父兄歸公昭五年傳追説此事云季孫盡征之叔孫氏臣其子弟孟氏取其半焉臣其子弟謂以父兄歸公取其半又如叔孫所取中更以半歸公也彼傳順序此文顛倒杜氏曰制軍分民不如是則三家不舍其故而改作也此蓋三家盟詛之本言胡傳古者大國三軍次國二軍小國一軍僖公之詩曰公車千乘車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸於朝車復於甸甲散於丘卒還於邑不相繫也文宣以來政在私門襄公幼弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作按杜氏謂魯舊二軍今增立中軍緣三子各毁其乘舊軍盡廢而全改作之故曰作三軍胡氏謂魯本有三軍今廢公室之三軍而三家各有其一故謂之作三軍胡氏發臣無私乘無私民之義甚中肯綮而説作三軍處未瑩蓋依周制則魯侯國止有二軍耳僖公之車千乘徒三萬亦僣也自周衰軍制僣亂而言晉已六軍矣觀魯成公作丘甲之後魯之軍亦踰制矣季孫行父臧孫許叔孫僑如公孫嬰齊以四卿並將于鞍之役則不止于三軍可知已然制度既壞則增減分合亦無定雖晉軍亦然而况魯乎伯主之令軍多則貢賦多魯之軍有時而為三有時而自減為二皆不可知也此作三軍蓋承乎自減為二之後杜氏謂增立中軍其説是也增立中軍止可謂之作中軍而曰作三軍者三家欲専其民人各毁其乘而改作之孔氏之説是矣前書城費此書作三軍明年書季孫宿救台遂入鄆著季氏之強也其後享范獻子而公臣不能具三耦民不屬公矣夏四月四卜郊不從乃不郊榖梁傳夏四月不時也四卜非禮也因四卜之瀆以著魯郊之僣汪氏曰僖三十一年亦四卜郊不從但書免牲不書不郊蓋免牲則不郊可知此云不郊則卜免牲不吉而不敢免也鄭公孫舍之帥師侵宋左傳鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱于晉晉不吾疾急也也晉疾楚將辟之何為而使晉師致死于我楚弗敢敵而後晉可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之使疆埸之司惡于宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋按鄭之謀國有二犧牲玉帛待於二竟欲唯強是從者子駟也晉君方明八卿和睦知必不棄鄭欲仗信以待晉者子展也至是子駟既亡子展遂堅於從晉然猶必侵宋以致諸侯之師使晉師驟來而後固與晉者蓋前此從晉則楚師至從楚則晉師至今故欲激使晉師致死於鄭楚弗敵而後可固與也卒之晉師三駕而楚弗能與爭可謂如子展之言矣然而子展未知本也子展所見者晉楚之力耳兩強則爭爭則難於兩與也一弱則吾與固矣此子展之見也然使鄭一於信義以從晉致死不二則以北方與國之多信好之重保鄭却楚有餘矣何至為是瀆武勞人以兾小定而僅給耶故為國在修德政以自強敦信義以睦鄰而待人之強有禮以為庇幸敵之少懦以苟安者愚而已矣公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭此三駕之二秋七月己未同盟于亳城北亳蒲洛反公穀作京左傳四月諸侯伐鄭鄭人行成秋七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎數伐鄭皆罷于道路程子曰鄭服而同盟也旋復從楚伐宋云同見其反覆杜氏曰亳城鄭地任氏曰偃師也故湯都啖氏謂鄭不與盟公至自伐鄭楚子鄭伯伐宋楚未知鄭隂附晉率鄭伐宋而鄭從之左氏謂楚乞旅于秦將以伐鄭討其從晉鄭伯逆之因與伐宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚此三駕之三左傳九月諸侯悉師此夏諸侯皆復來以復伐鄭觀兵于鄭東門鄭人行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉候二盟不書不告十二月戊寅會于蕭魚庚辰赦鄭囚皆禮而歸之納斥侯不相備也禁侵掠晉使叔肸叔向告于諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣杜氏曰蕭魚鄭地何氏曰中國以鄭故三年之中五起兵至是乃服其後無干戈之患二十餘年故喜而詳録其會孫氏曰言伐言會者得鄭之辭也鄭自桓文後晉楚爭之久矣晉悼比歲大合諸侯今始得之亦能有鄭踰二十年此晉悼之績也陳氏曰有地會而後伐者矣未有伐而後地會者也地會而後伐未集事之辭也伐而後地會集事之辭也公至自會程子曰兵不加鄭謂觀兵于東門故書至自會李氏曰厲公三伐終以伐致悼公三伐終以會致春秋之立文精矣楚人執鄭行人良霄穀作良宵左傳鄭人使良霄大宰石㲋如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也杜氏曰書行人言非使人之罪古者兵交使在其間所以通命示整或執殺之皆以為譏石㲋為介故不書釋例曰使以行言言以接事信令之要於是乎在舉不以怒則刑不濫刑不濫則兩國之情得通兵有不交而解者皆行人之勳也是以雖飛矢在上走驛在下及其末節不統大理遷怒肆忿快意於行人譬諸豺狼求食而已傳曰鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也故夫子特顯行人之文冬秦人伐晉報去年之役且秦景公之妹為楚共王夫人故為楚伐晉然楚既無以爭鄭秦亦安能黨楚左氏記晉為秦所敗而經不書者無傷晉之大體也十有二年春王二月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆台穀作邰鄆公作運莒五年之間三伐魯魯未暇治之今又圍魯邑故季氏既救吾邑遂入莒邑以報之也自榖梁稱受命而救台不受命而入鄆諸家自此爭攻季孫之生事夫季孫固可責也然魯政出乎季孫入鄆固不受命救台亦果受命者乎杜氏曰琅邪費縣南有台亭鄆莒邑宿始繼父為政即城費以固其私邑繼而作三軍分公室今而救台遂入鄆又取邑以自廣昭公逐定無正夫豈一朝夕之故哉劉氏曰公羊云伐而言圍者取邑之辭也非也伐一事也圍一事也取一事也三者不相亂榖梁云取邑不書圍安足書也亦非也取邑不書有所避耳夏晉侯使士魴來聘左傳來聘且拜師秋九月吳子乘卒吳始書卒左傳秋吳子壽夢卒壽夢吳子之號臨於周廟禮也周廟文王廟也周公出文王故魯立其廟以鄭祖厲王立所出王廟知其然也哀二年蒯聵禱云敢昭告皇祖文王是衛亦立文王廟也郊特牲曰諸侯不敢祖天子大夫不敢祖諸侯公廟之設于私家非禮也而諸侯得立王廟者彼謂無功德非王命而輒自立之則為非禮魯衛有大功德王命立之鄭祖厲王亦然凡諸侯之喪異姓臨於外于城外向其國同姓於宗廟所出王之廟同宗於祖廟始封君之廟同族於禰廟父廟也同族謂髙祖以下是故魯為諸姬臨於周廟為邢凡蔣茅胙祭六國皆周公之支子别封為國共祖周公臨於周公之廟冬楚公子貞帥師侵宋附左傳靈王求后於齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人不敢譽亦不敢毁故曰若而人此謂適者妾婦之子若而人此謂非適者無女而有姊妹及姑姊妹古人謂姑為姑姊妹若父之姊為姑姊父之妹為姑妹列女傳梁有節姑妹入大而救兄子是謂父妹為姑妹也後始單稱姑則曰先守某公之遺女若而人齊侯許昏王使隂里周大夫結之公如晉左傳公如晉朝且拜士魴之辱禮也趙氏曰大國使聘即須自往拜之是公無寧歲也而左氏言禮也一何謬乎此自别事故須往耳十有三年春公至自晉左傳孟獻子書勞于廟禮也趙氏曰從朝還非有軍戎險難之事何書勞之有杜氏曰還告廟及飲至及書勞三事偏行一禮則亦書至悉闕乃不書夏取邿音詩公作詩左傳夏邿亂分為三師救邿遂取之凡書取言易也不用師徒及用師徒而不勞雖國亦曰取用大師焉曰滅敵人距戰斬獲俘馘用力重雖雖邑亦曰滅弗地曰入謂勝其國邑不有其地杜氏曰邿小國任城亢父縣有邿亭劉氏曰左氏曰凡書取言易也非也春秋褒善貶惡難易何足記乎晉始息民是以楚侵宋而不報魯取邿而不討取無大亂而已附左傳荀罃士魴卒晉侯搜于綿上以治兵為將命軍帥也必搜而命之所以與衆共使士丐將中軍辭曰伯遊荀偃長昔臣習於知伯是以佐之非能賢也七年韓厥老知罃代將中軍士丐佐之習謂久熟故相佐請從伯遊荀偃將中軍代罃士丐佐之位如故使韓起將上軍辭以趙武又使欒黶以武位卑故不聽更命黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍自新軍超四等代偃韓起佐之欒黶將下軍魏絳佐之黶亦如故絳自新軍佐超一等代士魴新軍無帥將佐皆遷晉侯難其人使其什吏率其卒乘官屬以從於下軍秋九月庚辰楚子審卒冬城防左傳書事時也十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曺人莒人邾人滕人薛人杞人小邾人會吳于向蠆丑邁反公作蠆後同左傳吳侵楚楚敗吳師吳告敗于晉會于向為吳謀楚也吳氏曰左氏以此會為為吳謀楚然吳在向而晉率諸侯之大夫往會之是晉有求于吳非吳有求于晉也疑左氏所載事迹非其實杜氏曰叔老聲伯子也魯使二卿會晉敬事霸國晉人自是輕魯幣而益敬其使故叔老雖介亦列于會向鄭地齊子叔老字言晉敬魯使經所以並書二卿胡傳使舉上客而叔老並書季孫宿以卿為介叔老介于宿蓋兩失之附左傳吳子諸樊既除喪諸樊吳子乘之長子將立季札札諸樊少弟季札辭曰曺宣公之卒也諸侯與曺人不義曺君負芻也殺太子而自立將立子臧子臧去之遂弗為也以成曺君君子曰能守節君義嗣也誰敢姦君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之史記曰壽夢有子四人長曰諸樊次曰餘祭次曰夷昧次曰季札季札賢而壽夢欲立之季札讓不可于是立長子諸樊二月乙未曰有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曺人莒人邾人滕人薛人杞人小邾人伐秦晉秦兵爭止此左傳夏諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進至于棫位逼反林秦地不獲成秦不服荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之伯遊曰吾今實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役髙氏曰春夏興師煩擾列國將帥不和威德兩弛晉悼之政衰矣己未衛侯出奔齊公作衛侯衎左傳衛獻公戒孫文子寧惠子食皆服而朝日旰不召而射鴻于囿二子從之不釋皮冠而與之言二子怒孫文子如戚文子邑孫蒯文子之子入使公飲之酒使大師歌巧言詩小雅之卒章其詞曰彼何人斯居河之麋無拳無勇職為亂階蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將若之何伯玉蘧瑗對曰君制其國臣敢姦之雖姦之庸知愈乎言逐君更立未知當差否遂行從近關出公使子蟜子伯子皮三子衛羣公子與孫子盟于丘宫孫子皆殺之公出奔齊丘宫近戚地衛人立公孫剽孫林父寧殖相之以聽命于諸侯剽穆公孫胡傳按左氏衛寧殖將死語其子曰吾得罪於君名在諸侯之䇿曰孫林父寧殖出其君今春秋書衛侯出奔齊而不曰孫林父寧殖出其君者蓋仲尼筆削不因舊史之文也或曰孫寧出君衆所同疾史䇿書之是也聖人曷為不暴其罪而反以歸咎人主哉曰臣而逐君其罪已明矣人君擅一國之名寵神之主民之望也所為見逐無乃肆於民上縱其淫虐以棄天地之性乎故衛衎出奔不書所逐之臣而以自奔為名所以警乎人君為後世鑒也啖氏張氏説見桓十五年鄭伯突出奔蔡下按春秋唯弒君書某弒其君至於君為其下所出止書出奔而已如臣見逐亦止書某奔某上名下國也胡氏謂舊史書孫林父寧殖出其君而仲尼筆削稱衛侯出奔恐無此理出之為言不容而見逐之謂也臣子施於君父而史臣直書於䇿則非辭也故但言出奔而已言出奔則或君無道或臣強皆可推上下比事而見之矣専以為歸罪其君者害教之言也師曠之言足以警其君而不足以訓其臣信如其言是君可出矣曰君神之主也民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為是何言哉殆亂臣賊子之口實也莒人侵我東鄙秋楚公子貞帥師伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚左傳晉侯問衛故於中行獻子荀偃對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之重不可移就撫安之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎冬會于戚謀定衛也薛氏曰衛亂不討會其賊以定之非義也按荀偃本亦弒賊與欒書弒厲公故為逆賊林父謀而成其亂會地又賊之私邑也凡今年春列國之會于向者大半不至亦可見人心之公而晉悼坐荀偃之誤不少矣自是至剽弒衎歸衛有二君者十年晉實為之也是時魯有三家齊有崔慶衛有孫寧晉有荀范強家以類相庇以悼公之賢而無能為于此也惜哉蓋公怠矣明年遂薨亦其不學而懵於人倫大義之所致也張氏曰前書衛侯之奔此列孫林父于會晉為霸主抑君而臣是助具書于䇿則晉大夫之黨林父其惡具見左氏所載師曠中行偃之言専罪其君情可見矣高氏曰諸國書卿明皆林父之儔也十有五年春宋公使向戍來聘二月己亥及向戍盟于劉杜氏曰報二年豹之聘尋十一年亳之盟鄭氏曰劉魯地劉夏逆王后于齊左傳官師劉夏也從單靖公逆王后于齊卿不行非禮也杜氏曰劉采地夏名也天子卿書字劉夏非卿故書名天子無外所命則成故不言逆女又曰劉夏獨過魯告昏故不書單靖公天子不親昏使上卿逆而公監之故曰卿不行非禮趙氏曰若有單公經不應不書故知妄夏齊侯伐我北鄙圍成公救成至遇公羊傳其言至遇何不敢進也杜氏曰遇魯地書至遇公畏齊不敢至成季孫宿叔孫豹帥師城成郛左傳齊侯圍成二於晉故也於是乎城成郛秋八月丁巳日有食之邾人伐我南鄙左傳秋邾人伐我南鄙使告于晉晉將為會以討邾莒晉侯有疾乃止冬晉悼公卒遂不克會冬十一月癸亥晉侯周卒李氏曰悼公立於成公十八年凡十六年起四公之衰復文襄之盛入國之明日逐不臣者七人即位之一月取六官於民譽八年九合則勤於安夏也三分四軍則謹於用民也騶御知訓則教士有法也此其所以能得諸侯服鄭而駕楚也然能服諸侯而不能杜大夫用事之漸能得鄭而不能掩失陳之責能駕楚而不能蓋誘吳之非蕭魚以後凡三大會荀偃士丐儼然臨之何謹於諸侯而縱於大夫乎陳不可棄猶鄭不可舍也戍陳之役以為有陳非吾事無之而後可鄭雖向晉陳竟歸楚何工於撫鄭而拙於懷陳乎吳不可啓猶楚不可張也會向之役欲數吳不德以退吳人亦已晚矣楚患少息吳憂復甚何明於治楚而暗於治吳乎不然悼公之霸過桓文矣按不討衛孫林父寧殖逐君之惡尤失之大者有關中國之世教焉魯之三家晉之六卿齊之崔慶陳氏視此而縱矣十有六年春王正月葬晉悼公三月公會晉侯宋公衛侯鄭伯曺伯莒子邾子薛伯杞伯小邾子于溴梁溴古閴反左傳春葬晉悼公平公即位平公悼公子彪羊舌肸為傅叔向也代士渥濁張君臣為中軍司馬張老子代其父祁奚韓襄無忌子欒盈士鞅為公族大夫虞丘書為乘馬御代程鄭改服修官蒸于曲沃既葬改喪服修官選賢能曲沃晉祖廟蒸冬祭也警守而下順河東行會于溴梁命歸侵田以我故執邾宣公莒犂比公且曰通齊楚之使杜氏曰不書高厚逃歸故也溴水名出河內軹縣東南至溫入河又曰邾莒在齊楚往來道中故并以此責之蘇氏曰衛侯剽也二十五年衛侯入夷儀衎也二君皆稱衛侯按晉悼公將為魯討邾莒未果而卒平公初立以父之志兼虞諸侯有異志故為是會以嗣霸而攬諸侯也然踰月而葬改服而蒸其不懷親也甚矣方在喪稱子之日而合諸侯接會享使諸大夫歌詩必類其越於禮也大矣國君風化之本人倫政事之基而所為若是不待大夫専盟而後可罪也趙氏曰高厚若已在會棄盟而逃經不合不書僖五年會首止鄭伯逃歸不盟襄七年會于鄬陳侯逃歸並書以明其罪何得此不書乎戊寅大夫盟左傳晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類齊高厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸於是叔孫豹晉荀偃宋向戌衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭公羊傳諸侯皆在是其言大夫盟何信在大夫也何言乎信在大夫遍刺天下之大夫也曷為遍刺天下之大夫君若贅旒然榖梁傳溴梁之會諸侯失正矣諸侯會而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也張氏曰春秋莊十三年以前禮樂征伐自諸侯出而權未一也自桓文繼霸中國之政齊晉専之然猶在諸侯也至今年以後則皆自大夫出矣故於此書大夫盟著世變之益降也陳氏曰文十五年盟扈十七年會扈霸主在而但曰諸侯者無霸也此盟君在而但曰大夫者無君也汪氏曰經書大夫不序者四救徐之役諸侯次匡不行而遣大夫往救則大夫之帥師實受諸侯之命也雞澤之盟諸侯已盟而大夫又盟然猶受命而盟袁僑也溴梁之盟則諸侯皆在而大夫自相與盟非諸侯之命矣于宋之盟則諸侯不在而大夫自為會盟矣然經於此年不以大夫繫之諸侯著大夫之無諸侯也于宋之盟復以大夫繫之諸侯不使大夫之終無諸侯也晉人執莒子邾子以歸執以歸始此左傳見溴梁條下杜氏曰既盟而後告故經書執在大夫盟下又云邾莒二國數侵魯又無道於其民故稱人以執不以歸京師非禮也齊人伐我北鄙杜氏曰齊二晉故夏公至自會五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許左傳許男請遷于晉欲叛楚諸侯遂遷許許大夫不可晉人歸諸侯唯以其師討許之不肯遷鄭子蟜聞將伐許遂相鄭伯以從諸侯之師鄭與許有宿怨故其君親行穆叔從公從公歸齊子帥師會晉荀偃書曰會鄭伯為夷故也夷平也夏六月次于棫林庚寅伐許次于函氏棫林函氏皆許地按許小國也嘗請遷于楚矣楚子徴求之重鄭之陵逼之頻聞晉悼之風義所以又請遷於晉也然以悼不能有陳而平又豈能保許乎亦不量力矣然小國來而撫之義也其君臣之謀未協許大夫不可盍諭之以德而遽加之兵乎書伐許見不務德而勤兵也不先書主兵之荀偃而書後至之鄭伯臣不可過君也宋稱人蓋微者按春秋之例用兵則主兵者為首大夫雖主兵不得在諸侯上此經所書正其明例左氏乃别生義曰為夷故也説者謂禮卿不會公侯而可以會伯子男此處欲示叔老可以會鄭伯故荀偃在下殊為曲説無理秋齊侯伐我北鄙圍成左作圍郕大雩冬叔孫豹如晉左傳冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之間恐無及也十有七年春王二月庚午邾子牼卒牼苦耕反公穀作瞷音間宋人伐陳夏衛石賈帥師伐曺左傳衛孫蒯田于曺隧飲馬于重丘曺邑毁其瓶重丘人閉門而詬罵也之曰親逐而君蒯與父共逐其君爾父為厲父為惡首故以惡鬼罵之是之不憂而何以田為夏衛石賈孫蒯伐曺取重丘曺人訴于晉秋齊侯伐我北鄙圍桃齊高厚帥師伐我北鄙圍防桃公作洮高厚左無齊字杜氏曰辨縣東南有桃虛九月大雩宋華臣出奔陳冬邾人伐我南鄙左傳為齊故也十有八年春白狄來白狄始來不言朝狄不能朝亦不與其朝也夷狄於天子世一見諸侯不得通也君子德不及焉不享其贄天子而讓也况守藩之臣乎夏晉人執衛行人石賈左傳為曺故也按石賈即前年伐曺者使晉治之以其罪則不當書行人傳與經不合秋齊師伐我北鄙穀作齊侯冬十月公會晉侯宋公衛侯鄭伯曺伯莒子邾子滕子薛伯杞伯小邾子同圍齊左傳晉侯伐齊將濟河中行獻子以朱絲繫玉二玨古學反雙玉曰瑴而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主民神之主也曾臣彪將率諸侯以討焉其官臣偃實先後之苟捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月會于魯濟尋溴梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里平隂城在濟北盧縣東北其城南有防防有門于門外作塹橫行廣一里故經書圍齊侯登巫山以望晉師巫山在盧縣東北晉人使司馬斥侯也山澤之險雖所不至必斾而疏陳之使乘車者左實右偽以斾先輿曵柴以揚塵而從之齊侯見之畏其衆也乃脫歸脫不張旗幟丙寅晦齊侯夜遁程子曰書同圍見諸侯之惡齊按鞍之戰晉為魯衛伐齊春秋不與也今年之役為魯伐齊而與之者何鞍之役名為魯衛出師其實大夫逞其私憾况頃公以不謹於禮婦人笑辱之小故而致兵非若齊環恃其桀暴虐鄰殘民四年之中至於六伐鄙而四圍邑不道之甚為諸侯所共疾也晉討得其罪與衆同欲而非為其私也故書同圍以與之曺伯負芻卒于師楚公子午帥師伐鄭左傳鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚楚令尹公子午子庚弗許楚子聞之使楊豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱楚師伐鄭門于純門信于城下而還晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功十有九年春王正月諸侯盟于祝柯柯公作阿左傳諸侯還自沂上盟于督揚即祝柯曰大母侵小杜氏曰前年同圍齊之諸侯也張氏曰後漢志平原郡祝阿春秋時曰祝柯地譜齊州禹城縣齊邑孫氏曰諸侯不序前目後凡也晉人執邾子左傳執邾悼公以其伐我故杜氏曰稱人以執惡及民也公至自伐齊會書圍而致書伐書勞勩則圍為重辨曲直則伐為善取邾田自漷水漷好虢反又音郭左傳遂次于泗上疆我田正邾魯之界也泗水名取邾田自漷水歸之于我孔氏曰邾在魯南田在漷水北今更以漷水為界取邾漷北之田歸于魯也十六年命歸侵田此年正邾魯之界則此田舊是魯界邾人取以為己有今日使之歸魯故曰取邾田也公羊傳曰其言自漷水何以漷為竟也何言乎以漷為竟漷移也其意言邾魯以漷水為竟漷水移入邾界魯隨而有之其説不可通也杜氏曰漷水出東海合鄉縣西南經魯國至高平湖陸縣入泗季孫宿如晉謝討齊并疆邾田也葬曺成公夏衛孫林父帥師伐齊前討齊未得志齊師自遁獲其殿者二人而竟未得其成故荀偃卒而視不可含欒盈有所不嗣事于齊有如河之語則此衛之師其晉命與于強弗友無剛克之德而以興戎于服人之道末矣况衛侯播越在齊已不能正而又使其賊臣主兵以臨之不亦甚乎秋七月辛卯齊侯環卒環公作瑗左傳齊侯娶于魯曰顔懿姬無子其姪鬷子公反聲姬生光以為太子兄子曰姪顔鬷皆二姬母姓因以為號懿聲皆諡諸子諸妾姓子者仲子戎子皆宋女戎子嬖仲子生牙屬諸戎子戎子請以為太子許之仲子曰不可廢常不祥廢立嫡之常間諸侯難光之立也列於諸侯矣列諸侯之會今無故而廢之是専黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東太子光廢而徙之東鄙使高厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市夏五月壬辰晦齊靈公卒經書七月辛卯光定位而後赴莊公即位大子光也執公子牙於句瀆之丘句古侯反瀆音豆以夙沙衛易已衛奔高唐以叛光謂衛教公易已髙唐在祝柯縣西北晉士丐帥師侵齊至榖聞齊侯卒乃還公羊傳還者何善辭也何善爾大其不伐喪也此受命于君而伐齊何大乎其不伐喪大夫以君命出進退在大夫也榖梁傳還者事未畢之辭也受命而誅生死無所加其怒不伐喪善之也善之則何為未畢也君不尸小事臣不専大名善則稱君過則稱已則民作讓矣士丐外専君命故非之也然則為士丐者宜奈何宜墠帷而歸命乎介除地為墠于墠張帷反命于介介歸告君君命乃還不敢専也胡傳使士丐未出晉境墠帷而歸命乎介可也已至齊地則進退在士丐矣况喪必不可伐非進退可疑而待請者故至榖聞齊侯卒乃還善之也八月丙辰仲孫蔑卒齊殺其大夫高厚左傳秋八月齊崔杼殺高厚於灑藍齊地而兼其室高氏曰齊高厚嘗帥師伐我矣晉新行義於齊齊侯始立而欲親晉故歸罪於高厚而殺之以説于晉此明年所以與澶淵之盟也張氏曰殺高厚者崔杼亦莊公之志也故以纍上之辭言之汪氏曰微崔杼之力莊公固不得立然崔杼殺高厚慶封討夙沙衛明年復使慶佐為大夫誅牙餘黨崔慶自是専權而射股之禍兆於此矣鄭殺其大夫公子嘉左傳鄭子孔之為政也専國人患之乃討西宫之難與純門之師甲辰子展子西率國人伐之殺子孔而分其室胡傳不稱鄭人者嘉則有罪矣而子展子西不能正以王法乃利其室而分之有私意焉故稱國以殺而不去其官尉止入西宫殺三卿子孔知而不言前年楚伐鄭門于純門子孔召之冬葬齊靈公城西郛左傳懼齊也叔孫豹會晉士丐于柯左傳齊及晉平盟于大隧地闕故穆叔會范宣子于柯齊晉平魯懼齊故為柯會以自固穆叔見叔向賦載馳之四章四章曰控于大邦誰因誰極叔向曰肸敢不承命杜氏曰魏郡內黃縣東北有柯城城武城左傳穆叔歸曰齊猶未也不可以不懼乃城武城按隨侯懼而修德而楚不敢伐齊魯皆千乘之國孔子行乎定公而齊人懼使是時魯之君臣自立有道何至以百里畏人也乃君弱臣惰安於不競內則疲民於亟城之勞外則徼惠於霸國之援亦何益哉杜氏曰泰山南武城縣二十年春王正月辛亥仲孫速會莒人盟于向速公作遬後同左傳及莒平孟莊子會莒人盟于向督揚之盟故也杜氏曰向莒邑莒數伐魯前年諸侯盟督揚以和解之故二國自復共盟結其好速代父為卿未練而從政無復三年之喪也孟獻子禫縣而不樂則始不三年其昉於速與夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曺伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵澶市然反左傳夏盟于澶淵齊成故也按齊靈之不道諸侯圍之而不服士丐帥師伐之聞喪而還晉有禮矣加以莊公初立亦欲求成以自定是以為此盟也然感不伐喪之義居喪而出盟不已亟乎于經服異則書同盟此齊成而盟不言同者六月盟于澶淵方至自會而仲孫速已帥師伐邾諸侯之志不同可知矣杜氏曰澶淵在頓丘縣南一名繁汙衛地近戚田秋公至自會仲孫速帥師伐邾左傳邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之襄陵許氏曰祝柯之會既執邾子又取其田報亦足矣而復伐之不已甚乎且澶淵在彼何以盟為蔡殺其大夫公子燮蔡公子履出奔楚燮穀作濕左傳蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常徴發無凖公子燮求從先君以利蔡不能而死按燮蓋嘗為鄭所獲者欲舍乎楚而從乎晉正也追先君之志而成之順也楚政無常求寬其民忠也用事者安楚弗欲而殺之故稱國而不去其官言殺無罪也履其母弟不奔中國而獨奔楚不與其兄同志書者罪之也陳侯之弟黃出奔楚黃公榖作先後同左傳陳慶虎慶寅陳卿畏公子黃之逼恐奪其政訴諸楚曰與蔡司馬同謀同欲之晉楚人以為討公子黃出奔楚欲自理也書曰陳侯之弟黃出奔楚言非其罪也公子黃將出奔呼于國曰慶氏無道求専陳國暴蔑其君而去其親五年不滅是無天也髙氏曰陳黃蔡履所以奔楚自理也黃以寵任太過權逼其卿慶氏譛之而陳侯不能為之辨明是以一國之大不能容一弟也襄陵許氏曰二慶執陳之權外介大國以奔其君之弟而哀公不能正則國何恃而不亡叔老如齊左傳齊子初聘于齊禮也杜氏曰齊魯有怨朝聘禮絶今始復通故曰初繼好息民故曰禮冬十月丙辰朔日有食之季孫宿如宋左傳報向戌之聘附左傳衛寧惠子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒悼子寧喜二十有一年春王正月公如晉左傳拜師及取邾田也邾庶其以漆閭丘來奔左傳邾庶其以漆閭丘來奔庶其邾大夫季武子以公姑姊妻之計公年不得有未嫁姑姊蓋寡者二人皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎庶其非卿也以地來雖賤必書重地也榖梁傳漆閭丘不言及小大敵也杜氏曰二邑在高平南平陽縣東北有漆鄉西北有顯閭亭以邑出為叛適魯而言來奔內外之辭汪氏曰定十五年城漆即庶其邑胡傳小國之大夫不書其以事接我則書如莒慶秦術之類以事接我皆書名非専以重地漆一邑閭丘一邑而不言及者庶其之私邑所受于君而食之者也書名書地而竊邑叛君之罪見矣書來奔而魯受叛臣納其地之罪亦見矣按昔莒僕以寶玉來奔季文子使出諸竟今宿乃自受庶其之奔蓋納莒僕者宣公也故行父假公義以匡君而實隂以攬權焉今已作三軍分公室則納叛人與其邑皆季氏之有爾故不復顧前日之言矣自受庶其其後莒牟夷邾黑肱接踵而至曲阜之地遂為盜藪然皆非公意也襄公如晉而庶其以漆閭丘來昭公如晉而牟夷以牟婁防兹來昭公在乾侯而黑肱以濫來為盜藪者實季氏也季康子患盜子曰苟子之不欲雖賞之不竊盜與季氏其所取不同而其欲同也季氏以百乘之家而猶患貧患寡至富於周公而不自知其足彼小人貧而不勝其欲以至於竊又何怪焉孔子告康子之言則春秋書三叛人以戒為國者不可見利忘義之意也附左傳齊侯使慶佐為大夫復討公子牙之黨執公子買於句瀆之丘公子鉏來奔叔孫還奔燕三子齊公族言莊公斥逐親戚以成崔慶之勢終有篡弒之禍夏公至自晉秋晉欒盈出奔楚左傳欒桓子黶娶於范宣子生懷子盈范鞅以其亡也怨欒氏十四年晉伐秦欒針曰此役也報櫟之敗也役又無功晉之耻也吾有二位于戎路敢不耻乎與士鞅馳秦師死焉士鞅反欒黶謂士丐曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也士鞅奔秦故與欒盈為公族大夫而不相能桓子卒欒祁桓子妻范宣子女盈之母也與其老州賔通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂以范氏為死桓主謂欒黶而専政矣曰吾父逐鞅也不怒而以寵報之士鞅奔秦後秦伯言于晉而復之言士丐不為黶責怒鞅而反與寵位也又與吾同官而専之吾父死而益富死吾父而専於國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徴懷子好施士多歸之宣子畏其多士也信之懷子為下卿下軍佐宣子使城著晉邑而遂逐之在外易逐欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆十子皆晉大夫欒盈之黨也囚伯華叔向籍偃樂王鮒晉大夫見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫祁奚食來于祁因以為氏祁縣今屬太原樂王鮒從君者也何能行何能言皆得行祁大夫外舉不棄讐內舉不失親其獨遺我乎晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乘馹而見宣子曰謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎宣子説與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝按欒書弒君而免於討欒黶汰而以內亂亡其家盈奔雖非其罪而積惡有自來矣九月庚戌朔日有食之冬十月庚辰朔日有食之石氏曰日食之變起於交也有雖交而不食者春秋二百四十二年而食才三十六有頻交而食者此年及二十四年三年之內連月而食者再也諸儒以為厯無此法或傳寫之誤然漢之時亦有頻食者髙帝三年及文帝前三年十月晦十一月晦是也天道至逺後世執推步之術按交會之度而求之亦已難矣曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曺伯莒子邾子于商任任音壬左傳錮欒氏也杜氏曰商任地闕按欒盈實奔楚楚非晉令所行也然則合諸侯而錮之何益哉蓋盈入楚必歷諸國還而求入亦必歷諸國晉知盈必求入故預約諸國使皆勿容其蹤迹所向以杜其還爾附公羊傳十有一月庚子孔子生二十有二年春王正月公至自會夏四月附左傳夏晉人徴朝于鄭鄭人使少正鄭卿官公孫僑子産對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉是以有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜二於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實土地所有重之以宗器宗廟禮樂之器鐘磬之屬以受齊盟遂帥羣臣隨於執事以會歲終朝正二於楚者子侯石盂石㲋歸而討之溴梁之明年子蟜老矣公孫夏從寡君以朝於君見於嘗酎酒之新熟重者為酎嘗新飲酒為嘗酎直又反與執燔焉助祭間二年聞君將靖東夏謂二十年澶淵盟間間厠之間四月又朝以聽事期先澶淵二月往朝以聽會期不朝之間無歲不聘無役不從以大國政令之無常國家罷病不虞薦至薦仍也無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實口實但有其言而已其無乃不堪任命而翦為仇讐敝邑是懼其敢忘君命委諸執事執事實重圖之秋七月辛酉叔老卒附左傳秋欒盈自楚適齊晏平仲言於齊侯曰商任之會受命於晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣九月鄭公孫黑肱有疾黑肱子張歸邑於公召室老宗人立段假子石黑肱子而使黜官無多受職薄祭祭以特羊殷以少牢四時祀以一羊三年盛祭以羊豕殷盛也足以供祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也己巳伯張卒君子曰善戒冬公會晉侯齊侯宋公衛侯鄭伯曺伯莒子邾子薛伯杞伯小邾子于沙隨邾子下公穀有滕子左傳復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼按晉以欒氏之故期年之間再合諸侯見大夫之強也齊人終保盈是令不行也令不行者以欒氏世勳出不以罪士丐之義有不直也觀春秋書二會見其以霸主之勢而強諸侯以不順之令後書伐衛遂伐晉見晉國自亂而盟主至於受伐其戒深切著明矣自欒賔以靖侯之孫傳桓叔至貞子枝佐文公霸業枝之子盾事靈公書盾之子盈書之孫也公至自會楚殺其大夫公子追舒左傳楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士御王車者王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾請徙子尸於朝欲犯命取殯曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讐吾弗忍也遂縊而死杜氏曰傳譏康王與人子謀其父失君臣之義棄疾之事與唐李懷光之子李璀甚相類璀嘗諫其父力竭而不能回則勸德宗為之備父敗則與之俱死棄疾之事據傳之所載豈亦嘗諫其父而不從乎二十有三年春王二月癸酉朔日有食之三月己巳把伯丐卒左傳杞孝公卒晉悼夫人晉平公母杞孝公姊妹喪之平公不徹去也樂非禮也禮為鄰國闕杜氏曰禮諸侯絶期故以鄰國責之孔氏曰杞孝公晉平公之舅也尊同不降於禮當服緦麻三月但緦服既輕其恩不過鄰國故傳言禮為鄰國闕也夏邾畀我來奔公作鼻我杜氏曰畀我是庶其之黨同有竊邑叛君之罪來奔故書葬把孝公陳殺其大夫慶虎及慶寅左傳陳侯如楚公子黃訴二慶於楚楚人召之使慶樂二慶之族往殺之慶氏以陳叛夏屈建從陳侯圍陳屈建楚莫敖陳人城治城以距君板隊而殺人隊直類反板城築之板也慶氏督役怒其板墜遂殺築人言其虐役人相命各殺其長遂殺慶虎慶寅楚人納公子黃按慶虎慶寅據國叛君其罪大矣不正其誅而稱國以殺何也見陳侯之不能以罪討也小人欲専其權寵而不能逺至欲去其介弟以除逼而不能保使肆誣於大國而不能辨幸而公子黃之理得申陳侯始得因楚之力以討叛而二賊以城築之虐自見殺于役人之手故不以討賊之辭言之使陳能討賊則必如欒盈良霄之例矣使楚能為陳討賊則必如夏徴舒慶封之例矣杜氏曰二十年二慶譛黃黃奔楚今陳侯往楚乃信黃言及史異辭無義例陳侯之弟黃自楚歸于陳杜氏曰諸侯納之曰歸黃至楚自理得直故為楚所納晉欒盈復入于晉入于曲沃左傳晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士藩車之有障蔽者若使媵妾在其中納諸曲沃欒盈夜見胥午而告之胥午守曲沃大夫對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之謝衆之思已四月欒盈帥曲沃之甲因魏獻子魏舒以晝入絳晉國都或告曰欒氏至矣范宣子懼奉公以如固宫固宫宫之有臺觀備守者范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶驂乘必持帶防隊隋遂超乘跳上獻子車右撫劍左援帶劫之命驅之出僕請請所之鞅曰之公宣子逆諸階執其手賂之以曲沃范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劍以帥卒欒氏退攝車從之鞅攝宣子戎車欒盈奔曲沃晉人圍之按納欒盈者齊也不稱所自譬如盜賊潛入之爾盈將不利於宗國非晉臣矣猶繫於晉彼晉之世臣逐非國討而出於柄臣之私意也入於曲沃則入於晉矣故自齊入曲沃自曲沃入絳而惟書復入於晉也自晉奔曲沃而特書入於曲沃也曲沃人願為之死則其入於絳也曲沃有奉焉其退而奔也曲沃有受焉而書曰入深惡之也曲沃即桓叔所封嘗以傾晉而其民為之隱曰我聞有命不敢以告人今為欒氏私邑復感其私恩莫知有君臣之分逆順之理聞語欒孺子則泣以為得主而為之死猶不死也當是時強家得衆皆以厚施於民使知有私家而不知有公室春秋所以書為後世戒也其亦深切著明矣杜氏曰以惡入曰復入兵敗奔曲沃據曲沃衆還與君爭非欲出附他國故不言叛秋齊侯伐衛遂伐晉左傳秋齊侯伐衛自衛將遂伐晉晏平仲曰君恃勇力以伐盟主憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎弗聽陳文子完之孫須無見崔武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有言有急不能顧君欲弒之以説晉子姑止之文子退告其人曰崔子將死乎謂君甚而又過之過君以義猶自抑也况以惡乎齊侯遂伐晉取朝歌今屬汲郡為二隊分兵為二部入孟門晉隘道登太行山在河內郡北張武軍謂築壘壁於熒庭晉地戍郫邵取晉邑而守之封少水封晉尸于少水以為京觀以報平隂之役乃還趙勝帥東陽之師以追之獲晏氂趙勝趙旃之子東陽晉之山東魏郡廣平以北晏氂齊大夫杜氏曰兩事故言遂八月叔孫豹帥師救晉次于雍榆雍於用反榆公榖作渝公羊傳曷為先言救而後言次先通君命也榖梁傳言救後次非救也杜氏曰豹救晉待命於雍榆雍榆晉地汲郡朝歌縣東有雍城蘇氏曰聶北之役先言次而後言救按兵待時卒能救邢故以救終之也雍榆之役先言救而後言次以救晉出兵而盤桓於雍榆不及於事故以次終之也陳氏曰次而救匿其救之之形也救而次宣其救之之聲也書救晉何晉遂失霸也以區區之魯何救於晉書救晉則天下益多故矣盟於宋而南北分會於申而淮夷列戰於雞父而敗於吳者六國於越入吳春秋終焉汪氏曰外傳記子服惠伯之言曰欒氏之亂齊人間晉之禍伐取朝歌我先君襄公不敢寧處使叔孫豹悉帥敝賦踦跂畢行無有處人以從軍吏次于雍榆與邯鄲勝擊齊之左掎止晏萊焉齊師退而後敢還則穆叔非無功於晉也然春秋不著其救患之功但曰次于雍榆蓋穆叔與趙勝皆畏齊而不敢進待其已去而躡其後耳己卯仲孫速卒杜氏曰孟莊子也左傳季武子無適子公彌公鉏長而愛悼子紇欲立之訪於申豐季氏屬大夫曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然猶必爾將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧紇命北面重席新樽潔之酒樽既新復潔澡之召悼子降逆之大夫皆起及旅獻酬禮畢通行而召公鉏使與之齒使從庶子之禮季孫失色恐公鉏不從季孫以公鉏為馬正家司馬愠而不出閔子馬閔馬父見之曰子無然禍福無門唯人所召為人子者患不孝不患無所位處敬共父命何常之有言廢置在父無常位也若能孝敬富倍季氏可也父寵之則可富姦回不軌禍倍下民可也禍甚于貧賤公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往饗燕之具盡舍旃故公鉏氏富又出為公左宰出季氏家臣仕于公孟孫惡臧孫季孫愛之孟氏之御騶豐點好羯也騶掌馬之官兼掌御事謂之御騶羯孟莊子之庶子孺子秩之弟孝伯也曰從余言必為孟孫再三云羯從之孟莊子疾豐點謂公鉏苟立羯請讐臧氏公鉏謂季孫曰孺子秩固其所也固自當立若羯立則季氏信有力於臧氏矣臧氏因季孫之欲而為定之今若專立孟氏之少則季氏有力過臧氏弗應己卯孟孫卒公鉏奉羯立於户側戶側喪主季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也欲擇才焉而立之季孫之言也還以答之且夫子之命也遂誣孟孫遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣汪氏曰魯自仲遂殺適立庶公室於是乎失政魯卿自季孫宿以私意廢長立幼於是家臣效尤孟氏之豐點廢秩立羯叔孫氏之豎牛殺孟丙而立舍皆託廢立以擅其權而三桓微矣作俑之禍其流弊可勝言哉冬十月乙亥臧孫紇出奔邾左傳孟氏閉門告於季孫曰臧氏將為亂不使我葬欲為公鉏讐臧氏故季孫不信臧孫聞之戒為備冬十月孟氏將辟穿藏也藉除於臧氏於臧氏藉人除葬道臧孫使正夫助之正夫隧正隧正當屬司徒臧氏為司冦而借之臧氏者蓋兼掌之除於東門甲從已而視之臧孫畏孟氏故以甲士自從而視作者孟氏又告季孫季孫怒命攻臧氏見其有甲故乙亥臧紇斬鹿門魯南城東門之關以出奔邾初臧宣叔娶於鑄國也濟北蛇丘縣所治生賈及為而死繼室以其姪穆薑之姨子也姪穆薑姨母之子與穆薑為姨昆弟生紇長於公宫薑氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡大龜焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為臧為以納請遂自為也臧為自為請臧孫如防臧氏邑使來告曰紇非能害也知不足也言使甲從已但慮事淺耳非敢私請為其先人請也苟守先祀無廢二勳文仲宣叔敢不辟邑乃立臧為臧紇致防而奔齊孔子曰臧武仲以防求為後於魯雖曰不要君吾不信也榖梁傳其日正臧孫紇之出也蘧伯玉曰不以道事其君者其出乎杜氏曰阿附季氏為之廢長立少以取奔亡書奔罪之晉人殺欒盈左傳晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋公羊傳曷為不言殺其大夫非其大夫也榖梁傳惡之弗有也何氏曰稱人討賊辭齊侯襲莒左傳齊侯還自晉不入遂襲莒門于且于莒邑傷股而退莒人行成齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠何如乃弗與田按臧紇之言其喻齊也中傳言武仲以智自免也杜氏曰因伐晉還襲莒不言遂者間有事臧孫知齊侯將敗不欲受其邑故以比鼠欲使怒而止二十有四年春叔孫豹如晉左傳春穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏陶唐堯所治地大原晉陽縣也終虞之世以為號故曰自虞以上在夏為御龍氏謂劉纍也事見昭二十九年在商為豕韋氏豕韋國召東郡白馬縣東南有韋城在周為唐杜氏唐杜二國名殷末豕韋國于唐周成王滅唐遷之于杜為杜伯杜伯之子隰叔奔晉四世及士會食邑于范復為范氏杜今京兆杜縣晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲既沒其言立立謂垂世其是之謂乎豹聞之太上有立德黃帝堯舜其次有立功禹稷其次有立言史佚周任雖久不廢此之謂不朽若夫保姓受氏以守宗祊祊廟門世不絶祀無國無之祿之大者不可謂不朽于杜氏曰賀克欒氏也仲孫羯帥師侵齊左傳孟孝伯侵齊晉故也豹如晉以雍榆之次為功晉照其偽而有言焉故羯侵齊以悅之魯若移其侵齊之役於雍榆之次則豹不必往羯不必侵也豹之如晉賀克欒氏羯之侵齊為晉報伐夫當事而救不能致力既退而侵何益於晉何名於齊事大睦鄰交失之矣夏楚子伐吳左傳夏楚子為舟師以伐吳不為軍政無功而還秋七月甲子朔日有食之既齊崔杼帥師伐莒左傳齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期齊社搜軍實使客觀之祭社因閲數軍器以示薳啓疆陳文子曰齊將有冦吾聞之兵不戢必取其族還自害也秋齊侯聞將有晉師夷儀之師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒侵介根莒邑大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀夷儀公作陳儀左傳會于夷儀將以伐齊水不克杜氏曰夷儀本邢地衛滅邢而為衛邑冬楚子蔡侯陳侯許男伐鄭左傳冬楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭夷儀諸侯汪氏曰晉陽處父伐楚以救江則書伐書救此書伐鄭不書以救齊不豫楚人之救也晉合十二國之君不能伐齊楚乃能合四國之君以伐鄭此可以觀夷夏之得失矣師克在和不在衆豈不信然又曰伐而不果救不及事晉霸之衰可知矣春秋所以不書諸侯之救鄭也按夷儀之役不能正齊之罰而徒致棘澤之師以為鄭患其救不足録矣公至自會髙氏曰諸侯救鄭不書故以會致陳針宜咎出奔楚針其廉反左傳陳人復討慶氏之黨針宜咎出奔楚宜咎陳大夫針子八世孫在楚為針尹宜咎叔孫豹如京師左傳齊人城郟穆叔如周聘且賀城王賜之大路按郟王城也於是榖洛鬭毁王宫晉不能為王城之而齊為義舉也大飢榖梁傳五榖不升為大飢一榖不升謂之嗛二榖不升謂之飢三榖不升謂之饉四榖不升謂之康虛也五榖不升謂之大侵傷也大侵之禮君食不兼味臺榭不塗弛侯廢侯不燕射廷道不除百官布而不制布修列也不制不更有造作鬼神禱而不祀此大侵之禮也薛氏曰民有殍為大飢國無凶荒之備一大水而民有殍無政也二十有五年春齊崔杼帥師伐我北鄙左傳以報孝伯之師也公患之使告於晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇不為冦害使民不嚴欲得民心異於他日齊師徒空也歸夏五月乙亥齊崔杼弒其君光左傳齊棠公棠邑大夫之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠薑而美之使偃取之為已取也偃曰男女辨姓今君出自丁丁公臣出自桓桓公不可武子筮之遇困之大過史皆曰吉阿崔子示陳文子文子曰夫從風坎下兑上困巽下兑上大過困六三變為大過坎為中男故曰夫變而為巽故曰從風風隕妻不可娶也風能隕落物者變而隕落故曰妻不可娶且其繇直又反曰困于石據于蒺藜入于其宫不見其妻凶困六三爻辭困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎言冠易得不足惜縱使餘人不為崔子者其無冠乎况崔子富貴自有冠也崔子因是又以其間伐晉也曰晉必將報欲弒公以説于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子朝于齊甲戌饗諸北郭崔子稱疾不視事欲使公來乙亥公問崔子問疾遂從薑氏薑入于室與崔子自側戶出公拊楹而歌歌以命薑侍人賈舉止衆從者而入閉門為崔子閉公也重言侍人别下賈舉甲興公登臺而請弗許請盟弗許請自創於廟弗許皆曰君之臣杼疾病不能聽命不能親聽公命近於公宫言崔子家近公宫或淫者詐稱公陪臣干掫行夜有淫者不知二命言行夜得淫人受崔子命討之不知他命公踰墻又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死八子皆齊臣祝他父祭于髙唐髙唐有齊别廟也至復命不説辨而死于崔氏申蒯侍漁者監取魚之官退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑平隂大夫于平隂晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是飬故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒二子莊公黨叔孫宣伯僑知之在齊也叔孫還齊羣公子納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人於太宫太公廟曰所不與崔慶者晏子仰天嘆曰嬰所不唯忠於君利社稷者是與有如上帝乃歃辛巳公與大夫及莒子盟莒子朝齊遇亂未去大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還崔氏側莊公于北郭側瘞埋之不殯于廟丁亥葬諸士孫之里士孫人姓因名里四翣不蹕下車七乘不以兵甲按齊莊勢陵大邦衆暴小國而又躬亂巨室淫肆不君故使崔杼因民不忍以與敵市此足以為世鑒矣左氏所載晏子之言多非其實夫臣死君難無容議者間有不必死而無害于義則以所居之時與位而權之耳若晏子者位非正卿既無當國之責又無討賊之權莊公雖殞宗社猶存以分實無可死之理然而聞難不辟入哭君尸其凛然之義猶足以寒亂賊之心故崔杼雖忌而不敢殺而時之鄙夫因晏子之不死遂從而附益其説人君遇篡弒者豈皆為社稷而為之臣者孰肯甘以私昵自處耶若是則弒君而及其大夫者非一人矣宋之殤公閔公晉之奚齊卓子非皆為社稷死而孔父仇牧荀息非三君之私昵春秋何以大書而深豫之耶且死必有私昵則肯死君難者少矣君不為社稷死則曰誰敢任之則背死忘義者孰不藉口以求自免乎吾故曰此非晏子之言鄙夫附益言之也公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯祀伯小邾子于夷儀左傳晉侯濟自泮泮闕會于夷儀伐齊以報朝歌之役齊人以莊公説使隰鉏隰朋之曽孫請成慶封如師男女以班賂晉侯以宗器樂器宗器祭祀之器樂器鐘磬之屬自六正三軍之六卿五吏文職三十帥武職三軍之大夫自五吏之下皆軍卿之屬官百官之正長師旅及處守守國者皆有賂皆有貨賂杜言皆以男女為賂恐非晉侯許之使叔向告於諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣按齊罪當討而莊公既弒則罪不在其民晉之所當問者不在朝歌之役而在莊公不以其道終之故矣告於諸侯而改治焉誅其賊立其君則大義明而天下服矣苟大國見討臣子殺其君以説而可聽是滅天理而奬亂賊也况其説者又非其實乎不知其欺而受其説是許臣子可殺其君以與大國為市也知其欺受其説而又納其賂是心乎成惡而與亂賊同情也故上書崔杼弒君下書夷儀之會而不書伐以深著晉與諸侯之罪也附左傳晉侯使魏舒宛沒逆衛侯將使魏與之夷儀崔子止其帑以求五鹿六月壬子鄭公孫舍之帥師入陳舍如字左傳初陳侯會楚子伐鄭當陳隧徑也者井堙塞也木刋除也鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突穿也陳城遂入之陳侯扶其大子偃師奔墓遇司馬桓子曰載余陳之司馬曰將巡城不欲載公以巡城辭遇賈獲陳大夫載其母妻下之而授公車公曰舍而母辭曰不祥雖急猶不欲男女無别與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免喪服擁社抱社主示服使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美子産入數俘而出計獲而已不將以歸祝祓社司徒致民司馬致節兵符司空致地乃還陳亂故正其衆官修其所職以安定之乃還按陳以神明之胄元女大姬之貴備為三恪未嘗有淫湎毁常侵敗王略之罪特迫於強楚之令從於伐鄭而過暴於疆隧者有司不戢武之罪也鄭欲修怨不請於天王而興大師焉至于車七百乘此晉文公城濮之賦也郤克伐齊至以八百乘當時已謂為傾國恐鄭未合有此既聲其罪豈不可待其服乃宵突其城而入之是志於殘之使其君與太子匍匐奔墓寄乘以免其民亦何罪而男女别而纍以待數俘而出承飲進獻則曷如勿迫而辱之祝祓社司徒致民司馬致節正其官而還則曷如毋亂焉甚矣鄭之為欺也其不免乎王法之討而或者猶謂其入陳有禮而春秋無貶辭失之逺矣秋八月己巳諸侯同盟于重丘重直龍反左傳齊成故也杜氏曰稱同盟齊亦與盟書同者見崔杼弒君之賊與焉春秋之微辭也張氏曰曹州乘氏縣有重丘故城附左傳趙文子為政代范丐令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹屈建若敬行其禮道之以文辭以靖諸侯兵可以弭公至自會衛侯入于夷儀杜氏曰晉愍衛衎失國使衛分之一邑説見桓十五年鄭伯突入于櫟下楚屈建帥師滅舒鳩左傳楚薳子馮卒屈建為令尹子木屈蕩為莫敖代屈建宣十二年邲之役楚有屈蕩為左廣之右世本屈蕩屈建之祖父今此屈蕩與之同姓名舒鳩人卒叛前年辭不叛楚令尹子木伐之及離城舒鳩城吳人救之子木遽以右師先先至舒鳩子疆息桓子捷子駢子盂帥左師以退五人不及子木與吳相遇而退吳人居其間七日居楚兩軍之間子疆曰久將墊隘隘乃禽也慮水雨不如速戰請以其私卒誘之簡師簡閲精兵陳駐後為陳以待我我克則進奔則亦視之乃可以克不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師會之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩按羣舒近楚為楚所蠶食至是盡矣先本與楚俱張曰荆舒冬鄭公孫夏帥師伐陳夏公作囆左傳鄭子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父舜之後為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬武王之長女配胡公閼父之子滿而封諸陳以備三恪周得天下封夏殷二王後得各自行其正朔用其禮樂既又封舜後謂之三恪則我周之自出言陳周之甥至于今是賴桓公之亂蔡人欲立其出事在桓五年我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立陳莊公宣公皆厲公子夏氏之亂成公播蕩奔晉又我之自入君所知也蓋自晉因鄭而入今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以憑陵我敝邑不可億度也逞盡也我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷啓敝邑心陳知其罪授手於我用敢獻功晉人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻方千里列國一同方百里自是以衰初危反差降也今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯士弱不能詰復于趙文子文子曰其辭順犯順不祥乃受之冬十月子展相鄭伯如晉拜陳之功謝晉受其功子西復伐陳陳及鄭平杜氏曰前雖入陳服之而已故更伐以結成按晉為盟主得陳而不能保復棄之於楚而使鄭修其私怨伯主之義安在乎子産對晉之辭皆曲而強為文飾不類其平日之言恐傳者傅會之過也陳侯鮑卒而陳亂公子他殺太子免而代之乃篡賊也鄭莊公奉而立之乃可以為功乎征伐之權出於天子敵國無相征之義而以唯罪所在各致其辟為先王之命何其誣也大國之地多數圻信非侵小不至然則皆欲效之可乎又以戎服受捷為城濮之命然定王於鞏朔之獻齊捷也則曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今鄭無王命擅興以侵小而以其捷私相獻其為姦先王之禮尤大矣且鄭文公戎服輔王以授楚捷而子産今以將事于晉是以王事晉也乃自謂不敢廢王命不亦重誣乎左氏乃謂士莊伯不能詰非不能詰也是時晉政偷矣趙文子謂武也知楚令尹若敬行其禮道之以文辭兵可以少弭蓋志于合和南北以苟無事非復昔者同外楚禁暴討二之心矣觀春秋一嵗再書鄭伐陳而諸侯之散也見于此矣十有二月吳子遏伐楚門于巢卒遏於葛反公作謁左傳吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱于短墻以射之卒公羊傳入巢之門而卒也榖梁傳取卒之名加之伐楚之上者見以伐楚卒也古者大國過小邑小邑必飾城修守備而請罪恐已有闕而致師禮也吳子謁伐楚至巢入其門門人射吳子有矢創反舍而卒古者雖有文事必有武備非巢之不飾城而請罪非吳子之自輕也何氏曰吳子欲伐楚過巢不假塗卒暴入巢門門者以為欲犯巢而射殺之今按巢吳楚間小國廬江六縣東有居巢城文十二年楚圍巢至是巢屬於楚矣吳伐楚至巢而攻之巢人誘之吳子果親門焉見射而卒左氏所載是也取卒之名加之伐楚之上正與七年鄭伯髠頑如會卒于鄵書法同皆以便文爾左氏凡云門焉皆謂攻其城門此經門于巢亦是而公榖乃謂入巢之門而謂之門于巢何氏又謂過巢不假塗皆無稽之妄説也榖梁謂大國過小邑小邑必飾城而請罪此自過國之禮今吳來攻巢而巢以一矢相加當責吳子之自輕安得又非巢也又謂雖有文事必有武備吳子之殪在於自輕非無備也附左傳衛獻公自夷儀使與寧喜言求復國寧喜許之大叔文子大叔儀聞之曰君子之行思其終也終可成思其復也可復行書曰慎始而敬終終以不困詩曰夙夜匪懈以事一人今寧子視君不如奕棋奕者舉棋不定不勝其耦而况置君而弗定乎必不免矣二十有六年春王二月辛卯衛寧喜弒其君剽匹妙反左傳衛獻公使子鮮為復使為己求反國辭辭不能敬似強命之敬似獻公及子鮮之母對曰君無信臣懼不免敬似曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在使在其間不然必敗子鮮賢國人信之故公使子鮮子鮮不獲命於敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰榖鄭大夫右宰榖曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以二榖曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰榖曰子鮮在何益多而能亡於我何為言子鮮為義多不過出亡悼子曰雖然弗可以已孫文子在戚孫嘉聘于齊孫襄居守二人文子之子二月庚寅寧喜右宰榖伐孫氏不克伯國傷伯國孫襄也父兄皆不在故乘弱攻之寧子出舍於郊欲奔伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子叔剽也及太子角書曰寧喜弒其君剽言罪之在寧氏也按孫寧均之當國秉權使黜君果非殖意二十七年傳曰黜君非吾意孫氏為之則當其時以死勿聽孫氏其敢哉既與之同惡又與之同立剽而事以為君乃將死而屬其子以復舊君此不過以立剽之後政在孫氏夫逐君之惡則同受之立君之寵則孫氏專之此寧殖之所為不平也喜之納獻公豈真以欲免父逐君之惡哉觀政由寧氏祭則寡人之約則喜父子之情可覩矣獻公蓋知之而後與之言也剽雖非正而春秋正其弒君之罪正為其意在己私故視置君曽奕者舉棋之不若非但不思其終而已其為亂臣賊子之戒嚴矣豈曰使天下後世知慎於廢立之際而不敢忽哉胡氏語此與晉里克弒其君卓事同殖也出之喜也納之欲掩前人之惡也殖也立之喜也殺之乃再陷弒君之大罪矣右宰榖曰獲罪於兩君天下誰畜之寧喜曰吾受命於先人不可以二喜不君其君而後敢動於惡以為由己家所立視如奕之置子春秋以義正其事而人心回亂臣賊子懼矣衛孫林父入于戚以叛書叛始此左傳孫林父以戚如晉以邑屬晉書曰入于戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退專祿以周旋戮也按林父逐君立君本為惡首今也衎入已出又披君之邑以市於大國罪不在弒剽者之下春秋書入于戚以叛以誅之也左氏乃止以其專祿周旋為罪杜氏又謂林父事剽而衎入義可以退皆昧于大義之言使林父不專邑自隨則無罪乎甲午衛侯衎復歸于衛左傳甲午衛侯入書曰復歸國納之也本晉納之夷儀今從夷儀入國嫌若晉所納故發國納之例大夫逆于竟者執其手而與之言道逆者自車揖之逆于門者頷之而已公至使讓太叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人在存問之公聞文子答寧喜之言故忿之古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通外內之言以事君臣之罪二也有二罪敢忘其死乃從近關出公使止之按春秋之義常以上下比事而見始也書衛侯衎出奔齊繼書會于戚而衛孫林父在焉則知為強臣所逐矣終也書寧喜弒其君剽孫林父入于戚以叛繼書衛侯衎復歸于衛則知復歸之故由寧喜矣夫君人者將蓋之如天容之如地尊如神明愛如父母而逐于林父歸以寧喜直書而義自見矣名與不名不必有義復歸者復國之恆詞而美惡形乎其中附左傳衛人侵戚東鄙孫氏訴于晉晉戍茅氏茅氏戚東鄙殖綽伐茅氏齊人今來在衛殺晉戍三百人孫蒯追之弗敢擊文子曰厲惡鬼之不如遂從衛師敗之圉衛邑雍鉏孫氏臣獲殖綽復訴于晉按言衛人侵戚則戚于衛如二國矣言孫氏訴于晉則孫氏于衎如二君矣夏晉侯使荀吳來聘左傳晉人為孫氏故召諸侯將以討衛也夏中行穆子來聘召公也公會晉人鄭良霄宋人曹人于澶淵左傳六月公會晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏戚城西北五十里有懿城因姓以名城取田六十井也趙武不書尊公也罪武會公侯向戌不書後也後會期鄭先宋不失所也如期至於是衛侯會之晉將執之不得與會故不書晉人執寧喜北宫遺使女齊以先歸討其弒君伐孫氏也遺北宫括之子女齊司馬侯歸晉而後告諸侯故經書在秋衛侯如晉晉人執而囚之於士弱民士弱晉主獄大夫秋七月齊侯鄭伯為衛侯故如晉國景子國弱相齊侯子展相鄭伯國子使晏平仲私於叔向曰晉君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晉侯晉侯乃許歸衛侯杜氏曰澶淵衛地近戚胡氏曰春秋疑義先儒所傳誠有未盡趙武稱人為助孫氏貶也鄭良霄不貶者子産新得政而鄭伯為衛侯故如晉即知鄭獨不釋君而臣是助矣家氏曰天子方伯者無他主張名分而已晉自悼公奬大夫以伉其君而下陵上替有自來矣今林父據邑叛君晉不能討而納其叛又披公邑以益賊臣謂之疆戚田使衛戚如二國然甚又為之執其君平固甚愚亦何利而為此由晉之諸臣各為其私羽翼私門弱公室以為已地而其君不悟良可喟已秋宋公殺其世子痤才何反榖作座音同左傳初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入共姬宋伯姬也名之曰棄長而美平公入夕平公共姬子共姬與之食公見棄也而視之尤甚也姬納諸御嬖生佐元公惡而婉大子痤美而狠合左師向戌畏而惡之寺人惠牆氏伊戾名為太子內師而無寵秋楚客聘于晉過宋太子知之請野享之公使往伊戾請從之公曰夫不惡女乎夫謂太子對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徴之詐作盟處為大子反而騁告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師夫人佐母棄也則皆曰固聞之公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒歡也而與之語欲使失期過期乃縊而死佐為太子公徐聞其無罪也乃烹伊戾左師見夫人之步馬習馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之傳言宋公暗左師諛太子所以無罪而死胡傳殺世子母弟直書君者甚之也讒世子痤而殺之者寺人伊戾也然讒言之得行也必有嬖妾匹嫡之惑其心又有大臣內結宫圍者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣晉獻之殺申生宋公之殺痤春秋所以目君以著其惡也家氏曰傳言佐惡而婉痤美而狠婉者巧於自結狠者踈於內交佐日以親痤日以踈以至於此也隋楊廣傾勇之事似之勇則痤也楊素則左師也晉人執衛寧喜公羊傳此執有罪何以不得為伯討不以其罪執之也按晉非討其弒君也為伐孫氏殺晉戍之故爾趙武為政叔向為謀臣晉無一事可稱二子者崇虗譽而無其實也附左傳初楚伍參與蔡太師子朝友其子伍舉與聲子子朝之子相善也伍舉娶于王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食布荆坐地而言復故共議歸楚事聲子曰子行也吾必復子及宋向戌將平晉楚在明年聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如把梓皮革自楚往也雖楚有材晉實用之言楚亡臣多在晉子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫與其失善寧其利淫無善人則國從之古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉在文十四年晉人置諸戎車之殿後軍以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞同聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譛雍子君與夫人不善是也雍子奔晉晉人與之鄐晉邑以為謀主彭城之役晉遇楚於靡角之谷在成十八年晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬子靈巫臣而雍上聲害其事子靈奔晉晉人與之邢晉邑以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕皆楚邑克棘譙國鄼縣東北有棘亭入州來楚罷於奔命至今為患則子靈之為也若敖之亂在宣四年伯賁之子賁皇奔晉晉人與之苖晉邑以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行户郎反易行或曰變易卒伍或曰簡易行陳少其兵備以誘之中行二郤必克二穆子重子反皆出穆王吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷傷也師熸子潛反吳楚之間謂火滅為熸子反死之鄭叛吳興楚失諸侯則苖賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴伍舉子逆之八月壬午許男寧卒于楚左傳許靈公如楚請伐鄭曰師不興孤不歸矣入月卒于楚冬楚子蔡侯陳侯伐鄭左傳楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人將禦之子産曰晉産將平諸侯將和楚王是故昧於一來不如使逞快也而歸乃易成也夫小人之性釁動也於勇嗇貪也於禍以足其性乃求名焉者指欲與楚戰者非國家之利也若何從之子展説不禦寇十二月乙酉入南里鄭邑墮其城涉于樂氏津門門于師之梁鄭城門縣門發獲九人焉涉于汜而歸而後葬許靈公葬許靈公附左傳衛人歸衛姬于晉乃釋衛侯君子是以知平公之失政也晉韓宣子聘于周王使請事時諸侯不能修朝聘之常禮有事多托聘以行故王使請事對曰晉士起起宣子名禮諸侯大夫入天子國稱士將歸時事於宰旅無他事矣齊人城郟之嵗在二十四年其夏齊烏餘齊大夫以廪丘今東郡廩丘故城是奔晉襲衛羊角今廪丘所治羊角城是取之遂襲我髙魚在廪丘東取之又取邑於宋於是范宣子卒諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往二十有七年春附左傳春胥梁帶使諸喪邑者具車徒以受地必周周密也必密來勿以受地為名使烏餘具車徒以受封烏餘以衆出出受封也使諸侯偽效致也烏餘之封者而遂執之盡獲之皆獲其徒衆皆取其邑而歸諸侯諸侯是以睦於晉齊侯使慶封來聘左傳齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也杜氏曰景公即位通嗣君也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋屈居勿反奐呼亂反公作瑗後同晉楚使同主盟左傳宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大災也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告于秦秦亦許之皆告於小國為會於宋五月甲辰晉趙武至於宋丙午鄭良霄至六月戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈從趙武至趙武命盈追已故言從趙武丙辰邾悼公至小國故君自來壬戌楚公子黑肱先至成言於晉時令尹子木止陳遣黑肱就晉大夫成盟載之言丁卯宋向戍如陳從子木成言於楚就於陳成楚之要言戊辰滕成公至子木謂向戍請晉楚之從諸侯從晉楚者交相見也更相朝庚午向戌復于趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使驛謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至從陳還是夜也趙孟及子晳盟以齊言子晳公子黑肱素要齊其辭至盟時不得復訟爭庚辰子木至自陳陳孔奐蔡公孫歸生至二國大夫與子木俱至曹許之大夫皆至以藩為軍不築壘塹示不相忌晉楚各處其偏晉處北楚處南伯夙荀盈曰楚氛甚惡懼難趙孟曰吾左還入於宋若我何營在宋北東頭為上故晉營在東有急可左迥回入宋東門杜氏曰會者十四國齊秦不交相見邾滕為私屬皆不與盟宋為主人地於宋則與盟可知故經唯序九國大夫楚先晉歃而書先晉貴信也陳于晉會常在衛上孔奐非上卿故在石惡下按是時晉楚皆厭兵故向戌得迎兩國之意旨而和合為此舉也告於小國而喜躍勇赴告於齊秦而齊秦許之曰人曰弭兵而我弗許則固攜吾民矣將焉用之是可以見人情之所在矣戰國之世衡人專搆諸侯使相攻伐而從人則合東方六國為從以擯秦從人之意向戌之意也然而勢如連雞不能俱棲從之不可久也策士知之矣視此則向戌之説差愈而易成是以有因其罷兵息民之意而取之者則曰宋之盟中國不出外裔不入玉帛之使交乎天下百姓免兵革之患者十餘年趙武屈建之力可以當齊桓也其執乎內夏外夷之常而議之者則曰於溴梁而無君臣之分於宋而無夷夏之防南北二伯諸侯兩事贄玉帛死生于蠻夷之庭以至于申之會蠻夷之君篡弒之賊大合十有一國之衆而用齊桓召陵之禮是舉啓之也盟鹿上楚始進也盂之會楚子與宋公並序于諸侯之上而二伯兆宋之會使晉楚之從交相見而二伯成皆宋為之也是二説者固皆一道而未可膠也楚誠南蠻然有弭兵之心則固善心矣聖人於此豈無用夏變夷之道而必絶之乎變之之道則孟子所謂仁義而已矣昔秦楚搆兵宋牼將言其不利而孟子以為不可及孟子自言則曰殺一無罪非仁也非其有而取之非義也人皆有所不忍達之于其所忍仁也人皆有所不為達之于其所為義也齊王不忍殺觳觫之牛則曰是心足以王矣王之不王不為也非不能也今恩足以及禽獸而功不至於百姓者獨何與宋牼欲救世之戰反以口舌為事利害為説強聒不舍而不知非本諸不忍不為之萌動以轉其機則無益也向戌弭兵何異于宋牼使中國諸侯君臣父子兄弟懷仁義以相接則外裔自服兵革自息不知其本而弭兵何異于伏燼宿火幸其焰焰之暫息而以為安乎此既失之抑為會以弭兵而晉楚之從不交相見則中國之大勢猶未盡失也故楚人此請其關係甚大而趙武泛然應之無以拒之則以晉楚齊秦為説曰四國匹也晉之不能于齊猶楚之不能于秦也趙武之答常不合機而楚人之應常得機于是楚王曰釋齊秦他國請相見也吁斯言一墮而中國事去矣甚矣趙武之愚也齊桓晉文數十年攘夷匡夏之業壞之者此役也而方且侈然自以為功向戌至于請免死之邑推趙武之心亦未必不以為從容于衣裳告命之間而偃兵息民為過于前人之用兵也然則武欲塞子木交相見之請則何辭而可亦告之曰諸侯間于王事則相朝也謂同方嶽之邦也越千里而相朝非天子誰敢當之雖先君文公及齊桓公皆未有也二三友邦咸有封疆之守社稷之事使廢其常守闕其時事敝于道路或啓他虞以為君憂亦君之所恤也君憫諸侯之道敝而苦于兵也欲安靖之甚大惠也終君之惠則莫如使晉楚之從各即其守敝邑獲繼先君之好以事君二三大夫固將朝夕于君者也其又奚必于諸侯以是應之楚必無辭而退矣衛殺其大夫寧喜左傳衛寧喜專公患之公孫免餘衛大大請殺之公曰微寧子不及此吾與之言矣言政由寧氏事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀二公孫衛大夫使攻寧氏弗克皆死公曰臣也無罪父子死余矣獻公出時公孫臣之父為孫氏所殺夏免餘復攻寧氏殺寧喜及右宰穀尸諸朝穀不書非卿也石惡將會宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行杜氏曰書在宋會下從赴榖梁傳稱國以殺罪纍上也寧喜弒君其以纍上之辭言之何也嘗為大夫與之涉公事矣寧喜由君謂衎弒君謂剽而不以弒君之罪罪之者惡獻公也鄭嗣曰若獻公以喜有弒君之罪而殺之則不宜既入以為大夫書寧喜弒其君則喜之罪不嫌不明今若不言喜之無罪而死則獻公之惡不彰今按無罪當作不以其罪髙郵孫氏曰喜弒剽而納衎衎反國而復用之既而以其私殺之喜雖有罪而衛侯殺之不以其罪矣昔里克殺奚齊而立夷吾夷吾殺之二君之殺其大夫皆以其私里克寧喜之見殺皆不以其罪故春秋皆曰殺其大夫按使衎出非得罪於民歸為國人所納則正大光明舉無不順首誅孫氏次問寧喜可也今乃舍孫氏之在戚而患喜之專昧輕重之所在矣畔政由之信棄納我之惠其所不足道也或曰孫氏挾晉以抗君獻公固無如之何非不欲討也曰使衎出非得罪于民國人思之國人納之出入不制于強臣則命討亦不制于大國矣私惠不歸德君子不自留焉使寧喜因國人之欲納公也為公弒剽公討之可也今也政由寧氏祭則寡人由是以得歸也寧喜專公患之由是以行殺也微寧子不及此吾與之言矣公亦自知其不直也故春秋之書法如此衛侯之弟鱄出奔晉鱄市轉反又音專榖作專左傳子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟于河誓不還託于木門晉邑不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之謂治其事昭吾所以出也事治則明已出欲仕吾不可以立于人之朝矣終身不仕公喪之如稅服終身稅即繐也音嵗喪服繐衰裳縷細而希非五服之常本無月數痛愍子鮮故特為此服此服無月數而獻公尋薨故言終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也司馬法成方十里出革車一乘此一乘之邑每邑方十里也傳曰百乘之家大夫之家邑有百乘是百乘為采邑之極此云唯卿備百邑知所言邑者一乘之邑非四井之邑也論語稱千室又云十室明大小通稱邑也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不二能贊大事君其命之乃使文子為卿按免餘辭邑辭卿亦何足録傳見公之賞刑不知大計耳公羊傳衛殺其大夫寧喜則衛侯之弟鱄曷為出奔晉為殺寧喜出奔也曷為為殺寧喜出奔衛寧殖與孫林父逐衛侯而立公孫剽寧殖病將死謂喜曰黜公者非吾意也孫氏為之我即死女能固納公乎喜曰諾寧殖死喜立為大夫使人謂獻公曰黜公者非寧氏也孫氏為之吾欲納公何如獻公曰子苟納我吾請與子盟喜曰無所用盟請使公子鱄約之獻公謂公子鱄曰寧氏將納我吾欲與之盟其言曰無所用盟請使公子鱄約之子固為我與之約矣公子鱄辭曰夫負羈縶馬絆執鈇鑕從君東西南北則是臣僕庶孽之事也若夫約言為信則非臣僕庶孽之所敢與也獻公怒曰黜我者非寧氏與孫氏凡在爾公子鱄不得已而與之約已約歸至殺寧喜公子鱄挈其妻子而去之榖梁傳專喜之徒也專之為喜之徒何也已雖急納其兄與人之臣謀弒其君是亦弒君者也專其曰弟何也據稱弟則無罪專有是信者獻公無信而專不肯失信君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛專之去合乎春秋今按書弟罪衛侯也書鱄出奔于殺大夫寧喜之後見鱄為寧喜出奔亦以罪鱄也衛侯無君兄之道殺喜不以其罪使鱄至于出奔其罪昭矣其罪鱄奈何曰信近於義言可復也已雖急納其兄不思剽既立矣為復之道欲兩得而無害則何地以置剽寧喜不願盟而願得子鮮之一言重其義也欲堅其意豈無君臣之大義可指陳以感動而乃從獻公政由寧氏祭則寡人之云乎此信之不義言之必不可復者也而子鮮為之殺寧喜者固政由寧氏之一言也夫言必信行必果而不唯義之所在未有不至于賊者也重于失信而不知兄弟之恩之尤重也不忍負寧氏而不知君之尤不忍離也為子鮮者初決于出以感悟獻公可也公再三止之則可止矣夫亦念國之無人公之無恆也而與大叔儀竭力以輔之勸公以立寧氏之後則亦無負於喜矣乃決于自絶止使者而盟于河終身不向衛國而坐不已甚乎魯宣公弒立公弟叔肸非之而不忍去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴于春秋知肸之所以取貴于春秋則知鱄之去未合于春秋矣然榖梁以為與人之臣謀弒其君是亦弒君者則亦過矣秋七月辛卯豹及諸侯之大夫盟于宋左傳辛巳將盟于宋西門之外楚人衷甲甲在衣中欲因會擊晉伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信于楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信趙孟患衷甲以告叔向叔向曰何害也匹夫一為不信單盡也斃踣也其死若合諸侯之卿以為不信必不捷食言者不病言必死非子之患也夫以信召人而以僣濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕兩事晉楚則貢賦重故欲比小國云以公命者季氏託之既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟晉楚爭先爭先歃血晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎更也主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者小國主辨具楚為晉細不亦可乎乃先楚人書先晉晉有信也宋左師請免死之邑若使計謀不當則罪合死向戌自以為已謀可免死也請賞而曰免死謙言耳公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材金木水火土民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興謂湯武亂人以廢謂桀紂廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之削賞左師之書左師辭邑書先晉杜氏曰蓋孔子追正之陳氏曰不以荆蠻先中國也孫氏曰溴梁之會諸侯會而曰大夫盟者大夫無諸侯也此盟諸侯不在而曰豹及諸侯之大夫盟于宋者不與大夫無諸侯也豹不氏前見也胡傳會盟同地而再言宋者貶之也汪氏曰是時晉楚皆怠于出師是以偶有六七年之安靖然楚人衷甲苟非伯州犂之言則趙孟為所執矣况魯帥師取鄆晉帥師敗狄兵亦未嘗戢也楚圍既讀舊書未幾篡國大合諸侯伐吳滅賴安在其能弭兵也哉按趙武知楚屈建二子各執其國政鄢陵之敗鄭叛吳興楚少懦矣而悼公之亡晉亦不在諸侯故二十五年趙武告穆叔有自今以往兵其少弭之語然則合和南北以苟數年之無事晉楚之同心也吳乘其後奔命不暇楚非昔日之楚矣使誠欲劫盟豈先使晉知之蓋形我而使我懼則可以獲所求耳是以欲晉楚之從交相見則許之爭長則讓之一一不較趙武叔向如嬰兒寄玩于人之股掌乃曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也諸侯歸晉之德只非歸其尸盟也虛為大語耳孔子相夾谷之會以為有文事必有武備具左右司馬而行及會犂彌言于齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔子以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也齊侯遽辟之聖人之制事待人蓋如此趙武信楚而以藩為軍使楚乘其無備雖左還入于宋不亦晚乎唐渾瑊與吐番盟于平涼吐番劫盟即其事也彼不在堅城之下乎李晟深戒以盟所為備不可不嚴栁渾則謂戎狄豺狼非盟誓可結斯亦可以喻趙武矣公羊殆諸侯之説似有所受而上下語為講師所亂曰曷為再言豹殆諸侯也曷為殆諸侯為衛石惡在是也此殆似人夢寐中讝語雖兒童笑之矣豹及諸侯之大夫盟此乃一事再見前目而後凡耳何多説也榖梁大夫不臣也大夫臣也其臣恭也皆謬説也大夫盟文略爾亦非有意如此書之豹不氏前見也左氏乃曰不書其族言違命也大可笑也視邾滕季氏之令也而豹以違命去族是春秋成季氏之君魯矣附左傳齊崔杼生成及強而寡偏喪曰寡寡特也娶東郭薑生明東郭薑以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之有惡疾而立明成請老于崔濟南東朝陽縣西北有崔氏城成欲居崔邑以終老崔子許之偃與無咎弗豫曰崔宗邑也宗廟所在必在宗主謂崔明成與強怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子謂崔杼敢以告慶封曰子姑退吾圖之告盧蒲嫳普結反慶封屬大夫盧蒲嫳曰彼君謂莊公之讐也天或者將棄彼矣彼實家亂子何病焉按賊杼以棠薑之故創其君尋以崔明滅家誠天道也崔之薄慶之厚也他日又告成強又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔強殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有福止余猶可恐滅家禍不止其身遂見慶封慶封曰崔慶一也言如一家是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之謂新築女墻而守之弗克使國人助之遂滅崔氏殺成與強而盡俘其家其妻縊東郭薑嫳復命于崔子且御為崔子御而歸之至則無歸矣乃縊殺君之賊得禍未有如此之快人者也卜筮之言驗未有如此之明者也吉凶豈外求哉兆于此心之動而已矣崔明夜辟諸大墓開先人之冢以藏之辛巳崔明來奔慶封當國崔氏之亂杼弒君申鮮虞來奔僕賃于野以喪莊公為君服喪令楚人召之遂如楚為右尹冬十有二月乙亥朔日有食之左傳十一月乙亥朔日有食之辰在申司厯過也杜氏曰謂斗建指申周十一月今之九月斗當建戌而在申故知再失閏也文十一年三月甲子至今年七十一嵗應有二十六閏今長厯推得二十四閏通計少再閏啖氏曰按經言十二月傳言十一月又言再失閏依經當為三失閏進退不同不可得而考劉氏曰厯家之術求閏進餘易求交朔難今司厯能正交朔反不能正閏乎二十有八年春無氷左傳春無冰梓慎曰魯大夫今兹宋鄭其飢乎嵗在星紀而淫於玄枵嵗嵗星也星紀在丑斗牛之次玄枵在子虛危之次十八年晉董叔曰天道多在西北是嵗嵗星在亥至此年十一嵗故在星紀明年乃當在玄枵今已在玄枵淫行失次以有時災無冰隂不堪陽盛隂用事而溫無氷是隂不勝陽地氣發泄蛇乘龍蛇玄武之宿虛危之星龍嵗星嵗星木也木為青龍失次出虛危下為蛇所乘龍宋鄭之星也嵗星本位在東方東方房心為宋角亢為鄭宋鄭必飢玄枵虛中也玄枵三宿虛在其中枵耗名也土虛而民耗不飢何為嵗為宋鄭之星今失常淫入虛耗之次時復無氷地氣發泄故云夏衛石惡出奔晉左傳衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀石蠟有大功于衛邾子來朝左傳時事也言非宋盟宋盟唯施于朝晉楚附左傳夏齊侯陳侯蔡侯北燕伯把伯胡子沈子白狄朝于晉宋之盟故也秋八月大雩左傳旱也仲孫羯如晉左傳孟孝伯如晉告將為宋之盟故如楚也附左傳鄭伯使遊吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使驛奔問諸晉而以告子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以嵗之不易言有飢饉聘于下執事言鄭伯所以不得自朝楚今執事有命曰女何與政令之有必使而君棄而封守跋涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚按使趙武能止之于初則無是矣九月鄭遊吉如晉告將朝于楚以從宋之盟子産相鄭伯以如楚冬齊慶封來奔左傳齊慶封好田而嗜酒與慶舍封之子政則以其內實遷于寶物妻妾盧蒲嫳氏易內而飲酒數日國遷朝焉卿大夫皆就嫳家見封使諸亡人得賊者諸以崔氏之難出奔崔氏名之為賊者以告以情告而反之故反盧蒲癸癸臣子之慶舍有寵妻之子之以其女妻癸慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也慶氏盧蒲氏皆薑姓曰宗不余辟言舍欲妻已余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈親近兵伏而先後之公膳日雙雞卿大夫之膳食饔人竊更之以騖音木鴨也御者進食者知之則去其肉而以其洎其器反肉汁也説文云灌釜也饋饔人御者欲使諸大夫怨慶氏減其膳蓋盧蒲癸王何之謀子雅子尾皆惠公孫怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣言能殺而席其皮使析歸父告晏平仲欲與共謀子雅子尾平仲曰嬰之衆不足用也知無能謀也言弗敢出出謂泄之有盟可也子家曰子之言云子家析歸父又焉用盟告北郭子車齊大夫子車曰人各有以事君非佐子車名之所能也盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讐敢獻其兆子之曰克見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季封卜之示之兆曰死奉歸而泣無宇泣乃使歸慶嗣封之族聞之曰禍將作矣謂子家慶封字速歸禍作必于嘗秋祭歸猶可及也子家弗聽亦無悛志子息慶嗣曰亡矣言慶氏必出幸而獲在吳越吳越納齊之亡人齊不能讓陳無宇濟水而戕舟發梁不欲慶封得救難盧蒲薑癸妻慶舍女謂癸曰有事而不告我必不捷矣癸告之薑曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗于太公之廟慶舍涖事盧蒲薑告之且止之弗聽曰誰敢者遂如公公所麻嬰為尸祭尸慶奊戶結反為上獻先獻盧蒲癸王何執寢戈慶氏以其甲環公宫廟在宫內陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至于魚里里名引行至于魚里欒髙陳鮑之徒介慶氏之甲欒子雅髙子尾陳須無鮑鮑國四家之徒衣慶氏之甲因慶氏之士釋甲觀優不在也子尾抽桷椽也擊扉三以此為期盧蒲癸自後刺之王何以戈擊之解其左肩猶援廟桷動于甍屋棟以爼壺投殺人而後死言其多力遂殺慶繩即慶奊麻嬰公懼鮑國曰羣臣為君故也陳須無以公歸稅吐活反服而如內宫慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宫陳鮑在公所故弗克反陳去聲于嶽里名請戰弗許遂來奔齊人來讓奔吳吳句餘吳子夷昧也豫之朱方吳也聚其族焉而居之富于其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘在襄二十一年及慶氏亡皆召之具其器用而反其邑焉與晏子邶殿齊别都其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外謂亡而在外不得宰吾一邑不受邶殿非惡富也惡失富也且夫富如布帛之有幅焉幅邊幅為之制度使無遷也夫民生厚而用利于是乎正德以幅之書禹謨正德利用厚生謂之三事井田以厚其生工商以利其用五教以正其德夫民生厚而利用而德不正猶布帛之無幅故教以幅之使無黜嫚謂之幅利利不可過幅使有度利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致還公之公以為忠故有寵釋盧蒲嫳于北竟釋放也求崔杼之尸將戮之不得崔氏之臣曰與我其拱璧吾獻其柩拱合兩手大璧也崔明夜辟諸大墓故不知其處於是得之十二月乙亥朔十二月戊戌朔乙亥誤齊人還莊公殯于大寢路寢以其棺尸崔杼於市國人猶知之皆曰崔子也始求崔杼尸不得嫌以他尸代之故言國人猶識其狀見是真杼也此亦殆天顯其戮也按盟于宋以弭兵為辭兵之弭必各守其度無為不順則爭端絶矣魯為望國首納齊之亡人何以示諸侯乎崔杼弒君慶封黨之盟于國曰所不與崔慶者有如上帝既而崔氏家亂慶封乘之以為利慶封當國嗜酒好田以政與子盧蒲癸王何者莊公之嬖人也殺慶舍逐慶封戮崔杼之尸于是莊公之賊亦少申其討矣莊之弒也幸臣與之俱死者十人今為之討賊者亦幸臣也身為國君所親禮而為之效死者非國士而在私昵莊公固可羞矣而卿大夫不討使枕戈伺讐出于君之私人亦卿大夫之恥也其後楚執慶封徇于諸侯使言曰無使如齊慶封弒其君中國弒君之賊得戴其首領淹歷諸侯入于蠻夷而蠻夷討之又中國之恥也春秋書齊崔杼弒其君光諸侯同盟于重丘齊慶封來奔楚子伐吳執齊慶封殺之所謂其義昭如日星者乎十有一月公如楚諸侯始旅見于楚左傳為宋之盟故公及宋公陳侯鄭伯許男如楚十有二月甲寅天王崩乙未楚子昭卒左傳及漢楚康王卒公欲反叔仲昭伯叔仲帶曰我楚國之為豈為一人行也公遂行宋公反胡傳甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見喪服之不數閏也齊景公葬書閏月明殺恩之非禮也閏月不書閏承前月而受其餘日書其日繫前月之下史策常體此范寧之説也杜預以十二月無乙未日誤孔潁達以為甲寅乙未不得同月是皆不知閏之日繫前月之下耳二十有九年春王正月公在楚左傳釋不朝正于廟也孔氏曰公在本國每月之朔常以朝享之禮親自祭廟今以在外之故闕于此禮國之守臣于此朔日告廟云公在楚史官因書于䇿公羊傳何言乎公在楚據成十一年公在晉不書正月以存君也何氏曰正月嵗終而復始臣子喜其君父與嵗終而復始執贄存之襄公久在夷狄危而録之榖梁傳閔公也范氏曰閔公為楚所制故存録孔氏曰成十年秋如晉襄十二年冬如晉皆以次年至此等正月公皆不在其類多矣唯此一年書者釋例曰凡公之行國之守臣每月亦以公不朝之故告于廟每月必告而特於正月釋之者蓋嵗之正也月之正也日之正也三始之正嘉禮所重人理所以自新故特顯以通他月也惟書此年者如楚既非常在楚又踰年故發此一例以示法也唐陳氏曰如晉不朝正者常也故不書楚外夷也如楚不朝正者非常也故書孫氏曰公在中國猶可在義狄則甚矣公留于楚者七月故詳而録之劉氏曰昭公去國寄于乾侯季氏居君之位攝君之祭聖人嫌于國無公公無國也故因正月書公在以正之今襄公逺適楚而遲留季孫專擅政而不忌有公則無所復存存公則嫌於無君可知矣董子繁露曰公在楚臣子思君無一日無君之意髙氏曰二十八年十一月公如楚十二月甲寅天王崩乙未楚子昭卒公不篤君臣之義以奔天王之喪而徇夷狄之強以俟楚子之葬久留于楚逮夏乃歸故聖人特書之按先是公行及漢聞楚喪欲還誤之者叔仲昭伯也子服惠伯向戌之流飢寒之恤甘為小人之從邇固可鄙矣叔仲昭伯若知大義當贊公以奔王喪夫臣子之情不盡於所當盡而非禮之禮施於所不當施是以或承之羞而不可悔未有居禮義而得恥辱者也葬靈王鄭上卿有事使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎魯則所謂莫往者矣家氏曰公在乾侯以內外言也公在楚以中國外服言也向戌售其邪説屈中國而伸外夷兵未及弭京師楚而泥塗魯宋祓殯送葬春秋閔焉故於嵗首書公在楚外楚也夫外服朝中國禮之常也中國旅朝于楚反常也春秋於事之反常者每變例而特書此類是也啖氏曰左氏言楚使公親襚公使巫以桃茢先祓殯言以君臨臣喪之禮行之且以楚之強僣豈肯使魯辱之又言楚人悔之則楚非不知禮而魯罔之必當見討何得全無事乎蓋魯以親襚為辱故妄為此説以救其恥史因妄而記之耳按檀弓亦載此事但此言親襚彼言親襲此言祓殯彼言祓柩禮死而浴浴即襲襲後始小斂大斂乃殯康王之卒公尚在途及漢聞喪欲反可證也逮公至楚則殯已久矣安得親襲及柩仍在地而祓之乎襚所以衣尸既殯而使公親襚恐亦無此理按胡氏兼取三傳及孫陳劉之義家氏又足以補其所未及董子繁露二語亦佳勝公榖矣附左傳二月癸卯齊人葬莊公于北郭兵死不入兆域夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓楚郟敖即位郟敖康王子熊麋也王子圍康王弟為令尹鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖夏五月公至自楚左傳公還及方城方城山在南陽華縣南季武子取卞使公冶季氏屬大夫問問公起居璽書追而與之璽印也古者尊卑共之秦以來唯天子之印稱璽曰書中之言聞守卞者將叛臣帥師徒以討之既得之矣敢告此皆璽書之詞公冶初不與知公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服以卿服玄冕賞之固辭強之而後受公欲無入榮成伯賦式微詩邶風乃歸五月公至自楚公冶致其邑于季氏而終不入焉不入季孫家曰欺其君何必使余榖梁傳喜之也致君者殆其往而喜其歸此致君之意義也庚午衛侯衎卒附左傳葬靈王不書魯不會鄭上卿有事子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎堅事晉楚以蕃王室也王事無曠何常之有遂使印段如周閽弒吳子餘祭閽音昏祭側界反左傳吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之言以刀明其近公羊傳閽者何門人也守門刑人也刑人則曷為謂之閽刑人非其人也非其人言非合為閽之人曲禮曰刑人不在君側祭統曰古者不使刑人守門刑人不自賴而用作閽由之出入卒為所殺輕死之道也故不書盜而書閽見其近刑人也賤之賤者稱盜君子不近刑人近刑人則輕死之道也榖梁傳閽門者也寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽殺吳子餘祭仇之也附左傳鄭子展卒子皮即位代父為上卿於是鄭飢而未及麥民病子皮以子展之命在喪故以父命餼國人粟戶一鍾六斛四斗宋司城子罕聞之曰鄰於善民之望也民亦望君為善宋亦飢請於平公出公粟以貸他代反使大夫皆貸司城貸而不書施而不德為大夫之無者貸宋無飢人仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把儀公作齊莒人下公穀有邾人左傳晉平公把出也姊妹之子為出故治把理其地修其城六月知悼子合諸侯之大夫以城把孟孝伯會之鄭子大叔不書不親事與伯石公孫段往子大叔見大叔文子世叔儀與之語文子曰甚乎其城把也子大叔曰若之何哉晉國不恤周宗諸姬之闕而夏肄把也方言曰肄枿餘也秦晉之間曰肄是屏城也其棄諸姬亦可知也已諸姬是棄其誰歸之榖梁傳古者天子封諸侯其地足以容其民其民足以滿城以自守也把危而不能自守故諸侯之大夫相帥以城之變之正也杜氏曰公孫段伯石也三十年伯有死始命為卿今蓋以攝卿行按齊桓城緣陵封把也事雖專而心則公故春秋不曰城把而曰城緣陵明其志也周平王以申國近楚數被侵伐遣畿內之民戍之戍者怨思揚之水之詩所以作焉申者平王母家也父幽王死於犬戎申侯與焉説者謂平王知有母而不知有父彼天王也以不知大義而得罪於綱常况晉平公以一諸侯至勤天下之衆為治其母家而於王事則曠於恤周宗則偷乎其亦不待誅絶而見矣李氏曰僖公為成風伐邾而春秋不豫以救患之義平公為悼夫人城把而春秋不豫以保小之仁則於公私之際審矣晉侯使士鞅來聘左傳范獻子來聘拜城把也公享之展莊叔執幣公將以酬賔射者三耦二人為耦按燕禮云若射則大射正為司射如鄉射之禮是燕有為射之時也此云公享之則享法亦有射也公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦把子來盟左傳晉侯使司馬女叔侯來治把田使魯歸前侵把田所歸少故不書弗盡歸也晉悼夫人平公母把女愠曰齊也取貨謂叔侯受魯賂先君若有知也不尚取之不尚尚也先君有知尚須取女叔侯誅之公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也八國皆晉所滅焦在陜縣揚屬平陽晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之把夏餘也而即東夷行夷禮魯周公之後也而睦于晉職貢不乏何必瘠魯以肥把把文公來盟魯歸其田故書曰子賤之也按把或子或伯義見桓二年吳子使札來聘吳始聘吳始君臣並見左傳吳公子札來聘通嗣君也傳言札見叔孫穆子説之規其好善而不能擇人請觀周樂語多不録又言聘于齊説晏平仲勸之速納邑與政以免難聘于鄭見子産如舊識曰政必及子子為政慎之以禮適衛説蘧瑗史鰌公子荆公叔文子曰衛多君子自衛如晉將宿于戚聞鐘聲曰夫子獲罪於君以在此懼猶不足而又何樂君又在殯而可以樂乎遂去之適晉説趙文子韓宣子魏獻子及叔向朱子門人問季札觀樂如何知得如此之審朱子曰此是左氏糚點出來亦自難信如聞齊樂而曰國未可量然再傳而為田氏烏在其為未可量也此皆難信處杜氏曰吳子餘祭既遣札聘上國而後死札以六月到魯未聞喪也不稱公子其禮未同於上國孔氏曰上云閽弒吳子此云吳子使聘傳言通嗣君未知通誰嗣也賈逵服虔皆以為夷昧案先君未葬嗣君不得命臣此與閽弒吳子文不隔月豈以君死之月即命臣乎且傳稱季札至魯遍觀周樂至戚聞鐘聲譏孫文子君在殯而樂自請觀樂譏人聽樂豈當若是故通嗣君通餘祭嗣也經傳皆無札至之月知以六月到者以城把在五月之下城訖乃有鞅聘把盟若共在月中則不容札聘下文有秋知札以六月至也札去後吳始告喪告以五月被弒故追書在聘上耳公羊傳吳無君無大夫此何以有君有大夫賢季子也何賢乎季子讓國也其讓國奈何謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮子各反起也倉卒意而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝因祭祝曰天苟有吳國尚速有悔於余身故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也先君之意季子使而亡焉季子自以義有不安辟之而不受僚者長庶也即之夷昧死季子亡國無嫡立僚夷昧長庶因而就立也季子使而反聘上國而反至而君之爾在途聞難至而君之闔廬謁之長子光曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚焉得為君子於是使專諸刺僚而致國乎季子季子不受曰爾殺吾君吾受爾國是吾與爾為篡也爾殺爾兄吾又殺爾是父子兄弟相殺終身無已也爾殺爾兄舊作爾殺吾兄傳寫之誤也僚夷昧之子光謁之子僚與光從父兄弟而季子其諸父也故云然去之延陵吳下邑終身不入吳國故君子以其不受為義以其不殺為仁劉氏絢曰札何以不稱公子辭國以生亂也夷昧之卒札宜受命以安社稷而徇匹夫之節辭位以逃於是僚代立光弒僚故因來聘去其公子以示貶胡氏曰泰伯時中季子過中自衆人觀之過者為賢自道觀之過猶不及故褒貶如此今按有太王之父季歷之弟文王之子則泰伯當讓季歷當受此所謂聖達節也若季札則亦當守節也夀夢之欲立季札與諸樊之舍子而立弟約以次傳必及季子蓋聞其先太王泰伯之事慕而欲效之者而不知其時義之非宜而徒啓後日之爭也不見宋宣公之事也假令夷昧也死季子不度而即之吳國其靖乎彼僚與光何人哉僚固不憚於襲光固不憚於弒徒以季子之素所不屑者足以取信於二子故二子佯讓之以為名而內不失其有國之實豈誠心死於先君之命而季子立則無辭者耶以後日之利害既如此以今日之事理則立長正也立少非正也夀夢過中而反謂季子之不成父之非正為過中古今有幾太王乎立子正也傳弟非正也諸君之輕死為勇飲食必祝為過中而反謂季子之不成兄之非正為過中古今有幾季歷乎穆公問於子思曰立太子有常乎答曰有之在周公之典公曰昔文王舍嫡而立其次是何法也子思曰文王舍嫡立次權也聖人不以權教故立制垂法順之為貴知聖人不以權教則知春秋不貶季札矣且春秋褒貶各當其事札辭國乃後日事而逆於來聘貶之史家有是法乎以字為美則祭仲非美以子為賢則髙子何賢光弒僚在昭二十七年秋七月葬衛獻公齊髙止出奔北燕北燕始見經左傳秋九月齊公孫蠆子尾公孫竈子雅放其大夫髙止於北燕髙止好以事自為功且專故難及之榖梁傳其曰北燕從史文也范氏曰南燕姞姓在鄭衛之間北燕姬姓在晉之北杜氏曰止髙厚之子北燕燕國薊縣按大夫有罪君放之正也臣放大夫是無君也冬仲孫羯如晉左傳報范叔也附左傳髙豎髙止之子以盧叛十月齊人立敬仲髙傒之曽孫酀十一月髙豎致盧而出奔晉鄭伯有使公孫黑子晳如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟于伯有氏三十年春王正月楚子使薳罷來聘薳于委反罷音皮公作頗後同左傳通嗣君也余氏曰且報朝也夏四月蔡世子般弒其君固般音班左傳蔡景侯為太子般娶于楚通焉太子弒景侯五月甲午宋災宋伯姬卒公穀伯姬上無宋字左傳或呌于宋太廟曰嘻嘻許其及熱也出出戒伯姬鳥鳴于毫社如曰嘻嘻甲午宋大災宋伯姬卒待姆女師也君子謂宋共姬女而不婦女待人婦義事也義從宜也公羊傳宋災有司復曰火至矣請出伯姬曰不可婦人夜出不見傅母不下堂何氏曰夜出謂有事宗廟榖梁傳取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也安定胡氏曰伯姬乃婦人中之伯夷也劉氏曰使共姬避火而全生未足以害其貞也然而不以已之可以全生而違天下之常義此安乎性命者乃能之左氏曰共姬女而不婦非也易曰恆其德貞婦人吉共姬恆矣所謂婦也按列女傳宋伯姬者魯宣公之女成公之妹也既嫁于共公十年共公卒伯姬寡三十五年至景公時伯姬之宫夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保傅來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義求生不如守義而死遂逮於火而死此視三傳尤備夫保傅不俱宵不下堂此伯姬所守之禮也豈無所見而徒守哉越義求生不如守義而死此伯姬素定於心之見也天理人欲之間在乎此而已矣死生命也禮義之間所欲有甚於生所惡有甚於死一下堂而此足之失不可悔也故傅母可待也臣子之救可待也不可待逮乎火而死則命也可待而不之待越禮以貪生而苟免於死在丈夫猶足羞也而况婦人乎故寧守義而死此伯姬之心也春秋書之所以風厲千古使夫不當避而避以失節於造次顛沛之際者知所警也豈曰小補之哉然是變也宋之臣子安在乃使君母逮乎火而死哉亦罪其臣子也謂伯姬女而不婦猶謂季札辭國生亂使自私者借從權以自便必自斯言矣孔子於伯夷未嘗論其過曰求仁得仁曰民到于今稱之誠不以富亦祗以異其著教深矣至孟子始言其偏然對孔子言之也至其通論二子則曰百世之師也聞其風者頑夫亷懦夫有立志鄙夫寬薄夫敦其意猶孔子也天王殺其弟佞夫公作年夫左傳初王儋丁甘反季卒周靈王弟其子括將見王而歎除服見靈王單公子愆期為靈王御士過諸廷聞其歎以告王且曰必殺之不戚而願大視躁而足高心在他矣王曰童子何知及靈王崩儋括欲立王子佞夫靈王子景王弟佞夫弗知戊子儋括圍蒍逐成愆成愆蒍邑大夫成愆奔平畤周邑五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉括廖不書賤也榖梁傳傳曰諸侯且不首惡况於天子乎君無忍親之義天王殺其弟佞夫甚之也按王者之道親親而及天下則治有序稱罪以明罰則政有經靈王崩儋括欲立佞夫佞夫不知景王立儋括圍逐成愆佞夫不預則佞夫無罪也王之恩素篤罰有章而尹劉諸人敢以無罪而殺其介弟乎且括亂首而免則是所忌在佞夫耳故書王殺以見忍親失刑雖天子不免於首惡而况其下乎王子瑕奔晉王子王臣書奔者三瑕也朝也周公也瑕與王子朝不言出天下皆周土也唯周公自絶於王故書出罪之也秋七月叔弓如宋葬宋共姬共姬上榖無宋字杜氏曰共姬從夫諡也叔弓叔老之子卿共葬事禮過厚孔氏曰昭三年傳曰君薨大夫弔卿共葬事夫人士弔大夫送葬陸氏曰為災而死高其志行使卿往會所以書之薛氏曰古者夫人無諡從夫之諡東遷之後其制隳矣如文薑衰薑穆薑聲薑皆不繫夫諡而自有諡共姬執禮而死宋人不敢加非禮之諡一人守正天下莫之違也鄭良霄出奔許自許入于鄭鄭人殺良霄左傳鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路分散而罷既而朝則又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔雍梁鄭地醒而後知之遂奔許鄭伯及其大夫盟于大宫祖廟盟國人於師之梁之外鄭城門伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門鄭城門之瀆入因馬師頡子羽孫介于襄庫以伐舊北門駟帶率國人以伐之駟帶子西之子子晳之宗主伯有死于羊肆子産斂而殯諸伯有之臣在市側者既而葬諸斗城鄭地名羽頡馬師頡出奔晉子皮以公孫鉏子罕之子為馬師代羽頡榖梁傳不言大夫惡之也胡傳不言復入者其位未絶也杜氏曰不言復入獨還無兵冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故左傳為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宫他結之子鄭罕虎子皮及小邾之大夫會于澶淵既而無歸於宋故不書其人書曰某人某人會于澶淵宋災故尤之也不書魯大夫諱之也公羊傳會未有言其所為者此言所為何録伯姬也諸侯相聚而更宋之所喪張氏曰父子君臣之變自文元年楚以商臣書此猶夷狄之事也及是年蔡以中國之臣子為之而魯會其葬晉合諸侯而所恤者宋之火災而已故於此章三致意焉既變例書蔡景之葬又人諸侯之大夫而諱魯卿又特書曰宋災故此比事屬辭之所以為春秋也盟會之書其故者有二以稷考之則澶淵之所貶非為宋財之無歸明矣按二十五年齊崔杼弒其君光下亦書十二國之諸侯會于夷儀不言其所為而其所為可求而知也前此齊嘗伐晉兩加兵于莒又伐魯今又弒君則其為討齊可知後書諸侯同盟于重丘則其為受賂而止而齊亦與盟可知悼公初死平公新立晉之故望未失人猶有望焉盟宋之後列國北面楚庭胥於淪喪故葬蔡景公會澶淵宋災故春秋直著誅貶遏人欲於橫流也李氏曰此條榖梁以為善之書人者衆詞固失之矣而左氏止非其不信公羊又以為卿不得憂諸侯夫春秋盟會之不信者多矣城杞亦卿之憂諸侯也何此獨貶乎仁山金氏曰城杞為悼夫人也會澶淵為宋災也二者謂非恤小救患之舉則不可然蔡般之事亂臣賊子天下之大故而晉不之問以有弭兵之盟也蔡即楚久晉人以為討則懼有爭蔡之嫌再啓兵端若夫蔡則圍為令尹亦將般矣此般之所以不討也有弭兵之小信而忘撥亂之大義詩云君子屢盟亂是用長其斯之謂與附左傳鄭子皮授子産政伯有死子皮知政以子産賢故讓之辭曰國小而逼族大寵多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寬子産為政使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而褚之侈者畏法所不敢服者畜之囊中取我田疇而伍之並畔為疇孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之三十有一年春王正月夏六月辛巳公薨于楚宫何休曰公朝楚好其宫歸而作之故名之云爾按左氏言公作楚宫穆叔曰君欲楚也夫故作其宫若不復適楚必死是宫也此非人臣之言且公淹恤於楚豈得已哉何欲楚之有作其宫不過慕其制而效之耳然楚宫必詭異非所當作也按公淹恤於楚受親襚送葬之辱歸而不發憤自強修其德政乃效蠻夷之居又章其號處而終焉其志可知矣小寢猶非正也况楚宫乎然此非止以即安不正書也公在楚公薨于楚宫皆襄之特筆也秋九月癸巳子野卒左傳立胡女敬歸之子子野胡歸姓之國敬歸襄公妾也次于季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子稠穆叔不欲曰大子死有母弟則立之無則立長年均擇賢義均則卜古之道也先人事後卜筮也義均謂賢等非嫡嗣何必娣之子且是人也居喪而不哀在戚而有嘉容子野以毁卒昭公在戚而有嘉容天不幸魯國也夫是謂不度不度之人鮮不為患若果立之必為季氏憂此見乾侯之事後撰飾之言與衛定薑見衎之不哀而憂孫文子聞而懼其事正同魯宿即衛林父也武子不聽卒立之比及葬三易衰衰衽如故衰言其嬉戲無度於是昭公十九年矣猶有童心君子是以知其不能終也榖梁傳子卒曰正也孫氏曰子野襄公大子未踰年之君也名未葬也不薨不地降成君也按居喪毁瘠不形者先王之禮也毁不滅性者先王之教也子野喪致乎哀根乎至性豈不賢哉而不能輔之以教開之以禮以保其躬使至滅性大臣之罪也己亥仲孫羯卒羯居竭反冬十月滕子來會葬癸酉葬我君襄公附左傳公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之對曰以敝邑褊小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪今銅鞮之宫數里而諸侯舍於𨽻人門不容車不可踰越若又勿壞是無所藏幣以重罪也雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子謝焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館鄭子皮使印段如楚以適晉告十有一月莒人弒其君密州左傳莒犂比公莒子密州之號生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弒之乃立去疾奔齊齊出也展輿吳出也書曰莒人弒其君買朱鉏密州之字言罪之在也胡傳經以傳為案傳有乖繆則信經而棄傳可也若密州之事是已左傳稱莒子生去疾及展輿既立展輿又廢之莒子虐國人患之展輿因國人以攻莒子弒之乃立信斯言則子弒其父也而春秋有不書乎故趙匡謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾附左傳吳子使屈狐庸巫臣之子聘于晉通路也趙文子問焉曰延州來季子其果立乎延陵州來季札食二邑故連言之巢隕諸樊在二十五年閽戕戴吳在二十五年戴吳餘祭天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎謂夷昧甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立十二月北宫文子他相衛襄公獻公子以如楚過鄭文子入聘出言於衛侯曰鄭有禮其數世之福也其無大國之討乎子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為所欲為而辨於其大夫之族姓班列貴賤能否而又善為辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也鄭人遊于鄉校以論執政然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多使人不敢言怨怒之積有潰時若川也厲王監謗是也吾不克救也不如小決使道通也吾聞而藥之也以為已之藥石子皮欲使尹何為邑子産曰少未可子皮曰使夫往而學焉子産曰人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學也子皮曰善哉微子之言吾不知也衛侯在楚北宫文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志言語瞻視行步不常雖獲其志不能終也公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰邶風威儀棣棣富而間也不可選也言君臣上下父子兄弟內外大小皆有威儀也周詩大雅曰朋友攸攝佐也攝以威儀言朋友之道必相教訓以威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也春秋輯傳卷九
